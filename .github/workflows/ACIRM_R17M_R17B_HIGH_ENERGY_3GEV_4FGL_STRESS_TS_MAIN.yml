name: ACIRM R17B high energy 3GeV limited 4FGL TS FermiBottle run

on:
  workflow_dispatch:

jobs:
  r17a-high-energy-1gev-limited-4fgl-ts:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Host preflight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acirm_r17a data results logs final_artifact pfiles
          echo "HOST_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee logs/HOST_PREFLIGHT.txt
          uname -a | tee -a logs/HOST_PREFLIGHT.txt
          df -h | tee -a logs/HOST_PREFLIGHT.txt
          docker --version | tee -a logs/HOST_PREFLIGHT.txt

      - name: Write self-contained R17B files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acirm_r17a data results logs final_artifact pfiles

          cat > acirm_r17a/write_failure.py <<'PY'
          import json, pathlib, sys, datetime
          stage = sys.argv[1] if len(sys.argv) > 1 else "UNKNOWN_STAGE"
          detail = sys.argv[2] if len(sys.argv) > 2 else ""
          pathlib.Path("results").mkdir(exist_ok=True)
          out = {
              "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "decision": "R17B_HIGH_ENERGY_3GEV_PRE_TS_OR_FERMITOOLS_STAGE_FAILED_LOGS_READY_NOT_PROOF",
              "failed_stage": stage,
              "detail": detail,
              "claim_ceiling": [
                  "NO_TS_CONFIRMED_IF_GTLIKE_NOT_OK",
                  "HIGH_ENERGY_3GEV_LIMITED_4FGL_STRESS_TEST",
                  "CATALOG_SPECTRA_SIMPLIFIED_TO_POWERLAW_FOR_ROBUSTNESS",
                  "NOT_PUBLISHABLE_TS",
                  "NOT_PROOF"
              ]
          }
          pathlib.Path("results/R17B_PRELIMINARY_RESULT.json").write_text(json.dumps(out, indent=2), encoding="utf-8")
          PY

          cat > acirm_r17a/parse_results.py <<'PY'
          import pathlib, json, re, datetime, xml.etree.ElementTree as ET

          RESULTS = pathlib.Path("results")
          LOGS = pathlib.Path("logs")
          GTLIKE_LOG = LOGS / "gtlike_afterglow.log"
          FIT_XML = RESULTS / "fit_afterglow_output.xml"
          STAGE = RESULTS / "R17B_STAGE_STATUS.tsv"
          R11_REFERENCE_TS = 390.148

          def utc_now():
              return datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z"

          gtlike_status = (RESULTS / "GTLIKE_EXIT_STATUS.txt").read_text(errors="replace").strip() if (RESULTS / "GTLIKE_EXIT_STATUS.txt").exists() else "MISSING"
          log_text = GTLIKE_LOG.read_text(errors="replace") if GTLIKE_LOG.exists() else ""

          def search_float(pattern, text, default=None, flags=re.S):
              m = re.search(pattern, text, flags)
              if not m:
                  return default
              try:
                  return float(m.group(1))
              except Exception:
                  return default

          def search_pair(pattern, text, flags=re.S):
              m = re.search(pattern, text, flags)
              if not m:
                  return None, None
              try:
                  return float(m.group(1)), float(m.group(2))
              except Exception:
                  return None, None

          src_block = ""
          m = re.search(r"GRB221009A_ACIRM_LOCKED:\s*(.*?)(?:\n\s*\n|\Z)", log_text, re.S)
          if m:
              src_block = m.group(1)

          ts_value = search_float(r"GRB221009A_ACIRM_LOCKED:.*?TS value:\s*([0-9.eE+-]+)", log_text)
          photon_flux, photon_flux_err = search_pair(r"GRB221009A_ACIRM_LOCKED:.*?Photon flux:\s*([0-9.eE+-]+)\s*\+/-\s*([0-9.eE+-]+)", log_text)
          index_value, index_err = search_pair(r"GRB221009A_ACIRM_LOCKED:.*?Index:\s*([+-]?[0-9.eE+-]+)\s*\+/-\s*([0-9.eE+-]+)", log_text)
          neg_log_like = search_float(r"minimum function Value:\s*([0-9.eE+-]+)", log_text)
          model_events = search_float(r"Model events:\s*([0-9.eE+-]+)", log_text)
          observed_counts = search_float(r"Observed counts:\s*([0-9.eE+-]+)", log_text)
          n_sources_total = None
          m = re.search(r"Computing TS values for each source \((\d+) total\)", log_text)
          if m:
              n_sources_total = int(m.group(1))

          source_rows = []
          if FIT_XML.exists():
              try:
                  root = ET.parse(FIT_XML).getroot()
                  for src in root.findall("source"):
                      row = {"name": src.attrib.get("name"), "type": src.attrib.get("type"), "TS_attribute": src.attrib.get("TS") or src.attrib.get("ts")}
                      spec = src.find("spectrum")
                      if spec is not None:
                          row["spectrum_type"] = spec.attrib.get("type")
                          for par in spec.findall("parameter"):
                              pname = par.attrib.get("name")
                              if pname in ["Prefactor", "Index", "Scale", "Normalization"]:
                                  row[pname + "_value"] = par.attrib.get("value")
                                  row[pname + "_free"] = par.attrib.get("free")
                                  row[pname + "_error"] = par.attrib.get("error")
                      source_rows.append(row)
              except Exception as e:
                  source_rows.append({"parse_error": repr(e)})

          warnings = [line.strip() for line in log_text.splitlines() if "WARNING" in line or "warning" in line]
          errors = [line.strip() for line in log_text.splitlines() if "ERROR" in line or "Exception" in line or "Traceback" in line]
          candidate_lines = []
          for line in log_text.splitlines():
              low = line.lower()
              if "grb221009a" in low or "test statistic" in low or re.search(r"\bts\b", low) or "photon flux" in low or "model events" in low or "observed counts" in low or "warning" in low or "exception" in low or "error" in low or "minuit" in low:
                  candidate_lines.append(line[:800])

          stage_rows = []
          if STAGE.exists():
              for line in STAGE.read_text(errors="replace").splitlines()[1:]:
                  parts = line.split("\t")
                  if len(parts) >= 3:
                      stage_rows.append({"utc": parts[0], "stage": parts[1], "status": parts[2]})

          ts_delta = None
          ts_ratio = None
          if ts_value is not None:
              ts_delta = ts_value - R11_REFERENCE_TS
              ts_ratio = ts_value / R11_REFERENCE_TS if R11_REFERENCE_TS else None

          decision = "R17B_HIGH_ENERGY_3GEV_LIMITED_4FGL_STRESS_TEST_TS_COMPLETED_REQUIRES_R19_AUDIT_NOT_PROOF" if gtlike_status == "0" and FIT_XML.exists() and ts_value is not None else "R17B_HIGH_ENERGY_3GEV_LIMITED_4FGL_STRESS_TEST_INCOMPLETE_OR_FAILED_LOGS_READY_NOT_PROOF"

          out = {
              "created_utc": utc_now(),
              "decision": decision,
              "gtlike_exit_status": gtlike_status,
              "fit_xml_exists": FIT_XML.exists(),
              "srcmaps_exists": (RESULTS / "srcmaps_afterglow.fits").exists(),
              "r11_reference_starter_ts": R11_REFERENCE_TS,
              "r17a_grb_ts_value": ts_value,
              "ts_delta_vs_r11": ts_delta,
              "ts_ratio_vs_r11": ts_ratio,
              "photon_flux": photon_flux,
              "photon_flux_error": photon_flux_err,
              "index": index_value,
              "index_error": index_err,
              "negative_log_likelihood": neg_log_like,
              "observed_counts": observed_counts,
              "model_events": model_events,
              "n_sources_total_reported_by_gtlike": n_sources_total,
              "n_fit_xml_sources": len(source_rows),
              "warnings": warnings[:100],
              "errors": errors[:100],
              "stage_rows": stage_rows,
              "source_rows_from_fit_xml": source_rows,
              "candidate_log_lines": candidate_lines[:300],
              "claim_ceiling": [
                  "HIGH_ENERGY_3GEV_LIMITED_4FGL_STRESS_TEST",
                  "4FGL_SOURCES_WITHIN_6DEG_INCLUDED",
                  "ONLY_SOURCES_WITHIN_3DEG_FREED",
                  "CATALOG_SPECTRA_SIMPLIFIED_TO_POWERLAW_FOR_ROBUSTNESS",
                  "NOT_FULL_CATALOG_LIKELIHOOD",
                  "NOT_FULL_SYSTEMATICS",
                  "NOT_PUBLISHABLE_TS",
                  "NOT_SOURCE_ATTRIBUTION_PROOF",
                  "NO_ACIRM_EXTERNAL_PROOF",
                  "NOT_PROOF"
              ]
          }
          (RESULTS / "R17B_PRELIMINARY_RESULT.json").write_text(json.dumps(out, indent=2), encoding="utf-8")
          print(json.dumps(out, indent=2))
          PY

          cat > acirm_r17a/package_results.py <<'PY'
          from pathlib import Path
          import zipfile, hashlib, json, datetime, csv

          ROOT = Path(".")
          FINAL = ROOT / "final_artifact"
          FINAL.mkdir(exist_ok=True)

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()

          result_path = ROOT / "results" / "R17B_PRELIMINARY_RESULT.json"
          if not result_path.exists():
              docker_status = (ROOT / "results" / "DOCKER_EXIT_STATUS.txt").read_text(errors="replace").strip() if (ROOT / "results" / "DOCKER_EXIT_STATUS.txt").exists() else "MISSING"
              out = {
                  "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
                  "decision": "R17B_DOCKER_OR_PRE_TS_STAGE_DID_NOT_COMPLETE_LOGS_READY_NOT_PROOF",
                  "docker_exit_status": docker_status,
                  "claim_ceiling": ["NO_TS_CONFIRMED", "LOGS_ONLY", "NOT_PROOF"]
              }
              (ROOT / "results").mkdir(exist_ok=True)
              result_path.write_text(json.dumps(out, indent=2), encoding="utf-8")

          zip_path = FINAL / "ACIRM_R17M_R17B_HIGH_ENERGY_3GEV_4FGL_STRESS_TS_FERMITOOLS_RESULTS.zip"
          manifest = []
          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
              for folder in ["acirm_r17a", "results", "logs"]:
                  p = ROOT / folder
                  if not p.exists():
                      continue
                  for f in sorted(p.rglob("*")):
                      if not f.is_file():
                          continue
                      if f.suffix.lower() in [".fits", ".fit", ".gz"] and f.stat().st_size > 10_000_000:
                          manifest.append({"file": str(f), "size_bytes": f.stat().st_size, "included": False, "reason": "large_fits_excluded_from_slim_artifact"})
                          continue
                      z.write(f, arcname=str(f))
                      manifest.append({"file": str(f), "size_bytes": f.stat().st_size, "included": True, "sha256": sha256_file(f)})

          sha = sha256_file(zip_path)
          (FINAL / (zip_path.name + ".sha256.txt")).write_text(sha + "  " + zip_path.name + "\n", encoding="utf-8")
          with open(FINAL / "R17B_ARTIFACT_MANIFEST.csv", "w", newline="", encoding="utf-8") as fp:
              fields = ["file", "size_bytes", "included", "sha256", "reason"]
              w = csv.DictWriter(fp, fieldnames=fields, extrasaction="ignore")
              w.writeheader()
              w.writerows(manifest)
          status = {
              "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "zip": str(zip_path),
              "sha256": sha,
              "decision_source": "results/R17B_PRELIMINARY_RESULT.json",
              "claim": "R17B_HIGH_ENERGY_3GEV_4FGL_STRESS_TS_ARTIFACT_READY_NOT_PROOF"
          }
          (FINAL / "R17B_ARTIFACT_STATUS.json").write_text(json.dumps(status, indent=2), encoding="utf-8")
          print("ZIP", zip_path)
          print("SHA256", sha)
          PY

