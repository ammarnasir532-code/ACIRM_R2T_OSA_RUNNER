          cat > acirm_r17a/run_inside_fermibottle.sh <<'BASH'
          #!/usr/bin/env bash
          set -Eeo pipefail
          mkdir -p data results logs pfiles
          exec > >(tee logs/CONTAINER_STDOUT.log) 2> >(tee logs/CONTAINER_STDERR.log >&2)
          stage_file="results/R17B_STAGE_STATUS.tsv"
          echo -e "utc\tstage\tstatus" > "$stage_file"
          stage() { echo -e "$(date -u +%Y-%m-%dT%H:%M:%SZ)\t$1\t$2" | tee -a "$stage_file"; }
          fail_stage() { stage "$1" "FAIL"; python acirm_r17a/write_failure.py "$1" "$2" || true; exit "${3:-20}"; }

          stage "container_start" "START"
          cd /work || fail_stage "workdir" "cannot cd /work" 21
          test -f /work/acirm_r17a/run_inside_fermibottle.sh || fail_stage "mounted_files" "run script not visible under /work/acirm_r17a" 22
          test -f /work/results/R17B_MODEL_GRB221009A_LIMITED_NEARBY_4FGL_FROM_R15A_R2.xml || fail_stage "model_xml" "embedded R17B 4FGL model xml missing" 23
          stage "mounted_files" "OK"

          export HOME="${HOME:-/home/fermi}"
          export PFILES="/work/pfiles"
          export HEADASPROMPT="/dev/null"
          mkdir -p "$PFILES" "$HOME" || true

          stage "environment_setup" "START"
          set +u
          if [ -f /opt/anaconda/etc/profile.d/conda.sh ]; then
            source /opt/anaconda/etc/profile.d/conda.sh >> logs/CONDA_ACTIVATE.txt 2>&1 || true
            conda activate fermi >> logs/CONDA_ACTIVATE.txt 2>&1 || true
          fi
          GTSELECT_PATH="$(find /opt /usr/local /home -type f -name gtselect 2>/dev/null | head -n 1 || true)"
          if [ -n "$GTSELECT_PATH" ]; then
            export PATH="$(dirname "$GTSELECT_PATH"):$PATH"
          fi
          FERMI_SHARE="$(find /opt /usr/local /home -type d -path '*/share/fermitools' 2>/dev/null | head -n 1 || true)"
          if [ -n "$FERMI_SHARE" ]; then
            export FERMI_DIR="$FERMI_SHARE"
          fi
          ALIAS_FILE="$(find /opt /usr/local /home /work -path '*/caldb/software/tools/alias_config.fits' 2>/dev/null | head -n 1 || true)"
          if [ -z "$ALIAS_FILE" ]; then
            fail_stage "caldb_alias" "alias_config.fits not found under container paths" 24
          fi
          CALDB_DIR="$(dirname "$(dirname "$(dirname "$ALIAS_FILE")")")"
          export CALDB="$CALDB_DIR"
          export CALDBCONFIG="$CALDB/software/tools/caldb.config"
          export CALDBALIAS="$CALDB/software/tools/alias_config.fits"
          mkdir -p /refdata/fermi 2>/dev/null || true
          if [ ! -e /refdata/fermi/caldb ]; then
            ln -s "$CALDB" /refdata/fermi/caldb 2>/dev/null || true
          fi
          {
            echo "PATH=$PATH"
            echo "FERMI_DIR=${FERMI_DIR:-}"
            echo "CALDB=$CALDB"
            echo "CALDBCONFIG=$CALDBCONFIG"
            echo "CALDBALIAS=$CALDBALIAS"
            echo "ALIAS_FILE=$ALIAS_FILE"
            ls -lah "$CALDB/software/tools" || true
            ls -lah /refdata/fermi/caldb/software/tools 2>/dev/null || true
          } > logs/CALDB_ENVIRONMENT_FIX.txt
          stage "environment_setup" "OK"

          stage "tool_check" "START"
          missing=0
          for tool in gtselect gtmktime gtbin gtltcube gtexpcube2 gtsrcmaps gtlike curl python; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "MISSING_TOOL=$tool" | tee -a logs/TOOL_CHECK.txt
              missing=1
            else
              echo "$tool=$(command -v "$tool")" | tee -a logs/TOOL_CHECK.txt
            fi
          done
          if [ "$missing" -ne 0 ]; then
            fail_stage "environment_tools" "required Fermitools command missing" 25
          fi
          stage "tool_check" "OK"

          PHOTON_URL="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w749_p305_v001.fits"
          PHOTON="data/lat_photon_weekly_w749_p305_v001.fits"
          SC_PRIMARY_URL="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w749_p310_v001.fits"
          SC_DIR="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/"
          SPACECRAFT="data/lat_spacecraft_weekly_w749.fits"

          stage "download_photon" "START"
          if [ ! -s "$PHOTON" ]; then
            timeout 45m curl -fL --retry 5 --retry-delay 10 --connect-timeout 30 "$PHOTON_URL" -o "$PHOTON" || fail_stage "download_photon" "curl photon failed" 26
          fi
          stage "download_photon" "OK"

          stage "download_spacecraft" "START"
          if [ ! -s "$SPACECRAFT" ]; then
            if ! timeout 20m curl -fL --retry 3 --retry-delay 10 --connect-timeout 30 "$SC_PRIMARY_URL" -o "$SPACECRAFT"; then
              echo "Primary spacecraft URL failed; trying directory fallback" | tee -a logs/SPACECRAFT_FALLBACK.log
              timeout 3m curl -fL --retry 3 --connect-timeout 30 "$SC_DIR" -o logs/spacecraft_dir.html || fail_stage "download_spacecraft" "cannot list spacecraft directory" 27
              SC_FALLBACK=$(python - <<'PY'
          import re, pathlib, urllib.parse
          html = pathlib.Path('logs/spacecraft_dir.html').read_text(errors='replace')
          links = re.findall(r'href=["\']([^"\']+)["\']', html, flags=re.I)
          hits = []
          for h in links:
              name = urllib.parse.unquote(h.rstrip('/').split('/')[-1])
              low = name.lower()
              if 'w749' in low and low.endswith(('.fits', '.fit', '.fits.gz', '.fit.gz')):
                  hits.append(h)
          print(hits[0] if hits else '')
          PY
          )
              if [ -z "$SC_FALLBACK" ]; then
                fail_stage "download_spacecraft" "no w749 spacecraft file found in directory listing" 28
              fi
              SC_URL="${SC_DIR}${SC_FALLBACK}"
              timeout 20m curl -fL --retry 3 --retry-delay 10 --connect-timeout 30 "$SC_URL" -o "$SPACECRAFT" || fail_stage "download_spacecraft" "fallback spacecraft download failed" 29
            fi
          fi
          stage "download_spacecraft" "OK"

          stage "download_manifest" "START"
          python - <<'PY'
          import hashlib, json, pathlib, datetime
          rows = []
          for label, path in [('photon', 'data/lat_photon_weekly_w749_p305_v001.fits'), ('spacecraft', 'data/lat_spacecraft_weekly_w749.fits')]:
              p = pathlib.Path(path)
              h = hashlib.sha256()
              if p.exists():
                  with open(p, 'rb') as f:
                      for b in iter(lambda: f.read(1024*1024), b''):
                          h.update(b)
              rows.append({'label': label, 'file': str(p), 'exists': p.exists(), 'size_bytes': p.stat().st_size if p.exists() else None, 'sha256': h.hexdigest() if p.exists() else None})
          out = {'created_utc': datetime.datetime.utcnow().replace(microsecond=0).isoformat()+'Z', 'downloads': rows, 'claim': 'DOWNLOAD_MANIFEST_NOT_TS'}
          pathlib.Path('results/R17B_DOWNLOAD_MANIFEST.json').write_text(json.dumps(out, indent=2))
          PY
          stage "download_manifest" "OK"

          stage "resolve_diffuse" "START"
          GAL=$(find /opt /usr/local /home /work -name gll_iem_v07.fits 2>/dev/null | head -n 1 || true)
          ISO=$(find /opt /usr/local /home /work -name iso_P8R3_SOURCE_V3_v1.txt 2>/dev/null | head -n 1 || true)
          if [ -z "$GAL" ] || [ -z "$ISO" ]; then
            fail_stage "resolve_diffuse" "diffuse model files not found in FermiBottle" 30
          fi
          sed "s#GAL_DIFFUSE_PLACEHOLDER#$GAL#g; s#ISO_DIFFUSE_PLACEHOLDER#$ISO#g" \
            results/R17B_MODEL_GRB221009A_LIMITED_NEARBY_4FGL_FROM_R15A_R2.xml > results/R17B_MODEL_RUNTIME.xml
          printf '{"gll_iem_v07":"%s","iso_P8R3_SOURCE_V3_v1":"%s","claim":"DIFFUSE_RESOLUTION_NOT_TS"}\n' "$GAL" "$ISO" > results/R17B_DIFFUSE_MODEL_STATUS.json
          stage "resolve_diffuse" "OK"

          RA="288.2646"
          DEC="19.7735"
          RAD="12.0"
          EMIN="3000.0"
          EMAX="500000.0"
          ZMAX="90.0"
          EVCLASS="128"
          EVTYPE="3"
          IRFS="P8R3_SOURCE_V3"
          NXPIX="240"
          NYPIX="240"
          BINSZ="0.1"
          EXP_NXPIX="720"
          EXP_NYPIX="720"
          EXP_BINSZ="0.1"
          ENUMBINS="30"
          TMIN="687014824.98753"
          TMAX="687187024.98753"
          MODEL="results/R17B_MODEL_RUNTIME.xml"

          stage "gtselect" "START"
          timeout 30m gtselect infile="$PHOTON" outfile="results/events_afterglow_selected.fits" ra="$RA" dec="$DEC" rad="$RAD" \
            tmin="$TMIN" tmax="$TMAX" emin="$EMIN" emax="$EMAX" zmax="$ZMAX" evclass="$EVCLASS" evtype="$EVTYPE" \
            clobber=yes chatter=4 || fail_stage "gtselect" "gtselect failed" 31
          stage "gtselect" "OK"

          stage "gtmktime" "START"
          timeout 30m gtmktime scfile="$SPACECRAFT" filter="(DATA_QUAL>0)&&(LAT_CONFIG==1)" roicut=yes \
            evfile="results/events_afterglow_selected.fits" outfile="results/events_afterglow_gti.fits" \
            clobber=yes chatter=4 || fail_stage "gtmktime" "gtmktime failed" 32
          stage "gtmktime" "OK"

          stage "gtbin" "START"
          timeout 30m gtbin evfile="results/events_afterglow_gti.fits" scfile="$SPACECRAFT" outfile="results/ccube_afterglow.fits" algorithm=CCUBE \
            nxpix="$NXPIX" nypix="$NYPIX" binsz="$BINSZ" coordsys=CEL xref="$RA" yref="$DEC" axisrot=0 proj=AIT \
            ebinalg=LOG emin="$EMIN" emax="$EMAX" enumbins="$ENUMBINS" clobber=yes chatter=4 || fail_stage "gtbin" "gtbin failed" 33
          stage "gtbin" "OK"

          stage "gtltcube" "START"
          timeout 75m gtltcube evfile="results/events_afterglow_gti.fits" scfile="$SPACECRAFT" outfile="results/ltcube_afterglow.fits" \
            dcostheta=0.025 binsz=1 clobber=yes chatter=4 || fail_stage "gtltcube" "gtltcube failed or timed out" 34
          stage "gtltcube" "OK"

          stage "gtexpcube2" "START"
          timeout 75m gtexpcube2 infile="results/ltcube_afterglow.fits" cmap=none outfile="results/bexpmap_afterglow.fits" irfs="$IRFS" evtype="$EVTYPE" \
            nxpix="$EXP_NXPIX" nypix="$EXP_NYPIX" binsz="$EXP_BINSZ" coordsys=CEL xref="$RA" yref="$DEC" axisrot=0 proj=AIT \
            ebinalg=LOG emin="$EMIN" emax="$EMAX" enumbins="$ENUMBINS" clobber=yes chatter=4 || fail_stage "gtexpcube2" "gtexpcube2 failed or timed out" 35
          stage "gtexpcube2" "OK"

          stage "gtsrcmaps" "START"
          timeout 180m gtsrcmaps scfile="$SPACECRAFT" expcube="results/ltcube_afterglow.fits" cmap="results/ccube_afterglow.fits" \
            srcmdl="$MODEL" bexpmap="results/bexpmap_afterglow.fits" outfile="results/srcmaps_afterglow.fits" irfs="$IRFS" evtype="$EVTYPE" \
            clobber=yes chatter=4 || fail_stage "gtsrcmaps" "gtsrcmaps failed or timed out" 36
          stage "gtsrcmaps" "OK"

          stage "gtlike" "START"
          set +e
          timeout 120m gtlike statistic=BINNED optimizer=NEWMINUIT \
            cmap="results/srcmaps_afterglow.fits" scfile="$SPACECRAFT" \
            expcube="results/ltcube_afterglow.fits" bexpmap="results/bexpmap_afterglow.fits" \
            srcmdl="$MODEL" sfile="results/fit_afterglow_output.xml" irfs="$IRFS" chatter=4 \
            > logs/gtlike_afterglow.log 2>&1
          GTLIKE_STATUS=$?
          set -e
          echo "$GTLIKE_STATUS" > results/GTLIKE_EXIT_STATUS.txt
          if [ "$GTLIKE_STATUS" -ne 0 ]; then
            python acirm_r17a/write_failure.py "gtlike" "gtlike failed or timed out with status $GTLIKE_STATUS" || true
            stage "gtlike" "FAIL"
            exit 37
          fi
          stage "gtlike" "OK"

          python acirm_r17a/parse_results.py || python acirm_r17a/write_failure.py "parse_results" "parse failed" || true
          stage "complete" "OK"
          BASH
          chmod +x acirm_r17a/run_inside_fermibottle.sh

          python -m py_compile acirm_r17a/write_failure.py acirm_r17a/parse_results.py acirm_r17a/package_results.py
          python - <<'PY'
          import xml.etree.ElementTree as ET
          ET.parse("results/R17B_MODEL_GRB221009A_LIMITED_NEARBY_4FGL_FROM_R15A_R2.xml")
          print("R17B_MODEL_XML_PARSE_OK")
          PY
          bash -n acirm_r17a/run_inside_fermibottle.sh

      - name: Pull FermiBottle image
        shell: bash
        run: |
          set -euo pipefail
          docker pull fssc/fermibottle:latest | tee logs/DOCKER_PULL.log
          docker image inspect fssc/fermibottle:latest > logs/DOCKER_IMAGE_INSPECT.json

      - name: Run R17B high energy 3GeV limited 4FGL TS inside FermiBottle
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p data results logs final_artifact pfiles
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$PWD":/work \
            -w /work \
            fssc/fermibottle:latest \
            -lc 'cd /work && echo CONTAINER_PWD=$(pwd) && ls -lah /work && ls -lah /work/acirm_r17a && bash /work/acirm_r17a/run_inside_fermibottle.sh' \
            > logs/DOCKER_RUN_STDOUT.log 2> logs/DOCKER_RUN_STDERR.log
          DOCKER_STATUS=$?
          echo "$DOCKER_STATUS" > results/DOCKER_EXIT_STATUS.txt
          sudo chown -R "$USER:$USER" "$PWD" || true
          echo "DOCKER_STATUS=$DOCKER_STATUS"
          exit 0

      - name: Package R17B results always
        if: always()
        shell: bash
        run: |
          set +e
          sudo chown -R "$USER:$USER" "$PWD" || true
          python3 acirm_r17a/package_results.py
          ls -lah final_artifact || true

      - name: Upload R17B artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17M_R17B_HIGH_ENERGY_3GEV_4FGL_STRESS_TS_FERMITOOLS_RESULTS
          path: final_artifact/
          if-no-files-found: warn
