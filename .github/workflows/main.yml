name: ACIRM R17K R9C R5 Old Chat Handoff Direct Axis Repair

on:
  workflow_dispatch:
    inputs:
      max_artifacts:
        required: false
        default: '160'
      max_download_mb:
        required: false
        default: '700'
      scan_limit_mb_per_file:
        required: false
        default: '10'

permissions:
  contents: read
  actions: read

jobs:
  r17k-r9c-r5-old-chat-handoff-direct-axis-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    env:
      MAX_ARTIFACTS: ${{ inputs.max_artifacts }}
      MAX_DOWNLOAD_MB: ${{ inputs.max_download_mb }}
      SCAN_LIMIT_MB_PER_FILE: ${{ inputs.scan_limit_mb_per_file }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout repo shallow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare and install tools
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R9C_R5_OUTPUTS logs scripts artifact_bank extracted_artifacts
          cat > ACIRM_R17K_R9C_R5_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R9C_R5_OLD_CHAT_HANDOFF_DIRECT_AXIS_REPAIR
          PURPOSE: recover missing minus14_direct and R9C anchor axes from old-chat handoff / light-result artifacts.
          USES PRIOR GITHUB ACTIONS ARTIFACTS AND COMMITTED FILES ONLY.
          NO LAT RERUN / NO SPI RERUN / NO NEW EVENT FIT.
          ACCEPTED CEILING IF FOUND: DIRECT_HANDOFF_LEDGER_SUPPORT / NOT_RAW_RECOMPUTATION.
          NOT_OFFICIAL_511_PROOF / NOT_PARTICLE_PROOF / NOT_SOURCE_ATTRIBUTION / NOT_ACIRM_PROOF.
          EOF
          printf 'MAX_ARTIFACTS=%s\nMAX_DOWNLOAD_MB=%s\nSCAN_LIMIT_MB_PER_FILE=%s\nGH_REPO=%s\n' "$MAX_ARTIFACTS" "$MAX_DOWNLOAD_MB" "$SCAN_LIMIT_MB_PER_FILE" "$GH_REPO" > ACIRM_R17K_R9C_R5_OUTPUTS/R17K_R9C_R5_INPUTS.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip ca-certificates python3 curl > logs/apt_install.log 2>&1

      - name: Download, extract, and repair old-chat handoff axes
        shell: bash
        run: |
          set +e
          cat > scripts/r9c_r5_old_chat_repair.py <<'PY'
          import csv, json, os, re, zipfile, hashlib, subprocess, urllib.request
          from pathlib import Path

          OUT = Path('ACIRM_R17K_R9C_R5_OUTPUTS')
          BANK = Path('artifact_bank')
          EXT = Path('extracted_artifacts')
          BANK.mkdir(exist_ok=True)
          EXT.mkdir(exist_ok=True)

          token = os.environ.get('GH_TOKEN', '')
          repo = os.environ.get('GH_REPO', '')
          max_art = int(os.environ.get('MAX_ARTIFACTS', '160'))
          cap = int(float(os.environ.get('MAX_DOWNLOAD_MB', '700')) * 1024 * 1024)
          scan_limit = int(float(os.environ.get('SCAN_LIMIT_MB_PER_FILE', '10')) * 1024 * 1024)

          artifact_re = re.compile(
              r'ACIRM|R21AX|R7G|R3P|R3B|R3C|R3D|R3E|R2G|R7E|R7F|R6G|R6H|R6I|R6M|'
              r'minus14|preparatory|shoulder|phase.?pair|FULL_MEMORY|WORKING_NOTES|TEXT_ONLY|HANDOFF|'
              r'THEORY_EQUATIONS|R9C|R10|R13M|R13|R16T|LAT|P5|plus21|SPI511|511',
              re.I,
          )
          target_old_names = [
              'ACIRM_R21AX_R7G_R3P_FULL_MEMORY_AND_WORKING_NOTES_AR.txt',
              'ACIRM_R21AX_R7G_R3P_TEXT_ONLY_HANDOFF_20260617.zip',
              'ACIRM_R21AX_R7G_R3P_COMPLETE_NEW_CHAT_HANDOFF_20260617.zip',
              'ACIRM_R21AX_R7G_R2G_LAT_INTERNAL_PROOF_LOCK_AND_SPI511_BRIDGE.zip',
              'ACIRM_R21AX_R7G_TO_NEW_CHAT_COMPLETE_HANDOFF_20260614_FULL_MEMORY_AND_WORKING_NOTES_AR.txt',
              'ACIRM_FULL_THEORY_EQUATIONS_RESULTS_TECHNICAL_CURRENT_20260618.tex',
              'ACIRM_FULL_MEMORY_WORKFLOW_NEXTCHAT_HANDOFF_CURRENT_20260618.tex',
              'ACIRM_R21AX_R7E_R3B_PHASE_PAIR_PREPARATORY_SHOULDER_PLUS21_RATE_EXCESS_REAUDIT_FROM_R7E_R3A_RESULTS.zip',
              'ACIRM_R13M_R9C_THEORY_R10_OPERATIONAL_LAW_AND_VALIDATION_PROTOCOL_PACKAGE.zip',
              'ACIRM_R10_THEORY_LAW_HANDOFF_PACKAGE.zip',
              'ACIRM_R10_FULL_EXPERIMENTAL_LEDGER_APPENDIX_PACKAGE.zip',
              'ACIRM_MULTI_GRAIN_RESONANCE_FINAL_WORKING_LAW_R9C.tex',
          ]
          old_name_re = re.compile('|'.join(re.escape(x) for x in target_old_names), re.I)
          accepted = []
          rejected = []
          allhits = []
          manifest = []
          extracted = []
          errors = []

          def safe(s):
              return re.sub(r'[^A-Za-z0-9._-]+', '_', str(s))[:190]

          def wcsv(path, rows):
              keys = []
              for row in rows:
                  for key in row:
                      if key not in keys:
                          keys.append(key)
              if not keys:
                  keys = ['empty']
              with open(path, 'w', newline='', encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=keys)
                  writer.writeheader()
                  writer.writerows(rows)

          def api_json(url):
              req = urllib.request.Request(
                  url,
                  headers={
                      'Authorization': 'Bearer ' + token,
                      'Accept': 'application/vnd.github+json',
                      'X-GitHub-Api-Version': '2022-11-28',
                      'User-Agent': 'ACIRM-R9C-R5/1.0',
                  },
              )
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode('utf-8', 'replace'))

          downloaded = 0
          total = 0
          candidates = 0
          try:
              for page in range(1, 21):
                  if downloaded >= max_art or total >= cap:
                      break
                  js = api_json(f'https://api.github.com/repos/{repo}/actions/artifacts?per_page=100&page={page}')
                  artifacts = js.get('artifacts', [])
                  if not artifacts:
                      break
                  for artifact in artifacts:
                      if downloaded >= max_art or total >= cap:
                          break
                      name = artifact.get('name', '') or ''
                      if artifact.get('expired') or not artifact_re.search(name):
                          continue
                      candidates += 1
                      size = int(artifact.get('size_in_bytes') or 0)
                      dest = BANK / (safe(name) + '__artifact_' + str(artifact.get('id')) + '.zip')
                      row = {
                          'artifact_id': artifact.get('id'),
                          'name': name,
                          'size_in_bytes': size,
                          'created_at': artifact.get('created_at'),
                          'path': str(dest),
                      }
                      if total + size > cap:
                          row['status'] = 'SKIP_SIZE_CAP'
                          manifest.append(row)
                          continue
                      cmd = [
                          'curl', '-fL', '--retry', '2', '--retry-delay', '2',
                          '-H', 'Authorization: Bearer ' + token,
                          '-H', 'Accept: application/vnd.github+json',
                          '-H', 'X-GitHub-Api-Version: 2022-11-28',
                          artifact.get('archive_download_url', ''), '-o', str(dest),
                      ]
                      cp = subprocess.run(cmd, stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=120)
                      if cp.returncode == 0:
                          try:
                              with zipfile.ZipFile(dest) as zf:
                                  bad = zf.testzip()
                              if bad:
                                  raise RuntimeError('bad member ' + str(bad))
                              nbytes = dest.stat().st_size
                              total += nbytes
                              downloaded += 1
                              row.update({'status': 'OK', 'downloaded_bytes': nbytes})
                          except Exception as exc:
                              dest.unlink(missing_ok=True)
                              row.update({'status': 'ZIP_FAIL', 'error': repr(exc)[:260]})
                              errors.append(row.copy())
                      else:
                          dest.unlink(missing_ok=True)
                          row.update({'status': 'DOWNLOAD_FAIL', 'error': (cp.stderr or cp.stdout)[-260:]})
                          errors.append(row.copy())
                      manifest.append(row)
          except Exception as exc:
              errors.append({'stage': 'artifact_list_or_download', 'error': repr(exc)[:700]})

          for zpath in Path('.').glob('**/*ACIRM*.zip'):
              if 'artifact_bank' in zpath.parts or 'extracted_artifacts' in zpath.parts:
                  continue
              try:
                  dest = BANK / ('COMMITTED_' + safe(zpath.name))
                  dest.write_bytes(zpath.read_bytes())
              except Exception as exc:
                  errors.append({'stage': 'copy_committed_zip', 'path': str(zpath), 'error': repr(exc)[:260]})

          def extract_zip(zpath, dest, depth=0):
              if depth > 5:
                  return
              try:
                  with zipfile.ZipFile(zpath) as zf:
                      bad = zf.testzip()
                      if bad:
                          errors.append({'stage': 'zip_test', 'zip': str(zpath), 'bad': bad})
                      for member in zf.infolist()[:6000]:
                          if member.is_dir() or member.file_size > 80 * 1024 * 1024:
                              continue
                          if '..' in Path(member.filename).parts:
                              continue
                          out = dest / safe(member.filename.replace('/', '__'))
                          out.parent.mkdir(parents=True, exist_ok=True)
                          try:
                              out.write_bytes(zf.read(member))
                              extracted.append({
                                  'zip': str(zpath),
                                  'member': member.filename,
                                  'size': member.file_size,
                                  'path': str(out),
                              })
                              if out.suffix.lower() == '.zip':
                                  nested = dest / (out.stem + '_unzipped')
                                  nested.mkdir(exist_ok=True)
                                  extract_zip(out, nested, depth + 1)
                          except Exception as exc:
                              errors.append({'stage': 'member_extract', 'zip': str(zpath), 'member': member.filename, 'error': repr(exc)[:260]})
              except Exception as exc:
                  errors.append({'stage': 'zip_extract', 'zip': str(zpath), 'error': repr(exc)[:260]})

          for zpath in sorted(BANK.glob('*.zip')):
              dest = EXT / safe(zpath.stem)
              dest.mkdir(exist_ok=True)
              extract_zip(zpath, dest, 0)

          allowed_suffix = {'.txt', '.md', '.json', '.csv', '.log', '.yml', '.yaml', '.tex'}
          hard_meta_bad = [
              'r9b_', 'r9c_r1', 'r9c_r2', 'r9c_r3', 'r9c_r4', 'locator', 'purifier',
              'download_manifest', 'extracted_file_manifest', 'file_sizes', 'inventory',
              'df_end', 'free_end', 'apt_', 'pip_', 'curl', 'unzip_test', 'scan_errors', '_errors',
          ]
          preferred_terms = [
              'handoff', 'full_memory', 'working_notes', 'theory_equations', 'text_only', 'decision',
              'summary', 'ledger', 'report', 'audit', 'metrics', 'results', 'law', 'r10', 'r9c',
          ]

          def source_quality(path):
              plower = str(path).lower()
              if any(t in plower for t in hard_meta_bad):
                  return 'META_REJECT'
              if old_name_re.search(str(path)):
                  return 'OLD_CHAT_TARGET_NAME'
              if any(t in plower for t in preferred_terms):
                  return 'HANDOFF_OR_LEDGER'
              return 'GENERAL_TEXT'

          def snippet(text, terms):
              lower = text.lower()
              out = []
              for term in terms:
                  idx = lower.find(term.lower())
                  if idx >= 0:
                      out.append(text[max(0, idx - 240):min(len(text), idx + 520)].replace('\n', ' ')[:800])
              return ' || '.join(out[:6])

          minus_strict_terms = [
              'minus14', 'minus 14', 'phase-pair', 'phase pair', 'preparatory shoulder',
              'preparatory', 'shoulder', 'positive_ts_count', 'controls = 0/12', '0/12',
              'rate_ratio', '2.881769', 'internal specificity', 'layer2c_final',
              'R21AX_R7E_R3E_FINAL_INTERNAL_LEDGER_PROOF'.lower(),
              'R21AX_R7F_INTEGRATED_P1_P6_SYNTHESIS'.lower(),
              'R2G_LAT_INTERNAL_PROOF_LOCK'.lower(),
          ]
          minus_path_terms = [
              'r21ax', 'r7g', 'r3p', 'r2g', 'r3b', 'r3c', 'r3d', 'r3e', 'r7e', 'r7f',
              'r6g', 'r6h', 'r6i', 'r6m', 'text_only', 'full_memory', 'working_notes',
          ]
          r9c_strict_terms = [
              'f_r9c', '2239.664', '2239', 'packet_n', 'm_eff', 'f_raw', 'z1^2',
              '30.248912', 'cyg x-1', 'cygx-1', 'cygnus', 'r10 operational law',
              'multi grain resonance', 'ACIRM_R13M_R9C_THEORY_R10_OPERATIONAL_LAW'.lower(),
          ]
          r9c_path_terms = ['r9c', 'r10', 'r13m', 'theory', 'law', 'handoff', 'multi_grain']
          alignment_terms = ['photon alignment', 'photon_alignment', 'phase alignment', 'packet_n', 'rayleigh', 'z2', 'z1^2']
          ceiling_terms = ['not_proof', 'not_discovery', 'not_source_attribution', 'not_particle_proof', 'not_acirm_proof', 'exploratory']

          def classify(path, text):
              lower = text.lower()
              plower = str(path).lower()
              q = source_quality(path)
              axes = []
              reasons = []

              minus_path = any(t in plower for t in minus_path_terms) or old_name_re.search(str(path)) is not None
              minus_content = any(t.lower() in lower for t in minus_strict_terms)
              minus_metric = any(t in lower for t in ['ts', 'rank', 'control', 'ledger', 'decision', 'audit', 'summary', 'rate', 'ratio', 'p_value', 'p-value', 'poisson'])
              if q != 'META_REJECT' and minus_path and minus_content and minus_metric:
                  axes.append('minus14_direct_handoff')
                  reasons.append('old-chat/R21AX handoff or ledger supports minus14/preparatory axis')

              light_r7g = re.search(r'r21ax.*r7g.*r3[bcde]|r21ax.*r7g.*r3p.*r2g', plower) is not None
              if q != 'META_REJECT' and light_r7g and any(t in lower for t in ['summary', 'final_status', 'scientific_status', 'not_proof', 'ledger', 'r21ax']):
                  axes.append('minus14_light_handoff_index')
                  reasons.append('R21AX R7G/R3B-R3E/R2G light-result artifact is present as handoff-index support only')

              r9c_path = any(t in plower for t in r9c_path_terms) or old_name_re.search(str(path)) is not None
              r9c_content = ('r9c' in lower) and any(t.lower() in lower for t in r9c_strict_terms)
              if q != 'META_REJECT' and r9c_path and r9c_content:
                  axes.append('r9c_anchor_direct_handoff')
                  reasons.append('R9C/R10 direct handoff/law file contains f_R9C/frequency/packet/source-anchor metadata')

              if q != 'META_REJECT' and any(t in lower for t in alignment_terms) and (r9c_content or 'alignment' in lower):
                  axes.append('photon_alignment_handoff')
                  reasons.append('alignment/phase metric language appears in accepted handoff source')

              if any(t in lower for t in ceiling_terms):
                  axes.append('claim_ceiling')
                  reasons.append('explicit claim ceiling')
              return sorted(set(axes)), '; '.join(sorted(set(reasons))), q

          terms_for_snippet = [
              'minus14', 'minus 14', '-14', 'preparatory shoulder', 'phase-pair', 'positive_ts_count',
              'controls = 0/12', '2.881769', 'R21AX_R7E_R3E', 'R21AX_R7F', 'R2G', 'LAYER2C_FINAL',
              'R9C', 'f_R9C', '2239.664', 'packet_N', 'Z1^2', '30.248912', 'Cyg X-1', 'NOT_PROOF',
          ]

          for path in EXT.rglob('*'):
              if not path.is_file() or path.suffix.lower() not in allowed_suffix:
                  continue
              try:
                  if path.stat().st_size > scan_limit:
                      continue
                  text = path.read_text(encoding='utf-8', errors='replace')
                  axes, reasons, quality = classify(path, text)
                  if not axes:
                      continue
                  non_ceiling = [a for a in axes if a != 'claim_ceiling']
                  score = 35 * len(non_ceiling)
                  if quality == 'OLD_CHAT_TARGET_NAME':
                      score += 45
                  elif quality == 'HANDOFF_OR_LEDGER':
                      score += 25
                  elif quality == 'GENERAL_TEXT':
                      score += 5
                  else:
                      score -= 60
                  row = {
                      'path': str(path),
                      'size': path.stat().st_size,
                      'quality': quality,
                      'axes': ';'.join(axes),
                      'score': score,
                      'reasons': reasons,
                      'snippet': snippet(text, terms_for_snippet),
                  }
                  allhits.append(row)
                  if quality == 'META_REJECT' and non_ceiling:
                      rejected.append({**row, 'reject_reason': 'R9B/R9C/meta/log/inventory cannot repair direct axes'})
                  else:
                      accepted.append(row)
              except Exception as exc:
                  errors.append({'stage': 'scan', 'path': str(path), 'error': repr(exc)[:300]})

          accepted = sorted(accepted, key=lambda r: (r['quality'] == 'OLD_CHAT_TARGET_NAME', r['quality'] == 'HANDOFF_OR_LEDGER', r['score']), reverse=True)
          rejected = sorted(rejected, key=lambda r: r['score'], reverse=True)
          allhits = sorted(allhits, key=lambda r: r['score'], reverse=True)

          def rows(axis):
              return [r for r in accepted if axis in r.get('axes', '').split(';')]

          def present(axis):
              return bool(rows(axis))

          minus_direct = present('minus14_direct_handoff')
          minus_light = present('minus14_light_handoff_index')
          r9c_anchor = present('r9c_anchor_direct_handoff')
          alignment = present('photon_alignment_handoff')
          ceiling = present('claim_ceiling')

          gates = [
              {'gate_id': 'G0_ARTIFACT_EXTRACTION', 'status': 'PASS' if extracted else 'MISS', 'detail': f'extracted_file_count={len(extracted)}'},
              {'gate_id': 'G1_MINUS14_DIRECT_OLD_CHAT_HANDOFF', 'status': 'PASS' if minus_direct else 'MISS', 'detail': 'requires old-chat/full-memory/R21AX ledger text with minus14/preparatory metrics'},
              {'gate_id': 'G1B_MINUS14_LIGHT_HANDOFF_INDEX', 'status': 'PASS' if minus_light else 'MISS', 'detail': 'light-result artifact index only; not raw recomputation'},
              {'gate_id': 'G2_R9C_ANCHOR_DIRECT_HANDOFF', 'status': 'PASS' if r9c_anchor else 'MISS', 'detail': 'requires R9C/R10/f_R9C/2239.664/packet metadata'},
              {'gate_id': 'G3_PHOTON_ALIGNMENT_HANDOFF', 'status': 'PASS' if alignment else 'MISS', 'detail': 'supporting handoff-level alignment language'},
              {'gate_id': 'G4_CLAIM_CEILING_PRESENT', 'status': 'PASS' if ceiling else 'MISS', 'detail': 'not-proof/exploratory ceiling'},
              {'gate_id': 'G5_SOURCE_ATTRIBUTION_ALLOWED', 'status': 'BLOCKED', 'detail': 'forbidden'},
              {'gate_id': 'G6_PARTICLE_PROOF_ALLOWED', 'status': 'BLOCKED', 'detail': 'forbidden'},
          ]
          if minus_direct and r9c_anchor:
              decision = 'R17K_R9C_R5_OLD_CHAT_DIRECT_HANDOFF_AXES_REPAIRED_READY_FOR_R9D_LOW_CEILING_NOT_PROOF'
              next_step = 'R9D_LOW_CEILING_TRACE_NARRATIVE_AND_GAP_AUDIT_FROM_DIRECT_HANDOFF_LEDGER_SUPPORT'
              ready = True
          elif minus_light and r9c_anchor and not minus_direct:
              decision = 'R17K_R9C_R5_R9C_ANCHOR_FOUND_MINUS14_LIGHT_INDEX_ONLY_NEEDS_OLD_CHAT_TEXT_HANDOFF_NOT_PROOF'
              next_step = 'LOCATE_FULL_MEMORY_OR_TEXT_ONLY_MINUS14_HANDOFF_FILE'
              ready = False
          elif r9c_anchor and not minus_direct:
              decision = 'R17K_R9C_R5_R9C_ANCHOR_REPAIRED_MINUS14_DIRECT_HANDOFF_STILL_MISSING_NOT_PROOF'
              next_step = 'LOCATE_R21AX_R7G_R3P_TEXT_ONLY_OR_R7E_R3B_HANDOFF'
              ready = False
          elif minus_direct and not r9c_anchor:
              decision = 'R17K_R9C_R5_MINUS14_HANDOFF_REPAIRED_R9C_ANCHOR_STILL_MISSING_NOT_PROOF'
              next_step = 'LOCATE_R9C_R10_HANDOFF_OR_COMMIT_AVAILABLE_R10_PACKAGE'
              ready = False
          else:
              decision = 'R17K_R9C_R5_OLD_CHAT_DIRECT_HANDOFF_AXES_NOT_FOUND_MANUAL_UPLOAD_REQUIRED_NOT_PROOF'
              next_step = 'UPLOAD_OR_COMMIT_OLD_CHAT_HANDOFF_FILES_LISTED_IN_R9C_R5_MISSING_FILES'
              ready = False

          axis_rows = []
          for axis in ['minus14_direct_handoff', 'minus14_light_handoff_index', 'r9c_anchor_direct_handoff', 'photon_alignment_handoff', 'claim_ceiling']:
              for row in rows(axis)[:15]:
                  axis_rows.append({'axis': axis, **row})

          missing_files = []
          if not minus_direct:
              for name in target_old_names[:8]:
                  missing_files.append({'needed_for': 'minus14_direct_handoff', 'filename': name})
          if not r9c_anchor:
              for name in target_old_names[8:]:
                  missing_files.append({'needed_for': 'r9c_anchor_direct_handoff', 'filename': name})

          ledger = [
              {'trace_order': 0, 'stage': 'minus14_old_chat_direct_handoff', 'status': 'PASS' if minus_direct else ('INDEX_ONLY' if minus_light else 'MISS'), 'claim_ceiling': 'DIRECT_HANDOFF_LEDGER_SUPPORT_NOT_RAW_RECOMPUTATION'},
              {'trace_order': 1, 'stage': 'r9c_anchor_direct_handoff', 'status': 'PASS' if r9c_anchor else 'MISS', 'claim_ceiling': 'R9C_R10_HANDOFF_SUPPORT_NOT_SOURCE_ATTRIBUTION'},
              {'trace_order': 2, 'stage': 'alignment_handoff_support', 'status': 'PASS' if alignment else 'MISS', 'claim_ceiling': 'HANDOFF_SUPPORT_ONLY'},
              {'trace_order': 3, 'stage': 'r9d_permission', 'status': 'READY_LOW_CEILING' if ready else 'BLOCKED_OR_PARTIAL', 'claim_ceiling': 'NOT_PROOF_NOT_ATTRIBUTION'},
          ]

          wcsv(OUT / 'R17K_R9C_R5_ARTIFACT_DOWNLOAD_MANIFEST.csv', manifest)
          wcsv(OUT / 'R17K_R9C_R5_EXTRACTED_FILE_MANIFEST.csv', extracted)
          wcsv(OUT / 'R17K_R9C_R5_ACCEPTED_OLD_CHAT_DIRECT_EVIDENCE.csv', accepted)
          wcsv(OUT / 'R17K_R9C_R5_REJECTED_META_CANDIDATES.csv', rejected[:800])
          wcsv(OUT / 'R17K_R9C_R5_AXIS_EVIDENCE_TOP.csv', axis_rows)
          wcsv(OUT / 'R17K_R9C_R5_GATES.csv', gates)
          wcsv(OUT / 'R17K_R9C_R5_ALL_HITS.csv', allhits[:1200])
          wcsv(OUT / 'R17K_R9C_R5_MISSING_FILES_IF_ANY.csv', missing_files)
          wcsv(OUT / 'R17K_R9C_R5_TRACE_LEDGER.csv', ledger)
          (OUT / 'R17K_R9C_R5_SCAN_ERRORS.json').write_text(json.dumps(errors, indent=2), encoding='utf-8')
          (OUT / 'R17K_R9C_R5_ARTIFACT_DOWNLOAD_SUMMARY.json').write_text(json.dumps({
              'downloaded_artifact_count': downloaded,
              'downloaded_bytes': total,
              'candidate_count_seen': candidates,
              'error_count': len([e for e in errors if str(e.get('stage', '')).startswith('artifact')]),
              'method': 'github_api_plus_curl_L_deep_old_chat_handoff_search',
          }, indent=2), encoding='utf-8')
          report = (
              '# ACIRM R17K R9C R5 Old Chat Handoff Direct Axis Repair\n\n'
              f'الحكم: {decision}\n\n'
