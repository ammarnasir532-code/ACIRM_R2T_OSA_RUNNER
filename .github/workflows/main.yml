name: ACIRM R2Y robust single SWG DAL smoke test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r2y-robust-single-swg-dal-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R2Y_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R2Y_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS

      - name: System diagnostics
        run: |
          {
            echo "ACIRM R2Y robust single SWG download and init-only DAL smoke test"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=ROBUST_SINGLE_SWG_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY"
            echo ""
            echo "System:"
            uname -a || true
            echo ""
            echo "Disk:"
            df -h || true
            echo ""
            echo "Memory:"
            free -h || true
            echo ""
            echo "DNS HEASARC:"
            getent hosts heasarc.gsfc.nasa.gov || true
            echo ""
            echo "HEASARC IPv4 HTTPS probe:"
            curl -4 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
            echo ""
            echo "HEASARC IPv4 HTTP probe:"
            curl -4 -I -L --connect-timeout 30 --max-time 90 http://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R2Y_RESULTS/logs/system_diagnostics.log

      - name: Pull OSA Docker image
        continue-on-error: true
        run: |
          {
            echo "Docker version:"
            docker --version || true
            docker info || true
            echo ""
            echo "Pull integralsw/osa:latest"
            docker pull integralsw/osa:latest || true
          } | tee ACIRM_R21AX_R7G_R2Y_RESULTS/logs/docker_pull.log

      - name: Inspect OSA environment briefly
        continue-on-error: true
        run: |
          {
            docker run --rm integralsw/osa:latest bash -lc '
              set +e
              echo "inside container"
              uname -a || true
              echo ""
              echo "OSA binaries:"
              ls -l /opt/osa/bin/og_create /opt/osa/bin/spi_science_analysis /opt/osa/bin/dal_verify /opt/osa/bin/fkeyprint || true
              echo ""
              echo "OSA init:"
              ls -l /opt/osa/bin/isdc_init_env.sh || true
              echo ""
              echo "OSA pfiles:"
              ls -ld /opt/osa/pfiles || true
              find /opt/osa/pfiles -maxdepth 1 -type f -name "*.par" 2>/dev/null | wc -l || true
            '
          } | tee ACIRM_R21AX_R7G_R2Y_RESULTS/logs/osa_brief_scan.log

      - name: Robust download single swg.fits only
        run: |
          python3 - <<'PY'
          import csv
          import hashlib
          import json
          import os
          import shutil
          import subprocess
          import time
          import urllib.request
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R2Y_ROBUST_SINGLE_SWG_DOWNLOAD_AND_INIT_ONLY_DAL_SMOKE_LIGHT"

          out = Path("ACIRM_R21AX_R7G_R2Y_RESULTS")
          data = out / "data"
          logs = out / "logs"
          data.mkdir(parents=True, exist_ok=True)
          logs.mkdir(parents=True, exist_ok=True)

          rev = "2504"
          scw = "250400090010"
          product = "swg.fits"

          dest = data / "scw" / rev / f"{scw}.001" / product
          dest.parent.mkdir(parents=True, exist_ok=True)

          urls = [
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{rev}/{scw}.001/{product}",
              f"http://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{rev}/{scw}.001/{product}",
              f"ftp://heasarc.gsfc.nasa.gov/integral/data/scw/{rev}/{scw}.001/{product}",
          ]

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def accept_file(path):
              if not path.exists():
                  return False, "missing"
              size = path.stat().st_size
              if size <= 0:
                  return False, "empty"
              if size < 1024:
                  return False, f"too_small_{size}"
              return True, "ok"

          def run_cmd(cmd, tmp):
              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              ok, reason = accept_file(tmp)
              return p.returncode, ok, reason, p.stdout[-5000:]

          attempts = []

          methods = []

          for url in urls:
              methods.append(("curl_ipv4", [
                  "curl", "-4", "-L",
                  "--retry", "8",
                  "--retry-delay", "15",
                  "--connect-timeout", "90",
                  "--max-time", "1200",
                  "--fail",
                  "-o", "{tmp}",
                  url,
              ]))

          for url in urls[:2]:
              methods.append(("wget_ipv4", [
                  "wget", "-4",
                  "--tries=8",
                  "--waitretry=15",
                  "--timeout=90",
                  "-O", "{tmp}",
                  url,
              ]))

          success = False

          for idx, (method, cmd_template) in enumerate(methods, start=1):
              tmp = Path(str(dest) + f".{method}.{idx}.part")
              if tmp.exists():
                  tmp.unlink()

              cmd = [str(x).replace("{tmp}", str(tmp)) for x in cmd_template]

              row = {
                  "attempt": idx,
                  "method": method,
                  "url": cmd[-1] if method.startswith("wget") else cmd[-1] if cmd[-2] != "-o" else cmd[-1],
                  "tmp": str(tmp),
                  "returncode": "",
                  "ok": False,
                  "reason": "",
                  "bytes": 0,
                  "sha256": "",
                  "log_tail": "",
              }

              print(f"Attempt {idx}: {method}")
              try:
                  rc, ok, reason, log_tail = run_cmd(cmd, tmp)
                  row["returncode"] = rc
                  row["ok"] = ok
                  row["reason"] = reason
                  row["log_tail"] = log_tail

                  if tmp.exists():
                      row["bytes"] = tmp.stat().st_size

                  if ok:
                      if dest.exists():
                          dest.unlink()
                      tmp.rename(dest)
                      row["bytes"] = dest.stat().st_size
                      row["sha256"] = sha256_file(dest)
                      success = True
                      attempts.append(row)
                      print("SUCCESS", row)
                      break
                  else:
                      print("FAILED", row)
              except Exception as e:
                  row["reason"] = repr(e)
                  print("ERROR", row)

              attempts.append(row)

          if not success:
              tmp = Path(str(dest) + ".urllib.part")
              if tmp.exists():
                  tmp.unlink()

              for idx2, url in enumerate(urls[:2], start=len(attempts) + 1):
                  row = {
                      "attempt": idx2,
                      "method": "urllib",
                      "url": url,
                      "tmp": str(tmp),
                      "returncode": "",
                      "ok": False,
                      "reason": "",
                      "bytes": 0,
                      "sha256": "",
                      "log_tail": "",
                  }

                  print(f"Attempt {idx2}: urllib")
                  try:
                      req = urllib.request.Request(url, headers={"User-Agent": "ACIRM-R2Y-GitHubActions"})
                      with urllib.request.urlopen(req, timeout=1200) as r, open(tmp, "wb") as f:
                          shutil.copyfileobj(r, f)

                      ok, reason = accept_file(tmp)
                      row["ok"] = ok
                      row["reason"] = reason

                      if tmp.exists():
                          row["bytes"] = tmp.stat().st_size

                      if ok:
                          if dest.exists():
                              dest.unlink()
                          tmp.rename(dest)
                          row["bytes"] = dest.stat().st_size
                          row["sha256"] = sha256_file(dest)
                          success = True
                          attempts.append(row)
                          print("SUCCESS", row)
                          break
                      else:
                          print("FAILED", row)
                  except Exception as e:
                      row["reason"] = repr(e)
                      print("ERROR", row)

                  attempts.append(row)

          manifest_path = out / "r2y_single_swg_download_attempts.csv"
          with open(manifest_path, "w", newline="", encoding="utf-8") as f:
              fieldnames = ["attempt", "method", "url", "tmp", "returncode", "ok", "reason", "bytes", "sha256", "log_tail"]
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(attempts)

          final_exists = dest.exists()
          final_size = dest.stat().st_size if final_exists else 0
          final_sha = sha256_file(dest) if final_exists and final_size > 0 else ""

          summary = {
              "run_id": RUN_ID,
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "ROBUST_SINGLE_SWG_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY",
              "scw": scw,
              "product": product,
              "download_success": success,
              "download_attempt_count": len(attempts),
              "final_path": str(dest),
              "final_bytes": final_size,
              "final_sha256": final_sha,
              "final_status": (
                  "R21AX_R7G_R2Y_SINGLE_SWG_DOWNLOAD_OK_READY_FOR_DAL_SMOKE_NO_511_YET"
                  if success
                  else "R21AX_R7G_R2Y_SINGLE_SWG_DOWNLOAD_FAILED_NO_PHYSICAL_NULL"
              ),
          }

          with open(out / "R2Y_SINGLE_SWG_DOWNLOAD_SUMMARY.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2, sort_keys=True)

          print(json.dumps(summary, indent=2))
          PY

      - name: Run init-only explicit PFILES DAL smoke test on swg.fits
        continue-on-error: true
        run: |
          {
            echo "Run R2Y DAL smoke test"
            docker run --rm \
              -v "$PWD/ACIRM_R21AX_R7G_R2Y_RESULTS/data:/data" \
              -v "$PWD/ACIRM_R21AX_R7G_R2Y_RESULTS/logs:/logs" \
              integralsw/osa:latest bash -lc '
                set +e

                echo "inside container"
                uname -a || true
                echo ""

                mkdir -p /tmp/acirm_pfiles
                mkdir -p /tmp/acirm_work
                mkdir -p /tmp/acirm_rep

                cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                if [ -d /opt/osa/lib ]; then
                  export LD_LIBRARY_PATH=/opt/osa/lib:${LD_LIBRARY_PATH:-}
                fi

                if [ -d /opt/osa/lib64 ]; then
                  export LD_LIBRARY_PATH=/opt/osa/lib64:${LD_LIBRARY_PATH:-}
                fi

                echo "source only isdc_init_env.sh"
                source /opt/osa/bin/isdc_init_env.sh || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                echo ""
                echo "environment after init-only repair"
                env | sort | grep -E "^(ISDC|OSA|REP|PFILES|PATH|LD_LIBRARY_PATH|COMMONLOGFILE|HEADAS|CFITSIO)" || true
                echo ""

                echo "command visibility"
                for c in dal_verify fkeyprint og_create spi_science_analysis plist pquery; do
                  echo "--- $c ---"
                  command -v "$c" || true
                  which "$c" || true
                done
                echo ""

                echo "mounted files"
                find /data -maxdepth 6 -type f -printf "%p %s\n" | sort || true
                echo ""

                TARGET=/data/scw/2504/250400090010.001/swg.fits

                echo "target file check"
                ls -l "$TARGET" || true
                echo ""

                echo "fkeyprint swg.fits"
                timeout 90 fkeyprint "$TARGET" 2>&1 | head -200 || true
                echo ""

                echo "dal_verify swg.fits"
                timeout 180 dal_verify "$TARGET" 2>&1 | head -320 || true
                echo ""

                echo "plist og_create"
                timeout 60 plist og_create 2>&1 | head -180 || true
                echo ""

                echo "og_create no-argument parameter probe"
                timeout 90 og_create 2>&1 | head -260 || true
                echo ""

                echo "spi_science_analysis no-argument parameter probe"
                timeout 90 spi_science_analysis 2>&1 | head -260 || true
                echo ""

                echo "commonlog tail"
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -260 || true
              '
          } | tee ACIRM_R21AX_R7G_R2Y_RESULTS/logs/r2y_init_only_dal_smoke_test.log

      - name: Analyze R2Y logs
        run: |
          python3 - <<'PY'
          import csv
          import json
          import time
          from pathlib import Path

          out = Path("ACIRM_R21AX_R7G_R2Y_RESULTS")
          log_path = out / "logs" / "r2y_init_only_dal_smoke_test.log"
          txt = log_path.read_text(errors="replace") if log_path.exists() else ""

          dl_summary_path = out / "R2Y_SINGLE_SWG_DOWNLOAD_SUMMARY.json"
          if dl_summary_path.exists():
              dl = json.loads(dl_summary_path.read_text(encoding="utf-8"))
          else:
              dl = {}

          checks = {
              "download_success": bool(dl.get("download_success", False)),
              "download_final_bytes": dl.get("final_bytes", 0),
              "download_final_sha256_present": bool(dl.get("final_sha256", "")),
              "log_exists": log_path.exists(),
              "isdc_init_attempted": "source only isdc_init_env.sh" in txt,
              "isdc_env_set_seen": "ISDC_ENV=/opt/osa" in txt,
              "pfiles_explicit_seen": "PFILES=/tmp/acirm_pfiles;/opt/osa/pfiles" in txt,
              "target_file_check_invoked": "target file check" in txt,
              "target_file_listed": "/data/scw/2504/250400090010.001/swg.fits" in txt,
              "fkeyprint_invoked": "fkeyprint swg.fits" in txt,
              "dal_verify_invoked": "dal_verify swg.fits" in txt,
              "og_create_probe_invoked": "og_create no-argument parameter probe" in txt,
              "spi_science_analysis_probe_invoked": "spi_science_analysis no-argument parameter probe" in txt,
              "isdc_env_missing_seen": "ISDC_ENV is not set" in txt or "env. variable ISDC_ENV is not set" in txt,
              "parameter_init_error_seen": "Parameter initialization error" in txt or "status -3003" in txt,
              "dal_file_not_accessible_seen": "DAL_FILE_NOT_ACCESSIBLE" in txt or "status -2004" in txt,
          }

          if checks["download_success"] and checks["dal_verify_invoked"] and not checks["dal_file_not_accessible_seen"] and not checks["isdc_env_missing_seen"]:
              status = "R21AX_R7G_R2Y_SINGLE_SWG_DAL_SMOKE_REACHED_FILE_AND_OSA_LAYER_NO_511_YET_REVIEW_REQUIRED"
          elif not checks["download_success"]:
              status = "R21AX_R7G_R2Y_SINGLE_SWG_DOWNLOAD_FAILED_NO_PHYSICAL_NULL"
          elif checks["dal_file_not_accessible_seen"]:
              status = "R21AX_R7G_R2Y_DOWNLOAD_OK_BUT_DAL_FILE_ACCESS_LAYER_FAILED_NO_511_NO_PHYSICAL_NULL"
          elif checks["isdc_env_missing_seen"] or checks["parameter_init_error_seen"]:
              status = "R21AX_R7G_R2Y_ENV_OR_PARAMETER_LAYER_STILL_INCOMPLETE_NO_511_NO_PHYSICAL_NULL"
          else:
              status = "R21AX_R7G_R2Y_LOGS_READY_FOR_AUDIT_NO_511_NO_PHYSICAL_NULL"

          summary = {
              "run_id": "ACIRM_R21AX_R7G_R2Y_ROBUST_SINGLE_SWG_DOWNLOAD_AND_INIT_ONLY_DAL_SMOKE_LIGHT",
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "ROBUST_SINGLE_SWG_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY",
              "checks": checks,
              "final_status": status,
          }

          with open(out / "R2Y_SMOKE_TEST_SUMMARY.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2, sort_keys=True)

          with open(out / "r2y_checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          print(json.dumps(summary, indent=2))
          PY

      - name: Build LIGHT audit package only
        run: |
          mkdir -p ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/logs

          cp -r ACIRM_R21AX_R7G_R2Y_RESULTS/logs/* ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R2Y_RESULTS/*.json ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/ || true
          cp ACIRM_R21AX_R7G_R2Y_RESULTS/*.csv ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/ || true

          echo "Only one swg.fits file was downloaded temporarily on the GitHub runner." > ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "The FITS file is excluded from this phone artifact." >> ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "No 511 keV metric is computed here." >> ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt

          du -h ACIRM_R21AX_R7G_R2Y_RESULTS/data > ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/data_size_report.txt || true
          find ACIRM_R21AX_R7G_R2Y_RESULTS/data -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/data_file_list.csv || true

          cat > ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/R2Y_CLAIM_BOUNDARY.txt <<'EOF'
          ACIRM R2Y claim boundary:
          - Robust single swg.fits download and init-only DAL smoke test only.
          - No 511 keV metric is computed.
          - Not full OSA proof.
          - Not 511 keV discovery.
          - Any network/runtime failure is not a physical null.
          EOF

          cat > ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS/R2Y_NEXT_STEP.txt <<'EOF'
          Upload ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS.zip to ChatGPT.
          Do not upload heavy FITS data.
          Next step depends on whether dal_verify reached the file/DAL layer cleanly.
          EOF

          zip -r ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS.zip ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS
          sha256sum ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS.zip > ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R2Y LIGHT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R2Y_LIGHT_RESULTS.zip.sha256.txt
