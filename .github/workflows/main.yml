name: ACIRM R17K R8P Calibration Resolved Raw SPI511 Audit

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  r17k-r8p-calibrated-raw-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Prepare
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R8P_OUTPUTS logs scripts repo/scw/2504 repo/ic repo/idx repo/cat repo/aux
          cat > scw_ids.list <<'EOF'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          EOF
          sed -i 's/^ *//' scw_ids.list
          cp scw_ids.list ACIRM_R17K_R8P_OUTPUTS/LOCKED_SCW_IDS.txt
          cat > ACIRM_R17K_R8P_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT
          EXISTING_LOCKED_CACHE_ONLY
          READS spi_spectra.fits.gz DIRECTLY
          USES SPI CHAN_KEV / KEV_CHAN CALIBRATION COEFFICIENTS
          NO spi_science_analysis GUI
          DIAGNOSTIC_NOT_PROOF
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF
          EOF

      - name: Restore SCW cache
        id: restore-scw
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/scw/2504
            repo/.scw_complete_R17K_R8C
          key: acirm-r17k-r8c-scw-2504-locked8-v1

      - name: Restore calibration tree cache
        id: restore-tree
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1

      - name: Cache guard
        shell: bash
        run: |
          set +e
          echo "SCW_CACHE_HIT=${{ steps.restore-scw.outputs.cache-hit }}" | tee ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_SCW_CACHE_HIT.txt
          echo "TREE_CACHE_HIT=${{ steps.restore-tree.outputs.cache-hit }}" | tee ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_TREE_CACHE_HIT.txt
          if [ "${{ steps.restore-scw.outputs.cache-hit }}" != "true" ]; then
            echo "SCW_CACHE_MISS_NO_DOWNLOAD_IN_R8P" | tee ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_CACHE_STATUS.txt
            zip -r ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip ACIRM_R17K_R8P_OUTPUTS
            sha256sum ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip > ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt
            exit 0
          fi
          echo "CACHE_OK" | tee ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_CACHE_STATUS.txt

      - name: Install tools
        shell: bash
        run: |
          set +e
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip python3-pip > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy > logs/pip_install.log 2>&1
          find repo/scw/2504 -maxdepth 4 -type f 2>/dev/null | sort > ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_SCW_INVENTORY.txt
          find repo/ic repo/idx repo/cat repo/aux -maxdepth 10 -type f 2>/dev/null | sort > ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_CAL_TREE_INVENTORY.txt

      - name: Calibration-resolved 511 audit
        shell: bash
        run: |
          set +e
          cat > scripts/r8p.py <<'PY'
          import csv,json,math,re,warnings
          from pathlib import Path
          import numpy as np
          from astropy.io import fits
          OUT=Path('ACIRM_R17K_R8P_OUTPUTS'); SCW=Path('repo/scw/2504'); IC=Path('repo/ic')
          IDS=[x.strip() for x in Path('scw_ids.list').read_text().splitlines() if x.strip()]
          LINE=(508.,514.); SB1=(490.,500.); SB2=(522.,532.)
          ERR=[]; CAL=[]; ROW=[]; AGG=[]; PLA=[]; MOD=[]
          def wcsv(p,rows):
              ks=[]
              for r in rows:
                  for k in r:
                      if k not in ks: ks.append(k)
              if not ks: ks=['empty']
              with open(p,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=ks); w.writeheader(); [w.writerow({k:r.get(k,'') for k in ks}) for r in rows]
          def sf(x):
              try:
                  y=float(x); return y if math.isfinite(y) else float('nan')
              except Exception: return float('nan')
          def cn(cols,n): return {c.upper():c for c in cols}.get(n.upper())
          def scwid(p):
              m=re.search(r'(2504\d{8})\.001',str(p)); return m.group(1) if m else ''
          def pol(c,x,order):
              c=np.asarray(c,dtype=float).reshape(-1)
              with warnings.catch_warnings():
                  warnings.simplefilter('ignore')
                  return np.polynomial.polynomial.polyval(x,c) if order=='asc' else np.polyval(c,x)
          def inv(c,n,order):
              e=np.linspace(0,12000,48001); ch=pol(c,e,order); ok=np.isfinite(ch)
              if ok.sum()<20: return None
              ch=ch[ok]; e=e[ok]; ix=np.argsort(ch); ch=ch[ix]; e=e[ix]
              ch,ui=np.unique(ch,return_index=True); e=e[ui]
              if len(ch)<20: return None
              return np.interp(np.arange(n,dtype=float),ch,e,left=np.nan,right=np.nan)
          def qmap(e):
              e=np.asarray(e,dtype=float).reshape(-1)
              if len(e)<100 or not np.all(np.isfinite(e)): return None
              d=np.diff(e); inc=float(np.mean(d>0))
              if inc<.98 or np.nanmin(e)>490 or np.nanmax(e)<532: return None
              i=int(np.nanargmin(abs(e-511.))); step=float(np.nanmedian(d[max(0,i-10):min(len(d),i+10)]))
              if i<3 or i>len(e)-4 or not math.isfinite(step) or step<=0 or step>10: return None
              score=100+(25 if .05<=step<=3 else 0)+(15 if .2<=step<=1.5 else 0)-abs(step-.5)*2
              return dict(score=score,chan511=i,kev_per_chan=step,emin=float(np.nanmin(e)),emax=float(np.nanmax(e)),inc_frac=inc)
          def cand(ck,kc,n):
              x=np.arange(n,dtype=float); out=[]
              for src,c in [('CHAN_KEV',ck),('KEV_CHAN',kc)]:
                  if c is None: continue
                  c=np.asarray(c,dtype=float).reshape(-1)
                  if c.size==n: out.append((src+'_VECTOR',c))
                  if c.size and c.size<=12:
                      if src=='CHAN_KEV': out += [(src+'_ASC',pol(c,x,'asc')),(src+'_DESC',pol(c,x,'desc'))]
                      else:
                          a=inv(c,n,'asc'); d=inv(c,n,'desc')
                          if a is not None: out.append((src+'_ASC_INVERTED',a))
                          if d is not None: out.append((src+'_DESC_INVERTED',d))
              good=[]
              for mid,e in out:
                  q=qmap(e)
                  if q:
                      if mid.startswith('CHAN_KEV'): q['score']+=25
                      good.append((q['score'],mid,e,q))
              return sorted(good,key=lambda z:z[0],reverse=True)
          def ed(e):
              e=np.asarray(e,dtype=float).reshape(-1); m=(e[:-1]+e[1:])/2
              if len(e)<3 or not np.all(np.isfinite(e)): return None,None
              b=np.r_[e[0]-(m[0]-e[0]),m,e[-1]+(e[-1]-m[-1])]
              return np.minimum(b[:-1],b[1:]),np.maximum(b[:-1],b[1:])
          def fs(c,lo,hi,b):
              n=min(len(c),len(lo),len(hi)); c=np.nan_to_num(np.asarray(c[:n],float),nan=0,posinf=0,neginf=0)
              lo=np.asarray(lo[:n],float); hi=np.asarray(hi[:n],float)
              f=np.maximum(0,np.minimum(hi,b[1])-np.maximum(lo,b[0]))/np.maximum(1e-12,hi-lo)
              return float((c*f).sum())
          def met(c,lo,hi,b=LINE,l=SB1,r=SB2):
              line=fs(c,lo,hi,b); s1=fs(c,lo,hi,l); s2=fs(c,lo,hi,r); side=s1+s2
              exp=side/20*6 if side>0 else float('nan'); ratio=(line/6)/(side/20) if side>0 else float('inf'); z=(line-exp)/math.sqrt(exp) if exp and exp>0 else float('nan')
              return dict(line_508_514_counts=line,side_490_500_counts=s1,side_522_532_counts=s2,side_total_counts=side,expected_line_from_side_density=exp,line_to_side_density_ratio=ratio,z_vs_side_density=z)
          for p in sorted(set(list(IC.glob('**/spi_coef_cal_*.fits'))+list(IC.glob('**/*coef*cal*.fits')))):
              try:
                  with fits.open(p,memmap=True) as hd:
                      for h in hd:
                          cols=list(h.columns.names or []) if hasattr(h,'columns') and h.columns is not None else []
                          if h.data is None: continue
                          dc=cn(cols,'DET_ID'); ec=cn(cols,'E_RANGE'); ck=cn(cols,'CHAN_KEV'); kc=cn(cols,'KEV_CHAN'); os=cn(cols,'OBT_START'); oe=cn(cols,'OBT_END')
                          if not (dc and ec and (ck or kc)): continue
                          for i in range(len(h.data)):
                              CAL.append(dict(file=str(p),det=int(h.data[dc][i]),er=int(h.data[ec][i]),os=sf(h.data[os][i]) if os else float('nan'),oe=sf(h.data[oe][i]) if oe else float('nan'),ck=np.asarray(h.data[ck][i],float).reshape(-1) if ck else None,kc=np.asarray(h.data[kc][i],float).reshape(-1) if kc else None))
              except Exception as e: ERR.append(dict(stage='cal',file=str(p),error=repr(e)[:300]))
          def mcal(det,er,mid):
              c=[x for x in CAL if x['det']==det and x['er']==er]
              if not c: return None,'NO_CAL'
              inside=[x for x in c if math.isfinite(mid) and math.isfinite(x['os']) and math.isfinite(x['oe']) and x['os']<=mid<=x['oe']]
              if inside: return inside[0],'OBT_MATCH'
              return sorted(c,key=lambda x:x['file'])[-1],'FALLBACK_LATEST'
          selected=[]; raw_seen=0; spectra=[]
          for sid in IDS: spectra += sorted(SCW.glob(f'{sid}.001/spi_spectra.fits.gz'))
          for p in spectra:
              sid=scwid(p)
              try:
                  with fits.open(p,memmap=True) as hd:
                      for h in hd:
                          if h.name!='SPI.-ACOF-RAW' or h.data is None: continue
                          cols=list(h.columns.names or []); dc=cn(cols,'DET_ID'); ec=cn(cols,'E_RANGE'); cc=cn(cols,'COUNTS'); ls=cn(cols,'LOBT_START'); le=cn(cols,'LOBT_END')
                          for i in range(len(h.data)):
                              raw_seen+=1; det=int(h.data[dc][i]); er=int(h.data[ec][i]); c=np.asarray(h.data[cc][i],float).reshape(-1)
                              a=sf(h.data[ls][i]) if ls else float('nan'); b=sf(h.data[le][i]) if le else float('nan'); mid=(a+b)/2 if math.isfinite(a) and math.isfinite(b) else float('nan')
                              ca,mt=mcal(det,er,mid); base=dict(scw=sid,row=i,det_id=det,e_range=er,raw_total_counts=float(c.sum()),cal_match=mt)
                              if ca is None: ROW.append({**base,'status':'NO_CAL'}); continue
                              cs=cand(ca['ck'],ca['kc'],len(c))
                              if not cs: ROW.append({**base,'status':'NO_MODEL','cal_file':ca['file']}); continue
                              score,model,e,q=cs[0]; lo,hi=ed(e); mm=met(c,lo,hi)
                              row={**base,'status':'OK','cal_file':ca['file'],'selected_model':model,'model_score':score,'channel_at_511':q['chan511'],'local_keV_per_channel':q['kev_per_chan'],**mm}
                              ROW.append(row); selected.append((c,lo,hi,row)); MOD.append(dict(scw=sid,det_id=det,e_range=er,selected_model=model,channel_at_511=q['chan511'],local_keV_per_channel=q['kev_per_chan'],cal_file=ca['file']))
              except Exception as e: ERR.append(dict(stage='spectrum',file=str(p),error=repr(e)[:300]))
          def agg(name,flt,extra):
              line=s1=s2=raw=0.; n=0
              for c,lo,hi,r in selected:
                  if flt(r): n+=1; raw+=r['raw_total_counts']; line+=fs(c,lo,hi,LINE); s1+=fs(c,lo,hi,SB1); s2+=fs(c,lo,hi,SB2)
              side=s1+s2; exp=side/20*6 if side>0 else float('nan'); ratio=(line/6)/(side/20) if side>0 else float('inf'); z=(line-exp)/math.sqrt(exp) if exp and exp>0 else float('nan')
              r=dict(scope=name,calibrated_rows=n,raw_total_counts=raw,line_508_514_counts=line,side_490_500_counts=s1,side_522_532_counts=s2,side_total_counts=side,expected_line_from_side_density=exp,line_to_side_density_ratio=ratio,z_vs_side_density=z,**extra); AGG.append(r); return r
          primary=agg('AGGREGATE_ALL_CALIBRATION_RESOLVED',lambda r: True,dict(aggregate_id='ALL')) if selected else {}
          for sid in sorted({r[3]['scw'] for r in selected}): agg('AGGREGATE_BY_SCW',lambda r,sid=sid:r['scw']==sid,dict(scw=sid))
          for er in sorted({r[3]['e_range'] for r in selected}): agg('AGGREGATE_BY_ERANGE',lambda r,er=er:r['e_range']==er,dict(e_range=er))
          pz=[]
          for st in np.arange(430,590.1,2.0):
              band=(float(st),float(st+6))
              if max(band[0],488)<min(band[1],516) or max(band[0],520)<min(band[1],534): continue
              left=(band[0]-18,band[0]-8); right=(band[1]+8,band[1]+18); line=side=0.
              for c,lo,hi,r in selected: line+=fs(c,lo,hi,band); side+=fs(c,lo,hi,left)+fs(c,lo,hi,right)
              exp=side/20*6 if side>0 else float('nan'); z=(line-exp)/math.sqrt(exp) if exp and exp>0 else float('nan'); ratio=(line/6)/(side/20) if side>0 else float('inf')
              PLA.append(dict(band_min_keV=band[0],band_max_keV=band[1],band_counts=line,side_counts=side,expected_from_side_density=exp,band_to_side_density_ratio=ratio,z_vs_local_side_density=z));
              if math.isfinite(z): pz.append(z)
          tz=primary.get('z_vs_side_density',float('nan')) if primary else float('nan'); rank=(1+sum(1 for z in pz if z>tz)) if math.isfinite(tz) else ''
          wcsv(OUT/'R17K_R8P_CALIBRATED_511_ROW_MEASUREMENTS.csv',ROW); wcsv(OUT/'R17K_R8P_CALIBRATED_511_AGGREGATES.csv',AGG); wcsv(OUT/'R17K_R8P_CALIBRATED_PLACEBO_SCAN.csv',PLA); wcsv(OUT/'R17K_R8P_SELECTED_MODEL_SUMMARY.csv',MOD)
          (OUT/'R17K_R8P_ERRORS.json').write_text(json.dumps(ERR,indent=2),encoding='utf-8')
          decision='R17K_R8P_CALIBRATION_RESOLVED_SPI511_DIAGNOSTIC_MEASURED_NOT_PROOF' if selected else ('R17K_R8P_NO_CALIBRATION_MAPPING_APPLIED' if spectra else 'R17K_R8P_NO_SPI_SPECTRA_FOUND')
          summary=dict(run_id='R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT',decision=decision,proof_allowed=False,spectra_files_found=len(spectra),raw_rows_seen=raw_seen,calibration_rows_found=len(CAL),calibrated_rows_used=len(selected),primary_aggregate=primary,target_rank_among_placebo_windows=rank,placebo_window_count=len(pz),claim_ceiling=['DIAGNOSTIC_NOT_PROOF','NOT_DISCOVERY','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_OFFICIAL_SPI_511_LINE_PROOF'])
          (OUT/'R17K_R8P_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          PY
          python3 scripts/r8p.py > logs/r8p_python.log 2>&1
          echo "PYTHON_EXIT=$?" | tee ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_PYTHON_EXIT.txt

      - name: Package artifact
        shell: bash
        run: |
          set +e
          cp logs/*.log ACIRM_R17K_R8P_OUTPUTS/ 2>/dev/null || true
          df -h > ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_DF_END.txt
          free -h > ACIRM_R17K_R8P_OUTPUTS/R17K_R8P_FREE_END.txt
          zip -r ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip ACIRM_R17K_R8P_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip > ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT
          path: |
            ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip
            ACIRM_R17K_R8P_CALIBRATION_RESOLVED_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt
          retention-days: 7
