name: ACIRM R3P R2Q direct SPI OPER unique SCW 511 audit no full OSA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2q-direct-spi-oper-unique-scw-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Prepare folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_LIGHT_RESULTS/logs
          mkdir -p ACIRM_CACHE_R3P_R1
          echo "R2Q_DIRECT_OPER_AUDIT_PREPARED"

      - name: Restore R3P R1 cache
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1
          restore-keys: |
            acirm-r21ax-r7g-r3p-r1-cache-

      - name: Run R2Q direct unique SCW OPER audit
        continue-on-error: true
        run: |
          set +e

          OUT="ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_RESULTS"
          LIGHT="ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_LIGHT_RESULTS"
          MAIN_LOG="$OUT/logs/main_execution.log"

          echo "R2Q_DIRECT_OPER_AUDIT_STARTED" | tee "$MAIN_LOG"
          echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$MAIN_LOG"

          sudo apt-get update -y 2>&1 | tee "$OUT/logs/apt_update.log" || true
          sudo apt-get install -y zip python3-pip 2>&1 | tee "$OUT/logs/apt_install.log" || true
          python3 -m pip install --user astropy numpy 2>&1 | tee "$OUT/logs/pip_astropy_numpy.log" || true

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import math
          import os
          import re
          import time
          from pathlib import Path

          import numpy as np
          from astropy.io import fits

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_UNIQUE_SCW_511_AUDIT_NO_FULL_OSA"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_RESULTS")
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_LIGHT_RESULTS")
          CACHE = Path("ACIRM_CACHE_R3P_R1")
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"
          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_UNIQUE_SCW_AUDIT_LIGHT_RESULTS.zip"

          for p in [OUT, OUT / "logs", LIGHT, LIGHT / "logs"]:
              p.mkdir(parents=True, exist_ok=True)

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def write_csv(path, rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: r.get(k, "") for k in fields})

          def safe_text(path, text):
              Path(path).write_text(str(text), encoding="utf-8", errors="replace")

          def extract_scw(path):
              s = str(path)
              m = re.search(r"/scw/([0-9]{4})/([0-9]{12}\.[0-9]{3})/", s)
              if m:
                  return m.group(2)
              m = re.search(r"([0-9]{12}\.[0-9]{3})", s)
              if m:
                  return m.group(1)
              return ""

          def finite_sum(x):
              arr = np.asarray(x, dtype=float)
              arr = arr[np.isfinite(arr)]
              if arr.size == 0:
                  return None
              return float(np.sum(arr))

          def ratio_metric(path):
              out = {
                  "path": str(path),
                  "scw_id": extract_scw(path),
                  "read_ok": False,
                  "hdu_name": "",
                  "value_col": "",
                  "energy_col": "",
                  "line_508_514_sum": "",
                  "sideband_490_500_sum": "",
                  "sideband_522_532_sum": "",
                  "sideband_mean_sum": "",
                  "line_to_sideband_mean_ratio": "",
                  "line_bin_count": 0,
                  "sb1_bin_count": 0,
                  "sb2_bin_count": 0,
                  "error": ""
              }

              try:
                  with fits.open(path, memmap=False) as hdul:
                      selected = None
                      for hdu in hdul:
                          if str(getattr(hdu, "name", "")).strip() == "SPI.-OPSD-ALL":
                              selected = hdu
                              break

                      if selected is None:
                          for hdu in hdul:
                              if hdu.data is not None and hasattr(hdu, "columns"):
                                  cols = list(hdu.columns.names)
                                  if "PSD_DATA" in cols:
                                      selected = hdu
                                      break

                      if selected is None:
                          out["error"] = "NO_SPI_OPSD_ALL_OR_PSD_DATA"
                          return out

                      cols = list(selected.columns.names)
                      data = selected.data
                      out["read_ok"] = True
                      out["hdu_name"] = str(getattr(selected, "name", ""))

                      value_col = "PSD_DATA" if "PSD_DATA" in cols else ""
                      if not value_col:
                          for c in cols:
                              if "DATA" in c.upper() or "COUNT" in c.upper() or "RATE" in c.upper():
                                  value_col = c
                                  break

                      energy_col = ""
                      for c in cols:
                          cu = c.upper()
                          if cu in ["ENERGY", "E_MEAN", "E_CEN", "E_CENTER", "PI"]:
                              energy_col = c
                              break

                      elo_col = ""
                      ehi_col = ""
                      for c in cols:
                          cu = c.upper().replace("-", "_")
                          if cu in ["E_MIN", "E_LO", "ENERG_LO", "ENERGY_LO", "E_LOW"]:
                              elo_col = c
                          if cu in ["E_MAX", "E_HI", "ENERG_HI", "ENERGY_HI", "E_HIGH"]:
                              ehi_col = c

                      out["value_col"] = value_col
                      out["energy_col"] = energy_col if energy_col else (elo_col + "," + ehi_col)

                      if not value_col:
                          out["error"] = "NO_VALUE_COL"
                          return out

                      if elo_col and ehi_col:
                          elo = np.asarray(data[elo_col], dtype=float).reshape(-1)
                          ehi = np.asarray(data[ehi_col], dtype=float).reshape(-1)
                          energy_mode = "bounds"
                      elif energy_col:
                          elo = np.asarray(data[energy_col], dtype=float).reshape(-1)
                          ehi = np.asarray(data[energy_col], dtype=float).reshape(-1)
                          energy_mode = "center"
                      else:
                          out["error"] = "NO_ENERGY_COL"
                          return out

                      val = np.asarray(data[value_col], dtype=float)

                      if val.ndim == 1 and val.shape[0] == elo.shape[0]:
                          val_by_energy = val
                      elif val.ndim >= 2 and val.shape[0] == elo.shape[0]:
                          val_by_energy = np.nansum(val.reshape(val.shape[0], -1), axis=1)
                      elif val.ndim >= 2 and val.shape[-1] == elo.shape[0]:
                          tmp = np.moveaxis(val, -1, 0)
                          val_by_energy = np.nansum(tmp.reshape(tmp.shape[0], -1), axis=1)
                      else:
                          out["error"] = "VALUE_ENERGY_SHAPE_MISMATCH"
                          return out

                      if val_by_energy.shape[0] != elo.shape[0]:
                          out["error"] = "VALUE_ENERGY_LENGTH_MISMATCH"
                          return out

                      finite = np.isfinite(elo) & np.isfinite(ehi) & np.isfinite(val_by_energy)
                      elo = elo[finite]
                      ehi = ehi[finite]
                      val_by_energy = val_by_energy[finite]

                      if energy_mode == "bounds":
                          line_mask = (elo < 514.0) & (ehi > 508.0)
                          sb1_mask = (elo < 500.0) & (ehi > 490.0)
                          sb2_mask = (elo < 532.0) & (ehi > 522.0)
                      else:
                          line_mask = (elo >= 508.0) & (elo <= 514.0)
                          sb1_mask = (elo >= 490.0) & (elo <= 500.0)
                          sb2_mask = (elo >= 522.0) & (elo <= 532.0)

                      line_sum = finite_sum(val_by_energy[line_mask])
                      sb1_sum = finite_sum(val_by_energy[sb1_mask])
                      sb2_sum = finite_sum(val_by_energy[sb2_mask])

                      out["line_bin_count"] = int(np.sum(line_mask))
                      out["sb1_bin_count"] = int(np.sum(sb1_mask))
                      out["sb2_bin_count"] = int(np.sum(sb2_mask))

                      if line_sum is not None:
                          out["line_508_514_sum"] = line_sum
                      if sb1_sum is not None:
                          out["sideband_490_500_sum"] = sb1_sum
                      if sb2_sum is not None:
                          out["sideband_522_532_sum"] = sb2_sum

                      if sb1_sum is not None and sb2_sum is not None:
                          side_mean = (sb1_sum + sb2_sum) / 2.0
                          out["sideband_mean_sum"] = side_mean
                          if line_sum is not None and side_mean != 0:
                              out["line_to_sideband_mean_ratio"] = line_sum / side_mean

              except Exception as e:
                  out["error"] = repr(e)[:500]

              return out

          ready = READY_FLAG.exists()
          spi_oper_paths = []
          if CACHE.exists():
              spi_oper_paths = sorted(CACHE.rglob("spi_oper.fits"))

          # Deduplicate by SCW id, not by copied path.
          unique_by_scw = {}
          for p in spi_oper_paths:
              scw = extract_scw(p)
              if scw and scw not in unique_by_scw:
                  unique_by_scw[scw] = p

          rows = []
          for scw, p in sorted(unique_by_scw.items()):
              rows.append(ratio_metric(p))

          metric_rows = []
          for r in rows:
              if str(r.get("line_to_sideband_mean_ratio", "")) != "":
                  metric_rows.append(r)

          metric_rows_sorted = sorted(
              metric_rows,
              key=lambda r: float(r["line_to_sideband_mean_ratio"]),
              reverse=True
          )

          ratios = []
          for r in metric_rows:
              try:
                  ratios.append(float(r["line_to_sideband_mean_ratio"]))
              except Exception:
                  pass

          stats = {}
          if ratios:
              arr = np.asarray(ratios, dtype=float)
              stats = {
                  "ratio_count": int(arr.size),
                  "ratio_min": float(np.min(arr)),
                  "ratio_max": float(np.max(arr)),
                  "ratio_mean": float(np.mean(arr)),
                  "ratio_median": float(np.median(arr)),
                  "ratio_std_population": float(np.std(arr)),
                  "ratio_std_sample": float(np.std(arr, ddof=1)) if arr.size > 1 else "",
                  "count_ratio_ge_1_2": int(np.sum(arr >= 1.2)),
                  "count_ratio_ge_1_5": int(np.sum(arr >= 1.5)),
                  "count_ratio_ge_1_8": int(np.sum(arr >= 1.8))
              }

          best_ratio = ""
          best_scw = ""
          best_path = ""
          if metric_rows_sorted:
              best_ratio = metric_rows_sorted[0]["line_to_sideband_mean_ratio"]
              best_scw = metric_rows_sorted[0]["scw_id"]
              best_path = metric_rows_sorted[0]["path"]

          write_csv(
              LIGHT / "unique_scw_spi_oper_511_ratios.csv",
              rows,
              [
                  "scw_id", "path", "read_ok", "hdu_name", "value_col", "energy_col",
                  "line_508_514_sum", "sideband_490_500_sum", "sideband_522_532_sum",
                  "sideband_mean_sum", "line_to_sideband_mean_ratio",
                  "line_bin_count", "sb1_bin_count", "sb2_bin_count", "error"
              ]
          )

          write_csv(
              LIGHT / "ranked_unique_scw_spi_oper_511_ratios.csv",
              metric_rows_sorted,
              [
                  "scw_id", "path", "line_508_514_sum", "sideband_490_500_sum",
                  "sideband_522_532_sum", "sideband_mean_sum",
                  "line_to_sideband_mean_ratio", "line_bin_count", "sb1_bin_count", "sb2_bin_count"
              ]
          )

          checks = {
              "ready_flag_exists": ready,
              "spi_oper_file_count_total": len(spi_oper_paths),
              "unique_scw_count": len(unique_by_scw),
              "unique_metric_row_count": len(metric_rows),
              "line_508_514_seen_any_unique_scw": any(int(r.get("line_bin_count", 0) or 0) > 0 for r in rows),
              "sideband_490_500_seen_any_unique_scw": any(int(r.get("sb1_bin_count", 0) or 0) > 0 for r in rows),
              "sideband_522_532_seen_any_unique_scw": any(int(r.get("sb2_bin_count", 0) or 0) > 0 for r in rows),
              "best_unique_scw": best_scw,
              "best_unique_ratio": best_ratio,
              "best_unique_path": best_path,
              "full_osa_executed": False,
              "spi_science_analysis_executed": False
          }

          checks.update(stats)

          with open(LIGHT / "checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          if metric_rows:
              if len(metric_rows) == 1:
                  final_status = "R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_SINGLE_UNIQUE_SCW_511_RATIO_CANDIDATE_NOT_FULL_OSA_NOT_PROOF"
              else:
                  final_status = "R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_MULTI_UNIQUE_SCW_511_RATIO_AUDIT_NOT_FULL_OSA_NOT_PROOF"
              scientific_status = "DIRECT_SPI_OPER_RAW_OPERATIONAL_AUDIT_NOT_OSA_PROOF_NOT_DISCOVERY"
          elif rows:
              final_status = "R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_FILES_FOUND_BUT_NO_COMPLETE_UNIQUE_511_RATIO"
              scientific_status = "NO_COMPLETE_DIRECT_511_RATIO_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          else:
              final_status = "R21AX_R7G_R3P_R2Q_NO_SPI_OPER_FILES_FOUND_IN_CACHE"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"

          summary = {
              "run_id": RUN_ID,
              "created_utc": now_utc(),
              "final_status": final_status,
              "scientific_status": scientific_status,
              "checks": checks,
              "method": "UNIQUE_SCW_DIRECT_SPI_OPER_FITS_AUDIT_ONLY_NO_FULL_OSA",
              "energy_windows_keV": {
                  "line": [508.0, 514.0],
                  "sideband_low": [490.0, 500.0],
                  "sideband_high": [522.0, 532.0]
              },
              "claim_ceiling": "DIRECT_RAW_OPERATIONAL_SUPPORT_ONLY_NOT_FULL_OSA_PROOF_NOT_DISCOVERY"
          }

          safe_text(LIGHT / "SUMMARY.json", json.dumps(summary, indent=2))
          safe_text(
              LIGHT / "CLAIM_BOUNDARY.txt",
              "R2Q deduplicates R2P by unique SCW and reads spi_oper.fits directly.\n"
              "It does not execute spi_science_analysis and is not OSA proof.\n"
              "A raw SPI.-OPSD-ALL ratio is operational support only, not a discovery claim.\n"
          )

          phone = []
          phone.append("ACIRM R2Q DIRECT UNIQUE SCW SPI OPER AUDIT")
          phone.append("final_status=" + final_status)
          phone.append("scientific_status=" + scientific_status)
          for k, v in checks.items():
              phone.append(str(k) + "=" + str(v))
          safe_text(LIGHT / "PHONE_SUMMARY.txt", "\n".join(phone) + "\n")

          for logp in sorted((OUT / "logs").glob("*.log")):
              try:
                  txt = logp.read_text(encoding="utf-8", errors="replace")
                  safe_text(LIGHT / "logs" / logp.name, txt[-600000:])
              except Exception:
                  pass

          if Path(ZIP_NAME).exists():
              Path(ZIP_NAME).unlink()

          os.system("zip -r " + ZIP_NAME + " " + str(LIGHT))

          if Path(ZIP_NAME).exists():
              sha = sha256_file(ZIP_NAME)
              safe_text(ZIP_NAME + ".sha256.txt", sha + "  " + ZIP_NAME + "\n")
              print("R2Q_DIRECT_OPER_AUDIT_ZIP_SHA256", sha)

          print(json.dumps(summary, indent=2))
          PY

      - name: Upload R2Q direct unique SCW audit artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_UNIQUE_SCW_AUDIT_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_UNIQUE_SCW_AUDIT_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_SPI_OPER_UNIQUE_SCW_AUDIT_LIGHT_RESULTS.zip.sha256.txt
            ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_RESULTS/logs/main_execution.log
            ACIRM_R21AX_R7G_R3P_R2Q_DIRECT_OPER_AUDIT_RESULTS/logs/pip_astropy_numpy.log
          if-no-files-found: warn
