name: ACIRM R3P R2 cache restore prompt killed SPI511

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2-cache-restore-prompt-killed-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare R3P R2 folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3P_R2_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3P_R2_LIGHT_RESULTS
          echo "R3P_R2_PREPARED"

      - name: Restore R3P R1 cache
        id: r3p-r1-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1

      - name: Pull OSA Docker
        continue-on-error: true
        run: |
          set +e
          {
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "cache_hit=${{ steps.r3p-r1-cache-restore.outputs.cache-hit }}"
            docker --version || true
            docker pull integralsw/osa:latest || true
          } | tee ACIRM_R21AX_R7G_R3P_R2_RESULTS/logs/docker_status.log
          exit 0

      - name: R3P R2 restore cache and run prompt-killed SPI511
        continue-on-error: true
        run: |
          set +e
          echo "R3P_R2 main started" | tee ACIRM_R21AX_R7G_R3P_R2_RESULTS/logs/main_execution.log

          python3 -u <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import os
          import re
          import shutil
          import subprocess
          import time
          import traceback
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2_CACHE_RESTORE_PROMPT_KILLED_SPI511"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2_LIGHT_RESULTS")

          CACHE = Path("ACIRM_CACHE_R3P_R1")
          CACHE_DATA = CACHE / "data"
          CACHE_WORK = CACHE / "work"
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"

          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2_LIGHT_RESULTS.zip"

          REV = "2504"
          SCW = "250400090010"

          for p in [OUT, DATA, WORK, LOGS, LIGHT]:
              p.mkdir(parents=True, exist_ok=True)

          command_rows = []

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def run_host(cmd, timeout=300):
              try:
                  return subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, timeout=timeout)
              except Exception as e:
                  class R:
                      returncode = 999
                      stdout = repr(e)
                  return R()

          def fix_permissions():
              uid = str(os.getuid())
              gid = str(os.getgid())
              for p in [OUT, LIGHT, CACHE]:
                  if p.exists():
                      run_host(["sudo", "chown", "-R", uid + ":" + gid, str(p)], timeout=300)
                      run_host(["chmod", "-R", "u+rwX,go+rX", str(p)], timeout=300)

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_read(path, limit=200000):
              p = Path(path)
              if not p.exists():
                  return ""
              try:
                  data = p.read_bytes()
                  if len(data) > limit:
                      data = data[-limit:]
                  return data.decode("utf-8", "replace")
              except Exception:
                  return ""

          def write_csv(path, rows, fieldnames):
              path = Path(path)
              path.parent.mkdir(parents=True, exist_ok=True)
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: r.get(k, "") for k in fieldnames})

          def file_rows(root):
              rows = []
              root = Path(root)
              if not root.exists():
                  return rows
              for p in sorted(root.rglob("*")):
                  if p.is_file():
                      try:
                          rows.append({
                              "path": str(p),
                              "bytes": p.stat().st_size,
                          })
                      except Exception:
                          rows.append({
                              "path": str(p),
                              "bytes": "",
                          })
              return rows

          def copy_cache_to_results():
              if CACHE_DATA.exists():
                  shutil.copytree(CACHE_DATA, DATA, dirs_exist_ok=True)
              if CACHE_WORK.exists():
                  shutil.copytree(CACHE_WORK, WORK, dirs_exist_ok=True)

          def build_cache_miss_artifact():
              summary = {
                  "run_id": RUN_ID,
                  "created_utc": now_utc(),
                  "final_status": "R21AX_R7G_R3P_R2_CACHE_MISS_NO_RERUN_NO_511_NO_PHYSICAL_NULL",
                  "claim_ceiling": "NO_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL",
                  "checks": {
                      "r3p_r1_cache_hit": False,
                      "ready_flag_exists": READY_FLAG.exists(),
                      "cache_data_exists": CACHE_DATA.exists(),
                      "cache_work_exists": CACHE_WORK.exists(),
                      "og_created": False,
                      "actual_spi_started": False,
                      "line_508_514_seen": False,
                      "sidebands_seen": False,
                      "line_metric_exists": False,
                      "sideband_metric_exists": False,
                  }
              }
              (LIGHT / "R3P_R2_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
              (LIGHT / "R3P_R2_CLAIM_BOUNDARY.txt").write_text(
                  "CACHE MISS ONLY. NO SPI. NO 511 METRIC. NO OSA PROOF. NOT DISCOVERY. NO PHYSICAL NULL.\n",
                  encoding="utf-8",
              )

          def run_container(script, name, timeout_seconds):
              log_path = LOGS / ("host_container_" + name + ".log")
              cmd = [
                  "docker", "run", "--rm",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3P_R2_RESULTS/data:/data",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3P_R2_RESULTS/work:/work",
                  "integralsw/osa:latest",
                  "bash", "-lc", script,
              ]

              try:
                  p = subprocess.run(
                      cmd,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      timeout=timeout_seconds,
                  )
                  txt = p.stdout
                  rc = p.returncode
              except subprocess.TimeoutExpired as e:
                  raw = e.stdout or ""
                  if isinstance(raw, bytes):
                      raw = raw.decode("utf-8", "replace")
                  txt = raw + "\nACIRM_TIMEOUT_EXPIRED\n"
                  rc = 124
              except Exception:
                  txt = traceback.format_exc()
                  rc = 999

              fix_permissions()

              if len(txt.encode("utf-8", "replace")) > 1500000:
                  txt = txt[:500000] + "\nACIRM_LOG_TRUNCATED_MIDDLE\n" + txt[-500000:]

              log_path.write_text(txt, encoding="utf-8", errors="replace")

              command_rows.append({
                  "name": name,
                  "returncode": rc,
                  "log_path": str(log_path),
                  "log_bytes": log_path.stat().st_size if log_path.exists() else 0,
              })

              return rc, txt

          def env_prefix():
              return r'''
                set +e
                unset DISPLAY
                export DISPLAY=
                export HEADASNOQUERY=1
                export PIL_NO_GUI=1
                export PIL_NOTTY=1

                mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep
                mkdir -p /work/og /work/products_line /work/products_sidebands /work/container_logs

                cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

                if [ -f /tmp/acirm_pfiles/spi_science_analysis.par ]; then
                  sed -i 's/,ql,/,hl,/g' /tmp/acirm_pfiles/spi_science_analysis.par || true
                  sed -i 's/,q,/,h,/g' /tmp/acirm_pfiles/spi_science_analysis.par || true
                fi

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                if [ -d /opt/osa/lib ]; then export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"; fi
                if [ -d /opt/osa/lib64 ]; then export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"; fi

                source /opt/osa/bin/isdc_init_env.sh || true

                unset DISPLAY
                export DISPLAY=
                export HEADASNOQUERY=1
                export PIL_NO_GUI=1
                export PIL_NOTTY=1
                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH
              '''

          def prompt_killed_spi511():
              script = env_prefix() + r'''
                set +e

                echo "R3P_R2_PROMPT_KILLED_SPI511_START"
                echo "data_file_count=$(find /data -type f | wc -l)"
                echo "work_file_count_before=$(find /work -type f | wc -l)"

                OG_FILE=$(find /work/og -type f -name "og_spi.fits" | head -1)
                echo "OG_FILE=$OG_FILE"

                if [ -z "$OG_FILE" ]; then
                  echo "R3P_R2_NO_OG_FILE"
                  exit 0
                fi

                PAR=/tmp/acirm_pfiles/spi_science_analysis.par

                cat > /work/container_logs/spi_guarded.py <<'PYRUN'
import json
import os
import subprocess
import sys
import time
from pathlib import Path

case_name = sys.argv[1]
params_file = Path(sys.argv[2])
answers_file = Path(sys.argv[3])
product_dir = Path(sys.argv[4])
log_file = Path(sys.argv[5])
status_file = Path(sys.argv[6])

params = [line.rstrip("\n") for line in params_file.read_text(encoding="utf-8", errors="replace").splitlines() if line.strip()]
product_dir.mkdir(parents=True, exist_ok=True)
log_file.parent.mkdir(parents=True, exist_ok=True)

cmd = ["spi_science_analysis"] + params

status = {
    "case": case_name,
    "cmd": cmd,
    "started_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
    "returncode": None,
    "killed_by_prompt_guard": False,
    "timeout_guard_seconds": 3000,
    "orbit_asini_prompt_count": 0,
    "source_catalog_prompt_count": 0,
    "ephemeris_prompt_count": 0,
    "total_log_bytes_written": 0,
}

max_log_bytes = 900000
start = time.time()

with open(answers_file, "r", encoding="utf-8", errors="replace") as ans:
    p = subprocess.Popen(
        cmd,
        cwd=str(product_dir),
        stdin=ans,
        stdout=subprocess.PIPE,
        stderr=subprocess.STDOUT,
        text=True,
        errors="replace",
        bufsize=1,
    )

    with open(log_file, "w", encoding="utf-8", errors="replace") as lf:
        lf.write("ACIRM_SPI_GUARDED_CASE=" + case_name + "\n")
        lf.write("ACIRM_SPI_GUARDED_CMD=" + " ".join(cmd) + "\n")
        lf.flush()

        while True:
            if time.time() - start > status["timeout_guard_seconds"]:
                status["killed_by_prompt_guard"] = True
                lf.write("\nACIRM_SPI_GUARD_TIMEOUT_KILL\n")
                try:
                    p.kill()
                except Exception:
                    pass
                break

            line = p.stdout.readline() if p.stdout is not None else ""
            if line == "" and p.poll() is not None:
                break

            if not line:
                time.sleep(0.1)
                continue

            if "Orbit asini parameter" in line:
                status["orbit_asini_prompt_count"] += 1
            if "Enter DOL for source catalog" in line:
                status["source_catalog_prompt_count"] += 1
            if "DOL of the ephemeris data" in line:
                status["ephemeris_prompt_count"] += 1

            if status["orbit_asini_prompt_count"] > 12:
                status["killed_by_prompt_guard"] = True
                lf.write("\nACIRM_SPI_GUARD_ORBIT_ASINI_PROMPT_LOOP_KILL\n")
                try:
                    p.kill()
                except Exception:
                    pass
                break

            encoded_len = len(line.encode("utf-8", "replace"))
            if status["total_log_bytes_written"] + encoded_len <= max_log_bytes:
                lf.write(line)
                status["total_log_bytes_written"] += encoded_len

        try:
            rc = p.wait(timeout=20)
        except Exception:
            rc = 999

status["returncode"] = rc
status["ended_utc"] = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
status_file.write_text(json.dumps(status, indent=2), encoding="utf-8")
print(json.dumps(status, indent=2))
PYRUN

                make_answers() {
                  OUT="$1"
                  rm -f "$OUT"
                  # Accept defaults for catalog, coordinates, fluxes, ephemeris, phase options, orbit=no.
                  for i in $(seq 1 11); do echo "" >> "$OUT"; done
                  # Fill orbital values if OSA still asks despite run_phase_analysis=no.
                  echo "0" >> "$OUT"
                  echo "1" >> "$OUT"
                  echo "0" >> "$OUT"
                  echo "0" >> "$OUT"
                  echo "0" >> "$OUT"
                  echo "0" >> "$OUT"
                  # Extra safe fallback answers to prevent blank prompt loops.
                  for i in $(seq 1 300); do echo "0" >> "$OUT"; done
                }

                add_param() {
                  NAME="$1"
                  VALUE="$2"
                  FILE="$3"
                  if grep -q "^${NAME}," "$PAR" 2>/dev/null; then
                    echo "${NAME}=${VALUE}" >> "$FILE"
                    echo "ADD_PARAM ${NAME}=${VALUE}"
                  else
                    echo "SKIP_PARAM ${NAME}"
                  fi
                }

                run_case() {
                  CASE="$1"
                  NREG="$2"
                  REGIONS="$3"
                  NBINS="$4"
                  PROD_DIR="$5"

                  mkdir -p "$PROD_DIR"
                  PARAMS="/work/container_logs/${CASE}.params.txt"
                  ANSWERS="/work/container_logs/${CASE}.answers.txt"
                  LOG="/work/container_logs/${CASE}.guarded.log"
                  STATUS="/work/container_logs/${CASE}.status.json"

                  rm -f "$PARAMS" "$ANSWERS" "$LOG" "$STATUS"

                  add_param "obs_group" "$OG_FILE" "$PARAMS"

                  add_param "run_cat_extract" "no" "$PARAMS"
                  add_param "run_pointing" "yes" "$PARAMS"
                  add_param "run_binning" "yes" "$PARAMS"
                  add_param "run_background" "no" "$PARAMS"
                  add_param "run_spiros" "no" "$PARAMS"
                  add_param "run_phase_analysis" "no" "$PARAMS"
                  add_param "run_gaincorrection" "no" "$PARAMS"
                  add_param "run_fullcheck" "no" "$PARAMS"
                  add_param "use_pointing_filter" "no" "$PARAMS"
                  add_param "run_simulation" "no" "$PARAMS"

                  add_param "catalog" "NONE" "$PARAMS"
                  add_param "spiros_source-cat-dol" "source_cat.fits[1]" "$PARAMS"
                  add_param "coordinates" "RADEC" "$PARAMS"
                  add_param "cat_extract_fluxMin" "0.001" "$PARAMS"
                  add_param "cat_extract_fluxMax" "1000" "$PARAMS"

                  add_param "spibounds_nregions" "$NREG" "$PARAMS"
                  add_param "spibounds_regions" "$REGIONS" "$PARAMS"
                  add_param "spibounds_nbins" "$NBINS" "$PARAMS"
                  add_param "detectors" "0-18" "$PARAMS"
                  add_param "clobber" "yes" "$PARAMS"
                  add_param "log_File" "${CASE}.inner.log" "$PARAMS"

                  add_param "spi_phase_hist_ephemDOL" "ephemeris.fits" "$PARAMS"
                  add_param "spi_phase_hist_phaseBinNum" "20" "$PARAMS"
                  add_param "spi_phase_hist_phaseSameWidthBin" "yes" "$PARAMS"
                  add_param "spi_phase_hist_phaseBounds" "0,1" "$PARAMS"
                  add_param "spi_phase_hist_phaseSubtractOff" "no" "$PARAMS"
                  add_param "spi_phase_hist_phaseOffNum" "0" "$PARAMS"
                  add_param "spi_phase_hist_orbit" "no" "$PARAMS"
                  add_param "spi_phase_hist_asini" "0" "$PARAMS"
                  add_param "spi_phase_hist_porb" "1" "$PARAMS"
                  add_param "spi_phase_hist_T90epoch" "0" "$PARAMS"
                  add_param "spi_phase_hist_ecc" "0" "$PARAMS"
                  add_param "spi_phase_hist_omega_d" "0" "$PARAMS"
                  add_param "spi_phase_hist_pporb" "0" "$PARAMS"

                  add_param "spiros_mode" "SPECTRA" "$PARAMS"
                  add_param "spiros_energy-subset" "1" "$PARAMS"
                  add_param "spiros_pointing-subset" "" "$PARAMS"
                  add_param "spiros_detector-subset" "" "$PARAMS"
                  add_param "spiros_background-method" "0" "$PARAMS"
                  add_param "spiros_srclocbins" "FIRST" "$PARAMS"
                  add_param "spiros_nofsources" "0" "$PARAMS"
                  add_param "spiros_sigmathres" "999" "$PARAMS"
                  add_param "spiros_iteration-output" "NO" "$PARAMS"
                  add_param "spiros_optistat" "CHI2" "$PARAMS"
                  add_param "spiros_source-timing-mode" "QUICKLOOK" "$PARAMS"
                  add_param "spiros_source-timing-scale" "0" "$PARAMS"

                  make_answers "$ANSWERS"

                  echo "SPI_CMD_BEGIN ${CASE}"
                  cat "$PARAMS"
                  python3 /work/container_logs/spi_guarded.py "$CASE" "$PARAMS" "$ANSWERS" "$PROD_DIR" "$LOG" "$STATUS"
                  echo "SPI_CMD_END ${CASE}"

                  echo "PRODUCTS_AFTER_${CASE}"
                  find "$PROD_DIR" -maxdepth 8 -type f -printf "%p %s\n" | sort || true
                }

                run_case "R3P_R2_LINE_508_514" "1" "508,514" "1" "/work/products_line"
                run_case "R3P_R2_SIDEBANDS_490_500_508_514_522_532" "3" "490,500,508,514,522,532" "1,1,1" "/work/products_sidebands"

                echo "WORK_FILES_AFTER_R3P_R2"
                find /work -maxdepth 10 -type f -printf "%p %s\n" | sort > /work/container_logs/work_files_after_r3p_r2.txt
                cat /work/container_logs/work_files_after_r3p_r2.txt

                echo "FITS_QUICKLOOK_R3P_R2"
                {
                  for f in $(find /work/products_line /work/products_sidebands -type f \( -name "*.fits" -o -name "*.fits.gz" \) 2>/dev/null | sort | head -80); do
                    echo "### $f"
                    fstruct "$f" 2>&1 | head -80 || true
                  done
                } > /work/container_logs/fits_quicklook_r3p_r2.txt

                echo "R3P_R2_PROMPT_KILLED_SPI511_END"
              '''
              return run_container(script, "prompt_killed_spi511", 7600)

          def build_light_artifact():
              LIGHT.mkdir(parents=True, exist_ok=True)
              (LIGHT / "logs").mkdir(parents=True, exist_ok=True)

              # Copy small host logs.
              for p in sorted(LOGS.glob("*.log")):
                  try:
                      shutil.copy2(p, LIGHT / "logs" / p.name)
                  except Exception:
                      pass

              # Copy selected container logs only if small.
              selected = [
                  WORK / "container_logs" / "R3P_R2_LINE_508_514.guarded.log",
                  WORK / "container_logs" / "R3P_R2_LINE_508_514.status.json",
                  WORK / "container_logs" / "R3P_R2_LINE_508_514.params.txt",
                  WORK / "container_logs" / "R3P_R2_LINE_508_514.answers.txt",
                  WORK / "container_logs" / "R3P_R2_SIDEBANDS_490_500_508_514_522_532.guarded.log",
                  WORK / "container_logs" / "R3P_R2_SIDEBANDS_490_500_508_514_522_532.status.json",
                  WORK / "container_logs" / "R3P_R2_SIDEBANDS_490_500_508_514_522_532.params.txt",
                  WORK / "container_logs" / "R3P_R2_SIDEBANDS_490_500_508_514_522_532.answers.txt",
                  WORK / "container_logs" / "work_files_after_r3p_r2.txt",
                  WORK / "container_logs" / "fits_quicklook_r3p_r2.txt",
              ]

              for p in selected:
                  if p.exists() and p.is_file():
                      dest = LIGHT / "logs" / p.name
                      try:
                          if p.stat().st_size <= 2000000:
                              shutil.copy2(p, dest)
                          else:
                              txt = safe_read(p, limit=500000)
                              dest.write_text(txt, encoding="utf-8", errors="replace")
                      except Exception:
                          pass

              data_rows = file_rows(DATA)
              work_rows = file_rows(WORK)
              product_line_rows = file_rows(WORK / "products_line")
              product_sideband_rows = file_rows(WORK / "products_sidebands")
              og_rows = [r for r in work_rows if "og_spi.fits" in r["path"] or "swg_spi.fits" in r["path"] or "swg_idx_spi.fits" in r["path"]]

              write_csv(LIGHT / "r3p_r2_data_files.csv", data_rows, ["path", "bytes"])
              write_csv(LIGHT / "r3p_r2_work_files.csv", work_rows, ["path", "bytes"])
              write_csv(LIGHT / "r3p_r2_products_line.csv", product_line_rows, ["path", "bytes"])
              write_csv(LIGHT / "r3p_r2_products_sidebands.csv", product_sideband_rows, ["path", "bytes"])
              write_csv(LIGHT / "r3p_r2_og_files.csv", og_rows, ["path", "bytes"])
              write_csv(LIGHT / "r3p_r2_commands.csv", command_rows, ["name", "returncode", "log_path", "log_bytes"])

              line_log = safe_read(WORK / "container_logs" / "R3P_R2_LINE_508_514.guarded.log", limit=400000)
              side_log = safe_read(WORK / "container_logs" / "R3P_R2_SIDEBANDS_490_500_508_514_522_532.guarded.log", limit=400000)
              host_log = safe_read(LOGS / "host_container_prompt_killed_spi511.log", limit=500000)

              def read_status(name):
                  p = WORK / "container_logs" / name
                  if not p.exists():
                      return {}
                  try:
                      return json.loads(p.read_text(encoding="utf-8", errors="replace"))
                  except Exception:
                      return {}

              line_status = read_status("R3P_R2_LINE_508_514.status.json")
              side_status = read_status("R3P_R2_SIDEBANDS_490_500_508_514_522_532.status.json")

              og_created = any("og_spi.fits" in r["path"] for r in work_rows)
              actual_spi_started = ("SPI_CMD_BEGIN R3P_R2_LINE_508_514" in host_log) or ("ACIRM_SPI_GUARDED_CASE=R3P_R2_LINE_508_514" in line_log)
              line_508_514_seen = ("spibounds_regions=508,514" in host_log) or ("spibounds_regions=508,514" in line_log)
              sidebands_seen = ("spibounds_regions=490,500,508,514,522,532" in host_log) or ("spibounds_regions=490,500,508,514,522,532" in side_log)

              prompt_loop_seen = bool(line_status.get("killed_by_prompt_guard")) or bool(side_status.get("killed_by_prompt_guard"))
              orbit_asini_prompt_count = int(line_status.get("orbit_asini_prompt_count", 0) or 0) + int(side_status.get("orbit_asini_prompt_count", 0) or 0)

              line_product_count = len(product_line_rows)
              sideband_product_count = len(product_sideband_rows)

              line_metric_exists = any(
                  (r["bytes"] and str(r["bytes"]) != "0" and (str(r["path"]).endswith(".fits") or str(r["path"]).endswith(".fits.gz")))
                  for r in product_line_rows
              )
              sideband_metric_exists = any(
                  (r["bytes"] and str(r["bytes"]) != "0" and (str(r["path"]).endswith(".fits") or str(r["path"]).endswith(".fits.gz")))
                  for r in product_sideband_rows
              )

              if line_metric_exists or sideband_metric_exists:
                  final_status = "R21AX_R7G_R3P_R2_SPI511_PRODUCTS_PRESENT_REVIEW_PRODUCTS_NOT_FINAL_PROOF"
              elif prompt_loop_seen:
                  final_status = "R21AX_R7G_R3P_R2_SPI511_PROMPT_GUARD_TRIGGERED_NO_511_METRIC_NO_PHYSICAL_NULL"
              elif actual_spi_started:
                  final_status = "R21AX_R7G_R3P_R2_SPI511_EXECUTED_NO_READABLE_511_METRIC_NO_PHYSICAL_NULL"
              else:
                  final_status = "R21AX_R7G_R3P_R2_SPI511_NOT_STARTED_NO_511_NO_PHYSICAL_NULL"

              checks = {
                  "r3p_r1_cache_ready_flag_exists": READY_FLAG.exists(),
                  "data_file_count": len(data_rows),
                  "work_file_count": len(work_rows),
                  "og_created": og_created,
                  "actual_spi_started": actual_spi_started,
                  "line_508_514_seen": line_508_514_seen,
                  "sidebands_seen": sidebands_seen,
                  "line_product_count": line_product_count,
                  "sideband_product_count": sideband_product_count,
                  "line_metric_exists": line_metric_exists,
                  "sideband_metric_exists": sideband_metric_exists,
                  "prompt_loop_seen": prompt_loop_seen,
                  "orbit_asini_prompt_count": orbit_asini_prompt_count,
                  "line_returncode": line_status.get("returncode", ""),
                  "sidebands_returncode": side_status.get("returncode", ""),
                  "line_killed_by_prompt_guard": line_status.get("killed_by_prompt_guard", ""),
                  "sidebands_killed_by_prompt_guard": side_status.get("killed_by_prompt_guard", ""),
              }

              summary = {
                  "run_id": RUN_ID,
                  "created_utc": now_utc(),
                  "rev": REV,
                  "scw": SCW,
                  "final_status": final_status,
                  "claim_ceiling": "NOT_DISCOVERY_NOT_FINAL_PROOF_NOT_OSA_PROOF_UNLESS_ACTUAL_METRIC_IS_READ",
                  "checks": checks,
              }

              (LIGHT / "R3P_R2_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
              (LIGHT / "R3P_R2_CLAIM_BOUNDARY.txt").write_text(
                  "R3P_R2 tests OSA/SPI 511 execution only.\n"
                  "Runtime, prompt, cache, OSA, or parameter failure is not a physical null.\n"
                  "Do not claim discovery or proof unless a real line/sideband metric is read from OSA products.\n",
                  encoding="utf-8",
              )

              flat_rows = [{"check": k, "value": v} for k, v in checks.items()]
              write_csv(LIGHT / "r3p_r2_checks_flat.csv", flat_rows, ["check", "value"])

              zip_path = Path(ZIP_NAME)
              if zip_path.exists():
                  zip_path.unlink()
              run_host(["zip", "-r", ZIP_NAME, str(LIGHT)], timeout=600)
              sha = sha256_file(zip_path)
              Path(ZIP_NAME + ".sha256.txt").write_text(sha + "  " + ZIP_NAME + "\n", encoding="utf-8")

          try:
              print("R3P_R2_CACHE_READY_FLAG_EXISTS", READY_FLAG.exists())
              print("R3P_R2_CACHE_DATA_EXISTS", CACHE_DATA.exists())
              print("R3P_R2_CACHE_WORK_EXISTS", CACHE_WORK.exists())

              if not READY_FLAG.exists() or not CACHE_DATA.exists() or not CACHE_WORK.exists():
                  build_cache_miss_artifact()
                  zip_path = Path(ZIP_NAME)
                  if zip_path.exists():
                      zip_path.unlink()
                  run_host(["zip", "-r", ZIP_NAME, str(LIGHT)], timeout=600)
                  sha = sha256_file(zip_path)
                  Path(ZIP_NAME + ".sha256.txt").write_text(sha + "  " + ZIP_NAME + "\n", encoding="utf-8")
              else:
                  copy_cache_to_results()
                  fix_permissions()
                  prompt_killed_spi511()
                  fix_permissions()
                  build_light_artifact()

              print("R3P_R2_DONE")
          except Exception:
              err = traceback.format_exc()
              print(err)
              (LOGS / "fatal_error.log").write_text(err, encoding="utf-8", errors="replace")
              try:
                  summary = {
                      "run_id": RUN_ID,
                      "created_utc": now_utc(),
                      "final_status": "R21AX_R7G_R3P_R2_FATAL_RUNTIME_FAILURE_NO_511_NO_PHYSICAL_NULL",
                      "error": err[-5000:],
                      "claim_ceiling": "NO_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL",
                  }
                  LIGHT.mkdir(parents=True, exist_ok=True)
                  (LIGHT / "R3P_R2_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
                  run_host(["zip", "-r", ZIP_NAME, str(LIGHT)], timeout=600)
                  if Path(ZIP_NAME).exists():
                      Path(ZIP_NAME + ".sha256.txt").write_text(sha256_file(ZIP_NAME) + "  " + ZIP_NAME + "\n", encoding="utf-8")
              except Exception:
                  pass
          PY

      - name: Upload R3P R2 LIGHT artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3P_R2_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3P_R2_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3P_R2_LIGHT_RESULTS.zip.sha256.txt
            ACIRM_R21AX_R7G_R3P_R2_RESULTS/logs/main_execution.log
            ACIRM_R21AX_R7G_R3P_R2_RESULTS/logs/docker_status.log
          if-no-files-found: warn
