name: ACIRM R3E science window IBIS HK resolver DAL smoke test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3e-science-window-ibis-hk-dal-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3E_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3E_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS

      - name: System diagnostics
        run: |
          {
            echo "ACIRM R3E science-window IBIS HK resolver and DAL smoke test"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=SCIENCE_WINDOW_IBIS_HK_RESOLVER_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY"
            echo ""
            uname -a || true
            echo ""
            df -h || true
            echo ""
            free -h || true
            echo ""
            echo "HEASARC IPv4 HTTPS probe"
            curl -4 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R3E_RESULTS/logs/system_diagnostics.log

      - name: Pull OSA Docker image
        continue-on-error: true
        run: |
          {
            echo "Docker version"
            docker --version || true
            docker info || true
            echo ""
            echo "Pull integralsw/osa:latest"
            docker pull integralsw/osa:latest || true
          } | tee ACIRM_R21AX_R7G_R3E_RESULTS/logs/docker_pull.log

      - name: Download SCW members and AUX ADP products including IBIS HK
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import csv
          import gzip
          import hashlib
          import json
          import re
          import shutil
          import subprocess
          import time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3E_SCIENCE_WINDOW_IBIS_HK_RESOLVER_AND_DAL_SMOKE_LIGHT"

          out = Path("ACIRM_R21AX_R7G_R3E_RESULTS")
          data = out / "data"
          data.mkdir(parents=True, exist_ok=True)

          base_https = "https://heasarc.gsfc.nasa.gov/FTP/integral/data"
          base_http = "http://heasarc.gsfc.nasa.gov/FTP/integral/data"

          rev = "2504"
          scw = "250400090010"

          scw_dir = data / "scw" / rev / f"{scw}.001"
          aux_adp_dir = data / "aux" / "adp" / f"{rev}.001"

          scw_dir.mkdir(parents=True, exist_ok=True)
          aux_adp_dir.mkdir(parents=True, exist_ok=True)

          remote_scw = [
              f"{base_https}/scw/{rev}/{scw}.001",
              f"{base_http}/scw/{rev}/{scw}.001",
          ]

          remote_aux = [
              f"{base_https}/aux/adp/{rev}.001",
              f"{base_http}/aux/adp/{rev}.001",
          ]

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def is_gzip(path):
              try:
                  with open(path, "rb") as f:
                      return f.read(2) == b"\x1f\x8b"
              except Exception:
                  return False

          def is_fits(path):
              try:
                  with open(path, "rb") as f:
                      head = f.read(16)
                  return head.startswith(b"SIMPLE") or head.startswith(b"XTENSION")
              except Exception:
                  return False

          def accept(path):
              if not path.exists():
                  return False, "missing"
              size = path.stat().st_size
              if size <= 1024:
                  return False, f"too_small_{size}"
              if is_gzip(path):
                  return True, "gzip"
              if is_fits(path):
                  return True, "fits"
              return False, "not_fits_or_gzip"

          def norm(name):
              return Path(str(name).strip().split("[")[0].strip()).name

          def materialize(tmp, final_path):
              final_path.parent.mkdir(parents=True, exist_ok=True)

              if is_gzip(tmp):
                  with gzip.open(tmp, "rb") as src, open(final_path, "wb") as dst:
                      shutil.copyfileobj(src, dst)
                  tmp.unlink(missing_ok=True)
              else:
                  if final_path.exists():
                      final_path.unlink()
                  tmp.rename(final_path)

          def curl(url, tmp):
              if tmp.exists():
                  tmp.unlink()

              cmd = [
                  "curl",
                  "-4",
                  "-L",
                  "--retry", "8",
                  "--retry-delay", "10",
                  "--connect-timeout", "90",
                  "--max-time", "1200",
                  "--fail",
                  "-o", str(tmp),
                  url,
              ]

              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              ok, reason = accept(tmp)
              return p.returncode, ok, reason, p.stdout[-4000:]

          all_rows = []

          def download(name, final_dir, roots, category):
              expected = norm(name)
              final_name = expected[:-3] if expected.endswith(".gz") else expected
              final = final_dir / final_name

              if final.exists() and final.stat().st_size > 1024:
                  return True, [{
                      "category": category,
                      "expected_name": expected,
                      "final_name": final_name,
                      "url": "already_exists",
                      "attempt": 0,
                      "returncode": 0,
                      "ok": True,
                      "reason": "already_exists",
                      "final_path": str(final),
                      "final_bytes": final.stat().st_size,
                      "final_sha256": sha256_file(final),
                      "log_tail": "",
                  }]

              candidates = []
              for root in roots:
                  candidates.append(f"{root}/{expected}")
                  if expected.endswith(".fits") and not expected.endswith(".fits.gz"):
                      candidates.append(f"{root}/{expected}.gz")
                  if expected.endswith(".fits.gz"):
                      candidates.append(f"{root}/{expected[:-3]}")

              rows = []

              for i, url in enumerate(candidates, 1):
                  tmp = final_dir / f".download_{final_name}_{i}.part"

                  row = {
                      "category": category,
                      "expected_name": expected,
                      "final_name": final_name,
                      "url": url,
                      "attempt": i,
                      "returncode": "",
                      "ok": False,
                      "reason": "",
                      "final_path": str(final),
                      "final_bytes": 0,
                      "final_sha256": "",
                      "log_tail": "",
                  }

                  try:
                      rc, ok, reason, log = curl(url, tmp)
                      row["returncode"] = rc
                      row["reason"] = reason
                      row["log_tail"] = log

                      if ok:
                          materialize(tmp, final)
                          if final.exists() and final.stat().st_size > 1024:
                              row.update(
                                  ok=True,
                                  final_bytes=final.stat().st_size,
                                  final_sha256=sha256_file(final),
                              )
                              rows.append(row)
                              return True, rows
                  except Exception as e:
                      row["reason"] = repr(e)

                  rows.append(row)

              return False, rows

          scw_seed = [
              "swg.fits",
              "sc_time.fits",
              "sc_attitude.fits",
              "sc_gti.fits",
              "sc_hk.fits",
              "sc_modes.fits",
              "sc_orbit_param.fits",
              "spi_oper.fits",
              "spi_spectra.fits",
              "spi_gti.fits",
              "spi_hk.fits",
              "spi_science_hk.fits",
              "spi_science_param.fits",
              "spi_acs.fits",
              "spi_block.fits",
              "ibis_hk.fits",
              "ibis_hk.fits.gz",
          ]

          discovered = set(scw_seed)

          ok, rows = download("swg.fits", scw_dir, remote_scw, "scw")
          all_rows += rows

          swg_path = scw_dir / "swg.fits"
          parse_rows = []

          if swg_path.exists():
              try:
                  text = swg_path.read_bytes().decode("latin1", "ignore")
                  for idx, m in enumerate(re.findall(r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)", text)):
                      clean = norm(m)
                      if clean and clean != "swg.fits":
                          discovered.add(clean)
                          parse_rows.append({
                              "index": idx,
                              "reference": m,
                              "clean_name": clean,
                              "source": "raw_swg_regex",
                              "error": "",
                          })
              except Exception as e:
                  parse_rows.append({
                      "index": "",
                      "reference": "",
                      "clean_name": "",
                      "source": "raw_swg_regex",
                      "error": repr(e),
                  })

          scw_status = []

          for name in sorted(discovered):
              ok, rows = download(name, scw_dir, remote_scw, "scw")
              all_rows += rows

              final = norm(name)
              final = final[:-3] if final.endswith(".gz") else final
              fp = scw_dir / final

              scw_status.append({
                  "member_name": name,
                  "final_name": final,
                  "ok": ok and fp.exists(),
                  "final_path": str(fp),
                  "final_bytes": fp.stat().st_size if fp.exists() else 0,
                  "final_sha256": sha256_file(fp) if fp.exists() and fp.stat().st_size > 0 else "",
              })

          aux_seed = [
              "orbit_historic.fits",
              "attitude_historic.fits",
              "time_correlation.fits",
              "pointing_definition_predicted_0001.fits",
              "pointing_definition_predicted.fits",
              "pointing_definition_historic.fits",
              "pointing_definition_predicted_0000.fits",
              "pointing_definition_predicted_0002.fits",
              "observation_log.fits",
              "moc_out_of_limits.fits",
          ]

          aux_status = []

          for name in aux_seed:
              ok, rows = download(name, aux_adp_dir, remote_aux, "aux_adp")
              all_rows += rows

              final = norm(name)
              final = final[:-3] if final.endswith(".gz") else final
              fp = aux_adp_dir / final

              aux_status.append({
                  "member_name": name,
                  "final_name": final,
                  "ok": ok and fp.exists(),
                  "final_path": str(fp),
                  "final_bytes": fp.stat().st_size if fp.exists() else 0,
                  "final_sha256": sha256_file(fp) if fp.exists() and fp.stat().st_size > 0 else "",
              })

          tables = [
              ("r3e_swg_references_parsed.csv", parse_rows, ["index", "reference", "clean_name", "source", "error"]),
              ("r3e_download_manifest.csv", all_rows, ["category", "expected_name", "final_name", "url", "attempt", "returncode", "ok", "reason", "final_path", "final_bytes", "final_sha256", "log_tail"]),
              ("r3e_scw_group_member_status.csv", scw_status, ["member_name", "final_name", "ok", "final_path", "final_bytes", "final_sha256"]),
              ("r3e_aux_adp_status.csv", aux_status, ["member_name", "final_name", "ok", "final_path", "final_bytes", "final_sha256"]),
          ]

          for filename, rows, fields in tables:
              with open(out / filename, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      for k in fields:
                          r.setdefault(k, "")
                      w.writerow(r)

          final_files = [
              {"path": str(p), "bytes": p.stat().st_size, "sha256": sha256_file(p)}
              for p in sorted(data.rglob("*.fits"))
          ]

          with open(out / "r3e_final_local_fits_files.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["path", "bytes", "sha256"])
              w.writeheader()
              w.writerows(final_files)

          summary = {
              "run_id": RUN_ID,
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "SCIENCE_WINDOW_IBIS_HK_RESOLVER_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY",
              "swg_download_ok": (scw_dir / "swg.fits").exists(),
              "scw_member_ok_count": sum(1 for r in scw_status if r["ok"]),
              "scw_member_total_count": len(scw_status),
              "aux_adp_ok_count": sum(1 for r in aux_status if r["ok"]),
              "aux_adp_total_count": len(aux_status),
              "ibis_hk_ok": (scw_dir / "ibis_hk.fits").exists(),
              "local_fits_file_count": len(final_files),
              "final_status": (
                  "R21AX_R7G_R3E_SCIENCE_WINDOW_IBIS_HK_READY_FOR_DAL_VERIFY_NO_511_YET"
                  if (scw_dir / "ibis_hk.fits").exists()
                  else "R21AX_R7G_R3E_SCIENCE_WINDOW_IBIS_HK_DOWNLOAD_INCOMPLETE_NO_PHYSICAL_NULL"
              ),
          }

          (out / "R3E_SCIENCE_WINDOW_IBIS_HK_RESOLVER_SUMMARY.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True),
              encoding="utf-8",
          )

          print(json.dumps(summary, indent=2))
          PY

      - name: Run DAL verify after IBIS HK resolving
        continue-on-error: true
        run: |
          {
            echo "Run R3E DAL verify after IBIS HK resolving"
            docker run --rm \
              -v "$PWD/ACIRM_R21AX_R7G_R3E_RESULTS/data:/data" \
              -v "$PWD/ACIRM_R21AX_R7G_R3E_RESULTS/logs:/logs" \
              integralsw/osa:latest bash -lc '
                set +e

                mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep
                cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                [ -d /opt/osa/lib ] && export LD_LIBRARY_PATH=/opt/osa/lib:${LD_LIBRARY_PATH:-}
                [ -d /opt/osa/lib64 ] && export LD_LIBRARY_PATH=/opt/osa/lib64:${LD_LIBRARY_PATH:-}

                source /opt/osa/bin/isdc_init_env.sh || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                TARGET=/data/scw/2504/250400090010.001/swg.fits

                echo "environment"
                env | sort | grep -E "^(ISDC|OSA|REP|PFILES|PATH|LD_LIBRARY_PATH|COMMONLOGFILE|HEADAS|CFITSIO)" || true

                echo "local data files"
                find /data -maxdepth 6 -type f -printf "%p %s\n" | sort || true

                echo "dal_verify swg.fits"
                timeout 420 dal_verify "$TARGET" 2>&1 | head -1400 || true

                echo "og_create parameter probe"
                timeout 90 og_create 2>&1 | head -260 || true

                echo "commonlog tail"
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -700 || true
              '
          } | tee ACIRM_R21AX_R7G_R3E_RESULTS/logs/r3e_dal_verify_after_ibis_hk_resolve.log

      - name: Analyze R3E logs
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import csv
          import json
          import re
          import time
          from pathlib import Path

          out = Path("ACIRM_R21AX_R7G_R3E_RESULTS")
          log = out / "logs/r3e_dal_verify_after_ibis_hk_resolve.log"
          txt = log.read_text(errors="replace") if log.exists() else ""

          summary_path = out / "R3E_SCIENCE_WINDOW_IBIS_HK_RESOLVER_SUMMARY.json"
          res = json.loads(summary_path.read_text()) if summary_path.exists() else {}

          missing = []
          if "DAL_FILE_NOT_ACCESSIBLE" in txt or "status -2004" in txt:
              missing = sorted(set(
                  re.findall(r"(/data/[A-Za-z0-9_./+-]+\.fits(?:\[[^\]]+\])?)", txt)
                  + re.findall(r"([A-Za-z0-9_./+-]+\.fits(?:\[[^\]]+\])?)", txt)
              ))

          checks = {
              "log_exists": log.exists(),
              "swg_download_ok": bool(res.get("swg_download_ok", False)),
              "scw_member_ok_count": res.get("scw_member_ok_count", 0),
              "scw_member_total_count": res.get("scw_member_total_count", 0),
              "aux_adp_ok_count": res.get("aux_adp_ok_count", 0),
              "aux_adp_total_count": res.get("aux_adp_total_count", 0),
              "ibis_hk_ok": bool(res.get("ibis_hk_ok", False)),
              "local_fits_file_count": res.get("local_fits_file_count", 0),
              "dal_verify_invoked": "dal_verify swg.fits" in txt,
              "dal_file_not_accessible_seen": "DAL_FILE_NOT_ACCESSIBLE" in txt or "status -2004" in txt,
              "isdc_env_missing_seen": "ISDC_ENV is not set" in txt or "env. variable ISDC_ENV is not set" in txt,
              "parameter_init_error_seen": "Parameter initialization error" in txt or "status -3003" in txt,
              "og_create_probe_invoked": "og_create parameter probe" in txt,
              "missing_reference_count_context": len(missing),
          }

          if checks["dal_verify_invoked"] and not checks["dal_file_not_accessible_seen"] and not checks["isdc_env_missing_seen"]:
              status = "R21AX_R7G_R3E_DAL_VERIFY_REACHED_GROUP_AUX_IBIS_HK_LAYER_NO_511_YET_REVIEW_REQUIRED"
          elif checks["dal_file_not_accessible_seen"]:
              status = "R21AX_R7G_R3E_DAL_STILL_REQUIRES_ADDITIONAL_MEMBER_NO_511_NO_PHYSICAL_NULL"
          elif checks["isdc_env_missing_seen"] or checks["parameter_init_error_seen"]:
              status = "R21AX_R7G_R3E_ENV_OR_PARAMETER_LAYER_REGRESSION_NO_511_NO_PHYSICAL_NULL"
          else:
              status = "R21AX_R7G_R3E_LOGS_READY_FOR_AUDIT_NO_511_NO_PHYSICAL_NULL"

          with open(out / "r3e_dal_missing_reference_context.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["missing_reference_context"])
              w.writeheader()
              for x in missing:
                  w.writerow({"missing_reference_context": x})

          final = {
              "run_id": "ACIRM_R21AX_R7G_R3E_SCIENCE_WINDOW_IBIS_HK_RESOLVER_AND_DAL_SMOKE_LIGHT",
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "SCIENCE_WINDOW_IBIS_HK_RESOLVER_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY",
              "checks": checks,
              "final_status": status,
          }

          (out / "R3E_DAL_SMOKE_TEST_SUMMARY.json").write_text(
              json.dumps(final, indent=2, sort_keys=True),
              encoding="utf-8",
          )

          with open(out / "r3e_checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          print(json.dumps(final, indent=2))
          PY

      - name: Build LIGHT audit package only
        if: always()
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/logs

          cp -r ACIRM_R21AX_R7G_R3E_RESULTS/logs/* ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R3E_RESULTS/*.json ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/ || true
          cp ACIRM_R21AX_R7G_R3E_RESULTS/*.csv ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/ || true

          echo "SCW and AUX/ADP FITS files were downloaded temporarily on the GitHub runner; FITS files are excluded from phone artifact. No 511 metric." > ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt

          du -h ACIRM_R21AX_R7G_R3E_RESULTS/data > ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/data_size_report.txt || true
          find ACIRM_R21AX_R7G_R3E_RESULTS/data -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/data_file_list.csv || true

          cat > ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS/R3E_CLAIM_BOUNDARY.txt <<'EOF'
          ACIRM R3E claim boundary:
          - Science-window IBIS HK resolver and DAL smoke test only.
          - No 511 keV metric is computed.
          - Not full OSA proof.
          - Not 511 keV discovery.
          - Any network/runtime/DAL member failure is not a physical null.
          EOF

          zip -r ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS.zip ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS
          sha256sum ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS.zip > ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R3E LIGHT artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3E_LIGHT_RESULTS.zip.sha256.txt
