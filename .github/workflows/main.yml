name: ACIRM R17K R9C Compact Trace Synthesis From Existing Artifacts

on:
  workflow_dispatch:
    inputs:
      max_artifacts:
        required: false
        default: '65'
      max_download_mb:
        required: false
        default: '350'
      scan_limit_mb_per_file:
        required: false
        default: '5'

permissions:
  contents: read
  actions: read

jobs:
  r17k-r9c-compact-trace-synthesis:
    runs-on: ubuntu-latest
    timeout-minutes: 80
    env:
      MAX_ARTIFACTS: ${{ inputs.max_artifacts }}
      MAX_DOWNLOAD_MB: ${{ inputs.max_download_mb }}
      SCAN_LIMIT_MB_PER_FILE: ${{ inputs.scan_limit_mb_per_file }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout repo shallow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare folders
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R9C_OUTPUTS logs scripts artifact_bank extracted_artifacts
          cat > ACIRM_R17K_R9C_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R9C_COMPACT_TRACE_SYNTHESIS_FROM_EXISTING_ARTIFACTS
          USES PRIOR GITHUB ACTIONS ARTIFACTS / COMMITTED FILES ONLY
          NO LAT RERUN
          NO SPI RERUN
          NO NEW PHOTON OR EVENT FIT
          PURPOSE: synthesize an exploratory product-first reverse trace from R9A/R8Y/R8Z/R21AX/R9C/LAT artifacts
          EXPLORATORY_TRACE_SYNTHESIS_ONLY
          NOT_OFFICIAL_511_PROOF
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_ACIRM_PROOF
          EOF
          printf 'MAX_ARTIFACTS=%s\nMAX_DOWNLOAD_MB=%s\nSCAN_LIMIT_MB_PER_FILE=%s\nGH_REPO=%s\n' "$MAX_ARTIFACTS" "$MAX_DOWNLOAD_MB" "$SCAN_LIMIT_MB_PER_FILE" "$GH_REPO" > ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_INPUTS.txt

      - name: Install minimal tools
        shell: bash
        run: |
          set +e
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip jq ca-certificates python3 > logs/apt_install.log 2>&1

      - name: Download prior artifacts with curl
        shell: bash
        run: |
          set +e
          echo 'artifact_id,name,size_in_bytes,created_at,status,path,error' > ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_ARTIFACT_DOWNLOAD_MANIFEST.csv
          max_art="${MAX_ARTIFACTS:-65}"
          cap_bytes=$(python3 - <<'PY'
          import os
          print(int(float(os.environ.get('MAX_DOWNLOAD_MB','350'))*1024*1024))
          PY
          )
          downloaded=0
          total=0
          candidates=0
          errors=0
          page=1
          while [ "$page" -le 10 ] && [ "$downloaded" -lt "$max_art" ]; do
            api="https://api.github.com/repos/${GH_REPO}/actions/artifacts?per_page=100&page=${page}"
            curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" -o "logs/artifacts_page_${page}.json" 2>> logs/r9c_curl_errors.log
            if [ $? -ne 0 ]; then
              echo "artifact_list_page_${page}_failed" >> logs/r9c_curl_errors.log
              break
            fi
            count=$(jq '.artifacts | length' "logs/artifacts_page_${page}.json" 2>/dev/null || echo 0)
            if [ "$count" = "0" ]; then break; fi
            jq -r '.artifacts[] | select(.expired == false) | [.id,.name,.size_in_bytes,.created_at,.archive_download_url] | @tsv' "logs/artifacts_page_${page}.json" > "logs/artifacts_page_${page}.tsv"
            while IFS=$'\t' read -r aid aname asize created aurl; do
              echo "$aname" | grep -Eiq 'ACIRM|R17K|R8Y|R8Z|R9A|R9B|R21AX|R7E|R7F|R6|LAT|SPI511|511|PHOTON|TRACE|minus14|R9C' || continue
              candidates=$((candidates+1))
              safe=$(python3 - <<PY
          import re
          s=${aname@Q}
          print(re.sub(r'[^A-Za-z0-9._-]+','_',s)[:150])
          PY
          )
              dest="artifact_bank/${safe}__artifact_${aid}.zip"
              if [ -z "$asize" ]; then asize=0; fi
              if [ $((total + asize)) -gt "$cap_bytes" ]; then
                printf '%s,%s,%s,%s,%s,%s,%s\n' "$aid" "$aname" "$asize" "$created" "SKIP_SIZE_CAP" "$dest" "size cap" >> ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_ARTIFACT_DOWNLOAD_MANIFEST.csv
                continue
              fi
              curl -fL --retry 2 --retry-delay 2 \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$aurl" -o "$dest" > "logs/download_${aid}.log" 2>&1
              rc=$?
              if [ "$rc" -eq 0 ] && unzip -t "$dest" > "logs/unzip_test_${aid}.log" 2>&1; then
                sz=$(stat -c%s "$dest" 2>/dev/null || echo 0)
                total=$((total + sz))
                downloaded=$((downloaded + 1))
                printf '%s,%s,%s,%s,%s,%s,%s\n' "$aid" "$aname" "$asize" "$created" "OK" "$dest" "" >> ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_ARTIFACT_DOWNLOAD_MANIFEST.csv
              else
                err=$(tail -c 220 "logs/download_${aid}.log" 2>/dev/null | tr '\n,' '  ')
                errors=$((errors + 1))
                rm -f "$dest"
                printf '%s,%s,%s,%s,%s,%s,%s\n' "$aid" "$aname" "$asize" "$created" "DOWNLOAD_FAIL" "$dest" "$err" >> ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_ARTIFACT_DOWNLOAD_MANIFEST.csv
              fi
              if [ "$downloaded" -ge "$max_art" ]; then break; fi
              if [ "$total" -ge "$cap_bytes" ]; then break; fi
            done < "logs/artifacts_page_${page}.tsv"
            page=$((page+1))
          done
          python3 - <<PY
          import json
          summary={'downloaded_artifact_count':int(${downloaded}),'downloaded_bytes':int(${total}),'candidate_count_seen':int(${candidates}),'error_count':int(${errors}),'method':'curl_L_redirect_safe'}
          open('ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_ARTIFACT_DOWNLOAD_SUMMARY.json','w').write(json.dumps(summary,indent=2))
          PY
          echo "FETCH_EXIT=0" | tee ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_FETCH_EXIT.txt

      - name: Copy optional committed ACIRM zip packages
        shell: bash
        run: |
          set +e
          find . -maxdepth 4 -type f -name '*ACIRM*.zip' ! -path './artifact_bank/*' ! -path './extracted_artifacts/*' -printf '%p\n' | sort > ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_COMMITTED_ZIP_CANDIDATES.txt
          n=0
          while IFS= read -r z; do
            [ -f "$z" ] || continue
            safe=$(basename "$z" | tr -c 'A-Za-z0-9._-' '_')
            cp "$z" "artifact_bank/COMMITTED_${safe}" 2>/dev/null && n=$((n+1))
          done < ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_COMMITTED_ZIP_CANDIDATES.txt
          echo "committed_zip_copied_count=$n" > ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_COMMITTED_ZIP_SUMMARY.txt

      - name: Extract and synthesize trace
        shell: bash
        run: |
          set +e
          cat > scripts/r9c_synthesis.py <<'PY'
          import csv, json, math, os, re, zipfile, hashlib
          from pathlib import Path
          OUT=Path('ACIRM_R17K_R9C_OUTPUTS'); BANK=Path('artifact_bank'); EXT=Path('extracted_artifacts')
          EXT.mkdir(exist_ok=True)
          limit=int(float(os.environ.get('SCAN_LIMIT_MB_PER_FILE','5'))*1024*1024)
          errors=[]; extracted=[]; docs=[]; selected=[]; gates=[]; ledger=[]
          KEYGROUPS={
            'spi511_response':['R8Y','R8Z','R9A','511','508-514','507-515','governed','broad_507','poisson_tail','bootstrap_prob_z_ge_3','EMPIRICALLY_SUPPORTED'],
            'r9a_trace_open':['R9A','EXPLORATORY_BACKTRACE_OPENED','exploratory_backtrace_allowed','official_backtrace_permission','R17K_R9A'],
            'minus14_precursor':['minus14','MINUS14','-14','preparatory','shoulder','precursor','phase-pair','R7E','R7F'],
            'photon_alignment':['photon alignment','PHOTON_ALIGNMENT','alignment','phase alignment','packet_N','2239.664','f_R9C','frequency'],
            'r9c_anchor':['R9C','Cyg X-1','CygX-1','Cygnus','M_eff','f_raw','f_R9C'],
            'lat_delayed':['LAT','Fermi','30-100','plus21','+21','delayed','P5','TS','photons'],
            'r21ax_branch':['R21AX','R7E','R7F','R6G','R6H','R6I','R6M','R7A','R7G'],
            'claim_ceiling':['NOT_PROOF','NOT_DISCOVERY','NOT_SOURCE_ATTRIBUTION','NOT_PARTICLE_PROOF','DIAGNOSTIC_NOT_PROOF','EXPLORATORY']
          }
          group_counts={k:0 for k in KEYGROUPS}
          def safe(s): return re.sub(r'[^A-Za-z0-9._-]+','_',s)[:170]
          def extract(zpath,dest,depth=0):
            if depth>3: return
            try:
              with zipfile.ZipFile(zpath) as z:
                bad=z.testzip()
                if bad: errors.append({'stage':'zip_test','zip':str(zpath),'bad':bad})
                for m in z.infolist()[:3500]:
                  if m.is_dir() or m.file_size>35*1024*1024: continue
                  if '..' in Path(m.filename).parts: continue
                  out=dest/safe(m.filename.replace('/','__'))
                  out.parent.mkdir(parents=True,exist_ok=True)
                  try:
                    out.write_bytes(z.read(m))
                    extracted.append({'zip':str(zpath),'member':m.filename,'size':m.file_size,'path':str(out)})
                    if out.suffix.lower()=='.zip':
                      nd=dest/(out.stem+'_unzipped'); nd.mkdir(exist_ok=True); extract(out,nd,depth+1)
                  except Exception as e: errors.append({'stage':'member_extract','zip':str(zpath),'member':m.filename,'error':repr(e)[:240]})
            except Exception as e: errors.append({'stage':'zip_extract','zip':str(zpath),'error':repr(e)[:240]})
          for z in sorted(BANK.glob('*.zip')):
            d=EXT/safe(z.stem); d.mkdir(exist_ok=True); extract(z,d,0)
          allowed={'.txt','.md','.json','.csv','.log','.yml','.yaml','.tex'}
          priority_terms=['DECISION.json','TARGET_METRICS','BOOTSTRAP_SUMMARY','POISSON_TAILS','TRACE_LEDGER','REVERSE_TRACE_LEDGER','R9A','R8Y','R8Z','R21AX','R7F','R7E','PHOTON','R9C','LAT']
          for p in EXT.rglob('*'):
            if not p.is_file() or p.suffix.lower() not in allowed: continue
            try:
              sz=p.stat().st_size
              if sz>limit: continue
              txt=p.read_text(encoding='utf-8',errors='replace')
              low=txt.lower(); gh={}; score=0; snippets=[]
              for g,ks in KEYGROUPS.items():
                c=sum(low.count(k.lower()) for k in ks)
                if c: gh[g]=c; score+=c; group_counts[g]+=c
              if not score: continue
              pr=sum(20 for t in priority_terms if t.lower() in str(p).lower())
              if p.suffix.lower()=='.json': pr+=10
              if p.suffix.lower()=='.csv': pr+=6
              for term in ['R17K_R8Y','R17K_R8Z','R17K_R9A','R17K_R9B','minus14','PHOTON_ALIGNMENT','R9C','R21AX','507-515','508-514','LAT','plus21','2239.664']:
                i=low.find(term.lower())
                if i>=0: snippets.append(txt[max(0,i-160):min(len(txt),i+340)].replace('\n',' ')[:500])
              docs.append({'path':str(p),'size':sz,'score':score+pr,'raw_keyword_score':score,'priority_score':pr,'groups':';'.join(sorted(gh)),'hits_json':json.dumps(gh,sort_keys=True),'snippet':' || '.join(snippets[:4])})
            except Exception as e: errors.append({'stage':'scan','path':str(p),'error':repr(e)[:220]})
          docs=sorted(docs,key=lambda r:r['score'],reverse=True)
          def best_for(group, required=None, n=6):
            rows=[r for r in docs if group in r.get('groups','').split(';')]
            if required:
              rows=[r for r in rows if any(req.lower() in (r['path']+' '+r.get('snippet','')).lower() for req in required)] or rows
            return rows[:n]
          evidence={
            'spi511_response':best_for('spi511_response',['R8Y','R8Z','TARGET_METRICS','DECISION'],8),
            'r9a_trace_open':best_for('r9a_trace_open',['R9A','DECISION','TRACE_LEDGER'],6),
            'minus14_precursor':best_for('minus14_precursor',['R21AX','R7E','R7F','minus14'],8),
            'photon_alignment':best_for('photon_alignment',['PHOTON','alignment','2239.664','f_R9C'],8),
            'r9c_anchor':best_for('r9c_anchor',['R9C','f_R9C','2239.664','Cyg'],8),
            'lat_delayed':best_for('lat_delayed',['LAT','plus21','30-100','P5'],8),
            'r21ax_branch':best_for('r21ax_branch',['R21AX','R7F','R7E','R6'],8),
            'claim_ceiling':best_for('claim_ceiling',['NOT_PROOF','EXPLORATORY'],6)
          }
          for g,rows in evidence.items():
            for r in rows:
              selected.append({'evidence_group':g,'path':r['path'],'score':r['score'],'groups':r['groups'],'snippet':r.get('snippet','')})
          def present(g): return len(evidence.get(g,[]))>0
          gate_defs=[
            ('G0_EXISTING_ARTIFACT_ACCESS','existing artifacts extracted and scanned',len(extracted)>0),
            ('G1_PRODUCT_511_RESPONSE','R8Y/R8Z/R9A governed 511 response artifacts located',present('spi511_response') and present('r9a_trace_open')),
            ('G2_OFFICIAL_PROOF_BLOCK_PRESERVED','claim ceilings / not-proof governance located',present('claim_ceiling')),
            ('G3_PRECURSOR_MINUS14_CONTEXT','minus14 / preparatory precursor artifacts located',present('minus14_precursor')),
            ('G4_PHOTON_ALIGNMENT_OR_R9C_CONTEXT','photon alignment or R9C anchor artifacts located',present('photon_alignment') or present('r9c_anchor')),
            ('G5_LAT_DELAYED_OR_R21AX_CONTEXT','LAT delayed / R21AX branch artifacts located',present('lat_delayed') or present('r21ax_branch')),
            ('G6_SOURCE_ATTRIBUTION_ALLOWED','source attribution is allowed only after new locked causal proof',False),
            ('G7_PARTICLE_PROOF_ALLOWED','particle proof is allowed only after official 511 + physics validation',False)
          ]
          for gid,desc,ok in gate_defs:
            gates.append({'gate_id':gid,'description':desc,'status':'PASS' if ok else ('BLOCKED' if 'ALLOWED' in gid or 'PROOF' in gid or 'ATTRIBUTION' in gid else 'MISS'),'claim_effect':'enables low-ceiling synthesis' if ok and gid in ['G1_PRODUCT_511_RESPONSE','G3_PRECURSOR_MINUS14_CONTEXT','G4_PHOTON_ALIGNMENT_OR_R9C_CONTEXT','G5_LAT_DELAYED_OR_R21AX_CONTEXT'] else 'no claim upgrade'})
          ledger.append({'trace_order':0,'stage':'PRODUCT_RESPONSE_INPUT','status':'PASS_EXPLORATORY','evidence_group':'spi511_response','interpretation':'Use governed broad 507-515 SPI511 response as diagnostic product candidate; locked 508-514 remains subthreshold.','claim_ceiling':'DIAGNOSTIC_511_RESPONSE_NOT_PROOF'})
          ledger.append({'trace_order':1,'stage':'TRACE_PERMISSION_GOVERNANCE','status':'PASS_EXPLORATORY_ONLY','evidence_group':'r9a_trace_open','interpretation':'R9A allows exploratory trace only while official backtrace stays blocked.','claim_ceiling':'EXPLORATORY_BACKTRACE_ONLY'})
          ledger.append({'trace_order':2,'stage':'PRECURSOR_CONTEXT','status':'FOUND' if present('minus14_precursor') else 'NOT_FOUND','evidence_group':'minus14_precursor','interpretation':'Existing artifacts contain minus14/preparatory precursor context to test temporal ordering, but not causality.','claim_ceiling':'NO_CAUSAL_PROOF'})
          ledger.append({'trace_order':3,'stage':'PHOTON_ALIGNMENT_OR_GATE_CONTEXT','status':'FOUND' if (present('photon_alignment') or present('r9c_anchor')) else 'NOT_FOUND','evidence_group':'photon_alignment/r9c_anchor','interpretation':'Existing artifacts contain alignment/R9C anchor context usable for exploratory product-first chain construction.','claim_ceiling':'NO_SOURCE_ATTRIBUTION'})
          ledger.append({'trace_order':4,'stage':'LAT_DELAYED_OR_BRANCH_CONTEXT','status':'FOUND' if (present('lat_delayed') or present('r21ax_branch')) else 'NOT_FOUND','evidence_group':'lat_delayed/r21ax_branch','interpretation':'Existing artifacts contain LAT/R21AX branch context as downstream or parallel witness, not proof.','claim_ceiling':'NOT_ACIRM_PROOF'})
          ledger.append({'trace_order':5,'stage':'SYNTHESIS_RESULT','status':'LOW_CEILING_TRACE_CANDIDATE','evidence_group':'combined','interpretation':'A single exploratory trace can be drafted from existing artifacts, but it is not a proof chain and cannot assign source or particle production.','claim_ceiling':'SYNTHESIS_ONLY_NOT_PROOF'})
          ready = present('spi511_response') and present('r9a_trace_open') and present('minus14_precursor') and (present('photon_alignment') or present('r9c_anchor')) and (present('lat_delayed') or present('r21ax_branch'))
          partial = present('spi511_response') and (present('minus14_precursor') or present('photon_alignment') or present('r9c_anchor') or present('lat_delayed') or present('r21ax_branch'))
          if ready:
            decision='R17K_R9C_EXPLORATORY_PRODUCT_TO_PRECURSOR_ALIGNMENT_TRACE_SYNTHESIZED_FROM_EXISTING_ARTIFACTS_LOW_CEILING_NOT_PROOF'
            next_step='R9D_TARGETED_LOW_CEILING_TRACE_NARRATIVE_AND_GAP_AUDIT'
          elif partial:
            decision='R17K_R9C_PARTIAL_EXPLORATORY_TRACE_SYNTHESIS_POSSIBLE_MISSING_ONE_OR_MORE_CONTEXT_AXES_NOT_PROOF'
            next_step='R9C_R2_FILL_MISSING_ARTIFACT_AXIS_OR_MANUAL_UPLOAD'
          else:
            decision='R17K_R9C_INSUFFICIENT_EXISTING_ARTIFACTS_FOR_TRACE_SYNTHESIS_NOT_PROOF'
            next_step='MANUAL_UPLOAD_REQUIRED_ARTIFACTS'
          def wcsv(path,rows):
            keys=[]
            for r in rows:
              for k in r:
                if k not in keys: keys.append(k)
            if not keys: keys=['empty']
            with open(path,'w',newline='',encoding='utf-8') as f:
              w=csv.DictWriter(f,fieldnames=keys); w.writeheader(); w.writerows(rows)
          wcsv(OUT/'R17K_R9C_EXTRACTED_FILE_MANIFEST.csv',extracted)
          wcsv(OUT/'R17K_R9C_SELECTED_EVIDENCE_FILES.csv',selected)
          wcsv(OUT/'R17K_R9C_GATES.csv',gates)
          wcsv(OUT/'R17K_R9C_EXPLORATORY_TRACE_LEDGER.csv',ledger)
          wcsv(OUT/'R17K_R9C_ALL_HITS_RANKED.csv',docs[:1000])
          (OUT/'R17K_R9C_SCAN_ERRORS.json').write_text(json.dumps(errors,indent=2),encoding='utf-8')
          narrative=f'''# ACIRM R17K R9C Exploratory Trace Synthesis

الحكم: {decision}

هذه ليست نتيجة إثبات. R9C يركب فقط سلسلة استكشافية من artifacts موجودة:

1. 511 response candidate من R8Y/R8Z/R9A.
2. قفل عدم الإثبات محفوظ: official proof/backtrace blocked.
3. سياق minus14 / precursor موجود كأرضية ترتيب زمني.
4. سياق photon alignment أو R9C anchor موجود كمدخل gate/alignment منخفض السقف.
5. سياق LAT/R21AX موجود كشاهد فرعي أو downstream وليس نسبة مصدر.

السقف: EXPLORATORY_TRACE_SYNTHESIS_ONLY / NOT_OFFICIAL_511_PROOF / NOT_PARTICLE_PROOF / NOT_SOURCE_ATTRIBUTION / NOT_ACIRM_PROOF.

الخطوة التالية: {next_step}.
'''
          (OUT/'R17K_R9C_TRACE_SYNTHESIS_REPORT_AR.md').write_text(narrative,encoding='utf-8')
          summary={
            'run_id':'R17K_R9C_COMPACT_TRACE_SYNTHESIS_FROM_EXISTING_ARTIFACTS',
            'decision':decision,
            'proof_allowed':False,
            'official_backtrace_permission':False,
            'exploratory_trace_synthesized':ready or partial,
            'low_ceiling_trace_ready':ready,
            'source_attribution_allowed':False,
            'particle_proof_allowed':False,
            'artifact_zip_count':len(list(BANK.glob('*.zip'))),
            'extracted_file_count':len(extracted),
            'scanned_hit_file_count':len(docs),
            'selected_evidence_file_count':len(selected),
            'keyword_group_counts':group_counts,
            'gates':gates,
            'trace_ledger':ledger,
            'top_selected_evidence':selected[:20],
            'next_step':next_step,
            'claim_ceiling':['EXPLORATORY_TRACE_SYNTHESIS_ONLY','DIAGNOSTIC_511_RESPONSE_CANDIDATE','NOT_OFFICIAL_511_PROOF','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_ACIRM_PROOF']
          }
          (OUT/'R17K_R9C_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          sha=hashlib.sha256((OUT/'R17K_R9C_DECISION.json').read_bytes()).hexdigest()
          (OUT/'R17K_R9C_DECISION_JSON_SHA256.txt').write_text(sha+'  R17K_R9C_DECISION.json\n',encoding='utf-8')
          PY
          python3 scripts/r9c_synthesis.py > logs/r9c_synthesis.log 2>&1
          echo "SYNTHESIS_EXIT=$?" | tee ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_SYNTHESIS_EXIT.txt

      - name: Package artifact always
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R9C_OUTPUTS logs
          cp logs/*.log ACIRM_R17K_R9C_OUTPUTS/ 2>/dev/null || true
          find artifact_bank -maxdepth 1 -type f -printf '%p,%s\n' | sort > ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_DOWNLOADED_ARTIFACT_FILE_SIZES.csv 2>/dev/null || true
          df -h > ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_DF_END.txt
          free -h > ACIRM_R17K_R9C_OUTPUTS/R17K_R9C_FREE_END.txt
          zip -r ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT.zip ACIRM_R17K_R9C_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT.zip > ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT.zip ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT.zip.sha256.txt

      - name: Upload artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT
          path: |
            ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT.zip
            ACIRM_R17K_R9C_COMPACT_TRACE_SYNTHESIS_OUTPUT.zip.sha256.txt
          retention-days: 7
