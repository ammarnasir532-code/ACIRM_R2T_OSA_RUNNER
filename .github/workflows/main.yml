name: ACIRM R3P R2N fast IC master locator optional line retry

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2n-fast-ic-master-locator:
    runs-on: ubuntu-latest
    timeout-minutes: 50

    steps:
      - name: Prepare folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS/logs
          mkdir -p ACIRM_CACHE_R3P_R1
          echo "R2N_FAST_PREPARED"

      - name: Restore R3P R1 cache
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1
          restore-keys: |
            acirm-r21ax-r7g-r3p-r1-cache-

      - name: Run R2N IC master locator and optional line retry
        continue-on-error: true
        run: |
          set +e

          OUT="ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS"
          LIGHT="ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS"
          MAIN_LOG="$OUT/logs/main_execution.log"

          echo "R2N_FAST_STARTED" | tee "$MAIN_LOG"
          echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$MAIN_LOG"

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/logs/main_execution.log
          import json
          import shutil
          import time
          from pathlib import Path

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS")

          CACHE = Path("ACIRM_CACHE_R3P_R1")
          CACHE_DATA = CACHE / "data"
          CACHE_WORK = CACHE / "work"
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"

          for p in [OUT, DATA, WORK, LIGHT]:
              p.mkdir(parents=True, exist_ok=True)

          cache_ok = READY_FLAG.exists() and CACHE_DATA.exists() and CACHE_WORK.exists()

          print("ready_flag_exists", READY_FLAG.exists())
          print("cache_data_exists", CACHE_DATA.exists())
          print("cache_work_exists", CACHE_WORK.exists())
          print("cache_ok", cache_ok)

          if cache_ok:
              shutil.copytree(CACHE_DATA, DATA, dirs_exist_ok=True)
              shutil.copytree(CACHE_WORK, WORK, dirs_exist_ok=True)
              (OUT / "cache_ok.flag").write_text("CACHE_OK\n", encoding="utf-8")
          else:
              summary = {
                  "run_id": "ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR",
                  "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "final_status": "R2N_FAST_CACHE_MISS_IC_LOCATOR_ONLY_NO_SPI_NO_511_NO_PHYSICAL_NULL",
                  "scientific_status": "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL",
                  "checks": {
                      "ready_flag_exists": READY_FLAG.exists(),
                      "ic_master_found": False,
                      "line_retry_attempted": False,
                      "line_metric_exists": False
                  },
                  "claim_ceiling": "NOT_DISCOVERY_NOT_FINAL_PROOF_NOT_OSA_PROOF"
              }
              (LIGHT / "SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

          sudo chown -R "$(id -u):$(id -g)" "$OUT" "$LIGHT" ACIRM_CACHE_R3P_R1 2>/dev/null || true
          chmod -R u+rwX,go+rX "$OUT" "$LIGHT" ACIRM_CACHE_R3P_R1 2>/dev/null || true

          if [ -f "$OUT/cache_ok.flag" ]; then
            {
              echo "HOST_PREP_START"
              sudo apt-get update -y || true
              sudo apt-get install -y xvfb x11-xserver-utils zip || true
              pkill Xvfb 2>/dev/null || true
              Xvfb :99 -screen 0 1280x1024x24 -ac +extension GLX +render -noreset > "$OUT/logs/xvfb.log" 2>&1 &
              sleep 4
              export DISPLAY=:99
              xhost +local: 2>/dev/null || true
              docker --version || true
              docker pull integralsw/osa:latest || true
              echo "HOST_PREP_END"
            } 2>&1 | tee "$OUT/logs/host_prepare.log"

            cat > "$OUT/work/run_spi_r2n_fast.sh" <<'BASH'
          set +e

          echo "R2N_FAST_CONTAINER_START"

          mkdir -p /tmp/acirm_pfiles
          mkdir -p /tmp/acirm_work
          mkdir -p /tmp/acirm_rep
          mkdir -p /work/container_logs
          mkdir -p /work/products_line

          export DISPLAY=:99
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1
          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          if [ -d /opt/osa/lib ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
          fi

          if [ -d /opt/osa/lib64 ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
          fi

          cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

          source /opt/osa/bin/isdc_init_env.sh > /work/container_logs/isdc_init_env.log 2>&1 || true

          export DISPLAY=:99
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1
          export ISDC_ENV=/opt/osa
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          if [ -d /opt/osa/lib ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
          fi

          if [ -d /opt/osa/lib64 ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
          fi

          for f in /tmp/acirm_pfiles/*.par; do
            if [ -f "$f" ]; then
              sed -i 's/,ql,/,hl,/g' "$f" || true
              sed -i 's/,q,/,h,/g' "$f" || true
            fi
          done

          {
            echo "COMMAND_DISCOVERY"
            for c in spi_science_analysis pset punlearn plist timeout stdbuf fstruct fdump ftlist strings xdpyinfo find; do
              echo "$c=$(command -v "$c" || true)"
            done

            echo ""
            echo "ENV_AFTER_INIT"
            env | sort | grep -E "^(DISPLAY|HEADASNOQUERY|PIL|PFILES|ISDC|REP_BASE_PROD|COMMONLOGFILE|PATH|LD_LIBRARY_PATH)=" || true

            echo ""
            echo "DISPLAY_CHECK"
            xdpyinfo -display "$DISPLAY" 2>&1 | head -60 || true
          } > /work/container_logs/environment_and_display.txt 2>&1

          echo "IC_MASTER_SEARCH_START"

          {
            echo "SEARCH_ROOTS"
            for root in /opt/osa /isdc /data /work /usr/local /tmp; do
              if [ -e "$root" ]; then
                echo "ROOT_EXISTS $root"
              else
                echo "ROOT_MISSING $root"
              fi
            done

            echo ""
            echo "FIND_IC_MASTER_LIMITED"
            for root in /opt/osa /isdc /data /work /usr/local /tmp; do
              if [ -e "$root" ]; then
                timeout 35 find "$root" -type f -name "ic_master_file.fits" -print 2>/dev/null || true
              fi
            done

            echo ""
            echo "FIND_IDX_IC_DIRS"
            for root in /opt/osa /isdc /data /work /usr/local /tmp; do
              if [ -e "$root" ]; then
                timeout 20 find "$root" -type d -path "*/idx/ic" -print 2>/dev/null || true
              fi
            done
          } > /work/container_logs/ic_master_search.txt 2>&1

          grep -E "/ic_master_file\.fits$" /work/container_logs/ic_master_search.txt | sort -u > /work/container_logs/ic_master_candidates.txt || true

          {
            echo "SPI_CALIBRATION_HINT_SEARCH"
            for root in /opt/osa /isdc /data /work /usr/local /tmp; do
              if [ -e "$root" ]; then
                echo "### ROOT $root"
                timeout 35 find "$root" -type f \( \
                  -iname "*spi*coef*cal*" -o \
                  -iname "*SPI*COEF*CAL*" -o \
                  -iname "*gain*coef*" -o \
                  -iname "*spi*gain*" -o \
                  -iname "*ic_master_file.fits" \
                \) -printf "%p %s\n" 2>/dev/null | head -300 || true
              fi
            done
          } > /work/container_logs/spi_calibration_hint_search.txt 2>&1

          BEST_ROOT=""
          BEST_IC=""

          while IFS= read -r p; do
            case "$p" in
              */idx/ic/ic_master_file.fits)
                root="${p%/idx/ic/ic_master_file.fits}"
                if [ -f "$root/idx/ic/ic_master_file.fits" ]; then
                  BEST_ROOT="$root"
                  BEST_IC="$p"
                  break
                fi
                ;;
            esac
          done < /work/container_logs/ic_master_candidates.txt

          {
            echo "BEST_ROOT=$BEST_ROOT"
            echo "BEST_IC=$BEST_IC"
            if [ -n "$BEST_ROOT" ]; then
              echo "IC_MASTER_FOUND=True"
              ls -l "$BEST_ROOT/idx/ic/ic_master_file.fits" 2>/dev/null || true
            else
              echo "IC_MASTER_FOUND=False"
            fi
          } > /work/container_logs/ic_selection.env

          OG_FILE=$(find /work/og -type f -name "og_spi.fits" | head -1)
          echo "OG_FILE=$OG_FILE" > /work/container_logs/og_locator.txt

          if [ -z "$OG_FILE" ]; then
            echo "R2N_NO_REAL_OG_SPI_FITS" >> /work/container_logs/og_locator.txt
            echo "R2N_FAST_CONTAINER_END_NO_OG"
            exit 0
          fi

          if [ -z "$BEST_ROOT" ]; then
            echo "R2N_NO_IC_MASTER_FOUND_SKIP_LINE_RETRY" > /work/container_logs/line_retry_skipped.txt
            echo "R2N_FAST_CONTAINER_END_NO_IC"
            exit 0
          fi

          export REP_BASE_PROD="$BEST_ROOT"
          echo "REP_BASE_PROD=$REP_BASE_PROD" > /work/container_logs/selected_rep_base_prod.txt

          cp -f /tmp/acirm_pfiles/spi_science_analysis.par /work/container_logs/spi_science_analysis.par.used 2>/dev/null || true
          timeout 20 spi_science_analysis -h > /work/container_logs/spi_science_analysis_help.txt 2>&1 || true

          has_param() {
            KEY="$1"
            grep -q "^${KEY}," /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null
          }

          add_param() {
            KEY="$1"
            VALUE="$2"
            FILE="$3"
            if has_param "$KEY"; then
              echo "${KEY}=${VALUE}" >> "$FILE"
              echo "ADD_PARAM ${KEY}=${VALUE}"
            else
              echo "SKIP_PARAM ${KEY}"
            fi
          }

          safe_pset() {
            TASK="$1"
            KEY="$2"
            VALUE="$3"
            PAR="/tmp/acirm_pfiles/${TASK}.par"
            if [ -f "$PAR" ] && grep -q "^${KEY}," "$PAR" 2>/dev/null; then
              pset "$TASK" "${KEY}=${VALUE}" 2>/dev/null || true
              echo "PSET ${TASK} ${KEY}=${VALUE}"
            else
              echo "SKIP_PSET ${TASK} ${KEY}"
            fi
          }

          punlearn spi_science_analysis 2>/dev/null || true
          punlearn spiros 2>/dev/null || true
          punlearn spi_phase_hist 2>/dev/null || true
          punlearn spi_phase_analysis 2>/dev/null || true
          punlearn spi_obs_back 2>/dev/null || true
          punlearn spi_obs_background 2>/dev/null || true
          punlearn spi_background 2>/dev/null || true

          safe_pset spi_phase_hist orbit "no"
          safe_pset spi_phase_hist asini "0"
          safe_pset spi_phase_hist porb "1"
          safe_pset spi_phase_hist T90epoch "0"
          safe_pset spi_phase_hist ecc "0"
          safe_pset spi_phase_hist omega_d "0"
          safe_pset spi_phase_hist pporb "0"
          safe_pset spi_phase_hist ephemDOL ""
          safe_pset spi_phase_hist phaseBinNum "1"
          safe_pset spi_phase_hist phaseSameWidthBin "yes"
          safe_pset spi_phase_hist phaseBounds "0,1"
          safe_pset spi_phase_hist phaseSubtractOff "no"
          safe_pset spi_phase_hist phaseOffNum "0"

          safe_pset spi_phase_analysis orbit "no"
          safe_pset spi_phase_analysis asini "0"
          safe_pset spi_phase_analysis porb "1"
          safe_pset spi_phase_analysis T90epoch "0"
          safe_pset spi_phase_analysis ecc "0"
          safe_pset spi_phase_analysis omega_d "0"
          safe_pset spi_phase_analysis pporb "0"
          safe_pset spi_phase_analysis ephemDOL ""
          safe_pset spi_phase_analysis phaseBinNum "1"
          safe_pset spi_phase_analysis phaseSameWidthBin "yes"
          safe_pset spi_phase_analysis phaseBounds "0,1"
          safe_pset spi_phase_analysis phaseSubtractOff "no"
          safe_pset spi_phase_analysis phaseOffNum "0"

          safe_pset spiros nofsources "0"
          safe_pset spiros sigmathres "999"
          safe_pset spiros iteration-output "NO"
          safe_pset spiros optistat "CHI2"
          safe_pset spiros background-method "3"

          make_answers() {
            OUT="$1"
            rm -f "$OUT"
            for i in $(seq 1 500); do
              echo "" >> "$OUT"
              echo "3" >> "$OUT"
              echo "no" >> "$OUT"
              echo "yes" >> "$OUT"
              echo "0" >> "$OUT"
            done
          }

          guard_stream() {
            STATUS="$1"
            LOG="$2"
            orbit=0
            flat=0
            gedsat=0
            gui=0
            displayerr=0
            normalprompt=0
            status3004=0
            status3023=0
            status35603=0
            status250002=0
            calnotfound=0
            icmissing=0
            koverflow=0
            segfault=0
            kept=0
            maxkeep=1200000
            killed=0

            while IFS= read -r line; do
              case "$line" in *"Orbit asini parameter"*) orbit=$((orbit + 1));; esac
              case "$line" in *"Use archival flatfield observations"*) flat=$((flat + 1));; esac
              case "$line" in *"GEDSAT-ME2"*"VETOGATE"*) gedsat=$((gedsat + 1));; esac
              case "$line" in *"Attempting to launch GUI"*|*"TGClient"*) gui=$((gui + 1));; esac
              case "$line" in *"can't open display"*) displayerr=$((displayerr + 1));; esac
              case "$line" in *"Running in normal mode"*) normalprompt=$((normalprompt + 1));; esac
              case "$line" in *"default parameter prompting"*) normalprompt=$((normalprompt + 1));; esac
              case "$line" in *"status -3004"*) status3004=$((status3004 + 1));; esac
              case "$line" in *"status -3023"*) status3023=$((status3023 + 1));; esac
              case "$line" in *"status -35603"*) status35603=$((status35603 + 1));; esac
              case "$line" in *"status -250002"*) status250002=$((status250002 + 1));; esac
              case "$line" in *"CAL_NOT_FOUND"*) calnotfound=$((calnotfound + 1));; esac
              case "$line" in *"ic_master_file.fits"*|*"IC Master Group"*) icmissing=$((icmissing + 1));; esac
              case "$line" in *"kOVERFLOW"*|*"Overflow occurred"*) koverflow=$((koverflow + 1));; esac
              case "$line" in *"segmentation violation"*|*"Segmentation"*) segfault=$((segfault + 1));; esac

              if [ "$orbit" -gt 20 ]; then
                echo "ACIRM_GUARD_ORBIT_ASINI_LOOP_KILL" >> "$LOG"
                killed=1
                break
              fi

              if [ "$flat" -gt 30 ]; then
                echo "ACIRM_GUARD_FLATFIELD_LOOP_KILL" >> "$LOG"
                killed=1
                break
              fi

              if [ "$gedsat" -gt 30 ]; then
                echo "ACIRM_GUARD_GEDSAT_LOOP_KILL" >> "$LOG"
                killed=1
                break
              fi

              len=${#line}
              kept=$((kept + len + 1))
              if [ "$kept" -le "$maxkeep" ]; then
                printf '%s\n' "$line" >> "$LOG"
              fi
            done

            {
              echo "orbit_asini_prompt_count=$orbit"
              echo "flatfield_prompt_count=$flat"
              echo "gedsat_prompt_count=$gedsat"
              echo "gui_attempt_count=$gui"
              echo "display_error_count=$displayerr"
              echo "normal_prompt_count=$normalprompt"
              echo "status3004_count=$status3004"
              echo "status3023_count=$status3023"
              echo "status35603_count=$status35603"
              echo "status250002_count=$status250002"
              echo "cal_not_found_count=$calnotfound"
              echo "ic_master_message_count=$icmissing"
              echo "koverflow_count=$koverflow"
              echo "segfault_count=$segfault"
              echo "killed_by_guard=$killed"
              echo "log_bytes_kept=$kept"
            } >> "$STATUS"

            if [ "$killed" -eq 1 ]; then
              return 77
            fi

            return 0
          }

          CASE="R2N_FAST_IC_LINE_508_514"
          PARAMS="/work/container_logs/${CASE}.params.txt"
          ANSWERS="/work/container_logs/${CASE}.answers.txt"
          LOG="/work/container_logs/${CASE}.log"
          STATUS="/work/container_logs/${CASE}.status.txt"

          rm -f "$PARAMS" "$ANSWERS" "$LOG" "$STATUS"

          add_param "obs_group" "$OG_FILE" "$PARAMS"

          add_param "run_cat_extract" "no" "$PARAMS"
          add_param "run_pointing" "yes" "$PARAMS"
          add_param "run_binning" "yes" "$PARAMS"
          add_param "run_background" "no" "$PARAMS"
          add_param "run_spiros" "no" "$PARAMS"
          add_param "run_phase_analysis" "no" "$PARAMS"
          add_param "run_gaincorrection" "no" "$PARAMS"
          add_param "run_fullcheck" "no" "$PARAMS"
          add_param "use_pointing_filter" "no" "$PARAMS"
          add_param "run_simulation" "no" "$PARAMS"

          add_param "use_background_flatfields" "no" "$PARAMS"
          add_param "use_background_templates" "no" "$PARAMS"
          add_param "use_background_models" "no" "$PARAMS"
          add_param "spi_flatfield_ptsNbConstBack" "1" "$PARAMS"
          add_param "spi_flatfield_single" "yes" "$PARAMS"
          add_param "loc_spiflatfield_dol" "" "$PARAMS"
          add_param "spi_obs_back_nmodel" "1" "$PARAMS"

          add_param "spiros_mode" "SPECTRA" "$PARAMS"
          add_param "spiros_nofsources" "0" "$PARAMS"
          add_param "spiros_sigmathres" "999" "$PARAMS"
          add_param "spiros_iteration-output" "NO" "$PARAMS"
          add_param "spiros_optistat" "CHI2" "$PARAMS"
          add_param "spiros_background-method" "3" "$PARAMS"

          add_param "spi_phase_hist_orbit" "no" "$PARAMS"
          add_param "spi_phase_hist_asini" "0" "$PARAMS"
          add_param "spi_phase_hist_porb" "1" "$PARAMS"
          add_param "spi_phase_hist_T90epoch" "0" "$PARAMS"
          add_param "spi_phase_hist_ecc" "0" "$PARAMS"
          add_param "spi_phase_hist_omega_d" "0" "$PARAMS"
          add_param "spi_phase_hist_pporb" "0" "$PARAMS"
          add_param "spi_phase_hist_ephemDOL" "" "$PARAMS"
          add_param "spi_phase_hist_phaseBinNum" "1" "$PARAMS"
          add_param "spi_phase_hist_phaseSameWidthBin" "yes" "$PARAMS"
          add_param "spi_phase_hist_phaseBounds" "0,1" "$PARAMS"
          add_param "spi_phase_hist_phaseSubtractOff" "no" "$PARAMS"
          add_param "spi_phase_hist_phaseOffNum" "0" "$PARAMS"

          add_param "spi_phase_analysis_orbit" "no" "$PARAMS"
          add_param "spi_phase_analysis_asini" "0" "$PARAMS"
          add_param "spi_phase_analysis_porb" "1" "$PARAMS"
          add_param "spi_phase_analysis_T90epoch" "0" "$PARAMS"
          add_param "spi_phase_analysis_ecc" "0" "$PARAMS"
          add_param "spi_phase_analysis_omega_d" "0" "$PARAMS"
          add_param "spi_phase_analysis_pporb" "0" "$PARAMS"
          add_param "spi_phase_analysis_ephemDOL" "" "$PARAMS"
          add_param "spi_phase_analysis_phaseBinNum" "1" "$PARAMS"
          add_param "spi_phase_analysis_phaseSameWidthBin" "yes" "$PARAMS"
          add_param "spi_phase_analysis_phaseBounds" "0,1" "$PARAMS"
          add_param "spi_phase_analysis_phaseSubtractOff" "no" "$PARAMS"
          add_param "spi_phase_analysis_phaseOffNum" "0" "$PARAMS"

          add_param "spibounds_nregions" "1" "$PARAMS"
          add_param "spibounds_regions" "508,514" "$PARAMS"
          add_param "spibounds_nbins" "1" "$PARAMS"
          add_param "detectors" "0-18" "$PARAMS"
          add_param "clobber" "yes" "$PARAMS"
          add_param "log_File" "${CASE}.inner.log" "$PARAMS"

          make_answers "$ANSWERS"

          echo "SPI_CASE_BEGIN ${CASE}"
          echo "REP_BASE_PROD=$REP_BASE_PROD"
          echo "IC_MASTER=$BEST_IC"
          echo "DISPLAY=$DISPLAY"
          echo "BATCH_FLAG_USED=-b"
          echo "SIDE_BANDS_SKIPPED=True"
          cat "$PARAMS"

          echo "case=${CASE}" > "$STATUS"
          echo "started_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS"
          echo "rep_base_prod=${REP_BASE_PROD}" >> "$STATUS"
          echo "ic_master=${BEST_IC}" >> "$STATUS"
          echo "display=${DISPLAY}" >> "$STATUS"
          echo "xvfb_used=True" >> "$STATUS"
          echo "batch_flag_used=True" >> "$STATUS"
          echo "line_retry_attempted=True" >> "$STATUS"
          echo "sidebands_skipped=True" >> "$STATUS"
          echo "ACIRM_SPI_PROCESS_STARTED ${CASE}"

          mapfile -t ARGS < "$PARAMS"

          if command -v stdbuf >/dev/null 2>&1; then
            timeout 900 stdbuf -oL -eL spi_science_analysis -b "${ARGS[@]}" < "$ANSWERS" 2>&1 | guard_stream "$STATUS" "$LOG"
            RC="${PIPESTATUS[0]}"
          else
            timeout 900 spi_science_analysis -b "${ARGS[@]}" < "$ANSWERS" 2>&1 | guard_stream "$STATUS" "$LOG"
            RC="${PIPESTATUS[0]}"
          fi

          echo "returncode=${RC}" >> "$STATUS"
          echo "ended_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS"

          cp -f /tmp/acirm_work/commonlog.txt "/work/container_logs/${CASE}.commonlog.txt" 2>/dev/null || true
          cp -f "$COMMONLOGFILE" "/work/container_logs/${CASE}.commonlog_env.txt" 2>/dev/null || true
          plist spi_science_analysis > "/work/container_logs/${CASE}.plist_after.txt" 2>&1 || true
          find /tmp/acirm_work -maxdepth 4 -type f -printf "%p %s\n" > "/work/container_logs/${CASE}.tmp_work_files.txt" 2>/dev/null || true

          echo "ACIRM_SPI_PROCESS_ENDED ${CASE} returncode=${RC}"
          echo "PRODUCTS_AFTER_${CASE}"
          find /work/products_line -maxdepth 8 -type f -printf "%p %s\n" | sort || true

          {
            for f in $(find /work/products_line -type f \( -name "*.fits" -o -name "*.fits.gz" \) 2>/dev/null | sort | head -100); do
              echo "### $f"
              fstruct "$f" 2>&1 | head -100 || true
            done
          } > /work/container_logs/fits_quicklook_spi.txt

          find /work -maxdepth 10 -type f -printf "%p %s\n" | sort > /work/container_logs/work_files_after_spi.txt

          echo "R2N_FAST_CONTAINER_END"
          BASH

            docker run --rm \
              -e DISPLAY=:99 \
              -v /tmp/.X11-unix:/tmp/.X11-unix \
              -v "$PWD/$OUT/data:/data" \
              -v "$PWD/$OUT/work:/work" \
              integralsw/osa:latest \
              bash /work/run_spi_r2n_fast.sh \
              > "$OUT/logs/host_container_r2n_fast.log" 2>&1 || true

            sudo chown -R "$(id -u):$(id -g)" "$OUT" "$LIGHT" ACIRM_CACHE_R3P_R1 2>/dev/null || true
            chmod -R u+rwX,go+rX "$OUT" "$LIGHT" ACIRM_CACHE_R3P_R1 2>/dev/null || true
          fi

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import os
          import time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          CL = WORK / "container_logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS")
          CACHE = Path("ACIRM_CACHE_R3P_R1")
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"
          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS.zip"

          LIGHT.mkdir(parents=True, exist_ok=True)
          (LIGHT / "logs").mkdir(parents=True, exist_ok=True)

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_text(path, limit=700000):
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              data = p.read_bytes()
              if len(data) > limit:
                  data = data[:320000] + b"\nACIRM_LOG_TRUNCATED_MIDDLE\n" + data[-320000:]
              return data.decode("utf-8", "replace")

          def rows(root):
              out = []
              root = Path(root)
              if root.exists():
                  for p in sorted(root.rglob("*")):
                      if p.is_file():
                          try:
                              out.append({"path": str(p), "bytes": p.stat().st_size})
                          except Exception:
                              out.append({"path": str(p), "bytes": ""})
              return out

          def copy_log(path):
              p = Path(path)
              if p.exists() and p.is_file():
                  (LIGHT / "logs" / p.name).write_text(safe_text(p), encoding="utf-8", errors="replace")

          for p in sorted(LOGS.glob("*.log")):
              copy_log(p)

          if CL.exists():
              for p in sorted(CL.glob("*")):
                  if p.is_file():
                      copy_log(p)

          def write_csv(path, data_rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in data_rows:
                      w.writerow({k: r.get(k, "") for k in fields})

          def parse_status(path):
              d = {}
              for line in safe_text(path, limit=100000).splitlines():
                  if "=" in line:
                      k, v = line.split("=", 1)
                      d[k.strip()] = v.strip()
              return d

          data_rows = rows(DATA)
          work_rows = rows(WORK)
          cache_rows = rows(CACHE)
          line_rows = rows(WORK / "products_line")

          write_csv(LIGHT / "data_files.csv", data_rows, ["path", "bytes"])
          write_csv(LIGHT / "work_files.csv", work_rows, ["path", "bytes"])
          write_csv(LIGHT / "cache_files.csv", cache_rows, ["path", "bytes"])

          status = parse_status(CL / "R2N_FAST_IC_LINE_508_514.status.txt")

          host_log = safe_text(LOGS / "host_container_r2n_fast.log", limit=800000)
          case_log = safe_text(CL / "R2N_FAST_IC_LINE_508_514.log", limit=800000)
          common_log = safe_text(CL / "R2N_FAST_IC_LINE_508_514.commonlog.txt", limit=800000)
          ic_search = safe_text(CL / "ic_master_search.txt", limit=400000)
          ic_candidates = safe_text(CL / "ic_master_candidates.txt", limit=200000)
          ic_selection = safe_text(CL / "ic_selection.env", limit=100000)
          selected_rep = safe_text(CL / "selected_rep_base_prod.txt", limit=100000)
          joined = host_log + "\n" + case_log + "\n" + common_log + "\n" + ic_search + "\n" + ic_candidates + "\n" + ic_selection + "\n" + selected_rep

          def intval(x):
              try:
                  return int(str(x).strip())
              except Exception:
                  return 0

          og_candidates = [r for r in work_rows if str(r.get("path", "")).endswith("og_spi.fits") and int(r.get("bytes") or 0) > 1024]
          og_created = len(og_candidates) > 0
          og_path = og_candidates[0]["path"] if og_candidates else ""

          line_metric = any((str(r["path"]).endswith(".fits") or str(r["path"]).endswith(".fits.gz")) and int(r.get("bytes") or 0) > 1024 for r in line_rows)

          ic_master_found = "IC_MASTER_FOUND=True" in ic_selection
          line_retry_attempted = status.get("line_retry_attempted", "") == "True"

          best_root = ""
          best_ic = ""
          for line in ic_selection.splitlines():
              if line.startswith("BEST_ROOT="):
                  best_root = line.split("=", 1)[1].strip()
              if line.startswith("BEST_IC="):
                  best_ic = line.split("=", 1)[1].strip()

          checks = {
              "ready_flag_exists": READY_FLAG.exists(),
              "cache_file_count": len(cache_rows),
              "data_file_count": len(data_rows),
              "work_file_count": len(work_rows),
              "og_created": og_created,
              "og_spi_path": og_path,
              "ic_master_found": ic_master_found,
              "best_rep_base_prod": best_root,
              "best_ic_master": best_ic,
              "line_retry_attempted": line_retry_attempted,
              "actual_spi_started": bool(status.get("started_utc")) or "ACIRM_SPI_PROCESS_STARTED R2N_FAST_IC_LINE_508_514" in joined,
              "batch_flag_used": status.get("batch_flag_used", "") == "True",
              "xvfb_used": status.get("xvfb_used", "") == "True",
              "line_508_514_seen": "spibounds_regions=508,514" in joined,
              "sidebands_skipped": True,
              "line_product_count": len(line_rows),
              "line_metric_exists": line_metric,
              "orbit_asini_prompt_count": intval(status.get("orbit_asini_prompt_count", 0)),
              "flatfield_prompt_count": intval(status.get("flatfield_prompt_count", 0)),
              "gedsat_prompt_count": intval(status.get("gedsat_prompt_count", 0)),
              "gui_attempt_count": intval(status.get("gui_attempt_count", 0)) + joined.count("Attempting to launch GUI"),
              "display_error_count": intval(status.get("display_error_count", 0)) + joined.count("can't open display"),
              "normal_prompt_count": intval(status.get("normal_prompt_count", 0)),
              "status3004_count": intval(status.get("status3004_count", 0)),
              "status3023_count": intval(status.get("status3023_count", 0)),
              "status35603_count": intval(status.get("status35603_count", 0)),
              "status250002_count": intval(status.get("status250002_count", 0)) + joined.count("status -250002"),
              "cal_not_found_count": intval(status.get("cal_not_found_count", 0)) + joined.count("CAL_NOT_FOUND"),
              "ic_master_message_count": intval(status.get("ic_master_message_count", 0)),
              "koverflow_count": intval(status.get("koverflow_count", 0)),
              "segfault_count": intval(status.get("segfault_count", 0)) + joined.count("segmentation violation"),
              "returncode": status.get("returncode", "")
          }

          with open(LIGHT / "checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          product_hints = []
          for r in work_rows:
              p = str(r.get("path", ""))
              if "og_spi.fits" in p or "products_line" in p or "ic_master_file.fits" in p or p.endswith(".fits") or p.endswith(".fits.gz"):
                  product_hints.append({"path": p, "bytes": r.get("bytes", ""), "category": "hint"})
          write_csv(LIGHT / "product_hints.csv", product_hints, ["path", "bytes", "category"])

          if line_metric:
              final_status = "R21AX_R7G_R3P_R2N_FAST_IC_LINE_PRODUCTS_PRESENT_REVIEW_NOT_FINAL_PROOF"
              scientific_status = "PRODUCTS_PRESENT_REVIEW_REQUIRED_NOT_DISCOVERY"
          elif not checks["ready_flag_exists"]:
              final_status = "R21AX_R7G_R3P_R2N_FAST_CACHE_MISS_NO_SPI_NO_511_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif not og_created:
              final_status = "R21AX_R7G_R3P_R2N_FAST_NO_REAL_OG_SPI_NOT_RUN_NO_511_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif not ic_master_found:
              final_status = "R21AX_R7G_R3P_R2N_FAST_NO_IC_MASTER_FOUND_LINE_RETRY_SKIPPED_NO_511_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif checks["cal_not_found_count"] > 0 or checks["status250002_count"] > 0:
              final_status = "R21AX_R7G_R3P_R2N_FAST_IC_MASTER_FOUND_BUT_CALIBRATION_STILL_NOT_RESOLVED_NO_511_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif checks["segfault_count"] > 0:
              final_status = "R21AX_R7G_R3P_R2N_FAST_IC_LINE_SEGFAULT_NO_511_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif str(checks["returncode"]) == "124":
              final_status = "R21AX_R7G_R3P_R2N_FAST_IC_LINE_TIMEOUT_NO_READABLE_511_METRIC_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif checks["status35603_count"] > 0:
              final_status = "R21AX_R7G_R3P_R2N_FAST_STATUS35603_NO_511_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          else:
              final_status = "R21AX_R7G_R3P_R2N_FAST_IC_LOCATOR_COMPLETED_NO_READABLE_511_METRIC_NO_PHYSICAL_NULL"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"

          summary = {
              "run_id": RUN_ID,
              "created_utc": now_utc(),
              "final_status": final_status,
              "scientific_status": scientific_status,
              "checks": checks,
              "runtime_design": "FAST_IC_MASTER_LOCATOR_OPTIONAL_LINE_ONLY_RETRY_MINUS_B_XVFB_TIMEOUT_900_NO_SIDEBANDS",
              "claim_ceiling": "NOT_DISCOVERY_NOT_FINAL_PROOF_NOT_OSA_PROOF_UNLESS_ACTUAL_511_LINE_METRIC_IS_READ_FROM_OSA_PRODUCTS"
          }

          (LIGHT / "SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          (LIGHT / "CLAIM_BOUNDARY.txt").write_text(
              "This fast run locates IC master calibration context and only retries 508-514 keV line if IC master is found.\n"
              "Sidebands are intentionally skipped.\n"
              "Do not claim 511 detection/proof/discovery unless a valid OSA product metric is read.\n",
              encoding="utf-8"
          )

          if Path(ZIP_NAME).exists():
              Path(ZIP_NAME).unlink()

          os.system("zip -r " + ZIP_NAME + " " + str(LIGHT))

          if Path(ZIP_NAME).exists():
              sha = sha256_file(ZIP_NAME)
              Path(ZIP_NAME + ".sha256.txt").write_text(sha + "  " + ZIP_NAME + "\n", encoding="utf-8")
              print("R2N_FAST_ZIP_SHA256", sha)

          print(json.dumps(summary, indent=2))
          PY

      - name: Upload R2N fast artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3P_R2N_FAST_IC_MASTER_LOCATOR_LIGHT_RESULTS.zip.sha256.txt
            ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/logs/main_execution.log
            ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/logs/host_prepare.log
            ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/logs/xvfb.log
            ACIRM_R21AX_R7G_R3P_R2N_FAST_RESULTS/logs/host_container_r2n_fast.log
          if-no-files-found: warn
