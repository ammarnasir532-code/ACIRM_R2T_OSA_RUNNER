name: ACIRM R13B R6 FermiBottle entrypoint-bypass hardened run

on:
  workflow_dispatch:

jobs:
  r13b-r6-entrypoint-bypass:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Host preflight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acirm_r13b data results logs final_artifact pfiles
          echo "HOST_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee logs/HOST_PREFLIGHT.txt
          uname -a | tee -a logs/HOST_PREFLIGHT.txt
          df -h | tee -a logs/HOST_PREFLIGHT.txt
          docker --version | tee -a logs/HOST_PREFLIGHT.txt

      - name: Write self-contained R13B R6 files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acirm_r13b data results logs final_artifact pfiles

          cat > acirm_r13b/R13B_RUN_CONFIG.json <<'JSON'
          {
            "run_id": "ACIRM_R17M_R13B_R6_ENTRYPOINT_BYPASS_FERMITOOLS_HARDENED_RUN_NO_PROOF",
            "target": {
              "name": "GRB 221009A / BOAT",
              "gbm_trigger": "bn221009553",
              "ra_deg": 288.2646,
              "dec_deg": 19.7735,
              "utc_trigger": "2022-10-09T13:16:59.99Z"
            },
            "trigger_met": 687014224.98753,
            "primary_window": {
              "name": "AFTERGLOW_PRIMARY_600S_2D",
              "tmin_rel_s": 600.0,
              "tmax_rel_s": 172800.0,
              "tmin_met": 687014824.98753,
              "tmax_met": 687187024.98753
            },
            "lat_selection": {
              "evclass": 128,
              "evtype": 3,
              "irfs": "P8R3_SOURCE_V3",
              "roi_deg": 12.0,
              "emin_mev": 100.0,
              "emax_mev": 500000.0,
              "zmax_deg": 90.0,
              "binsz_deg": 0.1,
              "npix": 240,
              "enumbins": 30
            },
            "lat_inputs": {
              "photon_url": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w749_p305_v001.fits",
              "spacecraft_url_primary": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w749_p310_v001.fits",
              "spacecraft_directory": "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/"
            },
            "locked_context": {
              "r12_decision": "R12_GBM_R6_PLUS_LAT_397GEV_STANDARD_OFFSOURCE_SUPPORT_LOCKED_STRONG_EXTERNAL_OPERATIONAL_SUPPORT_NOT_PROOF",
              "gbm_locked_period_s": 265.254,
              "gbm_locked_frequency_hz": 0.003769971423616609,
              "lat_standard_witness_energy_gev": 397.6781875,
              "lat_standard_witness_time_s": 33552.96854388714,
              "lat_standard_witness_sep_deg": 0.0154991242889778,
              "prompt_lat_cluster_used_as_standard_support": false
            },
            "claim_ceiling": [
              "ENTRYPOINT_BYPASS_FIX_FOR_FERMIBOTTLE_STARTUP_ERROR",
              "STARTER_MODEL_ONLY",
              "NEARBY_4FGL_SOURCES_NOT_INCLUDED",
              "NOT_PUBLISHABLE_TS",
              "NO_SOURCE_ATTRIBUTION_PROOF",
              "NO_ACIRM_EXTERNAL_PROOF",
              "NOT_PROOF"
            ]
          }
          JSON

          cat > acirm_r13b/R13B_STARTER_MODEL_GRB221009A_DIFFUSE_ONLY_PENDING_4FGL.xml <<'XML'
          <?xml version="1.0" ?>
          <source_library title="source library">
            <source name="GRB221009A_ACIRM_LOCKED" type="PointSource">
              <spectrum type="PowerLaw">
                <parameter free="1" max="1e5" min="1e-8" name="Prefactor" scale="1e-10" value="1.0" />
                <parameter free="1" max="0.0" min="-5.0" name="Index" scale="1.0" value="-2.0" />
                <parameter free="0" max="500000.0" min="100.0" name="Scale" scale="1.0" value="1000.0" />
              </spectrum>
              <spatialModel type="SkyDirFunction">
                <parameter free="0" max="360.0" min="0.0" name="RA" scale="1.0" value="288.2646" />
                <parameter free="0" max="90.0" min="-90.0" name="DEC" scale="1.0" value="19.7735" />
              </spatialModel>
            </source>
            <source name="iso_P8R3_SOURCE_V3_v1" type="DiffuseSource">
              <spectrum apply_edisp="false" file="ISO_DIFFUSE_PLACEHOLDER" type="FileFunction">
                <parameter free="1" max="10" min="0.01" name="Normalization" scale="1" value="1" />
              </spectrum>
              <spatialModel type="ConstantValue">
                <parameter free="0" max="10.0" min="0.0" name="Value" scale="1.0" value="1.0" />
              </spatialModel>
            </source>
            <source name="gll_iem_v07" type="DiffuseSource">
              <spectrum type="PowerLaw">
                <parameter free="1" max="10.0" min="0.0" name="Prefactor" scale="1.0" value="1.0" />
                <parameter free="0" max="1" min="-1" name="Index" scale="1.0" value="1.0" />
                <parameter free="0" max="1e6" min="20" name="Scale" scale="1.0" value="100" />
              </spectrum>
              <spatialModel file="GAL_DIFFUSE_PLACEHOLDER" type="MapCubeFunction">
                <parameter free="0" max="1000.0" min="0.001" name="Normalization" scale="1.0" value="1.0" />
              </spatialModel>
            </source>
          </source_library>
          XML

          cat > acirm_r13b/write_failure.py <<'PY'
          import json, pathlib, sys, datetime
          stage = sys.argv[1] if len(sys.argv) > 1 else "UNKNOWN_STAGE"
          detail = sys.argv[2] if len(sys.argv) > 2 else ""
          pathlib.Path("results").mkdir(exist_ok=True)
          out = {
              "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "decision": "R13B_R6_PRE_TS_OR_FERMITOOLS_STAGE_FAILED_LOGS_READY_NOT_PROOF",
              "failed_stage": stage,
              "detail": detail,
              "claim_ceiling": ["NO_TS_CONFIRMED", "FAILURE_LOGS_ONLY", "NOT_PROOF"]
          }
          pathlib.Path("results/R13B_R6_PRELIMINARY_RESULT.json").write_text(json.dumps(out, indent=2), encoding="utf-8")
          PY

          cat > acirm_r13b/parse_results.py <<'PY'
          import pathlib, json, re, datetime, xml.etree.ElementTree as ET
          results = pathlib.Path("results")
          logs = pathlib.Path("logs")
          gtlike_status = (results / "GTLIKE_EXIT_STATUS.txt").read_text(errors="replace").strip() if (results / "GTLIKE_EXIT_STATUS.txt").exists() else "MISSING"
          log_path = logs / "gtlike_afterglow.log"
          log_text = log_path.read_text(errors="replace") if log_path.exists() else ""
          fit_xml = results / "fit_afterglow_output.xml"
          source_rows = []
          if fit_xml.exists():
              try:
                  root = ET.parse(fit_xml).getroot()
                  for src in root.findall("source"):
                      source_rows.append({"name": src.attrib.get("name"), "TS_attribute": src.attrib.get("TS") or src.attrib.get("ts")})
              except Exception as e:
                  source_rows.append({"parse_error": repr(e)})
          candidate_lines = []
          for line in log_text.splitlines():
              low = line.lower()
              if "grb221009a" in low or "test statistic" in low or re.search(r"\bts\b", low) or "error" in low or "exception" in low:
                  candidate_lines.append(line[:700])
          decision = "R13B_R6_FERMITOOLS_STARTER_TS_ATTEMPT_COMPLETED_REQUIRES_R14_AUDIT_NOT_PROOF" if gtlike_status == "0" and fit_xml.exists() else "R13B_R6_FERMITOOLS_STARTER_TS_ATTEMPT_INCOMPLETE_OR_FAILED_LOGS_READY_NOT_PROOF"
          out = {
              "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "decision": decision,
              "gtlike_exit_status": gtlike_status,
              "fit_xml_exists": fit_xml.exists(),
              "srcmaps_exists": (results / "srcmaps_afterglow.fits").exists(),
              "source_rows_from_fit_xml": source_rows,
              "candidate_log_lines": candidate_lines[:200],
              "claim_ceiling": ["STARTER_MODEL_ONLY", "NEARBY_4FGL_SOURCES_NOT_INCLUDED", "NOT_PUBLISHABLE_TS", "NOT_PROOF"]
          }
          (results / "R13B_R6_PRELIMINARY_RESULT.json").write_text(json.dumps(out, indent=2), encoding="utf-8")
          PY

          cat > acirm_r13b/package_results.py <<'PY'
          from pathlib import Path
          import zipfile, hashlib, json, datetime, csv
          ROOT = Path(".")
          FINAL = ROOT / "final_artifact"
          FINAL.mkdir(exist_ok=True)
          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for b in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(b)
              return h.hexdigest()
          result_path = ROOT / "results" / "R13B_R6_PRELIMINARY_RESULT.json"
          if not result_path.exists():
              docker_status = (ROOT / "results" / "DOCKER_EXIT_STATUS.txt").read_text(errors="replace").strip() if (ROOT / "results" / "DOCKER_EXIT_STATUS.txt").exists() else "MISSING"
              out = {
                  "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
                  "decision": "R13B_R6_DOCKER_OR_PRE_TS_STAGE_DID_NOT_COMPLETE_LOGS_READY_NOT_PROOF",
                  "docker_exit_status": docker_status,
                  "claim_ceiling": ["NO_TS_CONFIRMED", "LOGS_ONLY", "NOT_PROOF"]
              }
              (ROOT / "results").mkdir(exist_ok=True)
              result_path.write_text(json.dumps(out, indent=2), encoding="utf-8")
          zip_path = FINAL / "ACIRM_R17M_R13B_R6_ENTRYPOINT_BYPASS_FERMITOOLS_RESULTS.zip"
          manifest = []
          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as z:
              for folder in ["acirm_r13b", "results", "logs"]:
                  p = ROOT / folder
                  if not p.exists():
                      continue
                  for f in sorted(p.rglob("*")):
                      if not f.is_file():
                          continue
                      if f.suffix.lower() in [".fits", ".fit", ".gz"] and f.stat().st_size > 10_000_000:
                          manifest.append({"file": str(f), "size_bytes": f.stat().st_size, "included": False, "reason": "large_fits_excluded_from_slim_artifact"})
                          continue
                      z.write(f, arcname=str(f))
                      manifest.append({"file": str(f), "size_bytes": f.stat().st_size, "included": True, "sha256": sha256_file(f)})
          sha = sha256_file(zip_path)
          (FINAL / (zip_path.name + ".sha256.txt")).write_text(sha + "  " + zip_path.name + "\n", encoding="utf-8")
          with open(FINAL / "R13B_R6_ARTIFACT_MANIFEST.csv", "w", newline="", encoding="utf-8") as fp:
              fields = ["file", "size_bytes", "included", "sha256", "reason"]
              w = csv.DictWriter(fp, fieldnames=fields, extrasaction="ignore")
              w.writeheader()
              w.writerows(manifest)
          status = {
              "created_utc": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "zip": str(zip_path),
              "sha256": sha,
              "decision_source": "results/R13B_R6_PRELIMINARY_RESULT.json",
              "claim": "R13B_R6_ARTIFACT_READY_LOGS_OR_STARTER_TS_NOT_PROOF"
          }
          (FINAL / "R13B_R6_ARTIFACT_STATUS.json").write_text(json.dumps(status, indent=2), encoding="utf-8")
          print("ZIP", zip_path)
          print("SHA256", sha)
          PY

          cat > acirm_r13b/run_inside_fermibottle.sh <<'BASH'
          #!/usr/bin/env bash
          set -Eeuo pipefail
          mkdir -p data results logs pfiles
          exec > >(tee logs/CONTAINER_STDOUT.log) 2> >(tee logs/CONTAINER_STDERR.log >&2)
          stage_file="results/R13B_R6_STAGE_STATUS.tsv"
          echo -e "utc\tstage\tstatus" > "$stage_file"
          stage() { echo -e "$(date -u +%Y-%m-%dT%H:%M:%SZ)\t$1\t$2" | tee -a "$stage_file"; }
          fail_stage() { stage "$1" "FAIL"; python acirm_r13b/write_failure.py "$1" "$2" || true; exit "${3:-20}"; }

          stage "container_start" "START"
          cd /work || fail_stage "workdir" "cannot cd /work" 21
          test -f /work/acirm_r13b/run_inside_fermibottle.sh || fail_stage "mounted_files" "run script not visible under /work/acirm_r13b" 22
          stage "mounted_files" "OK"

          export HOME="${HOME:-/home/fermi}"
          export PFILES="/work/pfiles"
          export HEADASPROMPT="/dev/null"
          mkdir -p "$PFILES" "$HOME" || true

          stage "environment_discovery" "START"
          {
            echo "PWD=$(pwd)"
            echo "HOME=$HOME"
            echo "PFILES=$PFILES"
            echo "PATH_INITIAL=$PATH"
            find /opt /usr/local /home -maxdepth 5 \( -name conda.sh -o -name gtselect -o -name fermi-init.sh -o -name fermi-setup.sh -o -name thisfermi.sh \) 2>/dev/null | head -n 200
          } > logs/ENVIRONMENT_DISCOVERY.txt || true

          for shfile in \
            /opt/conda/etc/profile.d/conda.sh \
            /home/astrosoft/conda/etc/profile.d/conda.sh \
            /home/fermi/conda/etc/profile.d/conda.sh \
            /usr/local/conda/etc/profile.d/conda.sh; do
            if [ -f "$shfile" ]; then
              source "$shfile" || true
              conda info --envs > logs/CONDA_ENVS.txt 2>&1 || true
              for envname in fermi fermitools fermipy base; do
                conda activate "$envname" >> logs/CONDA_ACTIVATE.txt 2>&1 && break || true
              done
              break
            fi
          done

          for setup in \
            /home/fermi/.bashrc \
            /home/astrosoft/fermitools/fermi-init.sh \
            /home/astrosoft/fermitools/fermi-setup.sh \
            /home/astrosoft/fermitools/thisfermi.sh \
            /opt/fermitools/fermi-init.sh \
            /opt/fermitools/fermi-setup.sh \
            /opt/fermitools/thisfermi.sh; do
            if [ -f "$setup" ]; then
              source "$setup" >> logs/FERMI_SETUP_SOURCE.txt 2>&1 || true
            fi
          done

          GTSELECT_PATH="$(find /opt /usr/local /home -type f -name gtselect 2>/dev/null | head -n 1 || true)"
          if [ -n "$GTSELECT_PATH" ]; then
            export PATH="$(dirname "$GTSELECT_PATH"):$PATH"
          fi
          stage "environment_discovery" "OK"

          stage "tool_check" "START"
          missing=0
          for tool in gtselect gtmktime gtbin gtltcube gtexpcube2 gtsrcmaps gtlike curl python; do
            if ! command -v "$tool" >/dev/null 2>&1; then
              echo "MISSING_TOOL=$tool" | tee -a logs/TOOL_CHECK.txt
              missing=1
            else
              echo "$tool=$(command -v "$tool")" | tee -a logs/TOOL_CHECK.txt
            fi
          done
          echo "PATH_FINAL=$PATH" >> logs/TOOL_CHECK.txt
          if [ "$missing" -ne 0 ]; then
            fail_stage "environment_tools" "required Fermitools command missing after entrypoint bypass" 23
          fi
          stage "tool_check" "OK"

          PHOTON_URL="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/photon/lat_photon_weekly_w749_p305_v001.fits"
          PHOTON="data/lat_photon_weekly_w749_p305_v001.fits"
          SC_PRIMARY_URL="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/lat_spacecraft_weekly_w749_p310_v001.fits"
          SC_DIR="https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/weekly/spacecraft/"
          SPACECRAFT="data/lat_spacecraft_weekly_w749.fits"

          stage "download_photon" "START"
          if [ ! -s "$PHOTON" ]; then
            timeout 45m curl -fL --retry 5 --retry-delay 10 --connect-timeout 30 "$PHOTON_URL" -o "$PHOTON" || fail_stage "download_photon" "curl photon failed" 24
          fi
          stage "download_photon" "OK"

          stage "download_spacecraft" "START"
          if [ ! -s "$SPACECRAFT" ]; then
            if ! timeout 20m curl -fL --retry 3 --retry-delay 10 --connect-timeout 30 "$SC_PRIMARY_URL" -o "$SPACECRAFT"; then
              echo "Primary spacecraft URL failed; trying directory fallback" | tee -a logs/SPACECRAFT_FALLBACK.log
              timeout 3m curl -fL --retry 3 --connect-timeout 30 "$SC_DIR" -o logs/spacecraft_dir.html || fail_stage "download_spacecraft" "cannot list spacecraft directory" 25
              SC_FALLBACK=$(python - <<'PY'
          import re, pathlib, urllib.parse
          html = pathlib.Path('logs/spacecraft_dir.html').read_text(errors='replace')
          links = re.findall(r'href=["\']([^"\']+)["\']', html, flags=re.I)
          hits = []
          for h in links:
              name = urllib.parse.unquote(h.rstrip('/').split('/')[-1])
              low = name.lower()
              if 'w749' in low and low.endswith(('.fits', '.fit', '.fits.gz', '.fit.gz')):
                  hits.append(h)
          print(hits[0] if hits else '')
          PY
          )
              if [ -z "$SC_FALLBACK" ]; then
                fail_stage "download_spacecraft" "no w749 spacecraft file found in directory listing" 26
              fi
              SC_URL="${SC_DIR}${SC_FALLBACK}"
              timeout 20m curl -fL --retry 3 --retry-delay 10 --connect-timeout 30 "$SC_URL" -o "$SPACECRAFT" || fail_stage "download_spacecraft" "fallback spacecraft download failed" 27
            fi
          fi
          stage "download_spacecraft" "OK"

          python - <<'PY'
          import hashlib, json, pathlib, datetime
          rows = []
          for label, path in [('photon', 'data/lat_photon_weekly_w749_p305_v001.fits'), ('spacecraft', 'data/lat_spacecraft_weekly_w749.fits')]:
              p = pathlib.Path(path)
              h = hashlib.sha256()
              if p.exists():
                  with open(p, 'rb') as f:
                      for b in iter(lambda: f.read(1024*1024), b''):
                          h.update(b)
              rows.append({'label': label, 'file': str(p), 'exists': p.exists(), 'size_bytes': p.stat().st_size if p.exists() else None, 'sha256': h.hexdigest() if p.exists() else None})
          out = {'created_utc': datetime.datetime.utcnow().replace(microsecond=0).isoformat()+'Z', 'downloads': rows, 'claim': 'DOWNLOAD_MANIFEST_NOT_TS'}
          pathlib.Path('results/R13B_R6_DOWNLOAD_MANIFEST.json').write_text(json.dumps(out, indent=2))
          PY

          stage "resolve_diffuse" "START"
          GAL=$(find /opt /usr/local /home /work -name gll_iem_v07.fits 2>/dev/null | head -n 1 || true)
          ISO=$(find /opt /usr/local /home /work -name iso_P8R3_SOURCE_V3_v1.txt 2>/dev/null | head -n 1 || true)
          if [ -z "$GAL" ] || [ -z "$ISO" ]; then
            fail_stage "resolve_diffuse" "diffuse model files not found in FermiBottle" 28
          fi
          sed "s#GAL_DIFFUSE_PLACEHOLDER#$GAL#g; s#ISO_DIFFUSE_PLACEHOLDER#$ISO#g" \
            acirm_r13b/R13B_STARTER_MODEL_GRB221009A_DIFFUSE_ONLY_PENDING_4FGL.xml > results/R13B_MODEL_RUNTIME.xml
          printf '{"gll_iem_v07":"%s","iso_P8R3_SOURCE_V3_v1":"%s","claim":"DIFFUSE_RESOLUTION_NOT_TS"}\n' "$GAL" "$ISO" > results/R13B_R6_DIFFUSE_MODEL_STATUS.json
          stage "resolve_diffuse" "OK"

          RA="288.2646"
          DEC="19.7735"
          RAD="12.0"
          EMIN="100.0"
          EMAX="500000.0"
          ZMAX="90.0"
          EVCLASS="128"
          EVTYPE="3"
          IRFS="P8R3_SOURCE_V3"
          NXPIX="240"
          NYPIX="240"
          BINSZ="0.1"
          ENUMBINS="30"
          TMIN="687014824.98753"
          TMAX="687187024.98753"
          MODEL="results/R13B_MODEL_RUNTIME.xml"

          stage "gtselect" "START"
          timeout 30m gtselect infile="$PHOTON" outfile="results/events_afterglow_selected.fits" ra="$RA" dec="$DEC" rad="$RAD" \
            tmin="$TMIN" tmax="$TMAX" emin="$EMIN" emax="$EMAX" zmax="$ZMAX" evclass="$EVCLASS" evtype="$EVTYPE" \
            clobber=yes chatter=4 || fail_stage "gtselect" "gtselect failed" 31
          stage "gtselect" "OK"

          stage "gtmktime" "START"
          timeout 30m gtmktime scfile="$SPACECRAFT" filter="(DATA_QUAL>0)&&(LAT_CONFIG==1)" roicut=yes \
            evfile="results/events_afterglow_selected.fits" outfile="results/events_afterglow_gti.fits" \
            clobber=yes chatter=4 || fail_stage "gtmktime" "gtmktime failed" 32
          stage "gtmktime" "OK"

          stage "gtbin" "START"
          timeout 30m gtbin evfile="results/events_afterglow_gti.fits" scfile="$SPACECRAFT" outfile="results/ccube_afterglow.fits" algorithm=CCUBE \
            nxpix="$NXPIX" nypix="$NYPIX" binsz="$BINSZ" coordsys=CEL xref="$RA" yref="$DEC" axisrot=0 proj=AIT \
            ebinalg=LOG emin="$EMIN" emax="$EMAX" enumbins="$ENUMBINS" clobber=yes chatter=4 || fail_stage "gtbin" "gtbin failed" 33
          stage "gtbin" "OK"

          stage "gtltcube" "START"
          timeout 75m gtltcube evfile="results/events_afterglow_gti.fits" scfile="$SPACECRAFT" outfile="results/ltcube_afterglow.fits" \
            dcostheta=0.025 binsz=1 clobber=yes chatter=4 || fail_stage "gtltcube" "gtltcube failed or timed out" 34
          stage "gtltcube" "OK"

          stage "gtexpcube2" "START"
          timeout 75m gtexpcube2 infile="results/ltcube_afterglow.fits" cmap=none outfile="results/bexpmap_afterglow.fits" irfs="$IRFS" \
            nxpix="$NXPIX" nypix="$NYPIX" binsz="$BINSZ" coordsys=CEL xref="$RA" yref="$DEC" axisrot=0 proj=AIT \
            ebinalg=LOG emin="$EMIN" emax="$EMAX" enumbins="$ENUMBINS" clobber=yes chatter=4 || fail_stage "gtexpcube2" "gtexpcube2 failed or timed out" 35
          stage "gtexpcube2" "OK"

          stage "gtsrcmaps" "START"
          timeout 90m gtsrcmaps scfile="$SPACECRAFT" expcube="results/ltcube_afterglow.fits" cmap="results/ccube_afterglow.fits" \
            srcmdl="$MODEL" bexpmap="results/bexpmap_afterglow.fits" outfile="results/srcmaps_afterglow.fits" irfs="$IRFS" \
            clobber=yes chatter=4 || fail_stage "gtsrcmaps" "gtsrcmaps failed or timed out" 36
          stage "gtsrcmaps" "OK"

          stage "gtlike" "START"
          set +e
          timeout 90m gtlike statistic=BINNED optimizer=NEWMINUIT evfile="results/srcmaps_afterglow.fits" scfile="$SPACECRAFT" \
            expcube="results/ltcube_afterglow.fits" srcmdl="$MODEL" sfile="results/fit_afterglow_output.xml" irfs="$IRFS" \
            > logs/gtlike_afterglow.log 2>&1
          GTLIKE_STATUS=$?
          set -e
          echo "$GTLIKE_STATUS" > results/GTLIKE_EXIT_STATUS.txt
          if [ "$GTLIKE_STATUS" -ne 0 ]; then
            python acirm_r13b/write_failure.py "gtlike" "gtlike failed or timed out with status $GTLIKE_STATUS" || true
            stage "gtlike" "FAIL"
            exit 37
          fi
          stage "gtlike" "OK"

          python acirm_r13b/parse_results.py || python acirm_r13b/write_failure.py "parse_results" "parse failed" || true
          stage "complete" "OK"
          BASH
          chmod +x acirm_r13b/run_inside_fermibottle.sh

          bash -n acirm_r13b/run_inside_fermibottle.sh
          python -m py_compile acirm_r13b/write_failure.py acirm_r13b/parse_results.py acirm_r13b/package_results.py

      - name: Pull FermiBottle image
        shell: bash
        run: |
          set -euo pipefail
          docker pull fssc/fermibottle:latest | tee logs/DOCKER_PULL.log
          docker image inspect fssc/fermibottle:latest > logs/DOCKER_IMAGE_INSPECT.json

      - name: Run R13B R6 inside FermiBottle with entrypoint bypass
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p data results logs final_artifact pfiles
          docker run --rm \
            --entrypoint /bin/bash \
            -v "$PWD":/work \
            -w /work \
            fssc/fermibottle:latest \
            -lc 'cd /work && echo CONTAINER_PWD=$(pwd) && ls -lah /work && ls -lah /work/acirm_r13b && bash /work/acirm_r13b/run_inside_fermibottle.sh' \
            > logs/DOCKER_RUN_STDOUT.log 2> logs/DOCKER_RUN_STDERR.log
          DOCKER_STATUS=$?
          echo "$DOCKER_STATUS" > results/DOCKER_EXIT_STATUS.txt
          sudo chown -R "$USER:$USER" "$PWD" || true
          echo "DOCKER_STATUS=$DOCKER_STATUS"
          exit 0

      - name: Package R13B R6 results always
        if: always()
        shell: bash
        run: |
          set +e
          sudo chown -R "$USER:$USER" "$PWD" || true
          python3 acirm_r13b/package_results.py
          ls -lah final_artifact || true

      - name: Upload R13B R6 artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17M_R13B_R6_ENTRYPOINT_BYPASS_FERMITOOLS_RESULTS
          path: final_artifact/
          if-no-files-found: warn
