name: ACIRM R2V OSA init smoke test

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r2v-osa-init-smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R2V_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R2V_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS

      - name: System diagnostics
        run: |
          {
            echo "ACIRM R2V OSA init and command smoke test"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=OSA_INIT_AND_COMMAND_SMOKE_TEST_ONLY_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY"
            uname -a || true
            df -h || true
            free -h || true
            echo "HEASARC IPv4 probe"
            curl -4 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R2V_RESULTS/logs/system_diagnostics.log

      - name: Pull OSA Docker image and initialize OSA environment
        continue-on-error: true
        run: |
          {
            echo "Docker version"
            docker --version || true
            docker info || true

            echo "Pull integralsw/osa:latest"
            docker pull integralsw/osa:latest || true

            echo "OSA init smoke test inside container"
            docker run --rm integralsw/osa:latest bash -lc '
              set +e
              echo "inside container"
              uname -a || true
              echo "default PATH=$PATH"

              echo "absolute path existence"
              ls -l /opt/osa/bin/og_create /opt/osa/bin/spi_science_analysis /opt/osa/bin/spiros /opt/osa/bin/spimodfit /opt/osa/bin/dal_verify || true
              ls -l /opt/osa/bin/isdc_init_env.sh /opt/osa/bin/isdc_setup_env.sh || true

              echo "source isdc_init_env.sh"
              source /opt/osa/bin/isdc_init_env.sh || true
              echo "after init PATH=$PATH"
              env | sort | grep -E "^(ISDC|OSA|REP|PFILES|PATH|LD_LIBRARY_PATH|ROOTSYS|CFITSIO|HEADAS)" || true

              echo "command visibility after init"
              for c in og_create spi_science_analysis spiros spimodfit dal_verify fkeyprint ftcopy; do
                echo "--- $c ---"
                command -v "$c" || true
                which "$c" || true
              done

              echo "help/version probes"
              for c in og_create spi_science_analysis spiros spimodfit dal_verify; do
                echo "--- ${c} help/version probe ---"
                timeout 20 "$c" --help 2>&1 | head -80 || true
                timeout 20 "$c" -h 2>&1 | head -80 || true
                timeout 20 "$c" 2>&1 | head -80 || true
              done
            ' || true
          } | tee ACIRM_R21AX_R7G_R2V_RESULTS/logs/osa_init_command_smoke_test.log

      - name: Download minimal target products for DAL smoke test
        run: |
          python3 - <<'PY'
          import csv, hashlib, json, subprocess, time
          from pathlib import Path

          out = Path('ACIRM_R21AX_R7G_R2V_RESULTS')
          data = out / 'data'
          data.mkdir(parents=True, exist_ok=True)

          base = 'https://heasarc.gsfc.nasa.gov/FTP/integral/data'
          rev = '2504'
          scws = ['250400090010']
          products = ['swg.fits', 'spi_oper.fits.gz', 'spi_spectra.fits.gz', 'spi_gti.fits.gz']

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b''):
                      h.update(chunk)
              return h.hexdigest()

          rows = []
          for scw in scws:
              for product in products:
                  url = f'{base}/scw/{rev}/{scw}.001/{product}'
                  dest = data / 'scw' / rev / f'{scw}.001' / product
                  dest.parent.mkdir(parents=True, exist_ok=True)
                  tmp = str(dest) + '.part'
                  cmd = ['curl','-4','-L','--retry','5','--retry-delay','10','--connect-timeout','60','--max-time','900','-o',tmp,url]
                  row = {'scw_id':scw,'product':product,'url':url,'dest':str(dest),'ok':False,'returncode':'','bytes':0,'sha256':'','error':''}

                  try:
                      p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
                      row['returncode'] = p.returncode
                      if p.returncode == 0 and Path(tmp).exists() and Path(tmp).stat().st_size > 0:
                          if dest.exists():
                              dest.unlink()
                          Path(tmp).rename(dest)
                          row['ok'] = True
                          row['bytes'] = dest.stat().st_size
                          row['sha256'] = sha256_file(dest)
                      else:
                          row['error'] = p.stdout[-2000:]
                  except Exception as e:
                      row['error'] = repr(e)

                  rows.append(row)
                  print(row)

          with open(out / 'r2v_minimal_download_manifest.csv','w',newline='',encoding='utf-8') as f:
              w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
              w.writeheader()
              w.writerows(rows)

          summary = {
              'run_id':'ACIRM_R21AX_R7G_R2V_OSA_INIT_AND_COMMAND_SMOKE_TEST_LIGHT',
              'created_utc':time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'claim_ceiling':'OSA_INIT_AND_COMMAND_SMOKE_TEST_ONLY_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY',
              'minimal_download_ok_count':sum(1 for r in rows if r['ok']),
              'minimal_download_total_count':len(rows),
              'final_status':'R21AX_R7G_R2V_OSA_INIT_SMOKE_TEST_RAN_LIGHT_ARTIFACT_READY_FOR_AUDIT_NO_511_YET'
          }

          with open(out / 'R2V_SMOKE_TEST_SUMMARY.json','w',encoding='utf-8') as f:
              json.dump(summary, f, indent=2, sort_keys=True)

          print(json.dumps(summary, indent=2))
          PY

      - name: Run DAL verify smoke test inside OSA container on downloaded SWG
        continue-on-error: true
        run: |
          {
            echo "DAL verify smoke test with mounted data"
            docker run --rm -v "$PWD/ACIRM_R21AX_R7G_R2V_RESULTS/data:/data" integralsw/osa:latest bash -lc '
              set +e
              source /opt/osa/bin/isdc_init_env.sh || true
              export PATH=/opt/osa/bin:$PATH
              echo "PATH=$PATH"
              echo "find mounted files"
              find /data -maxdepth 5 -type f -printf "%p %s\n" | sort || true
              echo "dal_verify on swg.fits"
              dal_verify /data/scw/2504/250400090010.001/swg.fits 2>&1 | head -200 || true
              echo "og_create empty/help probe"
              og_create 2>&1 | head -120 || true
            ' || true
          } | tee ACIRM_R21AX_R7G_R2V_RESULTS/logs/dal_verify_mounted_data_smoke_test.log

      - name: Build LIGHT audit package only
        run: |
          mkdir -p ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/logs
          cp -r ACIRM_R21AX_R7G_R2V_RESULTS/logs/* ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R2V_RESULTS/*.json ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/ || true
          cp ACIRM_R21AX_R7G_R2V_RESULTS/*.csv ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/ || true

          echo "Heavy data excluded from artifact; minimal smoke files were downloaded only on runner." > ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt

          du -h ACIRM_R21AX_R7G_R2V_RESULTS/data > ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/data_size_report.txt || true
          find ACIRM_R21AX_R7G_R2V_RESULTS/data -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/data_file_list.csv || true

          cat > ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS/R2V_CLAIM_BOUNDARY.txt <<'EOF'
          ACIRM R2V claim boundary:
          - OSA init and command smoke test only.
          - Minimal data/DAL smoke test only.
          - No 511 keV metric is computed.
          - Not OSA proof and not discovery.
          EOF

          zip -r ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS.zip ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS
          sha256sum ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS.zip > ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R2V LIGHT artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R2V_LIGHT_RESULTS.zip.sha256.txt
