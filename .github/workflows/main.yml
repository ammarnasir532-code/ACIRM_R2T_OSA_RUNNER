name: ACIRM R22F R10B R7 SPI511 og_create noninteractive repair

on:
  workflow_dispatch:

jobs:
  r22f-r10b-r7-spi511-ogcreate-noninteractive-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare locked state
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="R22F_R10B_R7_SPI511_OGCREATE_NONINTERACTIVE_REPAIR_EXECUTION"
          CACHE="ACIRM_CACHE_R10B_R4"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "CACHE=${CACHE}" >> "$GITHUB_ENV"
          mkdir -p "$RUN_ID" "$RUN_ID/logs" "$RUN_ID/scripts" "$RUN_ID/slim_results"
          mkdir -p "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"
          echo "false" > "$RUN_ID/OG_CREATE_PASS.flag"
          echo "not_started" > "$RUN_ID/RUN_STAGE.txt"
          cat > "$RUN_ID/LOCK.json" <<'JSON'
          {
            "run_id": "R22F_R10B_R7_SPI511_OGCREATE_NONINTERACTIVE_REPAIR_EXECUTION",
            "parent_result": "R22F_R10B_R6_OG_CREATE_FAILED_AFTER_VALIDATED_NOTTY_AND_ABSOLUTE_DOL_NO_THEORY_FAILURE",
            "critical_repair": "Call osa-container wrapper with raw command string and pass og_create instrument=SPI mode=h noninteractively.",
            "instrument": "INTEGRAL_SPI",
            "revision": "2504",
            "line_band_keV": [508.0, 514.0],
            "low_sideband_keV": [490.0, 500.0],
            "high_sideband_keV": [522.0, 532.0],
            "min_line_to_sideband_ratio": 1.2,
            "locked_scw": [
              "250400090010",
              "250400020010",
              "250400080010",
              "250400030010",
              "250400070021",
              "250400040010",
              "250400060010",
              "250400050010"
            ],
            "claim_ceiling": "OGCREATE_NONINTERACTIVE_REPAIR_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
            "no_rescue_rules": [
              "No energy-band change after results.",
              "No SCW drop after results.",
              "No threshold reduction after results.",
              "No heavy redownload by default.",
              "No 511 measurement accepted from cache or index metadata.",
              "Any technical failure is TECHNICAL_NO_GO_NO_THEORY_FAILURE."
            ]
          }
          JSON

      - name: Install tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y xvfb zip unzip curl ca-certificates python3-pip
          {
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner=$(uname -a)"
            echo "disk_start"; df -h
            echo "memory_start"; free -h || true
            echo "docker_version"; docker --version || true
          } | tee "$RUN_ID/logs/system_preflight.log"

      - name: Restore existing R4/R5/R6 cache
        uses: actions/cache@v4
        with:
          path: ACIRM_CACHE_R10B_R4
          key: acirm-r22f-r10b-r4-rev2504-cache-v1
          restore-keys: |
            acirm-r22f-r10b-r4-rev2504-cache-
            acirm-r22f-r10b-r5-
            acirm-r22f-r10b-r6-

      - name: Verify cache and write absolute SWG DOL list
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          SCWS=(250400090010 250400020010 250400080010 250400030010 250400070021 250400040010 250400060010 250400050010)
          : > "$RUN_ID/scw_dol.list"
          missing=0
          for scw in "${SCWS[@]}"; do
            host_file="$CACHE/scw/2504/${scw}.001/swg.fits"
            if [ -s "$host_file" ]; then
              echo "FOUND_SWG: $host_file" | tee -a "$RUN_ID/logs/cache_verify.log"
              echo "/data/scw/2504/${scw}.001/swg.fits" >> "$RUN_ID/scw_dol.list"
            else
              echo "MISSING_SWG: $host_file" | tee -a "$RUN_ID/logs/cache_verify.log"
              missing=$((missing+1))
            fi
          done
          echo "$missing" > "$RUN_ID/logs/swg_missing_count.txt"
          find "$CACHE" -maxdepth 3 -type d | sort | tee "$RUN_ID/logs/cache_tree.log"
          du -sh "$CACHE" 2>/dev/null | tee "$RUN_ID/logs/cache_size.log" || true
          cat "$RUN_ID/scw_dol.list" | tee "$RUN_ID/logs/scw_dol_list.log"
          if [ "$missing" != "0" ]; then
            echo "CACHE_INCOMPLETE_NO_HEAVY_REDOWNLOAD_IN_R7" | tee "$RUN_ID/logs/cache_incomplete_no_go.log"
          fi

      - name: Fetch and patch OSA wrapper no-TTY
        shell: bash
        continue-on-error: true
        run: |
          set +e
          echo "wrapper_fetch_patch" > "$RUN_ID/RUN_STAGE.txt"
          curl -L --retry 3 --retry-delay 5 \
            https://raw.githubusercontent.com/ISDC-integral/osa-docker/master/osa-container.sh \
            -o osa-container.sh 2>&1 | tee "$RUN_ID/logs/osa_wrapper_fetch.log"
          fetch_rc=${PIPESTATUS[0]}
          python3 - <<'PY'
          from pathlib import Path
          p=Path("osa-container.sh")
          txt=p.read_text(encoding="utf-8", errors="replace")
          txt=txt.replace("--rm -it --user", "--rm --user")
          txt=txt.replace("--rm -i -t --user", "--rm --user")
          txt=txt.replace("--rm -ti --user", "--rm --user")
          txt=txt.replace("--rm -it", "--rm")
          txt=txt.replace("docker run -it", "docker run")
          Path("osa-container.notty.sh").write_text(txt, encoding="utf-8")
          PY
          chmod +x osa-container.notty.sh 2>/dev/null || true
          echo "$fetch_rc" > "$RUN_ID/logs/osa_wrapper_fetch_exit_code.txt"
          grep -n -A4 -B2 "docker run" osa-container.notty.sh > "$RUN_ID/logs/osa_wrapper_docker_run_notty_excerpt.txt" || true
          if grep -Eq -- 'docker run.*(^|[[:space:]])-it([[:space:]]|$)|--rm[[:space:]]+-it' osa-container.notty.sh; then
            echo "NOTTY_PATCH_FAILED_STILL_HAS_IT" | tee "$RUN_ID/logs/notty_patch_validation.log"
            echo 91 > "$RUN_ID/logs/notty_patch_validation_exit_code.txt"
          else
            echo "NOTTY_PATCH_VALIDATED" | tee "$RUN_ID/logs/notty_patch_validation.log"
            echo 0 > "$RUN_ID/logs/notty_patch_validation_exit_code.txt"
          fi

      - name: Write OSA bootstrap and extractor
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUN_ID/scripts/osa_command_bootstrap.sh" <<'SH'
          #!/usr/bin/env bash
          set +e
          echo "BOOTSTRAP_START"
          echo "initial_PATH=$PATH"
          for s in /etc/profile /init.d/*.sh /home/integral/.bashrc /home/integral/.profile /opt/osa*/*.sh /opt/osa*/bin/*.sh /usr/local/osa*/*.sh; do
            [ -f "$s" ] && . "$s" >/dev/null 2>&1 && echo "sourced=$s"
          done
          og_path="$(find / -type f -name og_create 2>/dev/null | head -1)"
          spi_path="$(find / -type f -name spi_science_analysis 2>/dev/null | head -1)"
          [ -n "$og_path" ] && export PATH="$(dirname "$og_path"):$PATH" && echo "found_og_create=$og_path"
          [ -n "$spi_path" ] && export PATH="$(dirname "$spi_path"):$PATH" && echo "found_spi_science_analysis=$spi_path"
          echo "final_PATH=$PATH"
          command -v og_create || true
          command -v spi_science_analysis || true
          command -v plist || true
          command -v pset || true
          command -v pquery2 || true
          if command -v og_create >/dev/null 2>&1 && command -v spi_science_analysis >/dev/null 2>&1; then
            echo "BOOTSTRAP_COMMANDS_PASS"
            exit 0
          else
            echo "BOOTSTRAP_COMMANDS_FAIL"
            exit 17
          fi
          SH
          chmod +x "$RUN_ID/scripts/osa_command_bootstrap.sh"

          cat > "$RUN_ID/scripts/r10b_r7_extract_line_sideband.py" <<'PY'
          import json, csv
          from pathlib import Path
          import numpy as np

          RUN_ID="R22F_R10B_R7_SPI511_OGCREATE_NONINTERACTIVE_REPAIR_EXECUTION"
          ROOT=Path.cwd(); OUT=ROOT/RUN_ID
          LINE=(508.0,514.0); LOW=(490.0,500.0); HIGH=(522.0,532.0); MIN_RATIO=1.2
          rows=[]
          try:
              from astropy.io import fits
          except Exception as e:
              (OUT/"line_sideband_status.json").write_text(json.dumps({"status":"ASTROPY_UNAVAILABLE","error":repr(e)},indent=2),encoding="utf-8")
              raise SystemExit(0)
          def integrate(e1,e2,y,band):
              e1=np.asarray(e1,dtype=float); e2=np.asarray(e2,dtype=float); y=np.asarray(y,dtype=float)
              m=np.isfinite(e1)&np.isfinite(e2)&np.isfinite(y)&(e2>=band[0])&(e1<=band[1])
              return float(np.nansum(y[m])) if m.any() else None
          for p in sorted(OUT.rglob("*.fit*")):
              try:
                  hdul=fits.open(p, memmap=False)
                  for hdu_i,h in enumerate(hdul):
                      data=getattr(h,"data",None)
                      if data is None or not hasattr(data,"names") or data.names is None:
                          continue
                      names=[n.upper() for n in data.names]
                      e1=e2=None
                      for a,b in [("E_MIN","E_MAX"),("ENERG_LO","ENERG_HI"),("CHANNEL_LO","CHANNEL_HI")]:
                          if a in names and b in names:
                              e1=np.asarray(data[data.names[names.index(a)]],dtype=float)
                              e2=np.asarray(data[data.names[names.index(b)]],dtype=float)
                              break
                      if e1 is None:
                          continue
                      candidates=[]
                      for cname in ["COUNTS","RATE","FLUX","VALUE","SPEC","Y"]:
                          if cname in names:
                              candidates.append(data.names[names.index(cname)])
                      if not candidates:
                          for n in data.names:
                              if n.upper() not in ("E_MIN","E_MAX","ENERG_LO","ENERG_HI","CHANNEL_LO","CHANNEL_HI"):
                                  try:
                                      arr=np.asarray(data[n],dtype=float)
                                      if arr.ndim==1 and len(arr)==len(e1):
                                          candidates.append(n)
                                  except Exception:
                                      pass
                      for cname in candidates[:8]:
                          try:
                              y=np.asarray(data[cname],dtype=float)
                              if y.ndim!=1 or len(y)!=len(e1):
                                  continue
                              line=integrate(e1,e2,y,LINE); low=integrate(e1,e2,y,LOW); high=integrate(e1,e2,y,HIGH)
                              sides=[v for v in [low,high] if v is not None]
                              side=sum(sides)/len(sides) if sides else None
                              ratio=(line/side) if (line is not None and side not in (None,0)) else None
                              rows.append({"file":str(p),"provenance":"RUN_OUTPUT","hdu":hdu_i,"column":cname,"line_508_514":line,"low_490_500":low,"high_522_532":high,"sideband_mean":side,"line_to_sideband_ratio":ratio,"passes_min_ratio":bool(ratio is not None and ratio>=MIN_RATIO)})
                          except Exception:
                              continue
              except Exception:
                  continue
          with (OUT/"line_sideband_candidates.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","provenance","hdu","column","line_508_514","low_490_500","high_522_532","sideband_mean","line_to_sideband_ratio","passes_min_ratio"])
              w.writeheader(); w.writerows(rows)
          valid=[r for r in rows if r.get("line_to_sideband_ratio") not in (None,"")]
          best=max(valid, key=lambda r: float(r["line_to_sideband_ratio"])) if valid else None
          status={"candidate_rows":len(rows),"valid_ratio_rows":len(valid),"best_candidate":best,"claim_ceiling":"RUN_OUTPUT only; requires OSA provenance and controls"}
          (OUT/"line_sideband_status.json").write_text(json.dumps(status,indent=2),encoding="utf-8")
          print(json.dumps(status,indent=2))
          PY

      - name: OSA command preflight using corrected wrapper invocation
        shell: bash
        continue-on-error: true
        run: |
          set +e
          echo "osa_command_preflight" > "$RUN_ID/RUN_STAGE.txt"
          missing="$(cat "$RUN_ID/logs/swg_missing_count.txt" 2>/dev/null || echo 99)"
          patch_rc="$(cat "$RUN_ID/logs/notty_patch_validation_exit_code.txt" 2>/dev/null || echo 99)"
          if [ "$missing" != "0" ]; then
            echo "SKIP_PREFLIGHT_CACHE_INCOMPLETE" | tee "$RUN_ID/logs/osa_command_preflight.log"
            echo 78 > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
            exit 0
          fi
          if [ "$patch_rc" != "0" ]; then
            echo "SKIP_PREFLIGHT_NOTTY_PATCH_FAILED" | tee "$RUN_ID/logs/osa_command_preflight.log"
            echo 91 > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="yes"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.notty.sh docker '
            set +e
            echo "INSIDE_R7_PREFLIGHT"
            echo "PWD=$(pwd)"
            echo "REP_BASE_PROD=$REP_BASE_PROD"
            echo "CURRENT_IC=$CURRENT_IC"
            ls -ld /data/scw /data/aux /data/ic /data/idx 2>/dev/null || true
            bash /home/integral/R22F_R10B_R7_SPI511_OGCREATE_NONINTERACTIVE_REPAIR_EXECUTION/scripts/osa_command_bootstrap.sh
          ' 2>&1 | tee "$RUN_ID/logs/osa_command_preflight.log"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
          if [ "$rc" = "0" ]; then echo "true" > "$RUN_ID/PREFLIGHT_PASS.flag"; else echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"; fi
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: og_create noninteractive repair
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          echo "og_create" > "$RUN_ID/RUN_STAGE.txt"
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_OG_CREATE_PREFLIGHT_FAILED" | tee "$RUN_ID/logs/og_create.log"
            echo 77 > "$RUN_ID/logs/og_create_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.notty.sh docker '
            set +e
            cd /home/integral/R22F_R10B_R7_SPI511_OGCREATE_NONINTERACTIVE_REPAIR_EXECUTION || exit 80
            bash scripts/osa_command_bootstrap.sh || exit 91
            echo "PWD=$(pwd)"
            echo "--- scw_dol.list ---"
            cat scw_dol.list
            rm -rf obs r10b_r7_og og_spi.fits 2>/dev/null || true
            echo "--- plist og_create before run ---"
            plist og_create 2>&1 | head -120 || true
            echo "--- og_create named-parameter attempt ---"
            og_create idxSwg="scw_dol.list" instrument="SPI" ogid="r10b_r7_og" baseDir="." mode=h clobber=yes
            rc=$?
            echo "og_create_named_rc=$rc"
            if [ "$rc" != "0" ]; then
              echo "--- og_create positional fallback ---"
              og_create scw_dol.list SPI r10b_r7_og ./ mode=h clobber=yes
              rc=$?
              echo "og_create_positional_rc=$rc"
            fi
            echo "--- outputs after og_create ---"
            find . -maxdepth 5 -type f | sort | head -400
            exit $rc
          ' 2>&1 | tee "$RUN_ID/logs/og_create.log"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$RUN_ID/logs/og_create_exit_code.txt"
          if [ "$rc" = "0" ]; then echo "true" > "$RUN_ID/OG_CREATE_PASS.flag"; else echo "false" > "$RUN_ID/OG_CREATE_PASS.flag"; fi
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: SPI science analysis only if og_create passed
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          echo "spi_science_analysis" > "$RUN_ID/RUN_STAGE.txt"
          if [ "$(cat "$RUN_ID/OG_CREATE_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_SPI_ANALYSIS_OG_CREATE_NOT_VALID" | tee "$RUN_ID/logs/spi_science_analysis.log"
            echo 77 > "$RUN_ID/logs/spi_science_analysis_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.notty.sh docker '
            set +e
            cd /home/integral/R22F_R10B_R7_SPI511_OGCREATE_NONINTERACTIVE_REPAIR_EXECUTION || exit 80
            bash scripts/osa_command_bootstrap.sh || exit 92
            echo "--- available OG files ---"
            find . -maxdepth 5 \( -name "*og*.fits" -o -name "og_spi.fits" -o -name "*.fits" \) -type f | sort | tee logs/available_fits_before_spi.txt
            og_file="$(find . -maxdepth 5 \( -name "og_spi.fits" -o -name "*og*.fits" \) -type f | head -1)"
            if [ -z "$og_file" ]; then
              echo "NO_OG_FILE_FOUND_AFTER_OG_CREATE"
              exit 93
            fi
            echo "USING_OG_FILE=$og_file"
            echo "--- plist spi_science_analysis before run ---"
            plist spi_science_analysis 2>&1 | head -160 || true
            timeout 90m spi_science_analysis obs_group="$og_file" mode=h
            rc=$?
            echo "spi_science_analysis_rc=$rc"
            find . -maxdepth 8 -type f | sort | head -700
            exit $rc
          ' 2>&1 | tee "$RUN_ID/logs/spi_science_analysis.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/spi_science_analysis_exit_code.txt"
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: Extract locked 511 line-sideband candidates from RUN_OUTPUT only
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          echo "line_sideband_extract" > "$RUN_ID/RUN_STAGE.txt"
          python3 -m pip install -q astropy numpy pandas
          python3 "$RUN_ID/scripts/r10b_r7_extract_line_sideband.py" 2>&1 | tee "$RUN_ID/logs/line_sideband_extract.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/line_sideband_extract_exit_code.txt"

      - name: Build final guarded package
        shell: bash
        if: ${{ always() }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, csv, hashlib
          from pathlib import Path
          RUN_ID="R22F_R10B_R7_SPI511_OGCREATE_NONINTERACTIVE_REPAIR_EXECUTION"
          OUT=Path(RUN_ID)
          def read_exit(name):
              p=OUT/"logs"/name
              try: return int(p.read_text().strip().splitlines()[-1])
              except Exception: return None
          def read_text(p):
              try: return Path(p).read_text().strip()
              except Exception: return None
          preflight=(OUT/"PREFLIGHT_PASS.flag").read_text().strip()=="true" if (OUT/"PREFLIGHT_PASS.flag").exists() else False
          og_pass=(OUT/"OG_CREATE_PASS.flag").read_text().strip()=="true" if (OUT/"OG_CREATE_PASS.flag").exists() else False
          swg_missing=int(read_text(OUT/"logs/swg_missing_count.txt") or 99)
          patch=read_exit("notty_patch_validation_exit_code.txt")
          pre=read_exit("osa_command_preflight_exit_code.txt")
          og=read_exit("og_create_exit_code.txt")
          spi=read_exit("spi_science_analysis_exit_code.txt")
          ext=read_exit("line_sideband_extract_exit_code.txt")
          line={}
          if (OUT/"line_sideband_status.json").exists():
              try: line=json.loads((OUT/"line_sideband_status.json").read_text())
              except Exception: line={}
          valid=int(line.get("valid_ratio_rows",0) or 0)
          best=line.get("best_candidate")
          if swg_missing != 0:
              decision="R22F_R10B_R7_CACHE_INCOMPLETE_NO_HEAVY_REDOWNLOAD_NO_THEORY_FAILURE"
          elif patch not in (0,None):
              decision="R22F_R10B_R7_NOTTY_PATCH_VALIDATION_FAILED_NO_THEORY_FAILURE"
          elif not preflight:
              decision="R22F_R10B_R7_OSA_PREFLIGHT_FAILED_NO_THEORY_FAILURE"
          elif not og_pass:
              decision="R22F_R10B_R7_OG_CREATE_NONINTERACTIVE_REPAIR_FAILED_NO_THEORY_FAILURE"
          elif spi not in (0,None):
              decision="R22F_R10B_R7_SPI_SCIENCE_ANALYSIS_TECHNICAL_NO_GO_NO_THEORY_FAILURE"
          elif valid and best and best.get("passes_min_ratio"):
              decision="R22F_R10B_R7_SPI511_RUN_OUTPUT_LINE_SIDEBAND_RATIO_PASS_REQUIRES_CONTROLS_NOT_PROOF"
          elif valid:
              decision="R22F_R10B_R7_LINE_SIDEBAND_RATIO_AVAILABLE_AUDIT_REQUIRED_NOT_PRODUCT_PROOF"
          else:
              decision="R22F_R10B_R7_NO_USABLE_RUN_OUTPUT_LINE_SIDEBAND_SPECTRUM_NO_THEORY_FAILURE"
          status={
              "run_id":RUN_ID,
              "decision":decision,
              "swg_missing_count":swg_missing,
              "notty_patch_validation_exit":patch,
              "preflight_pass":preflight,
              "og_create_pass":og_pass,
              "osa_command_preflight_exit":pre,
              "og_create_exit":og,
              "spi_science_analysis_exit":spi,
              "line_sideband_extract_exit":ext,
              "valid_ratio_rows":valid,
              "best_candidate":best,
              "claim_ceiling":"OGCREATE_NONINTERACTIVE_REPAIR_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
              "raw_heavy_files_packaged":False,
              "cache_reuse_first":True,
              "no_rescue_applied":True
          }
          (OUT/"STATUS.json").write_text(json.dumps(status,indent=2,sort_keys=True),encoding="utf-8")
          with (OUT/"R22F_R10B_R7_GO_NO_GO_DECISION.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=list(status.keys()))
              w.writeheader(); w.writerow(status)
          rows=[]
          for p in sorted(OUT.rglob("*")):
              if p.is_file():
                  rows.append({"file":str(p.relative_to(OUT)),"sha256":hashlib.sha256(p.read_bytes()).hexdigest(),"bytes":p.stat().st_size})
          with (OUT/"MANIFEST_SHA256.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","sha256","bytes"])
              w.writeheader(); w.writerows(rows)
          print(json.dumps(status,indent=2,sort_keys=True))
          PY
          ZIP="${RUN_ID}_RESULTS.zip"
