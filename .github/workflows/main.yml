name: ACIRM R17K R4 og_create SCW List Variant Probe

on:
  workflow_dispatch:

jobs:
  r17k-r4-og-create-scw-list-variant-probe:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare locked inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R4_OUTPUTS logs scripts repo/scw/2504 selected_products og_attempts
          cat > scw_ids.list <<'EOF'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          EOF
          sed -i 's/^ *//' scw_ids.list
          cp scw_ids.list ACIRM_R17K_R4_OUTPUTS/LOCKED_SCW_IDS.txt
          cat > ACIRM_R17K_R4_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R4_OG_CREATE_SCW_LIST_VARIANT_PROBE
          OFFICIAL_OSA_PRODUCT_GENERATION_OR_LOCATOR_ONLY
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_PRODUCTS_AND_LOCKED_CONTROLS_PASS
          EOF

      - name: System diagnostics and Python deps
        shell: bash
        run: |
          set +e
          uname -a | tee logs/uname.txt
          df -h | tee logs/df_start.txt
          free -h | tee logs/free_start.txt
          docker --version | tee logs/docker_version.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y curl wget zip unzip python3-pip > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy requests pyyaml > logs/pip_install.log 2>&1

      - name: Fetch SPI-focused locked SCW files from HEASARC
        shell: bash
        run: |
          set -Eeuo pipefail
          cat > scripts/fetch_spi_focused.py <<'PY'
          import re, json
          from pathlib import Path
          from urllib.parse import urljoin
          import requests

          REV = "2504"
          SCWS = [x.strip() for x in Path("scw_ids.list").read_text().splitlines() if x.strip()]
          BASE = f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{REV}/"
          OUT = Path("repo/scw") / REV
          OUT.mkdir(parents=True, exist_ok=True)

          KEEP_PREFIXES = ("spi_", "swg.fits", "sc_")
          KEEP_SUFFIXES = ("_scw.txt",)
          MAX_FILE_MB = 250
          MAX_TOTAL_MB = 3500
          TIMEOUT = 60

          session = requests.Session()
          session.headers.update({"User-Agent": "ACIRM-R17K-R4-fetch/1.0"})

          rows = []
          total = 0

          def hrefs(html):
              return sorted(set(m.group(1) for m in re.finditer(r"href=[\"']([^\"']+)[\"']", html, re.I)))

          def keep(fn):
              low = fn.lower()
              return low.startswith(KEEP_PREFIXES) or low.endswith(KEEP_SUFFIXES)

          for scw in SCWS:
              url = urljoin(BASE, scw + ".001/")
              d = OUT / (scw + ".001")
              d.mkdir(parents=True, exist_ok=True)

              try:
                  r = session.get(url, timeout=TIMEOUT, allow_redirects=True)
                  rows.append({"scw": scw, "listing_url": url, "listing_status": r.status_code})
                  if r.status_code != 200:
                      continue

                  files = [h for h in hrefs(r.text) if h and not h.endswith("/") and keep(h)]
                  rows.append({"scw": scw, "kept_file_count": len(files), "kept_files": ";".join(files)})

                  for fn in files:
                      fu = urljoin(url, fn)
                      try:
                          hd = session.head(fu, timeout=TIMEOUT, allow_redirects=True)
                          sz = hd.headers.get("Content-Length", "")
                          sz = int(sz) if sz.isdigit() else 0

                          if hd.status_code != 200:
                              rows.append({"scw": scw, "file": fn, "url": fu, "download": "HEAD_NOT_200", "status": hd.status_code})
                              continue

                          if sz and sz > MAX_FILE_MB * 1000 * 1000:
                              rows.append({"scw": scw, "file": fn, "url": fu, "download": "SKIP_TOO_LARGE", "size_bytes": sz})
                              continue

                          if sz and total + sz > MAX_TOTAL_MB * 1000 * 1000:
                              rows.append({"scw": scw, "file": fn, "url": fu, "download": "SKIP_TOTAL_LIMIT", "size_bytes": sz})
                              continue

                          rr = session.get(fu, timeout=TIMEOUT, stream=True, allow_redirects=True)
                          if rr.status_code != 200:
                              rows.append({"scw": scw, "file": fn, "url": fu, "download": "GET_NOT_200", "status": rr.status_code})
                              continue

                          n = 0
                          local = d / fn
                          with open(local, "wb") as f:
                              for chunk in rr.iter_content(1024 * 1024):
                                  if not chunk:
                                      continue
                                  n += len(chunk)
                                  if n > MAX_FILE_MB * 1000 * 1000:
                                      raise RuntimeError("file exceeded max")
                                  if total + n > MAX_TOTAL_MB * 1000 * 1000:
                                      raise RuntimeError("total exceeded max")
                                  f.write(chunk)

                          total += n
                          rows.append({"scw": scw, "file": fn, "url": fu, "local": str(local), "download": "DOWNLOADED", "size_bytes": n})

                      except Exception as e:
                          rows.append({"scw": scw, "file": fn, "url": fu, "download": "ERROR", "error": repr(e)[:300]})

              except Exception as e:
                  rows.append({"scw": scw, "listing_url": url, "download": "LISTING_ERROR", "error": repr(e)[:300]})

          Path("ACIRM_R17K_R4_OUTPUTS/R17K_R4_SCW_FETCH_AUDIT.json").write_text(
              json.dumps({"rows": rows, "total_bytes": total}, indent=2),
              encoding="utf-8"
          )
          PY

          python3 scripts/fetch_spi_focused.py | tee logs/fetch_spi_focused_stdout.log
          find repo/scw/2504 -maxdepth 2 -type f | sort > ACIRM_R17K_R4_OUTPUTS/R17K_R4_SCW_FILE_INVENTORY.txt
          du -ah repo/scw/2504 | sort -h | tail -100 > ACIRM_R17K_R4_OUTPUTS/R17K_R4_SCW_SIZE_INVENTORY.txt

      - name: Fetch lightweight IC IDX CAT AUX from HEASARC HTTP
        shell: bash
        run: |
          set +e
          cat > scripts/fetch_light_repo.py <<'PY'
          import re, json
          from pathlib import Path
          from urllib.parse import urljoin
          import requests

          STARTS = [
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/ic/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/spi/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/cat/hec/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/aux/",
          ]

          KEEP_TERMS = ("spi", "gnrl_refr_cat", "idx", "gain", "ebds", "rmf", "irf", "arf", "rsp", "time", "leap", "orbit", "aux")
          MAX_DEPTH = 3
          MAX_FILES = 260
          MAX_FILE_MB = 180
          MAX_TOTAL_MB = 4500
          TIMEOUT = 45

          session = requests.Session()
          session.headers.update({"User-Agent": "ACIRM-R17K-R4-light-repo/1.0"})

          rows = []
          q = [(u, MAX_DEPTH) for u in STARTS]
          seen = set()
          files = []
          total = 0

          def hrefs(html):
              return sorted(set(m.group(1) for m in re.finditer(r"href=[\"']([^\"']+)[\"']", html, re.I)))

          def keep_file(u):
              s = u.lower()
              return s.endswith((".fits", ".fit", ".fits.gz", ".fit.gz")) and any(t in s for t in KEEP_TERMS)

          while q and len(seen) < 220 and len(files) < MAX_FILES:
              url, depth = q.pop(0)
              if url in seen:
                  continue
              seen.add(url)

              try:
                  r = session.get(url, timeout=TIMEOUT, allow_redirects=True)
                  rows.append({"url": url, "depth": depth, "status": r.status_code, "bytes": len(r.content or b"")})
                  if r.status_code != 200:
                      continue

                  for h in hrefs(r.text):
                      if not h or h in ("../", "./", "/") or h.startswith("?"):
                          continue

                      full = urljoin(url, h)
                      if h.endswith("/") and depth > 0 and any(t in full.lower() for t in ("spi", "idx", "ic", "cat", "aux", "rsp", "cfg", "hec")):
                          q.append((full, depth - 1))
                      elif keep_file(full):
                          files.append(full)
                          if len(files) >= MAX_FILES:
                              break
              except Exception as e:
                  rows.append({"url": url, "error": repr(e)[:300]})

          downloaded = []
          for fu in sorted(set(files)):
              try:
                  hd = session.head(fu, timeout=TIMEOUT, allow_redirects=True)
                  sz = hd.headers.get("Content-Length", "")
                  sz = int(sz) if sz.isdigit() else 0

                  if hd.status_code != 200:
                      downloaded.append({"url": fu, "download": "HEAD_NOT_200", "status": hd.status_code})
                      continue

                  if sz and sz > MAX_FILE_MB * 1000 * 1000:
                      downloaded.append({"url": fu, "download": "SKIP_TOO_LARGE", "size_bytes": sz})
                      continue

                  if sz and total + sz > MAX_TOTAL_MB * 1000 * 1000:
                      downloaded.append({"url": fu, "download": "SKIP_TOTAL_LIMIT", "size_bytes": sz})
                      continue

                  rel = fu.split("/integral/data/", 1)[-1]
                  local = Path("repo") / rel
                  local.parent.mkdir(parents=True, exist_ok=True)

                  rr = session.get(fu, timeout=TIMEOUT, stream=True, allow_redirects=True)
                  if rr.status_code != 200:
                      downloaded.append({"url": fu, "download": "GET_NOT_200", "status": rr.status_code})
                      continue

                  n = 0
                  with open(local, "wb") as out:
                      for chunk in rr.iter_content(1024 * 1024):
                          if not chunk:
                              continue
                          n += len(chunk)
                          if n > MAX_FILE_MB * 1000 * 1000:
                              raise RuntimeError("file exceeded max")
                          if total + n > MAX_TOTAL_MB * 1000 * 1000:
                              raise RuntimeError("total exceeded max")
                          out.write(chunk)

                  total += n
                  downloaded.append({"url": fu, "local": str(local), "download": "DOWNLOADED", "size_bytes": n})

              except Exception as e:
                  downloaded.append({"url": fu, "download": "ERROR", "error": repr(e)[:300]})

          Path("ACIRM_R17K_R4_OUTPUTS/R17K_R4_LIGHT_REPO_FETCH_AUDIT.json").write_text(
              json.dumps({"crawl_rows": rows, "candidate_files": len(set(files)), "download_rows": downloaded, "total_bytes": total}, indent=2),
              encoding="utf-8"
          )
          PY

          python3 scripts/fetch_light_repo.py | tee logs/fetch_light_repo_stdout.log
          find repo -maxdepth 4 -type d | sort > ACIRM_R17K_R4_OUTPUTS/R17K_R4_REPO_DIRS.txt
          find repo -maxdepth 6 -type f | sort > ACIRM_R17K_R4_OUTPUTS/R17K_R4_REPO_FILES.txt
          du -sh repo > ACIRM_R17K_R4_OUTPUTS/R17K_R4_REPO_SIZE.txt

      - name: Pull OSA Docker and prepare runtime init script
        shell: bash
        run: |
          set +e
          docker pull integralsw/osa:latest > logs/docker_pull_integralsw_osa.log 2>&1
          echo "DOCKER_PULL_EXIT=$?" | tee ACIRM_R17K_R4_OUTPUTS/R17K_R4_DOCKER_PULL_EXIT.txt

          cat > scripts/osa_runtime_init.sh <<'SH'
          set +e

          export REP_BASE_PROD=/home/integral/repo
          export CURRENT_IC=/home/integral/repo
          export ISDC_REF_CAT=/home/integral/repo/cat/hec/gnrl_refr_cat_0043.fits[1]
          export HEADASNOQUERY=1
          export HEADASPROMPT=/dev/null

          for init in \
            /opt/osa/bin/osa-init.sh \
            /opt/osa/osa-init.sh \
            /opt/osa/init.sh \
            /opt/osa/.osa-init.sh \
            /usr/local/osa/bin/osa-init.sh
          do
            if [ -f "$init" ]; then
              echo "SOURCE_INIT=$init"
              . "$init" || true
            fi
          done

          LIB_DIRS=$(find /opt /usr/local /usr -type f \( -name 'libGui.so' -o -name 'libdal*.so*' -o -name 'libisdc*.so*' -o -name 'libspi*.so*' \) 2>/dev/null | xargs -r -n1 dirname | sort -u | tr '\n' ':')
          export LD_LIBRARY_PATH="${LIB_DIRS}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          OG=$(find /opt /usr/local /usr -type f -name og_create 2>/dev/null | head -1)
          SP=$(find /opt /usr/local /usr -type f -name spi_science_analysis 2>/dev/null | head -1)
          [ -n "$OG" ] && export PATH="$(dirname "$OG"):$PATH"
          [ -n "$SP" ] && export PATH="$(dirname "$SP"):$PATH"

          OG_PAR=$(find /opt /usr/local /usr -type f -name og_create.par 2>/dev/null | head -1)
          SP_PAR=$(find /opt /usr/local /usr -type f -name spi_science_analysis.par 2>/dev/null | head -1)
          SYS_PFILES=""
          if [ -n "$OG_PAR" ]; then SYS_PFILES="$(dirname "$OG_PAR")"; fi
          if [ -z "$SYS_PFILES" ] && [ -n "$SP_PAR" ]; then SYS_PFILES="$(dirname "$SP_PAR")"; fi

          mkdir -p /work/pfiles
          if [ -n "$SYS_PFILES" ]; then
            export PFILES="/work/pfiles;$SYS_PFILES"
          else
            export PFILES="/work/pfiles"
          fi

          echo "RUNTIME_INIT_REPORT_BEGIN"
          echo "REP_BASE_PROD=$REP_BASE_PROD"
          echo "CURRENT_IC=$CURRENT_IC"
          echo "ISDC_REF_CAT=$ISDC_REF_CAT"
          echo "PATH=$PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "PFILES=$PFILES"
          echo "OG=$OG"
          echo "SP=$SP"
          echo "OG_PAR=$OG_PAR"
          echo "SP_PAR=$SP_PAR"
          echo "SYS_PFILES=$SYS_PFILES"
          echo "RUNTIME_INIT_REPORT_END"
          SH
          chmod +x scripts/osa_runtime_init.sh

      - name: Probe og_create parameter files and SCW list variants
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/work" \
            -v "$PWD/repo:/home/integral/repo" \
            -w /work \
            integralsw/osa:latest bash -lc '
              set +e
              . /work/scripts/osa_runtime_init.sh

              mkdir -p /work/ACIRM_R17K_R4_OUTPUTS /work/og_attempts /work/pfiles

              echo "=== versions ===" > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OSA_PREFLIGHT_FULL.txt
              which og_create >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OSA_PREFLIGHT_FULL.txt 2>&1
              which spi_science_analysis >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OSA_PREFLIGHT_FULL.txt 2>&1
              og_create --version >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OSA_PREFLIGHT_FULL.txt 2>&1
              spi_science_analysis --version >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OSA_PREFLIGHT_FULL.txt 2>&1

              echo "=== og_create.par ===" > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OG_CREATE_PAR.txt
              find /opt /usr/local /usr -type f -name og_create.par 2>/dev/null -print -exec cat {} \; >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OG_CREATE_PAR.txt 2>&1

              echo "=== spi_science_analysis.par ===" > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_SPI_SCIENCE_ANALYSIS_PAR.txt
              find /opt /usr/local /usr -type f -name spi_science_analysis.par 2>/dev/null -print -exec cat {} \; >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_SPI_SCIENCE_ANALYSIS_PAR.txt 2>&1

              echo "=== pfiles before ===" > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_PFILES_LISTING.txt
              find /work/pfiles -maxdepth 2 -type f -print >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_PFILES_LISTING.txt 2>&1
              find /opt/osa/pfiles -maxdepth 1 -type f -name "*.par" | sort | head -200 >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_PFILES_LISTING.txt 2>&1

              # Build SCW list variants.
              : > /work/scw_variant_ids.list
              : > /work/scw_variant_rel_scw.list
              : > /work/scw_variant_rel_noscw.list
              : > /work/scw_variant_abs.list
              : > /work/scw_variant_abs_swg.list

              while read -r id; do
                [ -n "$id" ] || continue
                echo "$id" >> /work/scw_variant_ids.list
                echo "scw/2504/${id}.001" >> /work/scw_variant_rel_scw.list
                echo "2504/${id}.001" >> /work/scw_variant_rel_noscw.list
                echo "/home/integral/repo/scw/2504/${id}.001" >> /work/scw_variant_abs.list
                echo "/home/integral/repo/scw/2504/${id}.001/swg.fits" >> /work/scw_variant_abs_swg.list
              done < /work/scw_ids.list

              cp /work/scw_variant_*.list /work/ACIRM_R17K_R4_OUTPUTS/ 2>/dev/null || true

              echo "variant,syntax,exit_code,og_spi_found,attempt_dir" > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OG_CREATE_ATTEMPT_SUMMARY.csv

              try_og() {
                variant="$1"
                list="$2"
                syntax="$3"
                outdir="/work/og_attempts/${variant}_${syntax}"
                mkdir -p "$outdir"
                cd "$outdir"
                cp "$list" ./scw_input.list

                echo "=== TRY variant=$variant syntax=$syntax list=$list outdir=$outdir ===" > "$outdir/run.log"
                echo "PWD=$(pwd)" >> "$outdir/run.log"
                echo "PFILES=$PFILES" >> "$outdir/run.log"
                cat ./scw_input.list >> "$outdir/run.log"

                if [ "$syntax" = "positional" ]; then
                  og_create ./scw_input.list SPI "og_${variant}_${syntax}" ./ >> "$outdir/run.log" 2>&1
                elif [ "$syntax" = "named_basic" ]; then
                  og_create idxSwg=./scw_input.list instrument=SPI ogid="og_${variant}_${syntax}" baseDir=./ >> "$outdir/run.log" 2>&1
                elif [ "$syntax" = "named_alt" ]; then
                  og_create scwList=./scw_input.list instrument=SPI ogid="og_${variant}_${syntax}" baseDir=./ >> "$outdir/run.log" 2>&1
                else
                  echo "UNKNOWN_SYNTAX" >> "$outdir/run.log"
                fi

                ec=$?
                found=$(find "$outdir" -type f -name "og_spi.fits" | head -1)
                if [ -n "$found" ]; then yesno=1; else yesno=0; fi
                echo "${variant},${syntax},${ec},${yesno},${outdir}" >> /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OG_CREATE_ATTEMPT_SUMMARY.csv
                find "$outdir" -maxdepth 4 -type f | sort > "$outdir/file_inventory.txt"
                cd /work
              }

              for v in ids rel_scw rel_noscw abs abs_swg; do
                list="/work/scw_variant_${v}.list"
                [ -f "$list" ] || continue
                try_og "$v" "$list" positional
                try_og "$v" "$list" named_basic
                try_og "$v" "$list" named_alt
              done

              find /work/og_attempts -type f \( -name "og_spi.fits" -o -name "og_*.fits" -o -name "run.log" -o -name "file_inventory.txt" \) | sort > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_OG_ATTEMPT_FILES.txt

              first_og=$(find /work/og_attempts -type f -name "og_spi.fits" | head -1)
              echo "$first_og" > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_FIRST_OG_SPI_PATH.txt

              if [ -n "$first_og" ]; then
                cp "$first_og" /work/selected_products/og_spi.fits || true
              fi
            ' > logs/r17k_r4_og_probe.log 2>&1
          echo "R17K_R4_OG_PROBE_EXIT=$?" | tee ACIRM_R17K_R4_OUTPUTS/R17K_R4_OG_PROBE_EXIT.txt

      - name: Optional non-GUI spi_science_analysis only if og_spi exists
        shell: bash
        run: |
          set +e
          if [ ! -s ACIRM_R17K_R4_OUTPUTS/R17K_R4_FIRST_OG_SPI_PATH.txt ]; then
            echo "NO_OG_SPI_FOUND_SKIP_SPI_SCIENCE_ANALYSIS" | tee ACIRM_R17K_R4_OUTPUTS/R17K_R4_SPI_SCIENCE_ANALYSIS_EXIT.txt
            exit 0
          fi

          docker run --rm \
            -v "$PWD:/work" \
            -v "$PWD/repo:/home/integral/repo" \
            -w /work \
            integralsw/osa:latest bash -lc '
              set +e
              . /work/scripts/osa_runtime_init.sh
              first_og=$(cat /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_FIRST_OG_SPI_PATH.txt)
              attempt_dir=$(dirname "$first_og")
              cd "$attempt_dir"
              echo "RUNNING_SPI_SCIENCE_IN=$attempt_dir"
              spi_science_analysis mode=h
              echo "SPI_SCIENCE_ANALYSIS_MODE_H_EXIT=$?" > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_SPI_SCIENCE_ANALYSIS_EXIT.txt
              find "$attempt_dir" -type f \( -iname "*evts*det*spec*" -o -iname "*energy*bound*" -o -iname "*ebounds*" -o -iname "*spi*spect*" -o -iname "*.fits" \) | sort > /work/ACIRM_R17K_R4_OUTPUTS/R17K_R4_SPI_PRODUCTS_FOUND.txt
            ' > logs/r17k_r4_spi_science_optional.log 2>&1

      - name: Collect selected products and inspect
        shell: bash
        run: |
          set +e
          find . -type f \( -iname '*evts*det*spec*' -o -iname '*energy*bound*' -o -iname '*ebounds*' -o -iname 'og_spi.fits' \) | sort > ACIRM_R17K_R4_OUTPUTS/R17K_R4_SELECTED_PRODUCT_PATHS.txt

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -le 200000000 ]; then
              cp -f "$f" selected_products/ || true
            fi
          done < ACIRM_R17K_R4_OUTPUTS/R17K_R4_SELECTED_PRODUCT_PATHS.txt

          cp logs/*.log ACIRM_R17K_R4_OUTPUTS/ 2>/dev/null || true
          cp -r og_attempts ACIRM_R17K_R4_OUTPUTS/og_attempts_light_logs 2>/dev/null || true
          find ACIRM_R17K_R4_OUTPUTS/og_attempts_light_logs -type f ! -name 'run.log' ! -name 'file_inventory.txt' ! -name '*.txt' -delete 2>/dev/null || true

          cat > scripts/inspect_products.py <<'PY'
          import json, csv, math
          from pathlib import Path
          import numpy as np

          try:
              from astropy.io import fits
          except Exception:
              fits = None

          OUT = Path("ACIRM_R17K_R4_OUTPUTS")
          PROD = Path("selected_products")

          rows = []
          meas = []
          errs = []

          LINE = (508.0, 514.0)
          SB1 = (490.0, 500.0)
          SB2 = (522.0, 532.0)

          E_PAIRS = [
              ("E_MIN", "E_MAX"),
              ("ENERG_LO", "ENERG_HI"),
              ("ENERGY_LO", "ENERGY_HI"),
              ("E_LO", "E_HI"),
              ("EMIN", "EMAX"),
              ("E_LOW", "E_HIGH"),
          ]
          E_SINGLE = ["ENERGY", "E", "E_MEAN", "E_CENTER", "PI", "PHA", "CHANNEL", "CHAN"]
          C_COLS = ["COUNTS", "COUNT", "RATE", "SPECTRUM", "SPEC", "DATA", "FLUX", "VALUE", "NCOUNTS"]

          def arr(x):
              return np.asarray(x, dtype=float)

          def collapse(x, n):
              a = np.nan_to_num(arr(x), nan=0.0, posinf=0.0, neginf=0.0)
              if a.size == n:
                  return a.reshape(-1)[:n]
              if a.ndim >= 2 and a.shape[-1] == n:
                  return a.sum(axis=tuple(range(a.ndim - 1))).reshape(-1)
              if a.ndim >= 2 and a.shape[0] == n:
                  return a.sum(axis=tuple(range(1, a.ndim))).reshape(-1)
              return None

          def measure_edges(lo, hi, cnt):
              lo = arr(lo).reshape(-1)
              hi = arr(hi).reshape(-1)
              n = min(len(lo), len(hi))
              if n == 0:
                  return None
              lo = lo[:n]
              hi = hi[:n]
              c = collapse(cnt, n)
              if c is None:
                  return None

              width = np.maximum(1e-12, hi - lo)

              def frac(w):
                  return np.maximum(0, np.minimum(hi, w[1]) - np.maximum(lo, w[0])) / width

              line = float((c * frac(LINE)).sum())
              sb1 = float((c * frac(SB1)).sum())
              sb2 = float((c * frac(SB2)).sum())
              side = sb1 + sb2
              ratio = (line / 6) / (side / 20) if side > 0 else math.inf
              exp = side / 20 * 6 if side > 0 else math.nan
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan

              return {
                  "line_508_514_counts": line,
                  "side_490_500_counts": sb1,
                  "side_522_532_counts": sb2,
                  "side_total_counts": side,
                  "line_to_side_density_ratio": ratio,
                  "expected_line_from_side_density": exp,
                  "z_vs_side_density": z,
                  "energy_bins": n,
              }

          def measure_centers(e, cnt):
              e = arr(e).reshape(-1)
              c = collapse(cnt, len(e))
              if c is None or len(e) == 0:
                  return None

              line = float(np.nansum(c[(e >= LINE[0]) & (e <= LINE[1])]))
              sb1 = float(np.nansum(c[(e >= SB1[0]) & (e <= SB1[1])]))
              sb2 = float(np.nansum(c[(e >= SB2[0]) & (e <= SB2[1])]))
              side = sb1 + sb2
              ratio = (line / 6) / (side / 20) if side > 0 else math.inf
              exp = side / 20 * 6 if side > 0 else math.nan
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan

              return {
                  "line_508_514_counts": line,
                  "side_490_500_counts": sb1,
                  "side_522_532_counts": sb2,
                  "side_total_counts": side,
                  "line_to_side_density_ratio": ratio,
                  "expected_line_from_side_density": exp,
                  "z_vs_side_density": z,
                  "energy_bins": len(e),
              }

          if fits:
              for p in PROD.glob("*"):
                  if not p.name.lower().endswith((".fits", ".fit", ".fits.gz", ".fit.gz")):
                      continue
                  try:
                      with fits.open(p, memmap=True) as hdul:
                          for i, hdu in enumerate(hdul):
                              cols = []
                              nrows = ""
                              if hasattr(hdu, "columns") and hdu.columns is not None:
                                  cols = list(hdu.columns.names or [])
                              try:
                                  nrows = len(hdu.data) if getattr(hdu, "data", None) is not None else ""
                              except Exception:
                                  nrows = ""

                              rows.append({
                                  "file": p.name,
                                  "hdu_index": i,
                                  "hdu_name": hdu.name or "",
                                  "class": hdu.__class__.__name__,
                                  "rows": nrows,
                                  "column_count": len(cols),
                                  "columns": ";".join(cols[:120]),
                              })

                              if not (hasattr(hdu, "columns") and hdu.columns is not None and hdu.data is not None):
                                  continue

                              cmap = {c.upper(): c for c in cols}

                              for a, b in E_PAIRS:
                                  if a in cmap and b in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap:
                                              m = measure_edges(hdu.data[cmap[a]], hdu.data[cmap[b]], hdu.data[cmap[ck]])
                                              if m:
                                                  m.update({
                                                      "file": p.name,
                                                      "hdu_index": i,
                                                      "hdu_name": hdu.name or "",
                                                      "method": "same_hdu_edges",
                                                      "energy_source": cmap[a] + "|" + cmap[b],
                                                      "count_source": cmap[ck],
                                                  })
                                                  meas.append(m)

                              for ek in E_SINGLE:
                                  if ek in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap and ck != ek:
                                              m = measure_centers(hdu.data[cmap[ek]], hdu.data[cmap[ck]])
                                              if m:
                                                  m.update({
                                                      "file": p.name,
                                                      "hdu_index": i,
                                                      "hdu_name": hdu.name or "",
                                                      "method": "same_hdu_centers",
                                                      "energy_source": cmap[ek],
                                                      "count_source": cmap[ck],
                                                  })
                                                  meas.append(m)

                  except Exception as e:
                      errs.append({"file": str(p), "error": repr(e)[:300]})

          def write_csv(path, data):
              keys = []
              for r in data:
                  for k in r:
                      if k not in keys:
                          keys.append(k)
              if not keys:
                  keys = ["empty"]

              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=keys)
                  w.writeheader()
                  for r in data:
                      w.writerow({k: r.get(k, "") for k in keys})

          write_csv(OUT / "R17K_R4_SELECTED_PRODUCT_SCHEMA.csv", rows)
          write_csv(OUT / "R17K_R4_DIRECT_511_MEASUREMENT_ROWS.csv", meas)
          (OUT / "R17K_R4_PRODUCT_INSPECTION_ERRORS.json").write_text(json.dumps(errs, indent=2), encoding="utf-8")

          selected = list(PROD.glob("*"))
          attempt_summary = OUT / "R17K_R4_OG_CREATE_ATTEMPT_SUMMARY.csv"
          og_found = False
          if attempt_summary.exists():
              text = attempt_summary.read_text(errors="replace")
              og_found = ",1," in text or text.rstrip().endswith(",1")

          decision = "R17K_R4_NO_OG_SPI_CREATED_NO_OFFICIAL_PRODUCTS"
          if og_found:
              decision = "R17K_R4_OG_SPI_CREATED_DIAGNOSTIC_NOT_PROOF"
          if selected:
              decision = "R17K_R4_OFFICIAL_PRODUCTS_GENERATED_OR_FOUND_DIAGNOSTIC_NOT_PROOF"
          if meas:
              decision = "R17K_R4_DIRECT_511_ROWS_FROM_OFFICIAL_PRODUCTS_FOUND_DIAGNOSTIC_NOT_PROOF"

          summary = {
              "decision": decision,
              "proof_allowed": False,
              "selected_product_count": len(selected),
              "direct_511_measurement_rows": len(meas),
              "schema_rows": len(rows),
              "claim_ceiling": [
                  "OFFICIAL_OSA_PRODUCT_GENERATION_OR_LOCATOR_ONLY",
                  "NOT_DISCOVERY",
                  "NOT_PARTICLE_PROOF",
                  "NOT_SOURCE_ATTRIBUTION",
                  "NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_LOCKED_CONTROLS_PASS"
              ]
          }

          (OUT / "R17K_R4_DECISION.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

          python3 scripts/inspect_products.py | tee logs/inspect_products.log

      - name: Package slim artifact
        shell: bash
        run: |
          set +e
          cp -r selected_products ACIRM_R17K_R4_OUTPUTS/selected_products 2>/dev/null || true
          find selected_products -maxdepth 1 -type f -printf '%f,%s\n' | sort > ACIRM_R17K_R4_OUTPUTS/R17K_R4_SELECTED_PRODUCTS_MANIFEST.csv || true
          df -h > ACIRM_R17K_R4_OUTPUTS/R17K_R4_DF_END.txt
          free -h > ACIRM_R17K_R4_OUTPUTS/R17K_R4_FREE_END.txt
          zip -r ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT.zip ACIRM_R17K_R4_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT.zip > ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT.zip ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT.zip.sha256.txt

      - name: Upload slim artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT
          path: |
            ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT.zip
            ACIRM_R17K_R4_OG_CREATE_VARIANT_PROBE_OUTPUT.zip.sha256.txt
          retention-days: 7
