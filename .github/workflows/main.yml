name: ACIRM R17K R8T Wide Product First SPI511 Search Compact

on:
  workflow_dispatch:
    inputs:
      rev_start:
        required: false
        default: '2440'
      rev_end:
        required: false
        default: '2560'
      max_files:
        required: false
        default: '180'
      download_mb_cap:
        required: false
        default: '350'

permissions:
  contents: read
  actions: write

jobs:
  r17k-r8t-wide-product-first-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      REV_START: ${{ inputs.rev_start }}
      REV_END: ${{ inputs.rev_end }}
      MAX_FILES: ${{ inputs.max_files }}
      DOWNLOAD_MB_CAP: ${{ inputs.download_mb_cap }}

    steps:
      - name: Prepare
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R8T_OUTPUTS logs scripts repo/scw repo/ic repo/idx repo/cat repo/aux
          cat > ACIRM_R17K_R8T_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH
          PRODUCT_FIRST_WIDE_SEARCH_FOR_CALIBRATED_508_514_EXCESS
          LIGHT HEASARC spi_spectra.fits.gz ONLY WHEN CACHE IS MISSING
          USES SPI CHAN_KEV / KEV_CHAN CALIBRATION CANDIDATES
          NO CHANNEL_APPROXIMATION AS PROOF
          BACKTRACE ALLOWED ONLY AFTER MODERATE_OR_STRONG_511_CANDIDATE
          DIAGNOSTIC_NOT_PROOF
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF
          EOF
          printf 'REV_START=%s\nREV_END=%s\nMAX_FILES=%s\nDOWNLOAD_MB_CAP=%s\n' "$REV_START" "$REV_END" "$MAX_FILES" "$DOWNLOAD_MB_CAP" > ACIRM_R17K_R8T_OUTPUTS/R17K_R8T_INPUTS.txt

      - name: Restore wide spectra cache
        id: restore-wide
        uses: actions/cache/restore@v4
        with:
          path: repo/scw
          key: acirm-r17k-r8t-wide-spi-spectra-${{ inputs.rev_start }}-${{ inputs.rev_end }}-max${{ inputs.max_files }}-v2
          restore-keys: |
            acirm-r17k-r8t-wide-spi-spectra-

      - name: Restore calibration tree cache
        id: restore-tree
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1
          restore-keys: |
            acirm-r17k-r8e-minimal-osa-tree-

      - name: Install tools
        shell: bash
        run: |
          set +e
          echo "WIDE_CACHE_HIT=${{ steps.restore-wide.outputs.cache-hit }}" | tee ACIRM_R17K_R8T_OUTPUTS/R17K_R8T_WIDE_CACHE_HIT.txt
          echo "TREE_CACHE_HIT=${{ steps.restore-tree.outputs.cache-hit }}" | tee ACIRM_R17K_R8T_OUTPUTS/R17K_R8T_TREE_CACHE_HIT.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip python3-pip ca-certificates > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy > logs/pip_install.log 2>&1

      - name: Fetch and search product-first 511
        shell: bash
        run: |
          set +e
          cat > scripts/r8t.py <<'PY'
          import csv,json,math,os,re,time,urllib.request,warnings
          from pathlib import Path
          import numpy as np
          from astropy.io import fits

          OUT=Path('ACIRM_R17K_R8T_OUTPUTS'); SCW=Path('repo/scw'); IC=Path('repo/ic')
          REV_START=int(os.environ.get('REV_START','2440')); REV_END=int(os.environ.get('REV_END','2560'))
          MAX_FILES=int(os.environ.get('MAX_FILES','180')); CAP=int(float(os.environ.get('DOWNLOAD_MB_CAP','350'))*1024*1024)
          LINE=(508.,514.); SB1=(490.,500.); SB2=(522.,532.)
          ERR=[]; FETCH=[]; CAL=[]; ROW=[]; CAND=[]
          PB=[]
          for st in np.arange(430.,590.1,2.):
              b=(float(st),float(st+6.));
              if max(b[0],488.)<min(b[1],516.) or max(b[0],520.)<min(b[1],534.): continue
              PB.append((b,(b[0]-18.,b[0]-8.),(b[1]+8.,b[1]+18.)))

          def wcsv(p,rows):
              ks=[]
              for r in rows:
                  for k in r:
                      if k not in ks: ks.append(k)
              if not ks: ks=['empty']
              with open(p,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=ks); w.writeheader()
                  for r in rows: w.writerow({k:r.get(k,'') for k in ks})
          def sf(x):
              try:
                  y=float(x); return y if math.isfinite(y) else float('nan')
              except Exception: return float('nan')
          def cm(cols,n): return {c.upper():c for c in cols}.get(n.upper())
          def poly(c,x,order):
              c=np.asarray(c,float).reshape(-1)
              with warnings.catch_warnings():
                  warnings.simplefilter('ignore')
                  return np.polynomial.polynomial.polyval(x,c) if order=='asc' else np.polyval(c,x)
          def invpoly(c,n,order):
              e=np.linspace(0,12000,60001); ch=poly(c,e,order); ok=np.isfinite(ch)
              if ok.sum()<20: return None
              ch=ch[ok]; e=e[ok]; ix=np.argsort(ch); ch=ch[ix]; e=e[ix]
              ch,u=np.unique(ch,return_index=True); e=e[u]
              if len(ch)<20: return None
              return np.interp(np.arange(n,dtype=float),ch,e,left=np.nan,right=np.nan)
          def models(ck,kc,n):
              x=np.arange(n,dtype=float); out=[]
              if ck is not None:
                  c=np.asarray(ck,float).reshape(-1)
                  if c.size==n: out.append(('CHAN_KEV_VECTOR',c))
                  if 0<c.size<=16: out += [('CHAN_KEV_ASC_POLY',poly(c,x,'asc')),('CHAN_KEV_DESC_POLY',poly(c,x,'desc'))]
              if kc is not None:
                  c=np.asarray(kc,float).reshape(-1)
                  if c.size==n: out.append(('KEV_CHAN_VECTOR_AS_ENERGY_DIAGNOSTIC',c))
                  if 0<c.size<=16:
                      a=invpoly(c,n,'asc'); d=invpoly(c,n,'desc')
                      if a is not None: out.append(('KEV_CHAN_ASC_INVERTED',a))
                      if d is not None: out.append(('KEV_CHAN_DESC_INVERTED',d))
              return out
          def qmodel(e,c):
              e=np.asarray(e,float).reshape(-1); ok=np.isfinite(e)
              if ok.sum()<20: return None
              ee=e[ok]; d=np.diff(ee); inc=float(np.mean(d>0)) if len(d) else 0.
              if inc<.95 or np.nanmin(ee)>490 or np.nanmax(ee)<532: return None
              try: ch511=float(np.interp(511.,e,np.arange(len(e),dtype=float)))
              except Exception: ch511=float('nan')
              return dict(score=100*inc+40+(10 if np.nansum(c)>0 else 0),channel_at_511=ch511,emin=float(np.nanmin(ee)),emax=float(np.nanmax(ee)))
          def edges(e):
              e=np.asarray(e,float).reshape(-1)
              if len(e)<3 or not np.all(np.isfinite(e)): return None,None
              m=(e[:-1]+e[1:])/2.; b=np.r_[e[0]-(m[0]-e[0]),m,e[-1]+(e[-1]-m[-1])]
              return np.minimum(b[:-1],b[1:]),np.maximum(b[:-1],b[1:])
          def bc(c,lo,hi,band):
              if lo is None: return 0.
              n=min(len(c),len(lo),len(hi)); c=np.nan_to_num(np.asarray(c[:n],float),nan=0,posinf=0,neginf=0); lo=np.asarray(lo[:n],float); hi=np.asarray(hi[:n],float)
              f=np.maximum(0,np.minimum(hi,band[1])-np.maximum(lo,band[0]))/np.maximum(1e-12,hi-lo)
              return float((c*f).sum())
          def zr(line,side):
              exp=side/20*6 if side>0 else float('nan'); ratio=(line/6)/(side/20) if side>0 else float('inf'); z=(line-exp)/math.sqrt(exp) if exp and exp>0 else float('nan')
              return exp,ratio,z
          def ids(p):
              m=re.search(r'(\d{12})\.001',str(p)); scw=m.group(1) if m else ''; return scw[:4],scw

          bases=['https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{rev}/','https://heasarc.gsfc.nasa.gov/FTP/integral/data/rev_3/scw/{rev}/']
          def get(url):
              req=urllib.request.Request(url,headers={'User-Agent':'ACIRM-R8T/1.0'})
              with urllib.request.urlopen(req,timeout=25) as r: return r.read(2000000).decode('utf-8','replace')
          cand=[]
          for rev in range(REV_START,REV_END+1):
              rs=f'{rev:04d}'
              for base in bases:
                  u=base.format(rev=rs)
                  try:
                      txt=get(u); fs=sorted(set(re.findall(r'href=["\']?(\d{12}\.001)/?["\']?',txt)))
                      FETCH.append(dict(stage='list',rev=rs,url=u,status='OK',links=len(fs)))
                      for d in fs: cand.append((rs,d.split('.')[0],u.rstrip('/')+'/'+d+'/spi_spectra.fits.gz'))
                      if fs: break
                  except Exception as e: FETCH.append(dict(stage='list',rev=rs,url=u,status='FAIL',error=repr(e)[:220]))
          seen=set(); total=0; got=0
          for rev,scw,url in cand:
              if len(list(SCW.glob('**/spi_spectra.fits.gz')))>=MAX_FILES: break
              if scw in seen: continue
              seen.add(scw); dest=SCW/rev/(scw+'.001')/'spi_spectra.fits.gz'
              if dest.exists() and dest.stat().st_size>0: continue
              if total>=CAP: break
              try:
                  req=urllib.request.Request(url,headers={'User-Agent':'ACIRM-R8T/1.0'})
                  with urllib.request.urlopen(req,timeout=30) as r: data=r.read()
                  if not data or data[:1]==b'<': FETCH.append(dict(stage='download',scw=scw,status='BAD_CONTENT')); continue
                  if total+len(data)>CAP: FETCH.append(dict(stage='download',scw=scw,status='SKIP_CAP',bytes=len(data))); continue
                  dest.parent.mkdir(parents=True,exist_ok=True); dest.write_bytes(data); total+=len(data); got+=1
                  FETCH.append(dict(stage='download',rev=rev,scw=scw,url=url,status='OK',bytes=len(data),local_path=str(dest)))
                  time.sleep(.04)
              except Exception as e: FETCH.append(dict(stage='download',rev=rev,scw=scw,url=url,status='FAIL',error=repr(e)[:220]))

          for p in sorted(set(list(IC.glob('**/spi_coef_cal_*.fits'))+list(IC.glob('**/*coef*cal*.fits')))):
              try:
                  with fits.open(p,memmap=True) as hd:
                      for h in hd:
                          cols=list(h.columns.names or []) if hasattr(h,'columns') and h.columns is not None else []
                          if h.data is None: continue
                          dc=cm(cols,'DET_ID'); ec=cm(cols,'E_RANGE'); ck=cm(cols,'CHAN_KEV'); kc=cm(cols,'KEV_CHAN'); os=cm(cols,'OBT_START'); oe=cm(cols,'OBT_END')
                          if not (dc and ec and (ck or kc)): continue
                          for i in range(len(h.data)):
                              CAL.append(dict(file=str(p),det=int(h.data[dc][i]),er=int(h.data[ec][i]),os=sf(h.data[os][i]) if os else float('nan'),oe=sf(h.data[oe][i]) if oe else float('nan'),ck=np.asarray(h.data[ck][i],float).reshape(-1) if ck else None,kc=np.asarray(h.data[kc][i],float).reshape(-1) if kc else None))
              except Exception as e: ERR.append(dict(stage='cal',file=str(p),error=repr(e)[:300]))
          def mcal(det,er,mid):
              r=[x for x in CAL if x['det']==det and x['er']==er]
              if not r: return None
              inn=[x for x in r if math.isfinite(mid) and math.isfinite(x['os']) and math.isfinite(x['oe']) and x['os']<=mid<=x['oe']]
              return inn[0] if inn else sorted(r,key=lambda x:(x['file'],x['os']))[-1]

          items=[]; raw_seen=0; spectra=sorted(SCW.glob('**/spi_spectra.fits.gz'))
          for p in spectra:
              rev,scw=ids(p)
              try:
                  with fits.open(p,memmap=True) as hd:
                      for h in hd:
                          if h.name!='SPI.-ACOF-RAW' or h.data is None: continue
                          cols=list(h.columns.names or []); dc=cm(cols,'DET_ID'); ec=cm(cols,'E_RANGE'); cc=cm(cols,'COUNTS'); ls=cm(cols,'LOBT_START'); le=cm(cols,'LOBT_END')
                          if not (dc and ec and cc): continue
                          for i in range(len(h.data)):
                              raw_seen+=1; det=int(h.data[dc][i]); er=int(h.data[ec][i]); c=np.asarray(h.data[cc][i],float).reshape(-1)
                              a=sf(h.data[ls][i]) if ls else float('nan'); b=sf(h.data[le][i]) if le else float('nan'); mid=(a+b)/2 if math.isfinite(a) and math.isfinite(b) else float('nan')
                              cal=mcal(det,er,mid); base=dict(rev=rev,scw=scw,row=i,det_id=det,e_range=er,raw_total_counts=float(np.nansum(c)),nonzero_channels=int(np.count_nonzero(c)))
                              if cal is None: ROW.append({**base,'status':'NO_CAL'}); continue
                              ranked=[]
                              for midn,e in models(cal['ck'],cal['kc'],len(c)):
                                  q=qmodel(e,c)
                                  if q: ranked.append((q['score'],midn,e,q))
                              if not ranked: ROW.append({**base,'status':'NO_MODEL','cal_file':cal['file']}); continue
                              ranked.sort(key=lambda x:x[0],reverse=True); score,midn,e,q=ranked[0]; lo,hi=edges(e)
                              line=bc(c,lo,hi,LINE); side=bc(c,lo,hi,SB1)+bc(c,lo,hi,SB2); exp,ratio,z=zr(line,side)
                              pl=[]; ps=[]
                              for bnd,lft,rgt in PB: pl.append(bc(c,lo,hi,bnd)); ps.append(bc(c,lo,hi,lft)+bc(c,lo,hi,rgt))
                              items.append({**base,'line':line,'side':side,'pl':np.asarray(pl,float),'ps':np.asarray(ps,float)})
                              ROW.append({**base,'status':'OK','model':midn,'line_508_514_counts':line,'side_total_counts':side,'expected':exp,'ratio':ratio,'z':z})
              except Exception as e: ERR.append(dict(stage='spectra',file=str(p),error=repr(e)[:300]))
          def agg(scope,sub,extra):
              if not sub: return
              line=sum(x['line'] for x in sub); side=sum(x['side'] for x in sub); exp,ratio,z=zr(line,side)
              pl=np.sum([x['pl'] for x in sub],axis=0); ps=np.sum([x['ps'] for x in sub],axis=0); pz=[]
              for a,b in zip(pl,ps): pz.append(zr(float(a),float(b))[2])
              vz=[v for v in pz if math.isfinite(v)]; rank=1+sum(1 for v in vz if math.isfinite(z) and v>z) if math.isfinite(z) else ''
              if math.isfinite(z) and z>=5 and ratio>=1.20 and rank!='' and int(rank)<=3: level='STRONG_PRODUCT_FIRST_511_CANDIDATE'
              elif math.isfinite(z) and z>=3 and ratio>=1.10 and rank!='' and int(rank)<=5: level='MODERATE_PRODUCT_FIRST_511_CANDIDATE'
              elif math.isfinite(z) and z>=2 and ratio>=1.05: level='WEAK_PRODUCT_FIRST_511_HINT'
              else: level='NO_LOCKED_511_EXCESS_CANDIDATE'
              CAND.append(dict(scope=scope,**extra,rows=len(sub),line_508_514_counts=line,side_total_counts=side,expected=exp,ratio=ratio,z=z,rank=rank,placebo_n=len(vz),candidate_level=level,backtrace_permission='ONLY_IF_MODERATE_OR_STRONG',claim_ceiling='DIAGNOSTIC_NOT_PROOF'))
          agg('ALL',items,dict(candidate_id='ALL'))
          scws=sorted({x['scw'] for x in items})
          for s in scws: agg('SCW',[x for x in items if x['scw']==s],dict(candidate_id='SCW_'+s,scw=s,rev=s[:4],window_width=1))
          for w in (2,3,5,8,13,21):
              if len(scws)<w: continue
              for i in range(len(scws)-w+1):
                  ss=set(scws[i:i+w]); agg('ROLLING_SCW_WINDOW',[x for x in items if x['scw'] in ss],dict(candidate_id='WIN_'+scws[i]+'_'+scws[i+w-1],scw_start=scws[i],scw_end=scws[i+w-1],window_width=w))
          strong=[c for c in CAND if c['candidate_level'].startswith('STRONG')]; moderate=[c for c in CAND if c['candidate_level'].startswith('MODERATE')]; weak=[c for c in CAND if c['candidate_level'].startswith('WEAK')]
          valid=[c for c in CAND if math.isfinite(float(c.get('z',float('nan'))))]
          best=sorted(valid,key=lambda r:(float(r['z']),float(r['ratio'])),reverse=True)[0] if valid else {}
          decision='R17K_R8T_NO_SPI_SPECTRA_AVAILABLE_AFTER_FETCH'
          if items: decision='R17K_R8T_NO_CALIBRATED_PRODUCT_FIRST_511_EXCESS_IN_DOWNLOADED_WIDE_SET'
          if weak: decision='R17K_R8T_ONLY_WEAK_511_HINTS_FOUND_NOT_LOCKED_NOT_PROOF'
          if moderate: decision='R17K_R8T_MODERATE_PRODUCT_FIRST_511_CANDIDATE_FOUND_BACKTRACE_REQUIRED_NOT_PROOF'
          if strong: decision='R17K_R8T_STRONG_PRODUCT_FIRST_511_CANDIDATE_FOUND_BACKTRACE_REQUIRED_NOT_PROOF'
          wcsv(OUT/'R17K_R8T_FETCH_MANIFEST.csv',FETCH); wcsv(OUT/'R17K_R8T_ROW_511_MEASUREMENTS.csv',ROW); wcsv(OUT/'R17K_R8T_PRODUCT_FIRST_CANDIDATES.csv',CAND)
          (OUT/'R17K_R8T_ERRORS.json').write_text(json.dumps(ERR,indent=2),encoding='utf-8')
          (OUT/'R17K_R8T_THEORY_LINK_NOTE.txt').write_text('Product-first restored: 511 candidate first, ACIRM reverse trace only after moderate/strong candidate. No channel approximation allowed as proof.\n',encoding='utf-8')
          summary=dict(run_id='R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH',decision=decision,proof_allowed=False,downloaded_files=got,downloaded_bytes=total,spectra_files_found=len(spectra),raw_rows_seen=raw_seen,calibration_rows_found=len(CAL),calibrated_rows_used=len(items),candidate_rows=len(CAND),strong_candidate_count=len(strong),moderate_candidate_count=len(moderate),weak_hint_count=len(weak),best_candidate_by_z=best,claim_ceiling=['DIAGNOSTIC_NOT_PROOF','NOT_DISCOVERY','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_OFFICIAL_SPI_511_LINE_PROOF'])
          (OUT/'R17K_R8T_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          PY
          python3 scripts/r8t.py > logs/r8t_python.log 2>&1
          echo "PYTHON_EXIT=$?" | tee ACIRM_R17K_R8T_OUTPUTS/R17K_R8T_PYTHON_EXIT.txt

      - name: Save wide spectra cache
        if: steps.restore-wide.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: repo/scw
          key: acirm-r17k-r8t-wide-spi-spectra-${{ inputs.rev_start }}-${{ inputs.rev_end }}-max${{ inputs.max_files }}-v2

      - name: Package artifact
        shell: bash
        run: |
          set +e
          cp logs/*.log ACIRM_R17K_R8T_OUTPUTS/ 2>/dev/null || true
          find repo/scw -maxdepth 6 -type f -name 'spi_spectra.fits.gz' -printf '%p,%s\n' | sort > ACIRM_R17K_R8T_OUTPUTS/R17K_R8T_FINAL_SPECTRA_FILE_SIZES.csv 2>/dev/null || true
          df -h > ACIRM_R17K_R8T_OUTPUTS/R17K_R8T_DF_END.txt
          free -h > ACIRM_R17K_R8T_OUTPUTS/R17K_R8T_FREE_END.txt
          zip -r ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT.zip ACIRM_R17K_R8T_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT.zip > ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT.zip ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT.zip.sha256.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT
          path: |
            ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT.zip
            ACIRM_R17K_R8T_WIDE_PRODUCT_FIRST_SPI511_SEARCH_OUTPUT.zip.sha256.txt
          retention-days: 7
