name: ACIRM R22F R10B SPI511 guarded OSA line-sideband

on:
  workflow_dispatch:

jobs:
  r22f-r10b-spi511-guarded-osa:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare locked folders and files
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="R22F_R10B_SPI511_OSA_LINE_SIDEBAND_GUARDED_EXECUTION"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          mkdir -p "$RUN_ID" "$RUN_ID/logs" "$RUN_ID/scripts" "$RUN_ID/slim_results" "ACIRM_CACHE_R10B"
          cat > "$RUN_ID/LOCK.json" <<'JSON'
          {
            "run_id": "R22F_R10B_SPI511_OSA_LINE_SIDEBAND_GUARDED_EXECUTION",
            "parent_lock": "R22F_R10A_SPI511_LOCKED_OSA_LINE_SIDEBAND_PREFLIGHT_LOCKED_NO_OSA_EXECUTION_NO_NEW_DATA_NOT_PROOF",
            "claim_ceiling": "GUARDED_OSA_EXECUTION_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
            "instrument": "INTEGRAL_SPI",
            "revision": "2504",
            "line_band_keV": [508.0, 514.0],
            "low_sideband_keV": [490.0, 500.0],
            "high_sideband_keV": [522.0, 532.0],
            "min_line_to_sideband_ratio": 1.2,
            "locked_scw": [
              "250400090010",
              "250400020010",
              "250400080010",
              "250400030010",
              "250400070021",
              "250400040010",
              "250400060010",
              "250400050010"
            ],
            "no_rescue_rules": [
              "No energy-band change after results.",
              "No SCW drop after results.",
              "No threshold reduction after results.",
              "No raw 511 occupancy promoted to material-production proof.",
              "Any technical failure is TECHNICAL_NO_GO_NO_THEORY_FAILURE."
            ]
          }
          JSON
          cat > "$RUN_ID/README_AR.md" <<'MD'
          # R22F_R10B
          تنفيذ محروس لاختبار SPI 511 line/sideband تحت قفل R22F_R10A.
          لا يثبت إنتاج مادة ولا يحول ACIRM إلى قانون نهائي وحده.
          إذا فشل OSA أو تحميل البيانات فالحكم تقني: TECHNICAL_NO_GO_NO_THEORY_FAILURE.
          MD

      - name: System preflight
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner=$(uname -a)"
            echo "disk_start"
            df -h
            echo "memory_start"
            free -h || true
            echo "docker_version"
            docker --version || true
          } | tee "$RUN_ID/logs/system_preflight.log"

      - name: Pull official OSA Docker image
        shell: bash
        continue-on-error: true
        run: |
          set +e
          IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          echo "OSA_IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker pull "$IMAGE" 2>&1 | tee "$RUN_ID/logs/docker_pull.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/docker_pull_exit_code.txt"

      - name: OSA command preflight
        shell: bash
        continue-on-error: true
        run: |
          set +e
          IMAGE="${OSA_IMAGE:-integralsw/osa:11.2-2-g667521a3-20220403-190332}"
          docker run --rm "$IMAGE" bash -lc 'set +e; echo PATH=$PATH; command -v og_create; command -v spi_science_analysis; command -v spi_obs_hist; command -v dal_list || true' 2>&1 | tee "$RUN_ID/logs/osa_command_preflight.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"

      - name: Write guarded scripts
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUN_ID/scripts/r10b_download_and_layout.py" <<'PY'
          import os, re, json, csv, urllib.request, html.parser
          from pathlib import Path

          RUN_ID = "R22F_R10B_SPI511_OSA_LINE_SIDEBAND_GUARDED_EXECUTION"
          ROOT = Path.cwd()
          OUT = ROOT / RUN_ID
          CACHE = ROOT / "ACIRM_CACHE_R10B"
          CACHE.mkdir(parents=True, exist_ok=True)
          SCW = ["250400090010","250400020010","250400080010","250400030010","250400070021","250400040010","250400060010","250400050010"]
          REV = "2504"
          MAX_PER_SCW_MB = 450.0
          MAX_TOTAL_MB = 2800.0

          class LinkParser(html.parser.HTMLParser):
              def __init__(self):
                  super().__init__(); self.links=[]
              def handle_starttag(self, tag, attrs):
                  if tag.lower()=="a":
                      for k,v in attrs:
                          if k.lower()=="href" and v:
                              self.links.append(v)

          def list_url(url, timeout=25):
              try:
                  with urllib.request.urlopen(url, timeout=timeout) as r:
                      txt = r.read().decode("utf-8", errors="replace")
                  p=LinkParser(); p.feed(txt)
                  return p.links, "OK"
              except Exception as e:
                  return [], "LIST_FAILED_" + repr(e)[:180]

          def head_size(url, timeout=15):
              try:
                  req=urllib.request.Request(url, method="HEAD")
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      n=r.headers.get("Content-Length")
                  return int(n) if n else None
              except Exception:
                  return None

          def download(url, outpath):
              outpath=Path(outpath); outpath.parent.mkdir(parents=True, exist_ok=True)
              if outpath.exists() and outpath.stat().st_size>0:
                  return "CACHE", outpath.stat().st_size
              try:
                  urllib.request.urlretrieve(url, outpath)
                  return "DOWNLOADED", outpath.stat().st_size
              except Exception as e:
                  return "DOWNLOAD_FAILED_" + repr(e)[:160], 0

          BASES = [
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{REV}/",
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{REV[0:2]}/{REV}/",
              f"https://isdc.unige.ch/integral/archive/data/scw/{REV}/",
              f"https://www.isdc.unige.ch/integral/archive/data/scw/{REV}/",
          ]

          rows=[]; downloaded_total=0
          for scw in SCW:
              found_dir=None; found_links=[]
              for base in BASES:
                  for suffix in [f"{scw}.001/", f"{scw}.000/", f"{scw}/"]:
                      u=base+suffix
                      links,stat=list_url(u)
                      rows.append({"kind":"LIST", "scw":scw, "url":u, "status":stat, "links":len(links), "bytes":0})
                      if links:
                          found_dir=u; found_links=links
                          break
                  if found_dir:
                      break

              if not found_dir:
                  rows.append({"kind":"SCW_STATUS", "scw":scw, "url":"", "status":"NO_PUBLIC_LISTING_DISCOVERED", "links":0, "bytes":0})
                  continue

              target_dir=CACHE / "scw" / REV / (scw + ".001")
              kept=[]
              for a in found_links:
                  fn=a.split("/")[-1]
                  if not fn or fn.startswith("?") or fn.endswith("/"):
                      continue
                  if not re.search(r"(\.fits(\.gz)?$|\.fit(\.gz)?$|\.txt$|\.idx$|\.cat$|\.par$)", fn, re.I):
                      continue
                  url=found_dir+fn
                  sz=head_size(url)
                  if sz is not None and sz/1e6 > MAX_PER_SCW_MB:
                      rows.append({"kind":"DOWNLOAD", "scw":scw, "url":url, "status":"SKIPPED_PER_FILE_SIZE_CAP", "links":0, "bytes":sz})
                      continue
                  if downloaded_total/1e6 > MAX_TOTAL_MB:
                      rows.append({"kind":"DOWNLOAD", "scw":scw, "url":url, "status":"SKIPPED_TOTAL_SIZE_CAP", "links":0, "bytes":0})
                      continue
                  st,b=download(url, target_dir/fn)
                  downloaded_total += b
                  kept.append(fn)
                  rows.append({"kind":"DOWNLOAD", "scw":scw, "url":url, "status":st, "links":0, "bytes":b})

              rows.append({
                  "kind":"SCW_STATUS",
                  "scw":scw,
                  "url":found_dir,
                  "status":"DISCOVERED_DOWNLOADED_SUBSET",
                  "links":len(found_links),
                  "bytes":sum((target_dir/f).stat().st_size for f in kept if (target_dir/f).exists())
              })

          scw_list = OUT / "scw.list"
          with scw_list.open("w", encoding="utf-8") as f:
              for scw in SCW:
                  f.write(f"scw/{REV}/{scw}.001\n")

          with (OUT/"download_log.csv").open("w", newline="", encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["kind","scw","url","status","links","bytes"])
              w.writeheader(); w.writerows(rows)

          status={
              "downloaded_total_mb":downloaded_total/1e6,
              "scw_count":len(SCW),
              "cache_root":str(CACHE),
              "note":"Guarded public archive download attempt; not a science result."
          }
          (OUT/"download_status.json").write_text(json.dumps(status, indent=2), encoding="utf-8")
          print(json.dumps(status, indent=2))
          PY

          cat > "$RUN_ID/scripts/r10b_extract_line_sideband.py" <<'PY'
          import json, csv
          from pathlib import Path
          import numpy as np

          RUN_ID="R22F_R10B_SPI511_OSA_LINE_SIDEBAND_GUARDED_EXECUTION"
          ROOT=Path.cwd(); OUT=ROOT/RUN_ID
          LINE=(508.0,514.0); LOW=(490.0,500.0); HIGH=(522.0,532.0); MIN_RATIO=1.2
          rows=[]

          try:
              from astropy.io import fits
          except Exception as e:
              (OUT/"line_sideband_status.json").write_text(json.dumps({"status":"ASTROPY_UNAVAILABLE","error":repr(e)},indent=2),encoding="utf-8")
              raise SystemExit(0)

          def integrate_from_arrays(e1,e2,y,band):
              e1=np.asarray(e1,dtype=float); e2=np.asarray(e2,dtype=float); y=np.asarray(y,dtype=float)
              m=np.isfinite(e1)&np.isfinite(e2)&np.isfinite(y)&(e2>=band[0])&(e1<=band[1])
              return float(np.nansum(y[m])) if m.any() else None

          for p in sorted(ROOT.rglob("*.fit*")):
              try:
                  hdul=fits.open(p, memmap=False)
                  for hdu_i,h in enumerate(hdul):
                      data=getattr(h,"data",None)
                      if data is None or not hasattr(data,"names") or data.names is None:
                          continue
                      names=[n.upper() for n in data.names]
                      e1=e2=None
                      for a,b in [("E_MIN","E_MAX"),("ENERG_LO","ENERG_HI"),("CHANNEL_LO","CHANNEL_HI")]:
                          if a in names and b in names:
                              e1=np.asarray(data[data.names[names.index(a)]],dtype=float)
                              e2=np.asarray(data[data.names[names.index(b)]],dtype=float)
                              break
                      if e1 is None:
                          continue

                      candidates=[]
                      for cname in ["COUNTS","RATE","FLUX","VALUE","SPEC","Y"]:
                          if cname in names:
                              candidates.append(data.names[names.index(cname)])

                      if not candidates:
                          for n in data.names:
                              if n.upper() not in ("E_MIN","E_MAX","ENERG_LO","ENERG_HI","CHANNEL_LO","CHANNEL_HI"):
                                  try:
                                      arr=np.asarray(data[n],dtype=float)
                                      if arr.ndim==1 and len(arr)==len(e1):
                                          candidates.append(n)
                                  except Exception:
                                      pass

                      for cname in candidates[:4]:
                          try:
                              y=np.asarray(data[cname],dtype=float)
                              if y.ndim!=1 or len(y)!=len(e1):
                                  continue
                              line=integrate_from_arrays(e1,e2,y,LINE)
                              low=integrate_from_arrays(e1,e2,y,LOW)
                              high=integrate_from_arrays(e1,e2,y,HIGH)
                              side_vals=[v for v in [low,high] if v is not None]
                              side=sum(side_vals)/len(side_vals) if side_vals else None
                              ratio=(line/side) if (line is not None and side not in (None,0)) else None
                              rows.append({
                                  "file":str(p),
                                  "hdu":hdu_i,
                                  "column":cname,
                                  "line_508_514":line,
                                  "low_490_500":low,
                                  "high_522_532":high,
                                  "sideband_mean":side,
                                  "line_to_sideband_ratio":ratio,
                                  "passes_min_ratio":bool(ratio is not None and ratio>=MIN_RATIO)
                              })
                          except Exception:
                              continue
              except Exception:
                  continue

          with (OUT/"line_sideband_candidates.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","hdu","column","line_508_514","low_490_500","high_522_532","sideband_mean","line_to_sideband_ratio","passes_min_ratio"])
              w.writeheader(); w.writerows(rows)

          best=None
          valid=[r for r in rows if r.get("line_to_sideband_ratio") not in (None,"")]
          if valid:
              best=max(valid, key=lambda r: float(r["line_to_sideband_ratio"]))
          status={
              "candidate_rows":len(rows),
              "valid_ratio_rows":len(valid),
              "best_candidate":best,
              "claim_ceiling":"candidate extractor only; requires OSA provenance and controls"
          }
          (OUT/"line_sideband_status.json").write_text(json.dumps(status,indent=2),encoding="utf-8")
          print(json.dumps(status,indent=2))
          PY

      - name: Guarded public data discovery and download
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python3 "$RUN_ID/scripts/r10b_download_and_layout.py" 2>&1 | tee "$RUN_ID/logs/download_and_layout.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/download_and_layout_exit_code.txt"
          du -sh ACIRM_CACHE_R10B "$RUN_ID" 2>/dev/null | tee "$RUN_ID/logs/size_after_download.log"

      - name: Create OSA observation group if technically possible
        shell: bash
        continue-on-error: true
        run: |
          set +e
          IMAGE="${OSA_IMAGE:-integralsw/osa:11.2-2-g667521a3-20220403-190332}"
          ABS_ROOT="$PWD"
          docker run --rm \
            -v "$ABS_ROOT:/work" \
            -w /work \
            -e REP_BASE_PROD=/work/ACIRM_CACHE_R10B \
            -e CURRENT_IC=/work/ACIRM_CACHE_R10B \
            "$IMAGE" bash -lc '
              set +e
              cd /work/'"$RUN_ID"'
              echo "PWD=$PWD"
              echo "REP_BASE_PROD=$REP_BASE_PROD"
              echo "CURRENT_IC=$CURRENT_IC"
              cat scw.list
              og_create scw.list SPI r10b_og ./ 2>&1
            ' 2>&1 | tee "$RUN_ID/logs/og_create.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/og_create_exit_code.txt"

      - name: Run SPI science analysis if observation group exists
        shell: bash
        continue-on-error: true
        run: |
          set +e
          IMAGE="${OSA_IMAGE:-integralsw/osa:11.2-2-g667521a3-20220403-190332}"
          ABS_ROOT="$PWD"
          docker run --rm \
            -v "$ABS_ROOT:/work" \
            -w /work \
            -e REP_BASE_PROD=/work/ACIRM_CACHE_R10B \
            -e CURRENT_IC=/work/ACIRM_CACHE_R10B \
            "$IMAGE" bash -lc '
              set +e
              cd /work/'"$RUN_ID"'
              find . -maxdepth 3 -type f | sort | head -200
              if command -v spi_science_analysis >/dev/null 2>&1; then
                spi_science_analysis 2>&1
              else
                echo "spi_science_analysis command not found"
                exit 12
              fi
            ' 2>&1 | tee "$RUN_ID/logs/spi_science_analysis.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/spi_science_analysis_exit_code.txt"

      - name: Extract locked 511 line-sideband candidates from available FITS
        shell: bash
        continue-on-error: true
        run: |
          set +e
          python3 -m pip install -q astropy numpy pandas
          python3 "$RUN_ID/scripts/r10b_extract_line_sideband.py" 2>&1 | tee "$RUN_ID/logs/line_sideband_extract.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/line_sideband_extract_exit_code.txt"

      - name: Build guarded decision and slim phone package
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, csv, hashlib
          from pathlib import Path

          RUN_ID="R22F_R10B_SPI511_OSA_LINE_SIDEBAND_GUARDED_EXECUTION"
          OUT=Path(RUN_ID)

          def read_exit(name):
              p=OUT/"logs"/name
              try:
                  return int(p.read_text().strip().splitlines()[-1])
              except Exception:
                  return None

          docker_pull=read_exit("docker_pull_exit_code.txt")
          command_pre=read_exit("osa_command_preflight_exit_code.txt")
          download=read_exit("download_and_layout_exit_code.txt")
          og=read_exit("og_create_exit_code.txt")
          spi=read_exit("spi_science_analysis_exit_code.txt")
          extract=read_exit("line_sideband_extract_exit_code.txt")

          line_status={}
          if (OUT/"line_sideband_status.json").exists():
              try:
                  line_status=json.loads((OUT/"line_sideband_status.json").read_text())
              except Exception:
                  line_status={}

          valid_ratio_rows=line_status.get("valid_ratio_rows",0)
          best=line_status.get("best_candidate")

          if docker_pull not in (0,None) or command_pre not in (0,None):
              decision="R22F_R10B_OSA_DOCKER_PREFLIGHT_FAIL_TECHNICAL_NO_GO_NO_THEORY_FAILURE"
          elif og not in (0,None) or spi not in (0,None):
              decision="R22F_R10B_OSA_EXECUTION_TECHNICAL_NO_GO_NO_THEORY_FAILURE"
          elif valid_ratio_rows and best and best.get("passes_min_ratio"):
              decision="R22F_R10B_SPI511_LINE_SIDEBAND_CANDIDATE_RATIO_PASS_REQUIRES_PROVENANCE_AND_CONTROLS_NOT_PROOF"
          elif valid_ratio_rows:
              decision="R22F_R10B_SPI511_LINE_SIDEBAND_RATIO_NOT_PASSED_NO_PRODUCT_PROOF_NO_THEORY_FAILURE"
          else:
              decision="R22F_R10B_NO_USABLE_LINE_SIDEBAND_SPECTRUM_EXTRACTED_TECHNICAL_NO_GO_NO_THEORY_FAILURE"

          status={
              "run_id":RUN_ID,
              "decision":decision,
              "docker_pull_exit":docker_pull,
              "osa_command_preflight_exit":command_pre,
              "download_exit":download,
              "og_create_exit":og,
              "spi_science_analysis_exit":spi,
              "line_sideband_extract_exit":extract,
              "valid_ratio_rows":valid_ratio_rows,
              "best_candidate":best,
              "claim_ceiling":"GUARDED_OSA_EXECUTION_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
              "raw_heavy_files_packaged":False,
              "no_rescue_applied":True
          }

          (OUT/"STATUS.json").write_text(json.dumps(status,indent=2,sort_keys=True),encoding="utf-8")

          with (OUT/"R22F_R10B_GO_NO_GO_DECISION.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=list(status.keys()))
              w.writeheader(); w.writerow(status)

          rows=[]
          for p in sorted(OUT.rglob("*")):
              if p.is_file():
                  h=hashlib.sha256(p.read_bytes()).hexdigest()
                  rows.append({"file":str(p.relative_to(OUT)),"sha256":h,"bytes":p.stat().st_size})

          with (OUT/"MANIFEST_SHA256.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","sha256","bytes"])
              w.writeheader(); w.writerows(rows)

          print(json.dumps(status,indent=2,sort_keys=True))
          PY

          ZIP="${RUN_ID}_RESULTS.zip"
          SHA="${ZIP}.sha256.txt"
          zip -r "$ZIP" "$RUN_ID" -x "*/__pycache__/*" >/dev/null
          sha256sum "$ZIP" > "$SHA"
          echo "ZIP=$ZIP"
          cat "$SHA"

      - name: Upload slim results artifact
        uses: actions/upload-artifact@v4
        with:
          name: R22F_R10B_SPI511_GUARDED_RESULTS
          path: |
            R22F_R10B_SPI511_OSA_LINE_SIDEBAND_GUARDED_EXECUTION_RESULTS.zip
            R22F_R10B_SPI511_OSA_LINE_SIDEBAND_GUARDED_EXECUTION_RESULTS.zip.sha256.txt
          if-no-files-found: error
          retention-days: 14
