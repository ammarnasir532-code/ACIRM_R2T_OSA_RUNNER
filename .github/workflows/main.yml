name: ACIRM R3P R2F xvfb display fixed SPI511

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2f-xvfb-display-fixed-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2F_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3P_R2F_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS
          echo "R2F_PREPARED"

      - name: Restore R3P R1 cache
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1
          restore-keys: |
            acirm-r21ax-r7g-r3p-r1-cache-

      - name: Run R2F with host Xvfb display into Docker
        continue-on-error: true
        run: |
          set +e

          echo "R2F_STARTED" | tee ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs/main_execution.log
          echo "cache_hit=${{ steps.cache.outputs.cache-hit }}" | tee -a ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs/main_execution.log

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs/main_execution.log
          import json
          import shutil
          import time
          from pathlib import Path

          out = Path("ACIRM_R21AX_R7G_R3P_R2F_RESULTS")
          data = out / "data"
          work = out / "work"
          light = Path("ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS")

          cache = Path("ACIRM_CACHE_R3P_R1")
          cache_data = cache / "data"
          cache_work = cache / "work"
          flag = cache / "acirm_r3p_r1_cache_ready.flag"

          for p in [out, data, work, light]:
              p.mkdir(parents=True, exist_ok=True)

          cache_ok = flag.exists() and cache_data.exists() and cache_work.exists()
          print("cache_ok", cache_ok)
          print("ready_flag_exists", flag.exists())
          print("cache_data_exists", cache_data.exists())
          print("cache_work_exists", cache_work.exists())

          if cache_ok:
              shutil.copytree(cache_data, data, dirs_exist_ok=True)
              shutil.copytree(cache_work, work, dirs_exist_ok=True)
              (out / "cache_ok.flag").write_text("CACHE_OK\n", encoding="utf-8")
          else:
              summary = {
                  "run_id": "ACIRM_R21AX_R7G_R3P_R2F_XVFB_DISPLAY_FIXED_SPI511",
                  "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "final_status": "R2F_CACHE_MISS_NO_RERUN_NO_511_NO_PHYSICAL_NULL",
                  "checks": {
                      "ready_flag_exists": flag.exists(),
                      "cache_data_exists": cache_data.exists(),
                      "cache_work_exists": cache_work.exists(),
                      "og_created": False,
                      "actual_spi_started": False,
                      "line_508_514_seen": False,
                      "sidebands_seen": False,
                      "line_metric_exists": False,
                      "sideband_metric_exists": False
                  },
                  "claim_ceiling": "NO_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
              }
              (light / "R2F_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

          sudo chown -R "$(id -u):$(id -g)" ACIRM_R21AX_R7G_R3P_R2F_RESULTS ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
          chmod -R u+rwX,go+rX ACIRM_R21AX_R7G_R3P_R2F_RESULTS ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true

          if [ -f ACIRM_R21AX_R7G_R3P_R2F_RESULTS/cache_ok.flag ]; then
            {
              echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              echo "installing_xvfb"
              sudo apt-get update -y || true
              sudo apt-get install -y xvfb x11-xserver-utils || true
              echo "starting_xvfb"
              pkill Xvfb 2>/dev/null || true
              Xvfb :99 -screen 0 1280x1024x24 -ac +extension GLX +render -noreset > ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs/xvfb.log 2>&1 &
              sleep 4
              export DISPLAY=:99
              xhost +local: 2>/dev/null || true
              echo "DISPLAY=$DISPLAY"
              ls -la /tmp/.X11-unix 2>/dev/null || true
              docker --version || true
              docker pull integralsw/osa:latest || true
            } | tee ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs/docker_xvfb_status.log

            cat > ACIRM_R21AX_R7G_R3P_R2F_RESULTS/work/run_spi_r2f.sh <<'BASH'
          set +e

          echo "R2F_CONTAINER_START"
          echo "CONTAINER_DISPLAY=$DISPLAY"
          ls -la /tmp/.X11-unix 2>/dev/null || true

          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1

          mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep
          mkdir -p /work/og /work/products_line /work/products_sidebands /work/container_logs

          cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

          for f in /tmp/acirm_pfiles/*.par; do
            if [ -f "$f" ]; then
              sed -i 's/,ql,/,hl,/g' "$f" || true
              sed -i 's/,q,/,h,/g' "$f" || true
            fi
          done

          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          if [ -d /opt/osa/lib ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
          fi
          if [ -d /opt/osa/lib64 ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
          fi

          source /opt/osa/bin/isdc_init_env.sh || true

          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1
          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          echo "R2F_COMMANDS"
          for c in spi_science_analysis awk timeout stdbuf fstruct fdump ftlist; do
            echo "$c=$(command -v "$c" || true)"
          done

          echo "R2F_SPI_PAR_HEAD"
          cat /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null | head -220 || true

          OG_FILE=$(find /work/og -type f -name "og_spi.fits" | head -1)
          echo "OG_FILE=$OG_FILE"

          if [ -z "$OG_FILE" ]; then
            echo "R2F_NO_OG_FILE"
            exit 0
          fi

          has_param() {
            KEY="$1"
            grep -q "^${KEY}," /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null
          }

          add_param() {
            KEY="$1"
            VALUE="$2"
            FILE="$3"
            if has_param "$KEY"; then
              echo "${KEY}=${VALUE}" >> "$FILE"
              echo "ADD_PARAM ${KEY}=${VALUE}"
            else
              echo "SKIP_PARAM ${KEY}"
            fi
          }

          make_answers() {
            OUT="$1"
            rm -f "$OUT"
            for i in $(seq 1 1200); do
              echo "GEDSAT" >> "$OUT"
              echo "no" >> "$OUT"
              echo "yes" >> "$OUT"
              echo "RADEC" >> "$OUT"
              echo "0.001" >> "$OUT"
              echo "1000" >> "$OUT"
              echo "NONE" >> "$OUT"
              echo "0" >> "$OUT"
              echo "" >> "$OUT"
            done
          }

          cat > /work/container_logs/guard.awk <<'AWK'
          BEGIN {
            orbit=0
            flat=0
            gedsat=0
            displayerr=0
            status3004=0
            status35603=0
            segfault=0
            kept=0
            killed=0
            maxkeep=1800000
          }
          {
            if (index($0, "Orbit asini parameter") > 0) orbit++
            if (index($0, "Use archival flatfield observations") > 0) flat++
            if (index($0, "GEDSAT-ME2") > 0 && index($0, "VETOGATE") > 0) gedsat++
            if (index($0, "can't open display") > 0) displayerr++
            if (index($0, "status -3004") > 0) status3004++
            if (index($0, "status -35603") > 0) status35603++
            if (index($0, "segmentation violation") > 0 || index($0, "Segmentation") > 0) segfault++

            if (orbit > 30) {
              print "ACIRM_GUARD_ORBIT_LOOP_KILL"
              killed=1
              exit 77
            }
            if (flat > 30) {
              print "ACIRM_GUARD_FLATFIELD_LOOP_KILL"
              killed=1
              exit 78
            }
            if (gedsat > 30) {
              print "ACIRM_GUARD_GEDSAT_LOOP_KILL"
              killed=1
              exit 79
            }

            kept += length($0) + 1
            if (kept <= maxkeep) {
              print $0
            }
          }
          END {
            print "orbit_asini_prompt_count=" orbit > status_file
            print "flatfield_prompt_count=" flat >> status_file
            print "gedsat_prompt_count=" gedsat >> status_file
            print "display_error_count=" displayerr >> status_file
            print "status3004_count=" status3004 >> status_file
            print "status35603_count=" status35603 >> status_file
            print "segfault_count=" segfault >> status_file
            print "killed_by_guard=" killed >> status_file
            print "log_bytes_kept=" kept >> status_file
          }
          AWK

          run_case() {
            CASE="$1"
            NREG="$2"
            REGIONS="$3"
            NBINS="$4"
            PROD="$5"

            mkdir -p "$PROD"

            PARAMS="/work/container_logs/${CASE}.params.txt"
            ANSWERS="/work/container_logs/${CASE}.answers.txt"
            LOG="/work/container_logs/${CASE}.log"
            STATUS="/work/container_logs/${CASE}.status.txt"

            rm -f "$PARAMS" "$ANSWERS" "$LOG" "$STATUS"

            add_param "obs_group" "$OG_FILE" "$PARAMS"

            add_param "run_cat_extract" "no" "$PARAMS"
            add_param "run_pointing" "yes" "$PARAMS"
            add_param "run_binning" "yes" "$PARAMS"
            add_param "run_background" "no" "$PARAMS"
            add_param "run_spiros" "no" "$PARAMS"
            add_param "run_phase_analysis" "no" "$PARAMS"
            add_param "run_gaincorrection" "no" "$PARAMS"
            add_param "run_fullcheck" "no" "$PARAMS"
            add_param "use_pointing_filter" "no" "$PARAMS"
            add_param "run_simulation" "no" "$PARAMS"

            add_param "use_background_flatfields" "no" "$PARAMS"
            add_param "use_background_templates" "no" "$PARAMS"
            add_param "use_background_models" "no" "$PARAMS"
            add_param "spi_flatfield_ptsNbConstBack" "1" "$PARAMS"
            add_param "spi_flatfield_single" "yes" "$PARAMS"
            add_param "loc_spiflatfield_dol" "NONE" "$PARAMS"
            add_param "spi_obs_back_nmodel" "1" "$PARAMS"
            add_param "spiros_background-method" "GEDSAT" "$PARAMS"

            add_param "spibounds_nregions" "$NREG" "$PARAMS"
            add_param "spibounds_regions" "$REGIONS" "$PARAMS"
            add_param "spibounds_nbins" "$NBINS" "$PARAMS"
            add_param "detectors" "0-18" "$PARAMS"
            add_param "clobber" "yes" "$PARAMS"
            add_param "log_File" "${CASE}.inner.log" "$PARAMS"

            add_param "catalog" "NONE" "$PARAMS"
            add_param "spiros_source-cat-dol" "NONE" "$PARAMS"
            add_param "spiros_nofsources" "0" "$PARAMS"
            add_param "spiros_sigmathres" "999" "$PARAMS"
            add_param "spiros_iteration-output" "NO" "$PARAMS"
            add_param "spiros_optistat" "CHI2" "$PARAMS"

            add_param "spi_phase_hist_ephemDOL" "NONE" "$PARAMS"
            add_param "spi_phase_hist_phaseBinNum" "1" "$PARAMS"
            add_param "spi_phase_hist_phaseSameWidthBin" "yes" "$PARAMS"
            add_param "spi_phase_hist_phaseBounds" "0,1" "$PARAMS"
            add_param "spi_phase_hist_phaseSubtractOff" "no" "$PARAMS"
            add_param "spi_phase_hist_phaseOffNum" "0" "$PARAMS"
            add_param "spi_phase_hist_orbit" "no" "$PARAMS"
            add_param "spi_phase_hist_asini" "0" "$PARAMS"
            add_param "spi_phase_hist_porb" "1" "$PARAMS"
            add_param "spi_phase_hist_T90epoch" "0" "$PARAMS"
            add_param "spi_phase_hist_ecc" "0" "$PARAMS"
            add_param "spi_phase_hist_omega_d" "0" "$PARAMS"
            add_param "spi_phase_hist_pporb" "0" "$PARAMS"

            if has_param "mode"; then
              echo "mode=h" >> "$PARAMS"
            fi

            make_answers "$ANSWERS"

            echo "SPI_CASE_BEGIN ${CASE}"
            cat "$PARAMS"

            echo "case=${CASE}" > "$STATUS"
            echo "started_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS"
            echo "display=${DISPLAY}" >> "$STATUS"
            echo "ACIRM_SPI_PROCESS_STARTED ${CASE}"

            CMD_ARGS="$(tr '\n' ' ' < "$PARAMS")"

            if command -v stdbuf >/dev/null 2>&1; then
              RUNNER="stdbuf -oL -eL spi_science_analysis"
            else
              RUNNER="spi_science_analysis"
            fi

            timeout 4200 bash -lc "set -o pipefail; ${RUNNER} ${CMD_ARGS} < '${ANSWERS}' 2>&1 | awk -v status_file='${STATUS}.awk' -f /work/container_logs/guard.awk" > "$LOG" 2>&1
            RC="$?"

            cat "${STATUS}.awk" >> "$STATUS" 2>/dev/null || true
            echo "returncode=${RC}" >> "$STATUS"
            echo "ended_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS"

            echo "ACIRM_SPI_PROCESS_ENDED ${CASE} returncode=${RC}"
            echo "SPI_CASE_END ${CASE}"
            echo "PRODUCTS_AFTER_${CASE}"
            find "$PROD" -maxdepth 8 -type f -printf "%p %s\n" | sort || true
          }

          run_case "R2F_LINE_508_514" "1" "508,514" "1" "/work/products_line"
          run_case "R2F_SIDEBANDS_490_500_508_514_522_532" "3" "490,500,508,514,522,532" "1,1,1" "/work/products_sidebands"

          find /work -maxdepth 10 -type f -printf "%p %s\n" | sort > /work/container_logs/work_files_after.txt

          {
            for f in $(find /work/products_line /work/products_sidebands -type f \( -name "*.fits" -o -name "*.fits.gz" \) 2>/dev/null | sort | head -100); do
              echo "### $f"
              fstruct "$f" 2>&1 | head -100 || true
            done
          } > /work/container_logs/fits_quicklook.txt

          echo "R2F_CONTAINER_END"
          BASH

            export DISPLAY=:99

            docker run --rm \
              -e DISPLAY=:99 \
              -v /tmp/.X11-unix:/tmp/.X11-unix \
              -v "$PWD/ACIRM_R21AX_R7G_R3P_R2F_RESULTS/data:/data" \
              -v "$PWD/ACIRM_R21AX_R7G_R3P_R2F_RESULTS/work:/work" \
              integralsw/osa:latest \
              bash /work/run_spi_r2f.sh \
              > ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs/host_container_spi_r2f.log 2>&1 || true

            sudo chown -R "$(id -u):$(id -g)" ACIRM_R21AX_R7G_R3P_R2F_RESULTS ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
            chmod -R u+rwX,go+rX ACIRM_R21AX_R7G_R3P_R2F_RESULTS ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
          fi

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2F_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import os
          import time
          from pathlib import Path

          out = Path("ACIRM_R21AX_R7G_R3P_R2F_RESULTS")
          data = out / "data"
          work = out / "work"
          logs = out / "logs"
          light = Path("ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS")
          zip_name = "ACIRM_R21AX_R7G_R3P_R2F_LIGHT_RESULTS.zip"

          cache = Path("ACIRM_CACHE_R3P_R1")
          flag = cache / "acirm_r3p_r1_cache_ready.flag"

          light.mkdir(parents=True, exist_ok=True)
          (light / "logs").mkdir(parents=True, exist_ok=True)

          def text(path, limit=1000000):
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              b = p.read_bytes()
              if len(b) > limit:
                  b = b[:450000] + b"\nACIRM_LOG_TRUNCATED_MIDDLE\n" + b[-450000:]
              return b.decode("utf-8", "replace")

          def copy_log(src):
              p = Path(src)
              if p.exists() and p.is_file():
                  (light / "logs" / p.name).write_text(text(p), encoding="utf-8", errors="replace")

          def rows(root):
              out_rows = []
              root = Path(root)
              if root.exists():
                  for p in sorted(root.rglob("*")):
                      if p.is_file():
                          try:
                              out_rows.append({"path": str(p), "bytes": p.stat().st_size})
                          except Exception:
                              out_rows.append({"path": str(p), "bytes": ""})
              return out_rows

          def write_csv(path, data_rows):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=["path", "bytes"])
                  w.writeheader()
                  for r in data_rows:
                      w.writerow(r)

          def parse_status(path):
              d = {}
              for line in text(path, 120000).splitlines():
                  if "=" in line:
                      k, v = line.split("=", 1)
                      d[k.strip()] = v.strip()
              return d

          for p in logs.glob("*.log"):
              copy_log(p)

          for p in [
              work / "container_logs" / "R2F_LINE_508_514.log",
              work / "container_logs" / "R2F_LINE_508_514.status.txt",
              work / "container_logs" / "R2F_LINE_508_514.params.txt",
              work / "container_logs" / "R2F_SIDEBANDS_490_500_508_514_522_532.log",
              work / "container_logs" / "R2F_SIDEBANDS_490_500_508_514_522_532.status.txt",
              work / "container_logs" / "R2F_SIDEBANDS_490_500_508_514_522_532.params.txt",
              work / "container_logs" / "work_files_after.txt",
              work / "container_logs" / "fits_quicklook.txt",
          ]:
              copy_log(p)

          data_rows = rows(data)
          work_rows = rows(work)
          line_rows = rows(work / "products_line")
          side_rows = rows(work / "products_sidebands")

          write_csv(light / "data_files.csv", data_rows)
          write_csv(light / "work_files.csv", work_rows)
          write_csv(light / "products_line.csv", line_rows)
          write_csv(light / "products_sidebands.csv", side_rows)

          host_log = text(logs / "host_container_spi_r2f.log", 1300000)
          line_log = text(work / "container_logs" / "R2F_LINE_508_514.log", 800000)
          side_log = text(work / "container_logs" / "R2F_SIDEBANDS_490_500_508_514_522_532.log", 800000)

          line_status = parse_status(work / "container_logs" / "R2F_LINE_508_514.status.txt")
          side_status = parse_status(work / "container_logs" / "R2F_SIDEBANDS_490_500_508_514_522_532.status.txt")

          def intval(x):
              try:
                  return int(str(x).strip())
              except Exception:
                  return 0

          og_created = any("og_spi.fits" in r["path"] for r in work_rows)
          actual_spi_started = "ACIRM_SPI_PROCESS_STARTED R2F_LINE_508_514" in host_log
          line_seen = "spibounds_regions=508,514" in host_log or "spibounds_regions=508,514" in line_log
          side_seen = "spibounds_regions=490,500,508,514,522,532" in host_log or "spibounds_regions=490,500,508,514,522,532" in side_log

          line_metric = any(r["path"].endswith(".fits") or r["path"].endswith(".fits.gz") for r in line_rows)
          side_metric = any(r["path"].endswith(".fits") or r["path"].endswith(".fits.gz") for r in side_rows)

          prompt_loop = bool(intval(line_status.get("killed_by_guard", 0)) or intval(side_status.get("killed_by_guard", 0)))

          display_error_count = intval(line_status.get("display_error_count", 0)) + intval(side_status.get("display_error_count", 0))
          status35603_count = intval(line_status.get("status35603_count", 0)) + intval(side_status.get("status35603_count", 0))
          status3004_count = intval(line_status.get("status3004_count", 0)) + intval(side_status.get("status3004_count", 0))
          gedsat_count = intval(line_status.get("gedsat_prompt_count", 0)) + intval(side_status.get("gedsat_prompt_count", 0))
          flat_count = intval(line_status.get("flatfield_prompt_count", 0)) + intval(side_status.get("flatfield_prompt_count", 0))
          orbit_count = intval(line_status.get("orbit_asini_prompt_count", 0)) + intval(side_status.get("orbit_asini_prompt_count", 0))

          checks = {
              "ready_flag_exists": flag.exists(),
              "data_file_count": len(data_rows),
              "work_file_count": len(work_rows),
              "og_created": og_created,
              "actual_spi_started": actual_spi_started,
              "line_508_514_seen": line_seen,
              "sidebands_seen": side_seen,
              "line_product_count": len(line_rows),
              "sideband_product_count": len(side_rows),
              "line_metric_exists": line_metric,
              "sideband_metric_exists": side_metric,
              "prompt_loop_seen": prompt_loop,
              "display_error_count": display_error_count,
              "status35603_count": status35603_count,
              "status3004_count": status3004_count,
              "gedsat_prompt_count": gedsat_count,
              "flatfield_prompt_count": flat_count,
              "orbit_asini_prompt_count": orbit_count,
              "line_returncode": line_status.get("returncode", ""),
              "sidebands_returncode": side_status.get("returncode", "")
          }

          if line_metric or side_metric:
              final_status = "R2F_SPI511_PRODUCTS_PRESENT_REVIEW_PRODUCTS_NOT_FINAL_PROOF"
          elif status35603_count > 0 or display_error_count > 0:
              final_status = "R2F_SPI511_DISPLAY_FAILURE_STATUS35603_NO_511_NO_PHYSICAL_NULL"
          elif prompt_loop:
              final_status = "R2F_SPI511_PROMPT_LOOP_GUARD_TRIGGERED_NO_511_METRIC_NO_PHYSICAL_NULL"
          elif actual_spi_started:
              final_status = "R2F_SPI511_EXECUTED_NO_READABLE_511_METRIC_NO_PHYSICAL_NULL"
          else:
              final_status = "R2F_SPI511_NOT_STARTED_NO_511_NO_PHYSICAL_NULL"

          summary = {
              "run_id": "ACIRM_R21AX_R7G_R3P_R2F_XVFB_DISPLAY_FIXED_SPI511",
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "final_status": final_status,
              "checks": checks,
              "claim_ceiling": "NOT_DISCOVERY_NOT_FINAL_PROOF_NOT_OSA_PROOF_UNLESS_ACTUAL_511_LINE_SIDEBAND_METRIC_IS_READ"
          }

          (light / "R2F_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          (light / "R2F_CLAIM_BOUNDARY.txt").write_text(
              "Runtime, cache, prompt, display, parameter, Docker, or OSA failure is not a physical null.\n"
              "Do not claim discovery/proof unless an actual 511 line/sideband metric is read from OSA products.\n",
              encoding="utf-8"
          )

          with open(light / "checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          if Path(zip_name).exists():
              Path(zip_name).unlink()

          os.system("zip -r " + zip_name + " " + str(light))

          h = hashlib.sha256()
          with open(zip_name, "rb") as f:
              for chunk in iter(lambda: f.read(1024 * 1024), b""):
                  h.update(chunk)

          Path(zip_name + ".sha256.txt").write_text(h.hexdigest() + "  " + zip_name + "\n", encoding="utf-8")
          print(json.dumps(summary, indent=2))
          PY

