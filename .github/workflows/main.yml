name: ACIRM R3G AUTO OSA DAL dependency resolver fixed

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3g-auto-osa-dal-dependency-resolver-fixed:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3G_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3G_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS

      - name: System diagnostics
        run: |
          {
            echo "ACIRM R3G AUTO OSA DAL dependency resolver FIXED"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=AUTO_DAL_DEPENDENCY_RESOLVER_ONLY_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY"
            echo ""
            uname -a || true
            echo ""
            df -h || true
            echo ""
            free -h || true
            echo ""
            echo "HEASARC IPv4 HTTPS probe"
            curl -4 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R3G_RESULTS/logs/system_diagnostics.log

      - name: Pull OSA Docker image
        continue-on-error: true
        run: |
          {
            echo "Docker version"
            docker --version || true
            docker info || true
            echo ""
            echo "Pull integralsw/osa:latest"
            docker pull integralsw/osa:latest || true
          } | tee ACIRM_R21AX_R7G_R3G_RESULTS/logs/docker_pull.log

      - name: AUTO download SCW AUX IC IDX CAT dependencies and iterate DAL verify
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import csv
          import gzip
          import hashlib
          import json
          import os
          import re
          import shutil
          import subprocess
          import time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3G_AUTO_OSA_DAL_DEPENDENCY_RESOLVER_FIXED_LIGHT"

          OUT = Path("ACIRM_R21AX_R7G_R3G_RESULTS")
          DATA = OUT / "data"
          LOGS = OUT / "logs"
          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)
          LOGS.mkdir(parents=True, exist_ok=True)

          BASES = [
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data",
              "http://heasarc.gsfc.nasa.gov/FTP/integral/data",
          ]

          REV = "2504"
          SCW = "250400090010"
          SCW_DIR = DATA / "scw" / REV / f"{SCW}.001"
          AUX_ADP_DIR = DATA / "aux" / "adp" / f"{REV}.001"

          SCW_DIR.mkdir(parents=True, exist_ok=True)
          AUX_ADP_DIR.mkdir(parents=True, exist_ok=True)

          download_rows = []
          dal_iteration_rows = []
          missing_rows = []

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def is_gzip(path):
              try:
                  with open(path, "rb") as f:
                      return f.read(2) == b"\x1f\x8b"
              except Exception:
                  return False

          def is_fits(path):
              try:
                  with open(path, "rb") as f:
                      head = f.read(16)
                  return head.startswith(b"SIMPLE") or head.startswith(b"XTENSION")
              except Exception:
                  return False

          def accept(path):
              if not path.exists():
                  return False, "missing"
              size = path.stat().st_size
              if size <= 1024:
                  return False, f"too_small_{size}"
              if is_gzip(path):
                  return True, "gzip"
              if is_fits(path):
                  return True, "fits"
              return False, "not_fits_or_gzip"

          def norm_name(x):
              x = str(x).strip()
              x = x.split("[")[0].strip()
              return Path(x).name

          def materialize(tmp, final_path):
              final_path.parent.mkdir(parents=True, exist_ok=True)
              if is_gzip(tmp):
                  with gzip.open(tmp, "rb") as src, open(final_path, "wb") as dst:
                      shutil.copyfileobj(src, dst)
                  tmp.unlink(missing_ok=True)
              else:
                  if final_path.exists():
                      final_path.unlink()
                  tmp.rename(final_path)

          def curl_download(url, tmp):
              if tmp.exists():
                  tmp.unlink()

              cmd = [
                  "curl",
                  "-4",
                  "-L",
                  "--retry", "8",
                  "--retry-delay", "10",
                  "--connect-timeout", "90",
                  "--max-time", "1200",
                  "--fail",
                  "-o", str(tmp),
                  url,
              ]

              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              ok, reason = accept(tmp)
              return p.returncode, ok, reason, p.stdout[-5000:]

          def final_path_for_logical_path(logical_path):
              logical_path = str(logical_path).split("[")[0].strip()

              if logical_path.startswith("/data/"):
                  rel = logical_path[len("/data/"):]
                  return DATA / rel

              if logical_path.startswith("data/"):
                  rel = logical_path[len("data/"):]
                  return DATA / rel

              name = norm_name(logical_path)
              return SCW_DIR / name

          def candidate_urls_for_logical_path(logical_path):
              logical_path = str(logical_path).split("[")[0].strip()
              candidates = []

              if logical_path.startswith("/data/"):
                  rel = logical_path[len("/data/"):]
                  for base in BASES:
                      candidates.append(f"{base}/{rel}")
                      if rel.endswith(".fits") and not rel.endswith(".fits.gz"):
                          candidates.append(f"{base}/{rel}.gz")
                      if rel.endswith(".fits.gz"):
                          candidates.append(f"{base}/{rel[:-3]}")
                  return candidates

              name = norm_name(logical_path)

              roots = [
                  f"scw/{REV}/{SCW}.001",
                  f"aux/adp/{REV}.001",
                  "aux/adp",
                  "aux",
                  "idx",
                  "cat",
                  "ic",
              ]

              for base in BASES:
                  for root in roots:
                      candidates.append(f"{base}/{root}/{name}")
                      if name.endswith(".fits") and not name.endswith(".fits.gz"):
                          candidates.append(f"{base}/{root}/{name}.gz")
                      if name.endswith(".fits.gz"):
                          candidates.append(f"{base}/{root}/{name[:-3]}")

              return candidates

          def download_logical(logical_path, category, source_iteration):
              final_path = final_path_for_logical_path(logical_path)
              final_name = final_path.name

              if final_path.exists() and final_path.stat().st_size > 1024:
                  download_rows.append({
                      "source_iteration": source_iteration,
                      "category": category,
                      "logical_path": str(logical_path),
                      "final_path": str(final_path),
                      "url": "already_exists",
                      "attempt": 0,
                      "returncode": 0,
                      "ok": True,
                      "reason": "already_exists",
                      "bytes": final_path.stat().st_size,
                      "sha256": sha256_file(final_path),
                      "log_tail": "",
                  })
                  return True

              urls = candidate_urls_for_logical_path(logical_path)

              for i, url in enumerate(urls, start=1):
                  tmp = final_path.parent / f".download_{final_name}_{i}.part"

                  row = {
                      "source_iteration": source_iteration,
                      "category": category,
                      "logical_path": str(logical_path),
                      "final_path": str(final_path),
                      "url": url,
                      "attempt": i,
                      "returncode": "",
                      "ok": False,
                      "reason": "",
                      "bytes": 0,
                      "sha256": "",
                      "log_tail": "",
                  }

                  try:
                      rc, ok, reason, log_tail = curl_download(url, tmp)
                      row["returncode"] = rc
                      row["reason"] = reason
                      row["log_tail"] = log_tail

                      if ok:
                          materialize(tmp, final_path)
                          if final_path.exists() and final_path.stat().st_size > 1024:
                              row["ok"] = True
                              row["bytes"] = final_path.stat().st_size
                              row["sha256"] = sha256_file(final_path)
                              download_rows.append(row)
                              return True
                  except Exception as e:
                      row["reason"] = repr(e)

                  download_rows.append(row)

              return False

          def seed_initial_files():
              scw_seed = [
                  "swg.fits",
                  "sc_time.fits",
                  "sc_attitude.fits",
                  "sc_gti.fits",
                  "sc_hk.fits",
                  "sc_modes.fits",
                  "sc_orbit_param.fits",
                  "spi_oper.fits",
                  "spi_spectra.fits",
                  "spi_gti.fits",
                  "spi_hk.fits",
                  "spi_science_hk.fits",
                  "spi_science_param.fits",
                  "spi_acs.fits",
                  "spi_block.fits",
                  "ibis_hk.fits",
                  "ibis_raw_shadow.fits",
                  "ibis_dead.fits",
                  "jmx1_hk.fits",
                  "jmx2_hk.fits",
                  "jemx1_hk.fits",
                  "jemx2_hk.fits",
                  "picsit_hk.fits",
                  "isgri_hk.fits",
              ]

              aux_adp_seed = [
                  "orbit_historic.fits",
                  "orbit_predicted.fits",
                  "attitude_historic.fits",
                  "attitude_predicted_01.fits",
                  "attitude_predicted.fits",
                  "time_correlation.fits",
                  "pointing_definition_predicted_0001.fits",
                  "pointing_definition_predicted.fits",
                  "pointing_definition_historic.fits",
                  "pointing_definition_predicted_0000.fits",
                  "pointing_definition_predicted_0002.fits",
                  "observation_log.fits",
                  "moc_out_of_limits.fits",
                  "slew_definition.fits",
              ]

              for x in scw_seed:
                  download_logical(f"/data/scw/{REV}/{SCW}.001/{x}", "initial_scw_seed", 0)

              for x in aux_adp_seed:
                  download_logical(f"/data/aux/adp/{REV}.001/{x}", "initial_aux_adp_seed", 0)

          def discover_members_from_swg():
              swg_path = SCW_DIR / "swg.fits"
              refs = []

              if not swg_path.exists():
                  return refs

              try:
                  text = swg_path.read_bytes().decode("latin1", "ignore")
                  found = re.findall(r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)", text)
                  for ref in sorted(set(found)):
                      name = norm_name(ref)
                      if name and name != "swg.fits":
                          refs.append(f"/data/scw/{REV}/{SCW}.001/{name}")
              except Exception as e:
                  refs.append(f"ERROR_READING_SWG:{repr(e)}")

              return refs

          def run_dal_verify(iteration):
              log_path = LOGS / f"dal_verify_iteration_{iteration:02d}.log"

              bash_script = f'''
                set +e
                mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep
                cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                if [ -d /opt/osa/lib ]; then
                  export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
                fi

                if [ -d /opt/osa/lib64 ]; then
                  export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
                fi

                source /opt/osa/bin/isdc_init_env.sh || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                TARGET=/data/scw/{REV}/{SCW}.001/swg.fits

                echo "ACIRM_R3G_DAL_ITERATION={iteration}"
                echo "environment"
                env | sort | grep -E "^(ISDC|OSA|REP|PFILES|PATH|LD_LIBRARY_PATH|COMMONLOGFILE|HEADAS|CFITSIO)" || true
                echo ""
                echo "local files count"
                find /data -type f | wc -l || true
                echo ""
                echo "local files sample"
                find /data -maxdepth 6 -type f -printf "%p %s\\n" | sort | head -300 || true
                echo ""
                echo "dal_verify swg.fits"
                timeout 600 dal_verify "$TARGET" 2>&1 || true
                echo ""
                echo "og_create parameter probe"
                timeout 90 og_create 2>&1 | head -260 || true
                echo ""
                echo "commonlog tail"
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -800 || true
              '''

              cmd = [
                  "docker",
                  "run",
                  "--rm",
                  "-v", f"{os.getcwd()}/ACIRM_R21AX_R7G_R3G_RESULTS/data:/data",
                  "-v", f"{os.getcwd()}/ACIRM_R21AX_R7G_R3G_RESULTS/logs:/logs",
                  "integralsw/osa:latest",
                  "bash",
                  "-lc",
                  bash_script,
              ]

              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, timeout=720)
              log_path.write_text(p.stdout, encoding="utf-8", errors="replace")
              return p.stdout

          def parse_missing_from_dal_log(txt):
              missing = set()

              if "DAL_FILE_NOT_ACCESSIBLE" in txt or "status -2004" in txt or "not accessible" in txt.lower():
                  patterns = [
                      r"(/data/[A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)",
                      r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)",
                  ]

                  for pat in patterns:
                      for m in re.findall(pat, txt):
                          clean = str(m).split("[")[0].strip()
                          if clean.endswith(".fits") or clean.endswith(".fits.gz"):
                              missing.add(clean)

              filtered = []

              for m in sorted(missing):
                  if m.startswith("/data/"):
                      filtered.append(m)
                  else:
                      name = norm_name(m)
                      if not name:
                          continue

                      aux_names = [
                          "observation_log.fits",
                          "moc_out_of_limits.fits",
                          "time_correlation.fits",
                          "slew_definition.fits",
                      ]

                      if name.startswith("orbit") or "attitude" in name or "pointing" in name or name in aux_names:
                          filtered.append(f"/data/aux/adp/{REV}.001/{name}")
                      else:
                          filtered.append(f"/data/scw/{REV}/{SCW}.001/{name}")

              return sorted(set(filtered))

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for r in rows:
                      for k in fieldnames:
                          r.setdefault(k, "")
                      w.writerow(r)

          print("R3G: seed initial files")
          seed_initial_files()

          print("R3G: discover members from swg")
          for ref in discover_members_from_swg():
              if ref.startswith("ERROR_"):
                  missing_rows.append({
                      "iteration": 0,
                      "missing_ref": ref,
                      "download_ok": False,
                      "category": "swg_parse_error",
                  })
              else:
                  ok = download_logical(ref, "swg_regex_discovered_member", 0)
                  missing_rows.append({
                      "iteration": 0,
                      "missing_ref": ref,
                      "download_ok": ok,
                      "category": "swg_regex_discovered_member",
                  })

          max_iterations = 20
          final_status = "R21AX_R7G_R3G_NOT_STARTED"
          repeated_guard = set()

          for iteration in range(1, max_iterations + 1):
              print(f"R3G: DAL iteration {iteration}")
              txt = run_dal_verify(iteration)

              dal_file_not_accessible = ("DAL_FILE_NOT_ACCESSIBLE" in txt) or ("status -2004" in txt)
              isdc_env_missing = ("ISDC_ENV is not set" in txt) or ("env. variable ISDC_ENV is not set" in txt)
              parameter_init_error = ("Parameter initialization error" in txt) or ("status -3003" in txt)
              missing = parse_missing_from_dal_log(txt)

              dal_iteration_rows.append({
                  "iteration": iteration,
                  "dal_file_not_accessible": dal_file_not_accessible,
                  "isdc_env_missing": isdc_env_missing,
                  "parameter_init_error": parameter_init_error,
                  "missing_count": len(missing),
                  "missing_refs_joined": "|".join(missing),
              })

              if isdc_env_missing or parameter_init_error:
                  final_status = "R21AX_R7G_R3G_OSA_ENV_OR_PARAMETER_REGRESSION_NO_511_NO_PHYSICAL_NULL"
                  break

              if not dal_file_not_accessible:
                  final_status = "R21AX_R7G_R3G_DAL_VERIFY_NO_MISSING_FILE_REMAINING_READY_FOR_NEXT_OSA_STAGE_NO_511_YET"
                  break

              if not missing:
                  final_status = "R21AX_R7G_R3G_DAL_FILE_NOT_ACCESSIBLE_BUT_NO_PARSEABLE_MISSING_REFERENCE_NO_511_NO_PHYSICAL_NULL"
                  break

              key = tuple(missing)
              if key in repeated_guard:
                  final_status = "R21AX_R7G_R3G_REPEATED_MISSING_REFERENCE_AFTER_DOWNLOAD_ATTEMPTS_NO_511_NO_PHYSICAL_NULL"
                  break

              repeated_guard.add(key)

              any_new_ok = False

              for ref in missing:
                  ok = download_logical(ref, "dal_missing_auto_resolve", iteration)
                  any_new_ok = any_new_ok or ok
                  missing_rows.append({
                      "iteration": iteration,
                      "missing_ref": ref,
                      "download_ok": ok,
                      "category": "dal_missing_auto_resolve",
                  })

              if not any_new_ok:
                  final_status = "R21AX_R7G_R3G_UNABLE_TO_DOWNLOAD_NEXT_MISSING_REFERENCES_NO_511_NO_PHYSICAL_NULL"
                  break

          else:
              final_status = "R21AX_R7G_R3G_MAX_ITERATIONS_REACHED_NO_511_NO_PHYSICAL_NULL"

          final_files = []

          for p in sorted(DATA.rglob("*.fits")):
              final_files.append({
                  "path": str(p),
                  "bytes": p.stat().st_size,
                  "sha256": sha256_file(p),
              })

          write_csv(
              OUT / "r3g_download_manifest.csv",
              download_rows,
              [
                  "source_iteration",
                  "category",
                  "logical_path",
                  "final_path",
                  "url",
                  "attempt",
                  "returncode",
                  "ok",
                  "reason",
                  "bytes",
                  "sha256",
                  "log_tail",
              ],
          )

          write_csv(
              OUT / "r3g_dal_iterations.csv",
              dal_iteration_rows,
              [
                  "iteration",
                  "dal_file_not_accessible",
                  "isdc_env_missing",
                  "parameter_init_error",
                  "missing_count",
                  "missing_refs_joined",
              ],
          )

          write_csv(
              OUT / "r3g_missing_reference_resolution.csv",
              missing_rows,
              [
                  "iteration",
                  "missing_ref",
                  "download_ok",
                  "category",
              ],
          )

          write_csv(
              OUT / "r3g_final_local_fits_files.csv",
              final_files,
              [
                  "path",
                  "bytes",
                  "sha256",
              ],
          )

          summary = {
              "run_id": RUN_ID,
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "AUTO_DAL_DEPENDENCY_RESOLVER_ONLY_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY",
              "scw": SCW,
              "rev": REV,
              "dal_iteration_count": len(dal_iteration_rows),
              "download_row_count": len(download_rows),
              "resolved_missing_reference_count": sum(1 for r in missing_rows if bool(r.get("download_ok"))),
              "unresolved_missing_reference_count": sum(1 for r in missing_rows if not bool(r.get("download_ok"))),
              "local_fits_file_count": len(final_files),
              "final_status": final_status,
          }

          (OUT / "R3G_AUTO_DAL_RESOLVER_SUMMARY.json").write_text(
              json.dumps(summary, indent=2, sort_keys=True),
              encoding="utf-8",
          )

          print(json.dumps(summary, indent=2))
          PY

      - name: Build LIGHT audit package only
        if: always()
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/logs

          cp ACIRM_R21AX_R7G_R3G_RESULTS/logs/*.log ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R3G_RESULTS/*.json ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/ || true
          cp ACIRM_R21AX_R7G_R3G_RESULTS/*.csv ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/ || true

          echo "R3G auto-resolver downloaded FITS dependencies temporarily on GitHub runner." > ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "FITS files are excluded from this phone artifact." >> ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "No 511 keV metric is computed here." >> ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt

          du -h ACIRM_R21AX_R7G_R3G_RESULTS/data > ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/data_size_report.txt || true
          find ACIRM_R21AX_R7G_R3G_RESULTS/data -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/data_file_list.csv || true

          cat > ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/R3G_CLAIM_BOUNDARY.txt <<'EOF'
          ACIRM R3G claim boundary:
          - Auto DAL dependency resolver and DAL smoke test only.
          - No 511 keV metric is computed.
          - Not full OSA proof.
          - Not 511 keV discovery.
          - Any network/runtime/DAL dependency failure is not a physical null.
          EOF

          cat > ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS/R3G_NEXT_STEP.txt <<'EOF'
          Upload ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS.zip to ChatGPT.
          Do not upload heavy FITS data.
          The audit will decide whether missing dependencies are exhausted or whether actual OSA execution can begin.
          EOF

          zip -r ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS.zip ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS
          sha256sum ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS.zip > ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R3G LIGHT artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3G_LIGHT_RESULTS.zip.sha256.txt
