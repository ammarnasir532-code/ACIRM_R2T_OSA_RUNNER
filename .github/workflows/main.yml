name: ACIRM R3P R2K GUI entry diagnostic fast

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2k-gui-entry-diagnostic-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Prepare folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_LIGHT_RESULTS/logs
          echo "R2K_GUI_DIAGNOSTIC_PREPARED"

      - name: Run fast GUI diagnostic
        continue-on-error: true
        run: |
          set +e

          OUT="ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS"
          LIGHT="ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_LIGHT_RESULTS"
          MAIN_LOG="$OUT/logs/main_execution.log"

          echo "R2K_GUI_DIAGNOSTIC_STARTED" | tee "$MAIN_LOG"
          echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$MAIN_LOG"

          {
            echo "HOST_PREP_START"
            sudo apt-get update -y || true
            sudo apt-get install -y zip || true
            docker --version || true
            docker pull integralsw/osa:latest || true
            echo "HOST_PREP_END"
          } 2>&1 | tee "$OUT/logs/host_prepare.log"

          cat > "$OUT/work/run_r2k_gui_diag.sh" <<'BASH'
          set +e

          echo "R2K_CONTAINER_START"

          mkdir -p /work/container_logs
          mkdir -p /tmp/acirm_pfiles
          mkdir -p /tmp/acirm_work
          mkdir -p /tmp/acirm_rep

          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1

          if [ -d /opt/osa/lib ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
          fi

          if [ -d /opt/osa/lib64 ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
          fi

          cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

          cp -f /tmp/acirm_pfiles/spi_science_analysis.par /work/container_logs/spi_science_analysis.par.original 2>/dev/null || true

          source /opt/osa/bin/isdc_init_env.sh > /work/container_logs/isdc_init_env.log 2>&1 || true

          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1

          for f in /tmp/acirm_pfiles/*.par; do
            if [ -f "$f" ]; then
              sed -i 's/,ql,/,hl,/g' "$f" || true
              sed -i 's/,q,/,h,/g' "$f" || true
            fi
          done

          cp -f /tmp/acirm_pfiles/spi_science_analysis.par /work/container_logs/spi_science_analysis.par.hidden_edit 2>/dev/null || true

          {
            echo "COMMANDS"
            for c in spi_science_analysis plist pget pset punlearn fstruct fdump ftlist strings timeout stdbuf; do
              echo "$c=$(command -v "$c" || true)"
            done

            echo ""
            echo "OSA_ENV"
            env | sort | grep -E "^(DISPLAY|HEADASNOQUERY|PIL|PFILES|ISDC|REP_BASE_PROD|COMMONLOGFILE|PATH|LD_LIBRARY_PATH)=" || true

            echo ""
            echo "SPI_SCIENCE_ANALYSIS_WHICH"
            which spi_science_analysis || true

            echo ""
            echo "SPI_SCIENCE_ANALYSIS_FILE"
            file "$(which spi_science_analysis 2>/dev/null)" 2>/dev/null || true
            ls -l "$(which spi_science_analysis 2>/dev/null)" 2>/dev/null || true

            echo ""
            echo "PAR_MODE_LINES"
            grep -E "^(mode|clobber|log_File|chatter|debug|gui|GUI|batch|interactive|obs_group|spibounds|run_|use_|spiros_|spi_phase_|spi_flatfield|loc_spiflatfield)" /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null || true

            echo ""
            echo "PAR_ALL_NUMBERED"
            nl -ba /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null | head -500 || true
          } > /work/container_logs/static_inspection.txt 2>&1

          {
            echo "GREP_GUI_BATCH_PROMPT_IN_PFILES"
            grep -RInE "gui|GUI|batch|Batch|prompt|Prompt|interactive|DISPLAY|TGClient|mode," /opt/osa/pfiles /tmp/acirm_pfiles 2>/dev/null | head -600 || true

            echo ""
            echo "GREP_GUI_BATCH_PROMPT_IN_BIN"
            grep -RInE "gui|GUI|batch|Batch|prompt|Prompt|interactive|DISPLAY|TGClient" /opt/osa/bin 2>/dev/null | head -600 || true
          } > /work/container_logs/grep_gui_batch_prompt.txt 2>&1

          {
            echo "STRINGS_SPI_SCIENCE_ANALYSIS"
            if command -v strings >/dev/null 2>&1; then
              strings "$(which spi_science_analysis 2>/dev/null)" 2>/dev/null | grep -Ei "gui|batch|prompt|interactive|display|mode|commonlog|parameter" | head -500 || true
            fi
          } > /work/container_logs/strings_spi_science_analysis.txt 2>&1

          {
            echo "PLIST_BEFORE"
            plist spi_science_analysis 2>&1 || true
          } > /work/container_logs/plist_spi_science_analysis_before.txt 2>&1

          make_answers() {
            OUT="$1"
            rm -f "$OUT"
            for i in $(seq 1 200); do
              echo "" >> "$OUT"
              echo "no" >> "$OUT"
              echo "yes" >> "$OUT"
              echo "3" >> "$OUT"
              echo "GEDSAT" >> "$OUT"
              echo "0" >> "$OUT"
            done
          }

          run_probe() {
            NAME="$1"
            COMMAND_TEXT="$2"
            ANSWERS="/work/container_logs/${NAME}.answers.txt"
            STDOUT_LOG="/work/container_logs/${NAME}.stdout.txt"
            COMMON_LOG="/work/container_logs/${NAME}.commonlog.txt"
            STATUS_LOG="/work/container_logs/${NAME}.status.txt"

            make_answers "$ANSWERS"
            rm -f /tmp/acirm_work/commonlog.txt "$STDOUT_LOG" "$COMMON_LOG" "$STATUS_LOG"

            echo "probe=${NAME}" > "$STATUS_LOG"
            echo "command=${COMMAND_TEXT}" >> "$STATUS_LOG"
            echo "started_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS_LOG"

            timeout 35 bash -lc "$COMMAND_TEXT" < "$ANSWERS" > "$STDOUT_LOG" 2>&1
            RC=$?

            echo "returncode=${RC}" >> "$STATUS_LOG"
            echo "ended_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS_LOG"

            cp -f /tmp/acirm_work/commonlog.txt "$COMMON_LOG" 2>/dev/null || true

            echo "R2K_PROBE_DONE ${NAME} rc=${RC}"
          }

          run_probe "probe_01_no_args_no_display" "unset DISPLAY; export HEADASNOQUERY=1; export PIL_NO_GUI=1; export PIL_NOTTY=1; spi_science_analysis"
          run_probe "probe_02_mode_h_no_display" "unset DISPLAY; export HEADASNOQUERY=1; export PIL_NO_GUI=1; export PIL_NOTTY=1; spi_science_analysis mode=h"
          run_probe "probe_03_mode_hl_no_display" "unset DISPLAY; export HEADASNOQUERY=1; export PIL_NO_GUI=1; export PIL_NOTTY=1; spi_science_analysis mode=hl"
          run_probe "probe_04_help_short" "unset DISPLAY; spi_science_analysis -h"
          run_probe "probe_05_help_long" "unset DISPLAY; spi_science_analysis --help"
          run_probe "probe_06_display_99_mode_h" "export DISPLAY=:99; export HEADASNOQUERY=1; export PIL_NO_GUI=1; export PIL_NOTTY=1; spi_science_analysis mode=h"

          {
            echo "PLIST_AFTER"
            plist spi_science_analysis 2>&1 || true
          } > /work/container_logs/plist_spi_science_analysis_after.txt 2>&1

          find /work/container_logs -maxdepth 1 -type f -printf "%p %s\n" | sort > /work/container_logs/file_manifest.txt

          echo "R2K_CONTAINER_END"
          BASH

          docker run --rm \
            -v "$PWD/$OUT/work:/work" \
            integralsw/osa:latest \
            bash /work/run_r2k_gui_diag.sh \
            > "$OUT/logs/host_container_r2k_gui_diag.log" 2>&1 || true

          sudo chown -R "$(id -u):$(id -g)" "$OUT" "$LIGHT" 2>/dev/null || true
          chmod -R u+rwX,go+rX "$OUT" "$LIGHT" 2>/dev/null || true

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import os
          import time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2K_GUI_ENTRY_DIAGNOSTIC_FAST"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS")
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          CL = WORK / "container_logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_LIGHT_RESULTS")
          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_LIGHT_RESULTS.zip"

          LIGHT.mkdir(parents=True, exist_ok=True)
          (LIGHT / "logs").mkdir(parents=True, exist_ok=True)

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_text(path, limit=700000):
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              data = p.read_bytes()
              if len(data) > limit:
                  data = data[:320000] + b"\nACIRM_LOG_TRUNCATED_MIDDLE\n" + data[-320000:]
              return data.decode("utf-8", "replace")

          def copy_to_light(path):
              p = Path(path)
              if p.exists() and p.is_file():
                  (LIGHT / "logs" / p.name).write_text(safe_text(p), encoding="utf-8", errors="replace")

          for p in sorted(LOGS.glob("*.log")):
              copy_to_light(p)

          for p in sorted(CL.glob("*")):
              if p.is_file():
                  copy_to_light(p)

          rows = []
          if CL.exists():
              for p in sorted(CL.glob("*")):
                  if p.is_file():
                      rows.append({"path": str(p), "bytes": p.stat().st_size})

          with open(LIGHT / "file_manifest.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["path", "bytes"])
              w.writeheader()
              for r in rows:
                  w.writerow(r)

          def parse_status(path):
              d = {}
              for line in safe_text(path, limit=80000).splitlines():
                  if "=" in line:
                      k, v = line.split("=", 1)
                      d[k.strip()] = v.strip()
              return d

          probes = []
          for p in sorted(CL.glob("probe_*.status.txt")):
              name = p.name.replace(".status.txt", "")
              st = parse_status(p)
              stdout = safe_text(CL / (name + ".stdout.txt"), limit=120000)
              common = safe_text(CL / (name + ".commonlog.txt"), limit=120000)
              joined = stdout + "\n" + common
              probes.append({
                  "probe": name,
                  "returncode": st.get("returncode", ""),
                  "gui_attempt": "Attempting to launch GUI" in joined,
                  "normal_prompt": "default parameter prompting" in joined or "Running in normal mode" in joined,
                  "hidden_mode_seen": "hidden" in joined.lower(),
                  "display_error": "can't open display" in joined or "TGClient" in joined,
                  "status35603": "status -35603" in joined,
                  "status3004": "status -3004" in joined,
                  "timeout": st.get("returncode", "") == "124",
                  "command": st.get("command", "")
              })

          with open(LIGHT / "probes_summary.csv", "w", newline="", encoding="utf-8") as f:
              fields = ["probe", "returncode", "gui_attempt", "normal_prompt", "hidden_mode_seen", "display_error", "status35603", "status3004", "timeout", "command"]
              w = csv.DictWriter(f, fieldnames=fields)
              w.writeheader()
              for r in probes:
                  w.writerow(r)

          par_original = safe_text(CL / "spi_science_analysis.par.original", limit=300000)
          par_hidden = safe_text(CL / "spi_science_analysis.par.hidden_edit", limit=300000)
          static_inspection = safe_text(CL / "static_inspection.txt", limit=500000)
          grep_text = safe_text(CL / "grep_gui_batch_prompt.txt", limit=500000)
          strings_text = safe_text(CL / "strings_spi_science_analysis.txt", limit=300000)

          has_mode_param = any(line.startswith("mode,") for line in par_original.splitlines())
          has_gui_param = any("gui" in line.lower() for line in par_original.splitlines())
          has_batch_param = any("batch" in line.lower() for line in par_original.splitlines())
          has_prompt_param = any("prompt" in line.lower() for line in par_original.splitlines())

          mode_line = ""
          for line in par_original.splitlines():
              if line.startswith("mode,"):
                  mode_line = line
                  break

          if any(p.get("gui_attempt") for p in probes):
              final_status = "R2K_GUI_ENTRY_CONFIRMED_SPI_SCIENCE_ANALYSIS_ATTEMPTS_GUI_IN_PROBE"
          elif any(p.get("hidden_mode_seen") for p in probes):
              final_status = "R2K_HIDDEN_MODE_SIGNAL_FOUND_REVIEW_PROBE_LOGS"
          else:
              final_status = "R2K_GUI_BATCH_DIAGNOSTIC_COMPLETED_REVIEW_LOGS"

          summary = {
              "run_id": RUN_ID,
              "created_utc": now_utc(),
              "final_status": final_status,
              "scientific_status": "DIAGNOSTIC_ONLY_NO_511_ANALYSIS_NO_PHYSICAL_CLAIM",
              "runtime_design": "FAST_DIAGNOSTIC_NO_LINE_SIDEBANDS_NO_INTEGRAL_DOWNLOAD",
              "par_findings": {
                  "has_mode_param": has_mode_param,
                  "mode_line": mode_line,
                  "has_gui_param": has_gui_param,
                  "has_batch_param": has_batch_param,
                  "has_prompt_param": has_prompt_param
              },
              "probe_count": len(probes),
              "probes": probes,
              "claim_ceiling": "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          }

          (LIGHT / "SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          (LIGHT / "CLAIM_BOUNDARY.txt").write_text(
              "This is a GUI/batch diagnostic only. It does not run 511 line/sideband science analysis.\n"
              "No physical claim can be made from this artifact.\n",
              encoding="utf-8"
          )

          if Path(ZIP_NAME).exists():
              Path(ZIP_NAME).unlink()

          os.system("zip -r " + ZIP_NAME + " " + str(LIGHT))

          if Path(ZIP_NAME).exists():
              sha = sha256_file(ZIP_NAME)
              Path(ZIP_NAME + ".sha256.txt").write_text(sha + "  " + ZIP_NAME + "\n", encoding="utf-8")
              print("R2K_GUI_DIAGNOSTIC_ZIP_SHA256", sha)

          print(json.dumps(summary, indent=2))
          PY

      - name: Upload R2K GUI diagnostic artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_LIGHT_RESULTS.zip.sha256.txt
            ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS/logs/main_execution.log
            ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS/logs/host_prepare.log
            ACIRM_R21AX_R7G_R3P_R2K_GUI_DIAGNOSTIC_RESULTS/logs/host_container_r2k_gui_diag.log
          if-no-files-found: warn
