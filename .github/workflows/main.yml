name: ACIRM R15A 4FGL nearby model builder no TS audit

on:
  workflow_dispatch:

jobs:
  r15a-4fgl-nearby-model-builder:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Host preflight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acirm_r15a data results logs final_artifact
          echo "HOST_UTC=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee logs/HOST_PREFLIGHT.txt
          uname -a | tee -a logs/HOST_PREFLIGHT.txt
          df -h | tee -a logs/HOST_PREFLIGHT.txt
          python3 --version | tee -a logs/HOST_PREFLIGHT.txt

      - name: Write R15A source model builder
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p acirm_r15a data results logs final_artifact

          cat > acirm_r15a/build_r15a_4fgl_model.py <<'PY'
          import csv
          import datetime as dt
          import html
          import json
          import math
          import os
          import re
          from pathlib import Path

          import numpy as np
          from astropy.io import fits

          ROOT = Path('.')
          DATA = ROOT / 'data'
          RESULTS = ROOT / 'results'
          LOGS = ROOT / 'logs'
          DATA.mkdir(exist_ok=True)
          RESULTS.mkdir(exist_ok=True)
          LOGS.mkdir(exist_ok=True)

          TARGET_RA = 288.2646
          TARGET_DEC = 19.7735
          TARGET_NAME = 'GRB221009A_ACIRM_LOCKED'
          SOURCE_RADIUS_DEG = float(os.environ.get('R15A_SOURCE_RADIUS_DEG', '6.0'))
          FREE_RADIUS_DEG = float(os.environ.get('R15A_FREE_RADIUS_DEG', '3.0'))
          MAX_SOURCES = int(os.environ.get('R15A_MAX_SOURCES', '80'))
          CATALOG_PATH = Path(os.environ.get('R15A_4FGL_CATALOG', 'data/gll_psc_4fgl.fit'))

          def utc_now():
              return dt.datetime.utcnow().replace(microsecond=0).isoformat() + 'Z'

          def angular_sep_deg(ra1, dec1, ra2, dec2):
              r1 = math.radians(float(ra1)); d1 = math.radians(float(dec1))
              r2 = math.radians(float(ra2)); d2 = math.radians(float(dec2))
              s = math.sin((d2-d1)/2)**2 + math.cos(d1)*math.cos(d2)*math.sin((r2-r1)/2)**2
              return math.degrees(2 * math.asin(min(1.0, math.sqrt(max(0.0, s)))))

          def colname(cols, candidates):
              lut = {c.lower(): c for c in cols}
              for cand in candidates:
                  if cand.lower() in lut:
                      return lut[cand.lower()]
              return None

          def value(row, name, default=None):
              if not name:
                  return default
              try:
                  v = row[name]
              except Exception:
                  return default
              if isinstance(v, bytes):
                  return v.decode('utf-8', 'replace').strip()
              if hasattr(v, 'item'):
                  try:
                      v = v.item()
                  except Exception:
                      pass
              if isinstance(v, str):
                  return v.strip()
              try:
                  if np.ma.is_masked(v):
                      return default
              except Exception:
                  pass
              try:
                  if isinstance(v, float) and (math.isnan(v) or math.isinf(v)):
                      return default
              except Exception:
                  pass
              return v

          def safe_float(x, default=None):
              try:
                  if x is None:
                      return default
                  y = float(x)
                  if math.isnan(y) or math.isinf(y):
                      return default
                  return y
              except Exception:
                  return default

          def xml_name(s):
              s = str(s or 'UNKNOWN').strip()
              s = re.sub(r'[^A-Za-z0-9_.+-]+', '_', s)
              if not s or not re.match(r'[A-Za-z_]', s[0]):
                  s = 'SRC_' + s
              return s[:80]

          def pl_source_xml(name, ra, dec, prefactor, index, scale, free):
              prefactor = safe_float(prefactor, 1.0e-13)
              if prefactor is None or prefactor <= 0:
                  prefactor = 1.0e-13
              scale_unit = 1.0e-13
              pref_value = max(min(prefactor / scale_unit, 1.0e6), 1.0e-8)
              idx = safe_float(index, 2.2)
              if idx is None:
                  idx = 2.2
              idx = -abs(idx)
              piv = safe_float(scale, 1000.0)
              if piv is None or piv <= 0:
                  piv = 1000.0
              free_s = '1' if free else '0'
              nm = html.escape(xml_name(name), quote=True)
              return f'''    <source name="{nm}" type="PointSource">
              <spectrum type="PowerLaw">
                <parameter free="{free_s}" max="1e7" min="1e-8" name="Prefactor" scale="{scale_unit:.1e}" value="{pref_value:.8g}" />
                <parameter free="{free_s}" max="0.0" min="-5.0" name="Index" scale="1.0" value="{idx:.8g}" />
                <parameter free="0" max="1000000.0" min="10.0" name="Scale" scale="1.0" value="{piv:.8g}" />
              </spectrum>
              <spatialModel type="SkyDirFunction">
                <parameter free="0" max="360.0" min="0.0" name="RA" scale="1.0" value="{float(ra):.8f}" />
                <parameter free="0" max="90.0" min="-90.0" name="DEC" scale="1.0" value="{float(dec):.8f}" />
              </spatialModel>
            </source>'''

          if not CATALOG_PATH.exists():
              raise SystemExit(f'CATALOG_NOT_FOUND: {CATALOG_PATH}')

          hdul = fits.open(CATALOG_PATH, memmap=True)
          hdu = None
          for cand in hdul:
              if getattr(cand, 'data', None) is not None and hasattr(cand.data, 'names'):
                  names = list(cand.data.names or [])
                  if any(n.lower() == 'raj2000' for n in names) and any(n.lower() == 'dej2000' for n in names):
                      hdu = cand
                      break
          if hdu is None:
              raise SystemExit('NO_4FGL_TABLE_WITH_RAJ2000_DEJ2000')

          data = hdu.data
          cols = list(data.names or [])
          c_name = colname(cols, ['Source_Name', 'ASSOC1', 'NickName'])
          c_ra = colname(cols, ['RAJ2000', 'RA'])
          c_dec = colname(cols, ['DEJ2000', 'DEC'])
          c_signif = colname(cols, ['Signif_Avg', 'Signif_Curve'])
          c_pivot = colname(cols, ['Pivot_Energy', 'PivotEnergy', 'Energy_Flux_Pivot'])
          c_spec = colname(cols, ['SpectrumType', 'Spectrum_Type'])
          c_pl_fd = colname(cols, ['PL_Flux_Density', 'Flux_Density', 'LP_Flux_Density', 'PLEC_Flux_Density'])
          c_pl_idx = colname(cols, ['PL_Index', 'Spectral_Index', 'LP_Index', 'PLEC_Index'])
          c_assoc = colname(cols, ['ASSOC1'])

          rows = []
          for i, row in enumerate(data):
              ra = safe_float(value(row, c_ra))
              dec = safe_float(value(row, c_dec))
              if ra is None or dec is None:
                  continue
              sep = angular_sep_deg(TARGET_RA, TARGET_DEC, ra, dec)
              if sep <= SOURCE_RADIUS_DEG:
                  name = value(row, c_name, f'4FGL_ROW_{i}')
                  signif = safe_float(value(row, c_signif), 0.0)
                  pivot = safe_float(value(row, c_pivot), 1000.0)
                  pref = safe_float(value(row, c_pl_fd), 1.0e-13)
                  idx = safe_float(value(row, c_pl_idx), 2.2)
                  spec = value(row, c_spec, '')
                  assoc = value(row, c_assoc, '')
                  rows.append({
                      'row_index': i,
                      'source_name': str(name),
                      'assoc': str(assoc),
                      'ra_deg': ra,
                      'dec_deg': dec,
                      'sep_deg': sep,
                      'signif_avg': signif,
                      'spectrum_type_catalog': str(spec),
                      'pivot_energy_mev': pivot,
                      'flux_density_catalog': pref,
                      'index_catalog': idx,
                      'free_in_r15a': sep <= FREE_RADIUS_DEG,
                  })

          rows.sort(key=lambda r: (r['sep_deg'], -float(r['signif_avg'] or 0.0)))
          selected = rows[:MAX_SOURCES]
          truncated = len(rows) > len(selected)

          fieldnames = ['row_index','source_name','assoc','ra_deg','dec_deg','sep_deg','signif_avg','spectrum_type_catalog','pivot_energy_mev','flux_density_catalog','index_catalog','free_in_r15a']
          csv_path = RESULTS / 'R15A_NEARBY_4FGL_SOURCES_SELECTED.csv'
          with csv_path.open('w', newline='', encoding='utf-8') as f:
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader(); w.writerows(selected)

          all_csv_path = RESULTS / 'R15A_NEARBY_4FGL_SOURCES_ALL_WITHIN_RADIUS.csv'
          with all_csv_path.open('w', newline='', encoding='utf-8') as f:
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader(); w.writerows(rows)

          xml_parts = []
          xml_parts.append('<?xml version="1.0" ?>')
          xml_parts.append('<source_library title="R15A source library: GRB + limited nearby 4FGL + diffuse">')
          xml_parts.append(f'''    <source name="{TARGET_NAME}" type="PointSource">
              <spectrum type="PowerLaw">
                <parameter free="1" max="1e5" min="1e-8" name="Prefactor" scale="1e-10" value="1.0" />
                <parameter free="1" max="0.0" min="-5.0" name="Index" scale="1.0" value="-2.0" />
                <parameter free="0" max="500000.0" min="100.0" name="Scale" scale="1.0" value="1000.0" />
              </spectrum>
              <spatialModel type="SkyDirFunction">
                <parameter free="0" max="360.0" min="0.0" name="RA" scale="1.0" value="{TARGET_RA}" />
                <parameter free="0" max="90.0" min="-90.0" name="DEC" scale="1.0" value="{TARGET_DEC}" />
              </spatialModel>
            </source>''')

          for r in selected:
              src_nm = 'R15A_4FGL_' + xml_name(r['source_name'])
              xml_parts.append(pl_source_xml(src_nm, r['ra_deg'], r['dec_deg'], r['flux_density_catalog'], r['index_catalog'], r['pivot_energy_mev'], bool(r['free_in_r15a'])))

          xml_parts.append('''    <source name="iso_P8R3_SOURCE_V3_v1" type="DiffuseSource">
              <spectrum apply_edisp="false" file="ISO_DIFFUSE_PLACEHOLDER" type="FileFunction">
                <parameter free="1" max="10" min="0.01" name="Normalization" scale="1" value="1" />
              </spectrum>
              <spatialModel type="ConstantValue">
                <parameter free="0" max="10.0" min="0.0" name="Value" scale="1.0" value="1.0" />
              </spatialModel>
            </source>''')
          xml_parts.append('''    <source name="gll_iem_v07" type="DiffuseSource">
              <spectrum type="PowerLaw">
                <parameter free="1" max="10.0" min="0.0" name="Prefactor" scale="1.0" value="1.0" />
                <parameter free="0" max="1" min="-1" name="Index" scale="1.0" value="1.0" />
                <parameter free="0" max="1e6" min="20" name="Scale" scale="1.0" value="100" />
              </spectrum>
              <spatialModel file="GAL_DIFFUSE_PLACEHOLDER" type="MapCubeFunction">
                <parameter free="0" max="1000.0" min="0.001" name="Normalization" scale="1.0" value="1.0" />
              </spatialModel>
            </source>''')
          xml_parts.append('</source_library>')
          xml_text = '\n'.join(xml_parts) + '\n'
          xml_path = RESULTS / 'R15A_MODEL_GRB221009A_LIMITED_NEARBY_4FGL.xml'
          xml_path.write_text(xml_text, encoding='utf-8')

          import xml.etree.ElementTree as ET
          ET.fromstring(xml_text)

          summary = {
              'created_utc': utc_now(),
              'decision': 'R15A_4FGL_NEARBY_MODEL_BUILT_READY_FOR_R15B_LIMITED_BACKGROUND_TS_NOT_PROOF' if selected else 'R15A_NO_4FGL_SOURCES_SELECTED_CHECK_CATALOG_OR_RADIUS_NOT_PROOF',
              'target_ra_deg': TARGET_RA,
              'target_dec_deg': TARGET_DEC,
              'source_radius_deg': SOURCE_RADIUS_DEG,
              'free_radius_deg': FREE_RADIUS_DEG,
              'max_sources': MAX_SOURCES,
              'n_sources_within_radius': len(rows),
              'n_sources_selected': len(selected),
              'truncated_by_max_sources': truncated,
              'model_xml': str(xml_path),
              'selected_csv': str(csv_path),
              'all_within_radius_csv': str(all_csv_path),
              'catalog_file': str(CATALOG_PATH),
              'catalog_columns_used': {'name': c_name, 'ra': c_ra, 'dec': c_dec, 'significance': c_signif, 'pivot': c_pivot, 'spectrum_type': c_spec, 'flux_density': c_pl_fd, 'index': c_pl_idx, 'assoc': c_assoc},
              'claim_ceiling': ['NO_TS_COMPUTED_IN_R15A','MODEL_BUILDER_ONLY','LIMITED_RADIUS_4FGL_STRESS_TEST','CATALOG_SPECTRA_SIMPLIFIED_TO_POWERLAW_FOR_ROBUSTNESS','NOT_PUBLISHABLE_TS','NOT_SOURCE_ATTRIBUTION_PROOF','NO_ACIRM_EXTERNAL_PROOF','NOT_PROOF']
          }
          (RESULTS / 'R15A_AUDIT_SUMMARY.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          print(json.dumps(summary, indent=2))
          PY

          cat > acirm_r15a/package_r15a.py <<'PY'
          from pathlib import Path
          import csv
          import datetime as dt
          import hashlib
          import json
          import zipfile

          ROOT = Path('.')
          FINAL = ROOT / 'final_artifact'
          FINAL.mkdir(exist_ok=True)

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, 'rb') as f:
                  for b in iter(lambda: f.read(1024 * 1024), b''):
                      h.update(b)
              return h.hexdigest()

          summary_path = ROOT / 'results' / 'R15A_AUDIT_SUMMARY.json'
          if not summary_path.exists():
              (ROOT / 'results').mkdir(exist_ok=True)
              summary_path.write_text(json.dumps({'created_utc': dt.datetime.utcnow().replace(microsecond=0).isoformat()+'Z','decision': 'R15A_FAILED_BEFORE_SUMMARY_LOGS_READY_NOT_PROOF','claim_ceiling': ['NO_TS_COMPUTED', 'LOGS_ONLY', 'NOT_PROOF']}, indent=2), encoding='utf-8')

          zip_path = FINAL / 'ACIRM_R17M_R15A_4FGL_NEARBY_MODEL_BUILDER_NO_TS_AUDIT_PACKAGE.zip'
          manifest = []
          with zipfile.ZipFile(zip_path, 'w', compression=zipfile.ZIP_DEFLATED) as z:
              for folder in ['acirm_r15a', 'results', 'logs']:
                  p = ROOT / folder
                  if not p.exists():
                      continue
                  for f in sorted(p.rglob('*')):
                      if not f.is_file():
                          continue
                      if f.suffix.lower() in ['.fit', '.fits', '.gz'] and f.stat().st_size > 2_000_000:
                          manifest.append({'file': str(f), 'size_bytes': f.stat().st_size, 'included': False, 'reason': 'large_catalog_or_fits_excluded_from_slim_artifact'})
                          continue
                      z.write(f, arcname=str(f))
                      manifest.append({'file': str(f), 'size_bytes': f.stat().st_size, 'included': True, 'sha256': sha256_file(f)})
          sha = sha256_file(zip_path)
          (FINAL / (zip_path.name + '.sha256.txt')).write_text(sha + '  ' + zip_path.name + '\n', encoding='utf-8')
          with open(FINAL / 'R15A_ARTIFACT_MANIFEST.csv', 'w', newline='', encoding='utf-8') as fp:
              fields = ['file','size_bytes','included','sha256','reason']
              w = csv.DictWriter(fp, fieldnames=fields, extrasaction='ignore')
              w.writeheader(); w.writerows(manifest)
          status = {'created_utc': dt.datetime.utcnow().replace(microsecond=0).isoformat()+'Z','zip': str(zip_path),'sha256': sha,'decision_source': 'results/R15A_AUDIT_SUMMARY.json','claim': 'R15A_4FGL_MODEL_BUILDER_ARTIFACT_READY_NO_TS_NOT_PROOF'}
          (FINAL / 'R15A_ARTIFACT_STATUS.json').write_text(json.dumps(status, indent=2), encoding='utf-8')
          print('ZIP', zip_path)
          print('SHA256', sha)
          PY

          python3 -m py_compile acirm_r15a/build_r15a_4fgl_model.py acirm_r15a/package_r15a.py

      - name: Install Python dependencies
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install astropy numpy

      - name: Download 4FGL catalog
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data logs
          CATALOG="data/gll_psc_4fgl.fit"
          : > logs/4FGL_DOWNLOAD_ATTEMPTS.log
          urls=(
            "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/catalogs/4FGL/gll_psc_v35.fit"
            "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/catalogs/4FGL/gll_psc_v34.fit"
            "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/catalogs/4FGL/gll_psc_v33.fit"
            "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/catalogs/4FGL/gll_psc_v32.fit"
            "https://heasarc.gsfc.nasa.gov/FTP/fermi/data/lat/catalogs/4FGL/gll_psc_v31.fit"
          )
          ok=0
          for url in "${urls[@]}"; do
            echo "TRY $url" | tee -a logs/4FGL_DOWNLOAD_ATTEMPTS.log
            if timeout 20m curl -fL --retry 4 --retry-delay 8 --connect-timeout 30 "$url" -o "$CATALOG"; then
              echo "OK $url" | tee -a logs/4FGL_DOWNLOAD_ATTEMPTS.log
              ok=1
              break
            fi
          done
          if [ "$ok" -ne 1 ] || [ ! -s "$CATALOG" ]; then
            echo "FAILED_TO_DOWNLOAD_4FGL_CATALOG" | tee -a logs/4FGL_DOWNLOAD_ATTEMPTS.log
            exit 10
          fi
          sha256sum "$CATALOG" | tee logs/4FGL_CATALOG_SHA256.txt
          ls -lah "$CATALOG" | tee logs/4FGL_CATALOG_FILEINFO.txt

      - name: Build R15A model and audit tables
        shell: bash
        run: |
          set -euo pipefail
          export R15A_SOURCE_RADIUS_DEG="6.0"
          export R15A_FREE_RADIUS_DEG="3.0"
          export R15A_MAX_SOURCES="80"
          export R15A_4FGL_CATALOG="data/gll_psc_4fgl.fit"
          python3 acirm_r15a/build_r15a_4fgl_model.py 2>&1 | tee logs/R15A_MODEL_BUILDER_STDOUT.log

      - name: Package R15A artifact always
        if: always()
        shell: bash
        run: |
          set +e
          python3 acirm_r15a/package_r15a.py
          ls -lah final_artifact || true

      - name: Upload R15A artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17M_R15A_4FGL_NEARBY_MODEL_BUILDER_NO_TS_AUDIT_PACKAGE
          path: final_artifact/
          if-no-files-found: warn
