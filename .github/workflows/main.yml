name: ACIRM R17K R9A Compact Exploratory Trace Ledger SPI511

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  r17k-r9a-compact-exploratory-trace-ledger:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Build R9A exploratory trace ledger
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R9A_OUTPUTS logs
          python3 - <<'PY'
          import csv, json, hashlib, platform
          from pathlib import Path
          OUT=Path('ACIRM_R17K_R9A_OUTPUTS')
          locked={
            'band':'508-514 keV','z':2.945294,'ratio':1.139377,'placebo_rank':'1/56',
            'placebo_empirical_p':0.01754,'rolling_empirical_p':0.00465,
            'poisson_tail':0.00202,'bootstrap_prob_z_ge_3':0.4015,
            'classification':'LOCKED_508_514_NEAR_MODERATE_SUBTHRESHOLD_CORE'
          }
          broad={
            'band':'507-515 keV','z':3.333244,'ratio':1.136603,'placebo_rank':'1/55',
            'placebo_empirical_p':0.01786,'rolling_empirical_p':0.00465,
            'poisson_tail':0.000560,'bootstrap_prob_z_ge_3':0.914,
            'classification':'EMPIRICALLY_SUPPORTED_GOVERNED_MODERATE_DIAGNOSTIC_511_RESPONSE'
          }
          target={
            'candidate_id':'REV2446_GOVERNED_SPI511_RESPONSE',
            'target_start_scw':'244600170010','target_end_scw':'244600210010',
            'target_scw_list':'244600170010;244600180010;244600190010;244600200010;244600210010',
            'product_first_status':'PASS_EXPLORATORY_PRODUCT_RESPONSE',
            'official_core_status':'SUBTHRESHOLD_NO_OFFICIAL_BACKTRACE',
            'exploratory_trace_status':'OPEN_WITH_LOW_CLAIM_CEILING'
          }
          ledger=[
            {'stage':'P0_PRODUCT_FIRST_INPUT','status':'PASS_EXPLORATORY','evidence':'R8Y/R8Z broad 507-515 is empirically supported moderate diagnostic; locked 508-514 is near-moderate but subthreshold','claim_ceiling':'DIAGNOSTIC_NOT_PROOF'},
            {'stage':'P1_OFFICIAL_CORE_GATE','status':'FAIL_FOR_OFFICIAL_BACKTRACE','evidence':'locked 508-514 z=2.945294 < 3.000000; bootstrap prob(z>=3)=0.4015','claim_ceiling':'NO_OFFICIAL_511_PROOF'},
            {'stage':'P2_GOVERNED_RESPONSE_GATE','status':'PASS_FOR_EXPLORATORY_TRACE_ONLY','evidence':'broad 507-515 z=3.333244, rolling empirical p=0.00465, SCW bootstrap prob(z>=3)=0.914','claim_ceiling':'GOVERNED_DIAGNOSTIC_RESPONSE_ONLY'},
            {'stage':'P3_TEMPORAL_PRODUCT_ANCHOR','status':'ANCHOR_DEFINED','evidence':'SCW window 244600170010-244600210010 around rev2446','claim_ceiling':'NO_CAUSAL_PROOF'},
            {'stage':'P4_REVERSE_TRACE_REQUIREMENT','status':'NEXT_REQUIRED','evidence':'Need external/available photon-alignment or precursor artifact to test gate/source/frequency chain','claim_ceiling':'NO_SOURCE_ATTRIBUTION'},
            {'stage':'P5_ACIRM_INTERPRETATION','status':'EXPLORATORY_ONLY','evidence':'Can search for temporal/energy precursor and photon alignment, but cannot claim particle production or ACIRM proof from SPI response alone','claim_ceiling':'NOT_ACIRM_PROOF'}
          ]
          next_steps=[
            {'next_id':'R9B','name':'EXISTING_ARTIFACT_BACKTRACE_LOCATOR','purpose':'Search repo/workspace for LAT/photon-alignment/minus14/R9C artifacts that can be used without rerun.'},
            {'next_id':'R9C','name':'PHOTON_ALIGNMENT_GATE_TEST_IF_ARTIFACTS_FOUND','purpose':'Only if R9B finds usable artifacts, test product->precursor->alignment chain.'},
            {'next_id':'R9D','name':'SOURCE_GATE_INFERENCE_LOW_CEILING','purpose':'Infer possible gate/source/frequency only after a non-random alignment witness exists.'}
          ]
          decision={
            'run_id':'R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_SPI511',
            'decision':'R17K_R9A_EXPLORATORY_BACKTRACE_OPENED_FROM_GOVERNED_BROAD_511_RESPONSE_OFFICIAL_BACKTRACE_BLOCKED_NOT_PROOF',
            'proof_allowed':False,
            'official_backtrace_permission':False,
            'exploratory_backtrace_allowed':True,
            'source_attribution_allowed':False,
            'particle_proof_allowed':False,
            'target':target,
            'locked_508_514':locked,
            'broad_507_515':broad,
            'reverse_trace_ledger':ledger,
            'next_required_steps':next_steps,
            'claim_ceiling':['EXPLORATORY_BACKTRACE_ONLY','DIAGNOSTIC_511_RESPONSE_CANDIDATE','NOT_OFFICIAL_511_PROOF','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_ACIRM_PROOF'],
            'runtime_platform':platform.platform()
          }
          def wcsv(path, rows):
            keys=[]
            for r in rows:
              for k in r:
                if k not in keys: keys.append(k)
            with open(path,'w',newline='',encoding='utf-8') as f:
              w=csv.DictWriter(f,fieldnames=keys); w.writeheader(); w.writerows(rows)
          (OUT/'R17K_R9A_DECISION.json').write_text(json.dumps(decision,indent=2),encoding='utf-8')
          wcsv(OUT/'R17K_R9A_REVERSE_TRACE_LEDGER.csv',ledger)
          wcsv(OUT/'R17K_R9A_PRODUCT_METRICS.csv',[{'metric':'locked_508_514',**locked},{'metric':'broad_507_515',**broad}])
          wcsv(OUT/'R17K_R9A_NEXT_STEPS.csv',next_steps)
          (OUT/'R17K_R9A_THEORY_NOTE_AR.txt').write_text('R9A يفتح فقط مسار الرجوع العكسي الاستكشافي من مرشح 511 العريض المحكوم. لا يثبت 511 رسميًا، ولا يثبت إنتاج جسيمات، ولا يسمح بنسبة مصدر، ولا يثبت ACIRM. الخطوة التالية R9B تبحث عن artifacts موجودة للـ photon alignment / precursor قبل أي استنتاج مصدر أو تردد.\n',encoding='utf-8')
          (OUT/'R17K_R9A_STATUS.txt').write_text(decision['decision']+'\n',encoding='utf-8')
          sha=hashlib.sha256((OUT/'R17K_R9A_DECISION.json').read_bytes()).hexdigest()
          (OUT/'R17K_R9A_DECISION_JSON_SHA256.txt').write_text(sha+'  R17K_R9A_DECISION.json\n',encoding='utf-8')
          PY
          echo "PYTHON_EXIT=$?" | tee ACIRM_R17K_R9A_OUTPUTS/R17K_R9A_PYTHON_EXIT.txt

      - name: Package artifact always
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R9A_OUTPUTS logs
          df -h > ACIRM_R17K_R9A_OUTPUTS/R17K_R9A_DF_END.txt
          free -h > ACIRM_R17K_R9A_OUTPUTS/R17K_R9A_FREE_END.txt
          zip -r ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT.zip ACIRM_R17K_R9A_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT.zip > ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT.zip ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT.zip.sha256.txt

      - name: Upload artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT
          path: |
            ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT.zip
            ACIRM_R17K_R9A_COMPACT_EXPLORATORY_TRACE_LEDGER_OUTPUT.zip.sha256.txt
          retention-days: 7
