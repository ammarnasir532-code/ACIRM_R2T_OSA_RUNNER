name: ACIRM R22F R10B R4 SPI511 OSA noTTY wrapper repaired

on:
  workflow_dispatch:

jobs:
  r22f-r10b-r4-spi511-osa-notty-wrapper-repaired:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare locked folders state and OSA data tree
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION"
          CACHE="ACIRM_CACHE_R10B_R4"
          OSA_TAG="11.2-2-g667521a3-20220403-190332"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "CACHE=${CACHE}" >> "$GITHUB_ENV"
          echo "OSA_TAG=${OSA_TAG}" >> "$GITHUB_ENV"
          mkdir -p "$RUN_ID" "$RUN_ID/logs" "$RUN_ID/scripts" "$RUN_ID/slim_results"
          mkdir -p "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"
          echo "not_started" > "$RUN_ID/RUN_STAGE.txt"
          cat > "$RUN_ID/LOCK.json" <<'JSON'
          {
            "run_id": "R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION",
            "parent_result": "R22F_R10B_R3_OSA_WRAPPER_COMMAND_PREFLIGHT_FAILED_AFTER_PRELAYOUT_REPAIR_NO_DOWNLOAD_NO_THEORY_FAILURE",
            "critical_repairs": [
              "Patch official osa-container.sh to remove docker -it because GitHub Actions is non-interactive.",
              "Pin OSA_VERSION to avoid remote discover curl timeout.",
              "Keep REP_BASE_PROD scw/aux/ic/idx/cat prelayout repair before wrapper call."
            ],
            "instrument": "INTEGRAL_SPI",
            "revision": "2504",
            "line_band_keV": [508.0, 514.0],
            "low_sideband_keV": [490.0, 500.0],
            "high_sideband_keV": [522.0, 532.0],
            "min_line_to_sideband_ratio": 1.2,
            "locked_scw": [
              "250400090010",
              "250400020010",
              "250400080010",
              "250400030010",
              "250400070021",
              "250400040010",
              "250400060010",
              "250400050010"
            ],
            "claim_ceiling": "TECH_REPAIRED_OSA_EXECUTION_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
            "no_rescue_rules": [
              "No energy-band change after results.",
              "No SCW drop after results.",
              "No threshold reduction after results.",
              "No raw 511 occupancy promoted to material-production proof.",
              "No data download unless patched wrapper command preflight passes.",
              "Any technical failure is TECHNICAL_NO_GO_NO_THEORY_FAILURE."
            ]
          }
          JSON
          cat > "$RUN_ID/README_AR.md" <<'MD'
          # R22F_R10B_R4
          إصلاح مباشر لسبب فشل R3:
          wrapper الرسمي `osa-container.sh` يستخدم `docker run --rm -it`، وGitHub Actions لا يوفر TTY.
          R4 يزيل `-it` من wrapper بعد تنزيله، ويثبت `OSA_VERSION` حتى لا يحاول wrapper اكتشاف النسخة عبر ISDC.
          لا يتم تنزيل بيانات SCW إلا إذا نجح preflight الحقيقي لأوامر OSA.
          MD

      - name: Install host preflight tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y xvfb zip unzip curl ca-certificates python3
          {
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner=$(uname -a)"
            echo "disk_start"; df -h
            echo "memory_start"; free -h || true
            echo "docker_version"; docker --version || true
          } | tee "$RUN_ID/logs/system_preflight.log"

      - name: Restore guarded cache
        uses: actions/cache@v4
        with:
          path: ACIRM_CACHE_R10B_R4
          key: acirm-r22f-r10b-r4-rev2504-cache-v1
          restore-keys: |
            acirm-r22f-r10b-r4-rev2504-cache-

      - name: Reassert required OSA data tree after cache restore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          find "$CACHE" -maxdepth 2 -type d | sort | tee "$RUN_ID/logs/prelayout_tree.log"

      - name: Fetch and patch official OSA Docker wrapper
        shell: bash
        continue-on-error: true
        run: |
          set +e
          echo "wrapper_fetch_patch" > "$RUN_ID/RUN_STAGE.txt"
          curl -L --retry 3 --retry-delay 5 \
            https://raw.githubusercontent.com/ISDC-integral/osa-docker/master/osa-container.sh \
            -o osa-container.sh 2>&1 | tee "$RUN_ID/logs/osa_wrapper_fetch.log"
          rc=${PIPESTATUS[0]}
          chmod +x osa-container.sh 2>/dev/null || true

          if [ -s osa-container.sh ]; then
            cp osa-container.sh "$RUN_ID/logs/osa_wrapper_original.sh"
            python3 - <<'PY'
          from pathlib import Path
          p = Path("osa-container.sh")
          s = p.read_text()
          s2 = s.replace("--rm -it  --user", "--rm --user")
          s2 = s2.replace("--rm -it --user", "--rm --user")
          s2 = s2.replace("--rm -i -t  --user", "--rm --user")
          s2 = s2.replace("--rm -i -t --user", "--rm --user")
          p.write_text(s2)
          print("patched_changed=", s != s2)
          print("contains_dash_it_after_patch=", "--rm -it" in s2 or "-i -t" in s2)
          PY
            patch_rc=${PIPESTATUS[0]}
            cp osa-container.sh "$RUN_ID/logs/osa_wrapper_patched.sh"
            grep -n "docker run" -A8 -B2 osa-container.sh > "$RUN_ID/logs/osa_wrapper_docker_run_patched_excerpt.txt" || true
          else
            patch_rc=91
          fi
          echo "$rc" > "$RUN_ID/logs/osa_wrapper_fetch_exit_code.txt"
          echo "$patch_rc" > "$RUN_ID/logs/osa_wrapper_patch_exit_code.txt"

      - name: Write OSA bootstrap and helper scripts
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUN_ID/scripts/osa_command_bootstrap.sh" <<'SH'
          #!/usr/bin/env bash
          set +e
          echo "BOOTSTRAP_START"
          echo "initial_PATH=$PATH"
          echo "PWD=$(pwd)"
          echo "USER=$(id -u):$(id -g)"

          for s in \
            /etc/profile \
            /home/integral/.bashrc \
            /home/integral/.profile \
            /isdc/integral/*.sh \
            /isdc/integral/*/*.sh \
            /opt/osa*/*.sh \
            /opt/osa*/bin/*.sh \
            /usr/local/osa*/*.sh \
            /usr/local/osa*/bin/*.sh
          do
            [ -f "$s" ] && . "$s" >/dev/null 2>&1 && echo "sourced=$s"
          done

          og_path="$(find / -type f -name og_create 2>/dev/null | head -1)"
          spi_path="$(find / -type f -name spi_science_analysis 2>/dev/null | head -1)"
          [ -n "$og_path" ] && export PATH="$(dirname "$og_path"):$PATH" && echo "found_og_create=$og_path"
          [ -n "$spi_path" ] && export PATH="$(dirname "$spi_path"):$PATH" && echo "found_spi_science_analysis=$spi_path"

          echo "final_PATH=$PATH"
          command -v og_create || true
          command -v spi_science_analysis || true
          command -v dal_list || true
          command -v spi_obs_hist || true
          if command -v og_create >/dev/null 2>&1 && command -v spi_science_analysis >/dev/null 2>&1; then
            echo "BOOTSTRAP_COMMANDS_PASS"
            exit 0
          else
            echo "BOOTSTRAP_COMMANDS_FAIL"
            exit 17
          fi
          SH
          chmod +x "$RUN_ID/scripts/osa_command_bootstrap.sh"

          cat > "$RUN_ID/scripts/r10b_r4_download_data_tree.py" <<'PY'
          import os, re, json, csv, urllib.request, html.parser
          from pathlib import Path

          RUN_ID = "R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION"
          ROOT = Path.cwd()
          OUT = ROOT / RUN_ID
          CACHE = ROOT / "ACIRM_CACHE_R10B_R4"
          SCW = ["250400090010","250400020010","250400080010","250400030010","250400070021","250400040010","250400060010","250400050010"]
          REV = "2504"
          for d in ["scw","aux","ic","idx","cat"]:
              (CACHE/d).mkdir(parents=True, exist_ok=True)

          MAX_SCW_PER_FILE_MB = 450.0
          MAX_REF_PER_FILE_MB = 120.0
          MAX_TOTAL_MB = 3300.0

          class LinkParser(html.parser.HTMLParser):
              def __init__(self):
                  super().__init__(); self.links=[]
              def handle_starttag(self, tag, attrs):
                  if tag.lower()=="a":
                      for k,v in attrs:
                          if k.lower()=="href" and v:
                              self.links.append(v)

          def list_url(url, timeout=25):
              try:
                  with urllib.request.urlopen(url, timeout=timeout) as r:
                      txt = r.read().decode("utf-8", errors="replace")
                  p=LinkParser(); p.feed(txt)
                  return p.links, "OK"
              except Exception as e:
                  return [], "LIST_FAILED_" + repr(e)[:180]

          def head_size(url, timeout=15):
              try:
                  req=urllib.request.Request(url, method="HEAD")
                  with urllib.request.urlopen(req, timeout=timeout) as r:
                      n=r.headers.get("Content-Length")
                  return int(n) if n else None
              except Exception:
                  return None

          def download(url, outpath):
              outpath=Path(outpath); outpath.parent.mkdir(parents=True, exist_ok=True)
              if outpath.exists() and outpath.stat().st_size>0:
                  return "CACHE", outpath.stat().st_size
              try:
                  urllib.request.urlretrieve(url, outpath)
                  return "DOWNLOADED", outpath.stat().st_size
              except Exception as e:
                  return "DOWNLOAD_FAILED_" + repr(e)[:160], 0

          rows=[]; total=0
          scw_bases = [
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{REV}/",
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{REV[0:2]}/{REV}/",
              f"https://isdc.unige.ch/integral/archive/data/scw/{REV}/",
              f"https://www.isdc.unige.ch/integral/archive/data/scw/{REV}/",
          ]
          for scw in SCW:
              found_dir=None; found_links=[]
              for base in scw_bases:
                  for suffix in [f"{scw}.001/", f"{scw}.000/", f"{scw}/"]:
                      u=base+suffix
                      links,stat=list_url(u)
                      rows.append({"kind":"LIST_SCW","group":"scw","target":scw,"url":u,"status":stat,"links":len(links),"bytes":0})
                      if links:
                          found_dir=u; found_links=links; break
                  if found_dir: break
              target_dir=CACHE/"scw"/REV/(scw+".001")
              target_dir.mkdir(parents=True, exist_ok=True)
              if not found_dir:
                  rows.append({"kind":"SCW_STATUS","group":"scw","target":scw,"url":"","status":"NO_PUBLIC_LISTING_DISCOVERED","links":0,"bytes":0})
                  continue
              for a in found_links:
                  fn=a.split("/")[-1]
                  if not fn or fn.startswith("?") or fn.endswith("/"): continue
                  if not re.search(r"(\.fits(\.gz)?$|\.fit(\.gz)?$|\.txt$|\.idx$|\.cat$|\.par$)", fn, re.I): continue
                  url=found_dir+fn
                  sz=head_size(url)
                  if sz is not None and sz/1e6 > MAX_SCW_PER_FILE_MB:
                      rows.append({"kind":"DOWNLOAD_SCW","group":"scw","target":scw,"url":url,"status":"SKIPPED_PER_FILE_SIZE_CAP","links":0,"bytes":sz}); continue
                  if total/1e6 > MAX_TOTAL_MB:
                      rows.append({"kind":"DOWNLOAD_SCW","group":"scw","target":scw,"url":url,"status":"SKIPPED_TOTAL_SIZE_CAP","links":0,"bytes":0}); continue
                  st,b=download(url, target_dir/fn); total+=b
                  rows.append({"kind":"DOWNLOAD_SCW","group":"scw","target":scw,"url":url,"status":st,"links":0,"bytes":b})
              bsum=sum(p.stat().st_size for p in target_dir.glob("*") if p.is_file())
              rows.append({"kind":"SCW_STATUS","group":"scw","target":scw,"url":found_dir,"status":"DISCOVERED_DOWNLOADED_SUBSET","links":len(found_links),"bytes":bsum})

          ref_bases = [
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/",
              "https://isdc.unige.ch/integral/archive/data/",
              "https://www.isdc.unige.ch/integral/archive/data/",
          ]
          ref_groups=["ic","idx","aux","cat"]
          for group in ref_groups:
              downloaded_group=0
              for base in ref_bases:
                  if downloaded_group>0: break
                  first=base+group+"/"
                  links,stat=list_url(first)
                  rows.append({"kind":"LIST_REF","group":group,"target":group,"url":first,"status":stat,"links":len(links),"bytes":0})
                  if not links: continue
                  candidate_urls=[]
                  for a in links:
                      if a in ("../","/") or a.startswith("?"): continue
                      if a.endswith("/"):
                          sub=first+a
                          sublinks,substat=list_url(sub)
                          rows.append({"kind":"LIST_REF_SUB","group":group,"target":a.strip('/'),"url":sub,"status":substat,"links":len(sublinks),"bytes":0})
                          for b in sublinks:
                              fn=b.split("/")[-1]
                              if re.search(r"(\.fits(\.gz)?$|\.fit(\.gz)?$|\.idx$|\.cat$|\.par$)", fn, re.I):
                                  candidate_urls.append((sub+b, Path(group)/a.strip("/")/fn))
                      else:
                          fn=a.split("/")[-1]
                          if re.search(r"(\.fits(\.gz)?$|\.fit(\.gz)?$|\.idx$|\.cat$|\.par$)", fn, re.I):
                              candidate_urls.append((first+a, Path(group)/fn))
                  for url, rel in candidate_urls[:120]:
                      sz=head_size(url)
                      if sz is not None and sz/1e6 > MAX_REF_PER_FILE_MB:
                          rows.append({"kind":"DOWNLOAD_REF","group":group,"target":str(rel),"url":url,"status":"SKIPPED_REF_FILE_SIZE_CAP","links":0,"bytes":sz}); continue
                      if total/1e6 > MAX_TOTAL_MB:
                          rows.append({"kind":"DOWNLOAD_REF","group":group,"target":str(rel),"url":url,"status":"SKIPPED_TOTAL_SIZE_CAP","links":0,"bytes":0}); continue
                      st,b=download(url, CACHE/rel); total+=b; downloaded_group+=b
                      rows.append({"kind":"DOWNLOAD_REF","group":group,"target":str(rel),"url":url,"status":st,"links":0,"bytes":b})
                      if downloaded_group/1e6 > 350:
                          rows.append({"kind":"REF_GROUP_CAP","group":group,"target":group,"url":"","status":"GROUP_CAP_REACHED","links":0,"bytes":downloaded_group})
                          break

          with (OUT/"scw.list").open("w", encoding="utf-8") as f:
              for scw in SCW:
                  f.write(f"scw/{REV}/{scw}.001\n")

          layout=[]
          for group in ["scw","aux","ic","idx","cat"]:
              gdir=CACHE/group
              files=[p for p in gdir.rglob("*") if p.is_file()]
              fits=[p for p in files if re.search(r"\.fit(s)?(\.gz)?$", p.name, re.I)]
              layout.append({"group":group,"files":len(files),"fits_like":len(fits),"bytes":sum(p.stat().st_size for p in files),"status":"HAS_FILES" if files else "EMPTY"})

          with (OUT/"download_log.csv").open("w", newline="", encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["kind","group","target","url","status","links","bytes"])
              w.writeheader(); w.writerows(rows)
          with (OUT/"data_tree_layout_verification.csv").open("w", newline="", encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["group","files","fits_like","bytes","status"])
              w.writeheader(); w.writerows(layout)

          status={"downloaded_total_mb":total/1e6,"layout":layout,"required_tree_nonempty":all(r["files"]>0 for r in layout[:4]),"note":"Capped public discovery/download for SCW plus reference tree. Not a science result."}
          (OUT/"download_status.json").write_text(json.dumps(status, indent=2), encoding="utf-8")
          print(json.dumps(status, indent=2))
          PY

          cat > "$RUN_ID/scripts/r10b_r4_extract_line_sideband.py" <<'PY'
          import json, csv, re
          from pathlib import Path
          import numpy as np

          RUN_ID="R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION"
          ROOT=Path.cwd(); OUT=ROOT/RUN_ID; CACHE=ROOT/"ACIRM_CACHE_R10B_R4"
          LINE=(508.0,514.0); LOW=(490.0,500.0); HIGH=(522.0,532.0); MIN_RATIO=1.2
          rows=[]
          try:
              from astropy.io import fits
          except Exception as e:
              (OUT/"line_sideband_status.json").write_text(json.dumps({"status":"ASTROPY_UNAVAILABLE","error":repr(e)},indent=2),encoding="utf-8")
              raise SystemExit(0)

          def integrate(e1,e2,y,band):
              e1=np.asarray(e1,dtype=float); e2=np.asarray(e2,dtype=float); y=np.asarray(y,dtype=float)
              m=np.isfinite(e1)&np.isfinite(e2)&np.isfinite(y)&(e2>=band[0])&(e1<=band[1])
              return float(np.nansum(y[m])) if m.any() else None

          files=list(OUT.rglob("*.fit*")) + list(CACHE.rglob("*.fit*"))
          for p in sorted(set(files)):
              try:
                  hdul=fits.open(p, memmap=False)
                  for hdu_i,h in enumerate(hdul):
                      data=getattr(h,"data",None)
                      if data is None or not hasattr(data,"names") or data.names is None:
                          continue
                      names=[n.upper() for n in data.names]
                      e1=e2=None
                      for a,b in [("E_MIN","E_MAX"),("ENERG_LO","ENERG_HI"),("CHANNEL_LO","CHANNEL_HI")]:
                          if a in names and b in names:
                              e1=np.asarray(data[data.names[names.index(a)]],dtype=float)
                              e2=np.asarray(data[data.names[names.index(b)]],dtype=float)
                              break
                      if e1 is None: continue
                      candidates=[]
                      for cname in ["COUNTS","RATE","FLUX","VALUE","SPEC","Y"]:
                          if cname in names: candidates.append(data.names[names.index(cname)])
                      if not candidates:
                          for n in data.names:
                              if n.upper() not in ("E_MIN","E_MAX","ENERG_LO","ENERG_HI","CHANNEL_LO","CHANNEL_HI"):
                                  try:
                                      arr=np.asarray(data[n],dtype=float)
                                      if arr.ndim==1 and len(arr)==len(e1): candidates.append(n)
                                  except Exception: pass
                      for cname in candidates[:8]:
                          try:
                              y=np.asarray(data[cname],dtype=float)
                              if y.ndim!=1 or len(y)!=len(e1): continue
                              line=integrate(e1,e2,y,LINE); low=integrate(e1,e2,y,LOW); high=integrate(e1,e2,y,HIGH)
                              sides=[v for v in [low,high] if v is not None]
                              side=sum(sides)/len(sides) if sides else None
                              ratio=(line/side) if (line is not None and side not in (None,0)) else None
                              provenance="RUN_OUTPUT" if str(p).startswith(str(OUT)) else "CACHE_FALLBACK"
                              rows.append({"file":str(p),"provenance":provenance,"hdu":hdu_i,"column":cname,"line_508_514":line,"low_490_500":low,"high_522_532":high,"sideband_mean":side,"line_to_sideband_ratio":ratio,"passes_min_ratio":bool(ratio is not None and ratio>=MIN_RATIO)})
                          except Exception: continue
              except Exception: continue

          with (OUT/"line_sideband_candidates.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","provenance","hdu","column","line_508_514","low_490_500","high_522_532","sideband_mean","line_to_sideband_ratio","passes_min_ratio"])
              w.writeheader(); w.writerows(rows)
          valid=[r for r in rows if r.get("line_to_sideband_ratio") not in (None,"")]
          best=max(valid, key=lambda r: float(r["line_to_sideband_ratio"])) if valid else None
          status={"candidate_rows":len(rows),"valid_ratio_rows":len(valid),"best_candidate":best,"claim_ceiling":"candidate extractor only; OSA provenance and controls required"}
          (OUT/"line_sideband_status.json").write_text(json.dumps(status,indent=2),encoding="utf-8")
          print(json.dumps(status,indent=2))
          PY

      - name: Patched OSA wrapper command preflight
        shell: bash
        continue-on-error: true
        run: |
          set +e
          echo "patched_osa_wrapper_command_preflight" > "$RUN_ID/RUN_STAGE.txt"
          if [ ! -s osa-container.sh ]; then
            echo "WRAPPER_MISSING" | tee "$RUN_ID/logs/osa_wrapper_command_preflight.log"
            echo 90 > "$RUN_ID/logs/osa_wrapper_command_preflight_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="$OSA_TAG"
          export OSA_DOCKER_IMAGE="integralsw/osa:${OSA_TAG}"
          export OSA_DOCKER_PULL="yes"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.sh docker bash -lc '
            set +e
            echo "INSIDE_OSA_WRAPPER_R4_PRECHECK"
            echo "PWD=$(pwd)"
            echo "PATH=$PATH"
            echo "REP_BASE_PROD=$REP_BASE_PROD"
            echo "CURRENT_IC=$CURRENT_IC"
            echo "OSA_VERSION=$OSA_VERSION"
            echo "OSA_DOCKER_IMAGE=$OSA_DOCKER_IMAGE"
            echo "--- mounted data dirs ---"
            ls -ld /data/scw /data/aux /data/ic /data/idx 2>/dev/null || true
            echo "--- bootstrap ---"
            bash /home/integral/'"$RUN_ID"'/scripts/osa_command_bootstrap.sh
          ' 2>&1 | tee "$RUN_ID/logs/osa_wrapper_command_preflight.log"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$RUN_ID/logs/osa_wrapper_command_preflight_exit_code.txt"
          if [ "$rc" = "0" ]; then echo "true" > "$RUN_ID/PREFLIGHT_PASS.flag"; else echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"; fi
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: Build early technical no-go package if preflight failed
        shell: bash
        if: ${{ always() }}
        run: |
          set -euo pipefail
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" = "true" ]; then
            echo "Patched wrapper command preflight passed."
            exit 0
          fi
          echo "early_technical_no_go" > "$RUN_ID/RUN_STAGE.txt"
          python3 - <<'PY'
          import json, csv, hashlib
          from pathlib import Path
          RUN_ID="R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION"
          OUT=Path(RUN_ID)
          def read_text(p):
              try: return Path(p).read_text().strip()
              except Exception: return None
          status={
            "run_id":RUN_ID,
            "decision":"R22F_R10B_R4_PATCHED_WRAPPER_COMMAND_PREFLIGHT_FAILED_NO_DOWNLOAD_NO_THEORY_FAILURE",
            "wrapper_fetch_exit":read_text(OUT/"logs/osa_wrapper_fetch_exit_code.txt"),
            "wrapper_patch_exit":read_text(OUT/"logs/osa_wrapper_patch_exit_code.txt"),
            "wrapper_command_preflight_exit":read_text(OUT/"logs/osa_wrapper_command_preflight_exit_code.txt"),
            "downloads_performed":False,
            "osa_execution_performed":False,
            "line_sideband_measurement_performed":False,
            "claim_ceiling":"TECHNICAL_NO_GO_NO_THEORY_FAILURE_NOT_PROOF",
            "required_next_repair":"Audit patched wrapper preflight log; if wrapper enters container but commands unavailable, pin/init exact OSA command path."
          }
          (OUT/"STATUS.json").write_text(json.dumps(status,indent=2,sort_keys=True),encoding="utf-8")
          with (OUT/"R22F_R10B_R4_GO_NO_GO_DECISION.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=list(status.keys())); w.writeheader(); w.writerow(status)
          rows=[]
          for p in sorted(OUT.rglob("*")):
              if p.is_file():
                  rows.append({"file":str(p.relative_to(OUT)),"sha256":hashlib.sha256(p.read_bytes()).hexdigest(),"bytes":p.stat().st_size})
          with (OUT/"MANIFEST_SHA256.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","sha256","bytes"]); w.writeheader(); w.writerows(rows)
          print(json.dumps(status,indent=2,sort_keys=True))
          PY

      - name: Guarded SCW and reference-tree discovery after command preflight pass
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_DOWNLOAD_BECAUSE_PATCHED_OSA_COMMAND_PREFLIGHT_FAILED" | tee "$RUN_ID/logs/download_data_tree.log"
            echo 77 > "$RUN_ID/logs/download_data_tree_exit_code.txt"
            exit 0
          fi
          echo "download_data_tree" > "$RUN_ID/RUN_STAGE.txt"
          python3 "$RUN_ID/scripts/r10b_r4_download_data_tree.py" 2>&1 | tee "$RUN_ID/logs/download_data_tree.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/download_data_tree_exit_code.txt"
          du -sh "$CACHE" "$RUN_ID" 2>/dev/null | tee "$RUN_ID/logs/size_after_download.log"

      - name: OSA og_create through patched wrapper
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_OG_CREATE_BECAUSE_PATCHED_OSA_COMMAND_PREFLIGHT_FAILED" | tee "$RUN_ID/logs/og_create.log"
            echo 77 > "$RUN_ID/logs/og_create_exit_code.txt"
            exit 0
          fi
          echo "og_create" > "$RUN_ID/RUN_STAGE.txt"
          export OSA_VERSION="$OSA_TAG"
          export OSA_DOCKER_IMAGE="integralsw/osa:${OSA_TAG}"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.sh docker bash -lc '
            set +e
            cd /home/integral/'"$RUN_ID"' || exit 80
            bash scripts/osa_command_bootstrap.sh || exit 91
            echo "PWD=$(pwd)"
            echo "--- scw.list ---"; cat scw.list
            echo "--- data dirs ---"; ls -lah /data/scw /data/aux /data/ic /data/idx 2>/dev/null || true
            og_create scw.list SPI r10b_r4_og ./
          ' 2>&1 | tee "$RUN_ID/logs/og_create.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/og_create_exit_code.txt"
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: OSA SPI science analysis through patched wrapper
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_SPI_ANALYSIS_BECAUSE_PATCHED_OSA_COMMAND_PREFLIGHT_FAILED" | tee "$RUN_ID/logs/spi_science_analysis.log"
            echo 77 > "$RUN_ID/logs/spi_science_analysis_exit_code.txt"
            exit 0
          fi
          echo "spi_science_analysis" > "$RUN_ID/RUN_STAGE.txt"
          export OSA_VERSION="$OSA_TAG"
          export OSA_DOCKER_IMAGE="integralsw/osa:${OSA_TAG}"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          xvfb-run -a bash ./osa-container.sh docker bash -lc '
            set +e
            cd /home/integral/'"$RUN_ID"' || exit 80
            bash scripts/osa_command_bootstrap.sh || exit 92
            find . -maxdepth 5 -type f | sort | head -300
            spi_science_analysis
          ' 2>&1 | tee "$RUN_ID/logs/spi_science_analysis.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/spi_science_analysis_exit_code.txt"
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: Extract locked 511 line-sideband candidates from available FITS
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          echo "line_sideband_extract" > "$RUN_ID/RUN_STAGE.txt"
          python3 -m pip install -q astropy numpy pandas
          python3 "$RUN_ID/scripts/r10b_r4_extract_line_sideband.py" 2>&1 | tee "$RUN_ID/logs/line_sideband_extract.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/line_sideband_extract_exit_code.txt"

      - name: Build final guarded decision and slim phone package
        shell: bash
        if: ${{ always() }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, csv, hashlib
          from pathlib import Path
          RUN_ID="R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION"
          OUT=Path(RUN_ID)
          def read_exit(name):
              p=OUT/"logs"/name
              try: return int(p.read_text().strip().splitlines()[-1])
              except Exception: return None
          def flag():
              try: return (OUT/"PREFLIGHT_PASS.flag").read_text().strip()=="true"
              except Exception: return False
          wrapper_fetch=read_exit("osa_wrapper_fetch_exit_code.txt")
          wrapper_patch=read_exit("osa_wrapper_patch_exit_code.txt")
          wrapper_cmd=read_exit("osa_wrapper_command_preflight_exit_code.txt")
          download=read_exit("download_data_tree_exit_code.txt")
          og=read_exit("og_create_exit_code.txt")
          spi=read_exit("spi_science_analysis_exit_code.txt")
          extract=read_exit("line_sideband_extract_exit_code.txt")
          line_status={}
          if (OUT/"line_sideband_status.json").exists():
              try: line_status=json.loads((OUT/"line_sideband_status.json").read_text())
              except Exception: line_status={}
          dl_status={}
          if (OUT/"download_status.json").exists():
              try: dl_status=json.loads((OUT/"download_status.json").read_text())
              except Exception: dl_status={}
          valid=int(line_status.get("valid_ratio_rows",0) or 0)
          best=line_status.get("best_candidate")
          preflight_pass=flag()
          if not preflight_pass:
              decision="R22F_R10B_R4_PATCHED_WRAPPER_COMMAND_PREFLIGHT_FAILED_NO_DOWNLOAD_NO_THEORY_FAILURE"
          elif dl_status and not dl_status.get("required_tree_nonempty",False):
              decision="R22F_R10B_R4_DATA_TREE_INCOMPLETE_TECHNICAL_NO_GO_NO_THEORY_FAILURE"
          elif og not in (0,None):
              decision="R22F_R10B_R4_OG_CREATE_TECHNICAL_NO_GO_NO_THEORY_FAILURE"
          elif spi not in (0,None):
              decision="R22F_R10B_R4_SPI_SCIENCE_ANALYSIS_TECHNICAL_NO_GO_NO_THEORY_FAILURE"
          elif valid and best and best.get("passes_min_ratio") and best.get("provenance")=="RUN_OUTPUT":
              decision="R22F_R10B_R4_SPI511_RUN_OUTPUT_LINE_SIDEBAND_RATIO_PASS_REQUIRES_CONTROLS_NOT_PROOF"
          elif valid:
              decision="R22F_R10B_R4_LINE_SIDEBAND_RATIO_AVAILABLE_NOT_PRODUCT_PROOF_AUDIT_REQUIRED"
          else:
              decision="R22F_R10B_R4_NO_USABLE_LINE_SIDEBAND_SPECTRUM_EXTRACTED_TECHNICAL_NO_GO_NO_THEORY_FAILURE"
          status={
              "run_id":RUN_ID,
              "decision":decision,
              "preflight_pass":preflight_pass,
              "wrapper_fetch_exit":wrapper_fetch,
              "wrapper_patch_exit":wrapper_patch,
              "wrapper_command_preflight_exit":wrapper_cmd,
              "download_data_tree_exit":download,
              "og_create_exit":og,
              "spi_science_analysis_exit":spi,
              "line_sideband_extract_exit":extract,
              "downloaded_total_mb":dl_status.get("downloaded_total_mb"),
              "valid_ratio_rows":valid,
              "best_candidate":best,
              "claim_ceiling":"TECH_REPAIRED_OSA_EXECUTION_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
              "raw_heavy_files_packaged":False,
              "no_rescue_applied":True
          }
          (OUT/"STATUS.json").write_text(json.dumps(status,indent=2,sort_keys=True),encoding="utf-8")
          with (OUT/"R22F_R10B_R4_GO_NO_GO_DECISION.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=list(status.keys())); w.writeheader(); w.writerow(status)
          rows=[]
          for p in sorted(OUT.rglob("*")):
              if p.is_file():
                  rows.append({"file":str(p.relative_to(OUT)),"sha256":hashlib.sha256(p.read_bytes()).hexdigest(),"bytes":p.stat().st_size})
          with (OUT/"MANIFEST_SHA256.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","sha256","bytes"]); w.writeheader(); w.writerows(rows)
          print(json.dumps(status,indent=2,sort_keys=True))
          PY
          ZIP="${RUN_ID}_RESULTS.zip"
          SHA="${ZIP}.sha256.txt"
          zip -r "$ZIP" "$RUN_ID" -x "*/__pycache__/*" >/dev/null
          sha256sum "$ZIP" > "$SHA"
          echo "ZIP=$ZIP"
          cat "$SHA"

      - name: Upload slim results artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: R22F_R10B_R4_SPI511_NOTTY_WRAPPER_REPAIRED_RESULTS
          path: |
            R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION_RESULTS.zip
            R22F_R10B_R4_SPI511_OSA_NOTTY_WRAPPER_REPAIRED_EXECUTION_RESULTS.zip.sha256.txt
          if-no-files-found: error
          retention-days: 14
