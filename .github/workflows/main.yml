name: ACIRM R2U OSA remote repair preflight

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r2u-osa-repair-preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R2U_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R2U_RESULTS/data

      - name: System and network diagnostics
        run: |
          {
            echo "ACIRM R2U GitHub Actions OSA remote repair preflight"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=REMOTE_OSA_PREFLIGHT_REPAIR_ONLY_NOT_OSA_PROOF_NOT_DISCOVERY"
            uname -a || true
            df -h || true
            free -h || true
            echo "DNS HEASARC:"
            getent hosts heasarc.gsfc.nasa.gov || true
            echo "curl IPv4 HEASARC:"
            curl -4 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
            echo "curl IPv6 HEASARC:"
            curl -6 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R2U_RESULTS/logs/system_network_diagnostics.log

      - name: Docker pull and deep OSA command scan
        continue-on-error: true
        run: |
          {
            echo "Docker version:"
            docker --version || true
            docker info || true

            echo "Pull integralsw/osa:latest"
            docker pull integralsw/osa:latest || true

            echo "Deep scan inside integralsw/osa"
            docker run --rm integralsw/osa:latest bash -lc '
              echo "inside container"
              uname -a || true
              echo "PATH=$PATH"
              echo "environment preview"
              env | sort | head -200 || true

              echo "direct command check"
              for c in og_create spi_science_analysis spiros spimodfit dal_verify fkeyprint ftcopy; do
                echo "--- $c ---"
                command -v "$c" || true
                which "$c" || true
                "$c" --version || true
              done

              echo "find OSA executables"
              find / -type f \( -name og_create -o -name spi_science_analysis -o -name spiros -o -name spimodfit -o -name dal_verify \) 2>/dev/null | head -200 || true

              echo "find OSA init scripts"
              find / -maxdepth 6 -type f \( -iname "*osa*" -o -iname "*isdc*" -o -iname "*init*" -o -iname "*heasoft*" \) 2>/dev/null | head -300 || true

              echo "find OSA directories"
              find / -maxdepth 6 -type d \( -iname "*osa*" -o -iname "*isdc*" -o -iname "bin" \) 2>/dev/null | head -300 || true
            ' || true
          } | tee ACIRM_R21AX_R7G_R2U_RESULTS/logs/docker_osa_deep_scan.log

      - name: Download target SCW products using curl IPv4 retry
        run: |
          python3 - <<'PY'
          import csv, hashlib, json, os, subprocess, time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R2U_GITHUB_ACTIONS_IPV4_CURL_RETRY_AND_OSA_INIT_SCAN"
          out = Path("ACIRM_R21AX_R7G_R2U_RESULTS")
          data = out / "data"
          data.mkdir(parents=True, exist_ok=True)

          base = "https://heasarc.gsfc.nasa.gov/FTP/integral/data"
          rev = "2504"
          scws = [
              "250400090010",
              "250400020010",
              "250400080010",
              "250400030010",
              "250400070021",
              "250400040010",
              "250400060010",
              "250400050010",
          ]
          products = [
              "swg.fits",
              "spi_oper.fits.gz",
              "spi_spectra.fits.gz",
              "spi_gti.fits.gz",
          ]

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def run_curl(url, dest):
              dest.parent.mkdir(parents=True, exist_ok=True)
              tmp = str(dest) + ".part"

              cmd = [
                  "curl",
                  "-4",
                  "-L",
                  "--retry", "5",
                  "--retry-delay", "10",
                  "--connect-timeout", "60",
                  "--max-time", "900",
                  "-o", tmp,
                  url,
              ]

              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              if p.returncode != 0:
                  return False, p.returncode, p.stdout[-3000:]

              if not Path(tmp).exists() or Path(tmp).stat().st_size <= 0:
                  return False, p.returncode, "downloaded file missing or empty"

              if dest.exists():
                  dest.unlink()
              Path(tmp).rename(dest)
              return True, p.returncode, p.stdout[-3000:]

          rows = []
          for scw in scws:
              for product in products:
                  url = f"{base}/scw/{rev}/{scw}.001/{product}"
                  dest = data / "scw" / rev / f"{scw}.001" / product

                  row = {
                      "scw_id": scw,
                      "product": product,
                      "url": url,
                      "dest": str(dest),
                      "ok": False,
                      "returncode": "",
                      "bytes": 0,
                      "sha256": "",
                      "error": "",
                  }

                  try:
                      if dest.exists() and dest.stat().st_size > 0:
                          row["ok"] = True
                          row["bytes"] = dest.stat().st_size
                          row["sha256"] = sha256_file(dest)
                          row["error"] = "already_exists"
                      else:
                          ok, rc, log = run_curl(url, dest)
                          row["returncode"] = rc
                          if ok:
                              row["ok"] = True
                              row["bytes"] = dest.stat().st_size
                              row["sha256"] = sha256_file(dest)
                          else:
                              row["error"] = log
                  except Exception as e:
                      row["error"] = repr(e)

                  rows.append(row)
                  print(row)

          with open(out / "r2u_target_scw_download_manifest.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
              w.writeheader()
              w.writerows(rows)

          ok_count = sum(1 for r in rows if r["ok"])
          summary = {
              "run_id": RUN_ID,
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "REMOTE_OSA_PREFLIGHT_REPAIR_ONLY_NOT_OSA_PROOF_NOT_DISCOVERY",
              "download_ok_count": ok_count,
              "download_total_count": len(rows),
              "final_status": (
                  "R21AX_R7G_R2U_REMOTE_IPV4_FETCH_OK_READY_FOR_OSA_NEXT_STAGE_NO_511_YET"
                  if ok_count == len(rows)
                  else "R21AX_R7G_R2U_REMOTE_IPV4_FETCH_PARTIAL_OR_FAILED_NO_PHYSICAL_NULL"
              ),
          }

          with open(out / "R2U_REMOTE_REPAIR_PREFLIGHT_SUMMARY.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2, sort_keys=True)

          print(json.dumps(summary, indent=2))
          PY

      - name: Check downloaded FITS readability outside OSA
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import csv, subprocess, sys
          from pathlib import Path

          subprocess.run([sys.executable, "-m", "pip", "install", "-q", "astropy"], check=False)

          from astropy.io import fits

          out = Path("ACIRM_R21AX_R7G_R2U_RESULTS")
          rows = []

          for p in (out / "data").rglob("*.fits*"):
              row = {
                  "path": str(p),
                  "ok": False,
                  "hdu_count": "",
                  "hdu_names": "",
                  "error": "",
              }

              try:
                  with fits.open(p, memmap=True) as hdul:
                      row["ok"] = True
                      row["hdu_count"] = len(hdul)
                      row["hdu_names"] = "|".join([h.name for h in hdul[:30]])
              except Exception as e:
                  row["error"] = repr(e)

              rows.append(row)

          if rows:
              with open(out / "r2u_fits_readability_probe.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=list(rows[0].keys()))
                  w.writeheader()
                  w.writerows(rows)
          else:
              (out / "r2u_fits_readability_probe.csv").write_text(
                  "path,ok,hdu_count,hdu_names,error\n",
                  encoding="utf-8",
              )
          PY

      - name: Build final claim boundary
        run: |
          cat > ACIRM_R21AX_R7G_R2U_RESULTS/R2U_CLAIM_BOUNDARY.txt <<'EOF'
          ACIRM R2U claim boundary:
          - This is remote OSA runtime/data preflight repair only.
          - It computes no 511 keV physical metric.
          - It is not OSA proof.
          - It is not 511 keV discovery.
          - Network/runtime failure is not a physical null.
          EOF

          cat > ACIRM_R21AX_R7G_R2U_RESULTS/R2U_NEXT_STEP.txt <<'EOF'
          Next:
          Upload ACIRM_R21AX_R7G_R2U_RESULTS.zip to ChatGPT.
          Audit will decide whether R2V can attempt actual OSA execution or whether a different external Linux/OSA runner is required.
          EOF

      - name: Package results
        run: |
          zip -r ACIRM_R21AX_R7G_R2U_RESULTS.zip ACIRM_R21AX_R7G_R2U_RESULTS
          sha256sum ACIRM_R21AX_R7G_R2U_RESULTS.zip > ACIRM_R21AX_R7G_R2U_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R2U_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R2U artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R2U_RESULTS
          path: |
            ACIRM_R21AX_R7G_R2U_RESULTS.zip
            ACIRM_R21AX_R7G_R2U_RESULTS.zip.sha256.txt
