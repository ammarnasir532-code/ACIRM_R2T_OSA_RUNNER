name: ACIRM R22F R10B R5 SPI511 cache reuse SWG DOL repair

on:
  workflow_dispatch:
    inputs:
      allow_redownload:
        description: "Allow heavy redownload if R4 cache is missing? false recommended."
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  r22f-r10b-r5-spi511-cache-reuse-swg-dol-repair:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare R5 folders and locked state
        shell: bash
        run: |
          set -euo pipefail
          RUN_ID="R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION"
          CACHE="ACIRM_CACHE_R10B_R4"
          echo "RUN_ID=${RUN_ID}" >> "$GITHUB_ENV"
          echo "CACHE=${CACHE}" >> "$GITHUB_ENV"
          mkdir -p "$RUN_ID" "$RUN_ID/logs" "$RUN_ID/scripts" "$RUN_ID/slim_results"
          mkdir -p "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"
          echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"
          echo "false" > "$RUN_ID/OG_CREATE_PASS.flag"
          echo "not_started" > "$RUN_ID/RUN_STAGE.txt"
          cat > "$RUN_ID/LOCK.json" <<'JSON'
          {
            "run_id": "R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION",
            "parent_result": "R22F_R10B_R4_DATA_TREE_INCOMPLETE_TECHNICAL_NO_GO_NO_THEORY_FAILURE",
            "critical_repairs": [
              "Reuse R4 cache; do not redownload by default.",
              "Use /data/scw/2504/<SCW>.001/swg.fits DOL entries, not relative SCW directories.",
              "Call osa-container.sh with a single command string, not nested bash -lc.",
              "Do not run spi_science_analysis if og_create fails.",
              "Pass obs_group noninteractively to spi_science_analysis.",
              "Only RUN_OUTPUT line-sideband candidates can be considered."
            ],
            "instrument": "INTEGRAL_SPI",
            "revision": "2504",
            "line_band_keV": [508.0, 514.0],
            "low_sideband_keV": [490.0, 500.0],
            "high_sideband_keV": [522.0, 532.0],
            "min_line_to_sideband_ratio": 1.2,
            "locked_scw": [
              "250400090010",
              "250400020010",
              "250400080010",
              "250400030010",
              "250400070021",
              "250400040010",
              "250400060010",
              "250400050010"
            ],
            "claim_ceiling": "CACHE_REUSE_TECH_REPAIR_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW"
          }
          JSON

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y xvfb zip unzip curl ca-certificates rsync
          {
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "runner=$(uname -a)"
            echo "disk_start"; df -h
            echo "memory_start"; free -h || true
            echo "docker_version"; docker --version || true
          } | tee "$RUN_ID/logs/system_preflight.log"

      - name: Restore R4 guarded cache
        uses: actions/cache@v4
        with:
          path: ACIRM_CACHE_R10B_R4
          key: acirm-r22f-r10b-r4-rev2504-cache-v1
          restore-keys: |
            acirm-r22f-r10b-r4-rev2504-cache-
            acirm-r22f-r10b-r3-rev2504-cache-
            acirm-r22f-r10b-r2-rev2504-cache-

      - name: Verify and repair cache layout without heavy download
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$CACHE/scw" "$CACHE/aux" "$CACHE/ic" "$CACHE/idx" "$CACHE/cat"

          if [ -d "$CACHE/idx/ic" ]; then
            rsync -a "$CACHE/idx/ic/" "$CACHE/ic/" 2>/dev/null || true
          fi

          cat > "$RUN_ID/scw_dol.list" <<'EOF'
          /data/scw/2504/250400090010.001/swg.fits
          /data/scw/2504/250400020010.001/swg.fits
          /data/scw/2504/250400080010.001/swg.fits
          /data/scw/2504/250400030010.001/swg.fits
          /data/scw/2504/250400070021.001/swg.fits
          /data/scw/2504/250400040010.001/swg.fits
          /data/scw/2504/250400060010.001/swg.fits
          /data/scw/2504/250400050010.001/swg.fits
          EOF
          sed -i 's/^ *//' "$RUN_ID/scw_dol.list"

          missing=0
          while read -r dol; do
            host_path="${dol/\/data/$PWD/$CACHE}"
            if [ ! -s "$host_path" ]; then
              echo "MISSING_SWG: $host_path" | tee -a "$RUN_ID/logs/cache_verify.log"
              missing=$((missing+1))
            else
              echo "FOUND_SWG: $host_path" | tee -a "$RUN_ID/logs/cache_verify.log"
            fi
          done < "$RUN_ID/scw_dol.list"

          {
            echo "cache_tree"
            find "$CACHE" -maxdepth 3 -type d | sort | head -120
            echo "cache_file_count=$(find "$CACHE" -type f | wc -l)"
            echo "swg_missing_count=$missing"
            du -sh "$CACHE" || true
          } | tee "$RUN_ID/logs/cache_layout_summary.log"

          echo "$missing" > "$RUN_ID/logs/swg_missing_count.txt"
          if [ "$missing" -eq 0 ]; then
            echo "true" > "$RUN_ID/PREFLIGHT_PASS.flag"
          else
            echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"
          fi

      - name: Optional minimal redownload only if explicitly allowed
        shell: bash
        if: ${{ github.event.inputs.allow_redownload == 'true' }}
        continue-on-error: true
        run: |
          set +e
          echo "optional_minimal_redownload" > "$RUN_ID/RUN_STAGE.txt"
          python3 - <<'PY' 2>&1 | tee "$RUN_ID/logs/optional_minimal_redownload.log"
          import urllib.request
          from pathlib import Path
          cache=Path("ACIRM_CACHE_R10B_R4")
          scws=["250400090010","250400020010","250400080010","250400030010","250400070021","250400040010","250400060010","250400050010"]
          base="https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/"
          for scw in scws:
              d=cache/"scw"/"2504"/(scw+".001")
              d.mkdir(parents=True, exist_ok=True)
              out=d/"swg.fits"
              if out.exists() and out.stat().st_size>0:
                  print("CACHE", out, out.stat().st_size); continue
              url=f"{base}{scw}.001/swg.fits"
              try:
                  urllib.request.urlretrieve(url, out)
                  print("DOWNLOADED", out, out.stat().st_size)
              except Exception as e:
                  print("FAILED", url, repr(e))
          PY
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/optional_minimal_redownload_exit_code.txt"

      - name: Recheck SWG cache and decide preflight
        shell: bash
        run: |
          set -euo pipefail
          missing=0
          while read -r dol; do
            host_path="${dol/\/data/$PWD/$CACHE}"
            if [ ! -s "$host_path" ]; then
              missing=$((missing+1))
            fi
          done < "$RUN_ID/scw_dol.list"
          echo "$missing" > "$RUN_ID/logs/swg_missing_count_after_optional.txt"
          if [ "$missing" -eq 0 ]; then
            echo "true" > "$RUN_ID/PREFLIGHT_PASS.flag"
          else
            echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"
          fi

      - name: Fetch and patch official OSA Docker wrapper no-tty
        shell: bash
        continue-on-error: true
        run: |
          set +e
          curl -L --retry 3 --retry-delay 5 \
            https://raw.githubusercontent.com/ISDC-integral/osa-docker/master/osa-container.sh \
            -o osa-container.sh 2>&1 | tee "$RUN_ID/logs/osa_wrapper_fetch.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/osa_wrapper_fetch_exit_code.txt"
          chmod +x osa-container.sh 2>/dev/null || true
          cp osa-container.sh "$RUN_ID/logs/osa_wrapper_original.sh" 2>/dev/null || true
          python3 - <<'PY'
          from pathlib import Path
          p=Path("osa-container.sh")
          txt=p.read_text()
          txt=txt.replace("--rm -it --user", "--rm --user")
          txt=txt.replace("--rm -i --user", "--rm --user")
          txt=txt.replace("--rm -t --user", "--rm --user")
          p.write_text(txt)
          PY
          cp osa-container.sh "$RUN_ID/logs/osa_wrapper_patched.sh" 2>/dev/null || true
          grep -n -A4 -B2 "docker run" osa-container.sh | head -80 > "$RUN_ID/logs/osa_wrapper_docker_run_patched_excerpt.txt" || true
          echo 0 > "$RUN_ID/logs/osa_wrapper_patch_exit_code.txt"

      - name: Write R5 helper scripts
        shell: bash
        run: |
          set -euo pipefail
          cat > "$RUN_ID/scripts/osa_command_bootstrap.sh" <<'SH'
          #!/usr/bin/env bash
          set +e
          echo "BOOTSTRAP_START"
          echo "PATH=$PATH"
          for s in /etc/profile /init.d/*.sh /home/integral/.bashrc /home/integral/.profile /opt/osa*/*.sh /opt/osa*/bin/*.sh; do
            [ -f "$s" ] && . "$s" >/dev/null 2>&1 && echo "sourced=$s"
          done
          command -v og_create || true
          command -v spi_science_analysis || true
          command -v plist || true
          command -v punlearn || true
          command -v pset || true
          if command -v og_create >/dev/null 2>&1 && command -v spi_science_analysis >/dev/null 2>&1; then
            exit 0
          fi
          exit 17
          SH
          chmod +x "$RUN_ID/scripts/osa_command_bootstrap.sh"

          cat > "$RUN_ID/scripts/r10b_r5_extract_line_sideband.py" <<'PY'
          import json, csv
          from pathlib import Path
          import numpy as np
          RUN_ID="R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION"
          OUT=Path(RUN_ID)
          LINE=(508.0,514.0); LOW=(490.0,500.0); HIGH=(522.0,532.0); MIN_RATIO=1.2
          rows=[]
          try:
              from astropy.io import fits
          except Exception as e:
              (OUT/"line_sideband_status.json").write_text(json.dumps({"status":"ASTROPY_UNAVAILABLE","error":repr(e)},indent=2))
              raise SystemExit(0)
          def integrate(e1,e2,y,band):
              e1=np.asarray(e1,dtype=float); e2=np.asarray(e2,dtype=float); y=np.asarray(y,dtype=float)
              m=np.isfinite(e1)&np.isfinite(e2)&np.isfinite(y)&(e2>=band[0])&(e1<=band[1])
              return float(np.nansum(y[m])) if m.any() else None
          for p in sorted(OUT.rglob("*.fit*")):
              if "/obs/" not in str(p) and "spi" not in p.name.lower():
                  continue
              try:
                  hdul=fits.open(p, memmap=False)
                  for hdu_i,h in enumerate(hdul):
                      data=getattr(h,"data",None)
                      if data is None or not hasattr(data,"names") or data.names is None: continue
                      names=[n.upper() for n in data.names]
                      e1=e2=None
                      for a,b in [("E_MIN","E_MAX"),("ENERG_LO","ENERG_HI"),("CHANNEL_LO","CHANNEL_HI")]:
                          if a in names and b in names:
                              e1=np.asarray(data[data.names[names.index(a)]],dtype=float)
                              e2=np.asarray(data[data.names[names.index(b)]],dtype=float)
                              break
                      if e1 is None: continue
                      candidates=[data.names[names.index(c)] for c in ["COUNTS","RATE","FLUX","VALUE","SPEC","Y"] if c in names]
                      for cname in candidates:
                          y=np.asarray(data[cname],dtype=float)
                          if y.ndim!=1 or len(y)!=len(e1): continue
                          line=integrate(e1,e2,y,LINE); low=integrate(e1,e2,y,LOW); high=integrate(e1,e2,y,HIGH)
                          sides=[v for v in [low,high] if v is not None]
                          side=sum(sides)/len(sides) if sides else None
                          ratio=(line/side) if (line is not None and side not in (None,0)) else None
                          rows.append({"file":str(p),"provenance":"RUN_OUTPUT","hdu":hdu_i,"column":cname,"line_508_514":line,"low_490_500":low,"high_522_532":high,"sideband_mean":side,"line_to_sideband_ratio":ratio,"passes_min_ratio":bool(ratio is not None and ratio>=MIN_RATIO)})
              except Exception:
                  continue
          with (OUT/"line_sideband_candidates.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","provenance","hdu","column","line_508_514","low_490_500","high_522_532","sideband_mean","line_to_sideband_ratio","passes_min_ratio"])
              w.writeheader(); w.writerows(rows)
          valid=[r for r in rows if r.get("line_to_sideband_ratio") not in (None,"")]
          best=max(valid, key=lambda r: float(r["line_to_sideband_ratio"])) if valid else None
          status={"candidate_rows":len(rows),"valid_ratio_rows":len(valid),"best_candidate":best,"claim_ceiling":"RUN_OUTPUT only; still requires controls"}
          (OUT/"line_sideband_status.json").write_text(json.dumps(status,indent=2))
          print(json.dumps(status,indent=2))
          PY

      - name: OSA command preflight through no-tty wrapper
        shell: bash
        continue-on-error: true
        run: |
          set +e
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_OSA_PREFLIGHT_CACHE_SWG_MISSING" | tee "$RUN_ID/logs/osa_command_preflight.log"
            echo 77 > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="yes"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          CMD='echo INSIDE_R5_PREFLIGHT; cd /home/integral; bash R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION/scripts/osa_command_bootstrap.sh'
          xvfb-run -a bash ./osa-container.sh docker "$CMD" 2>&1 | tee "$RUN_ID/logs/osa_command_preflight.log"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$RUN_ID/logs/osa_command_preflight_exit_code.txt"
          if [ "$rc" != "0" ]; then echo "false" > "$RUN_ID/PREFLIGHT_PASS.flag"; fi
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: og_create using absolute SWG DOL list
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          if [ "$(cat "$RUN_ID/PREFLIGHT_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_OG_CREATE_PREFLIGHT_FAILED" | tee "$RUN_ID/logs/og_create.log"
            echo 77 > "$RUN_ID/logs/og_create_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          CMD='set +e; cd /home/integral/R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION || exit 80; bash scripts/osa_command_bootstrap.sh || exit 91; mkdir -p obs; echo "--- scw_dol.list ---"; cat scw_dol.list; og_create scw_dol.list SPI r10b_r5_og ./obs'
          xvfb-run -a bash ./osa-container.sh docker "$CMD" 2>&1 | tee "$RUN_ID/logs/og_create.log"
          rc=${PIPESTATUS[0]}
          echo "$rc" > "$RUN_ID/logs/og_create_exit_code.txt"
          sudo chown -R "$USER:$USER" . 2>/dev/null || true
          if [ "$rc" = "0" ] && [ -s "$RUN_ID/obs/r10b_r5_og/og_spi.fits" ]; then
            echo "true" > "$RUN_ID/OG_CREATE_PASS.flag"
          else
            echo "false" > "$RUN_ID/OG_CREATE_PASS.flag"
          fi

      - name: SPI science analysis noninteractive only after valid OG
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          if [ "$(cat "$RUN_ID/OG_CREATE_PASS.flag" 2>/dev/null || echo false)" != "true" ]; then
            echo "SKIP_SPI_ANALYSIS_OG_CREATE_NOT_VALID" | tee "$RUN_ID/logs/spi_science_analysis.log"
            echo 77 > "$RUN_ID/logs/spi_science_analysis_exit_code.txt"
            exit 0
          fi
          export OSA_VERSION="11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_IMAGE="integralsw/osa:11.2-2-g667521a3-20220403-190332"
          export OSA_DOCKER_PULL="no"
          export REP_BASE_PROD="$PWD/$CACHE"
          export CURRENT_IC="$PWD/$CACHE"
          export WORKDIR="$PWD"
          CMD='set +e; cd /home/integral/R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION || exit 80; bash scripts/osa_command_bootstrap.sh || exit 92; echo "--- plist spi_science_analysis ---"; plist spi_science_analysis 2>/dev/null || true; punlearn spi_science_analysis 2>/dev/null || true; spi_science_analysis obs_group=obs/r10b_r5_og/og_spi.fits'
          xvfb-run -a bash ./osa-container.sh docker "$CMD" 2>&1 | tee "$RUN_ID/logs/spi_science_analysis.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/spi_science_analysis_exit_code.txt"
          sudo chown -R "$USER:$USER" . 2>/dev/null || true

      - name: Extract locked 511 line-sideband candidates from RUN_OUTPUT only
        shell: bash
        if: ${{ always() }}
        continue-on-error: true
        run: |
          set +e
          python3 -m pip install -q astropy numpy pandas
          python3 "$RUN_ID/scripts/r10b_r5_extract_line_sideband.py" 2>&1 | tee "$RUN_ID/logs/line_sideband_extract.log"
          echo ${PIPESTATUS[0]} > "$RUN_ID/logs/line_sideband_extract_exit_code.txt"

      - name: Build final R5 decision and slim phone artifact
        shell: bash
        if: ${{ always() }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, csv, hashlib
          from pathlib import Path
          RUN_ID="R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION"
          OUT=Path(RUN_ID)
          def read_exit(name):
              try: return int((OUT/"logs"/name).read_text().strip().splitlines()[-1])
              except Exception: return None
          def flag(name):
              try: return (OUT/name).read_text().strip()=="true"
              except Exception: return False
          swg_missing=None
          try: swg_missing=int((OUT/"logs/swg_missing_count_after_optional.txt").read_text().strip())
          except Exception: pass
          preflight=flag("PREFLIGHT_PASS.flag")
          ogpass=flag("OG_CREATE_PASS.flag")
          osa_pre=read_exit("osa_command_preflight_exit_code.txt")
          og=read_exit("og_create_exit_code.txt")
          spi=read_exit("spi_science_analysis_exit_code.txt")
          ext=read_exit("line_sideband_extract_exit_code.txt")
          line={}
          if (OUT/"line_sideband_status.json").exists():
              try: line=json.loads((OUT/"line_sideband_status.json").read_text())
              except Exception: line={}
          valid=int(line.get("valid_ratio_rows",0) or 0)
          best=line.get("best_candidate")
          if swg_missing not in (None,0):
              decision="R22F_R10B_R5_CACHE_MISSING_SWG_NO_REDOWNLOAD_NO_THEORY_FAILURE"
          elif not preflight:
              decision="R22F_R10B_R5_OSA_COMMAND_PREFLIGHT_FAILED_NO_THEORY_FAILURE"
          elif not ogpass:
              decision="R22F_R10B_R5_OG_CREATE_DOL_REPAIR_FAILED_NO_SPI_ANALYSIS_NO_THEORY_FAILURE"
          elif spi not in (0,None):
              decision="R22F_R10B_R5_SPI_NONINTERACTIVE_PARAMETERIZATION_FAILED_NO_MEASUREMENT_NO_THEORY_FAILURE"
          elif valid and best and best.get("passes_min_ratio"):
              decision="R22F_R10B_R5_SPI511_RUN_OUTPUT_LINE_SIDEBAND_RATIO_PASS_REQUIRES_CONTROLS_NOT_PROOF"
          elif valid:
              decision="R22F_R10B_R5_SPI511_RUN_OUTPUT_LINE_SIDEBAND_RATIO_AVAILABLE_NOT_PASSED_NOT_PROOF"
          else:
              decision="R22F_R10B_R5_NO_RUN_OUTPUT_LINE_SIDEBAND_SPECTRUM_NO_MEASUREMENT_NO_THEORY_FAILURE"
          status={
              "run_id":RUN_ID,
              "decision":decision,
              "swg_missing_count":swg_missing,
              "preflight_pass":preflight,
              "og_create_pass":ogpass,
              "osa_command_preflight_exit":osa_pre,
              "og_create_exit":og,
              "spi_science_analysis_exit":spi,
              "line_sideband_extract_exit":ext,
              "valid_ratio_rows":valid,
              "best_candidate":best,
              "claim_ceiling":"CACHE_REUSE_TECH_REPAIR_ATTEMPT_NOT_PROOF_NOT_FINAL_LAW",
              "raw_heavy_files_packaged":False,
              "cache_reuse_first":True
          }
          (OUT/"STATUS.json").write_text(json.dumps(status,indent=2,sort_keys=True))
          with (OUT/"R22F_R10B_R5_GO_NO_GO_DECISION.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=list(status.keys())); w.writeheader(); w.writerow(status)
          rows=[]
          for p in sorted(OUT.rglob("*")):
              if p.is_file():
                  rows.append({"file":str(p.relative_to(OUT)),"sha256":hashlib.sha256(p.read_bytes()).hexdigest(),"bytes":p.stat().st_size})
          with (OUT/"MANIFEST_SHA256.csv").open("w",newline="",encoding="utf-8") as f:
              w=csv.DictWriter(f, fieldnames=["file","sha256","bytes"]); w.writeheader(); w.writerows(rows)
          print(json.dumps(status,indent=2,sort_keys=True))
          PY
          ZIP="${RUN_ID}_RESULTS.zip"
          SHA="${ZIP}.sha256.txt"
          zip -r "$ZIP" "$RUN_ID" -x "*/__pycache__/*" >/dev/null
          sha256sum "$ZIP" > "$SHA"
          cat "$SHA"

      - name: Upload slim results artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_RESULTS
          path: |
            R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION_RESULTS.zip
            R22F_R10B_R5_SPI511_CACHE_REUSE_SWG_DOL_REPAIR_EXECUTION_RESULTS.zip.sha256.txt
          if-no-files-found: error
          retention-days: 14
