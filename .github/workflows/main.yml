name: ACIRM R3N 30min bounded SPI511 safe run

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3n-30min-bounded-spi511-safe-run:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3N_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3N_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3N_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS

      - name: System diagnostics
        run: |
          {
            echo "ACIRM R3N 30min bounded SPI511 safe run"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=BOUNDED_30MIN_SPI511_SAFE_ATTEMPT_NOT_DISCOVERY_NOT_FINAL_PROOF"
            uname -a || true
            df -h || true
            free -h || true
            curl -4 -I -L --connect-timeout 20 --max-time 60 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R3N_RESULTS/logs/system_diagnostics.log

      - name: Pull OSA Docker image
        continue-on-error: true
        run: |
          {
            docker --version || true
            docker pull integralsw/osa:latest || true
          } | tee ACIRM_R21AX_R7G_R3N_RESULTS/logs/docker_pull.log

      - name: R3N bounded assemble OG and short SPI511 attempt
        continue-on-error: true
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3N_RESULTS/logs
          echo "Starting R3N bounded main execution" | tee ACIRM_R21AX_R7G_R3N_RESULTS/logs/main_execution.log

          python3 -u <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3N_RESULTS/logs/main_execution.log
          import csv
          import gzip
          import hashlib
          import json
          import os
          import re
          import shutil
          import subprocess
          import time
          import traceback
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3N_30MIN_BOUNDED_SPI511_SAFE_RUN"

          OUT = Path("ACIRM_R21AX_R7G_R3N_RESULTS")
          DATA = OUT / "data"
          LOGS = OUT / "logs"
          WORK = OUT / "work"

          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)
          LOGS.mkdir(parents=True, exist_ok=True)
          WORK.mkdir(parents=True, exist_ok=True)

          START = time.time()
          DEADLINE_SECONDS = 1500

          BASES = [
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data",
              "http://heasarc.gsfc.nasa.gov/FTP/integral/data",
          ]

          REV = "2504"
          SCW = "250400090010"

          SCW_DIR = DATA / "scw" / REV / f"{SCW}.001"
          AUX_ADP_DIR = DATA / "aux" / "adp" / f"{REV}.001"
          SCW_DIR.mkdir(parents=True, exist_ok=True)
          AUX_ADP_DIR.mkdir(parents=True, exist_ok=True)

          download_rows = []
          dal_rows = []
          missing_rows = []
          command_rows = []

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def remaining():
              return max(0, int(DEADLINE_SECONDS - (time.time() - START)))

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_sha(path):
              p = Path(path)
              try:
                  if p.exists() and p.is_file() and p.stat().st_size <= 50 * 1024 * 1024:
                      return sha256_file(p)
                  if p.exists() and p.is_file():
                      return "SKIPPED_LARGE_FILE"
              except Exception:
                  return ""
              return ""

          def is_gzip(path):
              try:
                  with open(path, "rb") as f:
                      return f.read(2) == b"\x1f\x8b"
              except Exception:
                  return False

          def is_fits(path):
              try:
                  with open(path, "rb") as f:
                      h = f.read(16)
                  return h.startswith(b"SIMPLE") or h.startswith(b"XTENSION")
              except Exception:
                  return False

          def accept(path):
              p = Path(path)
              if not p.exists():
                  return False, "missing"
              if p.stat().st_size <= 1024:
                  return False, "too_small_" + str(p.stat().st_size)
              if is_gzip(p):
                  return True, "gzip"
              if is_fits(p):
                  return True, "fits"
              return False, "not_fits_or_gzip"

          def norm_name(x):
              return Path(str(x).strip().split("[")[0].strip()).name

          def materialize(tmp, final_path):
              tmp = Path(tmp)
              final_path = Path(final_path)
              final_path.parent.mkdir(parents=True, exist_ok=True)
              if is_gzip(tmp):
                  with gzip.open(tmp, "rb") as src, open(final_path, "wb") as dst:
                      shutil.copyfileobj(src, dst)
                  tmp.unlink(missing_ok=True)
              else:
                  if final_path.exists():
                      final_path.unlink()
                  tmp.rename(final_path)

          def final_path_for(logical):
              logical = str(logical).split("[")[0].strip()
              if logical.startswith("/data/"):
                  return DATA / logical[len("/data/"):]
              return SCW_DIR / norm_name(logical)

          def urls_for(logical):
              logical = str(logical).split("[")[0].strip()
              out = []
              if logical.startswith("/data/"):
                  rel = logical[len("/data/"):]
                  for b in BASES:
                      out.append(b + "/" + rel)
                      if rel.endswith(".fits") and not rel.endswith(".fits.gz"):
                          out.append(b + "/" + rel + ".gz")
                  return out

              name = norm_name(logical)
              roots = [
                  "scw/" + REV + "/" + SCW + ".001",
                  "aux/adp/" + REV + ".001",
                  "aux/adp",
                  "aux",
                  "idx",
                  "cat",
                  "ic",
              ]
              for b in BASES:
                  for r in roots:
                      out.append(b + "/" + r + "/" + name)
                      if name.endswith(".fits") and not name.endswith(".fits.gz"):
                          out.append(b + "/" + r + "/" + name + ".gz")
              return out

          def curl_one(url, tmp):
              max_time = min(120, max(30, remaining() - 60))
              cmd = [
                  "curl", "-4", "-L",
                  "--retry", "2",
                  "--retry-delay", "5",
                  "--connect-timeout", "30",
                  "--max-time", str(max_time),
                  "--fail",
                  "-o", str(tmp),
                  url,
              ]
              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              ok, reason = accept(tmp)
              return p.returncode, ok, reason, p.stdout[-3000:]

          def download_logical(logical, category, source_iteration):
              final_path = final_path_for(logical)
              if final_path.exists() and final_path.stat().st_size > 1024:
                  download_rows.append({
                      "source_iteration": source_iteration,
                      "category": category,
                      "logical_path": str(logical),
                      "final_path": str(final_path),
                      "url": "already_exists",
                      "attempt": 0,
                      "returncode": 0,
                      "ok": True,
                      "reason": "already_exists",
                      "bytes": final_path.stat().st_size,
                      "sha256": sha256_file(final_path),
                      "log_tail": "",
                  })
                  return True

              if remaining() < 120:
                  download_rows.append({
                      "source_iteration": source_iteration,
                      "category": category,
                      "logical_path": str(logical),
                      "final_path": str(final_path),
                      "url": "SKIPPED_DEADLINE_NEAR",
                      "attempt": 0,
                      "returncode": "",
                      "ok": False,
                      "reason": "deadline_near",
                      "bytes": 0,
                      "sha256": "",
                      "log_tail": "",
                  })
                  return False

              for i, url in enumerate(urls_for(logical), 1):
                  tmp = final_path.parent / (".download_" + final_path.name + "_" + str(i) + ".part")
                  if tmp.exists():
                      tmp.unlink()

                  row = {
                      "source_iteration": source_iteration,
                      "category": category,
                      "logical_path": str(logical),
                      "final_path": str(final_path),
                      "url": url,
                      "attempt": i,
                      "returncode": "",
                      "ok": False,
                      "reason": "",
                      "bytes": 0,
                      "sha256": "",
                      "log_tail": "",
                  }

                  try:
                      rc, ok, reason, tail = curl_one(url, tmp)
                      row["returncode"] = rc
                      row["reason"] = reason
                      row["log_tail"] = tail
                      if ok:
                          materialize(tmp, final_path)
                          row["ok"] = True
                          row["bytes"] = final_path.stat().st_size
                          row["sha256"] = sha256_file(final_path)
                          download_rows.append(row)
                          return True
                  except Exception as e:
                      row["reason"] = repr(e)

                  download_rows.append(row)

                  if remaining() < 90:
                      return False

              return False

          def seed_files():
              scw_seed = [
                  "swg.fits",
                  "sc_time.fits",
                  "sc_attitude.fits",
                  "sc_gti.fits",
                  "sc_hk.fits",
                  "sc_modes.fits",
                  "sc_orbit_param.fits",
                  "spi_oper.fits",
                  "spi_spectra.fits",
                  "spi_gti.fits",
                  "spi_hk.fits",
                  "spi_science_hk.fits",
                  "spi_science_param.fits",
                  "spi_acs.fits",
                  "spi_block.fits",
                  "ibis_hk.fits",
                  "ibis_raw_shadow.fits",
                  "ibis_dead.fits",
                  "jmx1_hk.fits",
                  "jmx2_hk.fits",
                  "jemx1_hk.fits",
                  "jemx2_hk.fits",
                  "picsit_hk.fits",
                  "isgri_hk.fits",
              ]

              aux_seed = [
                  "orbit_historic.fits",
                  "orbit_predicted.fits",
                  "attitude_historic.fits",
                  "attitude_predicted_01.fits",
                  "attitude_predicted.fits",
                  "time_correlation.fits",
                  "pointing_definition_predicted_0001.fits",
                  "pointing_definition_predicted.fits",
                  "pointing_definition_historic.fits",
                  "pointing_definition_predicted_0000.fits",
                  "pointing_definition_predicted_0002.fits",
                  "observation_log.fits",
                  "moc_out_of_limits.fits",
                  "slew_definition.fits",
              ]

              for x in scw_seed:
                  if remaining() < 180:
                      break
                  download_logical("/data/scw/" + REV + "/" + SCW + ".001/" + x, "seed_scw", 0)

              for x in aux_seed:
                  if remaining() < 180:
                      break
                  download_logical("/data/aux/adp/" + REV + ".001/" + x, "seed_aux_adp", 0)

          def parse_swg_refs():
              refs = []
              swg = SCW_DIR / "swg.fits"
              if not swg.exists():
                  return refs
              try:
                  txt = swg.read_bytes().decode("latin1", "ignore")
                  found = re.findall(r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)", txt)
                  for ref in sorted(set(found)):
                      name = norm_name(ref)
                      if name and name != "swg.fits":
                          refs.append("/data/scw/" + REV + "/" + SCW + ".001/" + name)
              except Exception:
                  pass
              return refs

          def run_container(script, name, sec):
              log_path = LOGS / (name + ".log")
              cmd = [
                  "docker", "run", "--rm",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3N_RESULTS/data:/data",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3N_RESULTS/work:/work",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3N_RESULTS/logs:/logs",
                  "integralsw/osa:latest",
                  "bash", "-lc", script,
              ]
              try:
                  p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT, timeout=sec)
                  txt = p.stdout
                  rc = p.returncode
              except subprocess.TimeoutExpired as e:
                  raw = e.stdout or ""
                  if isinstance(raw, bytes):
                      raw = raw.decode("utf-8", "replace")
                  txt = raw + "\nACIRM_TIMEOUT_EXPIRED\n"
                  rc = 124
              except Exception:
                  txt = traceback.format_exc()
                  rc = 999

              log_path.write_text(txt, encoding="utf-8", errors="replace")
              command_rows.append({
                  "name": name,
                  "returncode": rc,
                  "log_path": str(log_path),
                  "log_bytes": len(txt.encode("utf-8", "replace")),
              })
              return rc, txt

          def env_prefix():
              return '''
                set +e
                unset DISPLAY
                export DISPLAY=
                export HEADASNOQUERY=1
                export PIL_NO_GUI=1
                export PIL_NOTTY=1
                mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep /work/og /work/products /work/logs
                cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true
                if [ -f /tmp/acirm_pfiles/spi_science_analysis.par ]; then
                  sed -i 's/,ql,/,hl,/g' /tmp/acirm_pfiles/spi_science_analysis.par || true
                  sed -i 's/,q,/,h,/g' /tmp/acirm_pfiles/spi_science_analysis.par || true
                fi
                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH
                if [ -d /opt/osa/lib ]; then export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"; fi
                if [ -d /opt/osa/lib64 ]; then export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"; fi
                source /opt/osa/bin/isdc_init_env.sh || true
                unset DISPLAY
                export DISPLAY=
                export HEADASNOQUERY=1
                export PIL_NO_GUI=1
                export PIL_NOTTY=1
                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH
              '''

          def parse_missing(txt):
              if "DAL_FILE_NOT_ACCESSIBLE" not in txt and "status -2004" not in txt and "not accessible" not in txt.lower():
                  return []
              found = set()
              pats = [
                  r"(/data/[A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)",
                  r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)",
              ]
              for pat in pats:
                  for m in re.findall(pat, txt):
                      clean = str(m).split("[")[0].strip()
                      if clean.endswith(".fits") or clean.endswith(".fits.gz"):
                          found.add(clean)

              out = []
              for m in sorted(found):
                  if m.startswith("/data/"):
                      out.append(m)
                  else:
                      name = norm_name(m)
                      aux_names = ["observation_log.fits", "moc_out_of_limits.fits", "time_correlation.fits", "slew_definition.fits"]
                      if name.startswith("orbit") or "attitude" in name or "pointing" in name or name in aux_names:
                          out.append("/data/aux/adp/" + REV + ".001/" + name)
                      else:
                          out.append("/data/scw/" + REV + "/" + SCW + ".001/" + name)
              return sorted(set(out))

          def run_dal(iteration):
              script = env_prefix() + '''
                TARGET=/data/scw/2504/250400090010.001/swg.fits
                echo "R3N_DAL_ITERATION"
                echo "local_file_count=$(find /data -type f | wc -l)"
                timeout 120 dal_verify "$TARGET" 2>&1 || true
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -250 || true
              '''
              return run_container(script, "dal_verify_" + str(iteration), 180)[1]

          def command_discovery():
              script = env_prefix() + '''
                echo "COMMAND DISCOVERY"
                for c in dal_verify og_create spi_science_analysis fdump fstruct ftlist plist pset punlearn; do
                  echo "COMMAND $c"
                  command -v "$c" || true
                done
                echo "spi_science_analysis.par"
                cat /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null || true
                echo "og_create.par"
                cat /tmp/acirm_pfiles/og_create.par 2>/dev/null || true
              '''
              return run_container(script, "command_discovery", 120)[1]

          def quick_og_spi():
              script = env_prefix() + '''
                TARGET=/data/scw/2504/250400090010.001/swg.fits
                mkdir -p /work/og /work/products /work/logs
                echo "Create OG without mode parameter"
                timeout 300 og_create idxSwg="$TARGET" ogid=ACIRM_R3N baseDir=/work/og instrument=SPI 2>&1 | tee /work/logs/og_create_r3n.log || true

                find /work/og -maxdepth 8 -type f -printf "%p %s\\n" | sort | tee /work/logs/og_files.txt || true

                OG_FILE=$(find /work/og -type f -name "og_spi.fits" | sort | head -1)
                if [ -z "$OG_FILE" ]; then OG_FILE=$(find /work/og -type f -iname "*og*.fits" | sort | head -1); fi
                echo "OG_FILE=$OG_FILE"

                PAR=/tmp/acirm_pfiles/spi_science_analysis.par

                has_par() {
                  grep -q -E "^ *$1[,) ]" "$PAR" 2>/dev/null
                }

                add_if_has() {
                  local pname="$1"
                  local pvalue="$2"
                  if has_par "$pname"; then
                    CMD+=("$pname=$pvalue")
                    echo "ADD_PARAM $pname=$pvalue"
                  else
                    echo "SKIP_PARAM $pname"
                  fi
                }

                if [ -n "$OG_FILE" ]; then
                  cd /work/products || exit 0
                  CMD=(spi_science_analysis)
                  add_if_has obs_group "$OG_FILE"
                  add_if_has run_cat_extract no
                  add_if_has run_pointing yes
                  add_if_has run_binning yes
                  add_if_has run_background no
                  add_if_has run_spiros no
                  add_if_has run_phase_analysis no
                  add_if_has run_gaincorrection no
                  add_if_has run_fullcheck no
                  add_if_has use_pointing_filter no
                  add_if_has run_simulation no
                  add_if_has add_mock_source no
                  add_if_has mock_source no
                  add_if_has use_simulation no
                  add_if_has spibounds_nregions 1
                  add_if_has spibounds_regions 508,514
                  add_if_has spibounds_nbins 1
                  add_if_has detectors 0-18
                  add_if_has clobber yes
                  add_if_has log_File spi_sa_r3n_508_514.log
                  add_if_has mode h

                  echo "SPI_CMD_BEGIN"
                  printf '%q ' "${CMD[@]}"
                  echo ""
                  echo "SPI_CMD_END"

                  echo "Short bounded SPI attempt: 420 seconds only"
                  yes "" | timeout 420 "${CMD[@]}" 2>&1 | tee /work/logs/spi_science_analysis_short_508_514.log || true

                  if grep -q -E "status -3004|Add a mock source|run_simulation|parameter.*query" /work/logs/spi_science_analysis_short_508_514.log 2>/dev/null; then
                    echo "Fallback with yes no, 240 seconds only"
                    yes no | timeout 240 "${CMD[@]}" 2>&1 | tee /work/logs/spi_science_analysis_short_508_514_no.log || true
                  fi
                fi

                find /work -maxdepth 9 -type f -printf "%p %s\\n" | sort | tee /work/logs/work_files.txt || true

                grep -R -n -E "508|511|514|PIL_BOGUS_CMDLINE|segmentation|Attempting to launch GUI|status|error|Error|ERROR|spi|spectrum|PHA|RMF|ARF|evts|det|mock|simulation|ADD_PARAM|SKIP_PARAM" /work/logs /work/products 2>/dev/null | head -1600 | tee /work/logs/selected_hits.txt || true

                cp -r /work/logs/* /logs/ 2>/dev/null || true
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -800 || true
              '''
              return run_container(script, "quick_og_spi511_attempt", 1100)[1]

          def write_csv(path, rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      for k in fields:
                          r.setdefault(k, "")
                      w.writerow(r)

          def list_files(root):
              rows = []
              root = Path(root)
              if not root.exists():
                  return rows
              for p in sorted(root.rglob("*")):
                  if p.is_file():
                      rows.append({"path": str(p), "bytes": p.stat().st_size, "sha256": safe_sha(p)})
              return rows

          try:
              print("R3N main started", now_utc())
              print("deadline_seconds", DEADLINE_SECONDS)

              print("Seed files")
              seed_files()

              print("Parse SWG refs")
              for ref in parse_swg_refs():
                  if remaining() < 480:
                      break
                  ok = download_logical(ref, "swg_ref", 0)
                  missing_rows.append({"iteration": 0, "missing_ref": ref, "download_ok": ok, "category": "swg_ref"})

              dependency_status = "NOT_READY"
              for it in range(1, 4):
                  if remaining() < 420:
                      dependency_status = "SKIPPED_DAL_DEADLINE_NEAR"
                      break
                  txt = run_dal(it)
                  missing = parse_missing(txt)
                  dal_file_not_accessible = ("DAL_FILE_NOT_ACCESSIBLE" in txt) or ("status -2004" in txt)
                  dal_rows.append({
                      "iteration": it,
                      "dal_file_not_accessible": dal_file_not_accessible,
                      "missing_count": len(missing),
                      "missing_refs_joined": "|".join(missing),
                  })
                  if not dal_file_not_accessible:
                      dependency_status = "DAL_OK"
                      break
                  any_ok = False
                  for ref in missing[:10]:
                      if remaining() < 420:
                          break
                      ok = download_logical(ref, "dal_missing", it)
                      any_ok = any_ok or ok
                      missing_rows.append({"iteration": it, "missing_ref": ref, "download_ok": ok, "category": "dal_missing"})
                  if not any_ok:
                      dependency_status = "DAL_MISSING_NOT_RESOLVED"
                      break

              discovery_txt = ""
              spi_txt = ""

              if remaining() > 300:
                  discovery_txt = command_discovery()
              else:
                  discovery_txt = "SKIPPED_DISCOVERY_DEADLINE_NEAR"

              actual_spi_started = False
              if dependency_status == "DAL_OK" and remaining() > 900:
                  actual_spi_started = True
                  spi_txt = quick_og_spi()
              else:
                  spi_txt = "SKIPPED_SPI_ATTEMPT dependency_status=" + dependency_status + " remaining=" + str(remaining())

              joined = discovery_txt + "\n" + spi_txt

              data_files = list_files(DATA)
              work_files = list_files(WORK)
              product_hints = []
              for p in work_files:
                  low = p["path"].lower()
                  if any(k in low for k in ["spi", "spec", "spectrum", "pha", "rmf", "arf", "og", "energy", "511", "508", "514", "hist", "evts"]):
                      product_hints.append(p)

              checks = {
                  "dependency_status": dependency_status,
                  "actual_spi_started": actual_spi_started,
                  "wrong_param_seen": "PIL_BOGUS_CMDLINE" in joined or "bogus parameter name" in joined,
                  "gui_seen": "Attempting to launch GUI" in joined,
                  "segfault_seen": "segmentation violation" in joined or "*** Break ***" in joined,
                  "status_3004_seen": "status -3004" in joined,
                  "status_3023_seen": "status -3023" in joined,
                  "status_3003_seen": "status -3003" in joined,
                  "og_created": "og_spi.fits" in joined or any("og_spi.fits" in x["path"] for x in work_files),
                  "line_band_seen": ("508,514" in joined) or ("508" in joined and "514" in joined),
                  "data_file_count": len(data_files),
                  "work_file_count": len(work_files),
                  "product_hint_count": len(product_hints),
                  "remaining_seconds_at_finish": remaining(),
              }

              if checks["actual_spi_started"] and checks["product_hint_count"] > 0 and not checks["wrong_param_seen"] and not checks["gui_seen"] and not checks["segfault_seen"]:
                  final_status = "R21AX_R7G_R3N_BOUNDED_SPI511_SHORT_RUN_PRODUCTS_PRESENT_REVIEW_REQUIRED_NOT_FINAL_PROOF"
              elif not actual_spi_started:
                  final_status = "R21AX_R7G_R3N_BOUNDED_RUN_COMPLETED_SPI_NOT_STARTED_TIME_OR_DEPENDENCY_LIMIT_NO_511_NO_PHYSICAL_NULL"
              else:
                  final_status = "R21AX_R7G_R3N_BOUNDED_SPI511_ATTEMPT_COMPLETED_WITH_TECHNICAL_CONTEXT_NO_PHYSICAL_NULL"

              write_csv(OUT / "r3n_download_manifest.csv", download_rows, ["source_iteration", "category", "logical_path", "final_path", "url", "attempt", "returncode", "ok", "reason", "bytes", "sha256", "log_tail"])
              write_csv(OUT / "r3n_dal_iterations.csv", dal_rows, ["iteration", "dal_file_not_accessible", "missing_count", "missing_refs_joined"])
              write_csv(OUT / "r3n_missing_resolution.csv", missing_rows, ["iteration", "missing_ref", "download_ok", "category"])
              write_csv(OUT / "r3n_commands.csv", command_rows, ["name", "returncode", "log_path", "log_bytes"])
              write_csv(OUT / "r3n_data_files.csv", data_files, ["path", "bytes", "sha256"])
              write_csv(OUT / "r3n_work_files.csv", work_files, ["path", "bytes", "sha256"])
              write_csv(OUT / "r3n_product_hints.csv", product_hints, ["path", "bytes", "sha256"])

              with open(OUT / "r3n_checks_flat.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=["check", "value"])
                  w.writeheader()
                  for k, v in checks.items():
                      w.writerow({"check": k, "value": v})

              summary = {
                  "run_id": RUN_ID,
                  "created_utc": now_utc(),
                  "claim_ceiling": "BOUNDED_30MIN_SPI511_SAFE_ATTEMPT_NOT_DISCOVERY_NOT_FINAL_PROOF",
                  "scw": SCW,
                  "rev": REV,
                  "elapsed_seconds": int(time.time() - START),
                  "deadline_seconds": DEADLINE_SECONDS,
                  "dependency_status": dependency_status,
                  "actual_spi_started": actual_spi_started,
                  "checks": checks,
                  "final_status": final_status,
              }

              (OUT / "R3N_BOUNDED_SPI511_SAFE_RUN_SUMMARY.json").write_text(json.dumps(summary, indent=2, sort_keys=True), encoding="utf-8")
              print(json.dumps(summary, indent=2, sort_keys=True))

          except Exception:
              err = traceback.format_exc()
              print("R3N_FATAL_EXCEPTION")
              print(err)
              fallback = {
                  "run_id": RUN_ID,
                  "created_utc": now_utc(),
                  "claim_ceiling": "BOUNDED_30MIN_SPI511_SAFE_ATTEMPT_NOT_DISCOVERY_NOT_FINAL_PROOF",
                  "final_status": "R21AX_R7G_R3N_FATAL_EXCEPTION_CAPTURED_NO_511_NO_PHYSICAL_NULL",
                  "exception": err,
              }
              (OUT / "R3N_FATAL_EXCEPTION.json").write_text(json.dumps(fallback, indent=2), encoding="utf-8")
              (OUT / "R3N_BOUNDED_SPI511_SAFE_RUN_SUMMARY.json").write_text(json.dumps(fallback, indent=2), encoding="utf-8")
          PY

          echo "R3N main step ended" | tee -a ACIRM_R21AX_R7G_R3N_RESULTS/logs/main_execution.log
          exit 0

      - name: Build LIGHT audit package only
        if: always()
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/logs

          cp ACIRM_R21AX_R7G_R3N_RESULTS/logs/*.log ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R3N_RESULTS/*.json ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/ || true
          cp ACIRM_R21AX_R7G_R3N_RESULTS/*.csv ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/ || true

          echo "R3N is a bounded 30-minute safe SPI511 attempt." > ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/CLAIM_BOUNDARY.txt
          echo "It is designed to avoid multi-hour silent OSA hangs." >> ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/CLAIM_BOUNDARY.txt
          echo "It is not a guaranteed final 511 proof." >> ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/CLAIM_BOUNDARY.txt
          echo "Any timeout/runtime failure is not a physical null." >> ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/CLAIM_BOUNDARY.txt

          du -h ACIRM_R21AX_R7G_R3N_RESULTS/data > ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/data_size_report.txt || true
          du -h ACIRM_R21AX_R7G_R3N_RESULTS/work > ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/work_size_report.txt || true
          find ACIRM_R21AX_R7G_R3N_RESULTS/data -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/data_file_list.csv || true
          find ACIRM_R21AX_R7G_R3N_RESULTS/work -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS/work_file_list.csv || true

          zip -r ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS.zip ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS
          sha256sum ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS.zip > ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R3N LIGHT artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3N_LIGHT_RESULTS.zip.sha256.txt
