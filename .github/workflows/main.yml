name: ACIRM R3P R2S direct SPI OPER peak morphology audit

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2s-direct-spi-oper-peak-morphology:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Prepare folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_LIGHT_RESULTS/logs
          mkdir -p ACIRM_CACHE_R3P_R1
          echo "R2S_PEAK_MORPHOLOGY_PREPARED"

      - name: Restore R3P R1 cache
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1
          restore-keys: |
            acirm-r21ax-r7g-r3p-r1-cache-

      - name: Run R2S peak morphology center width audit
        continue-on-error: true
        run: |
          set +e

          OUT="ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_RESULTS"
          LIGHT="ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_LIGHT_RESULTS"
          MAIN_LOG="$OUT/logs/main_execution.log"

          echo "R2S_PEAK_MORPHOLOGY_STARTED" | tee "$MAIN_LOG"
          echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$MAIN_LOG"

          sudo apt-get update -y 2>&1 | tee "$OUT/logs/apt_update.log" || true
          sudo apt-get install -y zip python3-pip 2>&1 | tee "$OUT/logs/apt_install.log" || true
          python3 -m pip install --user astropy numpy 2>&1 | tee "$OUT/logs/pip_astropy_numpy.log" || true

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import math
          import os
          import re
          import time
          from pathlib import Path

          import numpy as np
          from astropy.io import fits

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_PEAK_MORPHOLOGY_CENTER_WIDTH_AUDIT"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_RESULTS")
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_LIGHT_RESULTS")
          CACHE = Path("ACIRM_CACHE_R3P_R1")
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"
          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_PEAK_MORPHOLOGY_LIGHT_RESULTS.zip"

          for p in [OUT, OUT / "logs", LIGHT, LIGHT / "logs"]:
              p.mkdir(parents=True, exist_ok=True)

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_text(path, text):
              Path(path).write_text(str(text), encoding="utf-8", errors="replace")

          def write_csv(path, rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: r.get(k, "") for k in fields})

          def extract_scw(path):
              s = str(path)
              m = re.search(r"/scw/([0-9]{4})/([0-9]{12}\.[0-9]{3})/", s)
              if m:
                  return m.group(2)
              m = re.search(r"([0-9]{12}\.[0-9]{3})", s)
              if m:
                  return m.group(1)
              return ""

          def finite_sum(x):
              arr = np.asarray(x, dtype=float)
              arr = arr[np.isfinite(arr)]
              if arr.size == 0:
                  return None
              return float(np.sum(arr))

          def weighted_centroid(energy, values):
              e = np.asarray(energy, dtype=float)
              v = np.asarray(values, dtype=float)
              m = np.isfinite(e) & np.isfinite(v) & (v > 0)
              if not np.any(m):
                  return None
              sw = float(np.sum(v[m]))
              if sw == 0:
                  return None
              return float(np.sum(e[m] * v[m]) / sw)

          def load_spi_oper_energy_values(path):
              with fits.open(path, memmap=False) as hdul:
                  selected = None
                  for hdu in hdul:
                      if str(getattr(hdu, "name", "")).strip() == "SPI.-OPSD-ALL":
                          selected = hdu
                          break

                  if selected is None:
                      for hdu in hdul:
                          if hdu.data is not None and hasattr(hdu, "columns"):
                              cols = list(hdu.columns.names)
                              if "PSD_DATA" in cols:
                                  selected = hdu
                                  break

                  if selected is None:
                      raise RuntimeError("NO_SPI_OPSD_ALL_OR_PSD_DATA")

                  cols = list(selected.columns.names)
                  data = selected.data

                  value_col = "PSD_DATA" if "PSD_DATA" in cols else ""
                  if not value_col:
                      for c in cols:
                          cu = c.upper()
                          if "DATA" in cu or "COUNT" in cu or "RATE" in cu:
                              value_col = c
                              break

                  if not value_col:
                      raise RuntimeError("NO_VALUE_COL")

                  energy_col = ""
                  for c in cols:
                      cu = c.upper()
                      if cu in ["ENERGY", "E_MEAN", "E_CEN", "E_CENTER", "PI"]:
                          energy_col = c
                          break

                  elo_col = ""
                  ehi_col = ""
                  for c in cols:
                      cu = c.upper().replace("-", "_")
                      if cu in ["E_MIN", "E_LO", "ENERG_LO", "ENERGY_LO", "E_LOW"]:
                          elo_col = c
                      if cu in ["E_MAX", "E_HI", "ENERG_HI", "ENERGY_HI", "E_HIGH"]:
                          ehi_col = c

                  if elo_col and ehi_col:
                      elo = np.asarray(data[elo_col], dtype=float).reshape(-1)
                      ehi = np.asarray(data[ehi_col], dtype=float).reshape(-1)
                      energy = (elo + ehi) / 2.0
                      energy_mode = "bounds"
                      energy_label = elo_col + "," + ehi_col
                  elif energy_col:
                      energy = np.asarray(data[energy_col], dtype=float).reshape(-1)
                      elo = energy
                      ehi = energy
                      energy_mode = "center"
                      energy_label = energy_col
                  else:
                      raise RuntimeError("NO_ENERGY_COL")

                  val = np.asarray(data[value_col], dtype=float)

                  if val.ndim == 1 and val.shape[0] == energy.shape[0]:
                      val_by_energy = val
                  elif val.ndim >= 2 and val.shape[0] == energy.shape[0]:
                      val_by_energy = np.nansum(val.reshape(val.shape[0], -1), axis=1)
                  elif val.ndim >= 2 and val.shape[-1] == energy.shape[0]:
                      tmp = np.moveaxis(val, -1, 0)
                      val_by_energy = np.nansum(tmp.reshape(tmp.shape[0], -1), axis=1)
                  else:
                      raise RuntimeError("VALUE_ENERGY_SHAPE_MISMATCH")

                  finite = np.isfinite(energy) & np.isfinite(elo) & np.isfinite(ehi) & np.isfinite(val_by_energy)
                  energy = np.asarray(energy[finite], dtype=float)
                  elo = np.asarray(elo[finite], dtype=float)
                  ehi = np.asarray(ehi[finite], dtype=float)
                  values = np.asarray(val_by_energy[finite], dtype=float)

                  order = np.argsort(energy)
                  energy = energy[order]
                  elo = elo[order]
                  ehi = ehi[order]
                  values = values[order]

                  return {
                      "energy": energy,
                      "elo": elo,
                      "ehi": ehi,
                      "values": values,
                      "energy_mode": energy_mode,
                      "energy_label": energy_label,
                      "value_col": value_col,
                      "hdu_name": str(getattr(selected, "name", ""))
                  }

          def mask_window(obj, lo, hi):
              if obj["energy_mode"] == "bounds":
                  return (obj["elo"] < hi) & (obj["ehi"] > lo)
              return (obj["energy"] >= lo) & (obj["energy"] <= hi)

          def sum_window(obj, lo, hi):
              m = mask_window(obj, lo, hi)
              return finite_sum(obj["values"][m]), int(np.sum(m))

          def centroid_window(obj, lo, hi, baseline=None):
              m = mask_window(obj, lo, hi)
              e = obj["energy"][m]
              v = obj["values"][m]
              if baseline is not None:
                  v = np.asarray(v, dtype=float) - float(baseline)
                  v = np.where(v > 0, v, 0.0)
              return weighted_centroid(e, v)

          def fwhm_estimate(obj, lo, hi, baseline):
              m = mask_window(obj, lo, hi)
              e = np.asarray(obj["energy"][m], dtype=float)
              v = np.asarray(obj["values"][m], dtype=float) - float(baseline)
              v = np.where(np.isfinite(v), v, 0.0)
              if e.size < 3:
                  return "", "", "", ""
              vmax = float(np.max(v))
              if vmax <= 0:
                  return "", "", "", ""
              half = 0.5 * vmax
              hm = v >= half
              if not np.any(hm):
                  return "", "", "", ""
              e_half = e[hm]
              return float(np.min(e_half)), float(np.max(e_half)), float(np.max(e_half) - np.min(e_half)), vmax

          def scan_windows(obj, lo_min, hi_max, width, step):
              rows = []
              x = lo_min
              while x <= hi_max - width + 1e-9:
                  lo = round(x, 6)
                  hi = round(lo + width, 6)
                  s, bins = sum_window(obj, lo, hi)
                  if s is not None:
                      rows.append({
                          "window_lo_keV": lo,
                          "window_hi_keV": hi,
                          "window_sum": s,
                          "bin_count": bins,
                          "overlaps_508_514": not (hi <= 508.0 or lo >= 514.0),
                          "overlaps_500_520": not (hi <= 500.0 or lo >= 520.0)
                      })
                  x += step
              return rows

          def greedy_nonoverlap_windows(rows, min_gap_keV):
              ranked = sorted(rows, key=lambda r: float(r["window_sum"]), reverse=True)
              selected = []
              for r in ranked:
                  center = (float(r["window_lo_keV"]) + float(r["window_hi_keV"])) / 2.0
                  ok = True
                  for s in selected:
                      sc = (float(s["window_lo_keV"]) + float(s["window_hi_keV"])) / 2.0
                      if abs(center - sc) < min_gap_keV:
                          ok = False
                          break
                  if ok:
                      selected.append(r)
                  if len(selected) >= 20:
                      break
              return selected

          ready_flag_exists = READY_FLAG.exists()

          spi_oper_paths = []
          if CACHE.exists():
              spi_oper_paths = sorted(CACHE.rglob("spi_oper.fits"))

          unique_by_scw = {}
          for p in spi_oper_paths:
              scw = extract_scw(p)
              if scw and scw not in unique_by_scw:
                  unique_by_scw[scw] = p

          morphology_rows = []
          spectrum_rows = []
          window_rows = []
          nonoverlap_rows = []

          for scw, path in sorted(unique_by_scw.items()):
              try:
                  obj = load_spi_oper_energy_values(path)

                  local_mask = (obj["energy"] >= 450.0) & (obj["energy"] <= 570.0)
                  for e, v in zip(obj["energy"][local_mask], obj["values"][local_mask]):
                      spectrum_rows.append({
                          "scw_id": scw,
                          "energy_keV": float(e),
                          "value": float(v),
                          "is_508_514": bool(508.0 <= float(e) <= 514.0),
                          "is_peak_context_500_522": bool(500.0 <= float(e) <= 522.0)
                      })

                  line_sum, line_bins = sum_window(obj, 508.0, 514.0)
                  sb1_sum, sb1_bins = sum_window(obj, 490.0, 500.0)
                  sb2_sum, sb2_bins = sum_window(obj, 522.0, 532.0)
                  left_sum, left_bins = sum_window(obj, 502.0, 508.0)
                  right_sum, right_bins = sum_window(obj, 514.0, 520.0)

                  side_mean = ""
                  line_to_side = ""
                  if sb1_sum is not None and sb2_sum is not None:
                      side_mean = (sb1_sum + sb2_sum) / 2.0
                      if side_mean != 0 and line_sum is not None:
                          line_to_side = line_sum / side_mean

                  immediate_mean = ""
                  line_to_immediate = ""
                  if left_sum is not None and right_sum is not None:
                      immediate_mean = (left_sum + right_sum) / 2.0
                      if immediate_mean != 0 and line_sum is not None:
                          line_to_immediate = line_sum / immediate_mean

                  baseline_values = []
                  m_base1 = mask_window(obj, 490.0, 500.0)
                  m_base2 = mask_window(obj, 522.0, 532.0)
                  if np.any(m_base1):
                      baseline_values.extend(list(obj["values"][m_base1]))
                  if np.any(m_base2):
                      baseline_values.extend(list(obj["values"][m_base2]))

                  baseline_median = ""
                  if baseline_values:
                      baseline_median = float(np.median(np.asarray(baseline_values, dtype=float)))

                  raw_centroid_508_514 = centroid_window(obj, 508.0, 514.0, baseline=None)
                  raw_centroid_506_516 = centroid_window(obj, 506.0, 516.0, baseline=None)

                  excess_centroid_508_514 = ""
                  excess_centroid_506_516 = ""
                  fwhm_lo = ""
                  fwhm_hi = ""
                  fwhm_width = ""
                  peak_excess_max = ""

                  if baseline_median != "":
                      c1 = centroid_window(obj, 508.0, 514.0, baseline=baseline_median)
                      c2 = centroid_window(obj, 506.0, 516.0, baseline=baseline_median)
                      if c1 is not None:
                          excess_centroid_508_514 = c1
                      if c2 is not None:
                          excess_centroid_506_516 = c2
                      fwhm_lo, fwhm_hi, fwhm_width, peak_excess_max = fwhm_estimate(obj, 490.0, 532.0, baseline_median)

                  peak_mask = mask_window(obj, 500.0, 522.0)
                  peak_energy_at_max = ""
                  peak_value_at_max = ""
                  if np.any(peak_mask):
                      e_peak = obj["energy"][peak_mask]
                      v_peak = obj["values"][peak_mask]
                      idx = int(np.nanargmax(v_peak))
                      peak_energy_at_max = float(e_peak[idx])
                      peak_value_at_max = float(v_peak[idx])

                  windows = scan_windows(obj, 450.0, 570.0, 6.0, 1.0)
                  ranked = sorted(windows, key=lambda r: float(r["window_sum"]), reverse=True)

                  for rank_idx, r in enumerate(ranked, start=1):
                      row = dict(r)
                      row["scw_id"] = scw
                      row["rank_by_sum_desc"] = rank_idx
                      window_rows.append(row)

                  nonoverlap = greedy_nonoverlap_windows(windows, min_gap_keV=6.0)
                  for rank_idx, r in enumerate(nonoverlap, start=1):
                      row = dict(r)
                      row["scw_id"] = scw
                      row["nonoverlap_rank_by_sum_desc"] = rank_idx
                      nonoverlap_rows.append(row)

                  best_non511 = ""
                  best_non511_lo = ""
                  best_non511_hi = ""
                  for r in ranked:
                      if not bool(r["overlaps_500_520"]):
                          best_non511 = float(r["window_sum"])
                          best_non511_lo = float(r["window_lo_keV"])
                          best_non511_hi = float(r["window_hi_keV"])
                          break

                  target_rank = ""
                  target_sum_from_scan = ""
                  higher_than_target = ""
                  target_row_count = 0
                  for rank_idx, r in enumerate(ranked, start=1):
                      if abs(float(r["window_lo_keV"]) - 508.0) < 1e-9 and abs(float(r["window_hi_keV"]) - 514.0) < 1e-9:
                          target_rank = rank_idx
                          target_sum_from_scan = float(r["window_sum"])
                          target_row_count = 1
                          break

                  if target_sum_from_scan != "":
                      higher_than_target = sum(1 for r in ranked if float(r["window_sum"]) > float(target_sum_from_scan))

                  target_vs_best_non511 = ""
                  if target_sum_from_scan != "" and best_non511 not in ["", 0]:
                      target_vs_best_non511 = float(target_sum_from_scan) / float(best_non511)

                  morphology_rows.append({
                      "scw_id": scw,
                      "path": str(path),
                      "hdu_name": obj["hdu_name"],
                      "value_col": obj["value_col"],
                      "energy_label": obj["energy_label"],
                      "energy_mode": obj["energy_mode"],
                      "line_508_514_sum": "" if line_sum is None else line_sum,
                      "sideband_490_500_sum": "" if sb1_sum is None else sb1_sum,
                      "sideband_522_532_sum": "" if sb2_sum is None else sb2_sum,
                      "sideband_mean_sum": side_mean,
                      "line_to_sideband_mean_ratio": line_to_side,
                      "immediate_left_502_508_sum": "" if left_sum is None else left_sum,
                      "immediate_right_514_520_sum": "" if right_sum is None else right_sum,
                      "immediate_sideband_mean_sum": immediate_mean,
                      "line_to_immediate_sideband_ratio": line_to_immediate,
                      "baseline_median_from_490_500_522_532": baseline_median,
                      "peak_energy_at_max_500_522_keV": peak_energy_at_max,
                      "peak_value_at_max_500_522": peak_value_at_max,
                      "raw_centroid_508_514_keV": "" if raw_centroid_508_514 is None else raw_centroid_508_514,
                      "raw_centroid_506_516_keV": "" if raw_centroid_506_516 is None else raw_centroid_506_516,
                      "excess_centroid_508_514_keV": excess_centroid_508_514,
                      "excess_centroid_506_516_keV": excess_centroid_506_516,
                      "excess_fwhm_lo_keV": fwhm_lo,
                      "excess_fwhm_hi_keV": fwhm_hi,
                      "excess_fwhm_width_keV": fwhm_width,
                      "peak_excess_max": peak_excess_max,
                      "target_rank_by_6keV_sum_desc": target_rank,
                      "target_higher_window_count": higher_than_target,
                      "best_non511_6keV_window_lo": best_non511_lo,
                      "best_non511_6keV_window_hi": best_non511_hi,
                      "best_non511_6keV_window_sum": best_non511,
                      "target_to_best_non511_6keV_sum_ratio": target_vs_best_non511,
                      "error": ""
                  })

              except Exception as e:
                  morphology_rows.append({
                      "scw_id": scw,
                      "path": str(path),
                      "hdu_name": "",
                      "value_col": "",
                      "energy_label": "",
                      "energy_mode": "",
                      "line_508_514_sum": "",
                      "sideband_490_500_sum": "",
                      "sideband_522_532_sum": "",
                      "sideband_mean_sum": "",
                      "line_to_sideband_mean_ratio": "",
                      "immediate_left_502_508_sum": "",
                      "immediate_right_514_520_sum": "",
                      "immediate_sideband_mean_sum": "",
                      "line_to_immediate_sideband_ratio": "",
                      "baseline_median_from_490_500_522_532": "",
                      "peak_energy_at_max_500_522_keV": "",
                      "peak_value_at_max_500_522": "",
                      "raw_centroid_508_514_keV": "",
                      "raw_centroid_506_516_keV": "",
                      "excess_centroid_508_514_keV": "",
                      "excess_centroid_506_516_keV": "",
                      "excess_fwhm_lo_keV": "",
                      "excess_fwhm_hi_keV": "",
                      "excess_fwhm_width_keV": "",
                      "peak_excess_max": "",
                      "target_rank_by_6keV_sum_desc": "",
                      "target_higher_window_count": "",
                      "best_non511_6keV_window_lo": "",
                      "best_non511_6keV_window_hi": "",
                      "best_non511_6keV_window_sum": "",
                      "target_to_best_non511_6keV_sum_ratio": "",
                      "error": repr(e)[:500]
                  })

          morphology_fields = [
              "scw_id", "path", "hdu_name", "value_col", "energy_label", "energy_mode",
              "line_508_514_sum", "sideband_490_500_sum", "sideband_522_532_sum",
              "sideband_mean_sum", "line_to_sideband_mean_ratio",
              "immediate_left_502_508_sum", "immediate_right_514_520_sum",
              "immediate_sideband_mean_sum", "line_to_immediate_sideband_ratio",
              "baseline_median_from_490_500_522_532",
              "peak_energy_at_max_500_522_keV", "peak_value_at_max_500_522",
              "raw_centroid_508_514_keV", "raw_centroid_506_516_keV",
              "excess_centroid_508_514_keV", "excess_centroid_506_516_keV",
              "excess_fwhm_lo_keV", "excess_fwhm_hi_keV", "excess_fwhm_width_keV",
              "peak_excess_max", "target_rank_by_6keV_sum_desc",
              "target_higher_window_count", "best_non511_6keV_window_lo",
              "best_non511_6keV_window_hi", "best_non511_6keV_window_sum",
              "target_to_best_non511_6keV_sum_ratio", "error"
          ]

          write_csv(LIGHT / "peak_morphology_summary.csv", morphology_rows, morphology_fields)

          write_csv(
              LIGHT / "local_spectrum_450_570.csv",
              spectrum_rows,
              ["scw_id", "energy_keV", "value", "is_508_514", "is_peak_context_500_522"]
          )

          write_csv(
              LIGHT / "ranked_6keV_windows_450_570.csv",
              window_rows,
              [
                  "scw_id", "rank_by_sum_desc", "window_lo_keV", "window_hi_keV",
                  "window_sum", "bin_count", "overlaps_508_514", "overlaps_500_520"
              ]
          )

          write_csv(
              LIGHT / "nonoverlap_peak_windows_450_570.csv",
              nonoverlap_rows,
              [
                  "scw_id", "nonoverlap_rank_by_sum_desc", "window_lo_keV", "window_hi_keV",
                  "window_sum", "bin_count", "overlaps_508_514", "overlaps_500_520"
              ]
          )

          def as_float(x):
              try:
                  v = float(x)
                  if math.isfinite(v):
                      return v
              except Exception:
                  pass
              return None

          best = morphology_rows[0] if morphology_rows else {}

          peak_energy = as_float(best.get("peak_energy_at_max_500_522_keV", ""))
          raw_centroid = as_float(best.get("raw_centroid_508_514_keV", ""))
          excess_centroid = as_float(best.get("excess_centroid_508_514_keV", ""))
          fwhm_width = as_float(best.get("excess_fwhm_width_keV", ""))
          target_rank = best.get("target_rank_by_6keV_sum_desc", "")
          target_vs_non511 = as_float(best.get("target_to_best_non511_6keV_sum_ratio", ""))
          line_to_side = as_float(best.get("line_to_sideband_mean_ratio", ""))
          line_to_immediate = as_float(best.get("line_to_immediate_sideband_ratio", ""))

          centered_peak = False
          if peak_energy is not None and 509.0 <= peak_energy <= 513.0:
              centered_peak = True
          if excess_centroid is not None and 509.0 <= excess_centroid <= 513.0:
              centered_peak = True
          if raw_centroid is not None and 509.0 <= raw_centroid <= 513.0:
              centered_peak = True

          checks = {
              "ready_flag_exists": ready_flag_exists,
              "spi_oper_file_count_total": len(spi_oper_paths),
              "unique_scw_count": len(unique_by_scw),
              "morphology_row_count": len(morphology_rows),
              "spectrum_rows_450_570_count": len(spectrum_rows),
              "window_rows_count": len(window_rows),
              "nonoverlap_peak_rows_count": len(nonoverlap_rows),
              "scw_id": best.get("scw_id", ""),
              "target_rank_by_6keV_sum_desc": target_rank,
              "target_higher_window_count": best.get("target_higher_window_count", ""),
              "line_to_sideband_mean_ratio": best.get("line_to_sideband_mean_ratio", ""),
              "line_to_immediate_sideband_ratio": best.get("line_to_immediate_sideband_ratio", ""),
              "peak_energy_at_max_500_522_keV": best.get("peak_energy_at_max_500_522_keV", ""),
              "raw_centroid_508_514_keV": best.get("raw_centroid_508_514_keV", ""),
              "excess_centroid_508_514_keV": best.get("excess_centroid_508_514_keV", ""),
              "excess_fwhm_width_keV": best.get("excess_fwhm_width_keV", ""),
              "best_non511_6keV_window_lo": best.get("best_non511_6keV_window_lo", ""),
              "best_non511_6keV_window_hi": best.get("best_non511_6keV_window_hi", ""),
              "target_to_best_non511_6keV_sum_ratio": best.get("target_to_best_non511_6keV_sum_ratio", ""),
              "peak_centered_near_511": centered_peak,
              "full_osa_executed": False,
              "spi_science_analysis_executed": False
          }

          with open(LIGHT / "checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          if not morphology_rows:
              final_status = "R21AX_R7G_R3P_R2S_NO_SPI_OPER_MORPHOLOGY_ROW_NO_511_METRIC"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif best.get("error", ""):
              final_status = "R21AX_R7G_R3P_R2S_SPI_OPER_MORPHOLOGY_READ_ERROR"
              scientific_status = "NO_COMPLETE_MORPHOLOGY_NOT_OSA_PROOF_NO_PHYSICAL_NULL"
          elif str(target_rank) == "1" and centered_peak:
              final_status = "R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_PEAK_CENTERED_NEAR_511_RAW_SUPPORT_NOT_OSA_PROOF"
              scientific_status = "DIRECT_RAW_PEAK_MORPHOLOGY_SUPPORT_NOT_DISCOVERY_NOT_FULL_OSA"
          elif str(target_rank) == "1":
              final_status = "R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_508_514_TOP_WINDOW_BUT_CENTERING_WEAK_RAW_STRUCTURE_ONLY"
              scientific_status = "DIRECT_RAW_BROAD_STRUCTURE_NOT_DISCOVERY_NOT_FULL_OSA"
          else:
              final_status = "R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_508_514_NOT_DOMINANT_IN_MORPHOLOGY_AUDIT"
              scientific_status = "RAW_MORPHOLOGY_WEAKENED_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"

          summary = {
              "run_id": RUN_ID,
              "created_utc": now_utc(),
              "final_status": final_status,
              "scientific_status": scientific_status,
              "checks": checks,
              "method": "DIRECT_SPI_OPER_RAW_PEAK_MORPHOLOGY_CENTER_WIDTH_AUDIT_NO_FULL_OSA",
              "target_window_keV": [508.0, 514.0],
              "peak_context_keV": [500.0, 522.0],
              "local_scan_keV": [450.0, 570.0],
              "claim_ceiling": "DIRECT_RAW_OPERATIONAL_MORPHOLOGY_ONLY_NOT_FULL_OSA_PROOF_NOT_DISCOVERY"
          }

          safe_text(LIGHT / "SUMMARY.json", json.dumps(summary, indent=2))
          safe_text(
              LIGHT / "CLAIM_BOUNDARY.txt",
              "R2S tests raw peak morphology around 511 keV inside spi_oper.fits.\n"
              "It does not execute spi_science_analysis and is not OSA proof.\n"
              "A centered raw morphology is operational support only, not a detection or discovery claim.\n"
              "No physical null is implied by this direct raw audit.\n"
          )

          phone = []
          phone.append("ACIRM R2S DIRECT SPI OPER PEAK MORPHOLOGY AUDIT")
          phone.append("final_status=" + final_status)
          phone.append("scientific_status=" + scientific_status)
          for k, v in checks.items():
              phone.append(str(k) + "=" + str(v))
          safe_text(LIGHT / "PHONE_SUMMARY.txt", "\n".join(phone) + "\n")

          for logp in sorted((OUT / "logs").glob("*.log")):
              try:
                  txt = logp.read_text(encoding="utf-8", errors="replace")
                  safe_text(LIGHT / "logs" / logp.name, txt[-600000:])
              except Exception:
                  pass

          if Path(ZIP_NAME).exists():
              Path(ZIP_NAME).unlink()

          os.system("zip -r " + ZIP_NAME + " " + str(LIGHT))

          if Path(ZIP_NAME).exists():
              sha = sha256_file(ZIP_NAME)
              safe_text(ZIP_NAME + ".sha256.txt", sha + "  " + ZIP_NAME + "\n")
              print("R2S_PEAK_MORPHOLOGY_ZIP_SHA256", sha)

          print(json.dumps(summary, indent=2))
          PY

      - name: Upload R2S peak morphology artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_PEAK_MORPHOLOGY_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_PEAK_MORPHOLOGY_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3P_R2S_DIRECT_SPI_OPER_PEAK_MORPHOLOGY_LIGHT_RESULTS.zip.sha256.txt
            ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_RESULTS/logs/main_execution.log
            ACIRM_R21AX_R7G_R3P_R2S_PEAK_MORPHOLOGY_RESULTS/logs/pip_astropy_numpy.log
          if-no-files-found: warn
