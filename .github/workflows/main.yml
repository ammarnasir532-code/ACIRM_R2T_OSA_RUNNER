name: ACIRM R17K R8E NonGUI ParPatch SPI511

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  r17k-r8e-nongui-parpatch-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Prepare locked inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R8E_OUTPUTS logs scripts repo/scw/2504 repo/aux repo/ic repo/idx repo/cat selected_products pfiles
          cat > scw_ids.list <<'EOF'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          EOF
          sed -i 's/^ *//' scw_ids.list
          cp scw_ids.list ACIRM_R17K_R8E_OUTPUTS/LOCKED_SCW_IDS.txt
          cat > ACIRM_R17K_R8E_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R8E_NONGUI_PARPATCH_SPI511
          OFFICIAL_OSA_SPI_SCIENCE_NON_GUI_BINNING_ATTEMPT
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_PRODUCTS_AND_LOCKED_CONTROLS_PASS
          EOF

      - name: System diagnostics and dependencies
        shell: bash
        run: |
          set +e
          uname -a | tee logs/uname.txt
          df -h | tee logs/df_start.txt
          free -h | tee logs/free_start.txt
          docker --version | tee logs/docker_version.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y curl wget zip unzip python3-pip xvfb > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy requests > logs/pip_install.log 2>&1

      - name: Restore SCW cache from R8C
        id: restore-scw
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/scw/2504
            repo/.scw_complete_R17K_R8C
          key: acirm-r17k-r8c-scw-2504-locked8-v1

      - name: Fetch locked SCW only if cache miss
        if: steps.restore-scw.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set +e
          cd repo
          ok=1
          while read -r id; do
            [ -n "$id" ] || continue
            url="https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/2504/${id}.001/"
            echo "SCW_FETCH_START $id $url" | tee -a ../logs/scw_full_fetch.log
            timeout 45m wget -q -nH --no-check-certificate --cut-dirs=3 -r -l1 -c -N -np -R 'index*' -erobots=off --retr-symlinks "$url" >> ../logs/scw_full_fetch.log 2>&1
            ec=$?
            echo "SCW_FETCH_EXIT $id $ec" | tee -a ../logs/scw_full_fetch.log
            if [ "$ec" != "0" ]; then ok=0; fi
          done < ../scw_ids.list
          cd ..
          if [ "$ok" = "1" ]; then touch repo/.scw_complete_R17K_R8C; fi

      - name: Restore minimal OSA tree cache
        id: restore-tree
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1

      - name: Fetch minimal official IC IDX CAT tree if cache miss
        if: steps.restore-tree.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set +e
          cd repo
          echo "R17K_R8E minimal tree fetch started" > ../logs/minimal_tree_fetch.log
          fetch_tree() {
            label="$1"
            url="$2"
            limit="$3"
            echo "FETCH_START $label $url" | tee -a ../logs/minimal_tree_fetch.log
            timeout "$limit" wget -q -nH --no-check-certificate --cut-dirs=3 -r -l0 -c -N -np -R 'index*' -erobots=off --retr-symlinks "$url" >> ../logs/minimal_tree_fetch.log 2>&1
            ec=$?
            echo "FETCH_EXIT $label $ec" | tee -a ../logs/minimal_tree_fetch.log
          }
          fetch_tree ic_sc  https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/sc/ 35m
          fetch_tree ic_spi https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/spi/ 35m
          fetch_tree idx_ic  https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/ic/ 30m
          fetch_tree idx_rev https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/rev/ 30m
          fetch_tree idx_scw https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/scw/ 15m
          fetch_tree cat_hec https://heasarc.gsfc.nasa.gov/FTP/integral/data/cat/hec/ 20m
          mkdir -p aux
          cd ..
          touch repo/.tree_complete_R17K_R8E_MINIMAL

      - name: Save minimal OSA tree cache if rebuilt
        if: steps.restore-tree.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1

      - name: Inventory data
        shell: bash
        run: |
          set +e
          echo "SCW_CACHE_HIT=${{ steps.restore-scw.outputs.cache-hit }}" | tee ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_SCW_CACHE_HIT.txt
          echo "TREE_CACHE_HIT=${{ steps.restore-tree.outputs.cache-hit }}" | tee ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_TREE_CACHE_HIT.txt
          find repo -maxdepth 4 -type d | sort > ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_REPO_DIRS.txt
          find repo/ic repo/idx repo/cat repo/aux -maxdepth 6 -type f 2>/dev/null | sort > ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_IC_IDX_CAT_AUX_FILES.txt
          find repo/scw/2504 -maxdepth 2 -type f | sort > ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_SCW_FILE_INVENTORY.txt
          du -sh repo 2>/dev/null | tee ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_REPO_SIZE.txt
          df -h | tee logs/df_after_data_ready.txt

      - name: Pull OSA Docker and build non-GUI inside script
        shell: bash
        run: |
          set +e
          docker pull integralsw/osa:latest > logs/docker_pull_integralsw_osa.log 2>&1
          echo "DOCKER_PULL_EXIT=$?" | tee ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_DOCKER_PULL_EXIT.txt

          cat > scripts/r17k_r8e_inside_osa.sh <<'SH'
          set +e
          export REP_BASE_PROD=/data
          export CURRENT_IC=/data
          export ISDC_REF_CAT=/home/integral/cat/hec/gnrl_refr_cat_0043.fits[1]
          export HEADASNOQUERY=1
          export HEADASPROMPT=/dev/null
          export DISPLAY=

          if [ -f /init.sh ]; then . /init.sh || true; fi
          for init in /opt/osa/bin/osa-init.sh /opt/osa/osa-init.sh /opt/osa/init.sh /usr/local/osa/bin/osa-init.sh; do
            if [ -f "$init" ]; then . "$init" || true; fi
          done

          LIB_DIRS=$(find /opt /usr/local /usr -type f \( -name 'libGui.so' -o -name 'libdal*.so*' -o -name 'libisdc*.so*' -o -name 'libspi*.so*' \) 2>/dev/null | xargs -r -n1 dirname | sort -u | tr '\n' ':')
          export LD_LIBRARY_PATH="${LIB_DIRS}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          OG=$(find /opt /usr/local /usr -type f -name og_create 2>/dev/null | head -1)
          SP=$(find /opt /usr/local /usr -type f -name spi_science_analysis 2>/dev/null | head -1)
          [ -n "$OG" ] && export PATH="$(dirname "$OG"):$PATH"
          [ -n "$SP" ] && export PATH="$(dirname "$SP"):$PATH"

          mkdir -p /home/integral/pfiles /home/integral/ACIRM_R17K_R8E_OUTPUTS /home/integral/selected_products /home/integral/obswork
          SYS_PFILES="/opt/osa/pfiles"
          if [ -d "$SYS_PFILES" ]; then
            cp "$SYS_PFILES"/*.par /home/integral/pfiles/ 2>/dev/null || true
            export PFILES="/home/integral/pfiles;$SYS_PFILES"
          else
            export PFILES="/home/integral/pfiles"
          fi

          python3 - <<'PY'
          from pathlib import Path
          p = Path("/home/integral/pfiles/spi_science_analysis.par")
          if p.exists():
              overrides = {
                  "obs_group": 'obs_group,s,hl,"og_spi.fits",,,"Filename of input OG ?"',
                  "run_cat_extract": 'run_cat_extract,b,hl,no,,,Run catalog extractor?',
                  "run_pointing": 'run_pointing,b,hl,yes,,,Run pointing?',
                  "run_binning": 'run_binning,b,hl,yes,,,Run event binner?',
                  "run_background": 'run_background,b,hl,no,,,Run background estimator?',
                  "run_spiros": 'run_spiros,b,hl,no,,,Run SPIROS?',
                  "run_phase_analysis": 'run_phase_analysis,b,hl,no,,,Run phase analysis?',
                  "run_gaincorrection": 'run_gaincorrection,b,hl,no,,,Write gain corrected data to disk?',
                  "run_fullcheck": 'run_fullcheck,b,hl,no,,,Check for availability of all IC files used by the pipeline at startup?',
                  "use_background_flatfields": 'use_background_flatfields,b,hl,no,,,"Use archival flatfield observations to estimate the background?"',
                  "use_background_templates": 'use_background_templates,b,hl,no,,,"Use templates to estimate the background?"',
                  "use_background_models": 'use_background_models,b,hl,no,,,"Use tracers to estimate the background?"',
                  "spibounds_nregions": 'spibounds_nregions,i,hl,3,1,,Number of regions:',
                  "spibounds_regions": 'spibounds_regions,s,hl,"490,500,508,514,522,532",,,"Region bounds [keV]:"',
                  "spibounds_nbins": 'spibounds_nbins,s,hl,"1,1,1",,,"Number of bins in regions:"',
              }
              out = []
              seen = set()
              for line in p.read_text(errors="replace").splitlines():
                  key = line.split(",",1)[0].strip().lstrip("#")
                  if key in overrides:
                      out.append(overrides[key])
                      seen.add(key)
                  else:
                      out.append(line.replace(",ql,", ",hl,"))
              for k,v in overrides.items():
                  if k not in seen:
                      out.append(v)
              p.write_text("\n".join(out) + "\n", encoding="utf-8")
          PY

          cd /home/integral
          {
            echo "=== R17K_R8E non-GUI preflight ==="
            echo "REP_BASE_PROD=$REP_BASE_PROD"
            echo "CURRENT_IC=$CURRENT_IC"
            echo "ISDC_REF_CAT=$ISDC_REF_CAT"
            echo "PFILES=$PFILES"
            echo "DISPLAY=$DISPLAY"
            which og_create || true
            which spi_science_analysis || true
            og_create --version || true
            spi_science_analysis --version || true
            echo "=== patched spi_science_analysis.par important lines ==="
            grep -E '^(obs_group|run_cat_extract|run_pointing|run_binning|run_background|run_spiros|spibounds_)' /home/integral/pfiles/spi_science_analysis.par || true
          } > ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_OSA_PREFLIGHT.txt 2>&1

          : > list_ids.txt
          while read -r id; do
            [ -n "$id" ] || continue
            echo "$id" >> list_ids.txt
          done < scw_ids.list

          mkdir -p obswork
          cd obswork
          cp /home/integral/list_ids.txt ./scw_input.list

          {
            echo "=== og_create exact R7 successful pattern ==="
            echo "COMMAND: og_create idxSwg=./scw_input.list ogid=acirm_r17k_r8e baseDir=. instrument=SPI"
            cat ./scw_input.list
          } > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_OG_CREATE.log

          og_create idxSwg=./scw_input.list ogid=acirm_r17k_r8e baseDir=. instrument=SPI >> /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_OG_CREATE.log 2>&1
          og_ec=$?
          echo "OG_CREATE_EXIT=$og_ec" > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_OG_CREATE_EXIT.txt

          first_og=$(find /home/integral/obswork /home/integral -type f -name 'og_spi.fits' 2>/dev/null | head -1)
          echo "$first_og" > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_FIRST_OG_SPI_PATH.txt
          if [ -n "$first_og" ]; then
            cp "$first_og" /home/integral/selected_products/og_spi.fits 2>/dev/null || true
          else
            echo "NO_OG_SPI_CREATED_SKIP_SPI_SCIENCE" > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_SPI_SCIENCE_ANALYSIS_EXIT.txt
            exit 0
          fi

          og_dir=$(dirname "$first_og")
          cd "$og_dir"

          {
            echo "=== SPI science non-GUI parpatch attempt ==="
            echo "PWD=$(pwd)"
            echo "OG=$first_og"
            echo "PFILES=$PFILES"
          } > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_SPI_SCIENCE_CONTEXT.txt

          timeout 90m bash -lc 'spi_science_analysis' > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_SPI_SCIENCE_STDOUT.log 2>&1
          spi_ec=$?
          echo "SPI_SCIENCE_ANALYSIS_NONGUI_PARPATCH_EXIT=$spi_ec" > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_SPI_SCIENCE_ANALYSIS_EXIT.txt

          find /home/integral -type f \( -iname '*evts*det*spec*' -o -iname '*energy*bound*' -o -iname '*ebounds*' -o -iname 'og_spi.fits' -o -iname '*spi*spect*' \) 2>/dev/null | sort > /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_PRODUCTS_FOUND.txt
          while read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -le 200000000 ]; then cp -f "$f" /home/integral/selected_products/ 2>/dev/null || true; fi
          done < /home/integral/ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_PRODUCTS_FOUND.txt
          SH
          chmod +x scripts/r17k_r8e_inside_osa.sh

      - name: Run OSA R8E non-GUI parpatch
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/home/integral" \
            -v "$PWD/repo/scw:/data/scw:ro" \
            -v "$PWD/repo/aux:/data/aux:ro" \
            -v "$PWD/repo/ic:/data/ic:ro" \
            -v "$PWD/repo/idx:/data/idx:ro" \
            -v "$PWD/repo/cat:/home/integral/cat:ro" \
            --entrypoint="" \
            integralsw/osa:latest bash -lc 'bash /home/integral/scripts/r17k_r8e_inside_osa.sh' > logs/r17k_r8e_osa_run.log 2>&1
          echo "R17K_R8E_OSA_RUN_EXIT=$?" | tee ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_OSA_RUN_EXIT.txt

      - name: Inspect selected products and 511 rows
        shell: bash
        run: |
          set +e
          cp logs/*.log ACIRM_R17K_R8E_OUTPUTS/ 2>/dev/null || true
          find selected_products -maxdepth 1 -type f -printf '%f,%s\n' | sort > ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_SELECTED_PRODUCTS_MANIFEST.csv || true
          cat > scripts/inspect_final.py <<'PY'
          import json, csv, math
          from pathlib import Path
          import numpy as np
          try:
              from astropy.io import fits
          except Exception:
              fits = None
          OUT=Path('ACIRM_R17K_R8E_OUTPUTS')
          PROD=Path('selected_products')
          rows=[]; meas=[]; errs=[]
          LINE=(508.0,514.0); SB1=(490.0,500.0); SB2=(522.0,532.0)
          E_PAIRS=[('E_MIN','E_MAX'),('ENERG_LO','ENERG_HI'),('ENERGY_LO','ENERGY_HI'),('E_LO','E_HI'),('EMIN','EMAX'),('E_LOW','E_HIGH')]
          E_SINGLE=['ENERGY','E','E_MEAN','E_CENTER','PI','PHA','CHANNEL','CHAN']
          C_COLS=['COUNTS','COUNT','RATE','SPECTRUM','SPEC','DATA','FLUX','VALUE','NCOUNTS']
          def arr(x): return np.asarray(x,dtype=float)
          def collapse(x,n):
              a=np.nan_to_num(arr(x),nan=0.0,posinf=0.0,neginf=0.0)
              if a.size==n: return a.reshape(-1)[:n]
              if a.ndim>=2 and a.shape[-1]==n: return a.sum(axis=tuple(range(a.ndim-1))).reshape(-1)
              if a.ndim>=2 and a.shape[0]==n: return a.sum(axis=tuple(range(1,a.ndim))).reshape(-1)
              return None
          def measure_edges(lo,hi,cnt):
              lo=arr(lo).reshape(-1); hi=arr(hi).reshape(-1); n=min(len(lo),len(hi))
              if n==0: return None
              lo=lo[:n]; hi=hi[:n]; c=collapse(cnt,n)
              if c is None: return None
              width=np.maximum(1e-12,hi-lo)
              def frac(w): return np.maximum(0,np.minimum(hi,w[1])-np.maximum(lo,w[0]))/width
              line=float((c*frac(LINE)).sum()); sb1=float((c*frac(SB1)).sum()); sb2=float((c*frac(SB2)).sum()); side=sb1+sb2
              ratio=(line/6)/(side/20) if side>0 else math.inf
              exp=side/20*6 if side>0 else math.nan
              z=(line-exp)/math.sqrt(exp) if exp and exp>0 else math.nan
              return {'line_508_514_counts':line,'side_490_500_counts':sb1,'side_522_532_counts':sb2,'side_total_counts':side,'line_to_side_density_ratio':ratio,'expected_line_from_side_density':exp,'z_vs_side_density':z,'energy_bins':n}
          def measure_centers(e,cnt):
              e=arr(e).reshape(-1); c=collapse(cnt,len(e))
              if c is None or len(e)==0: return None
              line=float(np.nansum(c[(e>=LINE[0])&(e<=LINE[1])]))
              sb1=float(np.nansum(c[(e>=SB1[0])&(e<=SB1[1])]))
              sb2=float(np.nansum(c[(e>=SB2[0])&(e<=SB2[1])]))
              side=sb1+sb2
              ratio=(line/6)/(side/20) if side>0 else math.inf
              exp=side/20*6 if side>0 else math.nan
              z=(line-exp)/math.sqrt(exp) if exp and exp>0 else math.nan
              return {'line_508_514_counts':line,'side_490_500_counts':sb1,'side_522_532_counts':sb2,'side_total_counts':side,'line_to_side_density_ratio':ratio,'expected_line_from_side_density':exp,'z_vs_side_density':z,'energy_bins':len(e)}
          if fits:
              for p in PROD.glob('*'):
                  if not p.name.lower().endswith(('.fits','.fit','.fits.gz','.fit.gz')): continue
                  try:
                      with fits.open(p,memmap=True) as hdul:
                          for i,hdu in enumerate(hdul):
                              cols=[]; nrows=''
                              if hasattr(hdu,'columns') and hdu.columns is not None: cols=list(hdu.columns.names or [])
                              try: nrows=len(hdu.data) if getattr(hdu,'data',None) is not None else ''
                              except Exception: nrows=''
                              rows.append({'file':p.name,'hdu_index':i,'hdu_name':hdu.name or '', 'class':hdu.__class__.__name__,'rows':nrows,'column_count':len(cols),'columns':';'.join(cols[:120])})
                              if not (hasattr(hdu,'columns') and hdu.columns is not None and hdu.data is not None): continue
                              cmap={c.upper():c for c in cols}
                              for a,b in E_PAIRS:
                                  if a in cmap and b in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap:
                                              m=measure_edges(hdu.data[cmap[a]],hdu.data[cmap[b]],hdu.data[cmap[ck]])
                                              if m: m.update({'file':p.name,'hdu_index':i,'hdu_name':hdu.name or '', 'method':'same_hdu_edges','energy_source':cmap[a]+'|'+cmap[b], 'count_source':cmap[ck]}); meas.append(m)
                              for ek in E_SINGLE:
                                  if ek in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap and ck!=ek:
                                              m=measure_centers(hdu.data[cmap[ek]],hdu.data[cmap[ck]])
                                              if m: m.update({'file':p.name,'hdu_index':i,'hdu_name':hdu.name or '', 'method':'same_hdu_centers','energy_source':cmap[ek], 'count_source':cmap[ck]}); meas.append(m)
                  except Exception as e:
                      errs.append({'file':str(p),'error':repr(e)[:300]})
          def write_csv(path,data):
              keys=[]
              for r in data:
                  for k in r:
                      if k not in keys: keys.append(k)
              if not keys: keys=['empty']
              with open(path,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=keys); w.writeheader()
                  for r in data: w.writerow({k:r.get(k,'') for k in keys})
          write_csv(OUT/'R17K_R8E_SELECTED_PRODUCT_SCHEMA.csv',rows)
          write_csv(OUT/'R17K_R8E_DIRECT_511_MEASUREMENT_ROWS.csv',meas)
          (OUT/'R17K_R8E_PRODUCT_INSPECTION_ERRORS.json').write_text(json.dumps(errs,indent=2),encoding='utf-8')
          selected=list(PROD.glob('*'))
          og_path=(OUT/'R17K_R8E_FIRST_OG_SPI_PATH.txt')
          og_success=og_path.exists() and bool(og_path.read_text(errors='replace').strip())
          decision='R17K_R8E_NO_OG_SPI_CREATED_NO_OFFICIAL_PRODUCTS'
          if og_success: decision='R17K_R8E_OG_SPI_CREATED_DIAGNOSTIC_NOT_PROOF'
          if any(('evts' in p.name.lower() or 'energy' in p.name.lower() or 'ebounds' in p.name.lower()) for p in selected): decision='R17K_R8E_OFFICIAL_SPI_PRODUCTS_FOUND_DIAGNOSTIC_NOT_PROOF'
          if meas: decision='R17K_R8E_DIRECT_511_ROWS_FROM_OFFICIAL_PRODUCTS_FOUND_DIAGNOSTIC_NOT_PROOF'
          summary={'decision':decision,'proof_allowed':False,'selected_product_count':len(selected),'og_success':og_success,'direct_511_measurement_rows':len(meas),'schema_rows':len(rows),'claim_ceiling':['OFFICIAL_OSA_SPI_SCIENCE_NON_GUI_BINNING_ATTEMPT','NOT_DISCOVERY','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_LOCKED_CONTROLS_PASS']}
          (OUT/'R17K_R8E_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          PY
          python3 scripts/inspect_final.py > logs/inspect_final.log 2>&1

      - name: Package slim artifact
        shell: bash
        run: |
          set +e
          cp logs/*.log ACIRM_R17K_R8E_OUTPUTS/ 2>/dev/null || true
          cp -r selected_products ACIRM_R17K_R8E_OUTPUTS/selected_products 2>/dev/null || true
          df -h > ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_DF_END.txt
          free -h > ACIRM_R17K_R8E_OUTPUTS/R17K_R8E_FREE_END.txt
          zip -r ACIRM_R17K_R8E_NONGUI_PARPATCH_SPI511_OUTPUT.zip ACIRM_R17K_R8E_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R8E_NONGUI_PARPATCH_SPI511_OUTPUT.zip > ACIRM_R17K_R8E_NONGUI_PARPATCH_SPI511_OUTPUT.zip.sha256.txt
