name: ACIRM R17K R8X Cache Only Line Governance SPI511

on:
  workflow_dispatch:
    inputs:
      target_start:
        required: false
        default: '244600170010'
      target_end:
        required: false
        default: '244600210010'
      rev_center:
        required: false
        default: '2446'

permissions:
  contents: read
  actions: write

jobs:
  r17k-r8x-cache-only-line-governance:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TARGET_START: ${{ inputs.target_start }}
      TARGET_END: ${{ inputs.target_end }}
      REV_CENTER: ${{ inputs.rev_center }}
    steps:
      - name: Prepare
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R8X_OUTPUTS logs scripts repo/scw repo/ic repo/idx repo/cat repo/aux
          cat > ACIRM_R17K_R8X_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R8X_CACHE_ONLY_LINE_RESPONSE_GOVERNANCE
          USES EXISTING R8W/R8V/R8U CACHE ONLY; NO NEW SPI DOWNLOAD
          TESTS WHETHER BROAD 507-515 SUPPORT IS GOVERNED OR POST-HOC
          LOCKED PRIMARY BAND REMAINS 508-514 KEV
          BROAD BAND IS DIAGNOSTIC SUPPORT ONLY UNLESS GOVERNANCE PASSES
          NOT_DISCOVERY / NOT_PARTICLE_PROOF / NOT_SOURCE_ATTRIBUTION / NOT_OFFICIAL_SPI_511_LINE_PROOF
          EOF
          printf 'TARGET_START=%s\nTARGET_END=%s\nREV_CENTER=%s\n' "$TARGET_START" "$TARGET_END" "$REV_CENTER" > ACIRM_R17K_R8X_OUTPUTS/R17K_R8X_INPUTS.txt

      - name: Restore spectra cache
        id: restore-wide
        uses: actions/cache/restore@v4
        with:
          path: repo/scw
          key: acirm-r17k-r8x-cache-only-rev${{ inputs.rev_center }}-${{ inputs.target_start }}-${{ inputs.target_end }}-v1
          restore-keys: |
            acirm-r17k-r8w-r2-rev${{ inputs.rev_center }}-
            acirm-r17k-r8w-rev${{ inputs.rev_center }}-
            acirm-r17k-r8v-targeted-rev${{ inputs.rev_center }}-
            acirm-r17k-r8u-wide-spi-spectra-
            acirm-r17k-r8t-wide-spi-spectra-

      - name: Restore calibration cache
        id: restore-tree
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1
          restore-keys: |
            acirm-r17k-r8e-minimal-osa-tree-

      - name: Install tools
        shell: bash
        run: |
          set +e
          echo "SPECTRA_CACHE_HIT=${{ steps.restore-wide.outputs.cache-hit }}" | tee ACIRM_R17K_R8X_OUTPUTS/R17K_R8X_SPECTRA_CACHE_HIT.txt
          echo "TREE_CACHE_HIT=${{ steps.restore-tree.outputs.cache-hit }}" | tee ACIRM_R17K_R8X_OUTPUTS/R17K_R8X_TREE_CACHE_HIT.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip python3-pip > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy > logs/pip_install.log 2>&1

      - name: Run cache-only R8X governance
        shell: bash
        run: |
          set +e
          cat > scripts/r8x_cache_only.py <<'PY'
          import os,re,csv,json,math,warnings
          from pathlib import Path
          import numpy as np
          from astropy.io import fits
          OUT=Path('ACIRM_R17K_R8X_OUTPUTS'); SCW=Path('repo/scw'); IC=Path('repo/ic')
          TS=os.environ.get('TARGET_START','244600170010'); TE=os.environ.get('TARGET_END','244600210010'); RC=os.environ.get('REV_CENTER','2446')
          LOCK=(508.,514.); BROAD=(507.,515.); LOW=(507.,508.); HIGH=(514.,515.); SB1=(490.,500.); SB2=(522.,532.); FAR1=(480.,500.); FAR2=(522.,542.)
          ERR=[]; CAL=[]; ROW=[]; TARGET=[]; ROLL=[]; WING=[]; CEN=[]
          def wcsv(p,rows):
              ks=[]
              for r in rows:
                  for k in r:
                      if k not in ks: ks.append(k)
              if not ks: ks=['empty']
              with open(p,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=ks); w.writeheader(); [w.writerow({k:r.get(k,'') for k in ks}) for r in rows]
          def sf(x):
              try:
                  y=float(x); return y if math.isfinite(y) else float('nan')
              except Exception: return float('nan')
          def cm(cols,n): return {c.upper():c for c in cols}.get(n.upper())
          def sid(p):
              m=re.search(r'(\d{12})\.001',str(p)); return m.group(1) if m else ''
          def poly(c,x,asc=True):
              c=np.asarray(c,float).reshape(-1)
              with warnings.catch_warnings():
                  warnings.simplefilter('ignore'); return np.polynomial.polynomial.polyval(x,c) if asc else np.polyval(c,x)
          def inv(c,n,asc=True):
              e=np.linspace(0,12000,60001); ch=poly(c,e,asc); ok=np.isfinite(ch)
              if ok.sum()<20: return None
              ch=ch[ok]; e=e[ok]; ix=np.argsort(ch); ch=ch[ix]; e=e[ix]; ch,u=np.unique(ch,return_index=True); e=e[u]
              return np.interp(np.arange(n,dtype=float),ch,e,left=np.nan,right=np.nan) if len(ch)>=20 else None
          def models(ck,kc,n):
              x=np.arange(n,dtype=float); out=[]
              if ck is not None:
                  c=np.asarray(ck,float).reshape(-1)
                  if c.size==n: out.append(('CHAN_KEV_VECTOR',c))
                  if 0<c.size<=16: out += [('CHAN_KEV_ASC_POLY',poly(c,x,True)),('CHAN_KEV_DESC_POLY',poly(c,x,False))]
              if kc is not None:
                  c=np.asarray(kc,float).reshape(-1)
                  if 0<c.size<=16:
                      a=inv(c,n,True); d=inv(c,n,False)
                      if a is not None: out.append(('KEV_CHAN_ASC_INVERTED',a))
                      if d is not None: out.append(('KEV_CHAN_DESC_INVERTED',d))
              return out
          def good(e):
              e=np.asarray(e,float).reshape(-1); ok=np.isfinite(e)
              if ok.sum()<20: return False
              ee=e[ok]; return (np.mean(np.diff(ee)>0)>.95 and np.nanmin(ee)<=480 and np.nanmax(ee)>=542)
          def edges(e):
              e=np.asarray(e,float).reshape(-1); m=(e[:-1]+e[1:])/2; b=np.r_[e[0]-(m[0]-e[0]),m,e[-1]+(e[-1]-m[-1])]
              return np.minimum(b[:-1],b[1:]),np.maximum(b[:-1],b[1:])
          def bc(c,lo,hi,band):
              n=min(len(c),len(lo),len(hi)); c=np.nan_to_num(np.asarray(c[:n],float),nan=0,posinf=0,neginf=0); lo=np.asarray(lo[:n]); hi=np.asarray(hi[:n])
              f=np.maximum(0,np.minimum(hi,band[1])-np.maximum(lo,band[0]))/np.maximum(1e-12,hi-lo)
              return float((c*f).sum())
          def metric(items,line=LOCK,left=SB1,right=SB2):
              lc=s1=s2=raw=0.; det={}; scw={}
              for it in items:
                  raw+=float(np.nansum(it['c'])); v=bc(it['c'],it['lo'],it['hi'],line); a=bc(it['c'],it['lo'],it['hi'],left); b=bc(it['c'],it['lo'],it['hi'],right)
                  lc+=v; s1+=a; s2+=b; det[it['det']]=det.get(it['det'],0)+v; scw[it['scw']]=scw.get(it['scw'],0)+v
              side=s1+s2; lw=line[1]-line[0]; sw=(left[1]-left[0])+(right[1]-right[0]); exp=side/sw*lw if side>0 else float('nan')
              ratio=(lc/lw)/(side/sw) if side>0 else float('inf'); z=(lc-exp)/math.sqrt(exp) if exp and exp>0 else float('nan')
              return dict(rows=len(items),line_counts=lc,side_counts=side,expected=exp,ratio=ratio,z=z,raw_total_counts=raw,max_detector_share=(max(det.values())/lc if lc>0 and det else float('nan')),max_scw_share=(max(scw.values())/lc if lc>0 and scw else float('nan')))
          def rank_placebo(items,z,w):
              zs=[]
              for st in np.arange(430,590.1,2):
                  b=(float(st),float(st+w))
                  if max(b[0],488)<min(b[1],516) or max(b[0],520)<min(b[1],534): continue
                  m=metric(items,b,(b[0]-18,b[0]-8),(b[1]+8,b[1]+18))
                  if math.isfinite(sf(m['z'])): zs.append(sf(m['z']))
              return 1+sum(1 for v in zs if math.isfinite(z) and v>z) if math.isfinite(z) else '',len(zs),max(zs) if zs else float('nan')
          def add(bucket,scope,items,line_id,line,left=SB1,right=SB2,extra=None):
              m=metric(items,line,left,right); r,n,pm=rank_placebo(items,sf(m['z']),line[1]-line[0]); row=dict(scope=scope,line_id=line_id,rank=r,placebo_n=n,placebo_max_z=pm,line_min=line[0],line_max=line[1],**m,**(extra or {})); bucket.append(row); return row
          for p in sorted(set(list(IC.glob('**/spi_coef_cal_*.fits'))+list(IC.glob('**/*coef*cal*.fits')))):
              try:
                  with fits.open(p,memmap=True) as hd:
                      for h in hd:
                          cols=list(h.columns.names or []) if hasattr(h,'columns') and h.columns is not None else []
                          if h.data is None: continue
                          dc=cm(cols,'DET_ID'); ec=cm(cols,'E_RANGE'); ck=cm(cols,'CHAN_KEV'); kc=cm(cols,'KEV_CHAN'); os0=cm(cols,'OBT_START'); oe0=cm(cols,'OBT_END')
                          if not (dc and ec and (ck or kc)): continue
                          for i in range(len(h.data)): CAL.append(dict(file=str(p),det=int(h.data[dc][i]),er=int(h.data[ec][i]),os=sf(h.data[os0][i]) if os0 else float('nan'),oe=sf(h.data[oe0][i]) if oe0 else float('nan'),ck=np.asarray(h.data[ck][i],float).reshape(-1) if ck else None,kc=np.asarray(h.data[kc][i],float).reshape(-1) if kc else None))
              except Exception as e: ERR.append(dict(stage='cal',file=str(p),error=repr(e)[:220]))
          def mcal(det,er,mid):
              rr=[x for x in CAL if x['det']==det and x['er']==er]
              if not rr: return None
              inn=[x for x in rr if math.isfinite(mid) and math.isfinite(x['os']) and math.isfinite(x['oe']) and x['os']<=mid<=x['oe']]
              return inn[0] if inn else sorted(rr,key=lambda x:(x['file'],x['os']))[-1]
          items=[]; spectra=sorted(SCW.glob('**/spi_spectra.fits.gz'))
          for p in spectra:
              scw=sid(p); rev=scw[:4]
              try:
                  with fits.open(p,memmap=True) as hd:
                      for h in hd:
                          if h.name!='SPI.-ACOF-RAW' or h.data is None: continue
                          cols=list(h.columns.names or []); dc=cm(cols,'DET_ID'); ec=cm(cols,'E_RANGE'); cc=cm(cols,'COUNTS'); ls=cm(cols,'LOBT_START'); le=cm(cols,'LOBT_END')
                          if not (dc and ec and cc): continue
                          for i in range(len(h.data)):
                              det=int(h.data[dc][i]); er=int(h.data[ec][i]); c=np.asarray(h.data[cc][i],float).reshape(-1); a=sf(h.data[ls][i]) if ls else float('nan'); b=sf(h.data[le][i]) if le else float('nan'); mid=(a+b)/2 if math.isfinite(a) and math.isfinite(b) else float('nan')
                              ca=mcal(det,er,mid); base=dict(rev=rev,scw=scw,row=i,det=det,er=er,raw=float(np.nansum(c)))
                              if ca is None: ROW.append({**base,'status':'NO_CAL'}); continue
                              cand=[]
                              for mn,e in models(ca['ck'],ca['kc'],len(c)):
                                  if good(e): cand.append((mn,e))
                              if not cand: ROW.append({**base,'status':'NO_MODEL'}); continue
                              mn,e=cand[0]; lo,hi=edges(e); it={**base,'c':c,'lo':lo,'hi':hi,'model':mn}; items.append(it); m=metric([it]); ROW.append({**base,'status':'OK','line':m['line_counts'],'side':m['side_counts'],'z':m['z']})
              except Exception as e: ERR.append(dict(stage='spectra',file=str(p),error=repr(e)[:220]))
          scws=sorted({x['scw'] for x in items}); center=[s for s in scws if s[:4]==RC]; target=[s for s in center if TS<=s<=TE] or [s for s in scws if TS<=s<=TE]; width=max(1,len(target)); tgt=[x for x in items if x['scw'] in set(target)]
          locked=add(TARGET,'TARGET',tgt,'LOCKED_508_514',LOCK,extra=dict(window_width=width,scw_start=target[0] if target else '',scw_end=target[-1] if target else '')) if tgt else {}
          broad=add(TARGET,'TARGET',tgt,'BROAD_507_515',BROAD,extra=dict(window_width=width,scw_start=target[0] if target else '',scw_end=target[-1] if target else '')) if tgt else {}
          broad_far=add(TARGET,'TARGET',tgt,'BROAD_507_515_FAR',BROAD,FAR1,FAR2,extra=dict(window_width=width)) if tgt else {}
          if tgt:
              low=metric(tgt,LOW); high=metric(tgt,HIGH); lex=sf(locked.get('line_counts'))-sf(locked.get('expected')); bex=sf(broad.get('line_counts'))-sf(broad.get('expected'))
              lowex=sf(low.get('line_counts'))-sf(low.get('expected')); highex=sf(high.get('line_counts'))-sf(high.get('expected')); wp=max(0,lowex)+max(0,highex); bal=min(max(0,lowex),max(0,highex))/wp if wp>0 else float('nan')
              WING.append(dict(locked_excess=lex,broad_excess=bex,extra_broad_excess=bex-lex,low_wing_excess=lowex,high_wing_excess=highex,positive_wing_excess=wp,wing_balance_0_to_0p5=bal,low_wing_z=low.get('z'),high_wing_z=high.get('z')))
              for w in [6,7,8,9,10]:
                  for cen in np.arange(510,512.01,.5):
                      line=(float(cen-w/2),float(cen+w/2))
                      if line[0]<506 or line[1]>516: continue
                      m=metric(tgt,line); r,n,pm=rank_placebo(tgt,sf(m['z']),w); CEN.append(dict(center=cen,width=w,rank=r,placebo_n=n,placebo_max_z=pm,claim='CENTROID_DIAGNOSTIC_NOT_PROOF',**m))
          for rv in [str(int(RC)-1),RC,str(int(RC)+1)]:
              base=[s for s in scws if s[:4]==rv]
              for i in range(max(0,len(base)-width+1)):
                  ss=base[i:i+width]; sub=[x for x in items if x['scw'] in set(ss)]
                  if not sub: continue
                  row=add(ROLL,'ROLLING',sub,'LOCKED_508_514',LOCK,extra=dict(rev=rv,scw_start=ss[0],scw_end=ss[-1],window_width=width,is_target=(ss==target)))
                  mb=metric(sub,BROAD); row.update(dict(broad_z=mb['z'],broad_ratio=mb['ratio']))
          def vals(rows,k):
              out=[]
              for r in rows:
                  v=sf(r.get(k))
                  if math.isfinite(v): out.append(v)
              return out
          nt=[r for r in ROLL if not r.get('is_target')]; max_lock=max(vals(nt,'z') or [float('nan')]); max_broad=max(vals(nt,'broad_z') or [float('nan')]); best=sorted([r for r in CEN if math.isfinite(sf(r.get('z')))],key=lambda r:(sf(r.get('z')),sf(r.get('ratio'))),reverse=True)[0] if CEN else {}
          lz=sf(locked.get('z')); lr=sf(locked.get('ratio')); lrank=locked.get('rank',''); bz=sf(broad.get('z')); br=sf(broad.get('ratio')); brank=broad.get('rank',''); maxdet=sf(locked.get('max_detector_share'))
          broad_governed=(bz>=3 and br>=1.10 and brank!='' and int(brank)<=5 and lz>=2.8 and maxdet<=.40 and (not math.isfinite(max_broad) or bz>max_broad) and best and abs(sf(best.get('center'))-511)<=1.0)
          notes=[]; back=False
          if not tgt: dec='R17K_R8X_TARGET_NOT_FOUND_OR_CACHE_MISS'
          elif lz>=3 and lr>=1.10 and lrank!='' and int(lrank)<=5 and (not math.isfinite(max_lock) or lz>max_lock) and maxdet<=.40:
              dec='R17K_R8X_LOCKED_508_514_MODERATE_CLEAN_BACKTRACE_READY_NOT_PROOF'; back=True
          elif broad_governed:
              dec='R17K_R8X_BROAD_507_515_GOVERNED_MODERATE_DIAGNOSTIC_LOCKED_STILL_WEAK_NO_BACKTRACE_NOT_PROOF'; notes.append('broad is governed diagnostic support; locked remains below z=3')
          elif lz>=2 and lr>=1.05: dec='R17K_R8X_ROBUST_WEAK_LOCKED_511_HINT_NOT_GOVERNED_MODERATE_NOT_PROOF'
          else: dec='R17K_R8X_511_HINT_NOT_CONFIRMED_BY_GOVERNANCE_NOT_PROOF'
          if math.isfinite(max_broad) and math.isfinite(bz) and max_broad>=bz: notes.append('non-target rolling broad z matches/exceeds target')
          wcsv(OUT/'R17K_R8X_TARGET_LINE_GOVERNANCE.csv',TARGET); wcsv(OUT/'R17K_R8X_WING_SYMMETRY.csv',WING); wcsv(OUT/'R17K_R8X_CENTROID_SCAN.csv',CEN); wcsv(OUT/'R17K_R8X_ROLLING_REPLICATION.csv',ROLL); wcsv(OUT/'R17K_R8X_ROW_MEASUREMENTS.csv',ROW)
          (OUT/'R17K_R8X_ERRORS.json').write_text(json.dumps(ERR,indent=2),encoding='utf-8')
          (OUT/'R17K_R8X_THEORY_LINK_NOTE.txt').write_text('R8X is governance only: broad 507-515 can become diagnostic support, not proof. ACIRM reverse trace remains blocked unless locked 508-514 itself validates moderate/strong.\n',encoding='utf-8')
          summary=dict(run_id='R17K_R8X_CACHE_ONLY_LINE_RESPONSE_GOVERNANCE',decision=dec,proof_allowed=False,backtrace_permission=back,broad_governed_diagnostic=broad_governed,spectra_files_found=len(spectra),calibration_rows_found=len(CAL),calibrated_rows_used=len(items),target_scws=target,target_rows=len(tgt),locked_metric=locked,broad_metric=broad,broad_far_metric=broad_far,wing_symmetry=WING[0] if WING else {},best_centroid_scan=best,max_non_target_locked_z=max_lock,max_non_target_broad_z=max_broad,max_detector_line_share=maxdet,notes=notes,claim_ceiling=['DIAGNOSTIC_NOT_PROOF','NOT_DISCOVERY','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_OFFICIAL_SPI_511_LINE_PROOF'])
          (OUT/'R17K_R8X_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          PY
          python3 scripts/r8x_cache_only.py > logs/r8x_python.log 2>&1
          echo "PYTHON_EXIT=$?" | tee ACIRM_R17K_R8X_OUTPUTS/R17K_R8X_PYTHON_EXIT.txt

      - name: Save spectra cache
        if: always() && steps.restore-wide.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: repo/scw
          key: acirm-r17k-r8x-cache-only-rev${{ inputs.rev_center }}-${{ inputs.target_start }}-${{ inputs.target_end }}-v1

      - name: Package artifact always
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R8X_OUTPUTS logs
          cp logs/*.log ACIRM_R17K_R8X_OUTPUTS/ 2>/dev/null || true
          find repo/scw -maxdepth 6 -type f -name 'spi_spectra.fits.gz' -printf '%p,%s\n' | sort > ACIRM_R17K_R8X_OUTPUTS/R17K_R8X_FINAL_SPECTRA_FILE_SIZES.csv 2>/dev/null || true
          df -h > ACIRM_R17K_R8X_OUTPUTS/R17K_R8X_DF_END.txt
          free -h > ACIRM_R17K_R8X_OUTPUTS/R17K_R8X_FREE_END.txt
          zip -r ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT.zip ACIRM_R17K_R8X_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT.zip > ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT.zip ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT.zip.sha256.txt

      - name: Upload artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT
          path: |
            ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT.zip
            ACIRM_R17K_R8X_CACHE_ONLY_LINE_GOVERNANCE_SPI511_OUTPUT.zip.sha256.txt
          retention-days: 7
