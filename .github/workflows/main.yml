name: ACIRM R17K R8N Comprehensive Single Cell SPI511

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  r17k-r8n-comprehensive-single-cell-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare locked inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R8N_OUTPUTS logs scripts repo/scw/2504 repo/aux repo/ic repo/idx repo/cat selected_products
          cat > scw_ids.list <<'EOF'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          EOF
          sed -i 's/^ *//' scw_ids.list
          cp scw_ids.list ACIRM_R17K_R8N_OUTPUTS/LOCKED_SCW_IDS.txt
          cat > ACIRM_R17K_R8N_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511
          OFFICIAL_OSA_OG_CREATE_PLUS_MULTI_ATTEMPT_SPI_SCIENCE_PLUS_RAW_SPI_SPECTRA_511_AUDIT
          USES_EXISTING_LOCKED_CACHES_ONLY
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_OFFICIAL_PRODUCTS_AND_LOCKED_CONTROLS_PASS
          EOF

      - name: Restore SCW cache
        id: restore-scw
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/scw/2504
            repo/.scw_complete_R17K_R8C
          key: acirm-r17k-r8c-scw-2504-locked8-v1

      - name: Restore minimal OSA tree cache
        id: restore-tree
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1

      - name: Stop if caches are missing
        shell: bash
        run: |
          set +e
          echo "SCW_CACHE_HIT=${{ steps.restore-scw.outputs.cache-hit }}" | tee ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SCW_CACHE_HIT.txt
          echo "TREE_CACHE_HIT=${{ steps.restore-tree.outputs.cache-hit }}" | tee ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_TREE_CACHE_HIT.txt
          if [ "${{ steps.restore-scw.outputs.cache-hit }}" != "true" ] || [ "${{ steps.restore-tree.outputs.cache-hit }}" != "true" ]; then
            echo "CACHE_MISS_NO_RERUN_DOWNLOAD_IN_R8N" | tee ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_CACHE_STATUS.txt
            zip -r ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip ACIRM_R17K_R8N_OUTPUTS
            sha256sum ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip > ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip.sha256.txt
            exit 0
          fi
          echo "CACHE_OK_PROCEED_OSA" | tee ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_CACHE_STATUS.txt

      - name: System diagnostics and dependencies
        shell: bash
        run: |
          set +e
          uname -a | tee logs/uname.txt
          df -h | tee logs/df_start.txt
          free -h | tee logs/free_start.txt
          docker --version | tee logs/docker_version.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y curl wget zip unzip python3-pip xvfb > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy requests > logs/pip_install.log 2>&1
          find repo -maxdepth 4 -type d | sort > ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_REPO_DIRS.txt
          find repo/ic repo/idx repo/cat repo/aux -maxdepth 6 -type f 2>/dev/null | sort > ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_IC_IDX_CAT_AUX_FILES.txt
          find repo/scw/2504 -maxdepth 4 -type f 2>/dev/null | sort > ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SCW_FILE_INVENTORY.txt
          du -sh repo 2>/dev/null | tee ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_REPO_SIZE.txt

      - name: Pull OSA Docker and build comprehensive script
        shell: bash
        run: |
          set +e
          docker pull integralsw/osa:latest > logs/docker_pull_integralsw_osa.log 2>&1
          echo "DOCKER_PULL_EXIT=$?" | tee ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_DOCKER_PULL_EXIT.txt

          cat > scripts/r17k_r8n_inside_osa.sh <<'SH'
          set +e

          export REP_BASE_PROD=/data
          export CURRENT_IC=/data
          export HEADASNOQUERY=1
          export HEADASPROMPT=/dev/null
          export DISPLAY=${DISPLAY:-:99}

          if [ -f /init.sh ]; then . /init.sh || true; fi
          for init in /opt/osa/bin/osa-init.sh /opt/osa/osa-init.sh /opt/osa/init.sh /usr/local/osa/bin/osa-init.sh; do
            if [ -f "$init" ]; then . "$init" || true; fi
          done

          if [ -f /data/cat/hec/gnrl_refr_cat_0043.fits ]; then
            export ISDC_REF_CAT=/data/cat/hec/gnrl_refr_cat_0043.fits
          elif [ -f /home/integral/cat/hec/gnrl_refr_cat_0043.fits ]; then
            export ISDC_REF_CAT=/home/integral/cat/hec/gnrl_refr_cat_0043.fits
          fi

          LIB_DIRS=$(find /opt /usr/local /usr -type f \( -name 'libGui.so' -o -name 'libdal*.so*' -o -name 'libisdc*.so*' -o -name 'libspi*.so*' \) 2>/dev/null | xargs -r -n1 dirname | sort -u | tr '\n' ':')
          export LD_LIBRARY_PATH="${LIB_DIRS}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          OG=$(find /opt /usr/local /usr -type f -name og_create 2>/dev/null | head -1)
          SP=$(find /opt /usr/local /usr -type f -name spi_science_analysis 2>/dev/null | head -1)
          [ -n "$OG" ] && export PATH="$(dirname "$OG"):$PATH"
          [ -n "$SP" ] && export PATH="$(dirname "$SP"):$PATH"

          mkdir -p /home/integral/pfiles /home/integral/ACIRM_R17K_R8N_OUTPUTS /home/integral/selected_products /home/integral/obswork
          SYS_PFILES="/opt/osa/pfiles"
          if [ -d "$SYS_PFILES" ]; then
            cp "$SYS_PFILES"/*.par /home/integral/pfiles/ 2>/dev/null || true
          fi
          export PFILES="/home/integral/pfiles;$SYS_PFILES"

          par="/home/integral/pfiles/spi_science_analysis.par"
          if [ -f "$par" ]; then
            cp "$par" /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_PAR_ORIGINAL.par 2>/dev/null || true
            sed -E -i 's/^([^#,]+,[^,]+),[^,]+,/\1,hl,/' "$par" 2>/dev/null || true
            cp "$par" /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_PAR_PATCHED_HIDDEN.par 2>/dev/null || true
          fi

          cd /home/integral
          {
            echo "=== R17K_R8N comprehensive preflight ==="
            echo "REP_BASE_PROD=$REP_BASE_PROD"
            echo "CURRENT_IC=$CURRENT_IC"
            echo "ISDC_REF_CAT=$ISDC_REF_CAT"
            echo "PFILES=$PFILES"
            echo "DISPLAY=$DISPLAY"
            which og_create || true
            which spi_science_analysis || true
            og_create --version || true
            spi_science_analysis --version || true
          } > ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_OSA_PREFLIGHT.txt 2>&1

          : > list_ids.txt
          while read -r id; do
            [ -n "$id" ] || continue
            echo "$id" >> list_ids.txt
          done < scw_ids.list

          mkdir -p obswork
          cd obswork
          cp /home/integral/list_ids.txt ./scw_input.list

          {
            echo "=== og_create exact successful pattern from R17K_R7/R8 ==="
            echo "COMMAND: og_create idxSwg=./scw_input.list ogid=acirm_r17k_r8n baseDir=. instrument=SPI"
            cat ./scw_input.list
          } > /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_OG_CREATE.log

          og_create idxSwg=./scw_input.list ogid=acirm_r17k_r8n baseDir=. instrument=SPI >> /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_OG_CREATE.log 2>&1
          og_ec=$?
          echo "OG_CREATE_EXIT=$og_ec" > /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_OG_CREATE_EXIT.txt

          first_og=$(find /home/integral/obswork /home/integral -type f -name 'og_spi.fits' 2>/dev/null | head -1)
          echo "$first_og" > /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_FIRST_OG_SPI_PATH.txt
          if [ -n "$first_og" ]; then
            cp "$first_og" /home/integral/selected_products/og_spi.fits 2>/dev/null || true
          else
            echo "NO_OG_SPI_CREATED_SKIP_SPI_SCIENCE" > /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_SCIENCE_ANALYSIS_EXIT.txt
          fi

          if [ -n "$first_og" ]; then
            og_dir=$(dirname "$first_og")
            cd "$og_dir"

            cat > /home/integral/spi_cmd_A_core_bins.sh <<'CMD'
          spi_science_analysis \
            obs_group=og_spi.fits \
            clobber=yes \
            run_cat_extract=no \
            run_pointing=yes \
            run_binning=yes \
            run_background=no \
            run_simulation=no \
            run_spiros=no \
            run_phase_analysis=no \
            run_gaincorrection=no \
            run_fullcheck=no \
            detectors="0-18" \
            use_pointing_filter=yes \
            spibounds_nregions=3 \
            spibounds_regions="490,500,508,514,522,532" \
            spibounds_nbins="1,1,1"
          CMD

            cat > /home/integral/spi_cmd_B_min_binning.sh <<'CMD'
          spi_science_analysis \
            obs_group=og_spi.fits \
            clobber=yes \
            run_cat_extract=no \
            run_pointing=yes \
            run_binning=yes \
            run_background=no \
            run_simulation=no \
            run_spiros=no
          CMD

            cat > /home/integral/spi_cmd_C_defaults.sh <<'CMD'
          spi_science_analysis \
            obs_group=og_spi.fits \
            clobber=yes
          CMD

            chmod +x /home/integral/spi_cmd_A_core_bins.sh /home/integral/spi_cmd_B_min_binning.sh /home/integral/spi_cmd_C_defaults.sh
            cp /home/integral/spi_cmd_A_core_bins.sh /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_CMD_A_CORE_BINS.sh 2>/dev/null || true
            cp /home/integral/spi_cmd_B_min_binning.sh /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_CMD_B_MIN_BINNING.sh 2>/dev/null || true
            cp /home/integral/spi_cmd_C_defaults.sh /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_CMD_C_DEFAULTS.sh 2>/dev/null || true

            run_attempt() {
              label="$1"
              cmd="$2"
              minutes="$3"
              echo "ATTEMPT_${label}_START" >> /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_ATTEMPT_SUMMARY.txt
              echo "PWD=$(pwd)" > /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_${label}_CONTEXT.txt
              echo "DISPLAY=$DISPLAY" >> /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_${label}_CONTEXT.txt
              echo "PFILES=$PFILES" >> /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_${label}_CONTEXT.txt
              set -o pipefail
              timeout "${minutes}m" bash -lc "cd '$og_dir' && bash '$cmd' < /dev/null" 2>&1 | awk '
                NR <= 9000 { print; next }
                /Error_|Log_|Task|terminating|created|evts|spectra|energy|bound|Exception|PIL_|spi_|kOVERFLOW|overflow|display|parameter/ { print }
                NR == 9001 { print "... ACIRM_LOG_TRUNCATED_AFTER_9000_LINES ..." }
              ' > /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_${label}_STDOUT_FILTERED.log
              ec=${PIPESTATUS[0]}
              echo "ATTEMPT_${label}_EXIT=$ec" | tee -a /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_ATTEMPT_SUMMARY.txt
              return 0
            }

            run_attempt A_CORE_BINS /home/integral/spi_cmd_A_core_bins.sh 35
            run_attempt B_MIN_BINNING /home/integral/spi_cmd_B_min_binning.sh 35
            run_attempt C_DEFAULTS /home/integral/spi_cmd_C_defaults.sh 25
            cp /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_ATTEMPT_SUMMARY.txt /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SPI_SCIENCE_ANALYSIS_EXIT.txt 2>/dev/null || true
          fi

          # Collect official and cached SPI products without overwriting equal basenames.
          find /home/integral /data/scw -type f \( -iname '*evts*det*spec*' -o -iname '*energy*bound*' -o -iname '*ebounds*' -o -iname 'og_spi.fits' -o -iname '*spi*spect*' -o -iname 'spi_spectra.fits.gz' \) 2>/dev/null | sort > /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_PRODUCTS_FOUND.txt
          while read -r f; do
            [ -f "$f" ] || continue
            case "$f" in */selected_products/*) continue ;; esac
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -le 200000000 ]; then
              safe=$(echo "$f" | sed 's#^/##; s#[^A-Za-z0-9._-]#_#g')
              cp -f "$f" "/home/integral/selected_products/$safe" 2>/dev/null || true
            fi
          done < /home/integral/ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_PRODUCTS_FOUND.txt
          SH
          chmod +x scripts/r17k_r8n_inside_osa.sh

      - name: Run OSA R8N comprehensive single cell
        shell: bash
        run: |
          set +e
          Xvfb :99 -screen 0 1280x1024x24 > logs/xvfb.log 2>&1 &
          sleep 3
          docker run --rm \
            -e DISPLAY=:99 \
            -v /tmp/.X11-unix:/tmp/.X11-unix \
            -v "$PWD:/home/integral" \
            -v "$PWD/repo/scw:/data/scw:ro" \
            -v "$PWD/repo/aux:/data/aux:ro" \
            -v "$PWD/repo/ic:/data/ic:ro" \
            -v "$PWD/repo/idx:/data/idx:ro" \
            -v "$PWD/repo/cat:/data/cat:ro" \
            --entrypoint="" \
            integralsw/osa:latest bash -lc 'bash /home/integral/scripts/r17k_r8n_inside_osa.sh' > logs/r17k_r8n_osa_run.log 2>&1
          echo "R17K_R8N_OSA_RUN_EXIT=$?" | tee ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_OSA_RUN_EXIT.txt

      - name: Inspect selected products and 511 rows
        shell: bash
        run: |
          set +e
          cp logs/*.log ACIRM_R17K_R8N_OUTPUTS/ 2>/dev/null || true
          find selected_products -maxdepth 1 -type f -printf '%f,%s\n' | sort > ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_SELECTED_PRODUCTS_MANIFEST.csv || true

          cat > scripts/inspect_final.py <<'PY'
          import json, csv, math, os
          from pathlib import Path
          import numpy as np
          try:
              from astropy.io import fits
          except Exception as e:
              fits = None
              fits_error = repr(e)

          OUT = Path('ACIRM_R17K_R8N_OUTPUTS')
          PROD = Path('selected_products')
          rows, meas, errs = [], [], []
          LINE = (508.0, 514.0)
          SB1 = (490.0, 500.0)
          SB2 = (522.0, 532.0)
          E_PAIRS = [('E_MIN','E_MAX'),('ENERG_LO','ENERG_HI'),('ENERGY_LO','ENERGY_HI'),('E_LO','E_HI'),('EMIN','EMAX'),('E_LOW','E_HIGH')]
          E_SINGLE = ['ENERGY','E','E_MEAN','E_CENTER','PI','PHA','CHANNEL','CHAN']
          C_COLS = ['COUNTS','COUNT','RATE','SPECTRUM','SPEC','DATA','FLUX','VALUE','NCOUNTS']

          def as_float(x):
              return np.nan_to_num(np.asarray(x, dtype=float), nan=0.0, posinf=0.0, neginf=0.0)

          def finite_float(x):
              try:
                  y = float(x)
                  if math.isfinite(y):
                      return y
              except Exception:
                  pass
              return 0.0

          def summarize_edges(lo, hi, cnt, source_note=''):
              lo = as_float(lo).reshape(-1)
              hi = as_float(hi).reshape(-1)
              cnt = as_float(cnt).reshape(-1)
              n = min(len(lo), len(hi), len(cnt))
              if n <= 0:
                  return None
              lo, hi, cnt = lo[:n], hi[:n], cnt[:n]
              width = np.maximum(1e-12, hi - lo)
              def frac(w):
                  return np.maximum(0.0, np.minimum(hi, w[1]) - np.maximum(lo, w[0])) / width
              line = float(np.sum(cnt * frac(LINE)))
              sb1 = float(np.sum(cnt * frac(SB1)))
              sb2 = float(np.sum(cnt * frac(SB2)))
              side = sb1 + sb2
              exp = side / 20.0 * 6.0 if side > 0 else math.nan
              ratio = (line / 6.0) / (side / 20.0) if side > 0 else math.inf
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan
              return {
                  'line_508_514_counts': line,
                  'side_490_500_counts': sb1,
                  'side_522_532_counts': sb2,
                  'side_total_counts': side,
                  'line_to_side_density_ratio': ratio,
                  'expected_line_from_side_density': exp,
                  'z_vs_side_density': z,
                  'energy_bins': int(n),
                  'source_note': source_note,
              }

          def summarize_centers(e, cnt, source_note=''):
              e = as_float(e).reshape(-1)
              cnt = as_float(cnt).reshape(-1)
              n = min(len(e), len(cnt))
              if n <= 0:
                  return None
              e, cnt = e[:n], cnt[:n]
              line = float(np.sum(cnt[(e >= LINE[0]) & (e <= LINE[1])]))
              sb1 = float(np.sum(cnt[(e >= SB1[0]) & (e <= SB1[1])]))
              sb2 = float(np.sum(cnt[(e >= SB2[0]) & (e <= SB2[1])]))
              side = sb1 + sb2
              exp = side / 20.0 * 6.0 if side > 0 else math.nan
              ratio = (line / 6.0) / (side / 20.0) if side > 0 else math.inf
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan
              return {
                  'line_508_514_counts': line,
                  'side_490_500_counts': sb1,
                  'side_522_532_counts': sb2,
                  'side_total_counts': side,
                  'line_to_side_density_ratio': ratio,
                  'expected_line_from_side_density': exp,
                  'z_vs_side_density': z,
                  'energy_bins': int(n),
                  'source_note': source_note,
              }

          def add_measure(m, p, i, hdu, method, energy_source, count_source):
              if not m:
                  return
              m.update({
                  'file': p.name,
                  'hdu_index': i,
                  'hdu_name': hdu.name or '',
                  'method': method,
                  'energy_source': energy_source,
                  'count_source': count_source,
              })
              meas.append(m)

          if fits is None:
              errs.append({'file': 'ASTROPY_IMPORT', 'error': fits_error})
          else:
              for p in sorted(PROD.glob('*')):
                  if not p.name.lower().endswith(('.fits','.fit','.fits.gz','.fit.gz')):
                      continue
                  try:
                      with fits.open(p, memmap=True) as hdul:
                          for i, hdu in enumerate(hdul):
                              cols = []
                              if hasattr(hdu, 'columns') and hdu.columns is not None:
                                  cols = list(hdu.columns.names or [])
                              try:
                                  nrows = len(hdu.data) if getattr(hdu, 'data', None) is not None else ''
                              except Exception:
                                  nrows = ''
                              formats = []
                              try:
                                  formats = [str(c.format) for c in hdu.columns]
                              except Exception:
                                  pass
                              rows.append({
                                  'file': p.name,
                                  'hdu_index': i,
                                  'hdu_name': hdu.name or '',
                                  'class': hdu.__class__.__name__,
                                  'rows': nrows,
                                  'column_count': len(cols),
                                  'columns': ';'.join(cols[:160]),
                                  'formats': ';'.join(formats[:160]),
                              })
                              if not (hasattr(hdu, 'columns') and hdu.columns is not None and hdu.data is not None):
                                  continue
                              cmap = {c.upper(): c for c in cols}

                              # Standard edge-pair columns.
                              for a, b in E_PAIRS:
                                  if a in cmap and b in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap:
                                              lo = hdu.data[cmap[a]]
                                              hi = hdu.data[cmap[b]]
                                              cnt_raw = as_float(hdu.data[cmap[ck]])
                                              if cnt_raw.ndim >= 2:
                                                  if cnt_raw.shape[-1] == np.asarray(lo).size:
                                                      cnt = cnt_raw.sum(axis=tuple(range(cnt_raw.ndim - 1)))
                                                  elif cnt_raw.shape[0] == np.asarray(lo).size:
                                                      cnt = cnt_raw.sum(axis=tuple(range(1, cnt_raw.ndim)))
                                                  else:
                                                      cnt = cnt_raw.reshape(-1)
                                              else:
                                                  cnt = cnt_raw
                                              add_measure(summarize_edges(lo, hi, cnt, 'standard_edge_columns'), p, i, hdu, 'same_hdu_edges', cmap[a] + '|' + cmap[b], cmap[ck])

                              # Standard center columns.
                              for ek in E_SINGLE:
                                  if ek in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap and ck != ek:
                                              add_measure(summarize_centers(hdu.data[cmap[ek]], hdu.data[cmap[ck]], 'standard_center_columns'), p, i, hdu, 'same_hdu_centers', cmap[ek], cmap[ck])

                              # SPI raw spectra common form: E_RANGE plus COUNTS.
                              if 'E_RANGE' in cmap and 'COUNTS' in cmap:
                                  er = as_float(hdu.data[cmap['E_RANGE']])
                                  ct = as_float(hdu.data[cmap['COUNTS']])
                                  # Case 1: each row has [lo, hi] and one scalar count/rate.
                                  if er.ndim >= 2 and er.shape[-1] == 2:
                                      lo = er[..., 0].reshape(-1)
                                      hi = er[..., 1].reshape(-1)
                                      if ct.size == lo.size:
                                          cnt = ct.reshape(-1)
                                          add_measure(summarize_edges(lo, hi, cnt, 'E_RANGE_vector_edges_counts_same_size'), p, i, hdu, 'erange_vector_edges', 'E_RANGE', 'COUNTS')
                                      elif ct.ndim >= 2 and ct.shape[:-1] == er.shape[:-1]:
                                          cnt = ct.sum(axis=-1).reshape(-1)
                                          add_measure(summarize_edges(lo, hi, cnt, 'E_RANGE_vector_edges_counts_collapsed_last_axis'), p, i, hdu, 'erange_vector_edges_collapsed', 'E_RANGE', 'COUNTS')
                                  # Case 2: E_RANGE is [N,2] and COUNTS is a channel vector per row; sum rows.
                                  if er.ndim == 2 and er.shape[-1] == 2 and ct.ndim == 2 and ct.shape[-1] == er.shape[0]:
                                      cnt = ct.sum(axis=0)
                                      add_measure(summarize_edges(er[:,0], er[:,1], cnt, 'E_RANGE_channel_edges_counts_summed_rows'), p, i, hdu, 'erange_channel_edges_sumrows', 'E_RANGE', 'COUNTS')
                  except Exception as e:
                      errs.append({'file': str(p), 'error': repr(e)[:500]})

          def write_csv(path, data):
              keys = []
              for r in data:
                  for k in r:
                      if k not in keys:
                          keys.append(k)
              if not keys:
                  keys = ['empty']
              with open(path, 'w', newline='', encoding='utf-8') as f:
                  w = csv.DictWriter(f, fieldnames=keys)
                  w.writeheader()
                  for r in data:
                      w.writerow({k: r.get(k, '') for k in keys})

          write_csv(OUT / 'R17K_R8N_SELECTED_PRODUCT_SCHEMA.csv', rows)
          write_csv(OUT / 'R17K_R8N_DIRECT_511_MEASUREMENT_ROWS.csv', meas)
          (OUT / 'R17K_R8N_PRODUCT_INSPECTION_ERRORS.json').write_text(json.dumps(errs, indent=2), encoding='utf-8')

          selected = list(PROD.glob('*'))
          og_path = OUT / 'R17K_R8N_FIRST_OG_SPI_PATH.txt'
          og_success = og_path.exists() and bool(og_path.read_text(errors='replace').strip())
          attempts = (OUT / 'R17K_R8N_SPI_ATTEMPT_SUMMARY.txt').read_text(errors='replace') if (OUT / 'R17K_R8N_SPI_ATTEMPT_SUMMARY.txt').exists() else ''
          products_found = (OUT / 'R17K_R8N_PRODUCTS_FOUND.txt').read_text(errors='replace') if (OUT / 'R17K_R8N_PRODUCTS_FOUND.txt').exists() else ''

          decision = 'R17K_R8N_NO_OG_SPI_CREATED_NO_OFFICIAL_PRODUCTS'
          if og_success:
              decision = 'R17K_R8N_OG_SPI_CREATED_DIAGNOSTIC_NOT_PROOF'
          if 'evts' in products_found.lower() or 'energy' in products_found.lower() or 'ebounds' in products_found.lower():
              decision = 'R17K_R8N_OFFICIAL_SPI_PRODUCTS_FOUND_DIAGNOSTIC_NOT_PROOF'
          if meas:
              decision = 'R17K_R8N_511_ROWS_FROM_SELECTED_SPI_PRODUCTS_DIAGNOSTIC_NOT_PROOF'

          best = None
          finite = []
          for m in meas:
              z = m.get('z_vs_side_density')
              try:
                  zf = float(z)
                  if math.isfinite(zf):
                      finite.append((zf, m))
              except Exception:
                  pass
          if finite:
              finite.sort(key=lambda x: x[0], reverse=True)
              best = finite[0][1]

          summary = {
              'decision': decision,
              'proof_allowed': False,
              'selected_product_count': len(selected),
              'og_success': og_success,
              'direct_511_measurement_rows': len(meas),
              'schema_rows': len(rows),
              'attempt_summary': attempts.strip().splitlines()[-20:],
              'best_511_row_by_z': best,
              'claim_ceiling': [
                  'OFFICIAL_OSA_OG_CREATE_PLUS_MULTI_ATTEMPT_SPI_SCIENCE_PLUS_RAW_SPI_SPECTRA_511_AUDIT',
                  'NOT_DISCOVERY',
                  'NOT_PARTICLE_PROOF',
                  'NOT_SOURCE_ATTRIBUTION',
                  'NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_OFFICIAL_PRODUCTS_AND_LOCKED_CONTROLS_PASS'
              ]
          }
          (OUT / 'R17K_R8N_DECISION.json').write_text(json.dumps(summary, indent=2), encoding='utf-8')
          (OUT / 'R17K_R8N_BEST_511_SUMMARY.json').write_text(json.dumps(best or {}, indent=2), encoding='utf-8')
          PY

          python3 scripts/inspect_final.py > logs/inspect_final.log 2>&1

      - name: Package slim artifact
        shell: bash
        run: |
          set +e
          cp logs/*.log ACIRM_R17K_R8N_OUTPUTS/ 2>/dev/null || true
          cp -r selected_products ACIRM_R17K_R8N_OUTPUTS/selected_products 2>/dev/null || true
          df -h > ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_DF_END.txt
          free -h > ACIRM_R17K_R8N_OUTPUTS/R17K_R8N_FREE_END.txt
          zip -r ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip ACIRM_R17K_R8N_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip > ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip.sha256.txt

      - name: Upload slim artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT
          path: |
            ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip
            ACIRM_R17K_R8N_COMPREHENSIVE_SINGLE_CELL_SPI511_OUTPUT.zip.sha256.txt
          retention-days: 7
