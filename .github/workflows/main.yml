name: ACIRM R17K R9B R2 Curl Artifact Backtrace Locator

on:
  workflow_dispatch:
    inputs:
      max_artifacts:
        required: false
        default: '45'
      max_download_mb:
        required: false
        default: '300'
      scan_limit_mb_per_file:
        required: false
        default: '4'

permissions:
  contents: read
  actions: read

jobs:
  r17k-r9b-r2-curl-artifact-backtrace-locator:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    env:
      MAX_ARTIFACTS: ${{ inputs.max_artifacts }}
      MAX_DOWNLOAD_MB: ${{ inputs.max_download_mb }}
      SCAN_LIMIT_MB_PER_FILE: ${{ inputs.scan_limit_mb_per_file }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}

    steps:
      - name: Checkout repo shallow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare folders
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R9B_R2_OUTPUTS logs scripts artifact_bank extracted_artifacts repo_extra_scan
          cat > ACIRM_R17K_R9B_R2_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR
          FIXES R9B 401 DOWNLOAD FAILURE BY USING CURL -L INSTEAD OF PYTHON URLLIB REDIRECT AUTH
          SEARCHES PRIOR GITHUB ACTIONS ARTIFACTS AND OPTIONAL COMMITTED ZIP FILES ONLY
          NO LAT RERUN
          NO SPI RERUN
          NO NEW PHYSICAL CLAIM
          PURPOSE: locate artifacts for exploratory reverse trace from R9A governed 511 response
          EXPLORATORY_BACKTRACE_PREPARATION_ONLY
          NOT_OFFICIAL_511_PROOF
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_ACIRM_PROOF
          EOF
          printf 'MAX_ARTIFACTS=%s\nMAX_DOWNLOAD_MB=%s\nSCAN_LIMIT_MB_PER_FILE=%s\nGH_REPO=%s\n' "$MAX_ARTIFACTS" "$MAX_DOWNLOAD_MB" "$SCAN_LIMIT_MB_PER_FILE" "$GH_REPO" > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_INPUTS.txt

      - name: Install minimal tools
        shell: bash
        run: |
          set +e
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip jq ca-certificates > logs/apt_install.log 2>&1

      - name: Download prior artifacts with curl redirect-safe mode
        shell: bash
        run: |
          set +e
          : > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_ARTIFACT_DOWNLOAD_MANIFEST.csv
          echo 'artifact_id,name,size_in_bytes,created_at,status,path,error' > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_ARTIFACT_DOWNLOAD_MANIFEST.csv
          echo '[]' > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_ARTIFACT_DOWNLOAD_ERRORS.json
          max_art="${MAX_ARTIFACTS:-45}"
          cap_bytes=$(python3 - <<'PY'
          import os
          print(int(float(os.environ.get('MAX_DOWNLOAD_MB','300'))*1024*1024))
          PY
          )
          downloaded=0
          total=0
          candidates=0
          errors=0
          page=1
          while [ "$page" -le 10 ] && [ "$downloaded" -lt "$max_art" ]; do
            api="https://api.github.com/repos/${GH_REPO}/actions/artifacts?per_page=100&page=${page}"
            curl -fsS \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "$api" -o "logs/artifacts_page_${page}.json" 2>> logs/r9b_r2_curl_errors.log
            if [ $? -ne 0 ]; then
              echo "artifact_list_page_${page}_failed" >> logs/r9b_r2_curl_errors.log
              break
            fi
            count=$(jq '.artifacts | length' "logs/artifacts_page_${page}.json" 2>/dev/null || echo 0)
            if [ "$count" = "0" ]; then break; fi
            jq -r '.artifacts[] | select(.expired == false) | [.id,.name,.size_in_bytes,.created_at,.archive_download_url] | @tsv' "logs/artifacts_page_${page}.json" > "logs/artifacts_page_${page}.tsv"
            while IFS=$'\t' read -r aid aname asize created aurl; do
              echo "$aname" | grep -Eiq 'ACIRM|R17K|R8Y|R8Z|R9A|R21AX|LAT|SPI511|511|PHOTON|TRACE|minus14' || continue
              candidates=$((candidates+1))
              safe=$(python3 - <<PY
          import re
          s=${aname@Q}
          print(re.sub(r'[^A-Za-z0-9._-]+','_',s)[:150])
          PY
          )
              dest="artifact_bank/${safe}__artifact_${aid}.zip"
              if [ -z "$asize" ]; then asize=0; fi
              if [ $((total + asize)) -gt "$cap_bytes" ]; then
                printf '%s,%s,%s,%s,%s,%s,%s\n' "$aid" "$aname" "$asize" "$created" "SKIP_SIZE_CAP" "$dest" "size cap" >> ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_ARTIFACT_DOWNLOAD_MANIFEST.csv
                continue
              fi
              curl -fL --retry 2 --retry-delay 2 \
                -H "Authorization: Bearer ${GH_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "$aurl" -o "$dest" > "logs/download_${aid}.log" 2>&1
              rc=$?
              if [ "$rc" -eq 0 ] && unzip -t "$dest" > "logs/unzip_test_${aid}.log" 2>&1; then
                sz=$(stat -c%s "$dest" 2>/dev/null || echo 0)
                total=$((total + sz))
                downloaded=$((downloaded + 1))
                printf '%s,%s,%s,%s,%s,%s,%s\n' "$aid" "$aname" "$asize" "$created" "OK" "$dest" "" >> ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_ARTIFACT_DOWNLOAD_MANIFEST.csv
              else
                err=$(tail -c 220 "logs/download_${aid}.log" 2>/dev/null | tr '\n,' '  ')
                errors=$((errors + 1))
                rm -f "$dest"
                printf '%s,%s,%s,%s,%s,%s,%s\n' "$aid" "$aname" "$asize" "$created" "DOWNLOAD_FAIL" "$dest" "$err" >> ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_ARTIFACT_DOWNLOAD_MANIFEST.csv
              fi
              if [ "$downloaded" -ge "$max_art" ]; then break; fi
              if [ "$total" -ge "$cap_bytes" ]; then break; fi
            done < "logs/artifacts_page_${page}.tsv"
            page=$((page+1))
          done
          python3 - <<PY
          import json
          summary={
            'downloaded_artifact_count': int(${downloaded}),
            'downloaded_bytes': int(${total}),
            'candidate_count_seen': int(${candidates}),
            'error_count': int(${errors}),
            'method': 'curl_L_redirect_safe'
          }
          open('ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_ARTIFACT_DOWNLOAD_SUMMARY.json','w').write(json.dumps(summary,indent=2))
          PY
          echo "FETCH_EXIT=0" | tee ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_FETCH_EXIT.txt

      - name: Copy optional committed zip packages
        shell: bash
        run: |
          set +e
          find . -maxdepth 4 -type f -name '*ACIRM*.zip' ! -path './artifact_bank/*' ! -path './extracted_artifacts/*' -printf '%p\n' | sort > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_COMMITTED_ZIP_CANDIDATES.txt
          n=0
          while IFS= read -r z; do
            [ -f "$z" ] || continue
            safe=$(basename "$z" | tr -c 'A-Za-z0-9._-' '_')
            cp "$z" "artifact_bank/COMMITTED_${safe}" 2>/dev/null && n=$((n+1))
          done < ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_COMMITTED_ZIP_CANDIDATES.txt
          echo "committed_zip_copied_count=$n" > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_COMMITTED_ZIP_SUMMARY.txt

      - name: Extract and scan downloaded artifacts
        shell: bash
        run: |
          set +e
          cat > scripts/r9b_r2_scan.py <<'PY'
          import csv, json, os, re, zipfile
          from pathlib import Path
          OUT=Path('ACIRM_R17K_R9B_R2_OUTPUTS'); BANK=Path('artifact_bank'); EXT=Path('extracted_artifacts')
          EXT.mkdir(exist_ok=True)
          limit=int(float(os.environ.get('SCAN_LIMIT_MB_PER_FILE','4'))*1024*1024)
          errors=[]; extracted=[]; hits=[]; trace=[]
          KEYWORDS={
            'spi511_response':['R8Y','R8Z','R9A','511','508-514','507-515','governed','broad_507','poisson_tail','bootstrap_prob_z_ge_3','EMPIRICALLY_SUPPORTED'],
            'minus14_precursor':['minus14','MINUS14','-14','preparatory','shoulder','precursor','phase-pair','P1','P2'],
            'photon_alignment':['photon alignment','PHOTON_ALIGNMENT','alignment','phase alignment','packet_N','2239.664','f_R9C','frequency'],
            'lat_delayed':['LAT','Fermi','30-100','plus21','+21','delayed','photon','P5','TS'],
            'r9c_anchor':['R9C','Cyg X-1','CygX-1','Cygnus','M_eff','f_raw','f_R9C'],
            'r21ax_branch':['R21AX','R7E','R7F','R6G','R6H','R6I','R6M','R7A','R7G'],
            'claim_ceiling':['NOT_PROOF','NOT_DISCOVERY','NOT_SOURCE_ATTRIBUTION','NOT_PARTICLE_PROOF','DIAGNOSTIC_NOT_PROOF','EXPLORATORY']
          }
          group_counts={k:0 for k in KEYWORDS}
          def safe(s): return re.sub(r'[^A-Za-z0-9._-]+','_',s)[:160]
          def extract(zpath,dest,depth=0):
            if depth>3: return
            try:
              with zipfile.ZipFile(zpath) as z:
                bad=z.testzip()
                if bad: errors.append({'stage':'zip_test','zip':str(zpath),'bad':bad})
                for m in z.infolist()[:3000]:
                  if m.is_dir() or m.file_size>30*1024*1024: continue
                  if '..' in Path(m.filename).parts: continue
                  out=dest/safe(m.filename.replace('/','__'))
                  out.parent.mkdir(parents=True,exist_ok=True)
                  try:
                    out.write_bytes(z.read(m))
                    extracted.append({'zip':str(zpath),'member':m.filename,'size':m.file_size,'path':str(out)})
                    if out.suffix.lower()=='.zip':
                      nd=dest/(out.stem+'_unzipped'); nd.mkdir(exist_ok=True); extract(out,nd,depth+1)
                  except Exception as e: errors.append({'stage':'member_extract','zip':str(zpath),'member':m.filename,'error':repr(e)[:220]})
            except Exception as e: errors.append({'stage':'zip_extract','zip':str(zpath),'error':repr(e)[:220]})
          for z in sorted(BANK.glob('*.zip')):
            d=EXT/safe(z.stem); d.mkdir(exist_ok=True); extract(z,d,0)
          allowed={'.txt','.md','.json','.csv','.log','.yml','.yaml','.tex'}
          for p in EXT.rglob('*'):
            if not p.is_file() or p.suffix.lower() not in allowed: continue
            try:
              sz=p.stat().st_size
              if sz>limit: continue
              txt=p.read_text(encoding='utf-8',errors='replace')
              low=txt.lower(); gh={}; score=0; snippets=[]
              for g,ks in KEYWORDS.items():
                c=sum(low.count(k.lower()) for k in ks)
                if c: gh[g]=c; score+=c; group_counts[g]+=c
              if score:
                for term in ['R17K_R8Y','R17K_R8Z','R17K_R9A','minus14','PHOTON_ALIGNMENT','R9C','R21AX','507-515','508-514','LAT','plus21']:
                  i=low.find(term.lower())
                  if i>=0: snippets.append(txt[max(0,i-140):min(len(txt),i+260)].replace('\n',' ')[:420])
                row={'path':str(p),'size':sz,'score':score,'groups':';'.join(sorted(gh)),'hits_json':json.dumps(gh,sort_keys=True),'snippet':' || '.join(snippets[:3])}
                hits.append(row)
            except Exception as e: errors.append({'stage':'scan','path':str(p),'error':repr(e)[:200]})
          hits=sorted(hits,key=lambda r:r['score'],reverse=True)
          for r in hits:
            groups=r.get('groups','')
            if any(g in groups for g in ['spi511_response','minus14_precursor','photon_alignment','lat_delayed','r9c_anchor','r21ax_branch']):
              trace.append({'path':r['path'],'score':r['score'],'groups':groups,'use':'candidate_trace_input','snippet':r.get('snippet','')})
          def wcsv(path,rows):
            keys=[]
            for r in rows:
              for k in r:
                if k not in keys: keys.append(k)
            if not keys: keys=['empty']
            with open(path,'w',newline='',encoding='utf-8') as f:
              w=csv.DictWriter(f,fieldnames=keys); w.writeheader(); w.writerows(rows)
          wcsv(OUT/'R17K_R9B_R2_EXTRACTED_FILE_MANIFEST.csv',extracted)
          wcsv(OUT/'R17K_R9B_R2_ARTIFACT_HITS_RANKED.csv',hits[:800])
          wcsv(OUT/'R17K_R9B_R2_CANDIDATE_TRACE_INPUTS.csv',trace[:150])
          (OUT/'R17K_R9B_R2_SCAN_ERRORS.json').write_text(json.dumps(errors,indent=2),encoding='utf-8')
          has_511=group_counts.get('spi511_response',0)>0
          has_prec=group_counts.get('minus14_precursor',0)>0
          has_align=group_counts.get('photon_alignment',0)>0
          has_r9c=group_counts.get('r9c_anchor',0)>0
          has_lat=group_counts.get('lat_delayed',0)>0
          has_r21=group_counts.get('r21ax_branch',0)>0
          downloaded=len(list(BANK.glob('*.zip')))
          if downloaded==0:
            decision='R17K_R9B_R2_NO_ARTIFACT_ZIPS_DOWNLOADED_OR_COMMITTED_DOWNLOAD_AUTH_STILL_BLOCKED'
            ready=False
          elif has_511 and has_prec and (has_align or has_r9c or has_lat):
            decision='R17K_R9B_R2_EXISTING_ARTIFACTS_FOUND_FOR_EXPLORATORY_PRODUCT_TO_PRECURSOR_ALIGNMENT_TRACE_READY_LOW_CEILING'
            ready=True
          elif has_511 and (has_prec or has_align or has_r9c or has_lat or has_r21):
            decision='R17K_R9B_R2_PARTIAL_ARTIFACT_CHAIN_FOUND_TRACE_PREPARATION_READY_LOW_CEILING'
            ready=True
          elif has_511:
            decision='R17K_R9B_R2_511_RESPONSE_ARTIFACT_FOUND_BUT_NO_PRECURSOR_ALIGNMENT_ARTIFACT_FOUND'
            ready=False
          else:
            decision='R17K_R9B_R2_NO_USABLE_511_BACKTRACE_ARTIFACT_CHAIN_FOUND'
            ready=False
          summary={
            'run_id':'R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR',
            'decision':decision,
            'proof_allowed':False,
            'official_backtrace_permission':False,
            'exploratory_trace_preparation_ready':ready,
            'source_attribution_allowed':False,
            'artifact_zip_count_in_bank':downloaded,
            'extracted_file_count':len(extracted),
            'scanned_hit_file_count':len(hits),
            'candidate_trace_input_count':len(trace),
            'keyword_group_counts':group_counts,
            'has_spi511_response_artifact':has_511,
            'has_minus14_precursor_artifact':has_prec,
            'has_photon_alignment_artifact':has_align,
            'has_r9c_anchor_artifact':has_r9c,
            'has_lat_delayed_artifact':has_lat,
            'has_r21ax_branch_artifact':has_r21,
            'top_candidate_files':trace[:12],
            'next_step':'R9C_COMPACT_TRACE_SYNTHESIS_FROM_R9B_R2_INPUTS' if ready else 'MANUAL_UPLOAD_OR_COMMIT_R8Y_R9A_R21AX_ARTIFACTS_THEN_REPEAT',
            'claim_ceiling':['EXPLORATORY_TRACE_PREPARATION_ONLY','DIAGNOSTIC_511_RESPONSE_CANDIDATE','NOT_OFFICIAL_511_PROOF','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_ACIRM_PROOF']
          }
          (OUT/'R17K_R9B_R2_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          (OUT/'R17K_R9B_R2_THEORY_NOTE_AR.txt').write_text('R9B_R2 يصلح فشل R9B الناتج عن 401 عند تنزيل artifacts عبر Python urllib. إذا وجد artifacts كافية فالخطوة R9C تركيب سلسلة استكشافية منخفضة السقف، بلا إثبات ولا نسبة مصدر.\n',encoding='utf-8')
          PY
          python3 scripts/r9b_r2_scan.py > logs/r9b_r2_scan.log 2>&1
          echo "SCAN_EXIT=$?" | tee ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_SCAN_EXIT.txt

      - name: Package artifact always
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R9B_R2_OUTPUTS logs
          cp logs/*.log ACIRM_R17K_R9B_R2_OUTPUTS/ 2>/dev/null || true
          find artifact_bank -maxdepth 1 -type f -printf '%p,%s\n' | sort > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_DOWNLOADED_ARTIFACT_FILE_SIZES.csv 2>/dev/null || true
          df -h > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_DF_END.txt
          free -h > ACIRM_R17K_R9B_R2_OUTPUTS/R17K_R9B_R2_FREE_END.txt
          zip -r ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT.zip ACIRM_R17K_R9B_R2_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT.zip > ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT.zip ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT.zip.sha256.txt

      - name: Upload artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT
          path: |
            ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT.zip
            ACIRM_R17K_R9B_R2_CURL_ARTIFACT_BACKTRACE_LOCATOR_OUTPUT.zip.sha256.txt
          retention-days: 7
