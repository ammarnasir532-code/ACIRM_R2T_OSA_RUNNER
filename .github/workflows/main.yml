name: ACIRM R2Z group member resolver DAL smoke test FIXED

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r2z-group-member-dal-smoke-fixed:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R2Z_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R2Z_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS

      - name: System diagnostics
        run: |
          {
            echo "ACIRM R2Z fixed group member resolver for SWG DAL smoke test"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=GROUP_MEMBER_RESOLVER_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY"
            echo ""
            uname -a || true
            echo ""
            df -h || true
            echo ""
            free -h || true
            echo ""
            echo "HEASARC IPv4 HTTPS probe"
            curl -4 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R2Z_RESULTS/logs/system_diagnostics.log

      - name: Install Python FITS dependencies
        run: |
          {
            echo "Installing astropy"
            python3 -m pip install --upgrade pip
            python3 -m pip install --no-cache-dir astropy
            python3 - <<'PY'
            from astropy.io import fits
            print("astropy import OK")
            PY
          } | tee ACIRM_R21AX_R7G_R2Z_RESULTS/logs/python_dependency_install.log

      - name: Pull OSA Docker image
        continue-on-error: true
        run: |
          {
            echo "Docker version"
            docker --version || true
            docker info || true
            echo ""
            echo "Pull integralsw/osa:latest"
            docker pull integralsw/osa:latest || true
          } | tee ACIRM_R21AX_R7G_R2Z_RESULTS/logs/docker_pull.log

      - name: Download SWG and resolve group members
        continue-on-error: true
        run: |
          python3 - <<'PY'
          import csv
          import gzip
          import hashlib
          import json
          import re
          import shutil
          import subprocess
          import time
          from pathlib import Path
          from astropy.io import fits

          RUN_ID = "ACIRM_R21AX_R7G_R2Z_GROUP_MEMBER_RESOLVER_FOR_SWG_DAL_SMOKE_LIGHT_FIXED"

          out = Path("ACIRM_R21AX_R7G_R2Z_RESULTS")
          data = out / "data"
          logs = out / "logs"
          data.mkdir(parents=True, exist_ok=True)
          logs.mkdir(parents=True, exist_ok=True)

          base_https = "https://heasarc.gsfc.nasa.gov/FTP/integral/data"
          base_http = "http://heasarc.gsfc.nasa.gov/FTP/integral/data"

          rev = "2504"
          scw = "250400090010"

          scw_dir = data / "scw" / rev / f"{scw}.001"
          scw_dir.mkdir(parents=True, exist_ok=True)

          remote_dir_https = f"{base_https}/scw/{rev}/{scw}.001"
          remote_dir_http = f"{base_http}/scw/{rev}/{scw}.001"

          swg_path = scw_dir / "swg.fits"

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def is_gzip(path):
              try:
                  with open(path, "rb") as f:
                      return f.read(2) == b"\x1f\x8b"
              except Exception:
                  return False

          def is_fits(path):
              try:
                  with open(path, "rb") as f:
                      head = f.read(16)
                  return head.startswith(b"SIMPLE") or head.startswith(b"XTENSION")
              except Exception:
                  return False

          def accept_download(path):
              if not path.exists():
                  return False, "missing"
              size = path.stat().st_size
              if size <= 1024:
                  return False, f"too_small_{size}"
              if is_gzip(path):
                  return True, "gzip"
              if is_fits(path):
                  return True, "fits"
              return False, "not_fits_or_gzip"

          def curl_download(url, tmp):
              if tmp.exists():
                  tmp.unlink()

              cmd = [
                  "curl",
                  "-4",
                  "-L",
                  "--retry", "8",
                  "--retry-delay", "10",
                  "--connect-timeout", "90",
                  "--max-time", "1200",
                  "--fail",
                  "-o", str(tmp),
                  url,
              ]

              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              ok, reason = accept_download(tmp)
              return p.returncode, ok, reason, p.stdout[-4000:]

          def materialize_download(tmp, final_path):
              final_path.parent.mkdir(parents=True, exist_ok=True)

              if is_gzip(tmp):
                  with gzip.open(tmp, "rb") as src, open(final_path, "wb") as dst:
                      shutil.copyfileobj(src, dst)
                  tmp.unlink(missing_ok=True)
              else:
                  if final_path.exists():
                      final_path.unlink()
                  tmp.rename(final_path)

          def normalize_expected_name(name):
              name = str(name).strip()
              name = name.split("[")[0].strip()
              name = Path(name).name
              return name

          def download_expected_file(expected_name):
              expected_name = normalize_expected_name(expected_name)

              final_name = expected_name
              if final_name.endswith(".gz"):
                  final_name = final_name[:-3]

              final_path = scw_dir / final_name

              if final_path.exists() and final_path.stat().st_size > 1024:
                  row = {
                      "expected_name": expected_name,
                      "final_name": final_name,
                      "url": "already_exists",
                      "attempt": 0,
                      "returncode": 0,
                      "ok": True,
                      "reason": "already_exists",
                      "final_path": str(final_path),
                      "final_bytes": final_path.stat().st_size,
                      "final_sha256": sha256_file(final_path),
                      "log_tail": "",
                  }
                  return True, [row]

              candidates = []
              for root in [remote_dir_https, remote_dir_http]:
                  candidates.append(f"{root}/{expected_name}")

                  if expected_name.endswith(".fits") and not expected_name.endswith(".fits.gz"):
                      candidates.append(f"{root}/{expected_name}.gz")

                  if expected_name.endswith(".fits.gz"):
                      candidates.append(f"{root}/{expected_name[:-3]}")

              rows = []

              for i, url in enumerate(candidates, start=1):
                  tmp = scw_dir / f".download_{final_name}_{i}.part"

                  row = {
                      "expected_name": expected_name,
                      "final_name": final_name,
                      "url": url,
                      "attempt": i,
                      "returncode": "",
                      "ok": False,
                      "reason": "",
                      "final_path": str(final_path),
                      "final_bytes": 0,
                      "final_sha256": "",
                      "log_tail": "",
                  }

                  try:
                      rc, ok, reason, log_tail = curl_download(url, tmp)
                      row["returncode"] = rc
                      row["reason"] = reason
                      row["log_tail"] = log_tail

                      if ok:
                          materialize_download(tmp, final_path)
                          if final_path.exists() and final_path.stat().st_size > 1024:
                              row["ok"] = True
                              row["final_bytes"] = final_path.stat().st_size
                              row["final_sha256"] = sha256_file(final_path)
                              rows.append(row)
                              return True, rows

                  except Exception as e:
                      row["reason"] = repr(e)

                  rows.append(row)

              return False, rows

          all_download_rows = []
          parse_rows = []
          member_status_rows = []

          try:
              ok_swg, swg_rows = download_expected_file("swg.fits")
              all_download_rows.extend(swg_rows)

              discovered = set()

              explicit_seed_members = [
                  "sc_time.fits",
                  "sc_attitude.fits",
                  "spi_oper.fits",
                  "spi_spectra.fits",
                  "spi_gti.fits",
                  "spi_hk.fits",
                  "spi_science_hk.fits",
                  "spi_acs.fits",
              ]

              for x in explicit_seed_members:
                  discovered.add(x)

              regex = re.compile(r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)")

              def cell_to_text(x):
                  try:
                      if isinstance(x, bytes):
                          return x.decode("utf-8", "replace")
                      if isinstance(x, str):
                          return x
                      if hasattr(x, "tolist"):
                          x = x.tolist()
                      if isinstance(x, (list, tuple)):
                          return " ".join(cell_to_text(v) for v in x)
                      return str(x)
                  except Exception:
                      return ""

              if swg_path.exists():
                  try:
                      with fits.open(swg_path, memmap=True) as hdul:
                          for hdu_i, hdu in enumerate(hdul):
                              hdu_name = getattr(hdu, "name", "")

                              if not hasattr(hdu, "data") or hdu.data is None:
                                  continue

                              if not hasattr(hdu, "columns"):
                                  continue

                              for col in hdu.columns.names:
                                  try:
                                      arr = hdu.data[col]
                                      flat = arr.ravel() if hasattr(arr, "ravel") else arr

                                      for row_i, val in enumerate(flat):
                                          txt = cell_to_text(val)

                                          for m in regex.findall(txt):
                                              clean = normalize_expected_name(m)

                                              if clean and clean != "swg.fits":
                                                  discovered.add(clean)
                                                  parse_rows.append({
                                                      "hdu_index": hdu_i,
                                                      "hdu_name": hdu_name,
                                                      "column": col,
                                                      "row_index": row_i,
                                                      "reference": m,
                                                      "clean_name": clean,
                                                      "error": "",
                                                  })

                                  except Exception as e:
                                      parse_rows.append({
                                          "hdu_index": hdu_i,
                                          "hdu_name": hdu_name,
                                          "column": col,
                                          "row_index": "",
                                          "reference": "",
                                          "clean_name": "",
                                          "error": repr(e),
                                      })

                  except Exception as e:
                      parse_rows.append({
                          "hdu_index": "",
                          "hdu_name": "",
                          "column": "",
                          "row_index": "",
                          "reference": "",
                          "clean_name": "",
                          "error": repr(e),
                      })

              member_names = sorted(discovered)

              for name in member_names:
                  ok, rows = download_expected_file(name)
                  all_download_rows.extend(rows)

                  final_name = normalize_expected_name(name)
                  if final_name.endswith(".gz"):
                      final_name = final_name[:-3]

                  final_path = scw_dir / Path(final_name).name

                  member_status_rows.append({
                      "member_name": name,
                      "final_name": Path(final_name).name,
                      "ok": ok and final_path.exists(),
                      "final_path": str(final_path),
                      "final_bytes": final_path.stat().st_size if final_path.exists() else 0,
                      "final_sha256": sha256_file(final_path) if final_path.exists() and final_path.stat().st_size > 0 else "",
                  })

          except Exception as e:
              parse_rows.append({
                  "hdu_index": "",
                  "hdu_name": "",
                  "column": "",
                  "row_index": "",
                  "reference": "",
                  "clean_name": "",
                  "error": "TOP_LEVEL_ERROR: " + repr(e),
              })
              ok_swg = swg_path.exists()

          with open(out / "r2z_group_member_references_parsed.csv", "w", newline="", encoding="utf-8") as f:
              fieldnames = ["hdu_index", "hdu_name", "column", "row_index", "reference", "clean_name", "error"]
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              for r in parse_rows:
                  for k in fieldnames:
                      r.setdefault(k, "")
                  w.writerow(r)

          with open(out / "r2z_group_member_download_manifest.csv", "w", newline="", encoding="utf-8") as f:
              fieldnames = [
                  "expected_name",
                  "final_name",
                  "url",
                  "attempt",
                  "returncode",
                  "ok",
                  "reason",
                  "final_path",
                  "final_bytes",
                  "final_sha256",
                  "log_tail",
              ]
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              for r in all_download_rows:
                  for k in fieldnames:
                      r.setdefault(k, "")
                  w.writerow(r)

          with open(out / "r2z_group_member_status.csv", "w", newline="", encoding="utf-8") as f:
              fieldnames = ["member_name", "final_name", "ok", "final_path", "final_bytes", "final_sha256"]
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(member_status_rows)

          final_files = []
          for p in scw_dir.glob("*.fits"):
              final_files.append({
                  "path": str(p),
                  "bytes": p.stat().st_size,
                  "sha256": sha256_file(p),
              })

          with open(out / "r2z_final_local_fits_files.csv", "w", newline="", encoding="utf-8") as f:
              fieldnames = ["path", "bytes", "sha256"]
              w = csv.DictWriter(f, fieldnames=fieldnames)
              w.writeheader()
              w.writerows(final_files)

          summary = {
              "run_id": RUN_ID,
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "GROUP_MEMBER_RESOLVER_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY",
              "swg_download_ok": bool(swg_path.exists()),
              "member_ok_count": sum(1 for r in member_status_rows if r["ok"]),
              "member_total_count": len(member_status_rows),
              "local_fits_file_count": len(final_files),
              "final_status": (
                  "R21AX_R7G_R2Z_GROUP_MEMBERS_DOWNLOADED_READY_FOR_DAL_VERIFY_NO_511_YET"
                  if swg_path.exists() and len(final_files) > 1
                  else "R21AX_R7G_R2Z_GROUP_MEMBER_DOWNLOAD_INCOMPLETE_NO_PHYSICAL_NULL"
              ),
          }

          with open(out / "R2Z_GROUP_MEMBER_RESOLVER_SUMMARY.json", "w", encoding="utf-8") as f:
              json.dump(summary, f, indent=2, sort_keys=True)

          print(json.dumps(summary, indent=2))
          PY

      - name: Run DAL verify after group member resolving
        continue-on-error: true
        run: |
          {
            echo "Run R2Z DAL verify after group member resolving"
            docker run --rm \
              -v "$PWD/ACIRM_R21AX_R7G_R2Z_RESULTS/data:/data" \
              -v "$PWD/ACIRM_R21AX_R7G_R2Z_RESULTS/logs:/logs" \
              integralsw/osa:latest bash -lc '
                set +e

                mkdir -p /tmp/acirm_pfiles
                mkdir -p /tmp/acirm_work
                mkdir -p /tmp/acirm_rep

                cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                if [ -d /opt/osa/lib ]; then
                  export LD_LIBRARY_PATH=/opt/osa/lib:${LD_LIBRARY_PATH:-}
                fi

                if [ -d /opt/osa/lib64 ]; then
                  export LD_LIBRARY_PATH=/opt/osa/lib64:${LD_LIBRARY_PATH:-}
                fi

                echo "source only isdc_init_env.sh"
                source /opt/osa/bin/isdc_init_env.sh || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                TARGET=/data/scw/2504/250400090010.001/swg.fits

                echo "environment"
                env | sort | grep -E "^(ISDC|OSA|REP|PFILES|PATH|LD_LIBRARY_PATH|COMMONLOGFILE|HEADAS|CFITSIO)" || true
                echo ""

                echo "local files"
                find /data/scw/2504/250400090010.001 -maxdepth 1 -type f -printf "%f %s\n" | sort || true
                echo ""

                echo "fkeyprint swg.fits"
                timeout 90 fkeyprint "$TARGET" 2>&1 | head -220 || true
                echo ""

                echo "dal_verify swg.fits"
                timeout 240 dal_verify "$TARGET" 2>&1 | head -500 || true
                echo ""

                echo "og_create parameter probe"
                timeout 90 og_create 2>&1 | head -260 || true
                echo ""

                echo "commonlog tail"
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -300 || true
              '
          } | tee ACIRM_R21AX_R7G_R2Z_RESULTS/logs/r2z_dal_verify_after_member_resolve.log

      - name: Analyze R2Z logs
        run: |
          python3 - <<'PY'
          import csv
          import json
          import re
          import time
          from pathlib import Path

          out = Path("ACIRM_R21AX_R7G_R2Z_RESULTS")
          log_path = out / "logs" / "r2z_dal_verify_after_member_resolve.log"
          txt = log_path.read_text(errors="replace") if log_path.exists() else ""

          summary_path = out / "R2Z_GROUP_MEMBER_RESOLVER_SUMMARY.json"
          resolver = json.loads(summary_path.read_text(encoding="utf-8")) if summary_path.exists() else {}

          missing_refs = []
          if "DAL_FILE_NOT_ACCESSIBLE" in txt or "status -2004" in txt:
              for m in re.findall(r"([A-Za-z0-9_./+-]+\.fits(?:\[[^\]]+\])?)", txt):
                  missing_refs.append(m)

          missing_refs = sorted(set(missing_refs))

          checks = {
              "log_exists": log_path.exists(),
              "swg_download_ok": bool(resolver.get("swg_download_ok", False)),
              "member_ok_count": resolver.get("member_ok_count", 0),
              "member_total_count": resolver.get("member_total_count", 0),
              "local_fits_file_count": resolver.get("local_fits_file_count", 0),
              "fkeyprint_invoked": "fkeyprint swg.fits" in txt,
              "dal_verify_invoked": "dal_verify swg.fits" in txt,
              "dal_file_not_accessible_seen": "DAL_FILE_NOT_ACCESSIBLE" in txt or "status -2004" in txt,
              "isdc_env_missing_seen": "ISDC_ENV is not set" in txt or "env. variable ISDC_ENV is not set" in txt,
              "parameter_init_error_seen": "Parameter initialization error" in txt or "status -3003" in txt,
              "og_create_probe_invoked": "og_create parameter probe" in txt,
              "missing_reference_count_context": len(missing_refs),
          }

          if checks["dal_verify_invoked"] and not checks["dal_file_not_accessible_seen"] and not checks["isdc_env_missing_seen"]:
              status = "R21AX_R7G_R2Z_DAL_VERIFY_REACHED_GROUP_FILE_LAYER_WITH_MEMBERS_NO_511_YET_REVIEW_REQUIRED"
          elif checks["dal_file_not_accessible_seen"]:
              status = "R21AX_R7G_R2Z_DAL_STILL_REQUIRES_ADDITIONAL_GROUP_MEMBER_NO_511_NO_PHYSICAL_NULL"
          elif checks["isdc_env_missing_seen"] or checks["parameter_init_error_seen"]:
              status = "R21AX_R7G_R2Z_ENV_OR_PARAMETER_LAYER_REGRESSION_NO_511_NO_PHYSICAL_NULL"
          else:
              status = "R21AX_R7G_R2Z_LOGS_READY_FOR_AUDIT_NO_511_NO_PHYSICAL_NULL"

          with open(out / "r2z_dal_missing_reference_context.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["missing_reference_context"])
              w.writeheader()
              for x in missing_refs:
                  w.writerow({"missing_reference_context": x})

          final_summary = {
              "run_id": "ACIRM_R21AX_R7G_R2Z_GROUP_MEMBER_RESOLVER_FOR_SWG_DAL_SMOKE_LIGHT_FIXED",
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "GROUP_MEMBER_RESOLVER_DAL_SMOKE_TEST_NOT_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY",
              "checks": checks,
              "final_status": status,
          }

          with open(out / "R2Z_DAL_SMOKE_TEST_SUMMARY.json", "w", encoding="utf-8") as f:
              json.dump(final_summary, f, indent=2, sort_keys=True)

          with open(out / "r2z_checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          print(json.dumps(final_summary, indent=2))
          PY

      - name: Build LIGHT audit package only
        if: always()
        run: |
          mkdir -p ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/logs

          cp -r ACIRM_R21AX_R7G_R2Z_RESULTS/logs/* ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R2Z_RESULTS/*.json ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/ || true
          cp ACIRM_R21AX_R7G_R2Z_RESULTS/*.csv ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/ || true

          echo "Group member FITS files were downloaded temporarily on the GitHub runner." > ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "FITS files are excluded from this phone artifact." >> ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "No 511 keV metric is computed here." >> ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt

          du -h ACIRM_R21AX_R7G_R2Z_RESULTS/data > ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/data_size_report.txt || true
          find ACIRM_R21AX_R7G_R2Z_RESULTS/data -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/data_file_list.csv || true

          cat > ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/R2Z_CLAIM_BOUNDARY.txt <<'EOF'
          ACIRM R2Z claim boundary:
          - Group member resolver and DAL smoke test only.
          - No 511 keV metric is computed.
          - Not full OSA proof.
          - Not 511 keV discovery.
          - Any network/runtime/DAL group-member failure is not a physical null.
          EOF

          cat > ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS/R2Z_NEXT_STEP.txt <<'EOF'
          Upload ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS.zip to ChatGPT.
          Do not upload heavy FITS data.
          Next step depends on whether dal_verify reached the group file layer cleanly.
          EOF

          zip -r ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS.zip ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS
          sha256sum ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS.zip > ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R2Z LIGHT artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R2Z_LIGHT_RESULTS.zip.sha256.txt
