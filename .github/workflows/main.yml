name: ACIRM R17K OSA SPI511 Official Product Generator

on:
  workflow_dispatch:

jobs:
  r17k-osa-spi511-official-products:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare folders and locked inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_OSA_OUTPUTS repo/scw/2504 logs scripts products selected_products
          cat > ACIRM_R17K_OSA_OUTPUTS/LOCKED_SCW_LIST.txt <<'EOF'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          EOF
          sed -i 's/^ *//' ACIRM_R17K_OSA_OUTPUTS/LOCKED_SCW_LIST.txt
          cp ACIRM_R17K_OSA_OUTPUTS/LOCKED_SCW_LIST.txt scw.list
          cat > ACIRM_R17K_OSA_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_CLAIM_CEILING:
          OFFICIAL_OSA_PRODUCT_GENERATION_OR_LOCATOR_ONLY
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_PRODUCTS_AND_LOCKED_CONTROLS_PASS
          EOF
          cat > ACIRM_R17K_OSA_OUTPUTS/R17K_STATUS.txt <<'EOF'
          R17K_R1_FIXED_REGEX_STARTED
          EOF

      - name: System diagnostics
        shell: bash
        run: |
          set +e
          uname -a | tee logs/uname.txt
          df -h | tee logs/df_start.txt
          free -h | tee logs/free_start.txt
          docker --version | tee logs/docker_version.txt
          python3 --version | tee logs/python_version.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y rsync curl wget zip unzip python3-pip > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy requests > logs/pip_install.log 2>&1

      - name: Fetch locked Rev 2504 SCW directories from HEASARC
        shell: bash
        run: |
          set -Eeuo pipefail
          cat > scripts/fetch_locked_scw.py <<'PY'
          import re
          import json
          from pathlib import Path
          from urllib.parse import urljoin
          import requests

          REV = "2504"
          SCWS = [x.strip() for x in Path("scw.list").read_text().splitlines() if x.strip()]
          BASES = [
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{REV}/",
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/rev_3/scw/{REV}/",
          ]

          OUT = Path("repo/scw") / REV
          OUT.mkdir(parents=True, exist_ok=True)

          MAX_FILE_MB = 700
          MAX_TOTAL_MB = 9500
          TIMEOUT = 60

          session = requests.Session()
          session.headers.update({"User-Agent": "ACIRM-R17K-R1-fixed-fetch/1.0"})

          rows = []
          total = 0

          def hrefs(html):
              return sorted(set(
                  m.group(1)
                  for m in re.finditer(r"href=[\"']([^\"']+)[\"']", html, re.I)
              ))

          for scw in SCWS:
              target_dir = OUT / (scw + ".001")
              target_dir.mkdir(parents=True, exist_ok=True)
              found_listing = False

              for base in BASES:
                  url = urljoin(base, scw + ".001/")
                  row = {
                      "scw": scw,
                      "listing_url": url,
                      "listing_status": "",
                      "files_seen": 0,
                      "files_downloaded": 0,
                      "error": ""
                  }

                  try:
                      r = session.get(url, timeout=TIMEOUT, allow_redirects=True)
                      row["listing_status"] = r.status_code

                      if r.status_code != 200:
                          rows.append(row)
                          continue

                      found_listing = True
                      links = [
                          h for h in hrefs(r.text)
                          if h and not h.startswith("?") and h not in ("../", "./", "/")
                      ]
                      files = [h for h in links if not h.endswith("/")]
                      row["files_seen"] = len(files)

                      for f in files:
                          fu = urljoin(url, f)
                          try:
                              h = session.head(fu, timeout=TIMEOUT, allow_redirects=True)
                              if h.status_code != 200:
                                  rows.append({
                                      "scw": scw,
                                      "file_url": fu,
                                      "status": h.status_code,
                                      "download": "HEAD_NOT_200"
                                  })
                                  continue

                              sz = h.headers.get("Content-Length", "")
                              sz = int(sz) if sz.isdigit() else 0

                              if sz and sz > MAX_FILE_MB * 1000 * 1000:
                                  rows.append({
                                      "scw": scw,
                                      "file_url": fu,
                                      "status": h.status_code,
                                      "size_bytes": sz,
                                      "download": "SKIP_TOO_LARGE"
                                  })
                                  continue

                              if sz and total + sz > MAX_TOTAL_MB * 1000 * 1000:
                                  rows.append({
                                      "scw": scw,
                                      "file_url": fu,
                                      "status": h.status_code,
                                      "size_bytes": sz,
                                      "download": "SKIP_TOTAL_LIMIT"
                                  })
                                  continue

                              rr = session.get(fu, timeout=TIMEOUT, stream=True, allow_redirects=True)
                              if rr.status_code != 200:
                                  rows.append({
                                      "scw": scw,
                                      "file_url": fu,
                                      "status": rr.status_code,
                                      "download": "GET_NOT_200"
                                  })
                                  continue

                              local = target_dir / f
                              n = 0
                              with open(local, "wb") as out:
                                  for chunk in rr.iter_content(1024 * 1024):
                                      if not chunk:
                                          continue
                                      n += len(chunk)
                                      if n > MAX_FILE_MB * 1000 * 1000:
                                          raise RuntimeError("file exceeded max")
                                      if total + n > MAX_TOTAL_MB * 1000 * 1000:
                                          raise RuntimeError("total exceeded max")
                                      out.write(chunk)

                              total += n
                              row["files_downloaded"] += 1
                              rows.append({
                                  "scw": scw,
                                  "file_url": fu,
                                  "local": str(local),
                                  "size_bytes": n,
                                  "download": "DOWNLOADED"
                              })

                          except Exception as e:
                              rows.append({
                                  "scw": scw,
                                  "file_url": fu,
                                  "download": "ERROR",
                                  "error": repr(e)[:300]
                              })

                      rows.append(row)
                      break

                  except Exception as e:
                      row["error"] = repr(e)[:300]
                      rows.append(row)

              if not found_listing:
                  rows.append({"scw": scw, "download": "NO_LISTING_FOUND"})

          Path("ACIRM_R17K_OSA_OUTPUTS/R17K_SCW_FETCH_AUDIT.json").write_text(
              json.dumps({"rows": rows, "total_bytes": total}, indent=2),
              encoding="utf-8"
          )
          PY

          python3 scripts/fetch_locked_scw.py | tee logs/fetch_locked_scw_stdout.log
          find repo/scw/2504 -maxdepth 2 -type f | sort > ACIRM_R17K_OSA_OUTPUTS/R17K_SCW_FILE_INVENTORY.txt
          du -ah repo/scw/2504 | sort -h | tail -100 > ACIRM_R17K_OSA_OUTPUTS/R17K_SCW_SIZE_INVENTORY.txt

      - name: Fetch IC and CAT repository trees when available
        shell: bash
        run: |
          set +e
          echo "Fetching IC/CAT repository trees. Raw files are not packaged." | tee logs/rsync_notice.txt

          rsync -Lrtvz --timeout=90 --contimeout=30 isdcarc.unige.ch::arc/FTP/arc_distr/ic_tree/prod/ repo/ > logs/rsync_ic_tree.log 2>&1
          echo "IC_RSYNC_EXIT=$?" | tee -a logs/rsync_notice.txt

          rsync -Lrtvz --timeout=90 --contimeout=30 isdcarc.unige.ch::arc/FTP/arc_distr/cat_tree/prod/ repo/ > logs/rsync_cat_tree.log 2>&1
          echo "CAT_RSYNC_EXIT=$?" | tee -a logs/rsync_notice.txt

          mkdir -p repo/ic repo/idx/ic repo/cat repo/aux
          find repo -maxdepth 3 -type d | sort > ACIRM_R17K_OSA_OUTPUTS/R17K_REPO_DIRS_AFTER_FETCH.txt
          du -sh repo 2>/dev/null | tee ACIRM_R17K_OSA_OUTPUTS/R17K_REPO_SIZE.txt
          df -h | tee logs/df_after_repo_fetch.txt

      - name: Fetch official OSA Docker wrapper
        shell: bash
        run: |
          set +e
          git clone --depth 1 https://github.com/ISDC-integral/osa-docker.git osa-docker > logs/git_clone_osa_docker.log 2>&1
          echo "GIT_CLONE_EXIT=$?" | tee ACIRM_R17K_OSA_OUTPUTS/R17K_GIT_CLONE_OSA_DOCKER_EXIT.txt

          chmod +x osa-docker/osa-container.sh osa-docker/osa-docker.sh 2>/dev/null || true

          docker pull integralsw/osa:latest > logs/docker_pull_integralsw_osa.log 2>&1
          echo "DOCKER_PULL_EXIT=$?" | tee ACIRM_R17K_OSA_OUTPUTS/R17K_DOCKER_PULL_EXIT.txt

      - name: OSA visibility and command preflight inside Docker
        shell: bash
        run: |
          set +e
          cat > scripts/osa_preflight.sh <<'SH'
          set +e
          echo "PWD=$PWD"
          echo "REP_BASE_PROD=$REP_BASE_PROD"
          echo "CURRENT_IC=$CURRENT_IC"
          echo "ISDC_REF_CAT=$ISDC_REF_CAT"
          which og_create || true
          which spi_science_analysis || true
          which dal_list || true
          og_create --version || true
          spi_science_analysis --version || true
          find /home/integral/repo -maxdepth 3 -type d | head -200 || true
          SH

          chmod +x scripts/osa_preflight.sh
          export OSA_DOCKER_PULL=no
          export REP_BASE_PROD=/home/integral/repo
          export CURRENT_IC=/home/integral/repo
          export ISDC_REF_CAT=/home/integral/repo/cat/hec/gnrl_refr_cat_0043.fits[1]

          if [ -x osa-docker/osa-container.sh ]; then
            bash osa-docker/osa-container.sh docker bash -lc 'bash /home/integral/scripts/osa_preflight.sh' > logs/osa_docker_preflight.log 2>&1
            echo "OSA_PREFLIGHT_EXIT=$?" | tee ACIRM_R17K_OSA_OUTPUTS/R17K_OSA_PREFLIGHT_EXIT.txt
          else
            echo "OSA_DOCKER_WRAPPER_NOT_FOUND" | tee ACIRM_R17K_OSA_OUTPUTS/R17K_OSA_PREFLIGHT_EXIT.txt
          fi

      - name: Run guarded OSA product generation attempts
        shell: bash
        run: |
          set +e
          cat > scripts/osa_run_guarded.sh <<'SH'
          set +e

          export REP_BASE_PROD=/home/integral/repo
          export CURRENT_IC=/home/integral/repo
          export ISDC_REF_CAT=/home/integral/repo/cat/hec/gnrl_refr_cat_0043.fits[1]
          export HEADASNOQUERY=1
          export HEADASPROMPT=/dev/null
          export PFILES=/home/integral/pfiles

          mkdir -p "$PFILES" /home/integral/osa_work /home/integral/products
          cd /home/integral

          echo "=== og_create attempt ==="
          og_create scw.list SPI acirm_r17k ./
          echo "OG_CREATE_EXIT=$?" > /home/integral/ACIRM_R17K_OSA_OUTPUTS/R17K_OG_CREATE_EXIT.txt

          find /home/integral -name 'og_spi.fits' -o -name 'og_*.fits' | sort > /home/integral/ACIRM_R17K_OSA_OUTPUTS/R17K_OG_PRODUCTS_FOUND.txt

          echo "=== locate obs dirs ==="
          find /home/integral -maxdepth 4 -type d | sort | tee /home/integral/ACIRM_R17K_OSA_OUTPUTS/R17K_DIRS_AFTER_OG_CREATE.txt

          OBS_DIR=""
          for d in /home/integral/obs/acirm_r17k /home/integral/acirm_r17k /home/integral/obs/* /home/integral/*acirm*; do
            if [ -d "$d" ]; then
              OBS_DIR="$d"
              break
            fi
          done

          echo "$OBS_DIR" > /home/integral/ACIRM_R17K_OSA_OUTPUTS/R17K_OBS_DIR.txt

          if [ -n "$OBS_DIR" ]; then
            cd "$OBS_DIR"
            echo "=== spi_science_analysis attempt default ==="
            yes '' | spi_science_analysis
            echo "SPI_SCIENCE_ANALYSIS_EXIT=$?" > /home/integral/ACIRM_R17K_OSA_OUTPUTS/R17K_SPI_SCIENCE_ANALYSIS_EXIT.txt
          else
            echo "NO_OBS_DIR_FOUND" > /home/integral/ACIRM_R17K_OSA_OUTPUTS/R17K_SPI_SCIENCE_ANALYSIS_EXIT.txt
          fi

          echo "=== final product search inside docker ==="
          find /home/integral -type f \
            \( -iname '*evts*det*spec*' -o -iname '*energy*bound*' -o -iname '*ebounds*' -o -iname '*og_spi.fits*' -o -iname '*spi*spect*' -o -iname '*.log' \) \
            | sort > /home/integral/ACIRM_R17K_OSA_OUTPUTS/R17K_PRODUCTS_AND_LOGS_FOUND.txt
          SH

          chmod +x scripts/osa_run_guarded.sh
          export OSA_DOCKER_PULL=no
          export REP_BASE_PROD=/home/integral/repo
          export CURRENT_IC=/home/integral/repo
          export ISDC_REF_CAT=/home/integral/repo/cat/hec/gnrl_refr_cat_0043.fits[1]

          if [ -x osa-docker/osa-container.sh ]; then
            bash osa-docker/osa-container.sh docker bash -lc 'bash /home/integral/scripts/osa_run_guarded.sh' > logs/osa_run_guarded.log 2>&1
            echo "OSA_RUN_GUARDED_EXIT=$?" | tee ACIRM_R17K_OSA_OUTPUTS/R17K_OSA_RUN_GUARDED_EXIT.txt
          else
            echo "OSA_DOCKER_WRAPPER_NOT_FOUND" | tee ACIRM_R17K_OSA_OUTPUTS/R17K_OSA_RUN_GUARDED_EXIT.txt
          fi

      - name: Collect selected products and inspect FITS outputs
        shell: bash
        run: |
          set +e
          echo "Collecting selected products only; raw archive is not packaged."

          find . -type f \( -iname '*evts*det*spec*' -o -iname '*energy*bound*' -o -iname '*ebounds*' -o -iname 'og_spi.fits' \) | sort > ACIRM_R17K_OSA_OUTPUTS/R17K_SELECTED_PRODUCT_PATHS.txt

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -le 200000000 ]; then
              cp -f "$f" selected_products/ || true
            fi
          done < ACIRM_R17K_OSA_OUTPUTS/R17K_SELECTED_PRODUCT_PATHS.txt

          cp logs/*.log ACIRM_R17K_OSA_OUTPUTS/ 2>/dev/null || true

          cat > scripts/inspect_r17k_products.py <<'PY'
          import json
          import csv
          import math
          from pathlib import Path
          import numpy as np

          try:
              from astropy.io import fits
          except Exception:
              fits = None

          OUT = Path("ACIRM_R17K_OSA_OUTPUTS")
          PROD = Path("selected_products")

          rows = []
          meas = []
          errs = []

          LINE = (508.0, 514.0)
          SB1 = (490.0, 500.0)
          SB2 = (522.0, 532.0)

          E_PAIRS = [
              ("E_MIN", "E_MAX"),
              ("ENERG_LO", "ENERG_HI"),
              ("ENERGY_LO", "ENERGY_HI"),
              ("E_LO", "E_HI"),
              ("EMIN", "EMAX"),
              ("E_LOW", "E_HIGH"),
          ]

          E_SINGLE = ["ENERGY", "E", "E_MEAN", "E_CENTER", "PI", "PHA", "CHANNEL", "CHAN"]
          C_COLS = ["COUNTS", "COUNT", "RATE", "SPECTRUM", "SPEC", "DATA", "FLUX", "VALUE", "NCOUNTS"]

          def arr(x):
              return np.asarray(x, dtype=float)

          def collapse(x, n):
              a = np.nan_to_num(arr(x), nan=0.0, posinf=0.0, neginf=0.0)
              if a.size == n:
                  return a.reshape(-1)[:n]
              if a.ndim >= 2 and a.shape[-1] == n:
                  return a.sum(axis=tuple(range(a.ndim - 1))).reshape(-1)
              if a.ndim >= 2 and a.shape[0] == n:
                  return a.sum(axis=tuple(range(1, a.ndim))).reshape(-1)
              return None

          def measure_edges(lo, hi, cnt):
              lo = arr(lo).reshape(-1)
              hi = arr(hi).reshape(-1)
              n = min(len(lo), len(hi))
              if n == 0:
                  return None
              lo = lo[:n]
              hi = hi[:n]
              c = collapse(cnt, n)
              if c is None:
                  return None

              width = np.maximum(1e-12, hi - lo)

              def frac(w):
                  return np.maximum(0, np.minimum(hi, w[1]) - np.maximum(lo, w[0])) / width

              line = float((c * frac(LINE)).sum())
              sb1 = float((c * frac(SB1)).sum())
              sb2 = float((c * frac(SB2)).sum())
              side = sb1 + sb2
              ratio = (line / 6) / (side / 20) if side > 0 else math.inf
              exp = side / 20 * 6 if side > 0 else math.nan
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan

              return {
                  "line_508_514_counts": line,
                  "side_490_500_counts": sb1,
                  "side_522_532_counts": sb2,
                  "side_total_counts": side,
                  "line_to_side_density_ratio": ratio,
                  "expected_line_from_side_density": exp,
                  "z_vs_side_density": z,
                  "energy_bins": n,
              }

          def measure_centers(e, cnt):
              e = arr(e).reshape(-1)
              c = collapse(cnt, len(e))
              if c is None or len(e) == 0:
                  return None

              line = float(np.nansum(c[(e >= LINE[0]) & (e <= LINE[1])]))
              sb1 = float(np.nansum(c[(e >= SB1[0]) & (e <= SB1[1])]))
              sb2 = float(np.nansum(c[(e >= SB2[0]) & (e <= SB2[1])]))
              side = sb1 + sb2
              ratio = (line / 6) / (side / 20) if side > 0 else math.inf
              exp = side / 20 * 6 if side > 0 else math.nan
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan

              return {
                  "line_508_514_counts": line,
                  "side_490_500_counts": sb1,
                  "side_522_532_counts": sb2,
                  "side_total_counts": side,
                  "line_to_side_density_ratio": ratio,
                  "expected_line_from_side_density": exp,
                  "z_vs_side_density": z,
                  "energy_bins": len(e),
              }

          if fits:
              for p in PROD.glob("*"):
                  if not p.name.lower().endswith((".fits", ".fit", ".fits.gz", ".fit.gz")):
                      continue
                  try:
                      with fits.open(p, memmap=True) as hdul:
                          for i, hdu in enumerate(hdul):
                              cols = []
                              nrows = ""
                              if hasattr(hdu, "columns") and hdu.columns is not None:
                                  cols = list(hdu.columns.names or [])
                              try:
                                  nrows = len(hdu.data) if getattr(hdu, "data", None) is not None else ""
                              except Exception:
                                  nrows = ""

                              rows.append({
                                  "file": p.name,
                                  "hdu_index": i,
                                  "hdu_name": hdu.name or "",
                                  "class": hdu.__class__.__name__,
                                  "rows": nrows,
                                  "column_count": len(cols),
                                  "columns": ";".join(cols[:120]),
                              })

                              if not (hasattr(hdu, "columns") and hdu.columns is not None and hdu.data is not None):
                                  continue

                              cmap = {c.upper(): c for c in cols}

                              for a, b in E_PAIRS:
                                  if a in cmap and b in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap:
                                              m = measure_edges(hdu.data[cmap[a]], hdu.data[cmap[b]], hdu.data[cmap[ck]])
                                              if m:
                                                  m.update({
                                                      "file": p.name,
                                                      "hdu_index": i,
                                                      "hdu_name": hdu.name or "",
                                                      "method": "same_hdu_edges",
                                                      "energy_source": cmap[a] + "|" + cmap[b],
                                                      "count_source": cmap[ck],
                                                  })
                                                  meas.append(m)

                              for ek in E_SINGLE:
                                  if ek in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap and ck != ek:
                                              m = measure_centers(hdu.data[cmap[ek]], hdu.data[cmap[ck]])
                                              if m:
                                                  m.update({
                                                      "file": p.name,
                                                      "hdu_index": i,
                                                      "hdu_name": hdu.name or "",
                                                      "method": "same_hdu_centers",
                                                      "energy_source": cmap[ek],
                                                      "count_source": cmap[ck],
                                                  })
                                                  meas.append(m)

                  except Exception as e:
                      errs.append({"file": str(p), "error": repr(e)[:300]})

          def write_csv(path, data):
              keys = []
              for r in data:
                  for k in r:
                      if k not in keys:
                          keys.append(k)
              if not keys:
                  keys = ["empty"]

              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=keys)
                  w.writeheader()
                  for r in data:
                      w.writerow({k: r.get(k, "") for k in keys})

          write_csv(OUT / "R17K_SELECTED_PRODUCT_SCHEMA.csv", rows)
          write_csv(OUT / "R17K_DIRECT_511_MEASUREMENT_ROWS.csv", meas)
          (OUT / "R17K_PRODUCT_INSPECTION_ERRORS.json").write_text(json.dumps(errs, indent=2), encoding="utf-8")

          selected = list(PROD.glob("*"))
          decision = "R17K_OFFICIAL_PRODUCTS_GENERATED_OR_FOUND_DIAGNOSTIC_NOT_PROOF" if selected else "R17K_NO_OFFICIAL_PRODUCTS_GENERATED_OR_FOUND"
          if meas:
              decision = "R17K_DIRECT_511_ROWS_FROM_OFFICIAL_PRODUCTS_FOUND_DIAGNOSTIC_NOT_PROOF"

          summary = {
              "decision": decision,
              "proof_allowed": False,
              "selected_product_count": len(selected),
              "direct_511_measurement_rows": len(meas),
              "schema_rows": len(rows),
              "claim_ceiling": [
                  "OFFICIAL_OSA_PRODUCT_GENERATION_OR_LOCATOR_ONLY",
                  "NOT_DISCOVERY",
                  "NOT_PARTICLE_PROOF",
                  "NOT_SOURCE_ATTRIBUTION",
                  "NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_LOCKED_CONTROLS_PASS"
              ]
          }

          (OUT / "R17K_DECISION.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

          python3 scripts/inspect_r17k_products.py | tee logs/inspect_r17k_products.log

      - name: Package slim phone artifact
        shell: bash
        run: |
          set +e
          cp -r selected_products ACIRM_R17K_OSA_OUTPUTS/selected_products 2>/dev/null || true
          find selected_products -maxdepth 1 -type f -printf '%f,%s\n' | sort > ACIRM_R17K_OSA_OUTPUTS/R17K_SELECTED_PRODUCTS_MANIFEST.csv || true
          df -h > ACIRM_R17K_OSA_OUTPUTS/R17K_DF_END.txt
          free -h > ACIRM_R17K_OSA_OUTPUTS/R17K_FREE_END.txt

          zip -r ACIRM_R17K_OSA_SPI511_OFFICIAL_PRODUCT_GENERATOR_OUTPUT.zip ACIRM_R17K_OSA_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_OSA_SPI511_OFFICIAL_PRODUCT_GENERATOR_OUTPUT.zip > ACIRM_R17K_OSA_SPI511_OFFICIAL_PRODUCT_GENERATOR_OUTPUT.zip.sha256.txt

          ls -lh ACIRM_R17K_OSA_SPI511_OFFICIAL_PRODUCT_GENERATOR_OUTPUT.zip ACIRM_R17K_OSA_SPI511_OFFICIAL_PRODUCT_GENERATOR_OUTPUT.zip.sha256.txt

      - name: Upload slim artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_OSA_SPI511_OFFICIAL_PRODUCT_GENERATOR_OUTPUT
