name: ACIRM R17K R8W Rev2446 Local Continuum SPI511 Compact

on:
  workflow_dispatch:
    inputs:
      target_start: {required: false, default: '244600170010'}
      target_end: {required: false, default: '244600210010'}
      rev_center: {required: false, default: '2446'}
      rev_pad: {required: false, default: '1'}
      max_new_files: {required: false, default: '220'}
      download_mb_cap: {required: false, default: '350'}

permissions:
  contents: read
  actions: write

jobs:
  r17k-r8w-rev2446-local-continuum-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      TARGET_START: ${{ inputs.target_start }}
      TARGET_END: ${{ inputs.target_end }}
      REV_CENTER: ${{ inputs.rev_center }}
      REV_PAD: ${{ inputs.rev_pad }}
      MAX_NEW_FILES: ${{ inputs.max_new_files }}
      DOWNLOAD_MB_CAP: ${{ inputs.download_mb_cap }}
    steps:
      - name: Prepare
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R8W_OUTPUTS logs scripts repo/scw repo/ic repo/idx repo/cat repo/aux
          cat > ACIRM_R17K_R8W_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R8W_REV2446_LOCAL_CONTINUUM_SPI511_VALIDATION
          VALIDATES R8V NEAR-MODERATE WEAK 511 HINT
          LOCKED BAND: 508-514 keV
          TESTS: local continuum, broad band, centroid scan, leave-one-out, detector jackknife, adjacent controls
          NO CHANNEL APPROXIMATION AS PROOF
          NO POST-HOC UPGRADE FROM BROAD/CENTROID ONLY
          BACKTRACE ONLY IF LOCKED BAND + LOCAL CONTINUUM VALIDATE MODERATE/STRONG
          DIAGNOSTIC_NOT_PROOF
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF
          EOF
          printf 'TARGET_START=%s\nTARGET_END=%s\nREV_CENTER=%s\nREV_PAD=%s\nMAX_NEW_FILES=%s\nDOWNLOAD_MB_CAP=%s\n' "$TARGET_START" "$TARGET_END" "$REV_CENTER" "$REV_PAD" "$MAX_NEW_FILES" "$DOWNLOAD_MB_CAP" > ACIRM_R17K_R8W_OUTPUTS/R17K_R8W_INPUTS.txt

      - name: Restore spectra cache
        id: restore-wide
        uses: actions/cache/restore@v4
        with:
          path: repo/scw
          key: acirm-r17k-r8w-rev${{ inputs.rev_center }}-${{ inputs.target_start }}-${{ inputs.target_end }}-v2
          restore-keys: |
            acirm-r17k-r8v-targeted-rev${{ inputs.rev_center }}-
            acirm-r17k-r8u-wide-spi-spectra-
            acirm-r17k-r8t-wide-spi-spectra-
            acirm-r17k-r8t-

      - name: Restore calibration tree cache
        id: restore-tree
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1
          restore-keys: |
            acirm-r17k-r8e-minimal-osa-tree-

      - name: Install and guard
        shell: bash
        run: |
          set +e
          echo "SPECTRA_CACHE_HIT=${{ steps.restore-wide.outputs.cache-hit }}" | tee ACIRM_R17K_R8W_OUTPUTS/R17K_R8W_SPECTRA_CACHE_HIT.txt
          echo "TREE_CACHE_HIT=${{ steps.restore-tree.outputs.cache-hit }}" | tee ACIRM_R17K_R8W_OUTPUTS/R17K_R8W_TREE_CACHE_HIT.txt
          if [ "${{ steps.restore-tree.outputs.cache-hit }}" != "true" ]; then
            echo "TREE_CACHE_MISS_NO_CALIBRATION_NO_R8W" | tee ACIRM_R17K_R8W_OUTPUTS/R17K_R8W_CACHE_STATUS.txt
            zip -r ACIRM_R17K_R8W_REV2446_LOCAL_CONTINUUM_SPI511_OUTPUT.zip ACIRM_R17K_R8W_OUTPUTS
            sha256sum ACIRM_R17K_R8W_REV2446_LOCAL_CONTINUUM_SPI511_OUTPUT.zip > ACIRM_R17K_R8W_REV2446_LOCAL_CONTINUUM_SPI511_OUTPUT.zip.sha256.txt
            exit 0
          fi
          echo "CACHE_OK_OR_FETCH_NEEDED" | tee ACIRM_R17K_R8W_OUTPUTS/R17K_R8W_CACHE_STATUS.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip python3-pip ca-certificates > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy > logs/pip_install.log 2>&1
          find repo/scw -maxdepth 6 -type f 2>/dev/null | sort > ACIRM_R17K_R8W_OUTPUTS/R17K_R8W_INITIAL_SCW_INVENTORY.txt
          find repo/ic repo/idx repo/cat repo/aux -maxdepth 10 -type f 2>/dev/null | sort > ACIRM_R17K_R8W_OUTPUTS/R17K_R8W_CAL_TREE_INVENTORY.txt

      - name: Run R8W validation
        shell: bash
        run: |
          set +e
          cat > scripts/r8w.py <<'PY'
          import os,re,csv,json,math,time,urllib.request,warnings
          from pathlib import Path
          import numpy as np
          from astropy.io import fits
          OUT=Path('ACIRM_R17K_R8W_OUTPUTS'); SCW=Path('repo/scw'); IC=Path('repo/ic')
          TS=os.environ.get('TARGET_START','244600170010'); TE=os.environ.get('TARGET_END','244600210010')
          RC=int(os.environ.get('REV_CENTER','2446')); RP=int(os.environ.get('REV_PAD','1'))
          MN=int(os.environ.get('MAX_NEW_FILES','220')); CAP=int(float(os.environ.get('DOWNLOAD_MB_CAP','350'))*1024*1024)
          L=(508.,514.); BW=(507.,515.); SL=(490.,500.); SR=(522.,532.); FR=(480.,542.); EX=(506.,516.)
          ERR=[]; FETCH=[]; CAL=[]; ROW=[]; MET=[]; CONT=[]; CEN=[]; LOO=[]; JACK=[]; CTRL=[]
          def wcsv(p,rs):
              ks=[]
              for r in rs:
                  for k in r:
                      if k not in ks: ks.append(k)
              if not ks: ks=['empty']
              with open(p,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=ks); w.writeheader(); [w.writerow({k:r.get(k,'') for k in ks}) for r in rs]
          def sf(x):
              try:
                  y=float(x); return y if math.isfinite(y) else float('nan')
              except Exception: return float('nan')
          def cm(cols,n): return {c.upper():c for c in cols}.get(n.upper())
          def sid(p):
              m=re.search(r'(\d{12})\.001',str(p)); return m.group(1) if m else ''
          def pol(c,x,order):
              c=np.asarray(c,float).reshape(-1)
              with warnings.catch_warnings():
                  warnings.simplefilter('ignore'); return np.polynomial.polynomial.polyval(x,c) if order=='asc' else np.polyval(c,x)
          def inv(c,n,order):
              e=np.linspace(0,12000,60001); ch=pol(c,e,order); ok=np.isfinite(ch)
              if ok.sum()<20: return None
              ch=ch[ok]; e=e[ok]; ix=np.argsort(ch); ch=ch[ix]; e=e[ix]
              ch,u=np.unique(ch,return_index=True); e=e[u]
              if len(ch)<20: return None
              return np.interp(np.arange(n,dtype=float),ch,e,left=np.nan,right=np.nan)
          def mods(ck,kc,n):
              x=np.arange(n,dtype=float); out=[]
              if ck is not None:
                  c=np.asarray(ck,float).reshape(-1)
                  if c.size==n: out.append(('CHAN_KEV_VECTOR',c))
                  if 0<c.size<=16: out += [('CHAN_KEV_ASC_POLY',pol(c,x,'asc')),('CHAN_KEV_DESC_POLY',pol(c,x,'desc'))]
              if kc is not None:
                  c=np.asarray(kc,float).reshape(-1)
                  if 0<c.size<=16:
                      a=inv(c,n,'asc'); d=inv(c,n,'desc')
                      if a is not None: out.append(('KEV_CHAN_ASC_INVERTED',a))
                      if d is not None: out.append(('KEV_CHAN_DESC_INVERTED',d))
              return out
          def q(e,c):
              e=np.asarray(e,float).reshape(-1); ok=np.isfinite(e)
              if ok.sum()<20: return None
              ee=e[ok]; d=np.diff(ee); inc=float(np.mean(d>0)) if len(d) else 0.
              if inc<.95 or np.nanmin(ee)>480 or np.nanmax(ee)<542: return None
              return 100*inc+40+(10 if np.nansum(c)>0 else 0)
          def ed(e):
              e=np.asarray(e,float).reshape(-1)
              if len(e)<3 or not np.all(np.isfinite(e)): return None,None
              m=(e[:-1]+e[1:])/2; b=np.r_[e[0]-(m[0]-e[0]),m,e[-1]+(e[-1]-m[-1])]
              return np.minimum(b[:-1],b[1:]),np.maximum(b[:-1],b[1:])
          def bc(c,lo,hi,b):
              if lo is None: return 0.
              n=min(len(c),len(lo),len(hi)); c=np.nan_to_num(np.asarray(c[:n],float),nan=0,posinf=0,neginf=0)
              lo=np.asarray(lo[:n],float); hi=np.asarray(hi[:n],float)
              f=np.maximum(0,np.minimum(hi,b[1])-np.maximum(lo,b[0]))/np.maximum(1e-12,hi-lo)
              return float((c*f).sum())
          def met(items,line=L,left=SL,right=SR):
              linec=s1=s2=raw=0.; dl={}; sl={}
              for it in items:
                  raw+=float(np.nansum(it['c'])); v=bc(it['c'],it['lo'],it['hi'],line); a=bc(it['c'],it['lo'],it['hi'],left); b=bc(it['c'],it['lo'],it['hi'],right)
                  linec+=v; s1+=a; s2+=b; dl[it['det']]=dl.get(it['det'],0)+v; sl[it['scw']]=sl.get(it['scw'],0)+v
              side=s1+s2; lw=line[1]-line[0]; sw=(left[1]-left[0])+(right[1]-right[0])
              exp=side/sw*lw if side>0 else float('nan'); ratio=(linec/lw)/(side/sw) if side>0 else float('inf'); z=(linec-exp)/math.sqrt(exp) if exp and exp>0 else float('nan')
              return dict(rows=len(items),raw_total_counts=raw,line_counts=linec,side_total_counts=side,expected=exp,ratio=ratio,z=z,max_detector_share=(max(dl.values())/linec if linec>0 and dl else float('nan')),max_scw_share=(max(sl.values())/linec if linec>0 and sl else float('nan')))
          def placebo(items,z,w):
              zs=[]
              for st in np.arange(430,590.1,2):
                  b=(float(st),float(st+w))
                  if max(b[0],488)<min(b[1],516) or max(b[0],520)<min(b[1],534): continue
                  m=met(items,b,(b[0]-18,b[0]-8),(b[1]+8,b[1]+18))
                  if math.isfinite(sf(m['z'])): zs.append(sf(m['z']))
              return (1+sum(1 for v in zs if math.isfinite(z) and v>z) if math.isfinite(z) else '',len(zs))
          def hist(items,a=470,b=552,step=.5):
              eg=np.arange(a,b+step*.5,step); x=(eg[:-1]+eg[1:])/2; y=np.zeros(len(x))
              for it in items:
                  for i in range(len(x)): y[i]+=bc(it['c'],it['lo'],it['hi'],(eg[i],eg[i+1]))
              return x,y,step
          def cont(items,line):
              x,y,step=hist(items,FR[0],FR[1],.5); fit=(x>=FR[0])&(x<FR[1])&~((x>=EX[0])&(x<EX[1])); lm=(x>=line[0])&(x<line[1])
              if fit.sum()<8: return dict(status='NO_FIT')
              try:
                  coef=np.polyfit(x[fit],(y/step)[fit],1,w=1/np.sqrt(np.maximum(y[fit],1)))
                  pred=np.maximum(np.polyval(coef,x),0); exp=float(np.sum(pred[lm]*step)); val=float(np.sum(y[lm])); z=(val-exp)/math.sqrt(exp) if exp>0 else float('nan')
                  return dict(status='OK',line_counts=val,expected_linear_continuum=exp,ratio_linear=val/exp if exp>0 else float('inf'),z_linear=z,slope=float(coef[0]),intercept=float(coef[1]))
              except Exception as e: return dict(status='FIT_FAIL',error=repr(e)[:180])
          bases=['https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{rev}/','https://heasarc.gsfc.nasa.gov/FTP/integral/data/rev_3/scw/{rev}/']
          def listing(u):
              req=urllib.request.Request(u,headers={'User-Agent':'ACIRM-R8W/1.0'}); return urllib.request.urlopen(req,timeout=25).read(2000000).decode('utf-8','replace')
          FETCH.append(dict(stage='initial_cache',files=len(list(SCW.glob('**/spi_spectra.fits.gz')))))
          got=0; by=0
          for rev in range(RC-RP,RC+RP+1):
              rs=f'{rev:04d}'; links=[]; bu=''
              for base in bases:
                  u=base.format(rev=rs)
                  try:
                      t=listing(u); links=sorted(set(re.findall(r'href=["\']?(\d{12}\.001)/?["\']?',t))); FETCH.append(dict(stage='list',rev=rs,status='OK',links=len(links)))
                      if links: bu=u.rstrip('/'); break
                  except Exception as e: FETCH.append(dict(stage='list',rev=rs,status='FAIL',error=repr(e)[:180]))
              for d in links:
                  if got>=MN or by>=CAP: break
                  dest=SCW/rs/d/'spi_spectra.fits.gz'
                  if dest.exists() and dest.stat().st_size>0: continue
                  url=bu+'/'+d+'/spi_spectra.fits.gz'
                  try:
                      data=urllib.request.urlopen(urllib.request.Request(url,headers={'User-Agent':'ACIRM-R8W/1.0'}),timeout=30).read()
                      if not data or data[:1]==b'<': continue
                      if by+len(data)>CAP: continue
                      dest.parent.mkdir(parents=True,exist_ok=True); dest.write_bytes(data); got+=1; by+=len(data); FETCH.append(dict(stage='download',rev=rs,scw=d[:12],status='OK',bytes=len(data)))
                      time.sleep(.04)
                  except Exception as e: FETCH.append(dict(stage='download',rev=rs,scw=d[:12],status='FAIL',error=repr(e)[:180]))
          for p in sorted(set(list(IC.glob('**/spi_coef_cal_*.fits'))+list(IC.glob('**/*coef*cal*.fits')))):
              try:
                  with fits.open(p,memmap=True) as hd:
                      for h in hd:
                          cols=list(h.columns.names or []) if hasattr(h,'columns') and h.columns is not None else []
                          if h.data is None: continue
                          dc=cm(cols,'DET_ID'); ec=cm(cols,'E_RANGE'); ck=cm(cols,'CHAN_KEV'); kc=cm(cols,'KEV_CHAN'); os0=cm(cols,'OBT_START'); oe0=cm(cols,'OBT_END')
                          if not (dc and ec and (ck or kc)): continue
                          for i in range(len(h.data)): CAL.append(dict(file=str(p),det=int(h.data[dc][i]),er=int(h.data[ec][i]),os=sf(h.data[os0][i]) if os0 else float('nan'),oe=sf(h.data[oe0][i]) if oe0 else float('nan'),ck=np.asarray(h.data[ck][i],float).reshape(-1) if ck else None,kc=np.asarray(h.data[kc][i],float).reshape(-1) if kc else None))
              except Exception as e: ERR.append(dict(stage='cal',file=str(p),error=repr(e)[:
