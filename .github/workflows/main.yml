name: ACIRM R17K R8O Fast Raw SPI511 Audit

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  r17k-r8o-fast-raw-spi511-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Prepare
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R8O_OUTPUTS logs scripts repo/scw/2504 repo/ic repo/idx repo/cat repo/aux
          cat > scw_ids.list <<'EOF'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          EOF
          sed -i 's/^ *//' scw_ids.list
          cp scw_ids.list ACIRM_R17K_R8O_OUTPUTS/LOCKED_SCW_IDS.txt
          cat > ACIRM_R17K_R8O_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R8O_FAST_RAW_SPI511_AUDIT
          USES_EXISTING_LOCKED_SCW_CACHE_ONLY
          READS spi_spectra.fits.gz DIRECTLY
          NO spi_science_analysis GUI
          APPROX_CHANNEL_TO_KEV_DIAGNOSTIC_ONLY
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF
          EOF

      - name: Restore SCW cache
        id: restore-scw
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/scw/2504
            repo/.scw_complete_R17K_R8C
          key: acirm-r17k-r8c-scw-2504-locked8-v1

      - name: Restore calibration tree cache
        id: restore-tree
        uses: actions/cache/restore@v4
        with:
          path: |
            repo/ic
            repo/idx
            repo/cat
            repo/aux
            repo/.tree_complete_R17K_R8E_MINIMAL
          key: acirm-r17k-r8e-minimal-osa-tree-no-full-aux-v1

      - name: Stop if cache missing
        shell: bash
        run: |
          set +e
          echo "SCW_CACHE_HIT=${{ steps.restore-scw.outputs.cache-hit }}" | tee ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_SCW_CACHE_HIT.txt
          echo "TREE_CACHE_HIT=${{ steps.restore-tree.outputs.cache-hit }}" | tee ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_TREE_CACHE_HIT.txt
          if [ "${{ steps.restore-scw.outputs.cache-hit }}" != "true" ]; then
            echo "SCW_CACHE_MISS_NO_DOWNLOAD_IN_R8O" | tee ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_CACHE_STATUS.txt
            zip -r ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip ACIRM_R17K_R8O_OUTPUTS
            sha256sum ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip > ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt
            exit 0
          fi
          echo "CACHE_OK_FAST_RAW_SPI511" | tee ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_CACHE_STATUS.txt

      - name: Install Python tools
        shell: bash
        run: |
          set +e
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip python3-pip > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy > logs/pip_install.log 2>&1
          find repo/scw/2504 -maxdepth 4 -type f 2>/dev/null | sort > ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_SCW_INVENTORY.txt
          find repo/ic repo/idx repo/cat repo/aux -maxdepth 8 -type f 2>/dev/null | sort > ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_CAL_TREE_INVENTORY.txt
          df -h > ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_DF_START.txt

      - name: Fast raw SPI511 audit
        shell: bash
        run: |
          set +e
          cat > scripts/r8o_fast_raw_spi511.py <<'PY'
          import csv, json, math, re
          from pathlib import Path
          import numpy as np
          from astropy.io import fits

          OUT=Path('ACIRM_R17K_R8O_OUTPUTS')
          SCW_ROOT=Path('repo/scw/2504')
          IC_ROOT=Path('repo/ic')
          SCWS=[x.strip() for x in Path('scw_ids.list').read_text().splitlines() if x.strip()]
          LINE=(508.0,514.0); SB1=(490.0,500.0); SB2=(522.0,532.0)
          MODELS=[
            ('H05_CENTER_0p5keV_BIN',0.5,0.25,'PRIMARY_APPROX_DIAGNOSTIC'),
            ('H05_EDGE_0p5keV_BIN',0.5,0.0,'SENSITIVITY_CHECK'),
            ('H1_CENTER_1keV_BIN',1.0,0.5,'SENSITIVITY_CHECK'),
            ('H025_CENTER_0p25keV_BIN',0.25,0.125,'SENSITIVITY_CHECK')]

          def write_csv(path,rows):
              keys=[]
              for r in rows:
                  for k in r:
                      if k not in keys: keys.append(k)
              if not keys: keys=['empty']
              with open(path,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=keys); w.writeheader()
                  for r in rows: w.writerow({k:r.get(k,'') for k in keys})

          def scw_from_path(p):
              m=re.search(r'(2504\d{8})\.001',str(p)); return m.group(1) if m else ''

          def mask(n,k,o,band):
              e=np.arange(n,dtype=float)*k+o
              return (e>=band[0])&(e<band[1])

          def ch_range(n,k,o,band):
              idx=np.where(mask(n,k,o,band))[0]
              return ('','',0) if len(idx)==0 else (int(idx.min()),int(idx.max()),int(len(idx)))

          def metric(counts,model,scope,meta):
              mid,k,o,ceiling=model
              x=np.asarray(counts,dtype=float).reshape(-1); n=len(x)
              ml=mask(n,k,o,LINE); m1=mask(n,k,o,SB1); m2=mask(n,k,o,SB2)
              line=float(x[ml].sum()); s1=float(x[m1].sum()); s2=float(x[m2].sum()); side=s1+s2
              ld=line/6.0; sd=side/20.0 if side>0 else float('nan')
              exp=sd*6.0 if side>0 else float('nan')
              ratio=ld/sd if sd and sd>0 else float('inf')
              z=(line-exp)/math.sqrt(exp) if exp and exp>0 else float('nan')
              cmin,cmax,cc=ch_range(n,k,o,LINE)
              row=dict(scope=scope,model_id=mid,keV_per_channel=k,offset_keV=o,claim_ceiling=ceiling,
                       line_channel_min=cmin,line_channel_max=cmax,line_channel_count=cc,channel_count=n,
                       line_508_514_counts=line,side_490_500_counts=s1,side_522_532_counts=s2,side_total_counts=side,
                       line_density_per_keV=ld,side_density_per_keV=sd,line_to_side_density_ratio=ratio,
                       expected_line_from_side_density=exp,z_vs_side_density=z)
              row.update(meta); return row

          def placebo(counts,model):
              mid,k,o,ceiling=model
              x=np.asarray(counts,dtype=float).reshape(-1); n=len(x); out=[]
              forbidden=[(488,516),(520,534)]
              def ov(a,b): return max(a[0],b[0])<min(a[1],b[1])
              for start in np.arange(430.0,590.1,2.0):
                  band=(float(start),float(start+6.0))
                  if any(ov(band,f) for f in forbidden): continue
                  left=(band[0]-18.0,band[0]-8.0); right=(band[1]+8.0,band[1]+18.0)
                  if left[0]<0: continue
                  line=float(x[mask(n,k,o,band)].sum())
                  side=float(x[mask(n,k,o,left)].sum()+x[mask(n,k,o,right)].sum())
                  sd=side/20.0 if side>0 else float('nan'); exp=sd*6.0 if side>0 else float('nan')
                  z=(line-exp)/math.sqrt(exp) if exp and exp>0 else float('nan')
                  ratio=(line/6.0)/sd if sd and sd>0 else float('inf')
                  out.append(dict(model_id=mid,band_min_keV=band[0],band_max_keV=band[1],band_counts=line,
                                  side_counts=side,band_to_side_density_ratio=ratio,z_vs_local_side_density=z,
                                  claim_ceiling='PLACEBO_WINDOW_DIAGNOSTIC_NOT_PROOF'))
              return out

          spectra=[]
          for scw in SCWS: spectra += sorted(SCW_ROOT.glob(f'{scw}.001/spi_spectra.fits.gz'))
          spectra=sorted(set(spectra))
          schema=[]; raw=[]; meas=[]; place=[]; cal=[]; errors=[]
          agg_all=None; by_scw={}; by_det={}; by_er={}

          for p in spectra:
              scw=scw_from_path(p)
              try:
                  with fits.open(p,memmap=True) as hdul:
                      for i,h in enumerate(hdul):
                          cols=list(h.columns.names or []) if hasattr(h,'columns') and h.columns is not None else []
                          schema.append(dict(file=p.name,path=str(p),scw=scw,hdu_index=i,hdu_name=h.name or '',
                                             class_name=h.__class__.__name__,rows=(len(h.data) if getattr(h,'data',None) is not None else ''),columns=';'.join(cols)))
                          if h.name!='SPI.-ACOF-RAW' or h.data is None: continue
                          names={c.upper():c for c in cols}
                          if not {'DET_ID','E_RANGE','COUNTS'}.issubset(names): continue
                          for r,cnt in enumerate(h.data[names['COUNTS']]):
                              det=int(h.data[names['DET_ID']][r]); er=int(h.data[names['E_RANGE']][r])
                              x=np.asarray(cnt,dtype=float).reshape(-1)
                              meta=dict(file=p.name,scw=scw,row_index=r,det_id=det,e_range=er,raw_total_counts=float(x.sum()),nonzero_channels=int(np.count_nonzero(x)))
                              raw.append(meta)
                              agg_all=x.copy() if agg_all is None else agg_all+x
                              by_scw[scw]=by_scw.get(scw,np.zeros_like(x))+x
                              by_det[det]=by_det.get(det,np.zeros_like(x))+x
                              by_er[er]=by_er.get(er,np.zeros_like(x))+x
                              for m in MODELS: meas.append(metric(x,m,'ROW_SCW_DET_ERANGE',meta))
              except Exception as e:
                  errors.append(dict(file=str(p),error=repr(e)[:600]))

          if agg_all is not None:
              for m in MODELS: meas.append(metric(agg_all,m,'AGGREGATE_ALL',dict(aggregate_id='ALL_SCW_ALL_DET_ALL_ERANGE')))
              place=placebo(agg_all,MODELS[0])
          for scw,x in sorted(by_scw.items()):
              for m in MODELS: meas.append(metric(x,m,'AGGREGATE_BY_SCW',dict(scw=scw)))
          for det,x in sorted(by_det.items()):
              for m in MODELS: meas.append(metric(x,m,'AGGREGATE_BY_DET',dict(det_id=det)))
          for er,x in sorted(by_er.items()):
              for m in MODELS: meas.append(metric(x,m,'AGGREGATE_BY_ERANGE',dict(e_range=er)))

          for p in sorted(set(list(IC_ROOT.glob('**/*ebds*.fits'))+list(IC_ROOT.glob('**/*rmf*.fits'))+list(IC_ROOT.glob('**/*gain*.fits'))+list(IC_ROOT.glob('**/*coef*.fits')))):
              try:
                  with fits.open(p,memmap=True) as hdul:
                      for i,h in enumerate(hdul):
                          cols=list(h.columns.names or []) if hasattr(h,'columns') and h.columns is not None else []
                          row=dict(file=str(p),hdu_index=i,hdu_name=h.name or '',rows=(len(h.data) if getattr(h,'data',None) is not None else ''),columns=';'.join(cols))
                          names={c.upper():c for c in cols}
                          for a,b in [('E_MIN','E_MAX'),('ENERG_LO','ENERG_HI'),('ENERGY_LO','ENERGY_HI')]:
                              if a in names and b in names and h.data is not None:
                                  lo=np.asarray(h.data[names[a]],dtype=float).reshape(-1); hi=np.asarray(h.data[names[b]],dtype=float).reshape(-1)
                                  if len(lo) and len(hi):
                                      row.update(dict(edge_lo=names[a],edge_hi=names[b],energy_bins=min(len(lo),len(hi)),emin=float(np.nanmin(lo)),emax=float(np.nanmax(hi)),covers_511=bool(np.nanmin(lo)<=511<=np.nanmax(hi)),is_16384_grid=bool(min(len(lo),len(hi))==16384)))
                          cal.append(row)
              except Exception as e:
                  errors.append(dict(file=str(p),error=repr(e)[:600]))

          primary=next((r for r in meas if r.get('scope')=='AGGREGATE_ALL' and r.get('model_id')=='H05_CENTER_0p5keV_BIN'),{})
          tz=primary.get('z_vs_side_density',float('nan'))
          zs=[r.get('z_vs_local_side_density',float('nan')) for r in place]
          zs=[float(z) for z in zs if isinstance(z,(int,float)) and math.isfinite(float(z))]
          rank=(1+sum(1 for z in zs if z>tz)) if isinstance(tz,(int,float)) and math.isfinite(float(tz)) else ''
          decision='R17K_R8O_NO_SPI_SPECTRA_FOUND'
          if spectra: decision='R17K_R8O_RAW_SPI_SPECTRA_511_DIAGNOSTIC_MEASURED_NOT_PROOF'
          if any(r.get('is_16384_grid') and r.get('covers_511') for r in cal): decision='R17K_R8O_OFFICIAL_16384_GRID_FOUND_RECHECK_REQUIRED'
          summary=dict(run_id='R17K_R8O_FAST_RAW_SPI511_AUDIT',decision=decision,proof_allowed=False,
                       spectra_files_found=len(spectra),raw_rows=len(raw),measurement_rows=len(meas),placebo_rows=len(place),
                       calibration_rows=len(cal),primary_aggregate=primary,primary_rank_among_placebo_windows=rank,
                       primary_placebo_window_count=len(zs),claim_ceiling=['DIAGNOSTIC_NOT_PROOF','NOT_DISCOVERY','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_OFFICIAL_SPI_511_LINE_PROOF'])
          write_csv(OUT/'R17K_R8O_SPI_SPECTRA_SCHEMA.csv',schema)
          write_csv(OUT/'R17K_R8O_RAW_ROW_SUMMARY.csv',raw)
          write_csv(OUT/'R17K_R8O_511_MEASUREMENTS.csv',meas)
          write_csv(OUT/'R17K_R8O_PLACEBO_WINDOW_SCAN.csv',place)
          write_csv(OUT/'R17K_R8O_CALIBRATION_INVENTORY.csv',cal)
          (OUT/'R17K_R8O_ERRORS.json').write_text(json.dumps(errors,indent=2),encoding='utf-8')
          (OUT/'R17K_R8O_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          PY
          python3 scripts/r8o_fast_raw_spi511.py > logs/r8o_python.log 2>&1
          echo "PYTHON_EXIT=$?" | tee ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_PYTHON_EXIT.txt

      - name: Package artifact
        shell: bash
        run: |
          set +e
          cp logs/*.log ACIRM_R17K_R8O_OUTPUTS/ 2>/dev/null || true
          df -h > ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_DF_END.txt
          free -h > ACIRM_R17K_R8O_OUTPUTS/R17K_R8O_FREE_END.txt
          zip -r ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip ACIRM_R17K_R8O_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip > ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT
          path: |
            ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip
            ACIRM_R17K_R8O_FAST_RAW_SPI511_AUDIT_OUTPUT.zip.sha256.txt
          retention-days: 7
