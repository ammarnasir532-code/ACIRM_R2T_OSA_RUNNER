name: ACIRM R3P R2B prompt parfile fixed SPI511

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2b-prompt-parfile-fixed-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare R3P R2B folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2B_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3P_R2B_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS
          echo "R3P_R2B_PREPARED"

      - name: Restore R3P R1 cache
        id: r3p-r1-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1
          restore-keys: |
            acirm-r21ax-r7g-r3p-r1-cache-

      - name: R3P R2B run from cache with parfile prompt fix
        continue-on-error: true
        run: |
          set +e

          echo "R3P_R2B main started" | tee ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/main_execution.log
          echo "cache_hit=${{ steps.r3p-r1-cache-restore.outputs.cache-hit }}" | tee -a ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/main_execution.log

          python3 -u <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/main_execution.log
          import json
          import os
          import shutil
          import time
          from pathlib import Path

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2B_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS")

          CACHE = Path("ACIRM_CACHE_R3P_R1")
          CACHE_DATA = CACHE / "data"
          CACHE_WORK = CACHE / "work"
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"

          for p in [OUT, DATA, WORK, LOGS, LIGHT]:
              p.mkdir(parents=True, exist_ok=True)

          cache_ok = READY_FLAG.exists() and CACHE_DATA.exists() and CACHE_WORK.exists()

          print("R3P_R2B_READY_FLAG_EXISTS", READY_FLAG.exists())
          print("R3P_R2B_CACHE_DATA_EXISTS", CACHE_DATA.exists())
          print("R3P_R2B_CACHE_WORK_EXISTS", CACHE_WORK.exists())
          print("R3P_R2B_CACHE_OK", cache_ok)

          if cache_ok:
              shutil.copytree(CACHE_DATA, DATA, dirs_exist_ok=True)
              shutil.copytree(CACHE_WORK, WORK, dirs_exist_ok=True)
              (OUT / "cache_ready_for_spi.flag").write_text("CACHE_OK\n", encoding="utf-8")
          else:
              summary = {
                  "run_id": "ACIRM_R21AX_R7G_R3P_R2B_PROMPT_PARFILE_FIX_FROM_R3P_R1_CACHE",
                  "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "final_status": "R21AX_R7G_R3P_R2B_CACHE_MISS_NO_RERUN_NO_511_NO_PHYSICAL_NULL",
                  "claim_ceiling": "NO_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL",
                  "checks": {
                      "ready_flag_exists": READY_FLAG.exists(),
                      "cache_data_exists": CACHE_DATA.exists(),
                      "cache_work_exists": CACHE_WORK.exists(),
                      "og_created": False,
                      "actual_spi_started": False,
                      "line_508_514_seen": False,
                      "sidebands_seen": False,
                      "line_metric_exists": False,
                      "sideband_metric_exists": False
                  }
              }
              (LIGHT / "R3P_R2B_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

          sudo chown -R "$(id -u):$(id -g)" ACIRM_R21AX_R7G_R3P_R2B_RESULTS ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
          chmod -R u+rwX,go+rX ACIRM_R21AX_R7G_R3P_R2B_RESULTS ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true

          if [ -f ACIRM_R21AX_R7G_R3P_R2B_RESULTS/cache_ready_for_spi.flag ]; then
            {
              echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              docker --version || true
              docker pull integralsw/osa:latest || true
            } | tee ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/docker_status.log

            cat > ACIRM_R21AX_R7G_R3P_R2B_RESULTS/work/run_spi_r2b.sh <<'BASH'
          set +e

          echo "R3P_R2B_CONTAINER_START"

          unset DISPLAY
          export DISPLAY=
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1

          mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep
          mkdir -p /work/og /work/products_line /work/products_sidebands /work/container_logs

          cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

          for f in /tmp/acirm_pfiles/*.par; do
            if [ -f "$f" ]; then
              sed -i 's/,ql,/,hl,/g' "$f" || true
              sed -i 's/,q,/,h,/g' "$f" || true
            fi
          done

          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          if [ -d /opt/osa/lib ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
          fi

          if [ -d /opt/osa/lib64 ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
          fi

          source /opt/osa/bin/isdc_init_env.sh || true

          unset DISPLAY
          export DISPLAY=
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1
          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          echo "R3P_R2B_COMMAND_DISCOVERY"
          for c in spi_science_analysis pset punlearn plist fstruct fdump ftlist; do
            echo "COMMAND $c"
            command -v "$c" || true
          done

          echo "R3P_R2B_PFILES_LIST"
          ls -la /tmp/acirm_pfiles || true

          echo "R3P_R2B_SPI_SCIENCE_PAR_HEAD"
          cat /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null | head -300 || true

          OG_FILE=$(find /work/og -type f -name "og_spi.fits" | head -1)
          echo "OG_FILE=$OG_FILE"

          if [ -z "$OG_FILE" ]; then
            echo "R3P_R2B_NO_OG_FILE"
            exit 0
          fi

          safe_pset() {
            TASK="$1"
            shift
            if [ -f "/tmp/acirm_pfiles/${TASK}.par" ]; then
              pset "$TASK" "$@" 2>/dev/null || true
            fi
          }

          punlearn spi_science_analysis 2>/dev/null || true
          punlearn spiros 2>/dev/null || true
          punlearn spi_phase_hist 2>/dev/null || true
          punlearn spi_phase_analysis 2>/dev/null || true
          punlearn spi_cat_extract 2>/dev/null || true

          safe_pset spi_phase_hist ephemDOL="NONE"
          safe_pset spi_phase_hist phaseBinNum="1"
          safe_pset spi_phase_hist phaseSameWidthBin="yes"
          safe_pset spi_phase_hist phaseBounds="0,1"
          safe_pset spi_phase_hist phaseSubtractOff="no"
          safe_pset spi_phase_hist phaseOffNum="0"
          safe_pset spi_phase_hist orbit="no"
          safe_pset spi_phase_hist asini="0"
          safe_pset spi_phase_hist porb="1"
          safe_pset spi_phase_hist T90epoch="0"
          safe_pset spi_phase_hist ecc="0"
          safe_pset spi_phase_hist omega_d="0"
          safe_pset spi_phase_hist pporb="0"

          safe_pset spi_phase_analysis ephemDOL="NONE"
          safe_pset spi_phase_analysis phaseBinNum="1"
          safe_pset spi_phase_analysis phaseSameWidthBin="yes"
          safe_pset spi_phase_analysis phaseBounds="0,1"
          safe_pset spi_phase_analysis phaseSubtractOff="no"
          safe_pset spi_phase_analysis phaseOffNum="0"
          safe_pset spi_phase_analysis orbit="no"
          safe_pset spi_phase_analysis asini="0"
          safe_pset spi_phase_analysis porb="1"
          safe_pset spi_phase_analysis T90epoch="0"
          safe_pset spi_phase_analysis ecc="0"
          safe_pset spi_phase_analysis omega_d="0"
          safe_pset spi_phase_analysis pporb="0"

          safe_pset spiros source-cat-dol="NONE"
          safe_pset spiros nofsources="0"
          safe_pset spiros sigmathres="999"
          safe_pset spiros iteration-output="NO"
          safe_pset spiros optistat="CHI2"

          cat > /work/container_logs/guard_spi.py <<'PYG'
          import json
          import subprocess
          import sys
          import time
          from pathlib import Path

          case_name = sys.argv[1]
          params_file = Path(sys.argv[2])
          answers_file = Path(sys.argv[3])
          product_dir = Path(sys.argv[4])
          log_file = Path(sys.argv[5])
          status_file = Path(sys.argv[6])

          params = []
          if params_file.exists():
              for line in params_file.read_text(encoding="utf-8", errors="replace").splitlines():
                  line = line.strip()
                  if line:
                      params.append(line)

          product_dir.mkdir(parents=True, exist_ok=True)
          log_file.parent.mkdir(parents=True, exist_ok=True)

          cmd = ["spi_science_analysis"] + params

          status = {
              "case": case_name,
              "started_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "cmd": cmd,
              "returncode": None,
              "timeout_seconds": 3300,
              "killed_by_guard": False,
              "orbit_asini_prompt_count": 0,
              "source_catalog_prompt_count": 0,
              "ephemeris_prompt_count": 0,
              "log_bytes_kept": 0
          }

          max_keep = 1200000
          start = time.time()

          with open(answers_file, "r", encoding="utf-8", errors="replace") as ans:
              p = subprocess.Popen(
                  cmd,
                  cwd=str(product_dir),
                  stdin=ans,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.STDOUT,
                  text=True,
                  errors="replace",
                  bufsize=1
              )

              with open(log_file, "w", encoding="utf-8", errors="replace") as lf:
                  lf.write("ACIRM_CASE=" + case_name + "\n")
                  lf.write("ACIRM_CMD=" + " ".join(cmd) + "\n")
                  lf.flush()

                  while True:
                      if time.time() - start > status["timeout_seconds"]:
                          status["killed_by_guard"] = True
                          lf.write("\nACIRM_GUARD_TIMEOUT_KILL\n")
                          try:
                              p.kill()
                          except Exception:
                              pass
                          break

                      line = p.stdout.readline() if p.stdout is not None else ""

                      if line == "" and p.poll() is not None:
                          break

                      if not line:
                          time.sleep(0.1)
                          continue

                      if "Orbit asini parameter" in line:
                          status["orbit_asini_prompt_count"] += 1

                      if "Enter DOL for source catalog" in line:
                          status["source_catalog_prompt_count"] += 1

                      if "DOL of the ephemeris data" in line:
                          status["ephemeris_prompt_count"] += 1

                      if status["orbit_asini_prompt_count"] > 6:
                          status["killed_by_guard"] = True
                          lf.write("\nACIRM_GUARD_ORBIT_ASINI_LOOP_KILL\n")
                          try:
                              p.kill()
                          except Exception:
                              pass
                          break

                      b = len(line.encode("utf-8", "replace"))
                      if status["log_bytes_kept"] + b <= max_keep:
                          lf.write(line)
                          status["log_bytes_kept"] += b

              try:
                  rc = p.wait(timeout=20)
              except Exception:
                  rc = 999

          status["returncode"] = rc
          status["ended_utc"] = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())
          status_file.write_text(json.dumps(status, indent=2), encoding="utf-8")
          print(json.dumps(status, indent=2))
          PYG

          make_answers() {
            OUT="$1"
            rm -f "$OUT"
            echo "" >> "$OUT"
            echo "" >> "$OUT"
            echo "0" >> "$OUT"
            echo "1" >> "$OUT"
            echo "0" >> "$OUT"
            echo "0" >> "$OUT"
            echo "0" >> "$OUT"
            echo "0" >> "$OUT"
            for i in $(seq 1 500); do
              echo "0" >> "$OUT"
            done
          }

          has_param() {
            KEY="$1"
            grep -q "^${KEY}," /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null
          }

          add_param() {
            KEY="$1"
            VALUE="$2"
            FILE="$3"
            if has_param "$KEY"; then
              echo "${KEY}=${VALUE}" >> "$FILE"
              echo "ADD_PARAM ${KEY}=${VALUE}"
            else
              echo "SKIP_PARAM ${KEY}"
            fi
          }

          run_case() {
            CASE="$1"
            NREG="$2"
            REGIONS="$3"
            NBINS="$4"
            PROD="$5"

            mkdir -p "$PROD"

            PARAMS="/work/container_logs/${CASE}.params.txt"
            ANSWERS="/work/container_logs/${CASE}.answers.txt"
            LOG="/work/container_logs/${CASE}.guard.log"
            STATUS="/work/container_logs/${CASE}.status.json"

            rm -f "$PARAMS" "$ANSWERS" "$LOG" "$STATUS"

            add_param "obs_group" "$OG_FILE" "$PARAMS"

            add_param "run_cat_extract" "no" "$PARAMS"
            add_param "run_pointing" "yes" "$PARAMS"
            add_param "run_binning" "yes" "$PARAMS"
            add_param "run_background" "no" "$PARAMS"
            add_param "run_spiros" "no" "$PARAMS"
            add_param "run_phase_analysis" "no" "$PARAMS"
            add_param "run_gaincorrection" "no" "$PARAMS"
            add_param "run_fullcheck" "no" "$PARAMS"
            add_param "use_pointing_filter" "no" "$PARAMS"
            add_param "run_simulation" "no" "$PARAMS"

            add_param "spibounds_nregions" "$NREG" "$PARAMS"
            add_param "spibounds_regions" "$REGIONS" "$PARAMS"
            add_param "spibounds_nbins" "$NBINS" "$PARAMS"
            add_param "detectors" "0-18" "$PARAMS"
            add_param "clobber" "yes" "$PARAMS"
            add_param "log_File" "${CASE}.inner.log" "$PARAMS"

            add_param "catalog" "NONE" "$PARAMS"
            add_param "spiros_source-cat-dol" "NONE" "$PARAMS"
            add_param "spiros_nofsources" "0" "$PARAMS"
            add_param "spiros_sigmathres" "999" "$PARAMS"
            add_param "spiros_iteration-output" "NO" "$PARAMS"
            add_param "spiros_optistat" "CHI2" "$PARAMS"

            add_param "spi_phase_hist_ephemDOL" "NONE" "$PARAMS"
            add_param "spi_phase_hist_phaseBinNum" "1" "$PARAMS"
            add_param "spi_phase_hist_phaseSameWidthBin" "yes" "$PARAMS"
            add_param "spi_phase_hist_phaseBounds" "0,1" "$PARAMS"
            add_param "spi_phase_hist_phaseSubtractOff" "no" "$PARAMS"
            add_param "spi_phase_hist_phaseOffNum" "0" "$PARAMS"
            add_param "spi_phase_hist_orbit" "no" "$PARAMS"
            add_param "spi_phase_hist_asini" "0" "$PARAMS"
            add_param "spi_phase_hist_porb" "1" "$PARAMS"
            add_param "spi_phase_hist_T90epoch" "0" "$PARAMS"
            add_param "spi_phase_hist_ecc" "0" "$PARAMS"
            add_param "spi_phase_hist_omega_d" "0" "$PARAMS"
            add_param "spi_phase_hist_pporb" "0" "$PARAMS"

            if has_param "mode"; then
              echo "mode=h" >> "$PARAMS"
              echo "ADD_PARAM mode=h"
            fi

            make_answers "$ANSWERS"

            echo "SPI_CASE_BEGIN ${CASE}"
            cat "$PARAMS"
            python3 /work/container_logs/guard_spi.py "$CASE" "$PARAMS" "$ANSWERS" "$PROD" "$LOG" "$STATUS"
            echo "SPI_CASE_END ${CASE}"

            echo "PRODUCTS_AFTER_${CASE}"
            find "$PROD" -maxdepth 8 -type f -printf "%p %s\n" | sort || true
          }

          run_case "R3P_R2B_LINE_508_514" "1" "508,514" "1" "/work/products_line"
          run_case "R3P_R2B_SIDEBANDS_490_500_508_514_522_532" "3" "490,500,508,514,522,532" "1,1,1" "/work/products_sidebands"

          echo "R3P_R2B_WORK_FILES_AFTER"
          find /work -maxdepth 10 -type f -printf "%p %s\n" | sort > /work/container_logs/work_files_after_r2b.txt
          cat /work/container_logs/work_files_after_r2b.txt

          echo "R3P_R2B_FITS_QUICKLOOK"
          {
            for f in $(find /work/products_line /work/products_sidebands -type f \( -name "*.fits" -o -name "*.fits.gz" \) 2>/dev/null | sort | head -100); do
              echo "### $f"
              fstruct "$f" 2>&1 | head -120 || true
            done
          } > /work/container_logs/fits_quicklook_r2b.txt

          echo "R3P_R2B_CONTAINER_END"
          BASH

            docker run --rm \
              -v "$PWD/ACIRM_R21AX_R7G_R3P_R2B_RESULTS/data:/data" \
              -v "$PWD/ACIRM_R21AX_R7G_R3P_R2B_RESULTS/work:/work" \
              integralsw/osa:latest \
              bash /work/run_spi_r2b.sh \
              > ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/host_container_spi_r2b.log 2>&1 || true

            sudo chown -R "$(id -u):$(id -g)" ACIRM_R21AX_R7G_R3P_R2B_RESULTS ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
            chmod -R u+rwX,go+rX ACIRM_R21AX_R7G_R3P_R2B_RESULTS ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
          fi

          python3 -u <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import os
          import shutil
          import time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2B_PROMPT_PARFILE_FIX_FROM_R3P_R1_CACHE"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2B_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS")
          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS.zip"

          CACHE = Path("ACIRM_CACHE_R3P_R1")
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"

          LIGHT.mkdir(parents=True, exist_ok=True)
          (LIGHT / "logs").mkdir(parents=True, exist_ok=True)

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_text(path, limit=500000):
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              data = p.read_bytes()
              if len(data) > limit:
                  data = data[:250000] + b"\nACIRM_LOG_TRUNCATED_MIDDLE\n" + data[-250000:]
              return data.decode("utf-8", "replace")

          def read_json(path):
              p = Path(path)
              if not p.exists():
                  return {}
              try:
                  return json.loads(p.read_text(encoding="utf-8", errors="replace"))
              except Exception:
                  return {}

          def file_rows(root):
              rows = []
              root = Path(root)
              if not root.exists():
                  return rows
              for p in sorted(root.rglob("*")):
                  if p.is_file():
                      try:
                          rows.append({"path": str(p), "bytes": p.stat().st_size})
                      except Exception:
                          rows.append({"path": str(p), "bytes": ""})
              return rows

          def write_csv(path, rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: r.get(k, "") for k in fields})

          def copy_log(src):
              p = Path(src)
              if p.exists() and p.is_file():
                  dest = LIGHT / "logs" / p.name
                  txt = safe_text(p, limit=700000)
                  dest.write_text(txt, encoding="utf-8", errors="replace")

          for p in sorted(LOGS.glob("*.log")):
              copy_log(p)

          for p in [
              WORK / "container_logs" / "R3P_R2B_LINE_508_514.guard.log",
              WORK / "container_logs" / "R3P_R2B_LINE_508_514.status.json",
              WORK / "container_logs" / "R3P_R2B_LINE_508_514.params.txt",
              WORK / "container_logs" / "R3P_R2B_SIDEBANDS_490_500_508_514_522_532.guard.log",
              WORK / "container_logs" / "R3P_R2B_SIDEBANDS_490_500_508_514_522_532.status.json",
              WORK / "container_logs" / "R3P_R2B_SIDEBANDS_490_500_508_514_522_532.params.txt",
              WORK / "container_logs" / "work_files_after_r2b.txt",
              WORK / "container_logs" / "fits_quicklook_r2b.txt",
          ]:
              copy_log(p)

          data_rows = file_rows(DATA)
          work_rows = file_rows(WORK)
          line_rows = file_rows(WORK / "products_line")
          side_rows = file_rows(WORK / "products_sidebands")

          write_csv(LIGHT / "r3p_r2b_data_files.csv", data_rows, ["path", "bytes"])
          write_csv(LIGHT / "r3p_r2b_work_files.csv", work_rows, ["path", "bytes"])
          write_csv(LIGHT / "r3p_r2b_products_line.csv", line_rows, ["path", "bytes"])
          write_csv(LIGHT / "r3p_r2b_products_sidebands.csv", side_rows, ["path", "bytes"])

          host_log = safe_text(LOGS / "host_container_spi_r2b.log", limit=900000)
          line_log = safe_text(WORK / "container_logs" / "R3P_R2B_LINE_508_514.guard.log", limit=500000)
          side_log = safe_text(WORK / "container_logs" / "R3P_R2B_SIDEBANDS_490_500_508_514_522_532.guard.log", limit=500000)

          line_status = read_json(WORK / "container_logs" / "R3P_R2B_LINE_508_514.status.json")
          side_status = read_json(WORK / "container_logs" / "R3P_R2B_SIDEBANDS_490_500_508_514_522_532.status.json")

          og_created = any("og_spi.fits" in r["path"] for r in work_rows)
          actual_spi_started = ("SPI_CASE_BEGIN R3P_R2B_LINE_508_514" in host_log) or ("ACIRM_CASE=R3P_R2B_LINE_508_514" in line_log)
          line_508_514_seen = ("spibounds_regions=508,514" in host_log) or ("spibounds_regions=508,514" in line_log)
          sidebands_seen = ("spibounds_regions=490,500,508,514,522,532" in host_log) or ("spibounds_regions=490,500,508,514,522,532" in side_log)

          prompt_loop_seen = bool(line_status.get("killed_by_guard")) or bool(side_status.get("killed_by_guard"))
          orbit_count = int(line_status.get("orbit_asini_prompt_count", 0) or 0) + int(side_status.get("orbit_asini_prompt_count", 0) or 0)

          line_metric_exists = any(str(r["path"]).endswith(".fits") or str(r["path"]).endswith(".fits.gz") for r in line_rows)
          sideband_metric_exists = any(str(r["path"]).endswith(".fits") or str(r["path"]).endswith(".fits.gz") for r in side_rows)

          if line_metric_exists or sideband_metric_exists:
              final_status = "R21AX_R7G_R3P_R2B_SPI511_PRODUCTS_PRESENT_REVIEW_PRODUCTS_NOT_FINAL_PROOF"
          elif prompt_loop_seen:
              final_status = "R21AX_R7G_R3P_R2B_SPI511_PROMPT_LOOP_STILL_PRESENT_NO_511_METRIC_NO_PHYSICAL_NULL"
          elif actual_spi_started:
              final_status = "R21AX_R7G_R3P_R2B_SPI511_EXECUTED_NO_READABLE_511_METRIC_NO_PHYSICAL_NULL"
          else:
              final_status = "R21AX_R7G_R3P_R2B_SPI511_NOT_STARTED_NO_511_NO_PHYSICAL_NULL"

          checks = {
              "ready_flag_exists": READY_FLAG.exists(),
              "data_file_count": len(data_rows),
              "work_file_count": len(work_rows),
              "og_created": og_created,
              "actual_spi_started": actual_spi_started,
              "line_508_514_seen": line_508_514_seen,
              "sidebands_seen": sidebands_seen,
              "line_product_count": len(line_rows),
              "sideband_product_count": len(side_rows),
              "line_metric_exists": line_metric_exists,
              "sideband_metric_exists": sideband_metric_exists,
              "prompt_loop_seen": prompt_loop_seen,
              "orbit_asini_prompt_count": orbit_count,
              "line_returncode": line_status.get("returncode", ""),
              "sidebands_returncode": side_status.get("returncode", "")
          }

          summary = {
              "run_id": RUN_ID,
              "created_utc": now_utc(),
              "final_status": final_status,
              "claim_ceiling": "NOT_DISCOVERY_NOT_FINAL_PROOF_NOT_OSA_PROOF_UNLESS_ACTUAL_LINE_SIDEBAND_METRIC_IS_READ",
              "checks": checks
          }

          (LIGHT / "R3P_R2B_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          (LIGHT / "R3P_R2B_CLAIM_BOUNDARY.txt").write_text(
              "Runtime, cache, prompt, parameter, Docker, or OSA failure is not a physical null.\n"
              "Do not claim discovery/proof unless an actual 511 line/sideband metric is read from OSA products.\n",
              encoding="utf-8"
          )

          flat = [{"check": k, "value": v} for k, v in checks.items()]
          write_csv(LIGHT / "r3p_r2b_checks_flat.csv", flat, ["check", "value"])

          if Path(ZIP_NAME).exists():
              Path(ZIP_NAME).unlink()

          os.system("zip -r " + ZIP_NAME + " " + str(LIGHT))

          if Path(ZIP_NAME).exists():
              sha = sha256_file(ZIP_NAME)
              Path(ZIP_NAME + ".sha256.txt").write_text(sha + "  " + ZIP_NAME + "\n", encoding="utf-8")
              print("R3P_R2B_ZIP_SHA256", sha)

          print(json.dumps(summary, indent=2))
          PY

      - name: Upload R3P R2B LIGHT artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3P_R2B_LIGHT_RESULTS.zip.sha256.txt
            ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/main_execution.log
            ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/docker_status.log
            ACIRM_R21AX_R7G_R3P_R2B_RESULTS/logs/host_container_spi_r2b.log
          if-no-files-found: warn
