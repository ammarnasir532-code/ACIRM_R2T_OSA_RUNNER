name: ACIRM R3P R2P direct SPI available products audit no full OSA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2p-direct-spi-products-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Prepare folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2P_DIRECT_AUDIT_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2P_DIRECT_AUDIT_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3P_R2P_DIRECT_AUDIT_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3P_R2P_DIRECT_SPI_PRODUCTS_AUDIT_LIGHT_RESULTS/logs
          mkdir -p ACIRM_CACHE_R3P_R1
          echo "R2P_DIRECT_AUDIT_PREPARED"

      - name: Restore R3P R1 cache
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1
          restore-keys: |
            acirm-r21ax-r7g-r3p-r1-cache-

      - name: Run direct SPI products audit without full OSA
        continue-on-error: true
        run: |
          set +e

          OUT="ACIRM_R21AX_R7G_R3P_R2P_DIRECT_AUDIT_RESULTS"
          LIGHT="ACIRM_R21AX_R7G_R3P_R2P_DIRECT_SPI_PRODUCTS_AUDIT_LIGHT_RESULTS"
          MAIN_LOG="$OUT/logs/main_execution.log"

          echo "R2P_DIRECT_AUDIT_STARTED" | tee "$MAIN_LOG"
          echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" | tee -a "$MAIN_LOG"

          sudo apt-get update -y 2>&1 | tee "$OUT/logs/apt_update.log" || true
          sudo apt-get install -y zip python3-pip 2>&1 | tee "$OUT/logs/apt_install.log" || true
          python3 -m pip install --user astropy numpy 2>&1 | tee "$OUT/logs/pip_astropy.log" || true

          python3 - <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2P_DIRECT_AUDIT_RESULTS/logs/main_execution.log
          import csv
          import gzip
          import hashlib
          import json
          import math
          import os
          import shutil
          import sys
          import time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2P_DIRECT_SPI_AVAILABLE_PRODUCTS_AUDIT_NO_FULL_OSA"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2P_DIRECT_AUDIT_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2P_DIRECT_SPI_PRODUCTS_AUDIT_LIGHT_RESULTS")
          CACHE = Path("ACIRM_CACHE_R3P_R1")
          CACHE_DATA = CACHE / "data"
          CACHE_WORK = CACHE / "work"
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"

          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2P_DIRECT_SPI_PRODUCTS_AUDIT_LIGHT_RESULTS.zip"

          for p in [OUT, DATA, WORK, LOGS, LIGHT, LIGHT / "logs"]:
              p.mkdir(parents=True, exist_ok=True)

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_write(path, text):
              Path(path).write_text(str(text), encoding="utf-8", errors="replace")

          def rows_for_files(root):
              root = Path(root)
              out = []
              if root.exists():
                  for p in sorted(root.rglob("*")):
                      if p.is_file():
                          try:
                              out.append({
                                  "path": str(p),
                                  "bytes": p.stat().st_size
                              })
                          except Exception:
                              out.append({
                                  "path": str(p),
                                  "bytes": ""
                              })
              return out

          def write_csv(path, rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: r.get(k, "") for k in fields})

          ready_flag_exists = READY_FLAG.exists()
          cache_data_exists = CACHE_DATA.exists()
          cache_work_exists = CACHE_WORK.exists()
          cache_ok = ready_flag_exists and cache_data_exists and cache_work_exists

          print("ready_flag_exists", ready_flag_exists)
          print("cache_data_exists", cache_data_exists)
          print("cache_work_exists", cache_work_exists)
          print("cache_ok", cache_ok)

          if cache_data_exists:
              shutil.copytree(CACHE_DATA, DATA, dirs_exist_ok=True)
          if cache_work_exists:
              shutil.copytree(CACHE_WORK, WORK, dirs_exist_ok=True)

          import numpy as np
          from astropy.io import fits

          def is_fits_path(p):
              s = str(p).lower()
              return s.endswith(".fits") or s.endswith(".fit") or s.endswith(".fits.gz") or s.endswith(".fit.gz")

          all_file_rows = rows_for_files(OUT)
          cache_file_rows = rows_for_files(CACHE)

          fits_paths = []
          for root in [DATA, WORK, CACHE]:
              if root.exists():
                  for p in root.rglob("*"):
                      if p.is_file() and is_fits_path(p):
                          fits_paths.append(p)

          fits_paths = sorted(set(fits_paths), key=lambda x: str(x))

          spi_keywords = [
              "spi", "spibounds", "evts_det_spec", "energy", "ebounds",
              "spectrum", "spectra", "spec", "det_spec", "og_spi",
              "swg_spi", "idx_spi"
          ]

          def looks_spi_relevant(path):
              s = str(path).lower()
              return any(k in s for k in spi_keywords)

          fits_inventory = []
          hdu_inventory = []
          candidate_tables = []
          direct_metric_rows = []
          readable_fits_count = 0
          fits_error_count = 0

          def norm_name(x):
              return str(x).strip().lower().replace("-", "_").replace(" ", "_")

          def find_col(cols, names):
              lowered = {norm_name(c): c for c in cols}
              for n in names:
                  nn = norm_name(n)
                  if nn in lowered:
                      return lowered[nn]
              for c in cols:
                  cc = norm_name(c)
                  for n in names:
                      nn = norm_name(n)
                      if nn in cc:
                          return c
              return None

          def numeric_array(data, col):
              try:
                  arr = np.asarray(data[col])
                  arr = np.asarray(arr, dtype=float)
                  return arr
              except Exception:
                  return None

          def flatten_if_needed(arr):
              try:
                  arr = np.asarray(arr, dtype=float)
                  if arr.ndim == 0:
                      return arr.reshape(1)
                  if arr.ndim == 1:
                      return arr
                  if arr.ndim >= 2:
                      return arr.reshape(arr.shape[0], -1)
              except Exception:
                  return None
              return None

          def finite_sum(x):
              try:
                  arr = np.asarray(x, dtype=float)
                  arr = arr[np.isfinite(arr)]
                  if arr.size == 0:
                      return None
                  return float(np.sum(arr))
              except Exception:
                  return None

          def safe_float(x):
              try:
                  if x is None:
                      return None
                  v = float(x)
                  if not math.isfinite(v):
                      return None
                  return v
              except Exception:
                  return None
              return None

          line_lo = 508.0
          line_hi = 514.0
          sb1_lo = 490.0
          sb1_hi = 500.0
          sb2_lo = 522.0
          sb2_hi = 532.0

          value_col_candidates = [
              "COUNTS", "COUNT", "RATE", "RATES", "SPEC", "SPECTRUM",
              "COUNTRATE", "COUNTS_S", "VALUE", "FLUX", "DATA"
          ]

          elo_names = ["E_MIN", "E_LO", "ENERG_LO", "ENERGY_LO", "ELOW", "E_LOW", "E1", "E_MINIMUM"]
          ehi_names = ["E_MAX", "E_HI", "ENERG_HI", "ENERGY_HI", "EHIGH", "E_HIGH", "E2", "E_MAXIMUM"]
          energy_names = ["ENERGY", "E_MEAN", "E_CEN", "E_CENTER", "CHANNEL_ENERGY", "PI"]

          for path in fits_paths:
              inv = {
                  "path": str(path),
                  "bytes": "",
                  "spi_relevant_path": looks_spi_relevant(path),
                  "read_ok": False,
                  "hdu_count": "",
                  "error": ""
              }
              try:
                  inv["bytes"] = path.stat().st_size
              except Exception:
                  inv["bytes"] = ""

              try:
                  with fits.open(path, memmap=False) as hdul:
                      inv["read_ok"] = True
                      inv["hdu_count"] = len(hdul)
                      readable_fits_count += 1

                      for i, hdu in enumerate(hdul):
                          name = getattr(hdu, "name", "")
                          header = hdu.header
                          cols = []
                          nrows = ""
                          has_data = hdu.data is not None

                          if hasattr(hdu, "columns") and hdu.columns is not None:
                              try:
                                  cols = list(hdu.columns.names)
                              except Exception:
                                  cols = []

                          try:
                              if hdu.data is not None and hasattr(hdu.data, "__len__"):
                                  nrows = len(hdu.data)
                          except Exception:
                              nrows = ""

                          hdu_text = " ".join([str(path), str(name), " ".join(cols), str(header.get("EXTNAME", "")), str(header.get("HDUCLAS1", "")), str(header.get("HDUCLAS2", ""))]).lower()

                          has_energy_hint = any(k in hdu_text for k in ["energy", "energ", "ebounds", "spibounds", "e_min", "e_max", "e_lo", "e_hi"])
                          has_spectrum_hint = any(k in hdu_text for k in ["count", "rate", "spectrum", "spectra", "spec", "det_spec", "flux"])

                          hdu_inventory.append({
                              "path": str(path),
                              "hdu_index": i,
                              "hdu_name": str(name),
                              "nrows": nrows,
                              "ncols": len(cols),
                              "columns": "|".join(cols[:80]),
                              "has_energy_hint": has_energy_hint,
                              "has_spectrum_hint": has_spectrum_hint,
                              "spi_relevant_path": looks_spi_relevant(path)
                          })

                          if not cols or hdu.data is None:
                              continue

                          elo_col = find_col(cols, elo_names)
                          ehi_col = find_col(cols, ehi_names)
                          energy_col = find_col(cols, energy_names)

                          value_col = find_col(cols, value_col_candidates)

                          candidate = {
                              "path": str(path),
                              "hdu_index": i,
                              "hdu_name": str(name),
                              "nrows": nrows,
                              "columns": "|".join(cols[:80]),
                              "elo_col": elo_col or "",
                              "ehi_col": ehi_col or "",
                              "energy_col": energy_col or "",
                              "value_col": value_col or "",
                              "candidate_reason": ""
                          }

                          if elo_col and ehi_col:
                              candidate["candidate_reason"] = "ENERGY_BOUNDS_COLUMNS"
                          elif energy_col:
                              candidate["candidate_reason"] = "ENERGY_CENTER_COLUMN"
                          elif has_energy_hint or has_spectrum_hint or looks_spi_relevant(path):
                              candidate["candidate_reason"] = "SPI_OR_SPECTRUM_HINT"

                          if candidate["candidate_reason"]:
                              candidate_tables.append(candidate)

                          if not value_col:
                              continue

                          energies_lo = None
                          energies_hi = None

                          if elo_col and ehi_col:
                              energies_lo = numeric_array(hdu.data, elo_col)
                              energies_hi = numeric_array(hdu.data, ehi_col)
                          elif energy_col:
                              ec = numeric_array(hdu.data, energy_col)
                              if ec is not None:
                                  energies_lo = np.asarray(ec, dtype=float)
                                  energies_hi = np.asarray(ec, dtype=float)

                          if energies_lo is None or energies_hi is None:
                              continue

                          values = numeric_array(hdu.data, value_col)
                          if values is None:
                              continue

                          elo_flat = np.asarray(energies_lo, dtype=float).reshape(-1)
                          ehi_flat = np.asarray(energies_hi, dtype=float).reshape(-1)

                          val_arr = np.asarray(values, dtype=float)
                          if val_arr.ndim == 1 and val_arr.shape[0] == elo_flat.shape[0]:
                              val_by_energy = val_arr
                          elif val_arr.ndim >= 2 and val_arr.shape[0] == elo_flat.shape[0]:
                              val_by_energy = np.nansum(val_arr.reshape(val_arr.shape[0], -1), axis=1)
                          elif val_arr.ndim >= 2 and val_arr.shape[-1] == elo_flat.shape[0]:
                              tmp = np.moveaxis(val_arr, -1, 0)
                              val_by_energy = np.nansum(tmp.reshape(tmp.shape[0], -1), axis=1)
                          else:
                              continue

                          if len(val_by_energy) != len(elo_flat):
                              continue

                          finite_mask = np.isfinite(elo_flat) & np.isfinite(ehi_flat) & np.isfinite(val_by_energy)
                          if not np.any(finite_mask):
                              continue

                          elo_flat = elo_flat[finite_mask]
                          ehi_flat = ehi_flat[finite_mask]
                          val_by_energy = np.asarray(val_by_energy[finite_mask], dtype=float)

                          def interval_mask(lo, hi):
                              if elo_col and ehi_col:
                                  return (elo_flat < hi) & (ehi_flat > lo)
                              return (elo_flat >= lo) & (elo_flat <= hi)

                          line_mask = interval_mask(line_lo, line_hi)
                          sb1_mask = interval_mask(sb1_lo, sb1_hi)
                          sb2_mask = interval_mask(sb2_lo, sb2_hi)

                          line_sum = finite_sum(val_by_energy[line_mask])
                          sb1_sum = finite_sum(val_by_energy[sb1_mask])
                          sb2_sum = finite_sum(val_by_energy[sb2_mask])

                          if line_sum is None and sb1_sum is None and sb2_sum is None:
                              continue

                          side_sum = None
                          side_mean = None
                          ratio_to_side_mean = None
                          if sb1_sum is not None and sb2_sum is not None:
                              side_sum = sb1_sum + sb2_sum
                              side_mean = side_sum / 2.0
                          elif sb1_sum is not None:
                              side_sum = sb1_sum
                              side_mean = sb1_sum
                          elif sb2_sum is not None:
                              side_sum = sb2_sum
                              side_mean = sb2_sum

                          if line_sum is not None and side_mean is not None and side_mean != 0:
                              ratio_to_side_mean = line_sum / side_mean

                          direct_metric_rows.append({
                              "path": str(path),
                              "hdu_index": i,
                              "hdu_name": str(name),
                              "elo_col": elo_col or "",
                              "ehi_col": ehi_col or "",
                              "energy_col": energy_col or "",
                              "value_col": value_col or "",
                              "line_508_514_sum": "" if line_sum is None else line_sum,
                              "sideband_490_500_sum": "" if sb1_sum is None else sb1_sum,
                              "sideband_522_532_sum": "" if sb2_sum is None else sb2_sum,
                              "sideband_mean_sum": "" if side_mean is None else side_mean,
                              "line_to_sideband_mean_ratio": "" if ratio_to_side_mean is None else ratio_to_side_mean,
                              "line_bin_count": int(np.sum(line_mask)),
                              "sb1_bin_count": int(np.sum(sb1_mask)),
                              "sb2_bin_count": int(np.sum(sb2_mask)),
                              "metric_type": "DIRECT_FITS_TABLE_SUM_NOT_FULL_OSA"
                          })

              except Exception as e:
                  fits_error_count += 1
                  inv["error"] = repr(e)[:500]

              fits_inventory.append(inv)

          write_csv(LIGHT / "fits_inventory.csv", fits_inventory, ["path", "bytes", "spi_relevant_path", "read_ok", "hdu_count", "error"])
          write_csv(LIGHT / "hdu_inventory.csv", hdu_inventory, ["path", "hdu_index", "hdu_name", "nrows", "ncols", "columns", "has_energy_hint", "has_spectrum_hint", "spi_relevant_path"])
          write_csv(LIGHT / "candidate_energy_spectrum_tables.csv", candidate_tables, ["path", "hdu_index", "hdu_name", "nrows", "columns", "elo_col", "ehi_col", "energy_col", "value_col", "candidate_reason"])
          write_csv(LIGHT / "direct_511_metric_candidates.csv", direct_metric_rows, [
              "path", "hdu_index", "hdu_name", "elo_col", "ehi_col", "energy_col", "value_col",
              "line_508_514_sum", "sideband_490_500_sum", "sideband_522_532_sum",
              "sideband_mean_sum", "line_to_sideband_mean_ratio",
              "line_bin_count", "sb1_bin_count", "sb2_bin_count", "metric_type"
          ])

          write_csv(LIGHT / "cache_files.csv", cache_file_rows, ["path", "bytes"])
          write_csv(LIGHT / "all_result_files.csv", all_file_rows, ["path", "bytes"])

          readable_metric_rows = []
          for r in direct_metric_rows:
              has_line = str(r.get("line_508_514_sum", "")) != ""
              has_sb1 = str(r.get("sideband_490_500_sum", "")) != ""
              has_sb2 = str(r.get("sideband_522_532_sum", "")) != ""
              has_ratio = str(r.get("line_to_sideband_mean_ratio", "")) != ""
              if has_line or has_sb1 or has_sb2 or has_ratio:
                  readable_metric_rows.append(r)

          full_direct_ratio_rows = []
          for r in direct_metric_rows:
              if str(r.get("line_to_sideband_mean_ratio", "")) != "":
                  full_direct_ratio_rows.append(r)

          line_seen = any(int(r.get("line_bin_count", 0) or 0) > 0 for r in direct_metric_rows)
          sb1_seen = any(int(r.get("sb1_bin_count", 0) or 0) > 0 for r in direct_metric_rows)
          sb2_seen = any(int(r.get("sb2_bin_count", 0) or 0) > 0 for r in direct_metric_rows)
          ratio_exists = len(full_direct_ratio_rows) > 0

          best_ratio = ""
          best_ratio_path = ""
          if full_direct_ratio_rows:
              def ratio_value(rr):
                  try:
                      return float(rr.get("line_to_sideband_mean_ratio", "nan"))
                  except Exception:
                      return float("nan")
              sorted_ratios = sorted(full_direct_ratio_rows, key=lambda rr: ratio_value(rr), reverse=True)
              best = sorted_ratios[0]
              best_ratio = best.get("line_to_sideband_mean_ratio", "")
              best_ratio_path = best.get("path", "")

          product_like_count = 0
          for r in fits_inventory:
              p = str(r.get("path", "")).lower()
              if any(k in p for k in ["products", "spec", "spectrum", "evts_det_spec", "energy_bound"]):
                  product_like_count += 1

          checks = {
              "ready_flag_exists": ready_flag_exists,
              "cache_data_exists": cache_data_exists,
              "cache_work_exists": cache_work_exists,
              "cache_file_count": len(cache_file_rows),
              "copied_data_file_count": len(rows_for_files(DATA)),
              "copied_work_file_count": len(rows_for_files(WORK)),
              "fits_file_count": len(fits_paths),
              "readable_fits_count": readable_fits_count,
              "fits_error_count": fits_error_count,
              "spi_relevant_fits_count": sum(1 for r in fits_inventory if str(r.get("spi_relevant_path", "")) == "True"),
              "product_like_fits_count": product_like_count,
              "candidate_energy_spectrum_table_count": len(candidate_tables),
              "direct_metric_candidate_count": len(direct_metric_rows),
              "line_508_514_energy_bin_seen": line_seen,
              "sideband_490_500_energy_bin_seen": sb1_seen,
              "sideband_522_532_energy_bin_seen": sb2_seen,
              "direct_line_to_sideband_ratio_exists": ratio_exists,
              "best_direct_line_to_sideband_ratio": best_ratio,
              "best_direct_ratio_path": best_ratio_path,
              "full_osa_executed": False,
              "spi_science_analysis_executed": False
          }

          with open(LIGHT / "checks_flat.csv", "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=["check", "value"])
              w.writeheader()
              for k, v in checks.items():
                  w.writerow({"check": k, "value": v})

          if ratio_exists:
              final_status = "R21AX_R7G_R3P_R2P_DIRECT_SPI_PRODUCTS_READABLE_511_RATIO_CANDIDATE_NOT_FULL_OSA_NOT_PROOF"
              scientific_status = "DIRECT_FITS_OPERATIONAL_METRIC_CANDIDATE_NOT_OSA_PROOF_NOT_DISCOVERY"
          elif line_seen:
              final_status = "R21AX_R7G_R3P_R2P_DIRECT_SPI_LINE_BIN_SEEN_BUT_NO_COMPLETE_SIDEBAND_RATIO_NOT_FULL_OSA"
              scientific_status = "NO_COMPLETE_511_RATIO_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif len(candidate_tables) > 0:
              final_status = "R21AX_R7G_R3P_R2P_DIRECT_SPI_CANDIDATE_TABLES_FOUND_BUT_NO_508_514_METRIC"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          elif len(fits_paths) > 0:
              final_status = "R21AX_R7G_R3P_R2P_DIRECT_FITS_PRESENT_BUT_NO_READABLE_SPI_511_PRODUCT"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"
          else:
              final_status = "R21AX_R7G_R3P_R2P_DIRECT_NO_FITS_PRODUCTS_AVAILABLE_IN_CACHE"
              scientific_status = "NO_511_METRIC_NOT_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL"

          summary = {
              "run_id": RUN_ID,
              "created_utc": now_utc(),
              "final_status": final_status,
              "scientific_status": scientific_status,
              "checks": checks,
              "method": "DIRECT_FITS_AUDIT_ONLY_NO_FULL_OSA_NO_SPI_SCIENCE_ANALYSIS",
              "energy_windows_keV": {
                  "line": [508.0, 514.0],
                  "sideband_low": [490.0, 500.0],
                  "sideband_high": [522.0, 532.0]
              },
              "claim_ceiling": "NOT_FULL_OSA_PROOF_NOT_DISCOVERY_DIRECT_OPERATIONAL_AUDIT_ONLY"
          }

          safe_write(LIGHT / "SUMMARY.json", json.dumps(summary, indent=2))
          safe_write(
              LIGHT / "CLAIM_BOUNDARY.txt",
              "R2P is a direct FITS audit only.\n"
              "It does not execute spi_science_analysis and does not constitute OSA proof.\n"
              "A readable direct ratio, if found, is operational/supporting only.\n"
              "No physical null is implied if no direct 511 product is found.\n"
          )

          short_report = []
          short_report.append("ACIRM R2P DIRECT SPI PRODUCTS AUDIT")
          short_report.append("final_status=" + final_status)
          short_report.append("scientific_status=" + scientific_status)
          for k, v in checks.items():
              short_report.append(str(k) + "=" + str(v))
          safe_write(LIGHT / "PHONE_SUMMARY.txt", "\n".join(short_report) + "\n")

          for p in sorted(LOGS.glob("*.log")):
              try:
                  txt = p.read_text(encoding="utf-8", errors="replace")
                  if len(txt) > 600000:
                      txt = txt[:300000] + "\nACIRM_LOG_TRUNCATED_MIDDLE\n" + txt[-200000:]
                  safe_write(LIGHT / "logs" / p.name, txt)
              except Exception:
                  pass

          if Path(ZIP_NAME).exists():
              Path(ZIP_NAME).unlink()

          os.system("zip -r " + ZIP_NAME + " " + str(LIGHT))

          if Path(ZIP_NAME).exists():
              sha = sha256_file(ZIP_NAME)
