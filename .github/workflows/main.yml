name: ACIRM R3P R2D flatfield prompt fixed SPI511

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3p-r2d-flatfield-prompt-fixed-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare R3P R2D folders
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3P_R2D_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3P_R2D_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS
          echo "R3P_R2D_PREPARED"

      - name: Restore R3P R1 cache
        id: r3p-r1-cache-restore
        uses: actions/cache/restore@v4
        with:
          path: ACIRM_CACHE_R3P_R1
          key: acirm-r21ax-r7g-r3p-r1-cache-v1
          restore-keys: |
            acirm-r21ax-r7g-r3p-r1-cache-

      - name: R3P R2D run from cache with flatfield prompt fix
        continue-on-error: true
        run: |
          set +e

          echo "R3P_R2D main started" | tee ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/main_execution.log
          echo "cache_hit=${{ steps.r3p-r1-cache-restore.outputs.cache-hit }}" | tee -a ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/main_execution.log

          python3 -u <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/main_execution.log
          import json
          import shutil
          import time
          from pathlib import Path

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2D_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS")

          CACHE = Path("ACIRM_CACHE_R3P_R1")
          CACHE_DATA = CACHE / "data"
          CACHE_WORK = CACHE / "work"
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"

          for p in [OUT, DATA, WORK, LOGS, LIGHT]:
              p.mkdir(parents=True, exist_ok=True)

          cache_ok = READY_FLAG.exists() and CACHE_DATA.exists() and CACHE_WORK.exists()

          print("R3P_R2D_READY_FLAG_EXISTS", READY_FLAG.exists())
          print("R3P_R2D_CACHE_DATA_EXISTS", CACHE_DATA.exists())
          print("R3P_R2D_CACHE_WORK_EXISTS", CACHE_WORK.exists())
          print("R3P_R2D_CACHE_OK", cache_ok)

          if cache_ok:
              shutil.copytree(CACHE_DATA, DATA, dirs_exist_ok=True)
              shutil.copytree(CACHE_WORK, WORK, dirs_exist_ok=True)
              (OUT / "cache_ready_for_spi.flag").write_text("CACHE_OK\n", encoding="utf-8")
          else:
              summary = {
                  "run_id": "ACIRM_R21AX_R7G_R3P_R2D_FLATFIELD_PROMPT_FIXED_SPI511",
                  "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
                  "final_status": "R21AX_R7G_R3P_R2D_CACHE_MISS_NO_RERUN_NO_511_NO_PHYSICAL_NULL",
                  "claim_ceiling": "NO_OSA_PROOF_NOT_DISCOVERY_NO_PHYSICAL_NULL",
                  "checks": {
                      "ready_flag_exists": READY_FLAG.exists(),
                      "cache_data_exists": CACHE_DATA.exists(),
                      "cache_work_exists": CACHE_WORK.exists(),
                      "og_created": False,
                      "actual_spi_started": False,
                      "line_508_514_seen": False,
                      "sidebands_seen": False,
                      "line_metric_exists": False,
                      "sideband_metric_exists": False
                  }
              }
              (LIGHT / "R3P_R2D_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

          sudo chown -R "$(id -u):$(id -g)" ACIRM_R21AX_R7G_R3P_R2D_RESULTS ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
          chmod -R u+rwX,go+rX ACIRM_R21AX_R7G_R3P_R2D_RESULTS ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true

          if [ -f ACIRM_R21AX_R7G_R3P_R2D_RESULTS/cache_ready_for_spi.flag ]; then
            {
              echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              docker --version || true
              docker pull integralsw/osa:latest || true
            } | tee ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/docker_status.log

            cat > ACIRM_R21AX_R7G_R3P_R2D_RESULTS/work/run_spi_r2d.sh <<'BASH'
          set +e

          echo "R3P_R2D_CONTAINER_START"

          unset DISPLAY
          export DISPLAY=
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1

          mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep
          mkdir -p /work/og /work/products_line /work/products_sidebands /work/container_logs

          cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

          for f in /tmp/acirm_pfiles/*.par; do
            if [ -f "$f" ]; then
              sed -i 's/,ql,/,hl,/g' "$f" || true
              sed -i 's/,q,/,h,/g' "$f" || true
            fi
          done

          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          if [ -d /opt/osa/lib ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
          fi

          if [ -d /opt/osa/lib64 ]; then
            export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
          fi

          source /opt/osa/bin/isdc_init_env.sh || true

          unset DISPLAY
          export DISPLAY=
          export HEADASNOQUERY=1
          export PIL_NO_GUI=1
          export PIL_NOTTY=1
          export ISDC_ENV=/opt/osa
          export REP_BASE_PROD=/tmp/acirm_rep
          export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
          export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
          export PATH=/opt/osa/bin:$PATH

          echo "R3P_R2D_COMMAND_DISCOVERY"
          for c in spi_science_analysis awk timeout stdbuf fstruct fdump ftlist; do
            echo "COMMAND $c"
            command -v "$c" || true
          done

          OG_FILE=$(find /work/og -type f -name "og_spi.fits" | head -1)
          echo "OG_FILE=$OG_FILE"

          if [ -z "$OG_FILE" ]; then
            echo "R3P_R2D_NO_OG_FILE"
            exit 0
          fi

          cat > /work/container_logs/guard.awk <<'AWK'
          BEGIN {
            orbit=0
            flat=0
            source=0
            eph=0
            kept=0
            maxkeep=1200000
            killed=0
          }
          {
            if (index($0, "Orbit asini parameter") > 0) orbit++
            if (index($0, "Use archival flatfield observations") > 0) flat++
            if (index($0, "Enter DOL for source catalog") > 0) source++
            if (index($0, "DOL of the ephemeris data") > 0) eph++

            if (orbit > 6) {
              print "ACIRM_GUARD_ORBIT_ASINI_LOOP_KILL"
              killed=1
              exit 77
            }

            if (flat > 6) {
              print "ACIRM_GUARD_FLATFIELD_PROMPT_LOOP_KILL"
              killed=1
              exit 78
            }

            line=$0 "\n"
            kept += length(line)
            if (kept <= maxkeep) {
              print $0
            }
          }
          END {
            print "orbit_asini_prompt_count=" orbit > status_file
            print "flatfield_prompt_count=" flat >> status_file
            print "source_catalog_prompt_count=" source >> status_file
            print "ephemeris_prompt_count=" eph >> status_file
            print "killed_by_guard=" killed >> status_file
            print "log_bytes_kept=" kept >> status_file
          }
          AWK

          make_answers() {
            OUT="$1"
            rm -f "$OUT"
            echo "RADEC" >> "$OUT"
            echo "0.001" >> "$OUT"
            echo "1000" >> "$OUT"
            for i in $(seq 1 300); do
              echo "no" >> "$OUT"
            done
            for i in $(seq 1 300); do
              echo "0" >> "$OUT"
            done
          }

          has_param() {
            KEY="$1"
            grep -q "^${KEY}," /tmp/acirm_pfiles/spi_science_analysis.par 2>/dev/null
          }

          add_param() {
            KEY="$1"
            VALUE="$2"
            FILE="$3"
            if has_param "$KEY"; then
              echo "${KEY}=${VALUE}" >> "$FILE"
              echo "ADD_PARAM ${KEY}=${VALUE}"
            else
              echo "SKIP_PARAM ${KEY}"
            fi
          }

          run_case() {
            CASE="$1"
            NREG="$2"
            REGIONS="$3"
            NBINS="$4"
            PROD="$5"

            mkdir -p "$PROD"

            PARAMS="/work/container_logs/${CASE}.params.txt"
            ANSWERS="/work/container_logs/${CASE}.answers.txt"
            LOG="/work/container_logs/${CASE}.guard.log"
            STATUS="/work/container_logs/${CASE}.status.txt"

            rm -f "$PARAMS" "$ANSWERS" "$LOG" "$STATUS"

            add_param "obs_group" "$OG_FILE" "$PARAMS"

            add_param "run_cat_extract" "no" "$PARAMS"
            add_param "run_pointing" "yes" "$PARAMS"
            add_param "run_binning" "yes" "$PARAMS"
            add_param "run_background" "no" "$PARAMS"
            add_param "run_spiros" "no" "$PARAMS"
            add_param "run_phase_analysis" "no" "$PARAMS"
            add_param "run_gaincorrection" "no" "$PARAMS"
            add_param "run_fullcheck" "no" "$PARAMS"
            add_param "use_pointing_filter" "no" "$PARAMS"
            add_param "run_simulation" "no" "$PARAMS"

            add_param "use_background_flatfields" "no" "$PARAMS"
            add_param "use_background_templates" "no" "$PARAMS"
            add_param "use_background_models" "no" "$PARAMS"
            add_param "spi_flatfield_ptsNbConstBack" "1" "$PARAMS"
            add_param "spi_flatfield_single" "yes" "$PARAMS"
            add_param "loc_spiflatfield_dol" "NONE" "$PARAMS"
            add_param "spi_obs_back_nmodel" "1" "$PARAMS"
            add_param "spiros_background-method" "0" "$PARAMS"

            add_param "spibounds_nregions" "$NREG" "$PARAMS"
            add_param "spibounds_regions" "$REGIONS" "$PARAMS"
            add_param "spibounds_nbins" "$NBINS" "$PARAMS"
            add_param "detectors" "0-18" "$PARAMS"
            add_param "clobber" "yes" "$PARAMS"
            add_param "log_File" "${CASE}.inner.log" "$PARAMS"

            add_param "catalog" "NONE" "$PARAMS"
            add_param "spiros_source-cat-dol" "NONE" "$PARAMS"
            add_param "spiros_nofsources" "0" "$PARAMS"
            add_param "spiros_sigmathres" "999" "$PARAMS"
            add_param "spiros_iteration-output" "NO" "$PARAMS"
            add_param "spiros_optistat" "CHI2" "$PARAMS"

            add_param "spi_phase_hist_ephemDOL" "NONE" "$PARAMS"
            add_param "spi_phase_hist_phaseBinNum" "1" "$PARAMS"
            add_param "spi_phase_hist_phaseSameWidthBin" "yes" "$PARAMS"
            add_param "spi_phase_hist_phaseBounds" "0,1" "$PARAMS"
            add_param "spi_phase_hist_phaseSubtractOff" "no" "$PARAMS"
            add_param "spi_phase_hist_phaseOffNum" "0" "$PARAMS"
            add_param "spi_phase_hist_orbit" "no" "$PARAMS"
            add_param "spi_phase_hist_asini" "0" "$PARAMS"
            add_param "spi_phase_hist_porb" "1" "$PARAMS"
            add_param "spi_phase_hist_T90epoch" "0" "$PARAMS"
            add_param "spi_phase_hist_ecc" "0" "$PARAMS"
            add_param "spi_phase_hist_omega_d" "0" "$PARAMS"
            add_param "spi_phase_hist_pporb" "0" "$PARAMS"

            if has_param "mode"; then
              echo "mode=h" >> "$PARAMS"
              echo "ADD_PARAM mode=h"
            fi

            make_answers "$ANSWERS"

            echo "SPI_CASE_BEGIN ${CASE}"
            cat "$PARAMS"

            echo "case=${CASE}" > "$STATUS"
            echo "started_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS"
            echo "ACIRM_SPI_PROCESS_STARTED ${CASE}"

            CMD_ARGS="$(tr '\n' ' ' < "$PARAMS")"

            if command -v stdbuf >/dev/null 2>&1; then
              RUNNER="stdbuf -oL -eL spi_science_analysis"
            else
              RUNNER="spi_science_analysis"
            fi

            timeout 3300 bash -lc "set -o pipefail; ${RUNNER} ${CMD_ARGS} < '${ANSWERS}' 2>&1 | awk -v status_file='${STATUS}.awk' -f /work/container_logs/guard.awk" > "$LOG" 2>&1
            RC="$?"

            cat "${STATUS}.awk" >> "$STATUS" 2>/dev/null || true
            echo "returncode=${RC}" >> "$STATUS"
            echo "ended_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$STATUS"

            echo "ACIRM_SPI_PROCESS_ENDED ${CASE} returncode=${RC}"
            echo "SPI_CASE_END ${CASE}"

            echo "PRODUCTS_AFTER_${CASE}"
            find "$PROD" -maxdepth 8 -type f -printf "%p %s\n" | sort || true
          }

          run_case "R3P_R2D_LINE_508_514" "1" "508,514" "1" "/work/products_line"
          run_case "R3P_R2D_SIDEBANDS_490_500_508_514_522_532" "3" "490,500,508,514,522,532" "1,1,1" "/work/products_sidebands"

          echo "R3P_R2D_WORK_FILES_AFTER"
          find /work -maxdepth 10 -type f -printf "%p %s\n" | sort > /work/container_logs/work_files_after_r2d.txt
          cat /work/container_logs/work_files_after_r2d.txt

          echo "R3P_R2D_FITS_QUICKLOOK"
          {
            for f in $(find /work/products_line /work/products_sidebands -type f \( -name "*.fits" -o -name "*.fits.gz" \) 2>/dev/null | sort | head -100); do
              echo "### $f"
              fstruct "$f" 2>&1 | head -120 || true
            done
          } > /work/container_logs/fits_quicklook_r2d.txt

          echo "R3P_R2D_CONTAINER_END"
          BASH

            docker run --rm \
              -v "$PWD/ACIRM_R21AX_R7G_R3P_R2D_RESULTS/data:/data" \
              -v "$PWD/ACIRM_R21AX_R7G_R3P_R2D_RESULTS/work:/work" \
              integralsw/osa:latest \
              bash /work/run_spi_r2d.sh \
              > ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/host_container_spi_r2d.log 2>&1 || true

            sudo chown -R "$(id -u):$(id -g)" ACIRM_R21AX_R7G_R3P_R2D_RESULTS ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
            chmod -R u+rwX,go+rX ACIRM_R21AX_R7G_R3P_R2D_RESULTS ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS ACIRM_CACHE_R3P_R1 2>/dev/null || true
          fi

          python3 -u <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/main_execution.log
          import csv
          import hashlib
          import json
          import os
          import time
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3P_R2D_FLATFIELD_PROMPT_FIXED_SPI511"

          OUT = Path("ACIRM_R21AX_R7G_R3P_R2D_RESULTS")
          DATA = OUT / "data"
          WORK = OUT / "work"
          LOGS = OUT / "logs"
          LIGHT = Path("ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS")
          ZIP_NAME = "ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS.zip"

          CACHE = Path("ACIRM_CACHE_R3P_R1")
          READY_FLAG = CACHE / "acirm_r3p_r1_cache_ready.flag"

          LIGHT.mkdir(parents=True, exist_ok=True)
          (LIGHT / "logs").mkdir(parents=True, exist_ok=True)

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_text(path, limit=900000):
              p = Path(path)
              if not p.exists() or not p.is_file():
                  return ""
              data = p.read_bytes()
              if len(data) > limit:
                  data = data[:400000] + b"\nACIRM_LOG_TRUNCATED_MIDDLE\n" + data[-400000:]
              return data.decode("utf-8", "replace")

          def file_rows(root):
              rows = []
              root = Path(root)
              if not root.exists():
                  return rows
              for p in sorted(root.rglob("*")):
                  if p.is_file():
                      try:
                          rows.append({"path": str(p), "bytes": p.stat().st_size})
                      except Exception:
                          rows.append({"path": str(p), "bytes": ""})
              return rows

          def write_csv(path, rows, fields):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fields)
                  w.writeheader()
                  for r in rows:
                      w.writerow({k: r.get(k, "") for k in fields})

          def copy_log(src):
              p = Path(src)
              if p.exists() and p.is_file():
                  dest = LIGHT / "logs" / p.name
                  txt = safe_text(p, limit=900000)
                  dest.write_text(txt, encoding="utf-8", errors="replace")

          def parse_status(path):
              d = {}
              txt = safe_text(path, limit=100000)
              for line in txt.splitlines():
                  if "=" in line:
                      k, v = line.split("=", 1)
                      d[k.strip()] = v.strip()
              return d

          for p in sorted(LOGS.glob("*.log")):
              copy_log(p)

          for p in [
              WORK / "container_logs" / "R3P_R2D_LINE_508_514.guard.log",
              WORK / "container_logs" / "R3P_R2D_LINE_508_514.status.txt",
              WORK / "container_logs" / "R3P_R2D_LINE_508_514.params.txt",
              WORK / "container_logs" / "R3P_R2D_SIDEBANDS_490_500_508_514_522_532.guard.log",
              WORK / "container_logs" / "R3P_R2D_SIDEBANDS_490_500_508_514_522_532.status.txt",
              WORK / "container_logs" / "R3P_R2D_SIDEBANDS_490_500_508_514_522_532.params.txt",
              WORK / "container_logs" / "work_files_after_r2d.txt",
              WORK / "container_logs" / "fits_quicklook_r2d.txt",
          ]:
              copy_log(p)

          data_rows = file_rows(DATA)
          work_rows = file_rows(WORK)
          line_rows = file_rows(WORK / "products_line")
          side_rows = file_rows(WORK / "products_sidebands")

          write_csv(LIGHT / "r3p_r2d_data_files.csv", data_rows, ["path", "bytes"])
          write_csv(LIGHT / "r3p_r2d_work_files.csv", work_rows, ["path", "bytes"])
          write_csv(LIGHT / "r3p_r2d_products_line.csv", line_rows, ["path", "bytes"])
          write_csv(LIGHT / "r3p_r2d_products_sidebands.csv", side_rows, ["path", "bytes"])

          host_log = safe_text(LOGS / "host_container_spi_r2d.log", limit=1200000)
          line_log = safe_text(WORK / "container_logs" / "R3P_R2D_LINE_508_514.guard.log", limit=700000)
          side_log = safe_text(WORK / "container_logs" / "R3P_R2D_SIDEBANDS_490_500_508_514_522_532.guard.log", limit=700000)

          line_status = parse_status(WORK / "container_logs" / "R3P_R2D_LINE_508_514.status.txt")
          side_status = parse_status(WORK / "container_logs" / "R3P_R2D_SIDEBANDS_490_500_508_514_522_532.status.txt")

          og_created = any("og_spi.fits" in r["path"] for r in work_rows)

          actual_spi_started = (
              "ACIRM_SPI_PROCESS_STARTED R3P_R2D_LINE_508_514" in host_log
              and "python3: command not found" not in host_log
          )

          line_508_514_seen = (
              "spibounds_regions=508,514" in host_log
              or "spibounds_regions=508,514" in line_log
          )

          sidebands_seen = (
              "spibounds_regions=490,500,508,514,522,532" in host_log
              or "spibounds_regions=490,500,508,514,522,532" in side_log
          )

          def to_int(x):
              try:
                  return int(str(x).strip())
              except Exception:
                  return 0

          line_kill = to_int(line_status.get("killed_by_guard", "0"))
          side_kill = to_int(side_status.get("killed_by_guard", "0"))

          prompt_loop_seen = bool(line_kill or side_kill)

          orbit_count = (
              to_int(line_status.get("orbit_asini_prompt_count", "0"))
              + to_int(side_status.get("orbit_asini_prompt_count", "0"))
          )

          flatfield_count = (
              to_int(line_status.get("flatfield_prompt_count", "0"))
              + to_int(side_status.get("flatfield_prompt_count", "0"))
          )

          line_metric_exists = any(str(r["path"]).endswith(".fits") or str(r["path"]).endswith(".fits.gz") for r in line_rows)
          sideband_metric_exists = any(str(r["path"]).endswith(".fits") or str(r["path"]).endswith(".fits.gz") for r in side_rows)

          if line_metric_exists or sideband_metric_exists:
              final_status = "R21AX_R7G_R3P_R2D_SPI511_PRODUCTS_PRESENT_REVIEW_PRODUCTS_NOT_FINAL_PROOF"
          elif prompt_loop_seen:
              final_status = "R21AX_R7G_R3P_R2D_SPI511_PROMPT_LOOP_GUARD_TRIGGERED_NO_511_METRIC_NO_PHYSICAL_NULL"
          elif actual_spi_started:
              final_status = "R21AX_R7G_R3P_R2D_SPI511_EXECUTED_NO_READABLE_511_METRIC_NO_PHYSICAL_NULL"
          else:
              final_status = "R21AX_R7G_R3P_R2D_SPI511_NOT_STARTED_NO_511_NO_PHYSICAL_NULL"

          checks = {
              "ready_flag_exists": READY_FLAG.exists(),
              "data_file_count": len(data_rows),
              "work_file_count": len(work_rows),
              "og_created": og_created,
              "actual_spi_started": actual_spi_started,
              "line_508_514_seen": line_508_514_seen,
              "sidebands_seen": sidebands_seen,
              "line_product_count": len(line_rows),
              "sideband_product_count": len(side_rows),
              "line_metric_exists": line_metric_exists,
              "sideband_metric_exists": sideband_metric_exists,
              "prompt_loop_seen": prompt_loop_seen,
              "orbit_asini_prompt_count": orbit_count,
              "flatfield_prompt_count": flatfield_count,
              "line_returncode": line_status.get("returncode", ""),
              "sidebands_returncode": side_status.get("returncode", "")
          }

          summary = {
              "run_id": RUN_ID,
              "created_utc": now_utc(),
              "final_status": final_status,
              "claim_ceiling": "NOT_DISCOVERY_NOT_FINAL_PROOF_NOT_OSA_PROOF_UNLESS_ACTUAL_LINE_SIDEBAND_METRIC_IS_READ",
              "checks": checks
          }

          (LIGHT / "R3P_R2D_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          (LIGHT / "R3P_R2D_CLAIM_BOUNDARY.txt").write_text(
              "Runtime, cache, prompt, parameter, Docker, or OSA failure is not a physical null.\n"
              "Do not claim discovery/proof unless an actual 511 line/sideband metric is read from OSA products.\n",
              encoding="utf-8"
          )

          flat = [{"check": k, "value": v} for k, v in checks.items()]
          write_csv(LIGHT / "r3p_r2d_checks_flat.csv", flat, ["check", "value"])

          if Path(ZIP_NAME).exists():
              Path(ZIP_NAME).unlink()

          os.system("zip -r " + ZIP_NAME + " " + str(LIGHT))

          if Path(ZIP_NAME).exists():
              sha = sha256_file(ZIP_NAME)
              Path(ZIP_NAME + ".sha256.txt").write_text(sha + "  " + ZIP_NAME + "\n", encoding="utf-8")
              print("R3P_R2D_ZIP_SHA256", sha)

          print(json.dumps(summary, indent=2))
          PY

      - name: Upload R3P R2D LIGHT artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3P_R2D_LIGHT_RESULTS.zip.sha256.txt
            ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/main_execution.log
            ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/docker_status.log
            ACIRM_R21AX_R7G_R3P_R2D_RESULTS/logs/host_container_spi_r2d.log
          if-no-files-found: warn
