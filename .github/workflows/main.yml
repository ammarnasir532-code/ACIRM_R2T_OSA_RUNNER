name: ACIRM R3J robust SPI511 obs_group execution with full error capture

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  acirm-r3j-robust-spi511-obs-group:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Prepare folders
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3J_RESULTS/logs
          mkdir -p ACIRM_R21AX_R7G_R3J_RESULTS/data
          mkdir -p ACIRM_R21AX_R7G_R3J_RESULTS/work
          mkdir -p ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS

      - name: System diagnostics
        run: |
          {
            echo "ACIRM R3J robust SPI511 obs_group execution with full error capture"
            echo "date_utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "claim_ceiling=ROBUST_SPI511_OBS_GROUP_EXECUTION_ATTEMPT_NOT_DISCOVERY_NOT_FINAL_PROOF"
            echo ""
            uname -a || true
            echo ""
            df -h || true
            echo ""
            free -h || true
            echo ""
            echo "HEASARC IPv4 HTTPS probe"
            curl -4 -I -L --connect-timeout 30 --max-time 90 https://heasarc.gsfc.nasa.gov/FTP/integral/data/ || true
          } | tee ACIRM_R21AX_R7G_R3J_RESULTS/logs/system_diagnostics.log

      - name: Pull OSA Docker image
        continue-on-error: true
        run: |
          {
            echo "Docker version"
            docker --version || true
            docker info || true
            echo ""
            echo "Pull integralsw/osa:latest"
            docker pull integralsw/osa:latest || true
          } | tee ACIRM_R21AX_R7G_R3J_RESULTS/logs/docker_pull.log

      - name: Robust assemble DAL OG and SPI511 execution
        continue-on-error: true
        run: |
          set +e
          mkdir -p ACIRM_R21AX_R7G_R3J_RESULTS/logs
          echo "Starting R3J main Python execution" | tee ACIRM_R21AX_R7G_R3J_RESULTS/logs/main_execution.log

          python3 -u <<'PY' 2>&1 | tee -a ACIRM_R21AX_R7G_R3J_RESULTS/logs/main_execution.log
          import csv
          import gzip
          import hashlib
          import json
          import os
          import re
          import shutil
          import subprocess
          import time
          import traceback
          from pathlib import Path

          RUN_ID = "ACIRM_R21AX_R7G_R3J_ROBUST_SPI511_OBS_GROUP_EXECUTION_FULL_CAPTURE"

          OUT = Path("ACIRM_R21AX_R7G_R3J_RESULTS")
          DATA = OUT / "data"
          LOGS = OUT / "logs"
          WORK = OUT / "work"

          OUT.mkdir(parents=True, exist_ok=True)
          DATA.mkdir(parents=True, exist_ok=True)
          LOGS.mkdir(parents=True, exist_ok=True)
          WORK.mkdir(parents=True, exist_ok=True)

          BASES = [
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data",
              "http://heasarc.gsfc.nasa.gov/FTP/integral/data",
          ]

          REV = "2504"
          SCW = "250400090010"

          SCW_DIR = DATA / "scw" / REV / f"{SCW}.001"
          AUX_ADP_DIR = DATA / "aux" / "adp" / f"{REV}.001"

          SCW_DIR.mkdir(parents=True, exist_ok=True)
          AUX_ADP_DIR.mkdir(parents=True, exist_ok=True)

          download_rows = []
          dal_iteration_rows = []
          missing_rows = []
          command_rows = []

          def now_utc():
              return time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime())

          def sha256_file(path):
              h = hashlib.sha256()
              with open(path, "rb") as f:
                  for chunk in iter(lambda: f.read(1024 * 1024), b""):
                      h.update(chunk)
              return h.hexdigest()

          def safe_sha(path):
              try:
                  p = Path(path)
                  if p.exists() and p.is_file() and p.stat().st_size <= 50 * 1024 * 1024:
                      return sha256_file(p)
                  if p.exists() and p.is_file():
                      return "SKIPPED_LARGE_FILE"
              except Exception:
                  return ""
              return ""

          def is_gzip(path):
              try:
                  with open(path, "rb") as f:
                      return f.read(2) == b"\x1f\x8b"
              except Exception:
                  return False

          def is_fits(path):
              try:
                  with open(path, "rb") as f:
                      head = f.read(16)
                  return head.startswith(b"SIMPLE") or head.startswith(b"XTENSION")
              except Exception:
                  return False

          def accept(path):
              p = Path(path)
              if not p.exists():
                  return False, "missing"
              size = p.stat().st_size
              if size <= 1024:
                  return False, "too_small_" + str(size)
              if is_gzip(p):
                  return True, "gzip"
              if is_fits(p):
                  return True, "fits"
              return False, "not_fits_or_gzip"

          def norm_name(x):
              x = str(x).strip()
              x = x.split("[")[0].strip()
              return Path(x).name

          def materialize(tmp, final_path):
              final_path = Path(final_path)
              final_path.parent.mkdir(parents=True, exist_ok=True)

              if is_gzip(tmp):
                  with gzip.open(tmp, "rb") as src, open(final_path, "wb") as dst:
                      shutil.copyfileobj(src, dst)
                  Path(tmp).unlink(missing_ok=True)
              else:
                  if final_path.exists():
                      final_path.unlink()
                  Path(tmp).rename(final_path)

          def curl_download(url, tmp):
              tmp = Path(tmp)
              if tmp.exists():
                  tmp.unlink()

              cmd = [
                  "curl",
                  "-4",
                  "-L",
                  "--retry", "8",
                  "--retry-delay", "10",
                  "--connect-timeout", "90",
                  "--max-time", "1200",
                  "--fail",
                  "-o", str(tmp),
                  url,
              ]

              p = subprocess.run(cmd, text=True, stdout=subprocess.PIPE, stderr=subprocess.STDOUT)
              ok, reason = accept(tmp)
              return p.returncode, ok, reason, p.stdout[-5000:]

          def final_path_for_logical_path(logical_path):
              logical_path = str(logical_path).split("[")[0].strip()

              if logical_path.startswith("/data/"):
                  rel = logical_path[len("/data/"):]
                  return DATA / rel

              if logical_path.startswith("data/"):
                  rel = logical_path[len("data/"):]
                  return DATA / rel

              name = norm_name(logical_path)
              return SCW_DIR / name

          def candidate_urls_for_logical_path(logical_path):
              logical_path = str(logical_path).split("[")[0].strip()
              candidates = []

              if logical_path.startswith("/data/"):
                  rel = logical_path[len("/data/"):]
                  for base in BASES:
                      candidates.append(base + "/" + rel)
                      if rel.endswith(".fits") and not rel.endswith(".fits.gz"):
                          candidates.append(base + "/" + rel + ".gz")
                      if rel.endswith(".fits.gz"):
                          candidates.append(base + "/" + rel[:-3])
                  return candidates

              name = norm_name(logical_path)

              roots = [
                  "scw/" + REV + "/" + SCW + ".001",
                  "aux/adp/" + REV + ".001",
                  "aux/adp",
                  "aux",
                  "idx",
                  "cat",
                  "ic",
              ]

              for base in BASES:
                  for root in roots:
                      candidates.append(base + "/" + root + "/" + name)
                      if name.endswith(".fits") and not name.endswith(".fits.gz"):
                          candidates.append(base + "/" + root + "/" + name + ".gz")
                      if name.endswith(".fits.gz"):
                          candidates.append(base + "/" + root + "/" + name[:-3])

              return candidates

          def download_logical(logical_path, category, source_iteration):
              final_path = final_path_for_logical_path(logical_path)
              final_name = final_path.name

              if final_path.exists() and final_path.stat().st_size > 1024:
                  download_rows.append({
                      "source_iteration": source_iteration,
                      "category": category,
                      "logical_path": str(logical_path),
                      "final_path": str(final_path),
                      "url": "already_exists",
                      "attempt": 0,
                      "returncode": 0,
                      "ok": True,
                      "reason": "already_exists",
                      "bytes": final_path.stat().st_size,
                      "sha256": sha256_file(final_path),
                      "log_tail": "",
                  })
                  return True

              urls = candidate_urls_for_logical_path(logical_path)

              for i, url in enumerate(urls, start=1):
                  tmp = final_path.parent / (".download_" + final_name + "_" + str(i) + ".part")

                  row = {
                      "source_iteration": source_iteration,
                      "category": category,
                      "logical_path": str(logical_path),
                      "final_path": str(final_path),
                      "url": url,
                      "attempt": i,
                      "returncode": "",
                      "ok": False,
                      "reason": "",
                      "bytes": 0,
                      "sha256": "",
                      "log_tail": "",
                  }

                  try:
                      rc, ok, reason, log_tail = curl_download(url, tmp)
                      row["returncode"] = rc
                      row["reason"] = reason
                      row["log_tail"] = log_tail

                      if ok:
                          materialize(tmp, final_path)
                          if final_path.exists() and final_path.stat().st_size > 1024:
                              row["ok"] = True
                              row["bytes"] = final_path.stat().st_size
                              row["sha256"] = sha256_file(final_path)
                              download_rows.append(row)
                              return True
                  except Exception as e:
                      row["reason"] = repr(e)

                  download_rows.append(row)

              return False

          def seed_initial_files():
              scw_seed = [
                  "swg.fits",
                  "sc_time.fits",
                  "sc_attitude.fits",
                  "sc_gti.fits",
                  "sc_hk.fits",
                  "sc_modes.fits",
                  "sc_orbit_param.fits",
                  "spi_oper.fits",
                  "spi_spectra.fits",
                  "spi_gti.fits",
                  "spi_hk.fits",
                  "spi_science_hk.fits",
                  "spi_science_param.fits",
                  "spi_acs.fits",
                  "spi_block.fits",
                  "ibis_hk.fits",
                  "ibis_raw_shadow.fits",
                  "ibis_dead.fits",
                  "jmx1_hk.fits",
                  "jmx2_hk.fits",
                  "jemx1_hk.fits",
                  "jemx2_hk.fits",
                  "picsit_hk.fits",
                  "isgri_hk.fits",
              ]

              aux_adp_seed = [
                  "orbit_historic.fits",
                  "orbit_predicted.fits",
                  "attitude_historic.fits",
                  "attitude_predicted_01.fits",
                  "attitude_predicted.fits",
                  "time_correlation.fits",
                  "pointing_definition_predicted_0001.fits",
                  "pointing_definition_predicted.fits",
                  "pointing_definition_historic.fits",
                  "pointing_definition_predicted_0000.fits",
                  "pointing_definition_predicted_0002.fits",
                  "observation_log.fits",
                  "moc_out_of_limits.fits",
                  "slew_definition.fits",
              ]

              for x in scw_seed:
                  download_logical("/data/scw/" + REV + "/" + SCW + ".001/" + x, "initial_scw_seed", 0)

              for x in aux_adp_seed:
                  download_logical("/data/aux/adp/" + REV + ".001/" + x, "initial_aux_adp_seed", 0)

          def discover_members_from_swg():
              swg_path = SCW_DIR / "swg.fits"
              refs = []

              if not swg_path.exists():
                  return refs

              try:
                  text = swg_path.read_bytes().decode("latin1", "ignore")
                  found = re.findall(r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)", text)
                  for ref in sorted(set(found)):
                      name = norm_name(ref)
                      if name and name != "swg.fits":
                          refs.append("/data/scw/" + REV + "/" + SCW + ".001/" + name)
              except Exception as e:
                  refs.append("ERROR_READING_SWG:" + repr(e))

              return refs

          def run_container_script(script, name, timeout_seconds):
              log_path = LOGS / (name + ".log")

              cmd = [
                  "docker",
                  "run",
                  "--rm",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3J_RESULTS/data:/data",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3J_RESULTS/work:/work",
                  "-v", os.getcwd() + "/ACIRM_R21AX_R7G_R3J_RESULTS/logs:/logs",
                  "integralsw/osa:latest",
                  "bash",
                  "-lc",
                  script,
              ]

              try:
                  p = subprocess.run(
                      cmd,
                      text=True,
                      stdout=subprocess.PIPE,
                      stderr=subprocess.STDOUT,
                      timeout=timeout_seconds,
                  )
                  txt = p.stdout
                  rc = p.returncode
              except subprocess.TimeoutExpired as e:
                  raw = e.stdout or ""
                  if isinstance(raw, bytes):
                      raw = raw.decode("utf-8", "replace")
                  txt = raw + "\nACIRM_TIMEOUT_EXPIRED\n"
                  rc = 124
              except Exception:
                  txt = traceback.format_exc()
                  rc = 999

              log_path.write_text(txt, encoding="utf-8", errors="replace")
              command_rows.append({
                  "name": name,
                  "returncode": rc,
                  "log_path": str(log_path),
                  "log_bytes": len(txt.encode("utf-8", "replace")),
              })
              return rc, txt

          def osa_env_prefix():
              return '''
                set +e
                mkdir -p /tmp/acirm_pfiles /tmp/acirm_work /tmp/acirm_rep /work/osa_products /work/og /work/logs /work/products
                cp -f /opt/osa/pfiles/*.par /tmp/acirm_pfiles/ 2>/dev/null || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH

                if [ -d /opt/osa/lib ]; then
                  export LD_LIBRARY_PATH="/opt/osa/lib:$LD_LIBRARY_PATH"
                fi

                if [ -d /opt/osa/lib64 ]; then
                  export LD_LIBRARY_PATH="/opt/osa/lib64:$LD_LIBRARY_PATH"
                fi

                source /opt/osa/bin/isdc_init_env.sh || true

                export ISDC_ENV=/opt/osa
                export REP_BASE_PROD=/tmp/acirm_rep
                export COMMONLOGFILE=/tmp/acirm_work/commonlog.txt
                export PFILES="/tmp/acirm_pfiles;/opt/osa/pfiles"
                export PATH=/opt/osa/bin:$PATH
              '''

          def run_dal_verify(iteration):
              script = osa_env_prefix() + '''
                TARGET=/data/scw/2504/250400090010.001/swg.fits

                echo "ACIRM_R3J_DAL_ITERATION=''' + str(iteration) + '''"
                echo "environment"
                env | sort | grep -E "^(ISDC|OSA|REP|PFILES|PATH|LD_LIBRARY_PATH|COMMONLOGFILE|HEADAS|CFITSIO)" || true
                echo ""
                echo "local files count"
                find /data -type f | wc -l || true
                echo ""
                echo "dal_verify swg.fits"
                timeout 600 dal_verify "$TARGET" 2>&1 || true
                echo ""
                echo "commonlog tail"
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -800 || true
              '''

              rc, txt = run_container_script(script, "dal_verify_iteration_" + str(iteration).zfill(2), 720)
              return txt

          def parse_missing_from_dal_log(txt):
              missing = set()

              if "DAL_FILE_NOT_ACCESSIBLE" in txt or "status -2004" in txt or "not accessible" in txt.lower():
                  patterns = [
                      r"(/data/[A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)",
                      r"([A-Za-z0-9_./+-]+\.fits(?:\.gz)?(?:\[[^\]]+\])?)",
                  ]

                  for pat in patterns:
                      for m in re.findall(pat, txt):
                          clean = str(m).split("[")[0].strip()
                          if clean.endswith(".fits") or clean.endswith(".fits.gz"):
                              missing.add(clean)

              filtered = []

              for m in sorted(missing):
                  if m.startswith("/data/"):
                      filtered.append(m)
                  else:
                      name = norm_name(m)
                      if not name:
                          continue

                      aux_names = [
                          "observation_log.fits",
                          "moc_out_of_limits.fits",
                          "time_correlation.fits",
                          "slew_definition.fits",
                      ]

                      if name.startswith("orbit") or "attitude" in name or "pointing" in name or name in aux_names:
                          filtered.append("/data/aux/adp/" + REV + ".001/" + name)
                      else:
                          filtered.append("/data/scw/" + REV + "/" + SCW + ".001/" + name)

              return sorted(set(filtered))

          def run_command_discovery():
              script = osa_env_prefix() + '''
                echo "OSA command discovery R3J"
                echo ""
                echo "PATH=$PATH"
                echo ""
                for c in dal_verify og_create spi_science_analysis spi_obs_create spi_obs_hist spi_obs_back spi_obs_fit spiselect spi_extract spi_spec; do
                  echo "COMMAND $c"
                  command -v "$c" || true
                done
                echo ""
                echo "spi_science_analysis.par"
                cat /opt/osa/pfiles/spi_science_analysis.par 2>/dev/null || true
                echo ""
                echo "og_create.par"
                cat /opt/osa/pfiles/og_create.par 2>/dev/null || true
              '''
              return run_container_script(script, "r3j_command_discovery", 240)

          def run_actual_spi511_obs_group():
              script = osa_env_prefix() + '''
                set +e

                TARGET=/data/scw/2504/250400090010.001/swg.fits
                mkdir -p /work/og /work/products /work/logs /work/run

                echo "$TARGET" > /work/scwlist.txt

                echo "ACIRM R3J actual SPI511 obs_group execution"
                echo "TARGET=$TARGET"
                echo ""

                echo "Step 1: create SPI observation group"
                timeout 900 og_create idxSwg="$TARGET" ogid=ACIRM_R3J baseDir=/work/og instrument=SPI 2>&1 | tee /work/logs/og_create_r3j.log || true

                echo ""
                echo "Step 2: list OG products"
                find /work/og -maxdepth 8 -type f -printf "%p %s\\n" | sort | tee /work/logs/og_files_after_create.txt || true

                OG_FILE=""
                OG_FILE=$(find /work/og -type f -name "og_spi.fits" | sort | head -1)

                if [ -z "$OG_FILE" ]; then
                  OG_FILE=$(find /work/og -type f -iname "*og*.fits" | sort | head -1)
                fi

                if [ -z "$OG_FILE" ]; then
                  OG_FILE=$(find /work/og -type f -name "*.fits" | sort | head -1)
                fi

                echo ""
                echo "OG_FILE=$OG_FILE"

                PAR=/opt/osa/pfiles/spi_science_analysis.par

                echo ""
                echo "Step 3: parameter file scan"
                echo "PAR=$PAR"
                cat "$PAR" 2>/dev/null | head -220 || true

                has_par() {
                  grep -q -E "^ *$1[,) ]" "$PAR" 2>/dev/null
                }

                if [ -z "$OG_FILE" ]; then
                  echo "ACIRM_R3J_NO_OG_FILE_CREATED"
                else
                  cd /work/products || exit 0

                  CMD1="spi_science_analysis"

                  if has_par obs_group; then
                    CMD1="$CMD1 obs_group=$OG_FILE"
                  else
                    echo "ACIRM_R3J_MISSING_REQUIRED_PARAMETER_obs_group_IN_PAR_FILE"
                  fi

                  if has_par spibounds_regions; then
                    CMD1="$CMD1 spibounds_regions=508,514"
                  fi

                  if has_par spibounds_nbins; then
                    CMD1="$CMD1 spibounds_nbins=1"
                  fi

                  echo ""
                  echo "Step 4: SPI 511 line attempt"
                  echo "CMD1=$CMD1"
                  timeout 2400 bash -lc "$CMD1" 2>&1 | tee /work/logs/spi_science_analysis_508_514_obs_group.log || true

                  CMD2="spi_science_analysis"

                  if has_par obs_group; then
                    CMD2="$CMD2 obs_group=$OG_FILE"
                  fi

                  if has_par spibounds_regions; then
                    CMD2="$CMD2 spibounds_regions=490,500,508,514,522,532"
                  fi

                  if has_par spibounds_nbins; then
                    CMD2="$CMD2 spibounds_nbins=3"
                  fi

                  echo ""
                  echo "Step 5: SPI sideband context attempt"
                  echo "CMD2=$CMD2"
                  timeout 2400 bash -lc "$CMD2" 2>&1 | tee /work/logs/spi_science_analysis_490_500_508_514_522_532_obs_group.log || true
                fi

                echo ""
                echo "Step 6: products after SPI attempts"
                find /work -maxdepth 9 -type f -printf "%p %s\\n" | sort | tee /work/logs/work_files_after_r3j_spi_attempts.txt || true

                echo ""
                echo "Step 7: selected text hits"
                grep -R -n -E "508|511|514|490|500|522|532|PIL_BOGUS_CMDLINE|status|error|Error|ERROR|spi|spectrum|PHA|RMF|ARF" /work/logs /work/products 2>/dev/null | head -1200 | tee /work/logs/r3j_selected_text_hits.txt || true

                echo ""
                echo "Copy /work/logs to /logs"
                cp -r /work/logs/* /logs/ 2>/dev/null || true

                echo ""
                echo "commonlog tail"
                cat /tmp/acirm_work/commonlog.txt 2>/dev/null | tail -1200 || true
              '''
              return run_container_script(script, "r3j_actual_spi511_obs_group_execution", 5400)

          def write_csv(path, rows, fieldnames):
              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=fieldnames)
                  w.writeheader()
                  for r in rows:
                      for k in fieldnames:
                          r.setdefault(k, "")
                      w.writerow(r)

          def list_files(root):
              rows = []
              root = Path(root)
              if not root.exists():
                  return rows
              for p in sorted(root.rglob("*")):
                  if p.is_file():
                      rows.append({
                          "path": str(p),
                          "bytes": p.stat().st_size,
                          "sha256": safe_sha(p),
                      })
              return rows

          def main():
              print("R3J main started at", now_utc())

              print("R3J: seed initial files")
              seed_initial_files()

              print("R3J: discover members from swg")
              for ref in discover_members_from_swg():
                  if ref.startswith("ERROR_"):
                      missing_rows.append({
                          "iteration": 0,
                          "missing_ref": ref,
                          "download_ok": False,
                          "category": "swg_parse_error",
                      })
                  else:
                      ok = download_logical(ref, "swg_regex_discovered_member", 0)
                      missing_rows.append({
                          "iteration": 0,
                          "missing_ref": ref,
                          "download_ok": ok,
                          "category": "swg_regex_discovered_member",
                      })

              max_iterations = 20
              dependency_status = "NOT_STARTED"
              repeated_guard = set()

              for iteration in range(1, max_iterations + 1):
                  print("R3J: DAL iteration", iteration)
                  txt = run_dal_verify(iteration)

                  dal_file_not_accessible = ("DAL_FILE_NOT_ACCESSIBLE" in txt) or ("status -2004" in txt)
                  isdc_env_missing = ("ISDC_ENV is not set" in txt) or ("env. variable ISDC_ENV is not set" in txt)
                  parameter_init_error = ("Parameter initialization error" in txt) or ("status -3003" in txt)
                  missing = parse_missing_from_dal_log(txt)

                  dal_iteration_rows.append({
                      "iteration": iteration,
                      "dal_file_not_accessible": dal_file_not_accessible,
                      "isdc_env_missing": isdc_env_missing,
                      "parameter_init_error": parameter_init_error,
                      "missing_count": len(missing),
                      "missing_refs_joined": "|".join(missing),
                  })

                  if isdc_env_missing or parameter_init_error:
                      dependency_status = "OSA_ENV_OR_PARAMETER_REGRESSION_NO_511_NO_PHYSICAL_NULL"
                      break

                  if not dal_file_not_accessible:
                      dependency_status = "DAL_DEPENDENCIES_RESOLVED_READY_FOR_SPI511_OBS_GROUP"
                      break

                  if not missing:
                      dependency_status = "DAL_FILE_NOT_ACCESSIBLE_BUT_NO_PARSEABLE_MISSING_REFERENCE"
                      break

                  key = tuple(missing)

                  if key in repeated_guard:
                      dependency_status = "REPEATED_MISSING_REFERENCE_AFTER_DOWNLOAD_ATTEMPTS"
                      break

                  repeated_guard.add(key)

                  any_new_ok = False

                  for ref in missing:
                      ok = download_logical(ref, "dal_missing_auto_resolve", iteration)
                      any_new_ok = any_new_ok or ok
                      missing_rows.append({
                          "iteration": iteration,
                          "missing_ref": ref,
                          "download_ok": ok,
                          "category": "dal_missing_auto_resolve",
                      })

                  if not any_new_ok:
                      dependency_status = "UNABLE_TO_DOWNLOAD_NEXT_MISSING_REFERENCES"
                      break

              else:
                  dependency_status = "MAX_ITERATIONS_REACHED"

              print("R3J: command discovery")
              discovery_rc, discovery_txt = run_command_discovery()

              actual_spi_started = False
              actual_spi_rc = ""
              actual_spi_txt = ""

              if dependency_status == "DAL_DEPENDENCIES_RESOLVED_READY_FOR_SPI511_OBS_GROUP":
                  print("R3J: actual SPI511 obs_group run")
                  actual_spi_started = True
                  actual_spi_rc, actual_spi_txt = run_actual_spi511_obs_group()
              else:
                  print("R3J: SPI511 execution skipped because dependency status is not ready")

              final_files = list_files(DATA)
              work_files = list_files(WORK)

              product_hints = []
              for p in work_files:
                  low = p["path"].lower()
                  if any(k in low for k in ["spi", "spec", "spectrum", "pha", "rmf", "arf", "og", "energy", "511", "508", "514"]):
                      product_hints.append(p)

              joined_logs = discovery_txt + "\n" + actual_spi_txt

              wrong_param_seen = "PIL_BOGUS_CMDLINE" in joined_logs or "bogus parameter name" in joined_logs
              obs_group_seen = "obs_group" in joined_logs
              line_band_seen = ("508,514" in joined_logs) or ("508" in joined_logs and "514" in joined_logs)
              status_3023_seen = "status -3023" in joined_logs
              status_3003_seen = "status -3003" in joined_logs
              og_created = "og_spi.fits" in joined_logs or any("og_spi.fits" in r["path"] for r in work_files)

              if actual_spi_started and product_hints and not wrong_param_seen:
                  final_status = "R21AX_R7G_R3J_SPI511_OBS_GROUP_EXECUTION_RAN_PRODUCTS_PRESENT_REVIEW_REQUIRED_NOT_FINAL_PROOF"
              elif actual_spi_started and wrong_param_seen:
                  final_status = "R21AX_R7G_R3J_SPI511_OBS_GROUP_ATTEMPT_HIT_PARAMETER_ERROR_REVIEW_REQUIRED_NO_511_NO_PHYSICAL_NULL"
              elif actual_spi_started:
                  final_status = "R21AX_R7G_R3J_SPI511_OBS_GROUP_ATTEMPT_RAN_NO_CLEAR_PRODUCT_HINT_REVIEW_LOGS_NO_PHYSICAL_NULL"
              else:
                  final_status = "R21AX_R7G_R3J_SPI511_NOT_STARTED_DEPENDENCY_STAGE_NOT_READY_NO_PHYSICAL_NULL"

              write_csv(
                  OUT / "r3j_download_manifest.csv",
                  download_rows,
                  [
                      "source_iteration",
                      "category",
                      "logical_path",
                      "final_path",
                      "url",
                      "attempt",
                      "returncode",
                      "ok",
                      "reason",
                      "bytes",
                      "sha256",
                      "log_tail",
                  ],
              )

              write_csv(
                  OUT / "r3j_dal_iterations.csv",
                  dal_iteration_rows,
                  [
                      "iteration",
                      "dal_file_not_accessible",
                      "isdc_env_missing",
                      "parameter_init_error",
                      "missing_count",
                      "missing_refs_joined",
                  ],
              )

              write_csv(
                  OUT / "r3j_missing_reference_resolution.csv",
                  missing_rows,
                  [
                      "iteration",
                      "missing_ref",
                      "download_ok",
                      "category",
                  ],
              )

              write_csv(
                  OUT / "r3j_commands.csv",
                  command_rows,
                  [
                      "name",
                      "returncode",
                      "log_path",
                      "log_bytes",
                  ],
              )

              write_csv(
                  OUT / "r3j_final_local_files.csv",
                  final_files,
                  [
                      "path",
                      "bytes",
                      "sha256",
                  ],
              )

              write_csv(
                  OUT / "r3j_work_files_after_spi_attempt.csv",
                  work_files,
                  [
                      "path",
                      "bytes",
                      "sha256",
                  ],
              )

              write_csv(
                  OUT / "r3j_product_hints.csv",
                  product_hints,
                  [
                      "path",
                      "bytes",
                      "sha256",
                  ],
              )

              checks = {
                  "dependency_status": dependency_status,
                  "actual_spi_started": actual_spi_started,
                  "actual_spi_returncode": actual_spi_rc,
                  "wrong_param_seen": wrong_param_seen,
                  "obs_group_seen": obs_group_seen,
                  "line_band_seen": line_band_seen,
                  "status_3023_seen": status_3023_seen,
                  "status_3003_seen": status_3003_seen,
                  "og_created": og_created,
                  "work_file_count": len(work_files),
                  "product_hint_count": len(product_hints),
                  "local_file_count": len(final_files),
              }

              with open(OUT / "r3j_checks_flat.csv", "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=["check", "value"])
                  w.writeheader()
                  for k, v in checks.items():
                      w.writerow({"check": k, "value": v})

              summary = {
                  "run_id": RUN_ID,
                  "created_utc": now_utc(),
                  "claim_ceiling": "ROBUST_SPI511_OBS_GROUP_EXECUTION_ATTEMPT_NOT_DISCOVERY_NOT_FINAL_PROOF",
                  "scw": SCW,
                  "rev": REV,
                  "dependency_status": dependency_status,
                  "dal_iteration_count": len(dal_iteration_rows),
                  "local_file_count": len(final_files),
                  "actual_spi_started": actual_spi_started,
                  "actual_spi_returncode": actual_spi_rc,
                  "work_file_count": len(work_files),
                  "product_hint_count": len(product_hints),
                  "wrong_param_seen": wrong_param_seen,
                  "obs_group_seen": obs_group_seen,
                  "line_band_seen": line_band_seen,
                  "status_3023_seen": status_3023_seen,
                  "status_3003_seen": status_3003_seen,
                  "og_created": og_created,
                  "final_status": final_status,
              }

              (OUT / "R3J_ROBUST_SPI511_OBS_GROUP_EXECUTION_SUMMARY.json").write_text(
                  json.dumps(summary, indent=2, sort_keys=True),
                  encoding="utf-8",
              )

              print(json.dumps(summary, indent=2))

          try:
              main()
          except Exception:
              err = traceback.format_exc()
              print("ACIRM_R3J_FATAL_EXCEPTION")
              print(err)
              fallback = {
                  "run_id": RUN_ID,
                  "created_utc": now_utc(),
                  "claim_ceiling": "ROBUST_SPI511_OBS_GROUP_EXECUTION_ATTEMPT_NOT_DISCOVERY_NOT_FINAL_PROOF",
                  "final_status": "R21AX_R7G_R3J_FATAL_PYTHON_EXCEPTION_CAPTURED_NO_511_NO_PHYSICAL_NULL",
                  "exception": err,
              }
              (OUT / "R3J_FATAL_EXCEPTION.json").write_text(json.dumps(fallback, indent=2), encoding="utf-8")
              (OUT / "R3J_ROBUST_SPI511_OBS_GROUP_EXECUTION_SUMMARY.json").write_text(json.dumps(fallback, indent=2), encoding="utf-8")
          PY

          PY_RC=${PIPESTATUS[0]}
          echo "R3J_MAIN_PYTHON_EXIT_CODE=${PY_RC}" | tee -a ACIRM_R21AX_R7G_R3J_RESULTS/logs/main_execution.log
          echo "${PY_RC}" > ACIRM_R21AX_R7G_R3J_RESULTS/logs/main_python_exit_code.txt

          if [ ! -f ACIRM_R21AX_R7G_R3J_RESULTS/R3J_ROBUST_SPI511_OBS_GROUP_EXECUTION_SUMMARY.json ]; then
            echo "Summary missing after Python step; creating shell fallback summary" | tee -a ACIRM_R21AX_R7G_R3J_RESULTS/logs/main_execution.log
            python3 - <<'PY'
          import json, time
          from pathlib import Path
          out = Path("ACIRM_R21AX_R7G_R3J_RESULTS")
          logs = out / "logs"
          summary = {
              "run_id": "ACIRM_R21AX_R7G_R3J_ROBUST_SPI511_OBS_GROUP_EXECUTION_FULL_CAPTURE",
              "created_utc": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime()),
              "claim_ceiling": "ROBUST_SPI511_OBS_GROUP_EXECUTION_ATTEMPT_NOT_DISCOVERY_NOT_FINAL_PROOF",
              "final_status": "R21AX_R7G_R3J_SHELL_FALLBACK_SUMMARY_PYTHON_OUTPUT_MISSING_NO_511_NO_PHYSICAL_NULL",
              "main_execution_log_exists": (logs / "main_execution.log").exists(),
          }
          (out / "R3J_ROBUST_SPI511_OBS_GROUP_EXECUTION_SUMMARY.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY
          fi

      - name: Build LIGHT audit package only
        if: always()
        run: |
          mkdir -p ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/logs

          cp ACIRM_R21AX_R7G_R3J_RESULTS/logs/*.log ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R3J_RESULTS/logs/*.txt ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/logs/ || true
          cp ACIRM_R21AX_R7G_R3J_RESULTS/*.json ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/ || true
          cp ACIRM_R21AX_R7G_R3J_RESULTS/*.csv ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/ || true

          echo "R3J performs robust SPI511 obs_group execution with full error capture." > ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "FITS and heavy OSA products are excluded from phone artifact." >> ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt
          echo "This is not a final 511 keV proof/discovery claim." >> ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/HEAVY_DATA_EXCLUDED_NOTICE.txt

          du -h ACIRM_R21AX_R7G_R3J_RESULTS/data > ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/data_size_report.txt || true
          du -h ACIRM_R21AX_R7G_R3J_RESULTS/work > ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/work_size_report.txt || true

          find ACIRM_R21AX_R7G_R3J_RESULTS/data -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/data_file_list.csv || true
          find ACIRM_R21AX_R7G_R3J_RESULTS/work -type f -printf "%p,%s\n" > ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/work_file_list.csv || true

          cat > ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS/R3J_CLAIM_BOUNDARY.txt <<'EOF'
          ACIRM R3J claim boundary:
          - Robust SPI511 obs_group execution attempt.
          - Full Python/shell error capture is included in logs/main_execution.log.
          - Not final 511 keV proof.
          - Not 511 keV discovery.
          - Runtime/parameter/OSA product failure is not a physical null.
          - The artifact is LIGHT only and excludes heavy FITS/OSA products.
          EOF

          zip -r ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS.zip ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS
          sha256sum ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS.zip > ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS.zip.sha256.txt
          cat ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS.zip.sha256.txt

      - name: Upload ACIRM R3J LIGHT artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS
          path: |
            ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS.zip
            ACIRM_R21AX_R7G_R3J_LIGHT_RESULTS.zip.sha256.txt
