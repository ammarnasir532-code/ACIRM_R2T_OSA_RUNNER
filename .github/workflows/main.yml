name: ACIRM R17K R6 All Guarded OSA SPI511 Final Attempt

on:
  workflow_dispatch:

jobs:
  r17k-r6-all-guarded-osa-spi511:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Prepare locked inputs
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ACIRM_R17K_R6_OUTPUTS logs scripts repo/scw/2504 selected_products og_attempts pfiles

          cat > scw_ids.list <<'EOF'
          250400090010
          250400020010
          250400080010
          250400030010
          250400070021
          250400040010
          250400060010
          250400050010
          EOF
          sed -i 's/^ *//' scw_ids.list
          cp scw_ids.list ACIRM_R17K_R6_OUTPUTS/LOCKED_SCW_IDS.txt

          cat > ACIRM_R17K_R6_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R6_ALL_GUARDED_FINAL_ATTEMPT
          OFFICIAL_OSA_PRODUCT_GENERATION_OR_LOCATOR_ONLY
          NOT_DISCOVERY
          NOT_PARTICLE_PROOF
          NOT_SOURCE_ATTRIBUTION
          NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_PRODUCTS_AND_LOCKED_CONTROLS_PASS
          EOF

      - name: System diagnostics and dependencies
        shell: bash
        run: |
          set +e
          uname -a | tee logs/uname.txt
          df -h | tee logs/df_start.txt
          free -h | tee logs/free_start.txt
          docker --version | tee logs/docker_version.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y curl wget zip unzip rsync python3-pip > logs/apt_install.log 2>&1
          python3 -m pip install -q astropy numpy requests > logs/pip_install.log 2>&1

      - name: Fetch locked SPI SCW files from HEASARC
        shell: bash
        run: |
          set +e
          cat > scripts/fetch_spi_scw.py <<'PY'
          import re, json
          from pathlib import Path
          from urllib.parse import urljoin
          import requests

          REV = "2504"
          SCWS = [x.strip() for x in Path("scw_ids.list").read_text().splitlines() if x.strip()]
          BASES = [
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/scw/{REV}/",
              f"https://heasarc.gsfc.nasa.gov/FTP/integral/data/rev_3/scw/{REV}/",
          ]
          OUT = Path("repo/scw") / REV
          OUT.mkdir(parents=True, exist_ok=True)

          KEEP_PREFIXES = ("spi_", "swg.fits", "sc_")
          KEEP_SUFFIXES = ("_scw.txt",)
          MAX_FILE_MB = 300
          MAX_TOTAL_MB = 4200
          TIMEOUT = 60

          session = requests.Session()
          session.headers.update({"User-Agent": "ACIRM-R17K-R6-fetch-scw/1.0"})

          rows = []
          total = 0

          def hrefs(html):
              return sorted(set(m.group(1) for m in re.finditer(r"href=[\"']([^\"']+)[\"']", html, re.I)))

          def keep(fn):
              low = fn.lower()
              return low.startswith(KEEP_PREFIXES) or low.endswith(KEEP_SUFFIXES)

          for scw in SCWS:
              target = OUT / (scw + ".001")
              target.mkdir(parents=True, exist_ok=True)
              got_listing = False

              for base in BASES:
                  url = urljoin(base, scw + ".001/")
                  try:
                      r = session.get(url, timeout=TIMEOUT, allow_redirects=True)
                      rows.append({"scw": scw, "listing_url": url, "status": r.status_code})
                      if r.status_code != 200:
                          continue

                      got_listing = True
                      files = [h for h in hrefs(r.text) if h and not h.endswith("/") and keep(h)]
                      rows.append({"scw": scw, "kept_count": len(files), "kept_files": ";".join(files)})

                      for fn in files:
                          fu = urljoin(url, fn)
                          try:
                              h = session.head(fu, timeout=TIMEOUT, allow_redirects=True)
                              sz = h.headers.get("Content-Length", "")
                              sz = int(sz) if sz.isdigit() else 0

                              if h.status_code != 200:
                                  rows.append({"scw": scw, "file": fn, "download": "HEAD_NOT_200", "status": h.status_code})
                                  continue

                              if sz and sz > MAX_FILE_MB * 1000 * 1000:
                                  rows.append({"scw": scw, "file": fn, "download": "SKIP_TOO_LARGE", "size_bytes": sz})
                                  continue

                              if sz and total + sz > MAX_TOTAL_MB * 1000 * 1000:
                                  rows.append({"scw": scw, "file": fn, "download": "SKIP_TOTAL_LIMIT", "size_bytes": sz})
                                  continue

                              rr = session.get(fu, timeout=TIMEOUT, stream=True, allow_redirects=True)
                              if rr.status_code != 200:
                                  rows.append({"scw": scw, "file": fn, "download": "GET_NOT_200", "status": rr.status_code})
                                  continue

                              local = target / fn
                              n = 0
                              with open(local, "wb") as f:
                                  for chunk in rr.iter_content(1024 * 1024):
                                      if not chunk:
                                          continue
                                      n += len(chunk)
                                      if n > MAX_FILE_MB * 1000 * 1000:
                                          raise RuntimeError("file exceeded limit")
                                      if total + n > MAX_TOTAL_MB * 1000 * 1000:
                                          raise RuntimeError("total exceeded limit")
                                      f.write(chunk)

                              total += n
                              rows.append({"scw": scw, "file": fn, "url": fu, "local": str(local), "download": "DOWNLOADED", "size_bytes": n})

                          except Exception as e:
                              rows.append({"scw": scw, "file": fn, "url": fu, "download": "ERROR", "error": repr(e)[:300]})

                      break

                  except Exception as e:
                      rows.append({"scw": scw, "listing_url": url, "download": "LISTING_ERROR", "error": repr(e)[:300]})

              if not got_listing:
                  rows.append({"scw": scw, "download": "NO_LISTING_FOUND"})

          Path("ACIRM_R17K_R6_OUTPUTS/R17K_R6_SCW_FETCH_AUDIT.json").write_text(
              json.dumps({"rows": rows, "total_bytes": total}, indent=2),
              encoding="utf-8"
          )
          PY

          python3 scripts/fetch_spi_scw.py > logs/fetch_spi_scw_stdout.log 2>&1
          echo "FETCH_SCW_EXIT=$?" | tee ACIRM_R17K_R6_OUTPUTS/R17K_R6_FETCH_SCW_EXIT.txt
          find repo/scw/2504 -maxdepth 2 -type f | sort > ACIRM_R17K_R6_OUTPUTS/R17K_R6_SCW_FILE_INVENTORY.txt
          du -sh repo/scw/2504 2>/dev/null | tee ACIRM_R17K_R6_OUTPUTS/R17K_R6_SCW_SIZE.txt

      - name: Fetch IC IDX CAT AUX light repository from HEASARC
        shell: bash
        run: |
          set +e
          cat > scripts/fetch_light_repo.py <<'PY'
          import re, json
          from pathlib import Path
          from urllib.parse import urljoin
          import requests

          STARTS = [
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/idx/ic/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/ic/spi/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/cat/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/cat/hec/",
              "https://heasarc.gsfc.nasa.gov/FTP/integral/data/aux/",
          ]

          KEEP_TERMS = (
              "spi", "gnrl_refr_cat", "idx", "gain", "ebds", "rmf", "irf", "arf", "rsp",
              "time", "leap", "orbit", "aux", "swg", "ic"
          )

          MAX_DEPTH = 4
          MAX_FILES = 420
          MAX_FILE_MB = 220
          MAX_TOTAL_MB = 6500
          TIMEOUT = 50

          session = requests.Session()
          session.headers.update({"User-Agent": "ACIRM-R17K-R6-light-repo/1.0"})

          rows = []
          q = [(u, MAX_DEPTH) for u in STARTS]
          seen = set()
          files = []
          total = 0

          def hrefs(html):
              return sorted(set(m.group(1) for m in re.finditer(r"href=[\"']([^\"']+)[\"']", html, re.I)))

          def keep_file(u):
              s = u.lower()
              return s.endswith((".fits", ".fit", ".fits.gz", ".fit.gz")) and any(t in s for t in KEEP_TERMS)

          while q and len(seen) < 500 and len(files) < MAX_FILES:
              url, depth = q.pop(0)
              if url in seen:
                  continue
              seen.add(url)
              try:
                  r = session.get(url, timeout=TIMEOUT, allow_redirects=True)
                  rows.append({"url": url, "depth": depth, "status": r.status_code, "bytes": len(r.content or b"")})
                  if r.status_code != 200:
                      continue

                  for h in hrefs(r.text):
                      if not h or h in ("../", "./", "/") or h.startswith("?"):
                          continue
                      full = urljoin(url, h)
                      low = full.lower()

                      if h.endswith("/") and depth > 0 and any(t in low for t in ("spi", "idx", "ic", "cat", "aux", "rsp", "cfg", "hec", "gnrl", "time", "orbit")):
                          q.append((full, depth - 1))
                      elif keep_file(full):
                          files.append(full)
                          if len(files) >= MAX_FILES:
                              break
              except Exception as e:
                  rows.append({"url": url, "error": repr(e)[:300]})

          downloaded = []
          for fu in sorted(set(files)):
              try:
                  h = session.head(fu, timeout=TIMEOUT, allow_redirects=True)
                  sz = h.headers.get("Content-Length", "")
                  sz = int(sz) if sz.isdigit() else 0

                  if h.status_code != 200:
                      downloaded.append({"url": fu, "download": "HEAD_NOT_200", "status": h.status_code})
                      continue

                  if sz and sz > MAX_FILE_MB * 1000 * 1000:
                      downloaded.append({"url": fu, "download": "SKIP_TOO_LARGE", "size_bytes": sz})
                      continue

                  if sz and total + sz > MAX_TOTAL_MB * 1000 * 1000:
                      downloaded.append({"url": fu, "download": "SKIP_TOTAL_LIMIT", "size_bytes": sz})
                      continue

                  rel = fu.split("/integral/data/", 1)[-1]
                  local = Path("repo") / rel
                  local.parent.mkdir(parents=True, exist_ok=True)

                  r = session.get(fu, timeout=TIMEOUT, stream=True, allow_redirects=True)
                  if r.status_code != 200:
                      downloaded.append({"url": fu, "download": "GET_NOT_200", "status": r.status_code})
                      continue

                  n = 0
                  with open(local, "wb") as out:
                      for chunk in r.iter_content(1024 * 1024):
                          if not chunk:
                              continue
                          n += len(chunk)
                          if n > MAX_FILE_MB * 1000 * 1000:
                              raise RuntimeError("file exceeded limit")
                          if total + n > MAX_TOTAL_MB * 1000 * 1000:
                              raise RuntimeError("total exceeded limit")
                          out.write(chunk)

                  total += n
                  downloaded.append({"url": fu, "local": str(local), "download": "DOWNLOADED", "size_bytes": n})

              except Exception as e:
                  downloaded.append({"url": fu, "download": "ERROR", "error": repr(e)[:300]})

          Path("ACIRM_R17K_R6_OUTPUTS/R17K_R6_LIGHT_REPO_FETCH_AUDIT.json").write_text(
              json.dumps(
                  {
                      "crawl_rows": rows,
                      "candidate_files": len(set(files)),
                      "download_rows": downloaded,
                      "total_bytes": total,
                  },
                  indent=2,
              ),
              encoding="utf-8",
          )
          PY

          python3 scripts/fetch_light_repo.py > logs/fetch_light_repo_stdout.log 2>&1
          echo "FETCH_LIGHT_REPO_EXIT=$?" | tee ACIRM_R17K_R6_OUTPUTS/R17K_R6_FETCH_LIGHT_REPO_EXIT.txt

          mkdir -p repo/ic repo/idx repo/idx/ic repo/cat repo/cat/hec repo/aux
          find repo -maxdepth 6 -type f | sort > ACIRM_R17K_R6_OUTPUTS/R17K_R6_REPO_FILES.txt
          find repo -maxdepth 5 -type d | sort > ACIRM_R17K_R6_OUTPUTS/R17K_R6_REPO_DIRS.txt
          du -sh repo 2>/dev/null | tee ACIRM_R17K_R6_OUTPUTS/R17K_R6_REPO_SIZE.txt

      - name: Pull OSA Docker and create runtime init
        shell: bash
        run: |
          set +e
          docker pull integralsw/osa:latest > logs/docker_pull_integralsw_osa.log 2>&1
          echo "DOCKER_PULL_EXIT=$?" | tee ACIRM_R17K_R6_OUTPUTS/R17K_R6_DOCKER_PULL_EXIT.txt

          cat > scripts/osa_runtime_init.sh <<'SH'
          set +e

          export REP_BASE_PROD=/home/integral/repo
          export CURRENT_IC=/home/integral/repo
          export ISDC_REF_CAT=/home/integral/repo/cat/hec/gnrl_refr_cat_0043.fits[1]
          export HEADASNOQUERY=1
          export HEADASPROMPT=/dev/null

          for init in \
            /opt/osa/bin/osa-init.sh \
            /opt/osa/osa-init.sh \
            /opt/osa/init.sh \
            /opt/osa/.osa-init.sh \
            /usr/local/osa/bin/osa-init.sh
          do
            if [ -f "$init" ]; then
              . "$init" || true
            fi
          done

          LIB_DIRS=$(find /opt /usr/local /usr -type f \( -name 'libGui.so' -o -name 'libdal*.so*' -o -name 'libisdc*.so*' -o -name 'libspi*.so*' \) 2>/dev/null | xargs -r -n1 dirname | sort -u | tr '\n' ':')
          export LD_LIBRARY_PATH="${LIB_DIRS}${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"

          OG=$(find /opt /usr/local /usr -type f -name og_create 2>/dev/null | head -1)
          SP=$(find /opt /usr/local /usr -type f -name spi_science_analysis 2>/dev/null | head -1)
          [ -n "$OG" ] && export PATH="$(dirname "$OG"):$PATH"
          [ -n "$SP" ] && export PATH="$(dirname "$SP"):$PATH"

          OG_PAR=$(find /opt /usr/local /usr -type f -name og_create.par 2>/dev/null | head -1)
          SP_PAR=$(find /opt /usr/local /usr -type f -name spi_science_analysis.par 2>/dev/null | head -1)

          SYS_PFILES=""
          if [ -n "$OG_PAR" ]; then SYS_PFILES="$(dirname "$OG_PAR")"; fi
          if [ -z "$SYS_PFILES" ] && [ -n "$SP_PAR" ]; then SYS_PFILES="$(dirname "$SP_PAR")"; fi

          mkdir -p /work/pfiles
          if [ -n "$SYS_PFILES" ]; then
            cp "$SYS_PFILES"/*.par /work/pfiles/ 2>/dev/null || true
            export PFILES="/work/pfiles;$SYS_PFILES"
          else
            export PFILES="/work/pfiles"
          fi

          echo "REP_BASE_PROD=$REP_BASE_PROD"
          echo "CURRENT_IC=$CURRENT_IC"
          echo "ISDC_REF_CAT=$ISDC_REF_CAT"
          echo "PATH=$PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "PFILES=$PFILES"
          echo "OG=$OG"
          echo "SP=$SP"
          echo "OG_PAR=$OG_PAR"
          echo "SP_PAR=$SP_PAR"
          SH
          chmod +x scripts/osa_runtime_init.sh

      - name: All guarded OSA og_create attempts
        shell: bash
        run: |
          set +e
          docker run --rm \
            -v "$PWD:/work" \
            -v "$PWD/repo:/home/integral/repo" \
            -w /work \
            integralsw/osa:latest bash -lc '
              set +e
              . /work/scripts/osa_runtime_init.sh

              mkdir -p /work/ACIRM_R17K_R6_OUTPUTS /work/og_attempts /work/pfiles /home/integral/repo/obs

              {
                echo "=== R17K_R6 OSA PREFLIGHT ==="
                which og_create || true
                which spi_science_analysis || true
                og_create --version || true
                spi_science_analysis --version || true
                echo "REP_BASE_PROD=$REP_BASE_PROD"
                echo "CURRENT_IC=$CURRENT_IC"
                echo "ISDC_REF_CAT=$ISDC_REF_CAT"
                echo "PFILES=$PFILES"
                echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
                echo "=== repo dirs ==="
                find /home/integral/repo -maxdepth 3 -type d | sort | head -300
                echo "=== repo files sample ==="
                find /home/integral/repo -maxdepth 5 -type f | sort | head -300
              } > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_OSA_PREFLIGHT.txt 2>&1

              # Build robust SCW list variants.
              : > /work/scw_ids_only.list
              : > /work/scw_rel_dirs.list
              : > /work/scw_rel_swg.list
              : > /work/scw_abs_dirs.list
              : > /work/scw_abs_swg.list
              : > /work/scw_fits_bracket.list

              while read -r id; do
                [ -n "$id" ] || continue
                echo "$id" >> /work/scw_ids_only.list
                echo "scw/2504/${id}.001" >> /work/scw_rel_dirs.list
                echo "scw/2504/${id}.001/swg.fits" >> /work/scw_rel_swg.list
                echo "/home/integral/repo/scw/2504/${id}.001" >> /work/scw_abs_dirs.list
                echo "/home/integral/repo/scw/2504/${id}.001/swg.fits" >> /work/scw_abs_swg.list
                echo "/home/integral/repo/scw/2504/${id}.001/swg.fits[1]" >> /work/scw_fits_bracket.list
              done < /work/scw_ids.list

              cp /work/scw_*.list /work/ACIRM_R17K_R6_OUTPUTS/ 2>/dev/null || true

              echo "variant,syntax,base,exit_code,og_spi_found,first_og_spi,attempt_dir" > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_OG_CREATE_ATTEMPT_SUMMARY.csv

              try_og() {
                variant="$1"
                list="$2"
                syntax="$3"
                base="$4"
                safe_base=$(echo "$base" | sed "s#[/:[:space:]]#_#g")
                outdir="/work/og_attempts/${variant}_${syntax}_${safe_base}"
                mkdir -p "$outdir"
                cd "$outdir"
                cp "$list" ./scw_input.list

                {
                  echo "=== TRY variant=$variant syntax=$syntax base=$base ==="
                  echo "PWD=$(pwd)"
                  echo "REP_BASE_PROD=$REP_BASE_PROD"
                  echo "CURRENT_IC=$CURRENT_IC"
                  echo "PFILES=$PFILES"
                  echo "--- scw_input.list ---"
                  cat ./scw_input.list
                  echo "--- command output ---"
                } > "$outdir/run.log"

                if [ "$syntax" = "positional" ]; then
                  og_create ./scw_input.list SPI "og_${variant}_${syntax}_${safe_base}" "$base" >> "$outdir/run.log" 2>&1
                elif [ "$syntax" = "named_idxSwg" ]; then
                  og_create idxSwg=./scw_input.list instrument=SPI ogid="og_${variant}_${syntax}_${safe_base}" baseDir="$base" >> "$outdir/run.log" 2>&1
                elif [ "$syntax" = "named_scwList" ]; then
                  og_create scwList=./scw_input.list instrument=SPI ogid="og_${variant}_${syntax}_${safe_base}" baseDir="$base" >> "$outdir/run.log" 2>&1
                elif [ "$syntax" = "named_full" ]; then
                  og_create idxSwg=./scw_input.list instrument=SPI ogid="og_${variant}_${syntax}_${safe_base}" baseDir="$base" ogDOL=og_spi.fits >> "$outdir/run.log" 2>&1
                fi

                ec=$?
                found=$(find "$outdir" /work /home/integral/repo -type f -name "og_spi.fits" 2>/dev/null | head -1)
                if [ -n "$found" ]; then yesno=1; else yesno=0; fi
                echo "${variant},${syntax},${base},${ec},${yesno},${found},${outdir}" >> /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_OG_CREATE_ATTEMPT_SUMMARY.csv
                find "$outdir" -maxdepth 6 -type f | sort > "$outdir/file_inventory.txt"
                cd /work

                if [ "$yesno" = "1" ]; then
                  cp "$found" /work/selected_products/og_spi.fits 2>/dev/null || true
                  echo "$found" > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_FIRST_OG_SPI_PATH.txt
                  return 0
                fi

                return 1
              }

              success=0

              for v in ids_only rel_dirs rel_swg abs_dirs abs_swg fits_bracket; do
                list="/work/scw_${v}.list"
                [ -f "$list" ] || continue
                for base in "." "./" "" "/home/integral/repo" "/home/integral/repo/"; do
                  for syntax in positional named_idxSwg named_scwList named_full; do
                    try_og "$v" "$list" "$syntax" "$base"
                    if [ "$?" = "0" ]; then
                      success=1
                      break 3
                    fi
                  done
                done
              done

              echo "$success" > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_OG_CREATE_SUCCESS_FLAG.txt

              find /work/og_attempts /home/integral/repo/obs -type f \( -name "og_spi.fits" -o -name "og_*.fits" -o -name "run.log" -o -name "file_inventory.txt" \) 2>/dev/null | sort > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_OG_ATTEMPT_FILES.txt
            ' > logs/r17k_r6_og_create_all_guarded.log 2>&1

          echo "R17K_R6_OG_ATTEMPT_STEP_EXIT=$?" | tee ACIRM_R17K_R6_OUTPUTS/R17K_R6_OG_ATTEMPT_STEP_EXIT.txt

      - name: SPI science analysis only if og_spi exists
        shell: bash
        run: |
          set +e
          if [ ! -s ACIRM_R17K_R6_OUTPUTS/R17K_R6_FIRST_OG_SPI_PATH.txt ]; then
            echo "NO_OG_SPI_FOUND_SKIP_SPI_SCIENCE_ANALYSIS" | tee ACIRM_R17K_R6_OUTPUTS/R17K_R6_SPI_SCIENCE_ANALYSIS_EXIT.txt
            exit 0
          fi

          docker run --rm \
            -v "$PWD:/work" \
            -v "$PWD/repo:/home/integral/repo" \
            -w /work \
            integralsw/osa:latest bash -lc '
              set +e
              . /work/scripts/osa_runtime_init.sh

              first_og=$(cat /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_FIRST_OG_SPI_PATH.txt)
              attempt_dir=$(dirname "$first_og")
              cd "$attempt_dir"

              {
                echo "RUNNING_SPI_SCIENCE_IN=$attempt_dir"
                echo "first_og=$first_og"
                echo "PFILES=$PFILES"
                echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
              } > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_SPI_SCIENCE_CONTEXT.txt

              # Non-interactive hidden mode first.
              spi_science_analysis mode=h
              ec=$?
              echo "SPI_SCIENCE_ANALYSIS_MODE_H_EXIT=$ec" > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_SPI_SCIENCE_ANALYSIS_EXIT.txt

              find "$attempt_dir" /work /home/integral/repo -type f \( -iname "*evts*det*spec*" -o -iname "*energy*bound*" -o -iname "*ebounds*" -o -iname "*spi*spect*" -o -iname "*.fits" \) 2>/dev/null | sort > /work/ACIRM_R17K_R6_OUTPUTS/R17K_R6_SPI_PRODUCTS_FOUND.txt
            ' > logs/r17k_r6_spi_science_if_og.log 2>&1

      - name: Collect products and inspect direct 511 rows
        shell: bash
        run: |
          set +e
          find . -type f \( -iname 'og_spi.fits' -o -iname '*evts*det*spec*' -o -iname '*energy*bound*' -o -iname '*ebounds*' \) | sort > ACIRM_R17K_R6_OUTPUTS/R17K_R6_SELECTED_PRODUCT_PATHS.txt

          while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -le 200000000 ]; then
              cp -f "$f" selected_products/ || true
            fi
          done < ACIRM_R17K_R6_OUTPUTS/R17K_R6_SELECTED_PRODUCT_PATHS.txt

          cp logs/*.log ACIRM_R17K_R6_OUTPUTS/ 2>/dev/null || true
          cp -r og_attempts ACIRM_R17K_R6_OUTPUTS/og_attempts_light_logs 2>/dev/null || true
          find ACIRM_R17K_R6_OUTPUTS/og_attempts_light_logs -type f ! -name 'run.log' ! -name 'file_inventory.txt' -delete 2>/dev/null || true

          cat > scripts/inspect_final.py <<'PY'
          import json, csv, math
          from pathlib import Path
          import numpy as np

          try:
              from astropy.io import fits
          except Exception:
              fits = None

          OUT = Path("ACIRM_R17K_R6_OUTPUTS")
          PROD = Path("selected_products")
          rows = []
          meas = []
          errs = []

          LINE = (508.0, 514.0)
          SB1 = (490.0, 500.0)
          SB2 = (522.0, 532.0)

          E_PAIRS = [
              ("E_MIN", "E_MAX"),
              ("ENERG_LO", "ENERG_HI"),
              ("ENERGY_LO", "ENERGY_HI"),
              ("E_LO", "E_HI"),
              ("EMIN", "EMAX"),
              ("E_LOW", "E_HIGH"),
          ]
          E_SINGLE = ["ENERGY", "E", "E_MEAN", "E_CENTER", "PI", "PHA", "CHANNEL", "CHAN"]
          C_COLS = ["COUNTS", "COUNT", "RATE", "SPECTRUM", "SPEC", "DATA", "FLUX", "VALUE", "NCOUNTS"]

          def arr(x):
              return np.asarray(x, dtype=float)

          def collapse(x, n):
              a = np.nan_to_num(arr(x), nan=0.0, posinf=0.0, neginf=0.0)
              if a.size == n:
                  return a.reshape(-1)[:n]
              if a.ndim >= 2 and a.shape[-1] == n:
                  return a.sum(axis=tuple(range(a.ndim - 1))).reshape(-1)
              if a.ndim >= 2 and a.shape[0] == n:
                  return a.sum(axis=tuple(range(1, a.ndim))).reshape(-1)
              return None

          def measure_edges(lo, hi, cnt):
              lo = arr(lo).reshape(-1)
              hi = arr(hi).reshape(-1)
              n = min(len(lo), len(hi))
              if n == 0:
                  return None
              lo = lo[:n]
              hi = hi[:n]
              c = collapse(cnt, n)
              if c is None:
                  return None

              width = np.maximum(1e-12, hi - lo)

              def frac(w):
                  return np.maximum(0, np.minimum(hi, w[1]) - np.maximum(lo, w[0])) / width

              line = float((c * frac(LINE)).sum())
              sb1 = float((c * frac(SB1)).sum())
              sb2 = float((c * frac(SB2)).sum())
              side = sb1 + sb2
              ratio = (line / 6) / (side / 20) if side > 0 else math.inf
              exp = side / 20 * 6 if side > 0 else math.nan
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan
              return {
                  "line_508_514_counts": line,
                  "side_490_500_counts": sb1,
                  "side_522_532_counts": sb2,
                  "side_total_counts": side,
                  "line_to_side_density_ratio": ratio,
                  "expected_line_from_side_density": exp,
                  "z_vs_side_density": z,
                  "energy_bins": n,
              }

          def measure_centers(e, cnt):
              e = arr(e).reshape(-1)
              c = collapse(cnt, len(e))
              if c is None or len(e) == 0:
                  return None
              line = float(np.nansum(c[(e >= LINE[0]) & (e <= LINE[1])]))
              sb1 = float(np.nansum(c[(e >= SB1[0]) & (e <= SB1[1])]))
              sb2 = float(np.nansum(c[(e >= SB2[0]) & (e <= SB2[1])]))
              side = sb1 + sb2
              ratio = (line / 6) / (side / 20) if side > 0 else math.inf
              exp = side / 20 * 6 if side > 0 else math.nan
              z = (line - exp) / math.sqrt(exp) if exp and exp > 0 else math.nan
              return {
                  "line_508_514_counts": line,
                  "side_490_500_counts": sb1,
                  "side_522_532_counts": sb2,
                  "side_total_counts": side,
                  "line_to_side_density_ratio": ratio,
                  "expected_line_from_side_density": exp,
                  "z_vs_side_density": z,
                  "energy_bins": len(e),
              }

          if fits:
              for p in PROD.glob("*"):
                  if not p.name.lower().endswith((".fits", ".fit", ".fits.gz", ".fit.gz")):
                      continue
                  try:
                      with fits.open(p, memmap=True) as hdul:
                          for i, hdu in enumerate(hdul):
                              cols = []
                              nrows = ""
                              if hasattr(hdu, "columns") and hdu.columns is not None:
                                  cols = list(hdu.columns.names or [])
                              try:
                                  nrows = len(hdu.data) if getattr(hdu, "data", None) is not None else ""
                              except Exception:
                                  nrows = ""

                              rows.append({
                                  "file": p.name,
                                  "hdu_index": i,
                                  "hdu_name": hdu.name or "",
                                  "class": hdu.__class__.__name__,
                                  "rows": nrows,
                                  "column_count": len(cols),
                                  "columns": ";".join(cols[:120]),
                              })

                              if not (hasattr(hdu, "columns") and hdu.columns is not None and hdu.data is not None):
                                  continue

                              cmap = {c.upper(): c for c in cols}

                              for a, b in E_PAIRS:
                                  if a in cmap and b in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap:
                                              m = measure_edges(hdu.data[cmap[a]], hdu.data[cmap[b]], hdu.data[cmap[ck]])
                                              if m:
                                                  m.update({
                                                      "file": p.name,
                                                      "hdu_index": i,
                                                      "hdu_name": hdu.name or "",
                                                      "method": "same_hdu_edges",
                                                      "energy_source": cmap[a] + "|" + cmap[b],
                                                      "count_source": cmap[ck],
                                                  })
                                                  meas.append(m)

                              for ek in E_SINGLE:
                                  if ek in cmap:
                                      for ck in C_COLS:
                                          if ck in cmap and ck != ek:
                                              m = measure_centers(hdu.data[cmap[ek]], hdu.data[cmap[ck]])
                                              if m:
                                                  m.update({
                                                      "file": p.name,
                                                      "hdu_index": i,
                                                      "hdu_name": hdu.name or "",
                                                      "method": "same_hdu_centers",
                                                      "energy_source": cmap[ek],
                                                      "count_source": cmap[ck],
                                                  })
                                                  meas.append(m)

                  except Exception as e:
                      errs.append({"file": str(p), "error": repr(e)[:300]})

          def write_csv(path, data):
              keys = []
              for r in data:
                  for k in r:
                      if k not in keys:
                          keys.append(k)
              if not keys:
                  keys = ["empty"]

              with open(path, "w", newline="", encoding="utf-8") as f:
                  w = csv.DictWriter(f, fieldnames=keys)
                  w.writeheader()
                  for r in data:
                      w.writerow({k: r.get(k, "") for k in keys})

          write_csv(OUT / "R17K_R6_SELECTED_PRODUCT_SCHEMA.csv", rows)
          write_csv(OUT / "R17K_R6_DIRECT_511_MEASUREMENT_ROWS.csv", meas)
          (OUT / "R17K_R6_PRODUCT_INSPECTION_ERRORS.json").write_text(json.dumps(errs, indent=2), encoding="utf-8")

          selected = list(PROD.glob("*"))
          og_flag = (OUT / "R17K_R6_OG_CREATE_SUCCESS_FLAG.txt")
          og_success = og_flag.exists() and og_flag.read_text(errors="replace").strip() == "1"

          decision = "R17K_R6_NO_OG_SPI_CREATED_NO_OFFICIAL_PRODUCTS"
          if og_success:
              decision = "R17K_R6_OG_SPI_CREATED_DIAGNOSTIC_NOT_PROOF"
          if any(("evts" in p.name.lower() or "energy" in p.name.lower() or "ebounds" in p.name.lower()) for p in selected):
              decision = "R17K_R6_OFFICIAL_SPI_PRODUCTS_FOUND_DIAGNOSTIC_NOT_PROOF"
          if meas:
              decision = "R17K_R6_DIRECT_511_ROWS_FROM_OFFICIAL_PRODUCTS_FOUND_DIAGNOSTIC_NOT_PROOF"

          summary = {
              "decision": decision,
              "proof_allowed": False,
              "selected_product_count": len(selected),
              "og_success": og_success,
              "direct_511_measurement_rows": len(meas),
              "schema_rows": len(rows),
              "claim_ceiling": [
                  "OFFICIAL_OSA_PRODUCT_GENERATION_OR_LOCATOR_ONLY",
                  "NOT_DISCOVERY",
                  "NOT_PARTICLE_PROOF",
                  "NOT_SOURCE_ATTRIBUTION",
                  "NOT_OFFICIAL_SPI_511_LINE_PROOF_UNLESS_LOCKED_CONTROLS_PASS"
              ]
          }

          (OUT / "R17K_R6_DECISION.json").write_text(json.dumps(summary, indent=2), encoding="utf-8")
          PY

          python3 scripts/inspect_final.py > logs/inspect_final.log 2>&1

      - name: Package slim artifact
        shell: bash
        run: |
          set +e
          cp -r selected_products ACIRM_R17K_R6_OUTPUTS/selected_products 2>/dev/null || true
          find selected_products -maxdepth 1 -type f -printf '%f,%s\n' | sort > ACIRM_R17K_R6_OUTPUTS/R17K_R6_SELECTED_PRODUCTS_MANIFEST.csv || true
          df -h > ACIRM_R17K_R6_OUTPUTS/R17K_R6_DF_END.txt
          free -h > ACIRM_R17K_R6_OUTPUTS/R17K_R6_FREE_END.txt
          zip -r ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT.zip ACIRM_R17K_R6_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT.zip > ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT.zip ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT.zip.sha256.txt

      - name: Upload slim artifact
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT
          path: |
            ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT.zip
            ACIRM_R17K_R6_ALL_GUARDED_FINAL_OUTPUT.zip.sha256.txt
          retention-days: 7
