name: ACIRM R17K R9C R4 Targeted Missing Direct Axis Locator Compact

on:
  workflow_dispatch:
    inputs:
      max_artifacts: {required: false, default: '100'}
      max_download_mb: {required: false, default: '500'}
      scan_limit_mb_per_file: {required: false, default: '8'}

permissions:
  contents: read
  actions: read

jobs:
  r17k-r9c-r4-targeted-missing-direct-axis-locator:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      MAX_ARTIFACTS: ${{ inputs.max_artifacts }}
      MAX_DOWNLOAD_MB: ${{ inputs.max_download_mb }}
      SCAN_LIMIT_MB_PER_FILE: ${{ inputs.scan_limit_mb_per_file }}
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Checkout repo shallow
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Prepare and install tools
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R9C_R4_OUTPUTS logs scripts artifact_bank extracted_artifacts
          cat > ACIRM_R17K_R9C_R4_OUTPUTS/CLAIM_CEILING.txt <<'EOF'
          R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_COMPACT
          PURPOSE: repair R9C_R3 missing direct axes only: minus14_direct and r9c_anchor_direct
          USES PRIOR GITHUB ACTIONS ARTIFACTS / COMMITTED FILES ONLY
          NO LAT RERUN / NO SPI RERUN / NO NEW PHOTON OR EVENT FIT
          R9A/R9B/R9C meta/locator/synthesis/purifier files may NOT prove minus14 or R9C anchor axes.
          TARGETED_LOCATOR_ONLY
          NOT_OFFICIAL_511_PROOF / NOT_PARTICLE_PROOF / NOT_SOURCE_ATTRIBUTION / NOT_ACIRM_PROOF
          EOF
          printf 'MAX_ARTIFACTS=%s\nMAX_DOWNLOAD_MB=%s\nSCAN_LIMIT_MB_PER_FILE=%s\nGH_REPO=%s\n' "$MAX_ARTIFACTS" "$MAX_DOWNLOAD_MB" "$SCAN_LIMIT_MB_PER_FILE" "$GH_REPO" > ACIRM_R17K_R9C_R4_OUTPUTS/R17K_R9C_R4_INPUTS.txt
          sudo apt-get update -y > logs/apt_update.log 2>&1
          sudo apt-get install -y zip unzip ca-certificates python3 > logs/apt_install.log 2>&1

      - name: Download, extract, and locate missing direct axes
        shell: bash
        run: |
          set +e
          cat > scripts/r9c_r4_compact.py <<'PY'
          import csv, json, os, re, zipfile, hashlib, subprocess, urllib.request
          from pathlib import Path
          OUT=Path('ACIRM_R17K_R9C_R4_OUTPUTS'); BANK=Path('artifact_bank'); EXT=Path('extracted_artifacts')
          BANK.mkdir(exist_ok=True); EXT.mkdir(exist_ok=True)
          token=os.environ.get('GH_TOKEN',''); repo=os.environ.get('GH_REPO','')
          max_art=int(os.environ.get('MAX_ARTIFACTS','100')); cap=int(float(os.environ.get('MAX_DOWNLOAD_MB','500'))*1024*1024)
          scan_limit=int(float(os.environ.get('SCAN_LIMIT_MB_PER_FILE','8'))*1024*1024)
          artifact_re=re.compile(r'R21AX|R7E|R7F|R6G|R6H|R6I|R6M|R7A|minus14|preparatory|shoulder|phase-pair|PHOTON|ALIGN|R9C|R10|R13M|THEORY|HANDOFF|LAT|P5|plus21|ACIRM',re.I)
          errors=[]; manifest=[]; extracted=[]; accepted=[]; rejected=[]; allhits=[]
          def wcsv(path, rows):
              keys=[]
              for r in rows:
                  for k in r:
                      if k not in keys: keys.append(k)
              if not keys: keys=['empty']
              with open(path,'w',newline='',encoding='utf-8') as f:
                  w=csv.DictWriter(f,fieldnames=keys); w.writeheader(); w.writerows(rows)
          def safe(s): return re.sub(r'[^A-Za-z0-9._-]+','_',s)[:180]
          def api_json(url):
              req=urllib.request.Request(url,headers={'Authorization':'Bearer '+token,'Accept':'application/vnd.github+json','X-GitHub-Api-Version':'2022-11-28','User-Agent':'ACIRM-R9C-R4/1.0'})
              with urllib.request.urlopen(req,timeout=30) as r: return json.loads(r.read().decode('utf-8','replace'))
          downloaded=0; total=0; candidates=0
          try:
              for page in range(1,11):
                  if downloaded>=max_art: break
                  js=api_json(f'https://api.github.com/repos/{repo}/actions/artifacts?per_page=100&page={page}')
                  arts=js.get('artifacts',[])
                  if not arts: break
                  for a in arts:
                      if downloaded>=max_art or total>=cap: break
                      name=a.get('name','') or ''
                      if a.get('expired') or not artifact_re.search(name): continue
                      candidates+=1; size=int(a.get('size_in_bytes') or 0)
                      dest=BANK/(safe(name)+'__artifact_'+str(a.get('id'))+'.zip')
                      row={'artifact_id':a.get('id'),'name':name,'size_in_bytes':size,'created_at':a.get('created_at'),'path':str(dest)}
                      if total+size>cap:
                          row['status']='SKIP_SIZE_CAP'; manifest.append(row); continue
                      cmd=['curl','-fL','--retry','2','--retry-delay','2','-H','Authorization: Bearer '+token,'-H','Accept: application/vnd.github+json','-H','X-GitHub-Api-Version: 2022-11-28',a.get('archive_download_url',''),'-o',str(dest)]
                      cp=subprocess.run(cmd,stdout=subprocess.PIPE,stderr=subprocess.PIPE,text=True,timeout=90)
                      if cp.returncode==0:
                          try:
                              with zipfile.ZipFile(dest) as z: bad=z.testzip()
                              if bad: raise RuntimeError('bad member '+str(bad))
                              n=dest.stat().st_size; total+=n; downloaded+=1; row.update({'status':'OK','downloaded_bytes':n})
                          except Exception as e:
                              dest.unlink(missing_ok=True); row.update({'status':'ZIP_FAIL','error':repr(e)[:240]}); errors.append(row.copy())
                      else:
                          dest.unlink(missing_ok=True); row.update({'status':'DOWNLOAD_FAIL','error':(cp.stderr or cp.stdout)[-240:]}); errors.append(row.copy())
                      manifest.append(row)
          except Exception as e:
              errors.append({'stage':'artifact_list_or_download','error':repr(e)[:500]})
          for z in Path('.').glob('**/*ACIRM*.zip'):
              if 'artifact_bank' in z.parts or 'extracted_artifacts' in z.parts: continue
              try:
                  dest=BANK/('COMMITTED_'+safe(z.name)); dest.write_bytes(z.read_bytes())
              except Exception as e: errors.append({'stage':'copy_committed_zip','path':str(z),'error':repr(e)[:200]})
          def extract_zip(zpath,dest,depth=0):
              if depth>3: return
              try:
                  with zipfile.ZipFile(zpath) as z:
                      bad=z.testzip()
                      if bad: errors.append({'stage':'zip_test','zip':str(zpath),'bad':bad})
                      for m in z.infolist()[:4500]:
                          if m.is_dir() or m.file_size>45*1024*1024: continue
                          if '..' in Path(m.filename).parts: continue
                          out=dest/safe(m.filename.replace('/','__')); out.parent.mkdir(parents=True,exist_ok=True)
                          try:
                              out.write_bytes(z.read(m)); extracted.append({'zip':str(zpath),'member':m.filename,'size':m.file_size,'path':str(out)})
                              if out.suffix.lower()=='.zip':
                                  nd=dest/(out.stem+'_unzipped'); nd.mkdir(exist_ok=True); extract_zip(out,nd,depth+1)
                          except Exception as e: errors.append({'stage':'member_extract','zip':str(zpath),'member':m.filename,'error':repr(e)[:260]})
              except Exception as e: errors.append({'stage':'zip_extract','zip':str(zpath),'error':repr(e)[:260]})
          for z in sorted(BANK.glob('*.zip')):
              d=EXT/safe(z.stem); d.mkdir(exist_ok=True); extract_zip(z,d,0)
          allowed={'.txt','.md','.json','.csv','.log','.yml','.yaml','.tex'}
          meta_bad=['r9a_','r9b_','r9c_','locator','synthesis','purifier','next_steps','artifact_hits','download_manifest','extracted_file_manifest','file_sizes','inventory','df_end','free_end','apt_','pip_','curl','unzip_test','logs__','scan_errors','_errors']
          preferred=['decision.json','metrics','key_metrics','ledger','report','closure','audit','summary','status','results','handoff','theory']
          def quality(path):
              pl=str(path).lower(); pref=sum(t in pl for t in preferred); meta=sum(t in pl for t in meta_bad)
              if meta: return 'META_REJECT'
              if pref>=1: return 'DIRECT_PREFERRED'
              return 'DIRECT_GENERAL'
          def snippet(txt,terms):
              low=txt.lower(); out=[]
              for term in terms:
                  i=low.find(term.lower())
                  if i>=0: out.append(txt[max(0,i-200):min(len(txt),i+430)].replace('\n',' ')[:650])
              return ' || '.join(out[:5])
          def classify(path,txt):
              low=txt.lower(); pl=str(path).lower(); q=quality(path); axes=[]; reasons=[]
              minus_branch=any(t in (pl+' '+low) for t in ['r21ax','r7e','r7f','r6g','r6h','r6i','r6m','r7a','phase_pair','phase-pair'])
              minus_terms=any(t in low for t in ['minus14','minus 14','-14','preparatory','shoulder','precursor','phase-pair','phase pair'])
              metric_terms=any(t in low for t in ['rate ratio','poisson','p-value','p_value','ts','ledger','decision','specificity','control','rank','pass','z=','z ='])
              if minus_branch and minus_terms and metric_terms:
                  axes.append('minus14_direct'); reasons.append('direct R21AX/R7/R6 minus14/preparatory metric or ledger context')
              r9c_core=('r9c' in low) and any(t in low for t in ['f_r9c','2239.664','2239','packet_n','m_eff','f_raw','cyg x-1','cygx-1','cygnus'])
              r9c_metric=any(t in low for t in ['decision','law','equation','alignment','phase','frequency','z2','rayleigh','packet','metric','handoff','theory'])
              if r9c_core and r9c_metric:
                  axes.append('r9c_anchor_direct'); reasons.append('direct R9C frequency/anchor/alignment/theory-law metadata')
              align_core=any(t in low for t in ['photon_alignment','photon alignment','phase alignment','aligned photon','packet_n','rayleigh','z2'])
              if align_core and any(t in low for t in ['metric','z','phase','frequency','decision','packet','alignment']):
                  axes.append('photon_alignment_direct'); reasons.append('direct photon/phase alignment terms')
              if any(t in low for t in ['not_proof','not_discovery','not_source_attribution','not_particle_proof','diagnostic_not_proof','exploratory']):
                  axes.append('claim_ceiling'); reasons.append('explicit claim ceiling')
              return axes,'; '.join(reasons),q
          terms=['minus14','MINUS14','-14','preparatory','shoulder','precursor','R21AX','R7E','R7F','R6G','R6H','R6I','R6M','R9C','f_R9C','2239.664','packet_N','photon alignment','PHOTON_ALIGNMENT','Cyg X-1','M_eff','NOT_PROOF']
          for p in EXT.rglob('*'):
              if not p.is_file() or p.suffix.lower() not in allowed: continue
              try:
                  if p.stat().st_size>scan_limit: continue
                  txt=p.read_text(encoding='utf-8',errors='replace')
                  axes,reasons,q=classify(p,txt)
                  if not axes: continue
                  score=40*len([a for a in axes if a!='claim_ceiling']) + (20 if q=='DIRECT_PREFERRED' else 5 if q=='DIRECT_GENERAL' else -50)
                  row={'path':str(p),'size':p.stat().st_size,'quality':q,'axes':';'.join(sorted(set(axes))),'score':score,'reasons':reasons,'snippet':snippet(txt,terms)}
                  allhits.append(row)
                  if q=='META_REJECT' and any(a in ['minus14_direct','r9c_anchor_direct','photon_alignment_direct'] for a in axes):
                      rejected.append({**row,'reject_reason':'meta/locator/synthesis/log file cannot repair missing direct axis'})
                  else: accepted.append(row)
              except Exception as e: errors.append({'stage':'scan','path':str(p),'error':repr(e)[:260]})
          accepted=sorted(accepted,key=lambda r:(r['quality']=='DIRECT_PREFERRED',r['score']),reverse=True)
          rejected=sorted(rejected,key=lambda r:r['score'],reverse=True)
          allhits=sorted(allhits,key=lambda r:r['score'],reverse=True)
          def rows(axis): return [r for r in accepted if axis in r.get('axes','').split(';')]
          def present(axis): return bool(rows(axis))
          minus=present('minus14_direct'); r9c=present('r9c_anchor_direct'); align=present('photon_alignment_direct'); ceiling=present('claim_ceiling')
          gates=[
              {'gate_id':'G0_ARTIFACT_EXTRACTION','status':'PASS' if extracted else 'MISS','detail':f'extracted_file_count={len(extracted)}'},
              {'gate_id':'G1_MISSING_MINUS14_DIRECT_REPAIRED','status':'PASS' if minus else 'MISS','detail':'direct R21AX/R7/R6 minus14/preparatory artifact required'},
              {'gate_id':'G2_R9C_ANCHOR_DIRECT_REPAIRED','status':'PASS' if r9c else 'MISS','detail':'direct R9C f_R9C/2239.664/packet/source-anchor artifact required'},
              {'gate_id':'G3_PHOTON_ALIGNMENT_DIRECT_PRESENT','status':'PASS' if align else 'MISS','detail':'optional supporting alignment artifact'},
              {'gate_id':'G4_CLAIM_CEILING_PRESENT','status':'PASS' if ceiling else 'MISS','detail':'not-proof/exploratory ceiling'},
              {'gate_id':'G5_SOURCE_ATTRIBUTION_ALLOWED','status':'BLOCKED','detail':'forbidden in this run'},
              {'gate_id':'G6_PARTICLE_PROOF_ALLOWED','status':'BLOCKED','detail':'forbidden in this run'}]
          if minus and r9c:
              decision='R17K_R9C_R4_DIRECT_MINUS14_AND_R9C_ANCHOR_FOUND_READY_FOR_R9D_LOW_CEILING_NOT_PROOF'; next_step='R9D_LOW_CEILING_TRACE_NARRATIVE_AND_GAP_AUDIT_FROM_DIRECT_EVIDENCE'
          elif minus and not r9c:
              decision='R17K_R9C_R4_DIRECT_MINUS14_FOUND_R9C_ANCHOR_STILL_MISSING_NOT_PROOF'; next_step='UPLOAD_OR_LOCATE_DIRECT_R9C_ANCHOR_ARTIFACT'
          elif r9c and not minus:
              decision='R17K_R9C_R4_DIRECT_R9C_ANCHOR_FOUND_MINUS14_STILL_MISSING_NOT_PROOF'; next_step='UPLOAD_OR_LOCATE_DIRECT_MINUS14_R21AX_R7E_R7F_ARTIFACT'
          elif align and not minus:
              decision='R17K_R9C_R4_ALIGNMENT_SUPPORT_FOUND_BUT_DIRECT_MINUS14_STILL_MISSING_NOT_PROOF'; next_step='UPLOAD_OR_LOCATE_DIRECT_MINUS14_R21AX_R7E_R7F_ARTIFACT'
          else:
              decision='R17K_R9C_R4_MISSING_DIRECT_MINUS14_AND_R9C_ANCHOR_MANUAL_UPLOAD_REQUIRED_NOT_PROOF'; next_step='MANUAL_UPLOAD_REQUIRED_DIRECT_R21AX_MINUS14_AND_R9C_ANCHOR_ARTIFACTS'
          axis_top=[]
          for axis in ['minus14_direct','r9c_anchor_direct','photon_alignment_direct','claim_ceiling']:
              for r in rows(axis)[:12]: axis_top.append({'axis':axis,**r})
          wcsv(OUT/'R17K_R9C_R4_ARTIFACT_DOWNLOAD_MANIFEST.csv',manifest)
          wcsv(OUT/'R17K_R9C_R4_EXTRACTED_FILE_MANIFEST.csv',extracted)
          wcsv(OUT/'R17K_R9C_R4_ACCEPTED_TARGETED_DIRECT_EVIDENCE.csv',accepted)
          wcsv(OUT/'R17K_R9C_R4_REJECTED_META_CANDIDATES.csv',rejected[:500])
          wcsv(OUT/'R17K_R9C_R4_AXIS_EVIDENCE_TOP.csv',axis_top)
          wcsv(OUT/'R17K_R9C_R4_GATES.csv',gates)
          wcsv(OUT/'R17K_R9C_R4_ALL_TARGETED_HITS.csv',allhits[:1000])
          (OUT/'R17K_R9C_R4_SCAN_ERRORS.json').write_text(json.dumps(errors,indent=2),encoding='utf-8')
          (OUT/'R17K_R9C_R4_ARTIFACT_DOWNLOAD_SUMMARY.json').write_text(json.dumps({'downloaded_artifact_count':downloaded,'downloaded_bytes':total,'candidate_count_seen':candidates,'error_count':len([e for e in errors if e.get('stage','').startswith('artifact')]),'method':'python_api_plus_curl_L'},indent=2),encoding='utf-8')
          report='# ACIRM R17K R9C R4 Targeted Missing Direct Axis Locator\n\nالحكم: '+decision+'\n\nهذه الخلية تبحث فقط عن direct minus14 و direct R9C anchor. لا تقبل ملفات R9A/R9B/R9C meta كدليل على هذه المحاور. لا توجد إعادة تشغيل LAT/SPI ولا proof ولا attribution.\n\nالخطوة التالية: '+next_step+'.\n'
          (OUT/'R17K_R9C_R4_TARGETED_MISSING_AXIS_REPORT_AR.md').write_text(report,encoding='utf-8')
          summary={'run_id':'R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_COMPACT','decision':decision,'proof_allowed':False,'official_backtrace_permission':False,'low_ceiling_trace_ready_after_repair':bool(minus and r9c),'source_attribution_allowed':False,'particle_proof_allowed':False,'artifact_zip_count':len(list(BANK.glob('*.zip'))),'extracted_file_count':len(extracted),'accepted_direct_evidence_count':len(accepted),'rejected_meta_candidate_count':len(rejected),'axis_presence':{'minus14_direct':minus,'r9c_anchor_direct':r9c,'photon_alignment_direct':align,'claim_ceiling':ceiling},'gates':gates,'top_minus14_direct':rows('minus14_direct')[:10],'top_r9c_anchor_direct':rows('r9c_anchor_direct')[:10],'top_photon_alignment_direct':rows('photon_alignment_direct')[:10],'next_step':next_step,'claim_ceiling':['TARGETED_LOCATOR_ONLY','EXPLORATORY_TRACE_PREPARATION_ONLY','NOT_OFFICIAL_511_PROOF','NOT_PARTICLE_PROOF','NOT_SOURCE_ATTRIBUTION','NOT_ACIRM_PROOF']}
          (OUT/'R17K_R9C_R4_DECISION.json').write_text(json.dumps(summary,indent=2),encoding='utf-8')
          sha=hashlib.sha256((OUT/'R17K_R9C_R4_DECISION.json').read_bytes()).hexdigest()
          (OUT/'R17K_R9C_R4_DECISION_JSON_SHA256.txt').write_text(sha+'  R17K_R9C_R4_DECISION.json\n',encoding='utf-8')
          PY
          python3 scripts/r9c_r4_compact.py > logs/r9c_r4_compact.log 2>&1
          echo "LOCATOR_EXIT=$?" | tee ACIRM_R17K_R9C_R4_OUTPUTS/R17K_R9C_R4_LOCATOR_EXIT.txt

      - name: Package artifact always
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p ACIRM_R17K_R9C_R4_OUTPUTS logs
          cp logs/*.log ACIRM_R17K_R9C_R4_OUTPUTS/ 2>/dev/null || true
          find artifact_bank -maxdepth 1 -type f -printf '%p,%s\n' | sort > ACIRM_R17K_R9C_R4_OUTPUTS/R17K_R9C_R4_DOWNLOADED_ARTIFACT_FILE_SIZES.csv 2>/dev/null || true
          df -h > ACIRM_R17K_R9C_R4_OUTPUTS/R17K_R9C_R4_DF_END.txt
          free -h > ACIRM_R17K_R9C_R4_OUTPUTS/R17K_R9C_R4_FREE_END.txt
          zip -r ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT.zip ACIRM_R17K_R9C_R4_OUTPUTS > logs/zip_output.log 2>&1
          sha256sum ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT.zip > ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT.zip.sha256.txt
          ls -lh ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT.zip ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT.zip.sha256.txt

      - name: Upload artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT
          path: |
            ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT.zip
            ACIRM_R17K_R9C_R4_TARGETED_MISSING_DIRECT_AXIS_LOCATOR_OUTPUT.zip.sha256.txt
          retention-days: 7
