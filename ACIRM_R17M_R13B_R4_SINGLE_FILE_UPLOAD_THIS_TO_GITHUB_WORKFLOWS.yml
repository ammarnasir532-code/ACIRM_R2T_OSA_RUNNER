      - name: Pull FermiBottle image
        shell: bash
        run: |
          set -euo pipefail
          docker pull fssc/fermibottle:latest | tee logs/DOCKER_PULL.log
          docker image inspect fssc/fermibottle:latest > logs/DOCKER_IMAGE_INSPECT.json

      - name: Run hardened R13B R3 inside FermiBottle
        shell: bash
        continue-on-error: true
        run: |
          set +e
          mkdir -p data results logs final_artifact
          echo "HOST_PWD=$PWD" | tee logs/DOCKER_MOUNT_PREFLIGHT.log
          ls -lah "$PWD" | tee -a logs/DOCKER_MOUNT_PREFLIGHT.log
          ls -lah "$PWD/acirm_r13b" | tee -a logs/DOCKER_MOUNT_PREFLIGHT.log
          docker run --rm             -v "$PWD":/work             -w /work             fssc/fermibottle:latest             bash -lc 'cd /work && echo CONTAINER_PWD=$(pwd) && ls -lah /work && ls -lah /work/acirm_r13b && bash /work/acirm_r13b/run_R13B_R3_inside_fermibottle.sh'             > logs/DOCKER_RUN_STDOUT.log 2> logs/DOCKER_RUN_STDERR.log
          DOCKER_STATUS=$?
          echo "$DOCKER_STATUS" > results/DOCKER_EXIT_STATUS.txt
          sudo chown -R "$USER:$USER" "$PWD" || true
          echo "DOCKER_STATUS=$DOCKER_STATUS"
          exit 0

      - name: Package R13B R3 results always
        if: always()
        shell: bash
        run: |
          set +e
          sudo chown -R "$USER:$USER" "$PWD" || true
          python3 acirm_r13b/package_R13B_R3_results.py
          ls -lah final_artifact || true

      - name: Upload R13B R3 artifact always
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ACIRM_R17M_R13B_R4_SINGLE_FILE_FERMITOOLS_HARDENED_RESULTS
          path: final_artifact/
          if-no-files-found: warn
